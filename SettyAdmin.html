<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Setty — Admin Console</title>
<style>
  :root {
    --bg: #0b1120; --card: #101a30; --card2: #0d1526; --border: #1e2a44;
    --text: #e2e8f0; --dim: #94a3b8; --muted: #64748b;
    --accent: #3b82f6; --accent-dim: #14233f;
    --green: #34d399; --greenDim: #0a2b22; --red: #f87171; --redDim: #3b1219;
    --amber: #fbbf24; --amberDim: #33270a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 20px 26px 70px; background: var(--bg); color: var(--text);
         font: 14px/1.55 system-ui, "Segoe UI", sans-serif; }
  h1 { font-size: 20px; margin: 0; }
  a { color: var(--accent); text-decoration: none; }
  .header-bar { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .header-sub { color: var(--dim); font-size: 12.5px; margin-top: 2px; }
  .chip { border: 1px solid var(--border); background: var(--card); border-radius: 999px;
          padding: 6px 14px; font-size: 12.5px; cursor: pointer; white-space: nowrap; }
  .chip:hover { border-color: var(--accent); }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0; }
  .tab { border: 1px solid var(--border); background: var(--card); color: var(--dim);
         border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
  .tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 14px; }
  .empty { color: var(--muted); padding: 30px; text-align: center; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 600; font-size: 11.5px; text-transform: uppercase;
       letter-spacing: .4px; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  td { padding: 8px 10px; border-bottom: 1px solid var(--card2); vertical-align: top; }
  tr:hover td { background: var(--card2); }
  .pill { display: inline-block; border-radius: 999px; padding: 2px 10px; font-size: 11.5px; font-weight: 600; }
  .ok    { background: var(--greenDim); color: var(--green); }
  .bad   { background: var(--redDim);   color: var(--red); }
  .warn  { background: var(--amberDim); color: var(--amber); }
  .info  { background: var(--accent-dim); color: var(--accent); }
  .btn { border: 1px solid var(--border); background: var(--card2); color: var(--text);
         border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  input, select { background: var(--card2); border: 1px solid var(--border); color: var(--text);
                  border-radius: 8px; padding: 7px 10px; font-size: 13px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .stat { display: inline-block; margin-right: 26px; }
  .stat b { display: block; font-size: 22px; }
  .stat span { color: var(--dim); font-size: 12px; }
  .snapchip { display: inline-block; background: var(--card2); border: 1px solid var(--border);
              border-radius: 6px; padding: 2px 8px; font-size: 11.5px; color: var(--dim); margin: 2px; }
  .gate { max-width: 420px; margin: 12vh auto; text-align: center; }
  .gate .big { font-size: 44px; margin-bottom: 10px; }
  #status { min-height: 20px; font-size: 12.5px; margin: 4px 0 10px; }
  #status.error { color: var(--red); } #status.success { color: var(--green); }
  @media (max-width: 720px) { body { padding: 12px 12px 60px; } .stat { margin-right: 16px; } }
</style>
</head>
<body>
  <div class="header-bar">
    <div>
      <h1>🛠️ Setty Admin Console</h1>
      <div class="header-sub">Sign-ins · users &amp; roles · backups · filing log ·
        <a href="https://smartias.github.io/setty-pms/SettyPMS.html">← Back to PMS</a></div>
    </div>
    <div class="chip" id="userChip">…</div>
  </div>
  <div class="tabs" id="tabs" style="display:none"></div>
  <div id="status"></div>
  <div id="view"></div>

<script src="setty-auth.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// Setty Admin Console v1 — sign-in required for everything. The data behind
// each tab is served by authenticated-only SQL (admin_signin_roster,
// admin_backup_status, pms_user_roles RLS), so the gate here is enforced
// server-side too, not just cosmetically.
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL  = "https://khxmgjilwhdguuepbhne.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoeG1namlsd2hkZ3V1ZXBiaG5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjg2MDYsImV4cCI6MjA4ODY0NDYwNn0.vtHt2eydU2iQ426iYOzLrqpH2WLXdRnicq-3sNfoNq8";

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
function toast(msg, kind) { const el = $("status"); el.className = kind || ""; el.textContent = msg; if (kind === "success") setTimeout(() => { el.textContent = ""; el.className = ""; }, 3500); }

async function sb(method, path, body, prefer) {
  const headers = {
    "apikey": SUPABASE_ANON,
    "Authorization": "Bearer " + settyAuth.token(),
    "Content-Type": "application/json",
    "Prefer": "return=representation" + (prefer ? "," + prefer : ""),
  };
  const res = await fetch(SUPABASE_URL + path, { method, headers, ...(body !== undefined ? { body: JSON.stringify(body) } : {}) });
  if (!res.ok) throw new Error(method + " " + res.status + ": " + (await res.text()).slice(0, 250));
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

const rel = (iso) => {
  if (!iso) return "never";
  const s = (Date.now() - new Date(iso).getTime()) / 1000;
  if (s < 90) return "just now";
  if (s < 3600) return Math.round(s / 60) + " min ago";
  if (s < 86400) return Math.round(s / 3600) + " h ago";
  return Math.round(s / 86400) + " d ago";
};

const TABS = [
  { key: "signins", label: "👥 Sign-ins" },
  { key: "roles",   label: "🔑 Users & Roles" },
  { key: "backups", label: "🗄️ Backups" },
  { key: "filing",  label: "📨 Filing Log" },
];
const state = { tab: "signins", roster: null, staffCount: null, roles: null, backups: null, filing: null, filingFilter: "all" };

// ── Rendering ────────────────────────────────────────────────────────────────
function render() {
  const signedIn = settyAuth.isSignedIn();
  $("userChip").textContent = signedIn ? "✓ " + settyAuth.email() : "Sign in";
  $("userChip").onclick = signedIn
    ? () => { if (confirm("Sign out of " + settyAuth.email() + "?")) settyAuth.signOut().then(render); }
    : () => settyAuth.signInWithMicrosoft();

  if (!signedIn) {
    $("tabs").style.display = "none";
    $("view").innerHTML = `
      <div class="gate card">
        <div class="big">🛠️</div>
        <h2 style="margin:0 0 6px">Admin Console</h2>
        <p style="color:var(--dim)">This page requires a Setty sign-in — everything behind it is served only to signed-in accounts.</p>
        <button class="btn btn-primary" onclick="settyAuth.signInWithMicrosoft()" style="width:100%;padding:11px">Sign in with Microsoft</button>
      </div>`;
    return;
  }
  $("tabs").style.display = "flex";
  $("tabs").innerHTML = TABS.map(t =>
    `<div class="tab ${state.tab === t.key ? "active" : ""}" onclick="setTab('${t.key}')">${t.label}</div>`).join("");
  ({ signins: renderSignins, roles: renderRoles, backups: renderBackups, filing: renderFiling })[state.tab]();
}
function setTab(k) { state.tab = k; render(); }

// ── Sign-ins (the flip-readiness dashboard) ─────────────────────────────────
async function renderSignins() {
  const v = $("view");
  if (!state.roster) {
    v.innerHTML = '<div class="empty">Loading sign-ins…</div>';
    try {
      const [roster, dataRows] = await Promise.all([
        sb("POST", "/rest/v1/rpc/admin_signin_roster", {}),
        sb("GET", "/rest/v1/pms_data?id=eq.singleton&select=staff").catch(() => []),
      ]);
      state.roster = roster || [];
      const staff = (dataRows && dataRows[0] && dataRows[0].staff) || [];
      state.staffCount = Array.isArray(staff) ? staff.length : null;
    } catch (e) { v.innerHTML = `<div class="empty">Could not load: ${esc(e.message)}</div>`; return; }
  }
  const r = state.roster;
  const fresh = r.filter(x => x.last_sign_in_at && (Date.now() - new Date(x.last_sign_in_at)) < 14 * 86400000).length;
  v.innerHTML = `
    <div class="card">
      <div class="stat"><b>${r.length}</b><span>accounts have signed in</span></div>
      ${state.staffCount != null ? `<div class="stat"><b>${state.staffCount}</b><span>people on the PMS staff list</span></div>` : ""}
      <div class="stat"><b>${fresh}</b><span>active in the last 14 days</span></div>
      <div style="margin-top:10px" class="row">
        <button class="btn" onclick="state.roster=null;render()">↻ Refresh</button>
        <span style="color:var(--muted);font-size:12px">Before the RLS flip, everyone on the staff list should appear here.</span>
      </div>
    </div>
    <div class="card">
      <table><thead><tr><th>Email</th><th>Provider</th><th>First signed in</th><th>Last signed in</th></tr></thead>
      <tbody>${r.map(x => `
        <tr><td>${esc(x.email)}</td>
            <td><span class="pill info">${esc(x.provider)}</span></td>
            <td title="${esc(x.created_at || "")}">${rel(x.created_at)}</td>
            <td title="${esc(x.last_sign_in_at || "")}">${rel(x.last_sign_in_at)}</td></tr>`).join("") ||
        '<tr><td colspan="4" class="empty">Nobody has signed in yet.</td></tr>'}</tbody></table>
    </div>`;
}

// ── Users & Roles ────────────────────────────────────────────────────────────
async function renderRoles() {
  const v = $("view");
  if (!state.roles) {
    v.innerHTML = '<div class="empty">Loading roles…</div>';
    try { state.roles = await sb("GET", "/rest/v1/pms_user_roles?select=*&order=email.asc") || []; }
    catch (e) { v.innerHTML = `<div class="empty">Could not load: ${esc(e.message)}</div>`; return; }
  }
  const roleColor = { admin: "bad", finance: "warn", staff: "info" };
  v.innerHTML = `
    <div class="card">
      <div class="row">
        <input id="newEmail" type="email" placeholder="name@setty.com" style="flex:1;min-width:200px">
        <input id="newName" placeholder="Display name (optional)" style="flex:1;min-width:160px">
        <select id="newRole"><option value="staff">staff</option><option value="finance">finance</option><option value="admin">admin</option></select>
        <button class="btn btn-primary" onclick="addRole()">Add</button>
      </div>
      <div style="color:var(--muted);font-size:12px;margin-top:8px">
        Roles don't gate anything yet — this is the registry the Phase 5 permission policies will read.
        For now: any signed-in account can edit this list; that tightens to admin-only when roles go live.</div>
    </div>
    <div class="card">
      <table><thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Updated</th><th></th></tr></thead>
      <tbody>${state.roles.map(x => `
        <tr><td>${esc(x.email)}</td><td>${esc(x.display_name || "")}</td>
            <td><select onchange="setRole('${esc(x.email)}', this.value)">
              ${["staff","finance","admin"].map(o => `<option ${o === x.role ? "selected" : ""}>${o}</option>`).join("")}
            </select> <span class="pill ${roleColor[x.role] || "info"}">${esc(x.role)}</span></td>
            <td title="${esc(x.updated_at || "")}">${rel(x.updated_at)}</td>
            <td><button class="btn btn-danger" onclick="dropRole('${esc(x.email)}')">Remove</button></td></tr>`).join("") ||
        '<tr><td colspan="5" class="empty">No users yet.</td></tr>'}</tbody></table>
    </div>`;
}
async function addRole() {
  const email = $("newEmail").value.trim().toLowerCase();
  if (!/@setty\.com$/.test(email)) { toast("Email must be @setty.com", "error"); return; }
  try {
    await sb("POST", "/rest/v1/pms_user_roles", {
      email, role: $("newRole").value, display_name: $("newName").value.trim() || null,
      added_by: settyAuth.email(),
    }, "resolution=merge-duplicates");
    state.roles = null; toast("Added " + email, "success"); render();
  } catch (e) { toast(e.message, "error"); }
}
async function setRole(email, role) {
  try {
    await sb("PATCH", "/rest/v1/pms_user_roles?email=eq." + encodeURIComponent(email),
      { role, updated_at: new Date().toISOString(), added_by: settyAuth.email() });
    state.roles = null; toast(email + " → " + role, "success"); render();
  } catch (e) { toast(e.message, "error"); }
}
async function dropRole(email) {
  if (!confirm("Remove " + email + " from the roles list?")) return;
  try {
    await sb("DELETE", "/rest/v1/pms_user_roles?email=eq." + encodeURIComponent(email));
    state.roles = null; toast("Removed " + email, "success"); render();
  } catch (e) { toast(e.message, "error"); }
}

// ── Backups ──────────────────────────────────────────────────────────────────
async function renderBackups() {
  const v = $("view");
  if (!state.backups) {
    v.innerHTML = '<div class="empty">Loading backup status…</div>';
    try { state.backups = await sb("POST", "/rest/v1/rpc/admin_backup_status", {}); }
    catch (e) { v.innerHTML = `<div class="empty">Could not load: ${esc(e.message)}</div>`; return; }
  }
  const b = state.backups;
  const delta = (b.live_rows || 0) - (b.mirror_rows || 0);
  const run = b.cron_last_run;
  v.innerHTML = `
    <div class="card">
      <div class="stat"><b>${b.mirror_rows ?? "?"}</b><span>emails in the delete-proof mirror</span></div>
      <div class="stat"><b>${b.live_rows ?? "?"}</b><span>emails in the live table</span></div>
      <div class="stat"><b>${delta === 0 ? "✓" : "+" + delta}</b><span>${delta === 0 ? "mirror is current" : "new since last mirror run"}</span></div>
      <div style="margin-top:8px;color:var(--dim);font-size:12.5px">
        Last mirrored: ${esc(b.last_mirrored_at ? rel(b.last_mirrored_at) : "never")} ·
        Nightly job runs 07:00 UTC ·
        Last run: ${run ? `<span class="pill ${run.status === "succeeded" ? "ok" : "bad"}">${esc(run.status)}</span> ${rel(run.start_time)} — ${esc(run.return_message || "")}` : "no runs recorded yet"}
      </div>
      <div style="margin-top:10px"><button class="btn" onclick="state.backups=null;render()">↻ Refresh</button>
      <span style="color:var(--muted);font-size:12px">Supabase's own daily whole-database backups run in addition to this (Dashboard → Database → Backups).</span></div>
    </div>
    <div class="card">
      <div style="color:var(--muted);font-size:12px;margin-bottom:6px">DATED SNAPSHOTS (14-day retention)</div>
      ${(b.snapshots || []).map(s => `<span class="snapchip">${esc(s)}</span>`).join("") || '<div class="empty">None yet.</div>'}
    </div>`;
}

// ── Filing Log ───────────────────────────────────────────────────────────────
async function renderFiling() {
  const v = $("view");
  if (!state.filing) {
    v.innerHTML = '<div class="empty">Loading filing log…</div>';
    try { state.filing = await sb("GET", "/rest/v1/pms_filing_log?select=created_at,project_id,operation,email_subject,status,error,user_email&order=created_at.desc&limit=150") || []; }
    catch (e) { v.innerHTML = `<div class="empty">Could not load: ${esc(e.message)}</div>`; return; }
  }
  const rows = state.filing.filter(x => state.filingFilter === "all" || (state.filingFilter === "error" ? x.status !== "success" : x.status === "success"));
  const errCount = state.filing.filter(x => x.status !== "success").length;
  v.innerHTML = `
    <div class="card row">
      <div class="stat"><b>${state.filing.length}</b><span>recent entries</span></div>
      <div class="stat"><b class="${errCount ? "" : ""}" style="color:${errCount ? "var(--red)" : "var(--green)"}">${errCount}</b><span>not successful</span></div>
      <select onchange="state.filingFilter=this.value;render()">
        <option value="all" ${state.filingFilter === "all" ? "selected" : ""}>All</option>
        <option value="error" ${state.filingFilter === "error" ? "selected" : ""}>Problems only</option>
        <option value="success" ${state.filingFilter === "success" ? "selected" : ""}>Successes only</option>
      </select>
      <button class="btn" onclick="state.filing=null;render()">↻ Refresh</button>
      <span style="color:var(--muted);font-size:12px">The deeper Filing Health reconcile (cross-checking SharePoint) still lives in the PMS toolbar; it relocates here in a later pass.</span>
    </div>
    <div class="card">
      <table><thead><tr><th>When</th><th>Project</th><th>Op</th><th>Subject</th><th>Status</th><th>By</th><th>Error</th></tr></thead>
      <tbody>${rows.map(x => `
        <tr><td title="${esc(x.created_at)}">${rel(x.created_at)}</td>
            <td>${esc(x.project_id || "")}</td><td>${esc(x.operation || "")}</td>
            <td>${esc((x.email_subject || "").slice(0, 60))}</td>
            <td><span class="pill ${x.status === "success" ? "ok" : "bad"}">${esc(x.status || "?")}</span></td>
            <td>${esc((x.user_email || "").split("@")[0])}</td>
            <td style="color:var(--red);font-size:12px">${esc((x.error || "").slice(0, 80))}</td></tr>`).join("") ||
        '<tr><td colspan="7" class="empty">Nothing matches this filter.</td></tr>'}</tbody></table>
    </div>`;
}

// ── Boot ─────────────────────────────────────────────────────────────────────
settyAuth.onChange(() => { state.roster = state.roles = state.backups = state.filing = null; render(); });
settyAuth.init().catch(e => toast("Sign-in: " + e.message, "error")).then(render);
</script>
</body>
</html>
