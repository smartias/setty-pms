<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Setty — Admin Console</title>
<style>
  :root {
    --bg: #0b1120; --card: #101a30; --card2: #0d1526; --border: #1e2a44;
    --text: #e2e8f0; --dim: #94a3b8; --muted: #64748b;
    --accent: #3b82f6; --accent-dim: #14233f;
    --green: #34d399; --greenDim: #0a2b22; --red: #f87171; --redDim: #3b1219;
    --amber: #fbbf24; --amberDim: #33270a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 20px 26px 70px; background: var(--bg); color: var(--text);
         font: 14px/1.55 system-ui, "Segoe UI", sans-serif; }
  h1 { font-size: 20px; margin: 0; }
  a { color: var(--accent); text-decoration: none; }
  .header-bar { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .header-sub { color: var(--dim); font-size: 12.5px; margin-top: 2px; }
  .chip { border: 1px solid var(--border); background: var(--card); border-radius: 999px;
          padding: 6px 14px; font-size: 12.5px; cursor: pointer; white-space: nowrap; }
  .chip:hover { border-color: var(--accent); }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0; }
  .tab { border: 1px solid var(--border); background: var(--card); color: var(--dim);
         border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
  .tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 14px; }
  .empty { color: var(--muted); padding: 30px; text-align: center; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 600; font-size: 11.5px; text-transform: uppercase;
       letter-spacing: .4px; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  td { padding: 8px 10px; border-bottom: 1px solid var(--card2); vertical-align: top; }
  tr:hover td { background: var(--card2); }
  .pill { display: inline-block; border-radius: 999px; padding: 2px 10px; font-size: 11.5px; font-weight: 600; }
  .ok    { background: var(--greenDim); color: var(--green); }
  .bad   { background: var(--redDim);   color: var(--red); }
  .warn  { background: var(--amberDim); color: var(--amber); }
  .info  { background: var(--accent-dim); color: var(--accent); }
  .btn { border: 1px solid var(--border); background: var(--card2); color: var(--text);
         border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  input, select { background: var(--card2); border: 1px solid var(--border); color: var(--text);
                  border-radius: 8px; padding: 7px 10px; font-size: 13px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .stat { display: inline-block; margin-right: 26px; }
  .stat b { display: block; font-size: 22px; }
  .stat span { color: var(--dim); font-size: 12px; }
  .snapchip { display: inline-block; background: var(--card2); border: 1px solid var(--border);
              border-radius: 6px; padding: 2px 8px; font-size: 11.5px; color: var(--dim); margin: 2px; }
  .gate { max-width: 420px; margin: 12vh auto; text-align: center; }
  .gate .big { font-size: 44px; margin-bottom: 10px; }
  /* System Guide / MCP doc styles */
  pre { background: var(--card2); border: 1px solid var(--border); border-radius: 8px;
        padding: 10px 12px; font-size: 12px; overflow-x: auto; margin: 8px 0; }
  code { font-family: ui-monospace, Consolas, monospace; font-size: 12px; color: var(--text); word-break: break-all; }
  .sechead { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
  .doc p { margin: 6px 0; color: var(--dim); font-size: 13px; }
  .doc b { color: var(--text); }
  .doc ul, .doc ol { margin: 6px 0 6px 4px; padding-left: 18px; color: var(--dim); font-size: 13px; }
  .doc li { margin: 4px 0; }
  .appgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; }
  .appcard { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .appcard h4 { margin: 0 0 4px; font-size: 13.5px; }
  .appcard p { margin: 0; color: var(--dim); font-size: 12.5px; }
  .appcard .src { margin-top: 6px; font-size: 11.5px; color: var(--muted); }
  .archflow { display: flex; gap: 10px; flex-wrap: wrap; align-items: stretch; }
  .archcol { flex: 1; min-width: 210px; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
  .archcol h4 { margin: 0 0 6px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .architem { border: 1px solid var(--border); background: var(--card); border-radius: 7px; padding: 5px 9px; font-size: 12.5px; margin: 5px 0; }
  .architem span { color: var(--muted); font-size: 11.5px; display: block; }
  .phaserow { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--card2); }
  .phaserow:last-child { border-bottom: none; }
  .phaserow .pill { flex-shrink: 0; margin-top: 1px; }
  .jump { display: inline-block; margin: 2px 6px 2px 0; font-size: 12.5px; }
  #status { min-height: 20px; font-size: 12.5px; margin: 4px 0 10px; }
  #status.error { color: var(--red); } #status.success { color: var(--green); }
  @media (max-width: 720px) { body { padding: 12px 12px 60px; } .stat { margin-right: 16px; } }
</style>
</head>
<body>
  <div class="header-bar">
    <div>
      <h1>🛠️ Setty Admin Console</h1>
      <div class="header-sub">Sign-ins · users &amp; roles · backups · filing log · integration · system guide · Claude/MCP ·
        <a href="https://smartias.github.io/setty-pms/SettyPMS.html">← Back to PMS</a></div>
    </div>
    <div class="chip" id="userChip">…</div>
  </div>
  <div class="tabs" id="tabs" style="display:none"></div>
  <div id="status"></div>
  <div id="view"></div>

<script src="setty-auth.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// Setty Admin Console v2 (adds System Guide + Claude/MCP runbook tabs).
// Sign-in required for everything. The data behind
// each tab is served by authenticated-only SQL (admin_signin_roster,
// admin_backup_status, pms_user_roles RLS), so the gate here is enforced
// server-side too, not just cosmetically.
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL  = "https://khxmgjilwhdguuepbhne.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoeG1namlsd2hkZ3V1ZXBiaG5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjg2MDYsImV4cCI6MjA4ODY0NDYwNn0.vtHt2eydU2iQ426iYOzLrqpH2WLXdRnicq-3sNfoNq8";

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
function toast(msg, kind) { const el = $("status"); el.className = kind || ""; el.textContent = msg; if (kind === "success") setTimeout(() => { el.textContent = ""; el.className = ""; }, 3500); }

async function sb(method, path, body, prefer) {
  const headers = {
    "apikey": SUPABASE_ANON,
    "Authorization": "Bearer " + settyAuth.token(),
    "Content-Type": "application/json",
    "Prefer": "return=representation" + (prefer ? "," + prefer : ""),
  };
  const res = await fetch(SUPABASE_URL + path, { method, headers, ...(body !== undefined ? { body: JSON.stringify(body) } : {}) });
  if (!res.ok) throw new Error(method + " " + res.status + ": " + (await res.text()).slice(0, 250));
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

const rel = (iso) => {
  if (!iso) return "never";
  const s = (Date.now() - new Date(iso).getTime()) / 1000;
  if (s < 90) return "just now";
  if (s < 3600) return Math.round(s / 60) + " min ago";
  if (s < 86400) return Math.round(s / 3600) + " h ago";
  return Math.round(s / 86400) + " d ago";
};

const TABS = [
  { key: "signins", label: "👥 Sign-ins" },
  { key: "roles",   label: "🔑 Users & Roles" },
  { key: "backups", label: "🗄️ Backups" },
  { key: "filing",  label: "📨 Filing Log" },
  { key: "integration", label: "🔗 Integration" },
  { key: "guide", label: "📖 System Guide" },
  { key: "mcp",   label: "🤖 Claude / MCP" },
];
const state = { tab: "signins", roster: null, staffCount: null, roles: null, backups: null, filing: null, filingFilter: "all",
                integ: null, integProjects: null, integMaps: null, integFilter: "", tokenShown: false, feedTest: null };
const FEED_URL = SUPABASE_URL + "/functions/v1/pms-billing-feed/v1/pms/billable-milestones";

// ── Rendering ────────────────────────────────────────────────────────────────
function render() {
  const signedIn = settyAuth.isSignedIn();
  $("userChip").textContent = signedIn ? "✓ " + settyAuth.email() : "Sign in";
  $("userChip").onclick = signedIn
    ? () => { if (confirm("Sign out of " + settyAuth.email() + "?")) settyAuth.signOut().then(render); }
    : () => settyAuth.signInWithMicrosoft();

  if (!signedIn) {
    $("tabs").style.display = "none";
    $("view").innerHTML = `
      <div class="gate card">
        <div class="big">🛠️</div>
        <h2 style="margin:0 0 6px">Admin Console</h2>
        <p style="color:var(--dim)">This page requires a Setty sign-in — everything behind it is served only to signed-in accounts.</p>
        <button class="btn btn-primary" onclick="settyAuth.signInWithMicrosoft()" style="width:100%;padding:11px">Sign in with Microsoft</button>
      </div>`;
    return;
  }
  $("tabs").style.display = "flex";
  $("tabs").innerHTML = TABS.map(t =>
    `<div class="tab ${state.tab === t.key ? "active" : ""}" onclick="setTab('${t.key}')">${t.label}</div>`).join("");
  ({ signins: renderSignins, roles: renderRoles, backups: renderBackups, filing: renderFiling, integration: renderIntegration,
     guide: renderGuide, mcp: renderMcp })[state.tab]();
}
function setTab(k) { state.tab = k; render(); }

// ── Sign-ins (the flip-readiness dashboard) ─────────────────────────────────
async function renderSignins() {
  const v = $("view");
  if (!state.roster) {
    v.innerHTML = '<div class="empty">Loading sign-ins…</div>';
    try {
      const [roster, dataRows] = await Promise.all([
        sb("POST", "/rest/v1/rpc/admin_signin_roster", {}),
        sb("GET", "/rest/v1/pms_data?id=eq.singleton&select=staff").catch(() => []),
      ]);
      state.roster = roster || [];
      const staff = (dataRows && dataRows[0] && dataRows[0].staff) || [];
      state.staffCount = Array.isArray(staff) ? staff.length : null;
    } catch (e) { v.innerHTML = `<div class="empty">Could not load: ${esc(e.message)}</div>`; return; }
  }
  const r = state.roster;
  const fresh = r.filter(x => x.last_sign_in_at && (Date.now() - new Date(x.last_sign_in_at)) < 14 * 86400000).length;
  v.innerHTML = `
    <div class="card">
      <div class="stat"><b>${r.length}</b><span>accounts have signed in</span></div>
      ${state.staffCount != null ? `<div class="stat"><b>${state.staffCount}</b><span>people on the PMS staff list</span></div>` : ""}
      <div class="stat"><b>${fresh}</b><span>active in the last 14 days</span></div>
      <div style="margin-top:10px" class="row">
        <button class="btn" onclick="state.roster=null;render()">↻ Refresh</button>
        <span style="color:var(--muted);font-size:12px">Before the RLS flip, everyone on the staff list should appear here.</span>
      </div>
    </div>
    <div class="card">
      <table><thead><tr><th>Email</th><th>Provider</th><th>First signed in</th><th>Last signed in</th></tr></thead>
      <tbody>${r.map(x => `
        <tr><td>${esc(x.email)}</td>
            <td><span class="pill info">${esc(x.provider)}</span></td>
            <td title="${esc(x.created_at || "")}">${rel(x.created_at)}</td>
            <td title="${esc(x.last_sign_in_at || "")}">${rel(x.last_sign_in_at)}</td></tr>`).join("") ||
        '<tr><td colspan="4" class="empty">Nobody has signed in yet.</td></tr>'}</tbody></table>
    </div>`;
}

// ── Users & Roles ────────────────────────────────────────────────────────────
async function renderRoles() {
  const v = $("view");
  if (!state.roles) {
    v.innerHTML = '<div class="empty">Loading roles…</div>';
    try { state.roles = await sb("GET", "/rest/v1/pms_user_roles?select=*&order=email.asc") || []; }
    catch (e) { v.innerHTML = `<div class="empty">Could not load: ${esc(e.message)}</div>`; return; }
  }
  const roleColor = { admin: "bad", finance: "warn", staff: "info" };
  v.innerHTML = `
    <div class="card">
      <div class="row">
        <input id="newEmail" type="email" placeholder="name@setty.com" style="flex:1;min-width:200px">
        <input id="newName" placeholder="Display name (optional)" style="flex:1;min-width:160px">
        <select id="newRole"><option value="staff">staff</option><option value="finance">finance</option><option value="admin">admin</option></select>
        <button class="btn btn-primary" onclick="addRole()">Add</button>
      </div>
      <div style="color:var(--muted);font-size:12px;margin-top:8px">
        Roles don't gate anything yet — this is the registry the Phase 5 permission policies will read.
        For now: any signed-in account can edit this list; that tightens to admin-only when roles go live.</div>
    </div>
    <div class="card">
      <table><thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Updated</th><th></th></tr></thead>
      <tbody>${state.roles.map(x => `
        <tr><td>${esc(x.email)}</td><td>${esc(x.display_name || "")}</td>
            <td><select onchange="setRole('${esc(x.email)}', this.value)">
              ${["staff","finance","admin"].map(o => `<option ${o === x.role ? "selected" : ""}>${o}</option>`).join("")}
            </select> <span class="pill ${roleColor[x.role] || "info"}">${esc(x.role)}</span></td>
            <td title="${esc(x.updated_at || "")}">${rel(x.updated_at)}</td>
            <td><button class="btn btn-danger" onclick="dropRole('${esc(x.email)}')">Remove</button></td></tr>`).join("") ||
        '<tr><td colspan="5" class="empty">No users yet.</td></tr>'}</tbody></table>
    </div>`;
}
async function addRole() {
  const email = $("newEmail").value.trim().toLowerCase();
  if (!/@setty\.com$/.test(email)) { toast("Email must be @setty.com", "error"); return; }
  try {
    await sb("POST", "/rest/v1/pms_user_roles", {
      email, role: $("newRole").value, display_name: $("newName").value.trim() || null,
      added_by: settyAuth.email(),
    }, "resolution=merge-duplicates");
    state.roles = null; toast("Added " + email, "success"); render();
  } catch (e) { toast(e.message, "error"); }
}
async function setRole(email, role) {
  try {
    await sb("PATCH", "/rest/v1/pms_user_roles?email=eq." + encodeURIComponent(email),
      { role, updated_at: new Date().toISOString(), added_by: settyAuth.email() });
    state.roles = null; toast(email + " → " + role, "success"); render();
  } catch (e) { toast(e.message, "error"); }
}
async function dropRole(email) {
  if (!confirm("Remove " + email + " from the roles list?")) return;
  try {
    await sb("DELETE", "/rest/v1/pms_user_roles?email=eq." + encodeURIComponent(email));
    state.roles = null; toast("Removed " + email, "success"); render();
  } catch (e) { toast(e.message, "error"); }
}

// ── Backups ──────────────────────────────────────────────────────────────────
async function renderBackups() {
  const v = $("view");
  if (!state.backups) {
    v.innerHTML = '<div class="empty">Loading backup status…</div>';
    try { state.backups = await sb("POST", "/rest/v1/rpc/admin_backup_status", {}); }
    catch (e) { v.innerHTML = `<div class="empty">Could not load: ${esc(e.message)}</div>`; return; }
  }
  const b = state.backups;
  const delta = (b.live_rows || 0) - (b.mirror_rows || 0);
  const run = b.cron_last_run;
  v.innerHTML = `
    <div class="card">
      <div class="stat"><b>${b.mirror_rows ?? "?"}</b><span>emails in the delete-proof mirror</span></div>
      <div class="stat"><b>${b.live_rows ?? "?"}</b><span>emails in the live table</span></div>
      <div class="stat"><b>${delta === 0 ? "✓" : "+" + delta}</b><span>${delta === 0 ? "mirror is current" : "new since last mirror run"}</span></div>
      <div style="margin-top:8px;color:var(--dim);font-size:12.5px">
        Last mirrored: ${esc(b.last_mirrored_at ? rel(b.last_mirrored_at) : "never")} ·
        Nightly job runs 07:00 UTC ·
        Last run: ${run ? `<span class="pill ${run.status === "succeeded" ? "ok" : "bad"}">${esc(run.status)}</span> ${rel(run.start_time)} — ${esc(run.return_message || "")}` : "no runs recorded yet"}
      </div>
      <div style="margin-top:10px"><button class="btn" onclick="state.backups=null;render()">↻ Refresh</button>
      <span style="color:var(--muted);font-size:12px">Supabase's own daily whole-database backups run in addition to this (Dashboard → Database → Backups).</span></div>
    </div>
    <div class="card">
      <div style="color:var(--muted);font-size:12px;margin-bottom:6px">DATED SNAPSHOTS (14-day retention)</div>
      ${(b.snapshots || []).map(s => `<span class="snapchip">${esc(s)}</span>`).join("") || '<div class="empty">None yet.</div>'}
    </div>`;
}

// ── Filing Log ───────────────────────────────────────────────────────────────
async function renderFiling() {
  const v = $("view");
  if (!state.filing) {
    v.innerHTML = '<div class="empty">Loading filing log…</div>';
    try { state.filing = await sb("GET", "/rest/v1/pms_filing_log?select=created_at,project_id,operation,email_subject,status,error,user_email&order=created_at.desc&limit=150") || []; }
    catch (e) { v.innerHTML = `<div class="empty">Could not load: ${esc(e.message)}</div>`; return; }
  }
  const rows = state.filing.filter(x => state.filingFilter === "all" || (state.filingFilter === "error" ? x.status !== "success" : x.status === "success"));
  const errCount = state.filing.filter(x => x.status !== "success").length;
  v.innerHTML = `
    <div class="card row">
      <div class="stat"><b>${state.filing.length}</b><span>recent entries</span></div>
      <div class="stat"><b class="${errCount ? "" : ""}" style="color:${errCount ? "var(--red)" : "var(--green)"}">${errCount}</b><span>not successful</span></div>
      <select onchange="state.filingFilter=this.value;render()">
        <option value="all" ${state.filingFilter === "all" ? "selected" : ""}>All</option>
        <option value="error" ${state.filingFilter === "error" ? "selected" : ""}>Problems only</option>
        <option value="success" ${state.filingFilter === "success" ? "selected" : ""}>Successes only</option>
      </select>
      <button class="btn" onclick="state.filing=null;render()">↻ Refresh</button>
      <span style="color:var(--muted);font-size:12px">The deeper Filing Health reconcile (cross-checking SharePoint) still lives in the PMS toolbar; it relocates here in a later pass.</span>
    </div>
    <div class="card">
      <table><thead><tr><th>When</th><th>Project</th><th>Op</th><th>Subject</th><th>Status</th><th>By</th><th>Error</th></tr></thead>
      <tbody>${rows.map(x => `
        <tr><td title="${esc(x.created_at)}">${rel(x.created_at)}</td>
            <td>${esc(x.project_id || "")}</td><td>${esc(x.operation || "")}</td>
            <td>${esc((x.email_subject || "").slice(0, 60))}</td>
            <td><span class="pill ${x.status === "success" ? "ok" : "bad"}">${esc(x.status || "?")}</span></td>
            <td>${esc((x.user_email || "").split("@")[0])}</td>
            <td style="color:var(--red);font-size:12px">${esc((x.error || "").slice(0, 80))}</td></tr>`).join("") ||
        '<tr><td colspan="7" class="empty">Nothing matches this filter.</td></tr>'}</tbody></table>
    </div>`;
}

// ── Integration (PMS ↔ SETTYfy billing loop) ─────────────────────────────────
async function renderIntegration() {
  const v = $("view");
  if (!state.integ) {
    v.innerHTML = '<div class="empty">Loading integration status…</div>';
    try {
      const [integ, projects, maps] = await Promise.all([
        sb("POST", "/rest/v1/rpc/admin_integration_status", {}),
        sb("GET", "/rest/v1/pms_projects?select=num:project->>projectNumber,name:project->>name,archived:project->>archived&order=id.asc&limit=1000"),
        sb("GET", "/rest/v1/pms_settyfy_map?select=*"),
      ]);
      state.integ = integ;
      state.integProjects = (projects || []).filter(p => p.num && p.archived !== "true");
      state.integMaps = {}; (maps || []).forEach(m => state.integMaps[m.project_number] = m);
    } catch (e) { v.innerHTML = `<div class="empty">Could not load: ${esc(e.message)}</div>`; return; }
  }
  const i = state.integ, mapped = Object.values(state.integMaps).filter(m => m.settyfy_id).length;
  const tok = i.feed_token || "";
  const f = state.integFilter.toLowerCase();
  const rows = state.integProjects.filter(p => !f || (p.num + " " + (p.name || "")).toLowerCase().includes(f));
  v.innerHTML = `
    <div class="card">
      <div style="color:var(--muted);font-size:12px;margin-bottom:6px">ENDPOINT A — PMS BILLING FEED (SETTYfy reads this; live now)</div>
      <div style="font-family:monospace;font-size:12px;word-break:break-all;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px">${esc(FEED_URL)}</div>
      <div class="row" style="margin-top:10px">

      <div style="color:var(--muted);font-size:12px;margin-top:6px">

          <td><input id="map_${esc(p.num)}" value="${esc(m.settyfy_id || "")}" placeholder="#…" style="width:110px"></td>

async function saveMap(num) {
  const val = $("map_" + num).value.trim();
  try {
    await sb("POST", "/rest/v1/pms_settyfy_map", {
      project_number: num, settyfy_id: val || null, updated_by: settyAuth.email(), updated_at: new Date().toISOString(),
    }, "resolution=merge-duplicates");
    state.integMaps[num] = { project_number: num, settyfy_id: val || null };
    toast(num + (val ? " → " + val : " mapping cleared"), "success"); render();
  } catch (e) { toast(e.message, "error"); }
}
async function rotateFeedToken() {
  if (!confirm("Rotate the feed token? SETTYfy (once connected) stops working until they get the new one.")) return;
  try {
    await sb("POST", "/rest/v1/rpc/admin_rotate_feed_token", {});
    state.integ = null; state.tokenShown = true; toast("Token rotated", "success"); render();
  } catch (e) { toast(e.message, "error"); }
}
async function testFeed() {
  state.feedTest = "testing…"; render();
  try {
    const r = await fetch(FEED_URL, { headers: { "Authorization": "Bearer " + (state.integ.feed_token || "") } });
    const d = await r.json();
    state.feedTest = r.ok ? `✓ ${d.projects.length} projects served, generated ${d.generatedAt}` : `✗ HTTP ${r.status}: ${JSON.stringify(d).slice(0, 120)}`;
  } catch (e) { state.feedTest = "✗ " + e.message; }
  render();
}

        <li><b>Documents &amp; templates:</b> project documents and the live "Templates for MCP Connector" SharePoint folder are read through a separate app-only Microsoft Graph app (client credentials, read-only Sites permission — the one admin-consented piece).</li>
        <li><b>Permission model:</b> shared service view — any authorized caller sees all PMS data (same as the PMS itself today). Read-only: there are no write tools.</li>
        <li><b>Deploys:</b> from the PMS-MCP folder via <code>supabase functions deploy --no-verify-jwt pms-mcp</code> (always pass the deno.json import map). The live version is the source of truth — pull it before editing.</li>
      </ul>
      <div class="sechead" style="margin-top:14px">The 18 tools</div>
      <table><thead><tr><th>Group</th><th>Tools</th></tr></thead><tbody>
        <tr><td>Projects</td><td><code>search_projects</code> · <code>get_project</code> · <code>firm_overview</code> · <code>list_milestones</code> · <code>list_action_items</code></td></tr>
        <tr><td>Emails</td><td><code>search_emails</code> · <code>read_email</code> · <code>summarize_project_emails</code></td></tr>
        <tr><td>Notes &amp; CA</td><td><code>search_notes</code> · <code>read_note</code> · <code>search_rfis_submittals</code> · <code>read_rfi_submittal</code> · <code>search_field_photos</code></td></tr>
        <tr><td>Documents</td><td><code>list_project_documents</code> · <code>read_document</code></td></tr>
        <tr><td>Templates</td><td><code>get_template</code> · <code>get_add_service_template</code> · <code>get_letterhead_template</code></td></tr>
      </tbody></table>
    </div>

    <div class="card doc">
      <div class="sechead">Authentication — two accepted credentials</div>
      <table><thead><tr><th>Mode</th><th>Who uses it</th><th>How</th></tr></thead><tbody>
        <tr><td><b>Microsoft sign-in (OAuth)</b></td><td>Everyone on claude.ai — the proper path</td>
            <td>The server answers unauthenticated calls with 401 + a <code>WWW-Authenticate</code> header pointing at its discovery metadata, which names the Setty Entra tenant as the authorization server. Claude walks that flow and each user signs in with their own Setty Microsoft account. Tokens are verified server-side (signature via tenant JWKS, issuer, audience, tenant).</td></tr>
        <tr><td><b>Shared secret (pilot)</b></td><td>Testing / Claude Code / API scripts</td>
            <td><code>Authorization: Bearer &lt;MCP_SHARED_SECRET&gt;</code> — the secret lives in Supabase function secrets, is never in any repo, and can be rotated with one command. claude.ai's connector UI cannot send custom headers, so this mode is for tooling only.</td></tr>
      </tbody></table>
      <ul style="margin-top:8px">
        <li><b>Entra app for the connector:</b> <code>${ENTRA_APP}</code>, exposing scope <code>api://${ENTRA_APP}/MCP.Access</code>.</li>
        <li><b>Accepted audiences:</b> <code>${ENTRA_APP}</code> or <code>api://${ENTRA_APP}</code>; tokens from any other tenant are rejected.</li>
      </ul>
    </div>

    <div class="card doc">
      <div class="sechead">Connecting it to enterprise Claude (the admin steps)</div>
      <ol>
        <li><b>Add the connector once, org-wide:</b> claude.ai → <b>Admin settings → Connectors → Add custom connector</b>. Name: <code>Setty PMS</code>. URL: the connector URL above (it must end in <code>/mcp</code> — no trailing slash, nothing after it).</li>
        <li><b>Give Claude the OAuth client:</b> Entra ID does <b>not</b> support automatic (dynamic) client registration, so open the connector's <b>Advanced settings</b> and enter OAuth Client ID <code>${ENTRA_APP}</code> plus the app's client secret (it lives in the Entra app registration — Sara/IT hold it; it's already proven valid by the working SharePoint document tools).</li>
        <li><b>Authorize Claude's callback in Entra:</b> app registration <code>${ENTRA_APP}</code> → Authentication. For <b>claude.ai in the browser</b>: redirect URI <code>https://claude.ai/api/mcp/auth_callback</code> under the <b>Web</b> platform. For <b>Claude Desktop / Claude Code</b>: they use a localhost loopback instead — add <code>http://localhost</code> and <code>http://127.0.0.1</code> under "Mobile and desktop applications" and set "Allow public client flows" to Yes. If sign-in fails with <b>AADSTS50011</b> (redirect mismatch), copy the exact URI out of that error into the registration.</li>
        <li><b>Consent (the usual blocker here):</b> this tenant disables user self-consent for <i>everything</i>, so users hit <b>AADSTS65001</b> until an admin consents. The <code>MCP.Access</code> delegated permission must appear under the app's <b>API permissions</b> list (not just "Expose an API") — then IT clicks <b>Grant admin consent for Setty</b> there. One click, tenant-wide, permanent.</li>
        <li><b>Users enable it:</b> each person turns the connector on under Settings → Connectors in claude.ai; the first use walks them through the Microsoft sign-in. After that they can just ask — "what's open on SAPX256001?" — and Claude uses the PMS tools.</li>
      </ol>
      <p style="font-size:12.5px"><b>If the org-level connector stays blocked</b> (only Claude org Owners can add connectors, and Desktop extension installs are org-gated too): the proven no-approval fallback is the <b>local server bridge</b> — a small Python stdio bridge wired into <code>claude_desktop_config.json</code>, the same pattern IT already uses for the SETTYAI tools. The ready-to-deploy folder is <code>dev/setty-pms-mcpb/local-server/</code> (server.py + config snippet + install notes); it talks to the same live endpoint with the pilot secret.</p>
      <p style="font-size:12.5px"><b>Testing outside claude.ai:</b> Claude Code can attach it with
        <code>claude mcp add --transport http setty-pms ${MCP_URL}</code> (add
        <code>--header "Authorization: Bearer &lt;secret&gt;"</code> to use the pilot secret), and the MCP Inspector
        (<code>npx @modelcontextprotocol/inspector</code>) can exercise every tool directly.</p>
    </div>

    <div class="card doc">
      <div class="sechead">Troubleshooting — work down this list</div>
      <table><thead><tr><th>Symptom</th><th>Check / fix</th></tr></thead><tbody>
        <tr><td>Is the server even up?</td><td>Open the <b>Live health check</b> above — {"ok":true} means yes. Anything else: check the function's logs in the Supabase dashboard.</td></tr>
        <tr><td>Connector won't add / OAuth never starts</td><td>Open the <b>OAuth discovery metadata</b> link — it must return JSON naming the Microsoft login server. Confirm the URL you registered ends exactly in <code>/mcp</code>.</td></tr>
        <tr><td>OAuth starts but Claude can't register itself</td><td>That's the Entra no-dynamic-registration limitation — paste the client ID into the connector's Advanced settings (step 2 above).</td></tr>
        <tr><td>Microsoft error <b>AADSTS50011</b> (redirect URI mismatch)</td><td>Add the exact callback URI from the error to app registration <code>${ENTRA_APP}</code>.</td></tr>
        <tr><td>Microsoft error <b>AADSTS65001 / 90094</b> (needs approval)</td><td>Admin consent hasn't been granted for <code>MCP.Access</code> — step 4 above. Expected on first setup: this tenant blocks all self-consent.</td></tr>
        <tr><td>Signed in, but every tool call returns Unauthorized</td><td>The token Claude got isn't for our API — verify the connector requests scope <code>api://${ENTRA_APP}/MCP.Access</code> (audience mismatch is rejected server-side), and that the account is in the Setty tenant.</td></tr>
        <tr><td>First question times out, second works</td><td>Cold start: the function loads the portfolio on first use, then caches for 5 minutes. A keep-warm job pings /health every 2 minutes, but the first call right after a deploy can still be slow — one retry is normal.</td></tr>
        <tr><td>Claude Desktop shows the connector "offline" intermittently</td><td>That's the local bridge, not the server (the server logs show calls completing in 1–2.5s). If the config uses <code>npx -y mcp-remote</code>, pin a known-good version (e.g. <code>mcp-remote@0.1.37</code>) so it stops re-downloading "latest" on every launch.</td></tr>
        <tr><td>A newly added tool doesn't show up</td><td>MCP clients cache the tool list at connect time — disconnect/reconnect the connector (or restart Desktop) after any server update.</td></tr>
        <tr><td>Everything worked, then stopped for everyone</td><td>Check whether the shared secret was rotated or the function was redeployed mid-conversation; re-try, then check Supabase function logs.</td></tr>
      </tbody></table>
      <p style="font-size:12px;color:var(--muted);margin-top:8px">Owners: Sara Arias &amp; Danny Kang. Server code lives in the PMS-MCP folder (OneDrive) — but always pull the live function before editing; the deployed version is ahead of disk.</p>
    </div>

    <div class="card doc">
      <div class="sechead">Best practices (IT &amp; whoever maintains this)</div>
      <ul>
        <li><b>Rollout timing:</b> the connector is <b>independent of the security-rollout phases</b> — it never touches the anon key or user database sessions (it has its own gate + a server-side key), so the Phase 4 RLS flip changes nothing for it. Connect it whenever IT is ready; the admin-consent step is usually the long pole, so start that early.</li>
        <li><b>Keep it read-only.</b> All writes go through the PMS apps, which handle versioning and conflict protection. Adding write tools to the connector is a deliberate architecture decision, not a tweak.</li>
        <li><b>Finalize before broad rollout:</b> because clients cache the tool list, add/settle new tools first, then have the team connect — otherwise everyone needs a reconnect to see them.</li>
        <li><b>Deploy discipline:</b> pull the live source before editing (disk copies drift stale — deploying one would regress features), keep <code>verify_jwt</code> off with the deno.json import map on every deploy, and hit <code>/health</code> afterward — a 200 proves it compiled and booted.</li>
        <li><b>Rotating the shared secret:</b> set a new <code>MCP_SHARED_SECRET</code> in Supabase function secrets — old callers cut off instantly. Then update wherever the secret is embedded (Desktop bridge configs / local-server install). The OAuth path is unaffected by rotation.</li>
        <li><b>New permissions need lead time:</b> any new Entra scope or Graph permission requires an IT admin-consent click (tenant policy) — plan it into the schedule rather than discovering it at rollout.</li>
        <li><b>Watch, don't guess:</b> Supabase dashboard → Edge Functions → pms-mcp → Logs shows every request with timing; the server has been measured healthy at ~1–2s warm, so persistent slowness reports usually point at the client bridge or a cold start, not the server.</li>
        <li><b>Data caveat everyone should know:</b> shared service view — any connected user can ask about <i>any</i> project (same as the PMS itself). If per-user or per-role visibility is ever needed, the Entra sign-in already identifies the user; scoping would build on the Phase 5 roles registry.</li>
      </ul>
    </div>`;
}

settyAuth.onChange(() => { state.roster = state.roles = state.backups = state.filing = null; render(); });
settyAuth.init().catch(e => toast("Sign-in: " + e.message, "error")).then(render);
