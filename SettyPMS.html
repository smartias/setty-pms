              onChange={e => setF(isRFI ? "dateResponded" : "dateReturned", e.target.value)}
              style={{ width: "100%" }} />
          </Field>

          {/* Response / Comments */}
          <Field label={isRFI ? "Response / Resolution" : "Review Comments"} style={{ gridColumn: "1 / -1" }}>
            <textarea value={isRFI ? (form.response || "") : (form.comments || "")}
              onChange={e => setF(isRFI ? "response" : "comments", e.target.value)}
              placeholder={isRFI ? "Formal response text…" : "Review comments to return with submittal…"}
              style={{ width: "100%", height: 90, resize: "vertical", fontSize: 13 }} />
          </Field>

          {/* Description (RFI detailed question) */}
          {isRFI && (
            <Field label="Full Question / Description" style={{ gridColumn: "1 / -1" }}>
              <textarea value={form.description || ""} onChange={e => setF("description", e.target.value)}
                placeholder="Full RFI question text…"
                style={{ width: "100%", height: 80, resize: "vertical", fontSize: 13 }} />
            </Field>
          )}

          {/* Notes */}
          <Field label="Internal Notes" style={{ gridColumn: "1 / -1" }}>
            <textarea value={form.notes || ""} onChange={e => setF("notes", e.target.value)}
              placeholder="Internal notes (not sent externally)…"
              style={{ width: "100%", height: 60, resize: "vertical", fontSize: 13 }} />
          </Field>

          {/* SharePoint folder */}
          <Field label="SharePoint Folder" style={{ gridColumn: "1 / -1" }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              {form.spFolderUrl ? (
                <>
                  <input value={form.spFolderUrl} readOnly style={{ flex: 1, fontSize: 11, color: P.textDim, background: "transparent" }} />
                  <a href={form.spFolderUrl} target="_blank" rel="noreferrer"
                    style={{ background: "#0078d4", color: "#fff", borderRadius: 6, padding: "5px 12px", fontSize: 12, fontWeight: 600, textDecoration: "none", whiteSpace: "nowrap" }}>
                    📁 Open
                  </a>
                </>
              ) : (
                <>
                  <span style={{ fontSize: 12, color: P.textDim, flex: 1 }}>
                    {spStatus === "creating" ? "⏳ Creating folder…" : spStatus === "done" ? "✓ Created" : typeof spStatus === "string" && spStatus.startsWith("error") ? "✗ " + spStatus.slice(7) : "No folder created yet"}
                  </span>
                  <Btn small variant="ghost" onClick={createSpFolder} disabled={spStatus === "creating"}>📁 Create SP Folder</Btn>
                </>
              )}
            </div>
          </Field>
        </div>

        {/* Action buttons */}
        <div style={{ marginTop: 20, borderTop: `1px solid ${P.border}`, paddingTop: 16, display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <Btn small variant="ghost" onClick={draftAssignEmail}>✉ Assign Email</Btn>
            {(subList.length > 0 || form.subAssigned) && (
              <Btn small variant="ghost" onClick={draftSubEmail}>✉ Forward to Sub</Btn>
            )}
            <Btn small variant="primary" onClick={draftResponseEmail}>
              ✉ {isRFI ? "Draft Response" : "Draft Return"}
            </Btn>
          </div>
          {emailMsg && (
            <span style={{ fontSize: 11, color: emailStatus === "done" ? P.green : P.red, fontWeight: 500 }}>{emailMsg}</span>
          )}
          <div style={{ display: "flex", gap: 8 }}>
            <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
            <Btn onClick={() => { onSave(form); onClose(); }}>Save</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

function RFIsView({ project, onChange, staff, clients }) {
  const rfis = project.rfis || [];
  const [editing, setEditing] = useState(null);
  const [filterStatus, setFilterStatus] = useState("All");
  const [filterDisc, setFilterDisc] = useState("All");
  const [search, setSearch] = useState("");

  function addRFI() {
    const r = newRFI(rfis, project.rfiDueDays || 5);
    onChange({ ...project, rfis: [...rfis, r] });
    setEditing(r);
  }

  function saveRFI(updated) {
    onChange({ ...project, rfis: rfis.map(r => r.id === updated.id ? updated : r) });
  }

  function deleteRFI(id) {
    const rfi = rfis.find(r => r.id === id);
    if (!window.confirm("Delete RFI " + (rfi?.number || "") + (rfi?.title ? " — \"" + rfi.title + "\"" : "") + "?\n\nAll notes, responses, and linked data will be lost. This cannot be undone.")) return;
    onChange({ ...project, rfis: rfis.filter(r => r.id !== id) });
  }

  const filtered = rfis.filter(r => {
    if (filterStatus !== "All" && r.status !== filterStatus) return false;
    if (filterDisc !== "All" && r.discipline !== filterDisc) return false;
    if (search && !((r.number + " " + r.title + " " + r.description + " " + r.from).toLowerCase().includes(search.toLowerCase()))) return false;
    return true;
  });

  const openCount     = rfis.filter(r => r.status === "Open").length;
  const overdueCount  = rfis.filter(r => isOverdue(r)).length;
  const pendingSubCnt = rfis.filter(r => r.status === "Pending Sub Response").length;
  const staffList     = project.teamMembers || [];

  return (
    <div>
      {/* Dashboard KPIs */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <KpiBox label="Total RFIs" val={String(rfis.length)} color={P.accentLight} />
        <KpiBox label="Open" val={String(openCount)} color={P.accentLight} />
        <KpiBox label="Overdue" val={String(overdueCount)} color={overdueCount > 0 ? P.red : P.green} />
        <KpiBox label="Pending Sub" val={String(pendingSubCnt)} color={pendingSubCnt > 0 ? P.yellow : P.textDim} />
        <KpiBox label="Closed" val={String(rfis.filter(r => r.status === "Closed").length)} color={P.green} />
      </div>

      {/* Controls */}
      <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search RFIs…" style={{ width: 200, fontSize: 13 }} />
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ fontSize: 13 }}>
          <option value="All">All Statuses</option>
          {RFI_STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        <select value={filterDisc} onChange={e => setFilterDisc(e.target.value)} style={{ fontSize: 13 }}>
          <option value="All">All Disciplines</option>
          {RFI_DISCIPLINES.map(d => <option key={d}>{d}</option>)}
        </select>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <Btn small onClick={addRFI}>+ Add RFI</Btn>
        </div>
      </div>

      {/* Table */}
      {filtered.length === 0 ? (
        <div style={{ color: P.textDim, fontSize: 13, padding: "20px 0" }}>
          {rfis.length === 0 ? "No RFIs logged yet. Click \"+ Add RFI\" to create one." : "No RFIs match the current filters."}
        </div>
      ) : (
        <table>
          <thead>
            <tr>
              <th style={{ width: 80 }}>#</th>
              <th>Title</th>
              <th>Discipline</th>
              <th>From</th>
              <th>Assigned</th>
              <th>Received</th>
              <th>Due</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(r => {
              const overdue = isOverdue(r);
              const sc = RFI_STATUS_COLORS[r.status] || {};
              const assigneeNames = (r.assignedTo || []).map(id => {
                const s = staffList.find(x => x.id === id);

              return (
                <tr key={r.id} style={{ background: overdue ? "rgba(239,68,68,.06)" : "transparent" }}>

                  </td>
                  <td style={{ fontSize: 12 }}>{r.discipline}</td>
                  <td style={{ fontSize: 12, color: P.textMuted }}>{r.from || "—"}</td>
                  <td style={{ fontSize: 12 }}>

                  <td style={{ fontSize: 12, whiteSpace: "nowrap", color: overdue ? P.red : P.textMuted, fontWeight: overdue ? 700 : 400 }}>

      {editing && (
        <RFIDetailModal

              <th>Received</th>
              <th>Due</th>
              <th>Stamp</th>

          <tbody>
            {filtered.map(s => {

              const assigneeNames = (s.assignedTo || []).map(id => {

      {editing && (

          project={project}
          staff={staff}
          clients={clients}
          type="submittal"
          onSave={saveSubmittal}

function ChangeOrdersView({ project, onChange }) {
  const cos = project.changeOrders || [];
  const [emailingId, setEmailingId] = React.useState(null);
  const [emailMsgs, setEmailMsgs] = React.useState({});
  const [expandedScope, setExpandedScope] = React.useState(null); // coId with open editor

  function setCoMsg(id, status, msg) {
    setEmailMsgs(prev => ({ ...prev, [id]: { status, msg } }));
    if (status === "done") setTimeout(() => setEmailMsgs(prev => { const n = {...prev}; delete n[id]; return n; }), 5000);
  }

  function addCO() {
    const newId = uid();
    onChange({
      ...project,
      changeOrders: [...cos, {
        id: newId, number: `CO-${cos.length + 1}`, name: "", scope: "",
        fee: 0,  // derived: sum of milestones
        milestones: [{ id: uid(), name: "", fee: 0, dueDate: new Date().toISOString().slice(0, 10) }],
        sentToClient: false, approved: false,
        date: new Date().toISOString().slice(0, 10), notes: "",
      }],
    });
  }

  function updateCO(id, updates) {
    // Auto-stamp dateSent when sentToClient is first set to true
    if (updates.sentToClient === true) {
      const existing = cos.find(c => c.id === id);
      if (existing && !existing.sentToClient && !updates.dateSent) {
        updates = { ...updates, dateSent: localDateStr(new Date()) };
      }
    }
    const newCOs = cos.map(c => c.id === id ? { ...c, ...updates } : c);
    const co = newCOs.find(c => c.id === id);
    let milestones = project.milestones || [];

    if (co?.approved) {
      // Remove old milestones for this CO
      const existing = milestones.filter(m => m.coId === id);
      const coMilestones = co.milestones && co.milestones.length > 0
        ? co.milestones
        : [{ id: uid(), name: co.name || co.number, fee: co.fee || 0, dueDate: co.date }];
      // Build updated schedule milestones from CO milestones
      const newSchedMilestones = coMilestones.map(cm => {
        const existingM = existing.find(m => m.coMilestoneId === cm.id);
        return existingM
          ? { ...existingM, name: `CO: ${co.name || co.number} — ${cm.name || "Milestone"}`, fee: cm.fee || 0, dueDate: cm.dueDate || co.date }
          : { id: uid(), coId: id, coMilestoneId: cm.id, type: "billable", phase: "__CO__",
              name: `CO: ${co.name || co.number}${cm.name ? " — " + cm.name : ""}`,
              fee: cm.fee || 0, startDate: co.date, dueDate: cm.dueDate || co.date,
              pctComplete: 0, status: "Not Started", notes: co.notes || "" };
      });
      milestones = [...milestones.filter(m => m.coId !== id), ...newSchedMilestones];
    } else {
      milestones = milestones.filter(m => m.coId !== id);
    }

    onChange({ ...project, changeOrders: newCOs, milestones });
  }

  const approvedTotal = cos.filter(c => c.approved).reduce((a, c) => {
    if (c.milestones && c.milestones.length > 0) return a + c.milestones.reduce((s, m) => s + (+m.fee || 0), 0);
    return a + (+c.fee || 0);
  }, 0);

  async function emailCO(co) {
    setEmailingId(co.id);
    setCoMsg(co.id, "sending", "");
    const statusLabel = co.approved ? "✓ Approved" : co.sentToClient ? "Sent to Client — Pending Approval" : "Pending";
    const statusColor = co.approved ? "#16a34a" : co.sentToClient ? "#2563eb" : "#ca8a04";

    const bodyHtml = `
<div style="font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:#1a1a1a;max-width:700px;">
  <div style="border-bottom:3px solid #1F3864;padding-bottom:12px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end;">
    <div>
      <div style="font-size:24px;font-weight:900;color:#C00000;letter-spacing:2px;line-height:1;">SETTY</div>

const WBS_HOURLY_RATE = 170;
const DISC_COLORS = {

// Get Monday of the week containing a date
function localDateStr(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function weekMonday(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return localDateStr(d);
}

function addCalDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return localDateStr(d);
}

// Count business days within [weekStart, weekStart+4] that overlap [phaseStart, phaseEnd]
function bizDaysOverlap(weekStart, phaseStart, phaseEnd) {
  let count = 0;
  for (let i = 0; i < 5; i++) {
    const d = addCalDays(weekStart, i);
    if (d >= phaseStart && d <= phaseEnd) count++;
  }
  return count;
}

function TeamView({ project, onChange, staff, onAddStaff }) {
  const team = project.teamMembers || [];
  const [showWBS, setShowWBS] = useState(false);
  const [typeaheadOpen, setTypeaheadOpen] = useState(null); // memberId with open dropdown
  const [staffModalFor, setStaffModalFor] = useState(null); // memberId to add staff for

  function addMember() {
    onChange({ ...project, teamMembers: [...team, { id: uid(), name: "", role: "Engineer", disciplines: [], rate: 0 }] });
  }

  function pickFromDirectory(memberId, s) {
    const existing = team.find(m => m.id === memberId);
    // Preserve the row's role if it's PM or DPM — those slots are fixed by position,
    // not by whatever role the person holds in the staff directory
    const protectedRoles = ["Project Manager", "Deputy Project Manager"];
    const role = protectedRoles.includes(existing?.role) ? existing.role : (s.role || "Engineer");
    updateMember(memberId, {
      name: s.name,
      role,
      rate: s.rate || 0,
      disciplines: s.disciplines || [],
      email: s.email || "",
    });
    setTypeaheadOpen(null);
  }

  function updateMember(id, updates) {
    const newTeam = team.map(m => m.id === id ? { ...m, ...updates } : m);
    // Keep projectManager / deputyProjectManager in sync with team name fields
    const pmMember  = newTeam.find(m => m.role === "Project Manager");
    const dpmMember = newTeam.find(m => m.role === "Deputy Project Manager");
    onChange({
      ...project,
      teamMembers: newTeam,
      projectManager: pmMember?.name || project.projectManager || "",
      deputyProjectManager: dpmMember?.name || project.deputyProjectManager || "",
    });
  }

  function toggleDisc(memberId, disc) {
    const m = team.find(x => x.id === memberId);
    if (!m) return;
    const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
    const next = discs.includes(disc) ? discs.filter(d => d !== disc) : [...discs, disc];
    updateMember(memberId, { disciplines: next, discipline: next[0] || "" });
  }

  // ── Budget calculations ──
  const constructionCost = calcConstructionCost(project.squareFootage, project.buildingCategory, project.manualConstructionCost, project.manualRSMeansCostPerSF);
  const settyFee = project.manualSettyFee > 0 ? project.manualSettyFee : calcSettyFee(constructionCost, project);
  const totalHours  = Math.round(settyFee / WBS_HOURLY_RATE);
  const pmHours     = Math.round(totalHours * 0.08);
  const dpmHours    = Math.round(totalHours * 0.02);
  const discHours   = totalHours - pmHours - dpmHours;
  const effectiveDiscs = getEffectiveDisciplines(project);
  const discTotal   = Object.values(effectiveDiscs).reduce((a, b) => a + b, 0) || 1;

  const discBudgetHours = {};
  WBS_DISCIPLINES.forEach(d => {
    discBudgetHours[d] = Math.round(discHours * ((effectiveDiscs[d] || 0) / discTotal));
  });

  // ── Phase data ──
  const billablePhases = (project.phases || []).filter(p => p.billable && p.fee > 0 && p.startDate && p.endDate);
  const totalFee = billablePhases.reduce((a, p) => a + (p.fee || 0), 0) || 1;
  const today = new Date();
  const todayStr = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");

  const phaseMeta = Object.fromEntries(billablePhases.map(ph => {
    const totalWD    = Math.max(1, countWorkDays(ph.startDate, ph.endDate));
    const totalWeeks = Math.max(1, Math.round(totalWD / 5));
    const actualPct  = getPhasePctFromMilestones(ph, project.milestones || []);
    const sd = new Date(ph.startDate + "T00:00:00");
    const ed = new Date(ph.endDate   + "T00:00:00");
    let status = today < sd ? "future" : today >= ed ? (actualPct >= 100 ? "complete" : "overdue") : "active";
    const elapsed    = status === "active" ? countWorkDays(ph.startDate, todayStr) : (status === "future" ? 0 : totalWD);
    const remainWD   = Math.max(0, totalWD - elapsed);
    const remainWeeks = Math.max(1, Math.round(remainWD / 5));
    return [ph.id, { totalWD, totalWeeks, actualPct, status, remainWD, remainWeeks }];
  }));

  // ── Build staff rows ──
  // Each staff member gets a total budget = sum of their per-discipline allocations
  // For multi-disc staff, hours are distributed proportionally then summed
  const staffRows = [];
  const pm  = team.find(m => m.role === "Project Manager");
  const dpm = team.find(m => m.role === "Deputy Project Manager");

  if (pm)  staffRows.push({ member: pm,  isPM: true,  role: "PM",  totalBudget: pmHours });
  if (dpm) staffRows.push({ member: dpm, isPM: true,  role: "DPM", totalBudget: dpmHours });

  // Non-PM staff: budget = sum across their disciplines, split equally among staff in that disc
  const discStaffCount = {};
  WBS_DISCIPLINES.forEach(disc => {
    discStaffCount[disc] = team.filter(m => {
      const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
      return discs.includes(disc);
    }).length || 1;
  });

  team.filter(m => m.role !== "Project Manager" && m.role !== "Deputy Project Manager").forEach(m => {
    const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
    let totalBudget = 0;
    const discBreakdown = {};
    discs.forEach(d => {
      const share = Math.round((discBudgetHours[d] || 0) / discStaffCount[d]);
      discBreakdown[d] = share;
      totalBudget += share;
    });
    staffRows.push({ member: m, isPM: false, discs, discBreakdown, totalBudget });
  });

  // Unassigned disciplines (no staff assigned)
  WBS_DISCIPLINES.forEach(disc => {
    const assigned = team.filter(m => {
      const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
      return discs.includes(disc) && m.role !== "Project Manager" && m.role !== "Deputy Project Manager";
    });
    if (assigned.length === 0) {
      staffRows.push({ member: null, isPM: false, discs: [disc], discBreakdown: { [disc]: discBudgetHours[disc] || 0 }, totalBudget: discBudgetHours[disc] || 0, unassigned: true });
    }
  });

  // ── Build weekly schedule ──
  // Get all project weeks from first phase start to last phase end
  const allWeeks = useMemo(() => {
    if (billablePhases.length === 0) return [];
    const starts = billablePhases.map(p => p.startDate).sort();
    const ends   = billablePhases.map(p => p.endDate).sort();
    let cur = weekMonday(starts[0]);
    const last = weekMonday(ends[ends.length - 1]);
    const weeks = [];
    while (cur <= last) {
      weeks.push(cur);
      cur = addCalDays(cur, 7);
    }
    return weeks;
  }, [billablePhases]);

  // For each staff row × week: compute hours
  // Hours per week = sum over phases of: (phase budget for this person) × (biz days overlap / phase total biz days)
  function staffWeekHours(row, weekStart) {
    if (!row.totalBudget) return { total: 0, byDisc: {}, byPhase: [] };
    const byDisc = {};
    let total = 0;
    const byPhase = [];
    billablePhases.forEach(ph => {
      const meta = phaseMeta[ph.id];
      const overlap = bizDaysOverlap(weekStart, ph.startDate, ph.endDate);
      if (!overlap) return;
      const phBudget = row.isPM
        ? Math.round(row.totalBudget * ((ph.fee || 0) / totalFee))
        : Object.entries(row.discBreakdown || {}).reduce((a, [d, hrs]) => {
            return a + Math.round(hrs * ((ph.fee || 0) / totalFee));
          }, 0);
      const hrs = Math.round(phBudget * (overlap / meta.totalWD));
      total += hrs;
      byPhase.push({ ph, hrs, meta });
      if (!row.isPM) {
        Object.keys(row.discBreakdown || {}).forEach(d => {
          const dHrs = Math.round(Math.round((row.discBreakdown[d] || 0) * ((ph.fee || 0) / totalFee)) * (overlap / meta.totalWD));
          byDisc[d] = (byDisc[d] || 0) + dHrs;
        });
      }
    });
    return { total, byDisc, byPhase };
  }

  // Which phase(s) are active in a given week
  function weekPhase(weekStart) {
    const weekEnd = addCalDays(weekStart, 4);
    return billablePhases.filter(ph => ph.startDate <= weekEnd && ph.endDate >= weekStart);
  }

  // Is this week in the past / current / future
  function weekStatus(weekStart) {
    const weekEnd = addCalDays(weekStart, 4);
    if (weekEnd < todayStr) return "past";
    if (weekStart <= todayStr) return "current";
    return "future";
  }

  return (
    <div>
      <SectionTitle action={<Btn small onClick={addMember} variant="ghost">+ Add Team Member</Btn>}>
        Team Members
      </SectionTitle>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 14 }}>
        Assign disciplines to generate a weekly Work Breakdown Structure. Staff can be assigned to multiple disciplines.
      </div>
      <table style={{ marginBottom: 24 }}>
        <thead><tr><th>Name</th><th>Role / Title</th><th>QA/QC</th><th>Disciplines</th><th>Billing Rate ($/hr)</th><th></th></tr></thead>
        <tbody>
          {team.map(m => {
            const isPM = m.role === "Project Manager" || m.role === "Deputy Project Manager";
            const memberDiscs = m.disciplines || (m.discipline ? [m.discipline] : []);
            return (
              <tr key={m.id}>
                <td style={{ position: "relative" }}>
                  <input
                    value={m.name}
                    onChange={e => {
                      updateMember(m.id, { name: e.target.value });
                      setTypeaheadOpen(m.id);
                    }}
                    onFocus={() => setTypeaheadOpen(m.id)}
                    onBlur={() => setTimeout(() => setTypeaheadOpen(null), 150)}
                    style={{ width: 180 }}
                    placeholder="Type to search staff…"
                  />
                  {typeaheadOpen === m.id && (() => {
                    const q = (m.name || "").toLowerCase();
                    const matches = (staff || []).filter(s =>
                      !q || s.name.toLowerCase().includes(q) || (s.email || "").toLowerCase().includes(q)
                    ).slice(0, 8);
                    const showAdd = onAddStaff && q.length > 0;
                    if (!matches.length && !showAdd) return null;
                    return (
                      <div style={{ position: "absolute", top: "100%", left: 0, zIndex: 200, background: P.card, border: "1px solid " + P.accent, borderRadius: 8, width: 240, boxShadow: "0 4px 16px rgba(0,0,0,.4)", overflow: "hidden" }}>
                        {matches.map(s => (
                          <div key={s.id}
                            onMouseDown={() => pickFromDirectory(m.id, s)}
                            style={{ padding: "8px 12px", cursor: "pointer", borderBottom: "1px solid " + P.border }}
                            onMouseOver={e => e.currentTarget.style.background = P.accentDim}
                            onMouseOut={e => e.currentTarget.style.background = "transparent"}>
                            <div style={{ fontWeight: 600, fontSize: 13 }}>{s.name}</div>
                            <div style={{ fontSize: 11, color: P.textDim }}>{s.role || ""}{s.email ? " · " + s.email : ""}</div>
                          </div>
                        ))}
                        {showAdd && (
                          <div onMouseDown={() => { setStaffModalFor(m.id); setTypeaheadOpen(null); }}
                            style={{ padding: "9px 12px", cursor: "pointer", borderTop: matches.length > 0 ? "1px solid " + P.border : "none",
                              background: P.accentDim, display: "flex", alignItems: "center", gap: 8 }}
                            onMouseOver={e => e.currentTarget.style.opacity = ".8"}
                            onMouseOut={e => e.currentTarget.style.opacity = "1"}>
                            <span style={{ fontSize: 15, color: P.accentLight }}>+</span>
                            <div>
                              <div style={{ fontSize: 12, fontWeight: 700, color: P.accentLight }}>Add "{m.name}" to directory</div>
                              <div style={{ fontSize: 11, color: P.textDim }}>Create new staff member and select</div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })()}
                  {staffModalFor === m.id && (
                    <QuickAddStaffModal
                      prefill={m.name}
                      onSave={s => {
                        onAddStaff(s);
                        pickFromDirectory(m.id, s);
                        setStaffModalFor(null);
                      }}
                      onClose={() => setStaffModalFor(null)}
                    />
                  )}
                </td>
                <td>
                  {isPM
                    ? <Badge color={{ bg: P.accentDim, text: P.accentLight }} text={m.role} />
                    : <input value={m.role} onChange={e => updateMember(m.id, { role: e.target.value })} style={{ width: 140 }} placeholder="e.g. Engineer…" />
                  }
                </td>
                <td style={{ textAlign: "center" }}>
                  {!isPM && (
                    <label style={{ cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
                      <input type="checkbox" checked={m.isQAQC || false}
                        onChange={e => updateMember(m.id, { isQAQC: e.target.checked })}
                        style={{ width: 15, height: 15, cursor: "pointer", accentColor: P.purple }} />
                      {m.isQAQC && <span style={{ fontSize: 10, color: P.purple, fontWeight: 700 }}>QA/QC</span>}
                    </label>
                  )}
                </td>
                <td>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {!m.isQAQC ? WBS_DISCIPLINES.map(d => {
                      const on = memberDiscs.includes(d);
                      const dc = DISC_COLORS[d];
                      return (
                        <button key={d} onClick={() => toggleDisc(m.id, d)}
                          style={{ fontSize: 11, fontWeight: 600, padding: "3px 8px", borderRadius: 8, cursor: "pointer",
                            background: on ? dc.bg : "transparent",
                            color: on ? dc.text : P.textDim,
                            border: `1px solid ${on ? dc.text : P.border}` }}>
                          {d}
                        </button>
                      );
                    }) : <span style={{ fontSize: 11, color: P.textDim, fontStyle: "italic" }}>Not on WBS</span>}
                  </div>
                </td>
                <td><input type="number" value={m.rate} onChange={e => updateMember(m.id, { rate: +e.target.value })} style={{ width: 100 }} /></td>
                <td>
                  {!isPM
                    ? <Btn small variant="danger" onClick={() => { if (window.confirm("Remove " + (m.name || "this person") + " from the project team?\n\nThis will remove their hours from the WBS view. Any RFIs or Submittals assigned to them will remain but show as unassigned.")) onChange({ ...project, teamMembers: team.filter(x => x.id !== m.id) }); }}>✕</Btn>
                    : null
                  }
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* ── WBS Section ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <SectionTitle>Weekly Work Breakdown Structure</SectionTitle>
        <Btn small variant="ghost" onClick={() => setShowWBS(v => !v)}>{showWBS ? "▲ Hide" : "▼ Show"} WBS</Btn>
      </div>

      {showWBS && (
        <div>
          {/* Budget summary chips */}
          <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
            {[
              { label: "SETTY FEE", val: fmt(settyFee), sub: null, color: P.accent },
              { label: "TOTAL HRS", val: totalHours + " hrs", sub: `@ $${WBS_HOURLY_RATE}/hr`, color: P.accent },
              { label: "PM (8%)", val: pmHours + " hrs", sub: null, color: P.accentLight },
              { label: "DPM (2%)", val: dpmHours + " hrs", sub: null, color: P.accentLight },
            ].map(c => (
              <div key={c.label} style={{ background: P.accentDim, border: `1px solid ${c.color}`, borderRadius: 8, padding: "10px 16px", minWidth: 120 }}>
                <div style={{ fontSize: 10, color: P.textDim, marginBottom: 2 }}>{c.label}</div>
                <div style={{ fontWeight: 700, color: c.color, fontFamily: "JetBrains Mono" }}>{c.val}</div>
                {c.sub && <div style={{ fontSize: 10, color: P.textDim }}>{c.sub}</div>}
              </div>
            ))}
            {WBS_DISCIPLINES.map(d => {
              const dc = DISC_COLORS[d];
              const cnt = discStaffCount[d];
              return (
                <div key={d} style={{ background: dc.bg, border: `1px solid ${dc.text}`, borderRadius: 8, padding: "10px 16px", minWidth: 120 }}>
                  <div style={{ fontSize: 10, color: P.textDim, marginBottom: 2 }}>{d.toUpperCase()}</div>
                  <div style={{ fontWeight: 700, color: dc.text, fontFamily: "JetBrains Mono" }}>{discBudgetHours[d] || 0} hrs</div>
                  <div style={{ fontSize: 10, color: P.textDim }}>{cnt} staff · {Math.round((discBudgetHours[d] || 0) / cnt)}/ea</div>
                </div>
              );
            })}
          </div>

          {billablePhases.length === 0 ? (
            <div style={{ color: P.textDim, fontSize: 13, padding: 16, background: P.bg, borderRadius: 8 }}>
              ⚠ No billable phases with schedule dates. Finalize the fee schedule first.
            </div>
          ) : (
            <div style={{ overflowX: "auto" }}>
              <table>
                <thead>
                  <tr>
                    <th style={{ minWidth: 100, position: "sticky", left: 0, background: P.card, zIndex: 2 }}>Week Of</th>
                    <th style={{ minWidth: 80 }}>Phase</th>
                    {staffRows.map((row, i) => (
                      <th key={i} style={{ minWidth: 90, textAlign: "center" }}>
                        <div style={{ fontWeight: 700 }}>{row.unassigned ? "Unassigned" : (row.member?.name || "TBD")}</div>
                        <div style={{ fontSize: 10, color: P.textDim, fontWeight: 400 }}>
                          {row.isPM ? row.role : (row.discs || []).map(d => (
                            <span key={d} style={{ color: DISC_COLORS[d]?.text || P.textMuted, marginRight: 3, fontSize: 10 }}>{d.split(" ")[0]}</span>
                          ))}
                        </div>
                        <div style={{ fontSize: 10, color: P.accentLight, fontWeight: 400 }}>{row.totalBudget} hrs total</div>
                      </th>
                    ))}
                    <th style={{ minWidth: 80, textAlign: "center" }}>Team Total</th>
                  </tr>
                </thead>
                <tbody>
                  {allWeeks.map((weekStart, wi) => {
                    const wkStatus = weekStatus(weekStart);
                    const phases   = weekPhase(weekStart);
                    const phaseLabel = phases.map(p => p.code || p.name.slice(0, 4)).join("/");
                    const rowBg = wkStatus === "current" ? "#1a2500" : wkStatus === "past" ? P.bg : "transparent";
                    const rowBorder = wkStatus === "current" ? `1px solid ${P.green}` : "none";
                    let teamTotal = 0;
                    const cellData = staffRows.map(row => {
                      const { total, byDisc } = staffWeekHours(row, weekStart);
                      teamTotal += total;
                      return { total, byDisc };
                    });
                    if (teamTotal === 0 && wkStatus === "past") return null;
                    return (
                      <tr key={weekStart} style={{ background: rowBg, outline: rowBorder }}>
                        <td style={{ position: "sticky", left: 0, background: rowBg || P.card, fontFamily: "JetBrains Mono", fontSize: 12, fontWeight: wkStatus === "current" ? 700 : 400, color: wkStatus === "current" ? P.green : wkStatus === "past" ? P.textDim : P.text, zIndex: 1 }}>
                          {weekStart}
                          {wkStatus === "current" && <div style={{ fontSize: 10, color: P.green }}>← NOW</div>}
                        </td>
                        <td style={{ fontSize: 11 }}>
                          {phases.map(ph => {
                            const meta = phaseMeta[ph.id];
                            const sc = meta.status === "complete" ? P.green : meta.status === "overdue" ? P.red : meta.status === "active" ? P.accentLight : P.textMuted;
                            return <div key={ph.id} style={{ color: sc, fontWeight: 600 }}>{ph.code || ph.name.slice(0,4)}</div>;
                          })}
                        </td>
                        {cellData.map((cell, ci) => {
                          const row = staffRows[ci];
                          // Check if this week is behind schedule for any active phase
                          const activePhases = phases.filter(ph => phaseMeta[ph.id]?.status === "active");
                          const isBehind = activePhases.some(ph => {
                            const meta = phaseMeta[ph.id];
                            const phBudget = row.isPM
                              ? Math.round(row.totalBudget * ((ph.fee || 0) / totalFee))
                              : Object.values(row.discBreakdown || {}).reduce((a, hrs) => a + Math.round(hrs * ((ph.fee || 0) / totalFee)), 0);
                            const plannedWk = meta.totalWeeks > 0 ? phBudget / meta.totalWeeks : 0;
                            return cell.total > 0 && cell.total > plannedWk * 1.2;
                          });
                          return (
                            <td key={ci} style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontSize: 13,
                              color: cell.total === 0 ? P.textDim : isBehind ? P.yellow : wkStatus === "past" ? P.textDim : P.text,
                              fontWeight: wkStatus === "current" ? 700 : 400 }}>
                              {cell.total > 0 ? (
                                <div>
                                  <div>{cell.total} h</div>
                                  {Object.keys(cell.byDisc).length > 1 && (
                                    <div style={{ fontSize: 9, color: P.textDim, lineHeight: 1.4 }}>
                                      {Object.entries(cell.byDisc).map(([d, h]) => h > 0 ? (
                                        <span key={d} style={{ color: DISC_COLORS[d]?.text, marginRight: 3 }}>{d.slice(0,1)}:{h}</span>
                                      ) : null)}
                                    </div>
                                  )}
                                </div>
                              ) : <span style={{ color: P.border }}>—</span>}
                            </td>
                          );
                        })}
                        <td style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700, color: wkStatus === "current" ? P.green : wkStatus === "past" ? P.textDim : P.accentLight }}>
                          {teamTotal > 0 ? teamTotal + " h" : <span style={{ color: P.border }}>—</span>}
                        </td>
                      </tr>
                    );
                  })}
                  {/* Totals row */}
                  <tr style={{ borderTop: `2px solid ${P.border}`, background: P.bg }}>
                    <td colSpan={2} style={{ fontWeight: 700 }}>TOTAL</td>
                    {staffRows.map((row, i) => (
                      <td key={i} style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>{row.totalBudget} h</td>
                    ))}
                    <td style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>{totalHours} h</td>
                  </tr>
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


// ─── TEAM WBS VIEW (cross-project) ───────────────────────────────────────────

function TeamWBSView({ projects, onNavigateToProject }) {
  const today = new Date();
  const todayStr = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");

  // Only active awarded projects with team + phases
  const activeProjects = projects.filter(p =>
    !p.archived && isAwarded(p) &&
    p.status !== "Completed" && p.status !== "Cancelled" && p.status !== "Lost" &&
    (p.teamMembers || []).length > 0 &&
    (p.phases || []).some(ph => ph.billable && ph.fee > 0 && ph.startDate && ph.endDate)
  );

  // Build a unified staff registry: key = name (lowercased) → { name, projects: [...] }
  // Staff with same name across projects are merged into one column
  const staffMap = {}; // normalizedName → { displayName, entries: [{ project, member, ... }] }

  activeProjects.forEach(proj => {
    const constructionCost = calcConstructionCost(proj.squareFootage, proj.buildingCategory, proj.manualConstructionCost, proj.manualRSMeansCostPerSF);
    const settyFee    = proj.manualSettyFee > 0 ? proj.manualSettyFee : calcSettyFee(constructionCost, proj);
    const totalHours  = Math.round(settyFee / WBS_HOURLY_RATE);
    const pmHours     = Math.round(totalHours * 0.08);
    const dpmHours    = Math.round(totalHours * 0.02);
    const discHours   = totalHours - pmHours - dpmHours;
    const effectiveDiscs = getEffectiveDisciplines(proj);
    const discTotal   = Object.values(effectiveDiscs).reduce((a, b) => a + b, 0) || 1;
    const discBudget  = {};
    WBS_DISCIPLINES.forEach(d => { discBudget[d] = Math.round(discHours * ((effectiveDiscs[d] || 0) / discTotal)); });

    const billablePhases = (proj.phases || []).filter(p => p.billable && p.fee > 0 && p.startDate && p.endDate);
    const totalFee = billablePhases.reduce((a, p) => a + (p.fee || 0), 0) || 1;

    // Phase meta
    const phaseMeta = {};
    billablePhases.forEach(ph => {
      const totalWD = Math.max(1, countWorkDays(ph.startDate, ph.endDate));
      const pct = getPhasePctFromMilestones(ph, proj.milestones || []);
      phaseMeta[ph.id] = { totalWD, fee: ph.fee || 0, pctComplete: pct };
    });

    // Disc staff count for splitting — include anyone with that discipline regardless of PM role
    const discStaffCount = {};
    WBS_DISCIPLINES.forEach(disc => {
      discStaffCount[disc] = Math.max(1, (proj.teamMembers || []).filter(m => {
        const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
        return discs.includes(disc);
      }).length);
    });

    (proj.teamMembers || []).forEach(m => {
      const nameKey = (m.name || "TBD").toLowerCase().trim() || m.id;
      const displayName = m.name || "TBD";
      const isPM = m.role === "Project Manager" || m.role === "Deputy Project Manager";
      const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
      const hasDiscs = discs.length > 0;

      // Build discipline breakdown (applies whether PM or not)
      const discBreakdown = {};
      if (hasDiscs) {
        discs.forEach(d => { discBreakdown[d] = Math.round((discBudget[d] || 0) / discStaffCount[d]); });
      }
      const discHoursForMember = Object.values(discBreakdown).reduce((a, v) => a + v, 0);

      // PM hours + any discipline hours they're also covering
      const pmBase = isPM ? (m.role === "Project Manager" ? pmHours : dpmHours) : 0;
      const memberBudget = pmBase + (hasDiscs ? discHoursForMember : 0);

      if (!staffMap[nameKey]) staffMap[nameKey] = { displayName, entries: [] };
      staffMap[nameKey].entries.push({
        project: proj, member: m, isPM, memberBudget,
        billablePhases, phaseMeta, totalFee,
        pmHoursForEntry: pmBase,
        discBreakdown,
      });
    });
  });

  const staffCols = Object.values(staffMap);

  // Compute weekly hours for a staff entry in a given week
  function entryWeekHours(entry, weekStart) {
    let total = 0;
    entry.billablePhases.forEach(ph => {
      const meta = entry.phaseMeta[ph.id];
      const overlap = bizDaysOverlap(weekStart, ph.startDate, ph.endDate);
      if (!overlap || !meta) return;
      const phaseFrac = (ph.fee || 0) / entry.totalFee;
      // Remaining work fraction — clamp 0–1
      const remaining = Math.max(0, Math.min(1, 1 - (meta.pctComplete || 0) / 100));
      const pmContrib = entry.pmHoursForEntry > 0
        ? Math.round(entry.pmHoursForEntry * phaseFrac * remaining * (overlap / meta.totalWD))
        : 0;
      const discContrib = Object.values(entry.discBreakdown).reduce((a, hrs) =>
        a + Math.round(hrs * phaseFrac * remaining * (overlap / meta.totalWD)), 0);
      total += pmContrib + discContrib;
    });
    return total;
  }

  // Determine all weeks across all active projects
  const allWeeks = useMemo(() => {
    const allEnds = activeProjects.flatMap(p => (p.phases || []).filter(ph => ph.billable && ph.endDate).map(ph => ph.endDate));
    if (!allEnds.length) return [];
    allEnds.sort();
    // Start from current week, go through last project end
    let cur  = todayStr;
    cur = weekMonday(cur);
    const last = weekMonday(allEnds[allEnds.length - 1]);
    if (cur > last) return [];
    const weeks = [];
    while (cur <= last) { weeks.push(cur); cur = addCalDays(cur, 7); }
    return weeks;
  }, [activeProjects, todayStr]);

  // Which projects are active in a given week
  function weekProjects(weekStart) {
    const weekEnd = addCalDays(weekStart, 4);
    return activeProjects.filter(p =>
      (p.phases || []).some(ph => ph.billable && ph.startDate && ph.endDate && ph.startDate <= weekEnd && ph.endDate >= weekStart)
    );
  }

  function wkStatus(weekStart) {
    const weekEnd = addCalDays(weekStart, 4);
    if (weekEnd < todayStr) return "past";
    if (weekStart <= todayStr) return "current";
    return "future";
  }

  const [filterStaff, setFilterStaff] = useState("");

  const visibleCols = staffCols.filter(col =>
    !filterStaff || col.displayName.toLowerCase().includes(filterStaff.toLowerCase())
  );

  if (activeProjects.length === 0) return (
    <div style={{ padding: "24px 32px", color: P.textDim }}>No active projects with team members and schedule data.</div>
  );

  return (
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 22, fontWeight: 800 }}>Team WBS — All Projects</div>
          <Btn small variant="ghost" onClick={() => {
            // Build CSV: one row per staff member per project
            const headers = ["Staff Member", "Project Number", "Project Name", "Role", "Disciplines", "Total Budget Hours", "PM Hours", "Disc Hours", ...WBS_DISCIPLINES.map(d => d + " Hrs")];
            const csvRows = [];
            staffCols.forEach(col => {
              col.entries.forEach(entry => {
                csvRows.push([
                  col.displayName,
                  entry.project.projectNumber || "",
                  entry.project.name || "",
                  entry.member?.role || "",
                  (entry.member?.disciplines || []).join("; "),
                  entry.memberBudget || 0,
                  entry.pmHoursForEntry || 0,
                  Object.values(entry.discBreakdown || {}).reduce((a,v) => a+v, 0),
                  ...WBS_DISCIPLINES.map(d => entry.discBreakdown?.[d] || 0)
                ]);
              });
            });
            downloadCSV("team_wbs_" + new Date().toISOString().slice(0,10) + ".csv", headers, csvRows);
          }}>⬇ Export CSV</Btn>
        </div>
      </div>
      <div style={{ color: P.textMuted, fontSize: 13, marginBottom: 20 }}>
        Weekly hours across {activeProjects.length} active project{activeProjects.length !== 1 ? "s" : ""}. Staff with matching names are merged into one column.
      </div>

      {/* Active projects legend */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
        {activeProjects.map(p => (
          <button key={p.id} onClick={() => onNavigateToProject(p.id)}
            style={{ background: P.card, border: `1px solid ${P.border}`, borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 12, color: P.accentLight, fontWeight: 600 }}
            onMouseEnter={e => e.currentTarget.style.borderColor = P.accent}
            onMouseLeave={e => e.currentTarget.style.borderColor = P.border}>
            {p.projectNumber ? `[${p.projectNumber}] ` : ""}{p.name}
          </button>
        ))}
      </div>

      {/* Staff filter */}
      <div style={{ marginBottom: 16 }}>
        <input value={filterStaff} onChange={e => setFilterStaff(e.target.value)}
          placeholder="Filter by staff name…" style={{ width: 260 }} />
      </div>

      {allWeeks.length === 0 ? (
        <div style={{ color: P.textDim }}>No scheduled phases found.</div>
      ) : (
        <div style={{ overflowX: "auto" }}>
          <table>
            <thead>
              <tr>
                <th style={{ minWidth: 110, position: "sticky", left: 0, background: P.card, zIndex: 2 }}>Week Of</th>
                <th style={{ minWidth: 120 }}>Projects Active</th>
                {visibleCols.map((col, i) => {
                  const totalBudget = col.entries.reduce((a, e) => a + e.memberBudget, 0);
                  const totalRemaining = col.entries.reduce((a, e) => {
                    return a + e.billablePhases.reduce((b, ph) => {
                      const meta = e.phaseMeta[ph.id];
                      if (!meta) return b;
                      const remaining = Math.max(0, 1 - (meta.pctComplete || 0) / 100);
                      const phaseFrac = (ph.fee || 0) / e.totalFee;
                      return b + Math.round(e.memberBudget * phaseFrac * remaining);
                    }, 0);
                  }, 0);
                  const discs = [...new Set(col.entries.flatMap(e => Object.keys(e.discBreakdown)))];
                  const isPMOnAny = col.entries.some(e => e.isPM);
                  const hasPMAndDisc = col.entries.some(e => e.isPM && Object.keys(e.discBreakdown).length > 0);
                  return (
                    <th key={i} style={{ minWidth: 90, textAlign: "center" }}>
                      <div style={{ fontWeight: 700 }}>{col.displayName}</div>
                      <div style={{ fontSize: 10, color: P.textDim, fontWeight: 400 }}>
                        {col.entries.length} project{col.entries.length !== 1 ? "s" : ""}
                      </div>
                      <div style={{ fontSize: 10, fontWeight: 400, display: "flex", justifyContent: "center", gap: 3, flexWrap: "wrap", marginTop: 2 }}>
                        {isPMOnAny && <span style={{ color: P.accentLight }}>PM</span>}
                        {discs.map(d => <span key={d} style={{ color: DISC_COLORS[d]?.text || P.textMuted }}>{d.split(" ")[0]}</span>)}
                      </div>
                      {hasPMAndDisc && <div style={{ fontSize: 9, color: P.yellow, fontWeight: 400 }}>PM + discipline</div>}
                      <div style={{ fontSize: 10, color: P.accentLight, fontWeight: 400 }}>{totalRemaining} hrs remaining</div>
                      {totalRemaining !== totalBudget && <div style={{ fontSize: 9, color: P.textDim, fontWeight: 400 }}>of {totalBudget} total</div>}
                    </th>
                  );
                })}
                <th style={{ minWidth: 90, textAlign: "center" }}>Team Total</th>
              </tr>
            </thead>
            <tbody>
              {allWeeks.map(weekStart => {
                const st = wkStatus(weekStart);
                const activeProjsThisWeek = weekProjects(weekStart);
                const rowBg = st === "current" ? "#1a2500" : st === "past" ? P.bg : "transparent";
                let teamTotal = 0;
                const cellHours = visibleCols.map(col => {
                  const hrs = col.entries.reduce((a, entry) => a + entryWeekHours(entry, weekStart), 0);
                  teamTotal += hrs;
                  // per-project breakdown for tooltip
                  const byProject = col.entries
                    .map(e => ({ name: e.project.projectNumber || e.project.name.slice(0, 12), hrs: entryWeekHours(e, weekStart) }))
                    .filter(x => x.hrs > 0);
                  return { hrs, byProject };
                });
                if (teamTotal === 0 && st === "past") return null;
                return (
                  <tr key={weekStart} style={{ background: rowBg }}>
                    <td style={{ position: "sticky", left: 0, background: rowBg || P.card, fontFamily: "JetBrains Mono", fontSize: 12,
                      fontWeight: st === "current" ? 700 : 400,
                      color: st === "current" ? P.green : st === "past" ? P.textDim : P.text, zIndex: 1 }}>
                      {weekStart}
                      {st === "current" && <div style={{ fontSize: 10, color: P.green }}>← NOW</div>}
                    </td>
                    <td style={{ fontSize: 11 }}>
                      {activeProjsThisWeek.map(p => (
                        <button key={p.id} onClick={() => onNavigateToProject(p.id)}
                          style={{ display: "block", background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 11, padding: 0, textAlign: "left" }}>
                          {p.projectNumber || p.name.slice(0, 14)}
                        </button>
                      ))}
                    </td>
                    {cellHours.map((cell, ci) => (
                      <td key={ci} style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontSize: 13,
                        color: cell.hrs === 0 ? P.textDim : st === "past" ? P.textDim : st === "current" ? P.green : P.text,
                        fontWeight: st === "current" ? 700 : 400 }}>
                        {cell.hrs > 0 ? (
                          <div title={cell.byProject.map(x => x.name + ": " + x.hrs + "h").join(" | ")}>
                            <div>{cell.hrs} h</div>
                            {cell.byProject.length > 1 && (
                              <div style={{ fontSize: 9, color: P.textDim, lineHeight: 1.4 }}>
                                {cell.byProject.map(x => <div key={x.name}>{x.name}: {x.hrs}h</div>)}
                              </div>
                            )}
                          </div>
                        ) : <span style={{ color: P.border }}>—</span>}
                      </td>
                    ))}
                    <td style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700,
                      color: st === "current" ? P.green : st === "past" ? P.textDim : P.accentLight }}>
                      {teamTotal > 0 ? teamTotal + " h" : <span style={{ color: P.border }}>—</span>}
                    </td>
                  </tr>
                );
              })}
              {/* Totals row */}
              <tr style={{ borderTop: `2px solid ${P.border}`, background: P.bg }}>
                <td colSpan={2} style={{ fontWeight: 700 }}>TOTAL</td>
                {visibleCols.map((col, i) => {
                  const total = col.entries.reduce((a, e) => a + e.memberBudget, 0);
                  return (
                    <td key={i} style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>
                      {total} h
                      {col.entries.length > 1 && (
                        <div style={{ fontSize: 10, color: P.textDim, fontWeight: 400 }}>
                          {col.entries.map(e => (
                            <div key={e.project.id}>{e.project.projectNumber || e.project.name.slice(0,10)}: {e.memberBudget}h</div>
                          ))}
                        </div>
                      )}
                    </td>
                  );
                })}
                <td style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>
                  {visibleCols.reduce((a, col) => a + col.entries.reduce((b, e) => b + e.memberBudget, 0), 0)} h
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}




// ─── TERM CONTRACTS VIEW ──────────────────────────────────────────────────────

function newTermContract() {
  return {
    id: uid(),
    name: "",
    contractNumber: "",
    client: "",
    contractStatus: "Waiting for NTP/Contract",
    startDate: "",
    expirationDate: "",
    ceilingValue: 0,
    description: "",
    notes: "",
  };
}

function TermContractsView({ termContracts, projects, onUpdateTermContracts, onNavigateToProject, clients, onAddClient }) {
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState(null);
  const [expandedId, setExpandedId] = useState(null);

  function startNew() {
    const tc = newTermContract();
    setForm(tc);
    setEditingId("__new__");
  }

  function startEdit(tc) {
    setForm({ ...tc });
    setEditingId(tc.id);
  }

  function saveForm() {
    if (editingId === "__new__") {
      onUpdateTermContracts(prev => [...prev, form]);
    } else {
      onUpdateTermContracts(prev => prev.map(t => t.id === editingId ? form : t));
    }
    setEditingId(null);
    setForm(null);
  }

  function deleteTC(id) {
    onUpdateTermContracts(prev => prev.filter(t => t.id !== id));
  }

  function setF(field, val) {
    setForm(f => ({ ...f, [field]: val }));
  }

  // For each term contract, find linked projects
  function linkedProjects(tcId) {
    return projects.filter(p => p.isTaskOrder && p.taskOrderTermContractId === tcId && !p.archived);
  }

  const today = new Date();

  return (
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 4 }}>Term Contracts</div>
          <div style={{ color: P.textMuted, fontSize: 13 }}>Master agreements with associated task orders</div>
        </div>
        <Btn small onClick={startNew}>+ New Term Contract</Btn>
      </div>

      {termContracts.length === 0 && !form && (
        <div style={{ color: P.textDim, textAlign: "center", padding: 60 }}>
          No term contracts yet. <button onClick={startNew} style={{ color: P.accent, background: "none", border: "none", cursor: "pointer" }}>Add one</button>
        </div>
      )}

      {/* New / Edit form */}
      {form && (
        <div style={{ background: P.card, border: `1px solid ${P.accent}`, borderRadius: 12, padding: 24, marginBottom: 24 }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, color: P.accentLight }}>
            {editingId === "__new__" ? "New Term Contract" : "Edit Term Contract"}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>
            <Field label="Contract Name / Title">
              <input value={form.name} onChange={e => setF("name", e.target.value)} style={{ width: "100%" }} placeholder="e.g. IDIQ MEP Services 2024" />
            </Field>
            <Field label="Contract Number">
              <input value={form.contractNumber} onChange={e => setF("contractNumber", e.target.value)} style={{ width: "100%" }} placeholder="e.g. TC-2024-001" />
            </Field>
            <Field label="Client / Agency">
              <CompanyTypeahead
                value={form.client}
                onChange={val => setF("client", val)}
                clients={clients || []}
                filter="client"
                placeholder="Type to search clients / agencies…"
                onAddClient={onAddClient}
              />
            </Field>
            <Field label="Contract Status">
              <select value={form.contractStatus} onChange={e => setF("contractStatus", e.target.value)} style={{ width: "100%" }}>
                {CONTRACT_STATUSES.map(s => <option key={s}>{s}</option>)}
              </select>
            </Field>
            <Field label="Start Date">
              <input type="date" value={form.startDate} onChange={e => setF("startDate", e.target.value)} style={{ width: "100%" }} />
            </Field>
            <Field label="Expiration Date">
              <input type="date" value={form.expirationDate} onChange={e => setF("expirationDate", e.target.value)} style={{ width: "100%" }} />
            </Field>
            <Field label="Ceiling Value (NTE)">
              <input type="number" value={form.ceilingValue || ""} onChange={e => setF("ceilingValue", +e.target.value)} style={{ width: "100%" }} placeholder="0" />
            </Field>
            <Field label="Description">
              <input value={form.description} onChange={e => setF("description", e.target.value)} style={{ width: "100%" }} placeholder="Brief scope description" />
            </Field>
          </div>
          <Field label="Contract Notes / History">
            <textarea value={form.notes} onChange={e => setF("notes", e.target.value)} rows={4} style={{ width: "100%", resize: "vertical" }} placeholder="Key dates, amendments, notes…" />
          </Field>
          <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
            <Btn variant="success" onClick={saveForm}>Save Term Contract</Btn>
            <Btn variant="ghost" onClick={() => { setEditingId(null); setForm(null); }}>Cancel</Btn>
          </div>
        </div>
      )}

      {/* Term contract cards */}
      {termContracts.map(tc => {
        const linked = linkedProjects(tc.id);
        const isExpanded = expandedId === tc.id;
        const isEditing = editingId === tc.id;
        const expDate = tc.expirationDate ? new Date(tc.expirationDate + "T00:00:00") : null;
        const daysToExp = expDate ? Math.ceil((expDate - today) / 86400000) : null;
        const isExpired = daysToExp !== null && daysToExp < 0;
        const isExpiringSoon = daysToExp !== null && daysToExp >= 0 && daysToExp <= 90;
        const totalTOFee = linked.reduce((a, p) => {
          return a + (p.phases || []).filter(ph => ph.billable && ph.fee > 0).reduce((b, ph) => b + ph.fee, 0);
        }, 0);
        const statusColor = CONTRACT_COLORS[tc.contractStatus] || { bg: P.border, text: P.textMuted };

        if (isEditing) return null; // shown in edit form above

        return (
          <div key={tc.id} style={{ background: P.card, border: `1px solid ${isExpired ? P.red : isExpiringSoon ? P.yellow : P.border}`, borderRadius: 12, marginBottom: 16, overflow: "hidden" }}>
            {/* Header row */}
            <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", gap: 16, cursor: "pointer" }}
              onClick={() => setExpandedId(isExpanded ? null : tc.id)}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>{tc.name || "Unnamed Contract"}</span>
                  {tc.contractNumber && <span style={{ fontFamily: "JetBrains Mono", fontSize: 11, color: P.textDim }}>{tc.contractNumber}</span>}
                  <Badge color={statusColor} text={tc.contractStatus} />
                  {isExpired && <span style={{ background: "#3a0000", color: P.red, fontSize: 10, fontWeight: 700, padding: "1px 7px", borderRadius: 6 }}>EXPIRED</span>}
                  {isExpiringSoon && !isExpired && <span style={{ background: "#2a1a00", color: P.yellow, fontSize: 10, fontWeight: 700, padding: "1px 7px", borderRadius: 6 }}>EXP IN {daysToExp}d</span>}
                </div>
                <div style={{ fontSize: 12, color: P.textMuted, marginTop: 4 }}>
                  {tc.client && <span style={{ marginRight: 16 }}>{tc.client}</span>}
                  {tc.expirationDate && <span style={{ marginRight: 16 }}>Expires: {tc.expirationDate}</span>}
                  {tc.ceilingValue > 0 && <span style={{ marginRight: 16 }}>Ceiling: {fmt(tc.ceilingValue)}</span>}
                  <span style={{ color: P.accentLight }}>{linked.length} task order{linked.length !== 1 ? "s" : ""}</span>
                  {totalTOFee > 0 && <span style={{ marginLeft: 10, color: P.green }}>{fmt(totalTOFee)} awarded</span>}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <Btn small variant="ghost" onClick={e => { e.stopPropagation(); startEdit(tc); }}>✏ Edit</Btn>
                <Btn small variant="danger" onClick={e => { e.stopPropagation(); if (window.confirm("Delete this term contract?")) deleteTC(tc.id); }}>✕</Btn>
                <span style={{ color: P.textDim, fontSize: 12 }}>{isExpanded ? "▲" : "▼"}</span>
              </div>
            </div>

            {/* Expanded detail */}
            {isExpanded && (
              <div style={{ borderTop: `1px solid ${P.border}`, padding: "16px 20px" }}>
                {tc.description && (
                  <div style={{ color: P.textMuted, fontSize: 13, marginBottom: 12 }}>{tc.description}</div>
                )}

                {/* Task orders table */}
                <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 10, color: P.accentLight }}>Task Orders ({linked.length})</div>
                {linked.length === 0 ? (
                  <div style={{ color: P.textDim, fontSize: 12, marginBottom: 12 }}>No task orders linked to this contract yet. When creating a project, select "Task Order under Term Contract" and choose this contract.</div>
                ) : (
                  <table style={{ marginBottom: 16 }}>
                    <thead>
                      <tr>
                        <th>Task Order</th>
                        <th>TO #</th>
                        <th>PM</th>
                        <th>Status</th>
                        <th style={{ textAlign: "right" }}>Fee</th>
                      </tr>
                    </thead>
                    <tbody>
                      {linked.map(p => {
                        const fee = (p.phases || []).filter(ph => ph.billable && ph.fee > 0).reduce((a, ph) => a + ph.fee, 0);
                        return (
                          <tr key={p.id}>
                            <td>
                              <button onClick={() => onNavigateToProject(p.id)}
                                style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 13, padding: 0, fontWeight: 500 }}>
                                {p.name}
                              </button>
                            </td>
                            <td style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: P.textDim }}>{p.taskOrderNumber || p.projectNumber || "—"}</td>
                            <td style={{ color: P.textMuted, fontSize: 12 }}>{p.projectManager || "—"}</td>
                            <td><Badge color={STATUS_COLORS[p.status] || STATUS_COLORS["Not Started"]} text={p.status} /></td>
                            <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", color: P.green }}>{fee > 0 ? fmt(fee) : "—"}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                    <tfoot>
                      <tr>
                        <td colSpan={4} style={{ fontWeight: 700, textAlign: "right" }}>Total TO Value</td>
                        <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>{fmt(totalTOFee)}</td>
                      </tr>
                      {tc.ceilingValue > 0 && (
                        <tr>
                          <td colSpan={4} style={{ textAlign: "right", color: P.textDim }}>Remaining Ceiling</td>
                          <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", color: totalTOFee > tc.ceilingValue ? P.red : P.accentLight }}>{fmt(tc.ceilingValue - totalTOFee)}</td>
                        </tr>
                      )}
                    </tfoot>
                  </table>
                )}

                {tc.notes && (
                  <div style={{ background: P.bg, borderRadius: 8, padding: "10px 14px", fontSize: 12, color: P.textMuted, whiteSpace: "pre-wrap" }}>
                    <span style={{ fontWeight: 600, color: P.text }}>Notes: </span>{tc.notes}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── PENDING COs VIEW ─────────────────────────────────────────────────────────

function PendingCOsView({ projects, onNavigateToProject, onUpdateProject }) {
  const today = new Date();
  const todayStr = localDateStr(today);

  // Collect all unapproved COs across active non-archived projects
  const pendingItems = [];
  projects.filter(p => !p.archived).forEach(proj => {
    (proj.changeOrders || []).forEach(co => {
      if (!co.approved) {
        const daysSent = co.dateSent
          ? Math.floor((today - new Date(co.dateSent + "T00:00:00")) / 86400000)
          : null;
        pendingItems.push({
          co, proj,
          daysSent,
          isUrgent: daysSent !== null && daysSent > 14,
          isWaiting: co.sentToClient && !co.approved,
        });
      }
    });
  });

  // Sort: sent-to-client (oldest first), then unsent
  pendingItems.sort((a, b) => {
    if (a.isWaiting && !b.isWaiting) return -1;
    if (!a.isWaiting && b.isWaiting) return 1;
    if (a.daysSent !== null && b.daysSent !== null) return b.daysSent - a.daysSent;
    return (a.co.date || "") > (b.co.date || "") ? -1 : 1;
  });

  const totalPendingFee = pendingItems.reduce((a, i) => a + (i.co.fee || 0), 0);
  const sentCount = pendingItems.filter(i => i.isWaiting).length;
  const urgentCount = pendingItems.filter(i => i.isUrgent).length;
  const draftCount = pendingItems.filter(i => !i.isWaiting).length;

  function markSent(proj, coId) {
    const updated = {
      ...proj,
      changeOrders: (proj.changeOrders || []).map(c =>
        c.id === coId ? { ...c, sentToClient: true, dateSent: todayStr } : c
      ),
    };
    onUpdateProject(updated);
  }

  function markApproved(proj, coId) {
    const co = (proj.changeOrders || []).find(c => c.id === coId);
    if (!co) return;
    let milestones = proj.milestones || [];
    const existing = milestones.find(m => m.coId === coId);
    if (!existing) {
      milestones = [...milestones, {
        id: uid(), coId,
        type: "billable", phase: "__CO__",
        name: `CO: ${co.name || co.number}`,
        fee: co.fee, startDate: co.date, dueDate: co.date,
        pctComplete: 0, status: "Not Started", notes: co.notes || "",
      }];
    }
    const updated = {
      ...proj,
      changeOrders: (proj.changeOrders || []).map(c =>
        c.id === coId ? { ...c, approved: true } : c
      ),
      milestones,
    };
    onUpdateProject(updated);
  }

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 28 }}>
