          </table>
        </div>
      )}
    </div>
  );
}

// ─── INVOICE PROJECTIONS ──────────────────────────────────────────────────────

function ProjectionsView({ project }) {
  const phases = (project.phases || []).filter(p => p.billable && p.fee > 0 && p.endDate);
  const invoices = project.invoices || [];
  const milestones = (project.milestones || []).filter(m => m.type === "billable" && m.fee > 0 && m.dueDate);
  const today = new Date();

  // Build projection rows from billable milestones
  const rows = milestones.map(m => {
    const invoiced = invoices
      .filter(inv => inv.milestoneId === m.id)
      .reduce((a, inv) => a + (inv.amount || 0), 0);
    const remaining = (m.fee || 0) - invoiced;
    const due = m.dueDate ? new Date(m.dueDate + "T00:00:00") : null;
    const isOverdue = due && due < today && remaining > 0;
    const isPending = due && due >= today && due <= new Date(today.getTime() + 30 * 86400000);
    return { ...m, invoiced, remaining, due, isOverdue, isPending };
  });

  const totalFee = rows.reduce((a, r) => a + r.fee, 0);
  const totalInvoiced = rows.reduce((a, r) => a + r.invoiced, 0);
  const totalRemaining = rows.reduce((a, r) => a + r.remaining, 0);
  const overdueAmt = rows.filter(r => r.isOverdue).reduce((a, r) => a + r.remaining, 0);
  const next30Amt = rows.filter(r => r.isPending).reduce((a, r) => a + r.remaining, 0);

  // Monthly cash flow — distribute each phase fee proportionally across its duration
  // Uses phase startDate/endDate from the schedule; falls back to milestone due date if missing
  const monthlyMap = {};

  function addToMonth(key, fee, invoiced, label) {
    if (!monthlyMap[key]) monthlyMap[key] = { month: key, fee: 0, invoiced: 0, milestones: [] };
    monthlyMap[key].fee += fee;
    monthlyMap[key].invoiced += invoiced;
    if (label && !monthlyMap[key].milestones.includes(label)) monthlyMap[key].milestones.push(label);
  }

  // Build a map of phase code → phase for schedule lookup
  const phaseSchedule = {};
  (project.phases || []).forEach(ph => { if (ph.code) phaseSchedule[ph.code] = ph; });

  // Distribute expected fees proportionally across phase duration months
  rows.forEach(r => {
    const ph = phaseSchedule[r.phase];
    const sd = ph?.startDate ? new Date(ph.startDate + "T00:00:00") : null;
    const ed = ph?.endDate   ? new Date(ph.endDate   + "T00:00:00") : null;

    if (sd && ed && ed > sd) {
      const totalDays = (ed - sd) / 86400000 + 1;
      const startYM = sd.getFullYear() * 12 + sd.getMonth();
      const endYM   = ed.getFullYear() * 12 + ed.getMonth();
      for (let ym = startYM; ym <= endYM; ym++) {
        const yr  = Math.floor(ym / 12);
        const mo  = ym % 12;
        const key = `${yr}-${String(mo + 1).padStart(2, "0")}`;
        const mStart = new Date(yr, mo, 1);
        const mEnd   = new Date(yr, mo + 1, 0);
        const overlapStart = sd > mStart ? sd : mStart;
        const overlapEnd   = ed < mEnd   ? ed : mEnd;
        const overlapDays  = Math.max(0, (overlapEnd - overlapStart) / 86400000 + 1);
        const fraction = overlapDays / totalDays;
        // Only distribute expected fee here — invoiced amounts are placed by actual invoice date below
        addToMonth(key, r.fee * fraction, 0, r.name);
      }
    } else if (r.dueDate) {
      addToMonth(r.dueDate.slice(0, 7), r.fee, 0, r.name);
    }
  });

  // Place actual invoiced amounts in the month the invoice was issued
  (project.invoices || []).forEach(inv => {
    if (!inv.date || !inv.amount) return;
    const key = inv.date.slice(0, 7);
    if (!monthlyMap[key]) monthlyMap[key] = { month: key, fee: 0, invoiced: 0, milestones: [] };
    monthlyMap[key].invoiced += inv.amount;
    const label = inv.milestoneName || inv.phaseName;
    if (label && !monthlyMap[key].milestones.includes(label)) monthlyMap[key].milestones.push(label);
  });

  const monthlyCashFlow = Object.values(monthlyMap).sort((a, b) => a.month > b.month ? 1 : -1);
  const maxMonthFee = Math.max(...monthlyCashFlow.map(m => m.fee), 1);

  // Group by phase for summary
  const byPhase = {};
  rows.forEach(r => {
    if (!byPhase[r.phase]) byPhase[r.phase] = { phase: r.phase, fee: 0, invoiced: 0, remaining: 0 };
    byPhase[r.phase].fee += r.fee;
    byPhase[r.phase].invoiced += r.invoiced;
    byPhase[r.phase].remaining += r.remaining;
  });

  function statusBadge(row) {
    if (row.invoiced >= row.fee) return <Badge color={{ bg: P.greenDim, text: P.green }} text="Fully Invoiced" />;
    if (row.isOverdue) return <Badge color={{ bg: P.redDim, text: P.red }} text="Overdue" />;
    if (row.isPending) return <Badge color={{ bg: P.yellowDim, text: P.yellow }} text="Due Soon" />;
    if (row.invoiced > 0) return <Badge color={{ bg: P.accentDim, text: P.accentLight }} text="Partially Invoiced" />;
    return <Badge color={{ bg: P.border, text: P.textMuted }} text="Pending" />;
  }

  return (
    <div>
      <SectionTitle>Invoice Projections</SectionTitle>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 20 }}>
        Projected billing schedule based on milestone due dates. Amounts shown are remaining uninvoiced fees.
      </div>

      {/* KPI row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 28 }}>
        <KpiBox label="TOTAL CONTRACT" val={fmt(totalFee)} color={P.text} />
        <KpiBox label="INVOICED TO DATE" val={fmt(totalInvoiced)} color={P.green} sub={`${totalFee > 0 ? Math.round(totalInvoiced/totalFee*100) : 0}% of contract`} />
        <KpiBox label="REMAINING" val={fmt(totalRemaining)} color={P.accentLight} />
        <KpiBox label="OVERDUE" val={fmt(overdueAmt)} color={overdueAmt > 0 ? P.red : P.textDim} sub={overdueAmt > 0 ? "Needs immediate invoicing" : "None"} />
      </div>

      {/* Next 30 days callout */}
      {next30Amt > 0 && (
        <div style={{ background: P.yellowDim, border: `1px solid ${P.yellow}`, borderRadius: 8, padding: "12px 16px", marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontWeight: 700, color: P.yellow, marginBottom: 2 }}>⏰ {fmt(next30Amt)} due in the next 30 days</div>
            <div style={{ fontSize: 12, color: P.textMuted }}>{rows.filter(r => r.isPending).length} milestone{rows.filter(r => r.isPending).length !== 1 ? "s" : ""} approaching</div>
          </div>
        </div>
      )}

      {/* Projection table */}
      {rows.length === 0 ? (
        <div style={{ textAlign: "center", padding: 40, color: P.textDim }}>
          No billable milestones with due dates found. Finalize the fee schedule in the Fee Calculator tab first.
        </div>
      ) : (
        <>
          <table style={{ marginBottom: 28 }}>
            <thead>
              <tr>
                <th>Milestone</th><th>Phase</th><th>Due Date</th>
                <th>Contract Amt</th><th>Invoiced</th><th>Remaining</th><th>Status</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.id} style={{ background: r.isOverdue ? "#1a0505" : undefined }}>
                  <td style={{ fontWeight: 500 }}>{r.name}</td>
                  <td style={{ color: P.textMuted, fontSize: 12 }}>{r.phase}</td>
                  <td style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: r.isOverdue ? P.red : P.textMuted }}>
                    {r.dueDate || "—"}
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(r.fee)}</td>
                  <td style={{ fontFamily: "JetBrains Mono", color: r.invoiced > 0 ? P.green : P.textDim }}>
                    {r.invoiced > 0 ? fmt(r.invoiced) : "—"}
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono", fontWeight: 600, color: r.remaining <= 0 ? P.green : r.isOverdue ? P.red : P.text }}>
                    {r.remaining <= 0 ? "✓ Paid" : fmt(r.remaining)}
                  </td>
                  <td>{statusBadge(r)}</td>
                </tr>
              ))}
              <tr style={{ background: P.bg, fontWeight: 700 }}>
                <td colSpan={3}>Total</td>
                <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(totalFee)}</td>
                <td style={{ fontFamily: "JetBrains Mono", color: P.green }}>{fmt(totalInvoiced)}</td>
                <td style={{ fontFamily: "JetBrains Mono", color: P.accentLight }}>{fmt(totalRemaining)}</td>
                <td></td>
              </tr>
            </tbody>
          </table>

          {/* Monthly cash flow bar chart */}
          {monthlyCashFlow.length > 0 && (
            <div>
              <SectionTitle>Monthly Cash Flow</SectionTitle>
              <div style={{ fontSize: 12, color: P.textDim, marginBottom: 16 }}>Fee expected per month based on milestone due dates</div>
              <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 10, padding: "20px 20px 8px" }}>
                {/* Bar chart */}
                <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 160, marginBottom: 8 }}>
                  {monthlyCashFlow.map(m => {
                    const barH = Math.round((m.fee / maxMonthFee) * 140);
                    const isFullyInvoiced = m.invoiced >= m.fee;
                    const label = new Date(m.month + "-02").toLocaleDateString("en-US", { month: "short", year: "2-digit" });
                    return (
                      <div key={m.month} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, minWidth: 0 }}
                        titletitle={label + ": " + fmt(m.fee) + " | " + m.milestones.join(", ")}>
                        <span style={{ fontSize: 10, color: P.accentLight, fontFamily: "JetBrains Mono", fontWeight: 600, whiteSpace: "nowrap" }}>
                          {fmt(m.fee)}
                        </span>
                        <div style={{ width: "100%", height: barH, borderRadius: "4px 4px 0 0", background: isFullyInvoiced ? P.green : P.accent, minHeight: 4, transition: "height .3s" }} />
                        <span style={{ fontSize: 10, color: P.textMuted, textAlign: "center", whiteSpace: "nowrap", overflow: "hidden", width: "100%", textOverflow: "ellipsis" }}>{label}</span>
                      </div>
                    );
                  })}
                </div>
                {/* Monthly breakdown table */}
                <table style={{ marginTop: 12 }}>
                  <thead>
                    <tr><th>Month</th><th>Milestones</th><th>Expected Fee</th><th>Invoiced</th><th>Remaining</th></tr>
                  </thead>
                  <tbody>
                    {monthlyCashFlow.map(m => {
                      const label = new Date(m.month + "-02").toLocaleDateString("en-US", { month: "long", year: "numeric" });
                      const remaining = m.fee - m.invoiced;
                      return (
                        <tr key={m.month}>
                          <td style={{ fontWeight: 600 }}>{label}</td>
                          <td style={{ fontSize: 12, color: P.textMuted }}>{m.milestones.join(", ")}</td>
                          <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(m.fee)}</td>
                          <td style={{ fontFamily: "JetBrains Mono", color: m.invoiced > 0 ? P.green : P.textDim }}>{m.invoiced > 0 ? fmt(m.invoiced) : "—"}</td>
                          <td style={{ fontFamily: "JetBrains Mono", color: remaining <= 0 ? P.green : P.text }}>{remaining <= 0 ? "✓ Paid" : fmt(remaining)}</td>
                        </tr>
                      );
                    })}
                    <tr style={{ background: P.bg, fontWeight: 700 }}>
                      <td>Total</td><td></td>
                      <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(totalFee)}</td>
                      <td style={{ fontFamily: "JetBrains Mono", color: P.green }}>{fmt(totalInvoiced)}</td>
                      <td style={{ fontFamily: "JetBrains Mono", color: P.accentLight }}>{fmt(totalRemaining)}</td>
                    </tr>
                  </tbody>
                </table>
                <div style={{ marginTop: 12, display: "flex", gap: 16, fontSize: 11, color: P.textDim }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 12, height: 6, borderRadius: 2, background: P.accent }} /> Projected
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 12, height: 6, borderRadius: 2, background: P.green }} /> Invoiced
                  </div>
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── PROJECT DETAIL ───────────────────────────────────────────────────────────

const TABS = ["Overview", "Fee Calculator", "Schedule", "Subconsultants", "Projections", "Financials", "Change Orders", "Contract", "Team", "Calendar"];

function ProjectDetail({ project, onUpdate, onBack }) {
  const [tab, setTab] = useState("Overview");
  const [proposalSyncState, setProposalSyncState] = useState("idle"); // idle | syncing | synced | error
  const [proposalSyncMsg, setProposalSyncMsg] = useState("");

  function updateField(field, val) {
    onUpdate({ ...project, [field]: val });
  }

  async function syncProposalDueDate() {
    if (!project.proposalDueDate) { setProposalSyncMsg("⚠ No proposal due date set"); return; }
    setProposalSyncState("syncing");
    setProposalSyncMsg("");
    const fakeMilestone = {
      id: "proposal-" + project.id,
      name: "Proposal Due",
      dueDate: project.proposalDueDate,
      phase: "Proposal",
      type: "proposal",
      pctComplete: 0,
    };
    const existingEventId = localStorage.getItem("setty_pms_proposal_cal_" + project.id) || null;
    const result = await createOrUpdateCalendarEvent(fakeMilestone, project.name || "Project", project.projectNumber, existingEventId);
    if (result.success) {
      if (result.eventId) localStorage.setItem("setty_pms_proposal_cal_" + project.id, result.eventId);
      setProposalSyncState("synced");
      setProposalSyncMsg(result.warning ? "⚠ " + result.warning : "✓ Synced to NYC Shared Calendar");
    } else {
      setProposalSyncState("error");
      setProposalSyncMsg("✗ " + result.error);
    }
  }

  const pct = projectOverallPct(project);
  const statusColor = STATUS_COLORS[project.status] || STATUS_COLORS["Not Started"];
  const totalFee = (project.phases || []).filter(p => p.billable && p.fee > 0).reduce((a, p) => a + p.fee, 0);
  const totalInvoiced = (project.invoices || []).reduce((a, inv) => a + inv.amount, 0);

  return (
    <div style={{ padding: "24px 32px" }}>
      <button onClick={onBack} style={{ background: "none", color: P.textMuted, border: "none", cursor: "pointer", marginBottom: 16, fontSize: 13 }}>
        ← Back to Dashboard
      </button>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
            <input value={project.name} onChange={e => updateField("name", e.target.value)}
              style={{ fontSize: 22, fontWeight: 700, background: "none", border: "none", color: P.text, borderBottom: `2px solid ${P.border}`, paddingBottom: 4, width: 440 }} />
            <Badge color={statusColor} text={project.status} />
          </div>
          <div style={{ color: P.textMuted, fontSize: 13 }}>
            {project.projectNumber}{project.projectManager ? ` · PM: ${project.projectManager}` : ""}
          </div>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <select value={project.status} onChange={e => updateField("status", e.target.value)} style={{ fontSize: 13 }}>
            {PROJECT_STATUSES.map(s => <option key={s}>{s}</option>)}
          </select>
          <Btn small variant={project.archived ? "success" : "ghost"} onClick={() => updateField("archived", !project.archived)}>
            {project.archived ? "Unarchive" : "Archive"}
          </Btn>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 20 }}>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
            <div style={{ fontSize: 13, fontWeight: 600 }}>Overall Progress</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: P.accent }}>{pct}%</div>
          </div>
          <ProgressBar pct={pct} />
        </Card>
        <KpiBox label="Total Fee" val={fmt(totalFee)} color={P.green} />
        <KpiBox label="Total Invoiced" val={fmt(totalInvoiced)} color={P.purple}
          sub={`Open: ${fmt(totalFee - totalInvoiced)}`} />
      </div>

      <div style={{ display: "flex", gap: 2, marginBottom: 20, borderBottom: `1px solid ${P.border}` }}>
        {TABS.map(t => (
          <button key={t} onClick={() => setTab(t)}
            style={{ padding: "8px 16px", background: "none", border: "none", color: tab === t ? P.accentLight : P.textMuted, borderBottom: tab === t ? `2px solid ${P.accentLight}` : "2px solid transparent", fontWeight: tab === t ? 600 : 400, fontSize: 13, cursor: "pointer", marginBottom: -1 }}>
            {t}
          </button>
        ))}
      </div>

      <Card>
        {tab === "Overview" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <Field label="Project Number"><input value={project.projectNumber || ""} onChange={e => updateField("projectNumber", e.target.value)} style={{ width: "100%" }} /></Field>
            <Field label="Prime"><input value={project.prime || ""} onChange={e => updateField("prime", e.target.value)} style={{ width: "100%" }} /></Field>
            <Field label="Prime's Project Number"><input value={project.primeProjectNumber || ""} onChange={e => updateField("primeProjectNumber", e.target.value)} style={{ width: "100%" }} placeholder="Prime's internal project #" /></Field>
            <Field label="Fee Type">
              <select value={project.feeType || "Lump Sum"} onChange={e => updateField("feeType", e.target.value)} style={{ width: "100%" }}>
                <option>Lump Sum</option>
                <option>Hourly</option>
                <option>Hourly Not-to-Exceed</option>
                <option>Unit Price</option>
              </select>
            </Field>
            <Field label="Project Manager"><input value={project.projectManager || ""} onChange={e => updateField("projectManager", e.target.value)} style={{ width: "100%" }} /></Field>
            <Field label="Deputy Project Manager"><input value={project.deputyProjectManager || ""} onChange={e => updateField("deputyProjectManager", e.target.value)} style={{ width: "100%" }} /></Field>
            <Field label="Project Status">
              <select value={project.status} onChange={e => updateField("status", e.target.value)} style={{ width: "100%" }}>
                <optgroup label="Pipeline">{PIPELINE_STATUSES.map(s => <option key={s}>{s}</option>)}</optgroup>
                <optgroup label="Awarded">{PROJECT_STATUSES.map(s => <option key={s}>{s}</option>)}</optgroup>
              </select>
            </Field>
            {isPipeline(project) && (<>
              <Field label="Client Name"><input value={project.clientName || ""} onChange={e => updateField("clientName", e.target.value)} style={{ width: "100%" }} /></Field>
              <Field label="Proposal Due Date">
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <input type="date" value={project.proposalDueDate || ""} onChange={e => { updateField("proposalDueDate", e.target.value); setProposalSyncState("idle"); }} style={{ flex: 1 }} />
                  <button onClick={syncProposalDueDate} disabled={!project.proposalDueDate || proposalSyncState === "syncing"}
                    title="Sync to NYC Shared Calendar"
                    style={{ background: proposalSyncState === "synced" ? P.greenDim : P.accentDim, border: `1px solid ${proposalSyncState === "synced" ? P.green : P.accent}`, borderRadius: 6, color: proposalSyncState === "synced" ? P.green : P.accentLight, cursor: "pointer", fontSize: 12, padding: "4px 10px", whiteSpace: "nowrap" }}>
                    {proposalSyncState === "syncing" ? "⏳" : proposalSyncState === "synced" ? "✓ 📅" : "📅 Sync"}
                  </button>
                </div>
                {proposalSyncMsg && (
                  <div style={{ fontSize: 11, marginTop: 4, color: proposalSyncMsg.startsWith("✓") ? P.green : proposalSyncMsg.startsWith("⚠") ? P.yellow : P.red }}>
                    {proposalSyncMsg}
                  </div>
                )}
              </Field>
              <Field label="Probability %">
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <input type="number" min={0} max={100} value={project.probability ?? 50} onChange={e => updateField("probability", +e.target.value)} style={{ width: 80 }} />
                  <span style={{ color: P.textMuted }}>%</span>
                </div>
              </Field>
            </>)}
            {!isPipeline(project) && (
              <Field label="Contract Status">
                <select value={project.contractStatus} onChange={e => updateField("contractStatus", e.target.value)} style={{ width: "100%" }}>
                  {CONTRACT_STATUSES.map(s => <option key={s}>{s}</option>)}
                </select>
              </Field>
            )}
          </div>
        )}
        {tab === "Fee Calculator" && <FeeCalculator project={project} onChange={onUpdate} />}
        {tab === "Schedule" && <ScheduleView project={project} onChange={onUpdate} />}
        {tab === "Subconsultants" && <SubsView project={project} onChange={onUpdate} />}
        {tab === "Projections" && <ProjectionsView project={project} />}
        {tab === "Financials" && <FinancialsView project={project} onChange={onUpdate} />}
        {tab === "Change Orders" && <ChangeOrdersView project={project} onChange={onUpdate} />}
        {tab === "Contract" && <ContractView project={project} onChange={onUpdate} />}
        {tab === "Team" && <TeamView project={project} onChange={onUpdate} />}
        {tab === "Calendar" && <CalendarView project={project} />}
      </Card>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────

function Dashboard({ projects, onNavigateToProject, onUpdateProject }) {
  const active = projects.filter(p => !p.archived && isAwarded(p) && p.status !== "Completed" && p.status !== "Cancelled" && p.status !== "Lost");
  const [dashCalState, setDashCalState] = useState({}); // { [milestoneId]: "syncing"|"synced"|"error" }
  const [dashSyncMsg, setDashSyncMsg] = useState("");
  const [showAddMilestone, setShowAddMilestone] = useState(false);
  const [addMilSearch, setAddMilSearch] = useState("");
  const [addMilProjectId, setAddMilProjectId] = useState("");
  const [addMilForm, setAddMilForm] = useState({ name: "", dueDate: "", notes: "" });
  const [addMilMsg, setAddMilMsg] = useState("");

  function submitAddMilestone() {
    if (!addMilProjectId) { setAddMilMsg("Please select a project."); return; }
    if (!addMilForm.name.trim()) { setAddMilMsg("Please enter a milestone name."); return; }
    const proj = projects.find(p => p.id === addMilProjectId);
    if (!proj) return;
    const newMilestone = {
      id: "m_" + Date.now(),
      type: "non-billable",
      name: addMilForm.name.trim(),
      dueDate: addMilForm.dueDate || "",
      notes: addMilForm.notes || "",
      pctComplete: 0,
      phase: "",
    };
    onUpdateProject({ ...proj, milestones: [...(proj.milestones || []), newMilestone] });
    setAddMilMsg("✓ Milestone added to " + proj.name);
    setAddMilForm({ name: "", dueDate: "", notes: "" });
    setAddMilProjectId("");
    setAddMilSearch("");
    setTimeout(() => { setShowAddMilestone(false); setAddMilMsg(""); }, 1200);
  }

  const filteredProjects = active.filter(p =>
    p.name.toLowerCase().includes(addMilSearch.toLowerCase()) ||
    (p.projectNumber || "").toLowerCase().includes(addMilSearch.toLowerCase())
  );

  async function syncMilestoneFromDash(m) {
    if (!m.dueDate) { setDashSyncMsg("⚠ No due date on " + m.name); return; }
    setDashCalState(s => ({ ...s, [m.id]: "syncing" }));
    const calKey = "setty_pms_cal_" + m.projectId;
    const calMap = (() => { try { return JSON.parse(localStorage.getItem(calKey) || "{}"); } catch(e) { return {}; } })();
    const proj = projects.find(p => p.id === m.projectId);
    const result = await createOrUpdateCalendarEvent(m, proj?.name || "Project", proj?.projectNumber, calMap[m.id]);
    if (result.success) {
      if (result.eventId) {
        const newMap = { ...calMap, [m.id]: result.eventId };
        try { localStorage.setItem(calKey, JSON.stringify(newMap)); } catch(e) {}
      }
      setDashCalState(s => ({ ...s, [m.id]: "synced" }));
      setDashSyncMsg(result.warning ? "⚠ " + result.warning : "✓ \"" + m.name + "\" synced to NYC Shared Calendar");
    } else {
      setDashCalState(s => ({ ...s, [m.id]: "error" }));
      setDashSyncMsg("✗ \"" + m.name + "\" — " + result.error);
    }
  }
  // Build a quick lookup: projectId → project
  const projectMap = Object.fromEntries(active.map(p => [p.id, p]));
  const allMilestones = active.flatMap(p => (p.milestones || []).map(m => ({
    ...m,
    projectName: p.name, projectId: p.id, pm: p.projectManager,
    projectStatus: p.status,
  })));
  const now = new Date();
  const in14 = new Date(); in14.setDate(in14.getDate() + 14);
  const overdue = allMilestones.filter(m => m.dueDate && new Date(m.dueDate) < now && milestoneStatus(m.pctComplete) !== "Completed");
  const upcoming = allMilestones.filter(m => { const d = new Date(m.dueDate); return d >= now && d <= in14 && milestoneStatus(m.pctComplete) !== "Completed"; });

  const totalFee = active.reduce((a, p) => a + (p.phases || []).filter(ph => ph.billable && ph.fee > 0).reduce((b, ph) => b + ph.fee, 0), 0);
  const totalInvoiced = active.reduce((a, p) => a + (p.invoices || []).reduce((b, inv) => b + inv.amount, 0), 0);

  const byStatus = PROJECT_STATUSES.slice(0, 6).map(s => ({
    status: s, count: active.filter(p => p.status === s).length,
    color: STATUS_COLORS[s] || { bg: P.border, text: P.textMuted },
  })).filter(x => x.count > 0);

  return (
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 22, fontWeight: 800 }}>Team Dashboard</div>
        <button onClick={() => { setShowAddMilestone(true); setAddMilMsg(""); }}
          style={{ background: P.accentDim, border: `1px solid ${P.accent}`, borderRadius: 8, color: P.accentLight, cursor: "pointer", fontSize: 13, fontWeight: 600, padding: "8px 16px" }}>
          + Non-Billable Milestone
        </button>
      </div>
      <div style={{ color: P.textMuted, fontSize: 13, marginBottom: 24 }}>Setty & Associates, LTD, PC – Project Management System</div>

      {/* Add Non-Billable Milestone Modal */}
      {showAddMilestone && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={e => { if (e.target === e.currentTarget) setShowAddMilestone(false); }}>
          <div style={{ background: P.card, border: `1px solid ${P.border}`, borderRadius: 14, padding: 28, width: 480, maxWidth: "90vw" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div style={{ fontWeight: 700, fontSize: 16 }}>+ Non-Billable Milestone</div>
              <button onClick={() => setShowAddMilestone(false)}
                style={{ background: "none", border: "none", color: P.textMuted, cursor: "pointer", fontSize: 18, lineHeight: 1 }}>✕</button>
            </div>

            {/* Project search */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 6, fontWeight: 600 }}>Search Project</div>
              <input
                value={addMilSearch}
                onChange={e => { setAddMilSearch(e.target.value); setAddMilProjectId(""); }}
                placeholder="Type project name or number…"
                autoFocus
                style={{ width: "100%", marginBottom: 8 }} />
              {addMilSearch && !addMilProjectId && (
                <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, maxHeight: 180, overflowY: "auto" }}>
                  {filteredProjects.length === 0
                    ? <div style={{ padding: "10px 14px", color: P.textDim, fontSize: 13 }}>No projects found</div>
                    : filteredProjects.map(p => (
                      <div key={p.id}
                        onClick={() => { setAddMilProjectId(p.id); setAddMilSearch(p.name + (p.projectNumber ? " [" + p.projectNumber + "]" : "")); }}
                        style={{ padding: "10px 14px", cursor: "pointer", borderBottom: `1px solid ${P.border}`, fontSize: 13 }}
                        onMouseEnter={e => e.currentTarget.style.background = P.cardHover}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                        <span style={{ fontWeight: 600, color: P.accentLight }}>{p.name}</span>
                        {p.projectNumber && <span style={{ color: P.textMuted, marginLeft: 8, fontSize: 12 }}>[{p.projectNumber}]</span>}
                        {p.projectManager && <span style={{ color: P.textDim, marginLeft: 8, fontSize: 11 }}>PM: {p.projectManager}</span>}
                      </div>
                    ))
                  }
                </div>
              )}
              {addMilProjectId && (
                <div style={{ fontSize: 12, color: P.green, marginTop: 4 }}>✓ Project selected</div>
              )}
            </div>

            {/* Milestone fields */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 6, fontWeight: 600 }}>Milestone Name *</div>
              <input value={addMilForm.name} onChange={e => setAddMilForm(f => ({ ...f, name: e.target.value }))}
                placeholder="e.g. City Submission, Internal Review…" style={{ width: "100%" }} />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
              <div>
                <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 6, fontWeight: 600 }}>Due Date</div>
                <input type="date" value={addMilForm.dueDate} onChange={e => setAddMilForm(f => ({ ...f, dueDate: e.target.value }))} style={{ width: "100%" }} />
              </div>
              <div>
                <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 6, fontWeight: 600 }}>Notes</div>
                <input value={addMilForm.notes} onChange={e => setAddMilForm(f => ({ ...f, notes: e.target.value }))}
                  placeholder="Optional…" style={{ width: "100%" }} />
              </div>
            </div>

            {addMilMsg && (
              <div style={{ fontSize: 13, marginBottom: 14, padding: "8px 12px", borderRadius: 6,
                background: addMilMsg.startsWith("✓") ? P.greenDim : P.redDim,
                color: addMilMsg.startsWith("✓") ? P.green : P.red,
                border: `1px solid ${addMilMsg.startsWith("✓") ? P.green : P.red}` }}>
                {addMilMsg}
              </div>
            )}

            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button onClick={() => setShowAddMilestone(false)}
                style={{ background: "none", border: `1px solid ${P.border}`, borderRadius: 8, color: P.textMuted, cursor: "pointer", padding: "8px 18px", fontSize: 13 }}>
                Cancel
              </button>
              <button onClick={submitAddMilestone}
                style={{ background: P.accent, border: "none", borderRadius: 8, color: "#fff", cursor: "pointer", fontWeight: 700, padding: "8px 20px", fontSize: 13 }}>
                Add Milestone
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 14, marginBottom: 24 }}>
        <KpiBox label="Active Projects" val={active.length} color={P.accent} />
        <KpiBox label="Total Fee Value" val={fmt(totalFee)} color={P.green} />
        <KpiBox label="Total Invoiced" val={fmt(totalInvoiced)} color={P.purple} />
        <KpiBox label="Overdue Milestones" val={overdue.length} color={overdue.length > 0 ? P.red : P.textMuted} />
        <KpiBox label="Due in 14 Days" val={upcoming.length} color={upcoming.length > 0 ? P.yellow : P.textMuted} />
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap" }}>
        {byStatus.map(({ status, count, color }) => (
          <div key={status} style={{ background: color.bg, borderRadius: 8, padding: "8px 16px", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: color.text, fontWeight: 700, fontSize: 16 }}>{count}</span>
            <span style={{ color: color.text, fontSize: 12 }}>{status}</span>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
        <Card>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 14, color: P.red }}>⚠ Overdue Milestones</div>
          {overdue.length === 0
            ? <div style={{ color: P.textDim, fontSize: 13 }}>None – great work!</div>
            : overdue.slice(0, 6).map(m => (
              <div key={m.id} style={{ padding: "8px 0", borderBottom: `1px solid ${P.border}` }}>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{m.name}</div>

              border: `1px solid ${dashSyncMsg.startsWith("✓") ? P.green : dashSyncMsg.startsWith("⚠") ? P.yellow : P.red}`,

        <table>
          <thead>

              const mst = milestoneStatus(m.pctComplete);
              const projStatus = m.projectStatus || "Not Started";
              const projStatusColor = STATUS_COLORS[projStatus] || STATUS_COLORS["Not Started"];
              const isOverdue = m.dueDate && new Date(m.dueDate) < now && mst !== "Completed";

              function updateMilestoneField(field, val) {
                if (!onUpdateProject) return;
                const proj = projects.find(p => p.id === m.projectId);
                if (!proj) return;
                const newMilestones = (proj.milestones || []).map(x =>
                  x.id === m.id ? { ...x, [field]: val } : x
                );
                onUpdateProject({ ...proj, milestones: newMilestones });
              }

              return (
                <tr key={m.id}>
                  <td>
                    <button onClick={() => onNavigateToProject(m.projectId)}
                      style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 13, padding: 0, fontWeight: 600, textAlign: "left" }}
                      onMouseEnter={e => e.currentTarget.style.textDecoration = "underline"}
                      onMouseLeave={e => e.currentTarget.style.textDecoration = "none"}>
                      {m.projectName}
                    </button>
                  </td>
                  <td style={{ color: P.textMuted }}>{m.pm || "—"}</td>
                  <td style={{ fontWeight: 500 }}>{m.name}</td>
                  <td><Badge color={m.type === "billable" ? { bg: P.accentDim, text: P.accentLight } : { bg: P.purpleDim, text: P.purple }} text={m.type === "billable" ? "Billable" : "Non-Billable"} /></td>
                  <td>
                    <input type="date" value={m.dueDate || ""}
                      onChange={e => updateMilestoneField("dueDate", e.target.value)}
                      style={{ fontFamily: "JetBrains Mono", fontSize: 12, width: 130, borderColor: isOverdue ? P.red : P.border, color: isOverdue ? P.red : P.text }} />
                  </td>
                  <td>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" min={0} max={100}
                        value={m.pctComplete || 0}
                        onChange={e => updateMilestoneField("pctComplete", +e.target.value)}
                        style={{ width: 72, fontFamily: "JetBrains Mono", fontSize: 12 }} />
                      <span style={{ fontSize: 11, color: P.textDim }}>%</span>
                      <input type="checkbox" checked={(m.pctComplete || 0) >= 100}
                        onChange={e => updateMilestoneField("pctComplete", e.target.checked ? 100 : 0)}
                        title="Mark complete (100%)"
                        style={{ width: 16, height: 16, cursor: "pointer", accentColor: P.green }} />
                      <ProgressBar pct={m.pctComplete || 0} color={m.pctComplete >= 100 ? P.green : P.accent} />
                    </div>
                  </td>
                  <td>
                    <input value={m.notes || ""} placeholder="Notes…"
                      onChange={e => updateMilestoneField("notes", e.target.value)}
                      style={{ width: 160, fontSize: 12 }} />
                  </td>
                  <td><Badge color={projStatusColor} text={projStatus} /></td>
                  <td>
                    {m.dueDate && (
                      <button onClick={() => syncMilestoneFromDash(m)}
                        disabled={dashCalState[m.id] === "syncing"}
                        title="Sync to NYC Shared Calendar"
                        style={{
                          background: dashCalState[m.id] === "synced" ? P.greenDim : P.accentDim,
                          border: `1px solid ${dashCalState[m.id] === "synced" ? P.green : P.accent}`,
                          borderRadius: 6, color: dashCalState[m.id] === "synced" ? P.green : P.accentLight,
                          cursor: "pointer", fontSize: 11, padding: "3px 7px",
                        }}>
                        {dashCalState[m.id] === "syncing" ? "⏳" : dashCalState[m.id] === "synced" ? "✓ 📅" : "📅"}
                      </button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ─── PIPELINE DASHBOARD ───────────────────────────────────────────────────────
function PipelineDashboard({ projects, onNavigateToProject, onAddProject }) {
  const pipeline = projects.filter(p => !p.archived && isPipeline(p));
  const now = new Date();

  const totalValue = pipeline.reduce((a, p) => {
    const fee = (p.phases || []).filter(ph => ph.billable && ph.fee > 0).reduce((b, ph) => b + ph.fee, 0);
    return a + fee;
  }, 0);

  const weightedValue = pipeline.reduce((a, p) => {
    const fee = (p.phases || []).filter(ph => ph.billable && ph.fee > 0).reduce((b, ph) => b + ph.fee, 0);
    return a + fee * ((p.probability ?? 50) / 100);
  }, 0);

  const overdue = pipeline.filter(p => p.proposalDueDate && new Date(p.proposalDueDate) < now);
  const dueSoon = pipeline.filter(p => {
    if (!p.proposalDueDate) return false;
    const d = new Date(p.proposalDueDate);
    const in14 = new Date(); in14.setDate(in14.getDate() + 14);
    return d >= now && d <= in14;
  });

  const byStatus = PIPELINE_STATUSES.map(s => ({
    status: s, count: pipeline.filter(p => p.status === s).length,
  }));

  const sorted = [...pipeline].sort((a, b) => {
    if (!a.proposalDueDate) return 1;
    if (!b.proposalDueDate) return -1;
    return a.proposalDueDate > b.proposalDueDate ? 1 : -1;
  });

  return (
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 4 }}>Pipeline</div>
          <div style={{ color: P.textMuted, fontSize: 13 }}>Proposals & projects pending award</div>
        </div>
        <Btn small onClick={onAddProject}>+ New Pipeline Project</Btn>
      </div>

      {/* KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 14, marginBottom: 24 }}>
        <KpiBox label="Pipeline Projects" val={pipeline.length} color={P.accent} />
        <KpiBox label="Total Fee Value" val={fmt(totalValue)} color={P.accentLight} />
        <KpiBox label="Weighted Value" val={fmt(weightedValue)} color={P.green} />
        <KpiBox label="Proposals Overdue" val={overdue.length} color={overdue.length > 0 ? P.red : P.textMuted} />
        <KpiBox label="Due in 14 Days" val={dueSoon.length} color={dueSoon.length > 0 ? P.yellow : P.textMuted} />
      </div>

      {/* Status pills */}
      <div style={{ display: "flex", gap: 10, marginBottom: 24 }}>
        {byStatus.map(({ status, count }) => (
          <div key={status} style={{ background: P.accentDim, borderRadius: 8, padding: "8px 16px", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: P.accentLight, fontWeight: 700, fontSize: 16 }}>{count}</span>
            <span style={{ color: P.accentLight, fontSize: 12 }}>{status}</span>
          </div>
        ))}
      </div>

      {/* Pipeline table */}
      <Card>
        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 16 }}>All Pipeline Projects</div>
        {pipeline.length === 0 ? (
          <div style={{ color: P.textDim, textAlign: "center", padding: 40 }}>
            No pipeline projects. <button onClick={onAddProject} style={{ color: P.accent, background: "none", border: "none", cursor: "pointer" }}>Add one</button>
          </div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Project</th>
                <th>Client</th>
                <th>PM</th>
                <th>Status</th>
                <th>Proposal Due</th>
                <th>Probability</th>
                <th>Fee Value</th>
                <th>Weighted</th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(p => {
                const fee = (p.phases || []).filter(ph => ph.billable && ph.fee > 0).reduce((a, ph) => a + ph.fee, 0);
                const weighted = fee * ((p.probability ?? 50) / 100);
                const isOverdue = p.proposalDueDate && new Date(p.proposalDueDate) < now;
                const isSoon = p.proposalDueDate && !isOverdue && (() => { const d = new Date(p.proposalDueDate); const in14 = new Date(); in14.setDate(in14.getDate()+14); return d <= in14; })();
                return (
                  <tr key={p.id}>
                    <td>
                      <button onClick={() => onNavigateToProject(p.id)}
                        style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontWeight: 600, fontSize: 13, padding: 0, textAlign: "left" }}>
                        {p.name}
                      </button>
                      {p.projectNumber && <div style={{ fontSize: 11, color: P.textDim }}>{p.projectNumber}</div>}
                    </td>
                    <td style={{ color: P.textMuted, fontSize: 13 }}>{p.clientName || "—"}</td>
                    <td style={{ color: P.textMuted, fontSize: 13 }}>{p.projectManager || "—"}</td>
                    <td>
                      <span style={{ background: P.accentDim, color: P.accentLight, borderRadius: 4, padding: "2px 8px", fontSize: 11, fontWeight: 600 }}>
                        {p.status}
                      </span>
                    </td>
                    <td style={{ color: isOverdue ? P.red : isSoon ? P.yellow : P.text, fontWeight: isOverdue || isSoon ? 600 : 400, fontSize: 13 }}>
                      {p.proposalDueDate || "—"}
                      {isOverdue && <span style={{ marginLeft: 4, fontSize: 10 }}>OVERDUE</span>}
                      {isSoon && <span style={{ marginLeft: 4, fontSize: 10 }}>SOON</span>}
                    </td>
                    <td>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <ProgressBar pct={p.probability ?? 50} color={P.accent} />
                        <span style={{ fontSize: 12, color: P.textMuted, minWidth: 30 }}>{p.probability ?? 50}%</span>
                      </div>
                    </td>
                    <td style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 13 }}>{fee > 0 ? fmt(fee) : "—"}</td>
                    <td style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 13, color: P.green }}>{fee > 0 ? fmt(weighted) : "—"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

// Save status indicator component
function SaveBadge({ status, lastSaved, onRetry }) {
  const cfg = {
    idle:    { color: P.textDim,    icon: "",   text: "" },
    saving:  { color: P.accentLight,icon: "⏳", text: "Saving…" },
    saved:   { color: P.green,      icon: "✓",  text: lastSaved ? `Saved ${lastSaved}` : "Saved" },
    error:   { color: P.red,        icon: "✗",  text: "Save failed" },
    loading: { color: P.accentLight,icon: "⏳", text: "Loading from SharePoint…" },
  }[status] || { color: P.textDim, icon: "", text: "" };

  if (!cfg.text) return null;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: cfg.color }}>
      <span>{cfg.icon}</span>
      <span>{cfg.text}</span>
      {status === "error" && onRetry && (
        <button onClick={onRetry}
          style={{ background: "none", border: "none", color: P.red, cursor: "pointer", fontSize: 11, textDecoration: "underline", padding: 0 }}>
          Retry
        </button>
      )}
    </div>
  );
}

function App() {
  const [projects, setProjects] = useState([]);
  const [view, setView] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [filterPM, setFilterPM] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [filterContract, setFilterContract] = useState("All");
  const [appStatus, setAppStatus] = useState("loading"); // loading | idle | saving | saved | error
  const [lastSaved, setLastSaved] = useState(null);
  const [loadError, setLoadError] = useState(null);
  const [pendingSave, setPendingSave] = useState(null); // debounce timer ref stored in state

  const [clientId, setClientId] = useState(() => localStorage.getItem("setty_pms_client_id") || "");
  const [clientIdInput, setClientIdInput] = useState(clientId);
  const [shareUrl, setShareUrl] = useState(() => localStorage.getItem("setty_pms_share_url") || "");
  const [shareUrlInput, setShareUrlInput] = useState(shareUrl);
  const [showSetup, setShowSetup] = useState(!clientId);

  // ── Initial load from SharePoint via Graph ──
  useEffect(() => {
    if (!clientId) return; // wait until client ID is configured
    setAppStatus("loading");
    loadState()
      .then(s => {
        if (s?.projects) setProjects(s.projects);
        setAppStatus("idle");
      })
      .catch(e => {
        console.error("Load failed:", e);
        if (e.message === "NO_CLIENT_ID") { setShowSetup(true); setAppStatus("idle"); return; }
        // Auth errors — prompt sign-in
        if (e.message?.includes("401") || e.message?.includes("403") || e.message?.includes("interaction_required")) {
          getToken(true).then(() => loadState()).then(s => {
            if (s?.projects) setProjects(s.projects);
            setAppStatus("idle");
          }).catch(e2 => { setLoadError(e2.message); setAppStatus("error"); });
          return;
        }
        setLoadError(e.message || "Could not load data from SharePoint");
        setAppStatus("error");
      });
  }, [clientId]);

  function saveClientId() {
    const id = clientIdInput.trim();
    if (!id) return;
    localStorage.setItem("setty_pms_client_id", id);
    const su = shareUrlInput.trim();
    if (su) localStorage.setItem("setty_pms_share_url", su);
    else localStorage.removeItem("setty_pms_share_url");
    setClientId(id);
    setShareUrl(su);
    setShowSetup(false);
  }

  // ── Debounced auto-save — fires 2s after last change ──
  useEffect(() => {
    if (appStatus === "loading") return;
    // Clear any pending save
    if (pendingSave) clearTimeout(pendingSave);
    const timer = setTimeout(() => {
      performSave({ projects });
    }, 2000);
    setPendingSave(timer);
    return () => clearTimeout(timer);
  }, [projects]);

  async function performSave(state) {
    setAppStatus("saving");
    try {
      await saveState(state);
      const now = new Date();
      setLastSaved(`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`);
      setAppStatus("saved");
      // Return to idle after 3s
      setTimeout(() => setAppStatus(s => s === "saved" ? "idle" : s), 3000);
    } catch(e) {
      console.error("Save failed:", e);
      setAppStatus("error");
    }
  }

  function manualRetry() {
    performSave({ projects });
  }

  function updateProject(updated) {
    setProjects(prev => prev.map(p => p.id === updated.id ? updated : p));
  }

  function addProject() {
    const p = newProject();
    setProjects(prev => [p, ...prev]);
    setView(`project:${p.id}`);
  }

  const allPMs = useMemo(() => ["All", ...new Set(projects.map(p => p.projectManager).filter(Boolean))], [projects]);

  const displayedProjects = useMemo(() => {
    const archived = view === "archive";
    return projects.filter(p => {
      if (view === "pipeline") return !p.archived && isPipeline(p);
      if (p.archived !== archived) return false;
      if (!archived && !isAwarded(p)) return false; // awarded-only in list view
      if (search && !p.name.toLowerCase().includes(search.toLowerCase()) && !(p.projectNumber || "").toLowerCase().includes(search.toLowerCase())) return false;
      if (filterPM !== "All" && p.projectManager !== filterPM) return false;
      if (filterStatus !== "All" && p.status !== filterStatus) return false;
      if (filterContract !== "All" && p.contractStatus !== filterContract) return false;
      return true;
    });
  }, [projects, view, search, filterPM, filterStatus, filterContract]);

  const viewingProject = view.startsWith("project:") ? projects.find(p => p.id === view.split(":")[1]) : null;

  // ── Setup screen (first run — needs Azure App Client ID) ──
  if (showSetup) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: P.bg, padding: 32 }}>
      <style>{CSS}</style>
      <div style={{ width: "100%", maxWidth: 520 }}>
        <div style={{ fontWeight: 800, fontSize: 22, letterSpacing: "-.02em", marginBottom: 24 }}>
          <span style={{ color: P.accent }}>SETTY</span>
          <span style={{ color: P.textMuted, fontWeight: 400 }}> · PMS</span>
        </div>
        <div style={{ background: P.card, border: `1px solid ${P.border}`, borderRadius: 12, padding: 28 }}>
          <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 8 }}>One-time setup</div>
          <div style={{ color: P.textMuted, fontSize: 13, marginBottom: 20, lineHeight: 1.6 }}>
            No admin consent required. Uses only standard Microsoft 365 permissions that every Setty employee already has.
          </div>

          {/* Step 1: Azure App Registration */}
          <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, padding: 16, marginBottom: 16, fontSize: 12, lineHeight: 1.9 }}>
            <div style={{ fontWeight: 700, color: P.accentLight, marginBottom: 8 }}>Step 1 — Azure App Registration (one person, 5 min)</div>
            <div style={{ color: P.textMuted }}>
              1. Go to <strong style={{ color: P.accentLight }}>portal.azure.com</strong> → Azure Active Directory → App registrations → New registration<br/>
              2. Name: <strong style={{ color: P.text }}>Setty PMS</strong> · Supported accounts: <strong style={{ color: P.text }}>This org only</strong><br/>
              3. Redirect URI: choose <strong style={{ color: P.text }}>Single-page application (SPA)</strong> → paste the OneDrive URL of this HTML file<br/>
              4. API permissions → Add: <strong style={{ color: P.text }}>Files.ReadWrite.All · Calendars.ReadWrite.Shared · User.Read</strong><br/>
              &nbsp;&nbsp;&nbsp;⚠ Do NOT add Sites.ReadWrite.All — the 3 above require no admin consent<br/>
              5. Copy the <strong style={{ color: P.text }}>Application (client) ID</strong> from Overview and paste below
            </div>
          </div>

          <Field label="Azure App Client ID">
            <input value={clientIdInput} onChange={e => setClientIdInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && saveClientId()}
              placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
              style={{ width: "100%", fontFamily: "JetBrains Mono, monospace" }} />
          </Field>

          {/* Step 2: Shared data file */}
          <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, padding: 16, margin: "16px 0", fontSize: 12, lineHeight: 1.9 }}>
            <div style={{ fontWeight: 700, color: P.accentLight, marginBottom: 8 }}>Step 2 — Shared data file (skip if you are the first user)</div>
            <div style={{ color: P.textMuted }}>
              The first person to set up the app creates the data file automatically in their OneDrive.<br/>
              To share with the team:<br/>
              1. Open OneDrive → find <strong style={{ color: P.text }}>SettyPMS/setty-pms-data.json</strong><br/>
              2. Right-click → Share → Copy link (set to "People in Setty with the link can edit")<br/>
              3. Paste that link below — all team members paste it when they set up their browser<br/>
              <em style={{ color: P.textDim }}>Leave blank if you are the first user setting this up.</em>
            </div>
          </div>

          <Field label="Shared data file link (optional — from OneDrive share)">
            <input value={shareUrlInput} onChange={e => setShareUrlInput(e.target.value)}
              placeholder="https://setty-my.sharepoint.com/:u:/p/..."
              style={{ width: "100%" }} />
          </Field>

          <div style={{ marginTop: 16, display: "flex", gap: 8 }}>
            <Btn onClick={saveClientId} disabled={!clientIdInput.trim()}>Save & Sign In with Microsoft</Btn>
            {clientId && <Btn variant="ghost" onClick={() => setShowSetup(false)}>Cancel</Btn>}
          </div>
          {clientId && (
            <div style={{ marginTop: 10, fontSize: 11, color: P.green }}>✓ Already configured — click Cancel to continue or update settings above</div>
          )}
        </div>

        <div style={{ marginTop: 16, fontSize: 11, color: P.textDim, textAlign: "center" }}>
          3 permissions · No admin consent · Data stays in your Microsoft 365 tenant
        </div>
      </div>
    </div>
  );

  // ── Loading screen ──
  if (appStatus === "loading") return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: P.bg, gap: 16 }}>
      <style>{CSS}</style>
      <div style={{ fontWeight: 800, fontSize: 22, letterSpacing: "-.02em" }}>
        <span style={{ color: P.accent }}>SETTY</span>
        <span style={{ color: P.textMuted, fontWeight: 400 }}> · PMS</span>
      </div>
      <div style={{ color: P.textMuted, fontSize: 13 }}>⏳ Signing in to Microsoft & loading from SharePoint…</div>
    </div>
  );

  // ── Load error screen — show app anyway with empty state ──
  const loadErrorBanner = loadError ? (
    <div style={{ background: P.redDim, border: `1px solid ${P.red}`, borderRadius: 8, padding: "10px 16px", margin: "16px 32px", fontSize: 12, color: P.red, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <span>⚠ Could not load from SharePoint: {loadError}. Working in offline mode — changes will not be shared with the team until save succeeds.</span>
      <button onClick={() => setLoadError(null)} style={{ background: "none", border: "none", color: P.red, cursor: "pointer", fontSize: 16 }}>✕</button>
    </div>
  ) : null;

  return (
    <div style={{ minHeight: "100vh", background: P.bg }}>
      <style>{CSS}</style>

      {/* ── Nav bar ── */}
      <div style={{ background: P.card, borderBottom: `1px solid ${P.border}`, padding: "0 32px", display: "flex", alignItems: "center", gap: 24, height: 54, position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ fontWeight: 800, fontSize: 16, letterSpacing: "-.02em" }}>
          <span style={{ color: P.accent }}>SETTY</span>
          <span style={{ color: P.textMuted, fontWeight: 400 }}> · PMS</span>
        </div>
        {[{ label: "Dashboard", key: "dashboard" }, { label: "Pipeline", key: "pipeline" }, { label: "Projects", key: "list" }, { label: "Team WBS", key: "teamwbs" }, { label: "Calendar", key: "calendar" }, { label: "Archive", key: "archive" }].map(({ label, key }) => (
          <button key={key} onClick={() => setView(key)}
            style={{ background: "none", border: "none", cursor: "pointer", color: (view === key || (view.startsWith("project:") && key === "list")) ? P.accentLight : P.textMuted, fontWeight: view === key ? 600 : 400, fontSize: 13, padding: "4px 0", borderBottom: view === key ? `2px solid ${P.accentLight}` : "2px solid transparent" }}>
            {label}
          </button>
        ))}
        <div style={{ flex: 1 }} />
        <SaveBadge status={appStatus} lastSaved={lastSaved} onRetry={manualRetry} />
        <button onClick={() => setShowSetup(true)} title="Settings / Azure setup"
          style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 16, padding: "0 4px" }}>⚙</button>
        <Btn small onClick={addProject}>+ New Project</Btn>
      </div>

      {loadErrorBanner}

      {view === "dashboard" && <Dashboard projects={projects} onNavigateToProject={id => setView(`project:${id}`)} onUpdateProject={updateProject} />}
      {view === "calendar" && <TeamCalendar projects={projects} onNavigateToProject={id => setView(`project:${id}`)} />}
      {view === "teamwbs" && <TeamWBSView projects={projects} onNavigateToProject={id => setView(`project:${id}`)} />}

      {view === "pipeline" && (
        <PipelineDashboard projects={projects} onNavigateToProject={id => setView(`project:${id}`)} onAddProject={() => { const p = newProject(); setProjects(prev => [p, ...prev]); setView(`project:${p.id}`); }} />
      )}

      {(view === "list" || view === "archive") && (
        <div style={{ padding: "24px 32px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 20, fontWeight: 800 }}>{view === "archive" ? "Archived Projects" : "Awarded Projects"}</div>
            <Btn small onClick={addProject}>+ New Project</Btn>
          </div>
          <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
            <input placeholder="Search by name or number…" value={search} onChange={e => setSearch(e.target.value)} style={{ width: 260 }} />
            <select value={filterPM} onChange={e => setFilterPM(e.target.value)}>
              {allPMs.map(pm => <option key={pm}>{pm}</option>)}
            </select>
            <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
              {["All", ...PIPELINE_STATUSES, ...PROJECT_STATUSES].map(s => <option key={s}>{s}</option>)}
            </select>
            {view === "list" && (
              <select value={filterContract} onChange={e => setFilterContract(e.target.value)}>
                <option value="All">All Contract Statuses</option>
                {CONTRACT_STATUSES.map(s => <option key={s}>{s}</option>)}
              </select>
            )}
          </div>
          {displayedProjects.length === 0 ? (
            <div style={{ color: P.textDim, textAlign: "center", padding: 60 }}>
              No projects found.{" "}
              <button onClick={addProject} style={{ color: P.accent, background: "none", border: "none", cursor: "pointer" }}>Create one</button>
            </div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(320px,1fr))", gap: 16 }}>
              {displayedProjects.map(p => <ProjectCard key={p.id} project={p} onClick={() => setView(`project:${p.id}`)} />)}
            </div>
          )}
        </div>
      )}

      {viewingProject && (
        <ProjectDetail project={viewingProject} onUpdate={updateProject} onBack={() => setView("list")} />
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
