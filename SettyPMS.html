function uid() { return Math.random().toString(36).slice(2,10); }

function addWorkDays(startDate, days) {
  let d = new Date(startDate);
  let count = 0;
  while (count < days) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  return d;
}


function downloadCSV(filename, headers, rows) {
  const esc = v => {
    if (v === null || v === undefined) return "";
    const s = String(v);
    return s.includes(",") || s.includes('"') || s.includes("\n") ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const row = arr => arr.map(esc).join(",");
  const csv = [row(headers), ...rows.map(r => row(r))].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function fmt(n) {
  if (n == null || isNaN(n)) return "$0";
  return "$" + Math.round(n).toLocaleString();
}

function fmtPct(n) { return (n * 100).toFixed(1) + "%"; }

function getFeePercent(constructionCost, projectType) {
  const row = FEE_PERCENT_TABLE.find(r => constructionCost >= r.min && constructionCost < r.max)
    || FEE_PERCENT_TABLE[FEE_PERCENT_TABLE.length - 1];
  return row.pct[projectType] || 0.06;
}

function calcConstructionCost(sqft, category, manualCost, manualCostPerSF) {
  if (manualCost && manualCost > 0) return manualCost;
  const costPerSF = (manualCostPerSF && manualCostPerSF > 0) ? manualCostPerSF : (RS_MEANS_COST_PER_SF[category] || 300);
  return sqft * costPerSF;
}

// Returns effective discipline percentages — overrides merged on top of defaults
function getEffectiveDisciplines(project) {
  const defaults = DISCIPLINE_PERCENTAGES[project.projectType] || {};
  const overrides = project.disciplinePercentOverrides || {};
  const result = {};
  for (const disc of Object.keys(defaults)) {
    result[disc] = overrides[disc] != null ? overrides[disc] : defaults[disc];
  }
  return result;
}

function calcAEFee(constructionCost, project) {
  // Total AE fee = construction cost × fee percentage from table
  const pct = getFeePercent(constructionCost, project.projectType);
  return constructionCost * pct;
}

function calcSettyFee(constructionCost, project) {
  // Setty fee = AE fee × sum of discipline percentages (each disc % is a share of AE fee)
  const aeFee = calcAEFee(constructionCost, project);
  const discs = getEffectiveDisciplines(project);
  const settyShare = Object.values(discs).reduce((a, b) => a + b, 0);
  return aeFee * settyShare;
}

function countWorkDays(startDate, endDate) {
  if (!startDate || !endDate) return 0;
  let sd = new Date(startDate + "T00:00:00");
  const ed = new Date(endDate + "T00:00:00");
  if (ed <= sd) return 0;
  let count = 0;
  const d = new Date(sd);
  while (d <= ed) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
    d.setDate(d.getDate() + 1);
  }
  return count;
}

function buildPhaseFees(settyFee, phases) {
  const total = phases.filter(p => p.billable).reduce((a, p) => a + p.pct, 0);
  return phases.map(p => {
    const calcedFee = p.billable && total > 0 ? settyFee * (p.pct / total) : 0;
    const fee = (p.billable && p.manualFee > 0) ? p.manualFee : calcedFee;
    return { ...p, fee, calcedFee };
  });
}

function buildSchedule(startDate, phases) {
  let cursor = startDate ? new Date(startDate + "T00:00:00") : new Date();
  const GAP_DAYS = 10;
  return phases.map(ph => {
    if (!ph.billable || ph.fee === 0) return { ...ph, startDate: null, endDate: null };
    const durationWD = PHASE_DURATIONS_WD[ph.code] || 30;
    const sd = new Date(cursor);
    const ed = addWorkDays(sd, durationWD);
    cursor = addWorkDays(ed, GAP_DAYS);
    const sdStr = sd.getFullYear() + "-" + String(sd.getMonth()+1).padStart(2,"0") + "-" + String(sd.getDate()).padStart(2,"0");
    const edStr = ed.getFullYear() + "-" + String(ed.getMonth()+1).padStart(2,"0") + "-" + String(ed.getDate()).padStart(2,"0");
    return { ...ph, startDate: sdStr, endDate: edStr };
  });
}

// Milestone status auto-derived from pctComplete
function milestoneStatus(pct) {
  if (!pct || pct === 0) return "Not Started";
  if (pct >= 100) return "Completed";
  return "In Progress";
}

// Phase pctComplete is derived from its billable milestones
function getPhasePctFromMilestones(phase, milestones) {
  // Exclude CO milestones (coId set) — they use phase "__CO__" but exclude by coId too for safety
  const matching = milestones.filter(m => m.type === "billable" && m.phase === phase.code && !m.cancelled && !m.coId);
  if (!matching.length) return phase.pctComplete || 0;
  // Fee-weighted average: a $200K milestone at 100% shouldn't be dragged down by a $5K CO at 90%
  const totalFee = matching.reduce((a, m) => a + (m.fee || 0), 0);
  if (totalFee > 0) {
    const weighted = matching.reduce((a, m) => a + (m.pctComplete || 0) * (m.fee || 0), 0);
    return Math.round(weighted / totalFee);
  }
  // No fees set — simple average
  return Math.round(matching.reduce((a, m) => a + (m.pctComplete || 0), 0) / matching.length);
}

function projectOverallPct(project) {
  if (!project.feeScheduleFinalized || !project.phases?.length) return 0;
  const billable = project.phases.filter(p => p.billable && p.fee > 0);
  if (!billable.length) return 0;
  const milestones = project.milestones || [];
  const totalFee = billable.reduce((a, p) => a + p.fee, 0);
  const earned = billable.reduce((a, p) => {
    const pct = getPhasePctFromMilestones(p, milestones);
    return a + p.fee * pct / 100;
  }, 0);
  return totalFee > 0 ? Math.round(earned / totalFee * 100) : 0;
}

function getCurrentUser() {

async function getToken(forceRefresh = false, useTeamsScopes = false) {
  const app = await getMsalApp();
  const scopes = useTeamsScopes ? TEAMS_SCOPES : GRAPH_SCOPES;
  const accounts = app.getAllAccounts();
  if (accounts.length > 0) {
    if (!forceRefresh) {
      try {
        const r = await app.acquireTokenSilent({ scopes, account: accounts[0], forceRefresh: false });
        return r.accessToken;
      } catch(e) { /* fall through */ }
    }
    const r = await app.acquireTokenPopup({ scopes, account: accounts[0], prompt: "none" }).catch(() =>
      app.acquireTokenPopup({ scopes, account: accounts[0] })
    );
    return r.accessToken;
  }
  // No account — sign in with User.Read only to avoid consent popup
  const loginResult = await app.loginPopup({ scopes: LOGIN_SCOPES });
  try {
    const r = await app.acquireTokenSilent({ scopes: GRAPH_SCOPES, account: loginResult.account });
    return r.accessToken;
  } catch(e) {
    const r = await app.acquireTokenPopup({ scopes: GRAPH_SCOPES, account: loginResult.account });
    return r.accessToken;
  }
}

async function graphFetch(method, path, body, token) {
  const t = token || await getToken();
  const isBytes = body instanceof Uint8Array;

  const headers = { Authorization: "Bearer " + t };
  let reqBody;
  if (body !== undefined) {
    if (isBytes) {
      headers["Content-Type"] = "application/octet-stream";
      reqBody = body;
    } else {
      headers["Content-Type"] = "application/json";
      reqBody = JSON.stringify(body);
    }
  }



  const makeReq = (tok) => fetch(GRAPH_BASE + path, {
    method,
    headers: { ...headers, Authorization: "Bearer " + tok },
    ...(reqBody !== undefined ? { body: reqBody } : {}),
  });

  let resp = await makeReq(t);
  if (resp.status === 401) {
    const fresh = await getToken(true);
    resp = await makeReq(fresh);
  }
  if (resp.status === 204 || resp.status === 202) return null;
  if (resp.status === 404) return null;
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error("Graph " + resp.status + ": " + txt.slice(0, 300));
  }
  return resp.json();
}

async function saveState(state) {
  const payload = {
    projects:       state.projects       || [],
    term_contracts: state.termContracts  || [],
    staff:          state.staff          || [],
    clients:        state.clients        || [],
    updated_at:     new Date().toISOString(),
  };
  // PATCH (UPDATE) is the correct operation for the always-existing singleton row.
  // It only requires an UPDATE policy in Supabase RLS — no INSERT policy needed.
  // Falls back to POST (upsert) only if the row genuinely does not exist yet.
  const patched = await sbFetch("PATCH", "/rest/v1/pms_data?id=eq.singleton", payload);
  if (patched === null || (Array.isArray(patched) && patched.length === 0)) {
    // Row doesn't exist yet — create it for the first time
    await sbFetch("POST", "/rest/v1/pms_data", { id: "singleton", ...payload });
  }
}

// Cache the NYC Shared Calendar ID so we only look it up once per session
let _nycCalendarId = null;

async function getNYCCalendarId() {
  if (_nycCalendarId) return _nycCalendarId;
  // Check localStorage cache first
  const cached = localStorage.getItem("setty_pms_cal_id");
  if (cached) { _nycCalendarId = cached; return _nycCalendarId; }
  // Fetch all calendars for the signed-in user
  try {
    const data = await graphFetch("GET", "/me/calendars?$top=50");
    const cals = data?.value || [];

    // Find NYC Shared Calendar by name (case-insensitive partial match)
    const nyc = cals.find(c => c.name.toLowerCase().includes("nyc") || c.name.toLowerCase().includes("shared"));
    if (nyc) {
      _nycCalendarId = nyc.id;
      localStorage.setItem("setty_pms_cal_id", nyc.id);

      return _nycCalendarId;
    }

    return null;
  } catch(e) {

    return null;
  }
}

async function createOrUpdateCalendarEvent(milestone, projectName, projectNumber, existingEventId) {
  if (!milestone.dueDate) return { success: false, error: "No due date" };

  // Compute end date (next day — Outlook all-day events use exclusive end)
  const endDateObj = new Date(milestone.dueDate + "T12:00:00");
  endDateObj.setDate(endDateObj.getDate() + 1);
  const endDate = endDateObj.toISOString().slice(0, 10);

  const prefix = projectNumber ? "[" + projectNumber + "] " : "";
  const subject = prefix + projectName + " - " + milestone.name;

  const eventBody = {
    subject: subject,
    isAllDay: true,
    start: { dateTime: milestone.dueDate + "T00:00:00", timeZone: "Eastern Standard Time" },
    end:   { dateTime: endDate + "T00:00:00",           timeZone: "Eastern Standard Time" },
  };



  // Build the correct calendar path
  async function calPath(eventId) {
    const calId = await getNYCCalendarId();
    const base = calId ? "/me/calendars/" + calId : "/me";
    if (eventId) return base + "/events/" + eventId;
    return base + "/events";
  }

  const calId = await getNYCCalendarId();
  const postedToShared = !!calId;

  try {
    let result;
    if (existingEventId) {
      const patchPath = await calPath(existingEventId);
      result = await graphFetch("PATCH", patchPath, eventBody);
      if (!result) result = await graphFetch("POST", await calPath(null), eventBody);
    } else {
      result = await graphFetch("POST", await calPath(null), eventBody);
    }
    return {
      success: true,
      eventId: result?.id,
      warning: postedToShared ? null : "Added to your personal calendar — NYC Shared Calendar was not found in your account. Ask Sara to check sharing permissions.",
    };
  } catch(e) {
    return { success: false, error: e.message };
  }
}

async function createNoteCalendarEvent(note, project) {
  const today = new Date().toISOString().slice(0, 10);
  const prefix = project.projectNumber ? "[" + project.projectNumber + "] " : "";
  const catLabel = note.category !== "General" ? " [" + note.category + "]" : "";
  const subject = prefix + (project.name || "Project") + " – Note" + catLabel;
  const bodyPreview = note.body.length > 200 ? note.body.slice(0, 200) + "…" : note.body;

  const eventBody = {
    subject,
    isAllDay: true,
    start: { dateTime: today + "T00:00:00", timeZone: "Eastern Standard Time" },
    end:   { dateTime: (() => { const d = new Date(today + "T12:00:00"); d.setDate(d.getDate() + 1); return d.toISOString().slice(0, 10); })() + "T00:00:00", timeZone: "Eastern Standard Time" },
    body:  { contentType: "text", content: bodyPreview + "\n\nLogged by: " + (note.author || "—") },
    categories: ["Project Note"],
  };

  try {
    const calId = await getNYCCalendarId();
    const path = calId ? "/me/calendars/" + calId + "/events" : "/me/events";
    const result = await graphFetch("POST", path, eventBody);
    return { success: true, eventId: result?.id };
  } catch(e) {
    return { success: false, error: e.message };
  }
}

async function createMilestoneSpFolder(project, milestone) {
  const { driveId } = await resolveSpIds();
  const num  = (project.projectNumber || "").trim();
  const name = (project.name || "Unnamed Project").trim();
  const projFolderName = num ? num + " - " + name : name;
  let datePrefix = "";
  if (milestone.dueDate) {
    const d = new Date(milestone.dueDate + "T00:00:00");
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const yyyy2 = String(d.getFullYear());
    datePrefix = yyyy2 + "_" + mm + "_" + dd + " ";
  }
  const safeName = (datePrefix + (milestone.name || "Milestone")).replace(/[\\/:*?"<>|]/g, "-").trim().slice(0, 80);
  async function ensureF(parentPath, folderName) {
    try {
      await graphFetch("POST", "/drives/" + driveId + "/root:/" + encodeURIComponent(parentPath) + ":/children",
        { name: folderName, folder: {}, "@microsoft.graph.conflictBehavior": "replace" });
    } catch(e) {}
    return parentPath + "/" + folderName;
  }
  const outgoingPath = await ensureF(projFolderName, "Outgoing");
  await ensureF(outgoingPath, safeName);
  const baseUrl = "https://setty.sharepoint.com/sites/NYCProjects/Project%20Document%20Library";
  return baseUrl + "/" + encodeURIComponent(projFolderName) + "/Outgoing/" + encodeURIComponent(safeName);
}


async function createOneNoteNotebook(project) {
  // Creates a notebook in SharePoint (team-accessible) rather than personal OneDrive
  const name = [project.projectNumber, project.name].filter(Boolean).join(" — ").trim() || "Setty Project";
  const { siteId } = await resolveSpIds();
  const result = await graphFetch("POST", `/sites/${siteId}/onenote/notebooks`, { displayName: name });
  if (!result || !result.id) throw new Error("OneNote API did not return a notebook ID");
  const webUrl = result.links?.oneNoteWebUrl?.href || result.links?.oneNoteClientUrl?.href || "";
  return { id: result.id, siteId, webUrl };
}

async function createOneNotePage(notebookId, sectionName, title, htmlBody, eventDate) {
  // Use SharePoint site-scoped endpoint for team-accessible pages
  const { siteId } = await resolveSpIds();
  const baseUrl = `/sites/${siteId}/onenote`;
  // Ensure section exists
  const sectionsResp = await graphFetch("GET", `${baseUrl}/notebooks/${notebookId}/sections`);
  let section = (sectionsResp?.value || []).find(s => s.displayName === sectionName);
  if (!section) {
    section = await graphFetch("POST", `${baseUrl}/notebooks/${notebookId}/sections`, { displayName: sectionName });
    // After creation, re-fetch to get a proper section object with id
    if (!section?.id) {
      const refetch = await graphFetch("GET", `${baseUrl}/notebooks/${notebookId}/sections`);
      section = (refetch?.value || []).find(s => s.displayName === sectionName);
    }
  }
  if (!section?.id) throw new Error("Could not find or create OneNote section: " + sectionName);
  // OneNote pages API requires text/html content-type
  const token = await getToken();
  const pageHtml = `<!DOCTYPE html><html><head><title>${title}</title><meta name="created" content="${eventDate || new Date().toISOString()}" /></head><body>${htmlBody}</body></html>`;
  const res = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/onenote/sections/${section.id}/pages`, {
    method: "POST",
    headers: { "Authorization": "Bearer " + token, "Content-Type": "text/html" },
    body: pageHtml,
  });
  if (!res.ok) {
    const errText = await res.text();
    throw new Error("OneNote page error " + res.status + ": " + errText.slice(0, 300));
  }
  const page = await res.json();
  // Graph returns links.oneNoteWebUrl.href or links.oneNoteClientUrl.href
  const webUrl = page.links?.oneNoteWebUrl?.href
    || page.links?.oneNoteClientUrl?.href
    || page.webUrl
    || "";
  return { id: page.id, webUrl };
}

async function createSharePointFolder(project) {
  const num  = (project.projectNumber || "").trim();
  const name = (project.name || "Unnamed Project").trim();
  if (!num && !name) throw new Error("Project must have a number or name before creating a folder.");
  const folderName = num ? num + " - " + name : name;

  const { siteId, driveId } = await resolveSpIds();

  // Check if folder already exists
  let existing = null;
  try {
    existing = await graphFetch("GET",
      "/drives/" + driveId + "/root:/" + encodeURIComponent(folderName)
    );
  } catch(e) { /* 404 = doesn't exist yet */ }

  let folderId, folderUrl;
  if (existing && existing.id) {
    folderId = existing.id;
    folderUrl = existing.webUrl;
  } else {
    // Create the project root folder
    const result = await graphFetch("POST",
      "/drives/" + driveId + "/root/children",
      { name: folderName, folder: {}, "@microsoft.graph.conflictBehavior": "rename" }
    );
    folderId = result.id;
    folderUrl = result.webUrl;
  }

  // Create standard subfolders (skip if they already exist)
  const subfolders = [
    "01 \uD83D\uDCCB Project Management",
    "02 \uD83D\uDCC4 Design Reports and Narratives",
    "03 \uD83D\uDCD0 Specifications",
    "04 \uD83C\uDFD7 Site Field Reports",
    "05 \u26A1 Electrical Design",
    "06 \uD83C\uDF21 Mechanical Design",
    "07 \uD83D\uDD27 Plumbing Design",
    "08 \uD83D\uDD25 Fire Protection Design",
  ];
  const errors = [];
  for (const sub of subfolders) {
    try {
      await graphFetch("POST",
        "/drives/" + driveId + "/items/" + folderId + "/children",
        { name: sub, folder: {} }
      );
    } catch(e) {
      errors.push(sub + ": " + e.message);
    }
  }
  if (errors.length > 0 && errors.length === subfolders.length) {
    // All subfolders failed — surface the first error so we can diagnose
    throw new Error("Subfolders failed: " + errors[0]);
  }

  return folderUrl;
}

async function getOrCreateProjectChannel(project) {
  if (project.teamsChannelId) return project.teamsChannelId;
  const displayName = ((project.projectNumber ? project.projectNumber + " | " : "") + (project.name || "Project")).slice(0, 50);
  try {
    // Use Teams scopes — acquired lazily only when Teams features are used
    const teamsToken = await getToken(false, true);
    const ch = await graphFetch("POST", `/teams/${TEAMS_TEAM_ID}/channels`, {
      displayName,

async function postTeamsCard(channelId, card) {
  if (!channelId) return;
  const attachmentId = (typeof crypto !== "undefined" && crypto.randomUUID) ? crypto.randomUUID() : Date.now().toString(16);
  try {
    // Use Teams scopes — acquired lazily only when Teams features are used
    const teamsToken = await getToken(false, true);
    await graphFetch("POST", `/teams/${TEAMS_TEAM_ID}/channels/${channelId}/messages`, {
      body: { contentType: "html", content: `<attachment id="${attachmentId}"></attachment>` },
      attachments: [{ id: attachmentId, contentType: "application/vnd.microsoft.card.adaptive", content: JSON.stringify(card) }],
    }, teamsToken);
  } catch(e) {

  }
}

// Diff old vs new project and fire cards for anything that changed.
// Called from updateProject whenever teamsNotificationsEnabled is true.
async function teamsNotify(oldProject, updated) {
  if (!updated.teamsNotificationsEnabled || !updated.teamsChannelId) return;
  const label = (updated.projectNumber ? updated.projectNumber + " · " : "") + (updated.name || "");
  const user  = getCurrentUser();
  const ch    = updated.teamsChannelId;
  const cards = [];

  const diff = (oldArr, newArr, onAdd, onChange) => {
    (newArr || []).forEach(n => {
      const o = (oldArr || []).find(x => x.id === n.id);
      if (!o)                          cards.push(onAdd(n));
      else if (onChange && onChange(o, n)) cards.push(onChange(o, n));
    });
  };

  // Milestones
  diff(oldProject?.milestones, updated.milestones,
    m => buildTeamsCard("milestone_added", { project: label, facts: [
      { title: "Milestone", value: m.name },
      { title: "Due Date",  value: m.dueDate || "TBD" },
      { title: "Type",      value: m.type || "Non-Billable" },
      { title: "Phase",     value: m.phase || "—" },
      { title: "Added By",  value: user },
    ]}),
    (o, m) => {
      if (o.dueDate === m.dueDate && o.name === m.name && o.phase === m.phase) return null;
      const f = [{ title: "Milestone", value: m.name }];
      if (o.name    !== m.name)    f.push({ title: "Name",     value: `${o.name} → ${m.name}` });
      if (o.dueDate !== m.dueDate) f.push({ title: "Due Date", value: `${o.dueDate||"—"} → ${m.dueDate||"—"}` });
      if (o.phase   !== m.phase)   f.push({ title: "Phase",    value: `${o.phase||"—"} → ${m.phase||"—"}` });
      f.push({ title: "Updated By", value: user });
      return buildTeamsCard("milestone_changed", { project: label, facts: f });
    }
  );

  // RFIs
  diff(oldProject?.rfis, updated.rfis,
    r => buildTeamsCard("rfi_added", { project: label, facts: [
      { title: "RFI #",      value: r.number || "—" },
      { title: "Title",      value: r.title  || "—" },
      { title: "Discipline", value: r.discipline || "—" },
      { title: "From",       value: r.from || "—" },
      { title: "Due",        value: r.dueDate || "TBD" },
      { title: "Logged By",  value: user },
    ]}),
    (o, r) => o.status === r.status ? null : buildTeamsCard("rfi_status", { project: label, facts: [
      { title: "RFI #",      value: r.number || "—" },
      { title: "Title",      value: r.title  || "—" },
      { title: "Status",     value: `${o.status||"—"} → ${r.status}` },
      { title: "Updated By", value: user },
    ]})
  );

  // Submittals
  diff(oldProject?.submittals, updated.submittals,
    s => buildTeamsCard("submittal_added", { project: label, facts: [
      { title: "Submittal #",  value: s.number || "—" },
      { title: "Spec Section", value: s.specSection || "—" },
      { title: "Description",  value: s.description || "—" },
      { title: "Contractor",   value: s.contractor || "—" },
      { title: "Due",          value: s.dueDate || "TBD" },
    ]}),
    (o, s) => o.status === s.status ? null : buildTeamsCard("submittal_status", { project: label, facts: [
      { title: "Submittal #",  value: s.number || "—" },
      { title: "Description",  value: s.description || "—" },
      { title: "Status",       value: `${o.status||"—"} → ${s.status}` },
      { title: "Updated By",   value: user },
    ]})
  );

  // Change Orders
  diff(oldProject?.changeOrders, updated.changeOrders,
    co => buildTeamsCard("co_added", { project: label, facts: [
      { title: "CO #",        value: co.number || "—" },
      { title: "Description", value: co.description || "—" },
      { title: "Amount",      value: co.amount != null ? "$" + Number(co.amount).toLocaleString() : "—" },
      { title: "Status",      value: co.status || "Pending" },
    ]}),
    (o, co) => (o.status !== co.status && co.status === "Approved")
      ? buildTeamsCard("co_approved", { project: label, facts: [
          { title: "CO #",          value: co.number || "—" },
          { title: "Description",   value: co.description || "—" },
          { title: "Amount",        value: co.amount != null ? "$" + Number(co.amount).toLocaleString() : "—" },
          { title: "Date Approved", value: co.dateApproved || "—" },
          { title: "Approved By",   value: user },
        ]})
      : null
  );

  // Team Members
  diff(oldProject?.teamMembers, updated.teamMembers,
    m => buildTeamsCard("team_added", { project: label, facts: [
      { title: "Name",       value: m.name || "—" },
      { title: "Role",       value: m.role || "—" },
      { title: "Discipline", value: (m.disciplines || []).join(", ") || "—" },
      { title: "Added By",   value: user },
    ]}),
    null
  );

  // Post sequentially to avoid rate limits
  for (const card of cards.filter(Boolean)) {
    await postTeamsCard(ch, card);
  }
}

// ── Save email + attachments to SharePoint /Emails subfolder ──────────────────
async function saveEmailToSharePoint(email, project, liveBodyHtml) {
  const folderUrl = project.projectFolderUrl;
  if (!folderUrl) throw new Error("No SharePoint project folder. Create one on the Overview tab first.");
  const { driveId } = await resolveSpIds();

  // Build folder name: YYYY_MM_DD Subject
  const d = new Date(email.date);
  const dd   = String(d.getDate()).padStart(2, "0");
  const mm   = String(d.getMonth() + 1).padStart(2, "0");
  const yyyy = d.getFullYear();
  const safeSubject = (email.subject || "No Subject")
    .replace(/[\\/:*?"<>|]/g, "-").replace(/\s+/g, " ").trim().slice(0, 70);
  const emailFolderName = yyyy + "_" + mm + "_" + dd + " " + safeSubject;

  // Get project folder name from stored URL
  const urlParts = folderUrl.split("/");
  const projectFolderName = decodeURIComponent(urlParts[urlParts.length - 1]);

  // Ensure folder exists (POST with conflictBehavior:replace is idempotent)
  async function ensureFolder(parentPath, name) {
    try {
      await graphFetch("POST",
        "/drives/" + driveId + "/root:/" + encodeURIComponent(parentPath) + ":/children",
        { name, folder: {}, "@microsoft.graph.conflictBehavior": "replace" }
      );
    } catch(e) { /* 409 conflict = already exists, fine */ }
    return parentPath + "/" + name;
  }

  const emailsFolder = await ensureFolder(projectFolderName, "Emails");
  await ensureFolder(emailsFolder, emailFolderName);
  const targetPath = emailsFolder + "/" + emailFolderName;

  const token = await getToken();

  async function uploadFile(fileName, fileContent, mimeType) {
    const safeName = fileName.replace(/[\\/:*?"<>|]/g, "-").trim();
    const path = "/drives/" + driveId + "/root:/" +
      encodeURIComponent(targetPath) + "/" + encodeURIComponent(safeName) + ":/content";
    const resp = await fetch("https://graph.microsoft.com/v1.0" + path, {
      method: "PUT",
      headers: { Authorization: "Bearer " + token, "Content-Type": mimeType },
      body: fileContent,
    });
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error("Upload failed (" + resp.status + "): " + errText.slice(0, 200));
    }
    return await resp.json();
  }

  // 1. Save email as HTML
  const header = "<div style='font-family:sans-serif;font-size:12px;color:#333;padding:12px 16px;border-bottom:1px solid #ddd;margin-bottom:16px'>"
    + "<strong>Subject:</strong> " + (email.subject || "") + "<br>"
    + "<strong>From:</strong> " + (email.from || "") + (email.fromAddress ? " &lt;" + email.fromAddress + "&gt;" : "") + "<br>"
    + "<strong>Date:</strong> " + new Date(email.date).toLocaleString() + "<br>"
    + (email.to ? "<strong>To:</strong> " + email.to + "<br>" : "")
    + (email.cc ? "<strong>CC:</strong> " + email.cc + "<br>" : "")
    + "</div>";
  const fullHtml = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>" + (email.subject || "Email") + "</title></head><body>"
    + header + (liveBodyHtml || email.bodyText || "(No body content)") + "</body></html>";
  await uploadFile("email.html", fullHtml, "text/html");

  // 2. Save attachments
  let attachCount = 0;
  if (email.hasAttachments && email.msgId) {
    try {
      const attData = await graphFetch("GET",
        "/me/messages/" + email.msgId + "/attachments", undefined, token);
      for (const att of (attData?.value || [])) {
        if (!att.contentBytes) continue;
        const binary = atob(att.contentBytes);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        await uploadFile(att.name || "attachment", bytes, att.contentType || "application/octet-stream");
        attachCount++;
      }
    } catch(e) { /* non-fatal */ }
  }
  // Build the web URL for the email subfolder
  const baseSpUrl = "https://setty.sharepoint.com/sites/NYCProjects/Project%20Document%20Library";
  const folderWebUrl = baseSpUrl + "/" + encodeURIComponent(projectFolderName) + "/Emails/" + encodeURIComponent(emailFolderName);
  return { folderName: emailFolderName, attachCount, folderWebUrl };
}


async function createOutlookDraft({ subject, bodyHtml, bodyText }) {
  const token = await getToken();
  const body = {
    subject,
    body: { contentType: "HTML", content: bodyHtml || bodyText || "" },
    toRecipients: [],
  };
  const res = await fetch("https://graph.microsoft.com/v1.0/me/messages", {
    method: "POST",
    headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || "Failed to create draft");
  }
  const msg = await res.json();
  return msg;
}

function FeeCalculator({ project, onChange }) {
  const constructionCost = calcConstructionCost(project.squareFootage, project.buildingCategory, project.manualConstructionCost, project.manualRSMeansCostPerSF);
  const effectiveDiscs = getEffectiveDisciplines(project);
  const aeFee = calcAEFee(constructionCost, project);
  const calcedFee = calcSettyFee(constructionCost, project);
  const baseFee = project.manualSettyFee > 0 ? project.manualSettyFee : calcedFee;
  const phases = project.phases || [];
  const phasedFees = buildPhaseFees(baseFee, phases);
  const defaultDiscs = DISCIPLINE_PERCENTAGES[project.projectType] || {};
  const overrides = project.disciplinePercentOverrides || {};

  function setField(field, val) {
    onChange({ ...project, [field]: val });
  }

  function setDisciplineOverride(disc, rawVal) {
    // rawVal is already divided by 100 before calling this
    const val = +rawVal;
    const newOverrides = { ...overrides };
    if (Math.abs(val - (defaultDiscs[disc] || 0)) < 0.000001) {
      delete newOverrides[disc];
    } else {
      newOverrides[disc] = val;
    }
    onChange({ ...project, disciplinePercentOverrides: newOverrides });
  }

  function clearDisciplineOverrides() {
    onChange({ ...project, disciplinePercentOverrides: {} });
  }

  function updatePhase(idx, updates) {
    const newPhases = phases.map((p, i) => i === idx ? { ...p, ...updates } : p);
    onChange({ ...project, phases: buildSchedule(project.startDate, newPhases) });
  }

  function movePhase(idx, dir) {
    const newPhases = [...phases];
    const target = idx + dir;
    if (target < 0 || target >= newPhases.length) return;
    [newPhases[idx], newPhases[target]] = [newPhases[target], newPhases[idx]];
    onChange({ ...project, phases: buildSchedule(project.startDate, newPhases) });
  }

  function addPhase() {
    const newPhases = [...phases, { id: uid(), code: `PH${phases.length + 1}`, name: "Custom Phase", pct: 0, billable: true, fee: 0, pctComplete: 0 }];
    onChange({ ...project, phases: buildSchedule(project.startDate, newPhases) });
  }

  // finalizeSchedule replaced by doLock (which also captures audit entry)

  const totalPhasePct = phases.filter(p => p.billable).reduce((a, p) => a + p.pct, 0);
  const totalPhaseFee = phasedFees.filter(p => p.billable).reduce((a, p) => a + p.fee, 0);
  const phaseFeeVar = totalPhaseFee - baseFee;
  const phaseFeeOk = Math.abs(phaseFeeVar) < 0.5;
  const discTotal = Object.values(effectiveDiscs).reduce((a, b) => a + b, 0);

  // When Setty fee is overridden, distribute baseFee proportionally across disciplines
  // using effective % as relative weights. Zero-pct disciplines get $0.
  const discFeeMap = (() => {
    const entries = Object.entries(effectiveDiscs);
    if (project.manualSettyFee > 0 || discTotal === 0) {
      // Proportional split of baseFee
      const totalWeight = entries.reduce((a, [, v]) => a + v, 0);
      if (totalWeight === 0) {
        // All zeroed — split evenly
        const even = baseFee / entries.length;
        return Object.fromEntries(entries.map(([d]) => [d, even]));
      }
      return Object.fromEntries(entries.map(([d, v]) => [d, baseFee * (v / totalWeight)]));
    }
    // Default: each disc % applied to AE fee (original behaviour)
    return Object.fromEntries(entries.map(([d, v]) => [d, aeFee * v]));
  })();
  const hasOverrides = Object.keys(overrides).length > 0;
  const calcSubs = project.feeCalculatorSubs || [];
  const totalSubFee = calcSubs.reduce((a, s) => {
    if (s.method === "pct") return a + Math.round(baseFee * (+s.pct || 0) / 100);
    return a + (+s.flatFee || 0);
  }, 0);
  const totalProjectFee = baseFee + totalSubFee;
  // Per-phase, per-sub fee: stored in project.phaseSubFees[phaseId][subId]
  // Default (when not set) = subTotal * phase.pct
  const phaseSubFees = project.phaseSubFees || {};

  function getPhaseSubFee(phaseId, sub, phase) {
    const stored = (phaseSubFees[phaseId] || {})[sub.id];
    if (stored !== undefined) return +stored;
    const subTotal = sub.method === "pct" ? Math.round(baseFee * (+sub.pct || 0) / 100) : (+sub.flatFee || 0);
    return Math.round(subTotal * (phase.pct || 0));
  }

  function setPhaseSubFee(phaseId, subId, val) {
    const newPSF = {
      ...phaseSubFees,
      [phaseId]: { ...(phaseSubFees[phaseId] || {}), [subId]: val === "" ? undefined : +val }
    };
    // Clean up undefined entries
    if (newPSF[phaseId][subId] === undefined) delete newPSF[phaseId][subId];
    onChange({ ...project, phaseSubFees: newPSF });
  }

  const [showLegend, setShowLegend] = useState(false);
  const [showLockModal, setShowLockModal] = useState(false);
  const [lockNote, setLockNote] = useState("");
  const [showAudit, setShowAudit] = useState(false);
  const auditLog = project.feeAuditLog || [];
  const [showSubPanel, setShowSubPanel] = useState(false);

  function doLock() {
    const entry = {
      id: uid(),
      action: "locked",
      user: getCurrentUser(),
      date: new Date().toISOString(),
      note: lockNote.trim(),
      settyFee: baseFee,
      totalPhaseFee,
      phases: phasedFees.filter(p => p.billable).map(p => ({ code: p.code, name: p.name, fee: p.fee })),
    };
    const finalized = buildPhaseFees(baseFee, phases);
    const scheduled = buildSchedule(project.startDate, finalized);
    const existingNonBillable = (project.milestones || []).filter(m => m.type !== "billable");
    const newBillable = scheduled.filter(p => p.billable && p.fee > 0).map(p => ({
      id: uid(), type: "billable", phase: p.code, name: p.name, fee: p.fee,
      startDate: p.startDate, dueDate: p.endDate, pctComplete: 0, notes: "",
    }));
    onChange({ ...project, phases: scheduled, feeScheduleFinalized: true,
      milestones: [...existingNonBillable, ...newBillable],
      lockedSettyFee: baseFee,
      feeAuditLog: [...auditLog, entry] });
    setShowLockModal(false);
    setLockNote("");
  }

  function doUnlock() {
    const entry = {
      id: uid(),
      action: "unlocked",
      user: getCurrentUser(),
      date: new Date().toISOString(),
      note: lockNote.trim(),
    };
    onChange({ ...project, feeScheduleFinalized: false, feeAuditLog: [...auditLog, entry] });
    setShowLockModal(false);
    setLockNote("");
  }

  const PROJECT_TYPE_LEGEND = [
    { type: "Type I", desc: "Simple, low-complexity building — single discipline, minimal coordination. Examples: storage facilities, simple warehouses, basic shell buildings." },
    { type: "Type II", desc: "Standard commercial construction — moderate complexity, common MEP systems. Examples: offices, retail, standard schools, light industrial." },
    { type: "Type III", desc: "Above-average complexity — specialized systems or multiple disciplines with coordination needs. Examples: mid-rise mixed-use, higher-ed classrooms, mid-complexity healthcare." },
    { type: "Type IV", desc: "High complexity — multiple interacting systems, strict code requirements, or specialty environments. Examples: hospitals, research buildings, data centers, airports." },
    { type: "Type V", desc: "Very high complexity — process-driven or mission-critical facilities with significant MEP intensity. Examples: pharmaceutical plants, advanced labs, clean rooms, cogen plants." },
    { type: "Type VI", desc: "Maximum complexity — highly engineered, MEP-dominant projects. Examples: semiconductor fabs, nuclear facilities, advanced research centers, specialized industrial." },
  ];

  return (
    <div>
      {project.feeScheduleFinalized ? (
        // ── LOCKED READ-ONLY VIEW ──────────────────────────────────────────
        <div>
          {/* Locked banner + actions */}
          <div style={{ background: P.greenDim, border: `1px solid ${P.green}`, color: P.green, padding: "10px 16px", borderRadius: 8, fontWeight: 600, display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
            <span>🔒 Fee Schedule Locked</span>
            <div style={{ display: "flex", gap: 8 }}>
              {auditLog.length > 0 && <Btn small variant="ghost" onClick={() => setShowAudit(v => !v)}>📋 History ({auditLog.length})</Btn>}
              <Btn small variant="ghost" onClick={() => printFeeProposal(project)}>🖨 Fee Proposal</Btn>
              <Btn small variant="danger" onClick={() => { setShowLockModal("unlock"); setLockNote(""); }}>🔓 Unlock & Edit</Btn>
            </div>
          </div>

          {/* Key figures */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 24 }}>
            {[
              { label: "Construction Cost", val: fmt(constructionCost) },
              { label: "AE Fee", val: fmt(aeFee) },
              { label: "Setty Fee (MEP+FP)", val: fmt(baseFee), highlight: true },
              { label: "Project Type", val: project.projectType, mono: false },
            ].map(({ label, val, highlight, mono }) => (
              <div key={label} style={{ background: P.bg, border: `1px solid ${highlight ? P.green : P.border}`, borderRadius: 8, padding: "12px 16px" }}>
                <div style={{ fontSize: 11, color: P.textDim, marginBottom: 4 }}>{label}</div>
                <div style={{ fontWeight: 700, fontSize: highlight ? 18 : 13, color: highlight ? P.green : P.text, fontFamily: mono !== false ? "JetBrains Mono" : "inherit" }}>{val}</div>
              </div>
            ))}
          </div>

          {/* Discipline fees */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontWeight: 700, fontSize: 12, marginBottom: 10, color: P.textDim, textTransform: "uppercase", letterSpacing: ".06em" }}>Discipline Fees</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 8 }}>
              {Object.entries(defaultDiscs).map(([disc, defaultPct]) => {
                const effective = effectiveDiscs[disc] ?? defaultPct;
                const feeAmt = discFeeMap[disc] ?? 0;
                const isOverridden = overrides[disc] != null;
                return (
                  <div key={disc} style={{ background: P.card, border: `1px solid ${isOverridden ? P.yellow : P.border}`, borderRadius: 8, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 13 }}>{disc}</span>
                    <span style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: isOverridden ? P.yellow : P.green, fontSize: 13 }}>{fmt(feeAmt)}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Phase schedule */}
          <div style={{ fontWeight: 700, fontSize: 12, marginBottom: 10, color: P.textDim, textTransform: "uppercase", letterSpacing: ".06em" }}>Phase Schedule</div>
          <table style={{ marginBottom: 20 }}>
            <thead>
              <tr><th>Phase</th><th>Fee</th><th>Start</th><th>End</th><th>% Complete</th><th>Billable</th></tr>

              <td><input value={ph.code} onChange={e => updatePhase(idx, { code: e.target.value })} style={{ width: 60 }} /></td>
              <td><input value={ph.name} onChange={e => updatePhase(idx, { name: e.target.value })} style={{ width: 180 }} /></td>
              <td>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <input type="number" step="1" min="0" max="100"
                    value={Math.round(ph.pct * 100)}
                    onChange={e => updatePhase(idx, { pct: +e.target.value / 100 })}
                    style={{ width: 60 }} />
                  <span style={{ color: P.textMuted, fontSize: 12 }}>%</span>
                </div>
              </td>
              <td>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <input type="number" min="0" step="500"
                    value={ph.manualFee > 0 ? ph.manualFee : ""}
                    onChange={e => updatePhase(idx, { manualFee: +e.target.value })}
                    placeholder={fmt(ph.calcedFee ?? ph.fee)}
                    style={{ width: 110, fontFamily: "JetBrains Mono", borderColor: ph.manualFee > 0 ? P.yellow : P.border, color: ph.manualFee > 0 ? P.yellow : P.text }}
                  />
                  {ph.manualFee > 0 && (
                    <button onClick={() => updatePhase(idx, { manualFee: 0 })}
                      style={{ background: "none", color: P.yellow, fontSize: 13, border: "none", cursor: "pointer" }} title="Reset to calculated">↺</button>
                  )}
                </div>
                {ph.manualFee > 0 && (
                  <div style={{ fontSize: 10, color: P.textDim, marginTop: 2 }}>Calc: {fmt(ph.calcedFee ?? 0)}</div>
                )}
              </td>
              {/* Sub fee columns */}
              {calcSubs.map(s => {
                const subFee = getPhaseSubFee(ph.id, s, ph);
                const subTotal = s.method === "pct" ? Math.round(baseFee * (+s.pct || 0) / 100) : (+s.flatFee || 0);
                const isOverridden = (phaseSubFees[ph.id] || {})[s.id] !== undefined;
                return (
                  <td key={s.id}>
                    <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                      <input type="number" min="0" step="500"
                        value={isOverridden ? (phaseSubFees[ph.id] || {})[s.id] : ""}
                        placeholder={fmt(subFee)}
                        onChange={e => setPhaseSubFee(ph.id, s.id, e.target.value)}
                        style={{ width: 100, fontFamily: "JetBrains Mono", fontSize: 12,
                          borderColor: isOverridden ? P.purple : P.border,
                          color: isOverridden ? P.purple : P.text }}
                      />
                      {isOverridden && (
                        <button onClick={() => setPhaseSubFee(ph.id, s.id, "")}
                          style={{ background: "none", color: P.purple, fontSize: 12, border: "none", cursor: "pointer" }} title="Reset to proportional">↺</button>
                      )}
                    </div>
                    {isOverridden && (
                      <div style={{ fontSize: 10, color: P.textDim, marginTop: 2 }}>Default: {fmt(Math.round(subTotal * (ph.pct || 0)))}</div>
                    )}
                  </td>
                );
              })}
              {calcSubs.length > 0 && (
                <td style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.accentLight }}>
                  {fmt((ph.manualFee > 0 ? ph.manualFee : (ph.calcedFee ?? ph.fee)) + calcSubs.reduce((a, s) => a + getPhaseSubFee(ph.id, s, ph), 0))}
                </td>
              )}
              <td><input type="checkbox" checked={!!ph.billable} onChange={e => updatePhase(idx, { billable: e.target.checked })} /></td>
              <td><Btn small variant="danger" onClick={() => onChange({ ...project, phases: phases.filter((_, i) => i !== idx) })}>✕</Btn></td>
            </tr>
          ))}
          {calcSubs.length > 0 && (
            <tr style={{ background: P.bg, borderTop: `2px solid ${P.purple}` }}>
              <td colSpan={5} style={{ fontWeight: 700 }}>Total Phase Fees (Setty)</td>
              {calcSubs.map(s => {
                const subPhaseTot = phasedFees.reduce((a, ph) => a + getPhaseSubFee(ph.id, s, ph), 0);
                const subTotal = s.method === "pct" ? Math.round(baseFee * (+s.pct || 0) / 100) : (+s.flatFee || 0);
                const diff = subPhaseTot - subTotal;
                return (
                  <td key={s.id} style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: Math.abs(diff) < 1 ? P.purple : P.red }}>
                    {fmt(subPhaseTot)}
                    {Math.abs(diff) >= 1 && <div style={{ fontSize: 10, color: P.red }}>≠ {fmt(subTotal)}</div>}
                  </td>
                );
              })}
              <td style={{ fontFamily: "JetBrains Mono", fontWeight: 800, color: P.accentLight }}>
                {fmt(totalPhaseFee + calcSubs.reduce((a, s) => a + phasedFees.reduce((b, ph) => b + getPhaseSubFee(ph.id, s, ph), 0), 0))}
              </td>
              <td colSpan={2}></td>
            </tr>
          )}
        </tbody>
      </table>

      {/* Phase fee total check */}
      {phasedFees.some(p => p.billable && p.manualFee > 0) && (
        <div style={{ marginBottom: 12, padding: "10px 16px", borderRadius: 8,
          background: phaseFeeOk ? P.greenDim : P.redDim,
          border: `1px solid ${phaseFeeOk ? P.green : P.red}`,
          display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ color: phaseFeeOk ? P.green : P.red, fontWeight: 600, fontSize: 13 }}>
            {phaseFeeOk
              ? (calcSubs.length > 0 ? `✓ Setty phase fees match · Total Project Phase Total: ${fmt(totalPhaseFee + totalSubFee)}` : "✓ Phase fees match Setty fee")
              : `⚠ Setty phase fees total ${fmt(totalPhaseFee)} — ${phaseFeeVar > 0 ? "over" : "under"} by ${fmt(Math.abs(phaseFeeVar))}`}
          </div>
          {!phaseFeeOk && (
            <button onClick={() => {
              // Distribute the remainder proportionally across billable phases without a manual override
              const nonManual = phases.filter(p => p.billable && !(p.manualFee > 0));
              if (nonManual.length === 0) return;
              const manualTotal = phases.filter(p => p.billable && p.manualFee > 0).reduce((a, p) => a + p.manualFee, 0);
              const remainder = baseFee - manualTotal;
              const pctTotal = nonManual.reduce((a, p) => a + p.pct, 0) || 1;
              const newPhases = phases.map(p => {
                if (!p.billable || p.manualFee > 0) return p;
                return { ...p, manualFee: Math.round(remainder * (p.pct / pctTotal)) };
              });
              onChange({ ...project, phases: buildSchedule(project.startDate, newPhases) });
            }}
              style={{ background: P.accent, border: "none", borderRadius: 6, color: "#fff", cursor: "pointer", fontSize: 12, fontWeight: 600, padding: "4px 12px" }}>
              Auto-balance remaining phases
            </button>
          )}
        </div>
      )}

      {/* Lock / Unlock */}
      {project.feeScheduleFinalized ? (
        <div style={{ background: P.greenDim, color: P.green, padding: "10px 16px", borderRadius: 8, fontWeight: 600, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          ✓ Fee Schedule Finalized & Locked
          <div style={{ display: "flex", gap: 8 }}>
            {auditLog.length > 0 && <Btn small variant="ghost" onClick={() => setShowAudit(v => !v)}>📋 History ({auditLog.length})</Btn>}
            <Btn small variant="ghost" onClick={() => printFeeProposal(project)}>🖨 Fee Proposal</Btn>
            <Btn small variant="danger" onClick={() => { setShowLockModal("unlock"); setLockNote(""); }}>Unlock & Edit</Btn>
          </div>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <Btn onClick={() => { setShowLockModal("lock"); setLockNote(""); }} variant="success">🔒 Finalize & Lock Fee Schedule → Populate Milestones</Btn>
          <Btn small variant="ghost" onClick={() => printFeeProposal(project)}>🖨 Fee Proposal</Btn>
          {auditLog.length > 0 && <Btn small variant="ghost" onClick={() => setShowAudit(v => !v)}>📋 History ({auditLog.length})</Btn>}
        </div>
      )}

      {/* Audit log */}
      {showAudit && auditLog.length > 0 && (
        <div style={{ marginTop: 14, background: P.bg, border: `1px solid ${P.border}`, borderRadius: 10, padding: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 12 }}>📋 Fee Schedule Audit Log</div>
          <table>
            <thead><tr><th>Action</th><th>User</th><th>Date</th><th>Setty Fee</th><th>Phase Total</th><th>Notes</th></tr></thead>
            <tbody>
              {[...auditLog].reverse().map(e => (
                <tr key={e.id}>
                  <td><span style={{ fontWeight: 600, color: e.action === "locked" ? P.green : P.yellow, textTransform: "capitalize" }}>{e.action === "locked" ? "🔒 Locked" : "🔓 Unlocked"}</span></td>
                  <td style={{ color: P.textMuted }}>{e.user}</td>
                  <td style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: P.textDim }}>{new Date(e.date).toLocaleString()}</td>
                  <td style={{ fontFamily: "JetBrains Mono" }}>{e.settyFee ? fmt(e.settyFee) : "—"}</td>
                  <td style={{ fontFamily: "JetBrains Mono" }}>{e.totalPhaseFee ? fmt(e.totalPhaseFee) : "—"}</td>
                  <td style={{ color: P.textMuted, fontSize: 12 }}>{e.note || <span style={{ color: P.textDim, fontStyle: "italic" }}>No notes</span>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Lock / Unlock modal */}
      {showLockModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={e => { if (e.target === e.currentTarget) setShowLockModal(false); }}>
          <div style={{ background: P.card, border: `1px solid ${P.border}`, borderRadius: 14, padding: 28, width: 440, maxWidth: "90vw" }}>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 6 }}>
              {showLockModal === "lock" ? "🔒 Finalize & Lock Fee Schedule" : "🔓 Unlock Fee Schedule"}
            </div>
            <div style={{ color: P.textMuted, fontSize: 13, marginBottom: 20 }}>
              {showLockModal === "lock"
                ? "This will lock the fee schedule and populate milestones. Add an optional note for the audit log."
                : "This will unlock the fee schedule for editing. Add an optional note explaining why."}
            </div>
            {showLockModal === "lock" && !phaseFeeOk && phasedFees.some(p => p.billable && p.manualFee > 0) && (
              <div style={{ background: P.redDim, border: `1px solid ${P.red}`, borderRadius: 8, padding: "10px 14px", marginBottom: 16, color: P.red, fontSize: 13 }}>
                ⚠ Phase fees total {fmt(totalPhaseFee)}, Setty fee is {fmt(baseFee)} (difference: {fmt(Math.abs(phaseFeeVar))}). You can still lock, but review the discrepancy.
              </div>
            )}
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 6, fontWeight: 600 }}>Notes <span style={{ fontWeight: 400 }}>(optional)</span></div>
              <textarea value={lockNote} onChange={e => setLockNote(e.target.value)}
                placeholder={showLockModal === "lock" ? "e.g. Approved by PM, revised per client negotiation..." : "e.g. Updating SD fee per amendment..."}
                style={{ width: "100%", minHeight: 80, resize: "vertical", background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, color: P.text, padding: "8px 12px", fontSize: 13 }} />
            </div>
            <div style={{ fontSize: 12, color: P.textDim, marginBottom: 16 }}>
              Will be logged as: <strong style={{ color: P.accentLight }}>{getCurrentUser()}</strong> · {new Date().toLocaleString()}
            </div>
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button onClick={() => setShowLockModal(false)}
                style={{ background: "none", border: `1px solid ${P.border}`, borderRadius: 8, color: P.textMuted, cursor: "pointer", padding: "8px 18px", fontSize: 13 }}>
                Cancel
              </button>
              <button onClick={showLockModal === "lock" ? doLock : doUnlock}
                style={{ background: showLockModal === "lock" ? P.green : P.red, border: "none", borderRadius: 8, color: "#fff", cursor: "pointer", fontWeight: 700, padding: "8px 20px", fontSize: 13 }}>
                {showLockModal === "lock" ? "Lock Fee Schedule" : "Unlock Fee Schedule"}
              </button>
            </div>
          </div>
        </div>
      )}
      </div>
      )}
    </div>
  );
}

// Helper: calculate billable amount given new pct, milestone fee, and prior invoices
function calcInvoiceAmount(milestone, newPct, project) {
  const earned = Math.round((milestone.fee || 0) * newPct / 100);
  const alreadyInvoiced = (project.invoices || [])
    .filter(inv => inv.milestoneId === milestone.id)
    .reduce((a, inv) => a + (inv.amount || 0), 0);
  return Math.max(0, earned - alreadyInvoiced);
}

function CancelMilestoneModal({ milestone, project, onConfirm, onClose }) {
  const [reason, setReason] = React.useState("");
  const [status, setStatus] = React.useState("idle"); // idle | sending | done | error
  const [msg, setMsg] = React.useState("");
  const alreadyInvoiced = (project.invoices || [])
    .filter(inv => inv.milestoneId === milestone.id)
    .reduce((a, inv) => a + (inv.amount || 0), 0);
  const uninvoiced = Math.max(0, (milestone.fee || 0) - alreadyInvoiced);

  async function confirm() {
    setStatus("sending");
    const cancelDate = new Date().toISOString().slice(0, 10);
    const bodyHtml = "<div style='font-family:Segoe UI,system-ui,sans-serif;font-size:13px;color:#1a1a1a;max-width:680px'>"
      + "<div style='border-bottom:3px solid #C00000;padding-bottom:10px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-end'>"
        + "<div><div style='font-size:22px;font-weight:900;color:#C00000;letter-spacing:2px'>SETTY</div>"
        + "<div style='font-size:8px;color:#44546A;letter-spacing:1px'>&amp; ASSOCIATES, LTD, PC</div></div>"
        + "<div style='text-align:right'><div style='font-size:14px;font-weight:700;color:#1F3864'>MILESTONE CANCELLATION</div>"
        + "<div style='font-size:11px;color:#44546A'>" + fmtDate(cancelDate) + "</div></div></div>"
      + "<div style='background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:12px 16px;margin-bottom:16px'>"
        + "<div style='font-weight:700;color:#991B1B;margin-bottom:8px'>Milestone Cancelled</div>"
        + "<table style='width:100%;font-size:13px;border-collapse:collapse'>"
          + "<tr><td style='padding:4px 0;color:#44546A;width:140px'>Project</td><td style='font-weight:600'>" + (project.name || "—") + (project.projectNumber ? " (" + project.projectNumber + ")" : "") + "</td></tr>"
          + "<tr><td style='padding:4px 0;color:#44546A'>Milestone</td><td style='font-weight:600'>" + milestone.name + "</td></tr>"
          + "<tr><td style='padding:4px 0;color:#44546A'>Phase</td><td>" + (milestone.phase || "—") + "</td></tr>"
          + "<tr><td style='padding:4px 0;color:#44546A'>Contract Fee</td><td style='font-family:monospace;font-weight:700'>" + fmt(milestone.fee || 0) + "</td></tr>"
          + (alreadyInvoiced > 0 ? "<tr><td style='padding:4px 0;color:#44546A'>Already Invoiced</td><td style='font-family:monospace;color:#16a34a;font-weight:700'>" + fmt(alreadyInvoiced) + "</td></tr>" : "")
          + "<tr><td style='padding:4px 0;color:#44546A'>Uninvoiced Amount</td><td style='font-family:monospace;font-weight:700;color:#991B1B'>" + fmt(uninvoiced) + " forfeited</td></tr>"
        + "</table></div>"
      + (reason.trim() ? "<div style='margin-bottom:16px'><div style='font-size:11px;color:#44546A;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px'>Reason</div><div style='padding:10px 14px;background:#F8FAFC;border:1px solid #CBD5E1;border-radius:4px'>" + reason.trim() + "</div></div>" : "")
      + "<div style='margin-top:20px;padding-top:10px;border-top:1px solid #CBD5E1;font-size:11px;color:#44546A'>"
        + "Cancelled by " + getCurrentUser() + " on " + fmtDate(cancelDate) + " &nbsp;·&nbsp; " + (project.name || "") + "</div></div>";
    try {
      await createOutlookDraft({
        subject: "Milestone Cancelled \u2014 " + milestone.name + " \u00b7 " + (project.name || "Project") + (project.projectNumber ? " (" + project.projectNumber + ")" : ""),
        bodyHtml,
      });
      setStatus("done");
      setMsg("\u2713 Draft created in Outlook Drafts");
      setTimeout(() => {
        onConfirm({ cancelled: true, cancelDate, cancelReason: reason.trim() });
        onClose();
      }, 1200);
    } catch(e) {
      setStatus("error");
      setMsg("\u2717 " + e.message + " — cancelling anyway");
      setTimeout(() => {
        onConfirm({ cancelled: true, cancelDate, cancelReason: reason.trim() });
        onClose();
      }, 2000);
    }
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: P.card, border: `1px solid ${P.red}`, borderRadius: 14, padding: 28, width: 520, maxWidth: "95vw" }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: P.red, marginBottom: 6 }}>Cancel Milestone</div>
        <div style={{ fontSize: 13, color: P.textMuted, marginBottom: 18, lineHeight: 1.6 }}>
          This will remove <strong style={{ color: P.text }}>{milestone.name}</strong> from the schedule and backlog.
          Any uninvoiced fee will be forfeited.
        </div>
        <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, padding: "12px 16px", marginBottom: 18 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>

              <div style={{ fontSize: 10, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 3 }}>Contract Fee</div>
