const WBS_DISCIPLINES = ["Mechanical", "Electrical", "Plumbing", "Fire Protection"];
const WBS_HOURLY_RATE = 170;
const DISC_COLORS = {
  "Mechanical":      { bg: "#1a2a3a", text: "#60b4ff" },
  "Electrical":      { bg: "#2a1a3a", text: "#c084fc" },
  "Plumbing":        { bg: "#1a3a2a", text: "#34d399" },
  "Fire Protection": { bg: "#3a1a1a", text: "#f87171" },
};

// Get Monday of the week containing a date
function localDateStr(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function weekMonday(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return localDateStr(d);
}

function addCalDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return localDateStr(d);
}

// Count business days within [weekStart, weekStart+4] that overlap [phaseStart, phaseEnd]
function bizDaysOverlap(weekStart, phaseStart, phaseEnd) {
  let count = 0;
  for (let i = 0; i < 5; i++) {
    const d = addCalDays(weekStart, i);
    if (d >= phaseStart && d <= phaseEnd) count++;
  }
  return count;
}

function TeamView({ project, onChange }) {
  const team = project.teamMembers || [];
  const [showWBS, setShowWBS] = useState(false);

  function addMember() {
    onChange({ ...project, teamMembers: [...team, { id: uid(), name: "", role: "Engineer", disciplines: [], rate: 0 }] });
  }

  function updateMember(id, updates) {
    onChange({ ...project, teamMembers: team.map(m => m.id === id ? { ...m, ...updates } : m) });
  }

  function toggleDisc(memberId, disc) {
    const m = team.find(x => x.id === memberId);
    if (!m) return;
    const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
    const next = discs.includes(disc) ? discs.filter(d => d !== disc) : [...discs, disc];
    updateMember(memberId, { disciplines: next, discipline: next[0] || "" });
  }

  // ── Budget calculations ──
  const constructionCost = calcConstructionCost(project.squareFootage, project.buildingCategory, project.manualConstructionCost, project.manualRSMeansCostPerSF);
  const settyFee = project.manualSettyFee > 0 ? project.manualSettyFee : calcSettyFee(constructionCost, project);
  const totalHours  = Math.round(settyFee / WBS_HOURLY_RATE);
  const pmHours     = Math.round(totalHours * 0.08);
  const dpmHours    = Math.round(totalHours * 0.02);
  const discHours   = totalHours - pmHours - dpmHours;
  const effectiveDiscs = getEffectiveDisciplines(project);
  const discTotal   = Object.values(effectiveDiscs).reduce((a, b) => a + b, 0) || 1;

  const discBudgetHours = {};
  WBS_DISCIPLINES.forEach(d => {
    discBudgetHours[d] = Math.round(discHours * ((effectiveDiscs[d] || 0) / discTotal));
  });

  // ── Phase data ──
  const billablePhases = (project.phases || []).filter(p => p.billable && p.fee > 0 && p.startDate && p.endDate);
  const totalFee = billablePhases.reduce((a, p) => a + (p.fee || 0), 0) || 1;
  const today = new Date();
  const todayStr = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");

  const phaseMeta = Object.fromEntries(billablePhases.map(ph => {
    const totalWD    = Math.max(1, countWorkDays(ph.startDate, ph.endDate));
    const totalWeeks = Math.max(1, Math.round(totalWD / 5));
    const actualPct  = getPhasePctFromMilestones(ph, project.milestones || []);
    const sd = new Date(ph.startDate + "T00:00:00");
    const ed = new Date(ph.endDate   + "T00:00:00");
    let status = today < sd ? "future" : today >= ed ? (actualPct >= 100 ? "complete" : "overdue") : "active";
    const elapsed    = status === "active" ? countWorkDays(ph.startDate, todayStr) : (status === "future" ? 0 : totalWD);
    const remainWD   = Math.max(0, totalWD - elapsed);
    const remainWeeks = Math.max(1, Math.round(remainWD / 5));
    return [ph.id, { totalWD, totalWeeks, actualPct, status, remainWD, remainWeeks }];
  }));

  // ── Build staff rows ──
  // Each staff member gets a total budget = sum of their per-discipline allocations
  // For multi-disc staff, hours are distributed proportionally then summed
  const staffRows = [];
  const pm  = team.find(m => m.role === "Project Manager");
  const dpm = team.find(m => m.role === "Deputy Project Manager");

  if (pm)  staffRows.push({ member: pm,  isPM: true,  role: "PM",  totalBudget: pmHours });
  if (dpm) staffRows.push({ member: dpm, isPM: true,  role: "DPM", totalBudget: dpmHours });

  // Non-PM staff: budget = sum across their disciplines, split equally among staff in that disc
  const discStaffCount = {};
  WBS_DISCIPLINES.forEach(disc => {
    discStaffCount[disc] = team.filter(m => {
      const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
      return discs.includes(disc);
    }).length || 1;
  });

  team.filter(m => m.role !== "Project Manager" && m.role !== "Deputy Project Manager").forEach(m => {
    const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
    let totalBudget = 0;
    const discBreakdown = {};
    discs.forEach(d => {
      const share = Math.round((discBudgetHours[d] || 0) / discStaffCount[d]);
      discBreakdown[d] = share;
      totalBudget += share;
    });
    staffRows.push({ member: m, isPM: false, discs, discBreakdown, totalBudget });
  });

  // Unassigned disciplines (no staff assigned)
  WBS_DISCIPLINES.forEach(disc => {
    const assigned = team.filter(m => {
      const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
      return discs.includes(disc) && m.role !== "Project Manager" && m.role !== "Deputy Project Manager";
    });
    if (assigned.length === 0) {
      staffRows.push({ member: null, isPM: false, discs: [disc], discBreakdown: { [disc]: discBudgetHours[disc] || 0 }, totalBudget: discBudgetHours[disc] || 0, unassigned: true });
    }
  });

  // ── Build weekly schedule ──
  // Get all project weeks from first phase start to last phase end
  const allWeeks = useMemo(() => {
    if (billablePhases.length === 0) return [];
    const starts = billablePhases.map(p => p.startDate).sort();
    const ends   = billablePhases.map(p => p.endDate).sort();
    let cur = weekMonday(starts[0]);
    const last = weekMonday(ends[ends.length - 1]);
    const weeks = [];
    while (cur <= last) {
      weeks.push(cur);
      cur = addCalDays(cur, 7);
    }
    return weeks;
  }, [billablePhases]);

  // For each staff row × week: compute hours
  // Hours per week = sum over phases of: (phase budget for this person) × (biz days overlap / phase total biz days)
  function staffWeekHours(row, weekStart) {
    if (!row.totalBudget) return { total: 0, byDisc: {}, byPhase: [] };
    const byDisc = {};
    let total = 0;
    const byPhase = [];
    billablePhases.forEach(ph => {
      const meta = phaseMeta[ph.id];
      const overlap = bizDaysOverlap(weekStart, ph.startDate, ph.endDate);
      if (!overlap) return;
      const phBudget = row.isPM
        ? Math.round(row.totalBudget * ((ph.fee || 0) / totalFee))
        : Object.entries(row.discBreakdown || {}).reduce((a, [d, hrs]) => {
            return a + Math.round(hrs * ((ph.fee || 0) / totalFee));
          }, 0);
      const hrs = Math.round(phBudget * (overlap / meta.totalWD));
      total += hrs;
      byPhase.push({ ph, hrs, meta });
      if (!row.isPM) {
        Object.keys(row.discBreakdown || {}).forEach(d => {
          const dHrs = Math.round(Math.round((row.discBreakdown[d] || 0) * ((ph.fee || 0) / totalFee)) * (overlap / meta.totalWD));
          byDisc[d] = (byDisc[d] || 0) + dHrs;
        });
      }
    });
    return { total, byDisc, byPhase };
  }

  // Which phase(s) are active in a given week
  function weekPhase(weekStart) {
    const weekEnd = addCalDays(weekStart, 4);
    return billablePhases.filter(ph => ph.startDate <= weekEnd && ph.endDate >= weekStart);
  }

  // Is this week in the past / current / future
  function weekStatus(weekStart) {
    const weekEnd = addCalDays(weekStart, 4);
    if (weekEnd < todayStr) return "past";
    if (weekStart <= todayStr) return "current";
    return "future";
  }

  return (
    <div>
      <SectionTitle action={<Btn small onClick={addMember} variant="ghost">+ Add Team Member</Btn>}>
        Team Members
      </SectionTitle>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 14 }}>
        Assign disciplines to generate a weekly Work Breakdown Structure. Staff can be assigned to multiple disciplines.
      </div>
      <table style={{ marginBottom: 24 }}>
        <thead><tr><th>Name</th><th>Role / Title</th><th>Disciplines</th><th>Billing Rate ($/hr)</th><th></th></tr></thead>
        <tbody>
          {team.map(m => {
            const isPM = m.role === "Project Manager" || m.role === "Deputy Project Manager";
            const memberDiscs = m.disciplines || (m.discipline ? [m.discipline] : []);
            return (
              <tr key={m.id}>
                <td><input value={m.name} onChange={e => updateMember(m.id, { name: e.target.value })} style={{ width: 180 }} /></td>
                <td>
                  {isPM
                    ? <Badge color={{ bg: P.accentDim, text: P.accentLight }} text={m.role} />
                    : <input value={m.role} onChange={e => updateMember(m.id, { role: e.target.value })} style={{ width: 140 }} placeholder="e.g. Engineer…" />
                  }
                </td>
                <td>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {WBS_DISCIPLINES.map(d => {
                      const on = memberDiscs.includes(d);
                      const dc = DISC_COLORS[d];
                      return (
                        <button key={d} onClick={() => toggleDisc(m.id, d)}
                          style={{ fontSize: 11, fontWeight: 600, padding: "3px 8px", borderRadius: 8, cursor: "pointer",
                            background: on ? dc.bg : "transparent",
                            color: on ? dc.text : P.textDim,
                            border: `1px solid ${on ? dc.text : P.border}` }}>
                          {d}
                        </button>
                      );
                    })}
                  </div>
                </td>
                <td><input type="number" value={m.rate} onChange={e => updateMember(m.id, { rate: +e.target.value })} style={{ width: 100 }} /></td>
                <td>
                  {!isPM
                    ? <Btn small variant="danger" onClick={() => onChange({ ...project, teamMembers: team.filter(x => x.id !== m.id) })}>✕</Btn>
                    : null
                  }
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* ── WBS Section ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <SectionTitle>Weekly Work Breakdown Structure</SectionTitle>
        <Btn small variant="ghost" onClick={() => setShowWBS(v => !v)}>{showWBS ? "▲ Hide" : "▼ Show"} WBS</Btn>
      </div>

      {showWBS && (
        <div>
          {/* Budget summary chips */}
          <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
            {[
              { label: "SETTY FEE", val: fmt(settyFee), sub: null, color: P.accent },
              { label: "TOTAL HRS", val: totalHours + " hrs", sub: `@ $${WBS_HOURLY_RATE}/hr`, color: P.accent },
              { label: "PM (8%)", val: pmHours + " hrs", sub: null, color: P.accentLight },
              { label: "DPM (2%)", val: dpmHours + " hrs", sub: null, color: P.accentLight },
            ].map(c => (
              <div key={c.label} style={{ background: P.accentDim, border: `1px solid ${c.color}`, borderRadius: 8, padding: "10px 16px", minWidth: 120 }}>
                <div style={{ fontSize: 10, color: P.textDim, marginBottom: 2 }}>{c.label}</div>
                <div style={{ fontWeight: 700, color: c.color, fontFamily: "JetBrains Mono" }}>{c.val}</div>
                {c.sub && <div style={{ fontSize: 10, color: P.textDim }}>{c.sub}</div>}
              </div>
            ))}
            {WBS_DISCIPLINES.map(d => {
              const dc = DISC_COLORS[d];
              const cnt = discStaffCount[d];
              return (
                <div key={d} style={{ background: dc.bg, border: `1px solid ${dc.text}`, borderRadius: 8, padding: "10px 16px", minWidth: 120 }}>
                  <div style={{ fontSize: 10, color: P.textDim, marginBottom: 2 }}>{d.toUpperCase()}</div>
                  <div style={{ fontWeight: 700, color: dc.text, fontFamily: "JetBrains Mono" }}>{discBudgetHours[d] || 0} hrs</div>
                  <div style={{ fontSize: 10, color: P.textDim }}>{cnt} staff · {Math.round((discBudgetHours[d] || 0) / cnt)}/ea</div>
                </div>
              );
            })}
          </div>

          {billablePhases.length === 0 ? (
            <div style={{ color: P.textDim, fontSize: 13, padding: 16, background: P.bg, borderRadius: 8 }}>
              ⚠ No billable phases with schedule dates. Finalize the fee schedule first.
            </div>
          ) : (
            <div style={{ overflowX: "auto" }}>
              <table>
                <thead>
                  <tr>
                    <th style={{ minWidth: 100, position: "sticky", left: 0, background: P.card, zIndex: 2 }}>Week Of</th>
                    <th style={{ minWidth: 80 }}>Phase</th>
                    {staffRows.map((row, i) => (
                      <th key={i} style={{ minWidth: 90, textAlign: "center" }}>
                        <div style={{ fontWeight: 700 }}>{row.unassigned ? "Unassigned" : (row.member?.name || "TBD")}</div>
                        <div style={{ fontSize: 10, color: P.textDim, fontWeight: 400 }}>
                          {row.isPM ? row.role : (row.discs || []).map(d => (
                            <span key={d} style={{ color: DISC_COLORS[d]?.text || P.textMuted, marginRight: 3, fontSize: 10 }}>{d.split(" ")[0]}</span>
                          ))}
                        </div>
                        <div style={{ fontSize: 10, color: P.accentLight, fontWeight: 400 }}>{row.totalBudget} hrs total</div>
                      </th>
                    ))}
                    <th style={{ minWidth: 80, textAlign: "center" }}>Team Total</th>
                  </tr>
                </thead>
                <tbody>
                  {allWeeks.map((weekStart, wi) => {
                    const wkStatus = weekStatus(weekStart);
                    const phases   = weekPhase(weekStart);
                    const phaseLabel = phases.map(p => p.code || p.name.slice(0, 4)).join("/");
                    const rowBg = wkStatus === "current" ? "#1a2500" : wkStatus === "past" ? P.bg : "transparent";
                    const rowBorder = wkStatus === "current" ? `1px solid ${P.green}` : "none";
                    let teamTotal = 0;
                    const cellData = staffRows.map(row => {
                      const { total, byDisc } = staffWeekHours(row, weekStart);
                      teamTotal += total;
                      return { total, byDisc };
                    });
                    if (teamTotal === 0 && wkStatus === "past") return null;
                    return (
                      <tr key={weekStart} style={{ background: rowBg, outline: rowBorder }}>
                        <td style={{ position: "sticky", left: 0, background: rowBg || P.card, fontFamily: "JetBrains Mono", fontSize: 12, fontWeight: wkStatus === "current" ? 700 : 400, color: wkStatus === "current" ? P.green : wkStatus === "past" ? P.textDim : P.text, zIndex: 1 }}>
                          {weekStart}
                          {wkStatus === "current" && <div style={{ fontSize: 10, color: P.green }}>← NOW</div>}
                        </td>
                        <td style={{ fontSize: 11 }}>
                          {phases.map(ph => {
                            const meta = phaseMeta[ph.id];
                            const sc = meta.status === "complete" ? P.green : meta.status === "overdue" ? P.red : meta.status === "active" ? P.accentLight : P.textMuted;
                            return <div key={ph.id} style={{ color: sc, fontWeight: 600 }}>{ph.code || ph.name.slice(0,4)}</div>;
                          })}
                        </td>
                        {cellData.map((cell, ci) => {
                          const row = staffRows[ci];
                          // Check if this week is behind schedule for any active phase
                          const activePhases = phases.filter(ph => phaseMeta[ph.id]?.status === "active");
                          const isBehind = activePhases.some(ph => {
                            const meta = phaseMeta[ph.id];
                            const phBudget = row.isPM
                              ? Math.round(row.totalBudget * ((ph.fee || 0) / totalFee))
                              : Object.values(row.discBreakdown || {}).reduce((a, hrs) => a + Math.round(hrs * ((ph.fee || 0) / totalFee)), 0);
                            const plannedWk = meta.totalWeeks > 0 ? phBudget / meta.totalWeeks : 0;
                            return cell.total > 0 && cell.total > plannedWk * 1.2;
                          });
                          return (
                            <td key={ci} style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontSize: 13,
                              color: cell.total === 0 ? P.textDim : isBehind ? P.yellow : wkStatus === "past" ? P.textDim : P.text,
                              fontWeight: wkStatus === "current" ? 700 : 400 }}>
                              {cell.total > 0 ? (
                                <div>
                                  <div>{cell.total} h</div>
                                  {Object.keys(cell.byDisc).length > 1 && (
                                    <div style={{ fontSize: 9, color: P.textDim, lineHeight: 1.4 }}>
                                      {Object.entries(cell.byDisc).map(([d, h]) => h > 0 ? (
                                        <span key={d} style={{ color: DISC_COLORS[d]?.text, marginRight: 3 }}>{d.slice(0,1)}:{h}</span>
                                      ) : null)}
                                    </div>
                                  )}
                                </div>
                              ) : <span style={{ color: P.border }}>—</span>}
                            </td>
                          );
                        })}
                        <td style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700, color: wkStatus === "current" ? P.green : wkStatus === "past" ? P.textDim : P.accentLight }}>
                          {teamTotal > 0 ? teamTotal + " h" : <span style={{ color: P.border }}>—</span>}
                        </td>
                      </tr>
                    );
                  })}
                  {/* Totals row */}
                  <tr style={{ borderTop: `2px solid ${P.border}`, background: P.bg }}>
                    <td colSpan={2} style={{ fontWeight: 700 }}>TOTAL</td>
                    {staffRows.map((row, i) => (
                      <td key={i} style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>{row.totalBudget} h</td>
                    ))}
                    <td style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>{totalHours} h</td>
                  </tr>
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


// ─── TEAM WBS VIEW (cross-project) ───────────────────────────────────────────

function TeamWBSView({ projects, onNavigateToProject }) {
  const today = new Date();
  const todayStr = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");

  // Only active awarded projects with team + phases
  const activeProjects = projects.filter(p =>
    !p.archived && isAwarded(p) &&
    p.status !== "Completed" && p.status !== "Cancelled" && p.status !== "Lost" &&
    (p.teamMembers || []).length > 0 &&
    (p.phases || []).some(ph => ph.billable && ph.fee > 0 && ph.startDate && ph.endDate)
  );

  // Build a unified staff registry: key = name (lowercased) → { name, projects: [...] }
  // Staff with same name across projects are merged into one column
  const staffMap = {}; // normalizedName → { displayName, entries: [{ project, member, ... }] }

  activeProjects.forEach(proj => {
    const constructionCost = calcConstructionCost(proj.squareFootage, proj.buildingCategory, proj.manualConstructionCost, proj.manualRSMeansCostPerSF);
    const settyFee    = proj.manualSettyFee > 0 ? proj.manualSettyFee : calcSettyFee(constructionCost, proj);
    const totalHours  = Math.round(settyFee / WBS_HOURLY_RATE);
    const pmHours     = Math.round(totalHours * 0.08);
    const dpmHours    = Math.round(totalHours * 0.02);
    const discHours   = totalHours - pmHours - dpmHours;
    const effectiveDiscs = getEffectiveDisciplines(proj);
    const discTotal   = Object.values(effectiveDiscs).reduce((a, b) => a + b, 0) || 1;
    const discBudget  = {};
    WBS_DISCIPLINES.forEach(d => { discBudget[d] = Math.round(discHours * ((effectiveDiscs[d] || 0) / discTotal)); });

    const billablePhases = (proj.phases || []).filter(p => p.billable && p.fee > 0 && p.startDate && p.endDate);
    const totalFee = billablePhases.reduce((a, p) => a + (p.fee || 0), 0) || 1;

    // Phase meta
    const phaseMeta = {};
    billablePhases.forEach(ph => {
      const totalWD = Math.max(1, countWorkDays(ph.startDate, ph.endDate));
      phaseMeta[ph.id] = { totalWD, fee: ph.fee || 0 };
    });

    // Disc staff count for splitting
    const discStaffCount = {};
    WBS_DISCIPLINES.forEach(disc => {
      discStaffCount[disc] = Math.max(1, (proj.teamMembers || []).filter(m => {
        const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
        return discs.includes(disc) && m.role !== "Project Manager" && m.role !== "Deputy Project Manager";
      }).length);
    });

    (proj.teamMembers || []).forEach(m => {
      const nameKey = (m.name || "TBD").toLowerCase().trim() || m.id;
      const displayName = m.name || "TBD";
      const isPM = m.role === "Project Manager" || m.role === "Deputy Project Manager";
      let memberBudget = isPM
        ? (m.role === "Project Manager" ? pmHours : dpmHours)
        : (() => {
          const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
          return discs.reduce((a, d) => a + Math.round((discBudget[d] || 0) / discStaffCount[d]), 0);
        })();

      if (!staffMap[nameKey]) staffMap[nameKey] = { displayName, entries: [] };
      staffMap[nameKey].entries.push({
        project: proj, member: m, isPM, memberBudget,
        billablePhases, phaseMeta, totalFee,
        discBreakdown: isPM ? {} : (() => {
          const discs = m.disciplines || (m.discipline ? [m.discipline] : []);
          const bd = {};
          discs.forEach(d => { bd[d] = Math.round((discBudget[d] || 0) / discStaffCount[d]); });
          return bd;
        })(),
      });
    });
  });

  const staffCols = Object.values(staffMap);

  // Compute weekly hours for a staff entry in a given week
  function entryWeekHours(entry, weekStart) {
    let total = 0;
    entry.billablePhases.forEach(ph => {
      const meta = entry.phaseMeta[ph.id];
      const overlap = bizDaysOverlap(weekStart, ph.startDate, ph.endDate);
      if (!overlap || !meta) return;
      const phBudget = entry.isPM
        ? Math.round(entry.memberBudget * ((ph.fee || 0) / entry.totalFee))
        : Object.values(entry.discBreakdown).reduce((a, hrs) => a + Math.round(hrs * ((ph.fee || 0) / entry.totalFee)), 0);
      total += Math.round(phBudget * (overlap / meta.totalWD));
    });
    return total;
  }

  // Determine all weeks across all active projects
  const allWeeks = useMemo(() => {
    const allStarts = activeProjects.flatMap(p => (p.phases || []).filter(ph => ph.billable && ph.startDate).map(ph => ph.startDate));
    const allEnds   = activeProjects.flatMap(p => (p.phases || []).filter(ph => ph.billable && ph.endDate).map(ph => ph.endDate));
    if (!allStarts.length) return [];
    allStarts.sort(); allEnds.sort();
    let cur  = weekMonday(allStarts[0]);
    const last = weekMonday(allEnds[allEnds.length - 1]);
    const weeks = [];
    while (cur <= last) { weeks.push(cur); cur = addCalDays(cur, 7); }
    return weeks;
  }, [activeProjects]);

  // Which projects are active in a given week
  function weekProjects(weekStart) {
    const weekEnd = addCalDays(weekStart, 4);
    return activeProjects.filter(p =>
      (p.phases || []).some(ph => ph.billable && ph.startDate && ph.endDate && ph.startDate <= weekEnd && ph.endDate >= weekStart)
    );
  }

  function wkStatus(weekStart) {
    const weekEnd = addCalDays(weekStart, 4);
    if (weekEnd < todayStr) return "past";
    if (weekStart <= todayStr) return "current";
    return "future";
  }

  const [filterStaff, setFilterStaff] = useState("");

  const visibleCols = staffCols.filter(col =>
    !filterStaff || col.displayName.toLowerCase().includes(filterStaff.toLowerCase())
  );

  if (activeProjects.length === 0) return (
    <div style={{ padding: "24px 32px", color: P.textDim }}>No active projects with team members and schedule data.</div>
  );

  return (
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <div style={{ fontSize: 22, fontWeight: 800 }}>Team WBS — All Projects</div>
      </div>
      <div style={{ color: P.textMuted, fontSize: 13, marginBottom: 20 }}>
        Weekly hours across {activeProjects.length} active project{activeProjects.length !== 1 ? "s" : ""}. Staff with matching names are merged into one column.
      </div>

      {/* Active projects legend */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
        {activeProjects.map(p => (
          <button key={p.id} onClick={() => onNavigateToProject(p.id)}
            style={{ background: P.card, border: `1px solid ${P.border}`, borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 12, color: P.accentLight, fontWeight: 600 }}
            onMouseEnter={e => e.currentTarget.style.borderColor = P.accent}
            onMouseLeave={e => e.currentTarget.style.borderColor = P.border}>
            {p.projectNumber ? `[${p.projectNumber}] ` : ""}{p.name}
          </button>
        ))}
      </div>

      {/* Staff filter */}
      <div style={{ marginBottom: 16 }}>
        <input value={filterStaff} onChange={e => setFilterStaff(e.target.value)}
          placeholder="Filter by staff name…" style={{ width: 260 }} />
      </div>

      {allWeeks.length === 0 ? (
        <div style={{ color: P.textDim }}>No scheduled phases found.</div>
      ) : (
        <div style={{ overflowX: "auto" }}>
          <table>
            <thead>
              <tr>
                <th style={{ minWidth: 110, position: "sticky", left: 0, background: P.card, zIndex: 2 }}>Week Of</th>
                <th style={{ minWidth: 120 }}>Projects Active</th>
                {visibleCols.map((col, i) => {
                  const totalBudget = col.entries.reduce((a, e) => a + e.memberBudget, 0);
                  const discs = [...new Set(col.entries.flatMap(e => Object.keys(e.discBreakdown)))];
                  return (
                    <th key={i} style={{ minWidth: 90, textAlign: "center" }}>
                      <div style={{ fontWeight: 700 }}>{col.displayName}</div>
                      <div style={{ fontSize: 10, color: P.textDim, fontWeight: 400 }}>
                        {col.entries.length} project{col.entries.length !== 1 ? "s" : ""}
                      </div>
                      <div style={{ fontSize: 10, fontWeight: 400, display: "flex", justifyContent: "center", gap: 3, flexWrap: "wrap", marginTop: 2 }}>
                        {discs.map(d => <span key={d} style={{ color: DISC_COLORS[d]?.text || P.textMuted }}>{d.split(" ")[0]}</span>)}
                      </div>
                      <div style={{ fontSize: 10, color: P.accentLight, fontWeight: 400 }}>{totalBudget} hrs total</div>
                    </th>
                  );
                })}
                <th style={{ minWidth: 90, textAlign: "center" }}>Team Total</th>
              </tr>
            </thead>
            <tbody>
              {allWeeks.map(weekStart => {
                const st = wkStatus(weekStart);
                const activeProjsThisWeek = weekProjects(weekStart);
                const rowBg = st === "current" ? "#1a2500" : st === "past" ? P.bg : "transparent";
                let teamTotal = 0;
                const cellHours = visibleCols.map(col => {
                  const hrs = col.entries.reduce((a, entry) => a + entryWeekHours(entry, weekStart), 0);
                  teamTotal += hrs;
                  // per-project breakdown for tooltip
                  const byProject = col.entries
                    .map(e => ({ name: e.project.projectNumber || e.project.name.slice(0, 12), hrs: entryWeekHours(e, weekStart) }))
                    .filter(x => x.hrs > 0);
                  return { hrs, byProject };
                });
                if (teamTotal === 0 && st === "past") return null;
                return (
                  <tr key={weekStart} style={{ background: rowBg }}>
                    <td style={{ position: "sticky", left: 0, background: rowBg || P.card, fontFamily: "JetBrains Mono", fontSize: 12,
                      fontWeight: st === "current" ? 700 : 400,
                      color: st === "current" ? P.green : st === "past" ? P.textDim : P.text, zIndex: 1 }}>
                      {weekStart}
                      {st === "current" && <div style={{ fontSize: 10, color: P.green }}>← NOW</div>}
                    </td>
                    <td style={{ fontSize: 11 }}>
                      {activeProjsThisWeek.map(p => (
                        <button key={p.id} onClick={() => onNavigateToProject(p.id)}
                          style={{ display: "block", background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 11, padding: 0, textAlign: "left" }}>
                          {p.projectNumber || p.name.slice(0, 14)}
                        </button>
                      ))}
                    </td>
                    {cellHours.map((cell, ci) => (
                      <td key={ci} style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontSize: 13,
                        color: cell.hrs === 0 ? P.textDim : st === "past" ? P.textDim : st === "current" ? P.green : P.text,
                        fontWeight: st === "current" ? 700 : 400 }}>
                        {cell.hrs > 0 ? (
                          <div title={cell.byProject.map(x => x.name + ": " + x.hrs + "h").join(" | ")}>
                            <div>{cell.hrs} h</div>
                            {cell.byProject.length > 1 && (
                              <div style={{ fontSize: 9, color: P.textDim, lineHeight: 1.4 }}>
                                {cell.byProject.map(x => <div key={x.name}>{x.name}: {x.hrs}h</div>)}
                              </div>
                            )}
                          </div>
                        ) : <span style={{ color: P.border }}>—</span>}
                      </td>
                    ))}
                    <td style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700,
                      color: st === "current" ? P.green : st === "past" ? P.textDim : P.accentLight }}>
                      {teamTotal > 0 ? teamTotal + " h" : <span style={{ color: P.border }}>—</span>}
                    </td>
                  </tr>
                );
              })}
              {/* Totals row */}
              <tr style={{ borderTop: `2px solid ${P.border}`, background: P.bg }}>
                <td colSpan={2} style={{ fontWeight: 700 }}>TOTAL</td>
                {visibleCols.map((col, i) => {
                  const total = col.entries.reduce((a, e) => a + e.memberBudget, 0);
                  return (
                    <td key={i} style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>
                      {total} h
                      {col.entries.length > 1 && (
                        <div style={{ fontSize: 10, color: P.textDim, fontWeight: 400 }}>
                          {col.entries.map(e => (
                            <div key={e.project.id}>{e.project.projectNumber || e.project.name.slice(0,10)}: {e.memberBudget}h</div>
                          ))}
                        </div>
                      )}
                    </td>
                  );
                })}
                <td style={{ textAlign: "center", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>
                  {visibleCols.reduce((a, col) => a + col.entries.reduce((b, e) => b + e.memberBudget, 0), 0)} h
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─── CALENDAR HELPERS ─────────────────────────────────────────────────────────

const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

function getFirstDayOfMonth(year, month) {
  return new Date(year, month, 1).getDay();
}

// Parse "YYYY-MM-DD" safely without timezone shift
function parseLocalDate(str) {
  if (!str) return null;
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function isSameDay(dateStr, year, month, day) {
  const d = parseLocalDate(dateStr);
  if (!d) return false;
  return d.getFullYear() === year && d.getMonth() === month && d.getDate() === day;
}

// ─── SINGLE-PROJECT CALENDAR ─────────────────────────────────────────────────

function CalendarView({ project }) {
  const today = new Date();
  const [calYear, setCalYear] = useState(today.getFullYear());
  const [calMonth, setCalMonth] = useState(today.getMonth());
  const [selected, setSelected] = useState(null); // { day, milestones[] }

  const milestones = project.milestones || [];

  function prevMonth() {
    if (calMonth === 0) { setCalYear(y => y - 1); setCalMonth(11); }
    else setCalMonth(m => m - 1);
    setSelected(null);
  }
  function nextMonth() {
    if (calMonth === 11) { setCalYear(y => y + 1); setCalMonth(0); }
    else setCalMonth(m => m + 1);
    setSelected(null);
  }
  function goToday() { setCalYear(today.getFullYear()); setCalMonth(today.getMonth()); setSelected(null); }

  const daysInMonth = getDaysInMonth(calYear, calMonth);
  const firstDay = getFirstDayOfMonth(calYear, calMonth);
  const cells = Array(firstDay).fill(null).concat(Array.from({ length: daysInMonth }, (_, i) => i + 1));
  // pad to complete last row
  while (cells.length % 7 !== 0) cells.push(null);

  function getMilestonesForDay(day) {
    const dateStr = `${calYear}-${String(calMonth + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    return milestones.filter(m => m.dueDate === dateStr);
  }

  const isToday = (day) => day && today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === day;

  // Phase bands — show colored bar spanning start→end dates
  const phases = (project.phases || []).filter(p => p.billable && p.startDate && p.endDate);

  function getPhaseColorForDay(day) {
    if (!day) return null;
    const dateStr = `${calYear}-${String(calMonth + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const d = parseLocalDate(dateStr);
    for (const ph of phases) {
      const start = parseLocalDate(ph.startDate);
      const end = parseLocalDate(ph.endDate);
      if (d >= start && d <= end) return ph;
    }
    return null;
  }

  // Assign a distinct color per phase
  const PHASE_COLORS = ["#1d4ed8","#0f766e","#7c3aed","#b45309","#be185d","#065f46"];
  const phaseColorMap = {};
  phases.forEach((ph, i) => { phaseColorMap[ph.code] = PHASE_COLORS[i % PHASE_COLORS.length]; });

  const TYPE_COLORS = {
    "billable": { dot: P.accentLight, label: "Billable" },
    "non-billable": { dot: P.purple, label: "Non-Billable" },
    "change-order": { dot: P.yellow, label: "Change Order" },
  };

  return (
    <div>
      {/* Nav */}
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 20 }}>
        <Btn small variant="ghost" onClick={prevMonth}>‹ Prev</Btn>
        <div style={{ fontWeight: 700, fontSize: 16, minWidth: 180, textAlign: "center" }}>
          {MONTH_NAMES[calMonth]} {calYear}
        </div>
        <Btn small variant="ghost" onClick={nextMonth}>Next ›</Btn>
        <Btn small variant="ghost" onClick={goToday}>Today</Btn>
      </div>

      {/* Phase legend */}
      {phases.length > 0 && (
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
          {phases.map(ph => (
            <div key={ph.code} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
              <div style={{ width: 20, height: 6, borderRadius: 3, background: phaseColorMap[ph.code] }} />
              <span style={{ color: P.textMuted }}>{ph.name}</span>
            </div>
          ))}
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: P.accentLight }} />
            <span style={{ color: P.textMuted }}>Billable</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: P.purple }} />
            <span style={{ color: P.textMuted }}>Non-Billable</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: P.yellow }} />
            <span style={{ color: P.textMuted }}>Change Order</span>
          </div>
        </div>
      )}

      {/* Calendar grid */}
      <div style={{ border: `1px solid ${P.border}`, borderRadius: 10, overflow: "hidden" }}>
        {/* Day headers */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", background: P.bg }}>
          {DAY_NAMES.map(d => (
            <div key={d} style={{ padding: "8px 0", textAlign: "center", fontSize: 11, fontWeight: 600, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em" }}>{d}</div>
          ))}
        </div>
        {/* Weeks */}
        {Array.from({ length: cells.length / 7 }, (_, wi) => (
          <div key={wi} style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)" }}>
            {cells.slice(wi * 7, wi * 7 + 7).map((day, di) => {
              const dayMilestones = day ? getMilestonesForDay(day) : [];
              const phaseForDay = day ? getPhaseColorForDay(day) : null;
              const isSelected = selected?.day === day;
              const isTodayCell = isToday(day);
              const dateStr = day ? `${calYear}-${String(calMonth + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}` : null;
              const hasOverdue = dayMilestones.some(m => milestoneStatus(m.pctComplete) !== "Completed");
              return (
                <div key={di}
                  onClick={() => day && setSelected(isSelected ? null : { day, milestones: dayMilestones, dateStr })}
                  style={{
                    minHeight: 80,
                    borderTop: `1px solid ${P.border}`,
                    borderRight: di < 6 ? `1px solid ${P.border}` : "none",
                    padding: "6px 8px",
                    background: isSelected ? P.accentDim : phaseForDay ? phaseColorMap[phaseForDay.code] + "18" : day ? P.card : P.bg,
                    cursor: day ? "pointer" : "default",
                    position: "relative",
                    transition: "background .1s",
                  }}
                  onMouseEnter={e => { if (day) e.currentTarget.style.background = isSelected ? P.accentDim : P.cardHover; }}
                  onMouseLeave={e => { if (day) e.currentTarget.style.background = isSelected ? P.accentDim : phaseForDay ? phaseColorMap[phaseForDay.code] + "18" : P.card; }}
                >
                  {day && (
                    <>
                      {/* Phase top bar */}
                      {phaseForDay && (
                        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: phaseColorMap[phaseForDay.code], borderRadius: "2px 2px 0 0" }} />
                      )}
                      {/* Day number */}
                      <div style={{
                        fontSize: 13, fontWeight: isTodayCell ? 700 : 400,
                        color: isTodayCell ? "#fff" : P.textMuted,
                        background: isTodayCell ? P.accent : "transparent",
                        width: 24, height: 24, borderRadius: "50%",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        marginBottom: 4,
                      }}>{day}</div>
                      {/* Milestone dots */}
                      {dayMilestones.slice(0, 3).map(m => {
                        const st = milestoneStatus(m.pctComplete);
                        const dotColor = st === "Completed" ? P.green : m.type === "non-billable" ? P.purple : m.type === "change-order" ? P.yellow : P.accentLight;
                        return (
                          <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 2 }}>
                            <div style={{ width: 6, height: 6, borderRadius: "50%", background: dotColor, flexShrink: 0 }} />
                            <span style={{ fontSize: 10, color: P.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: "calc(100% - 12px)" }}>{m.name}</span>
                          </div>
                        );
                      })}
                      {dayMilestones.length > 3 && (
                        <div style={{ fontSize: 10, color: P.textDim }}>+{dayMilestones.length - 3} more</div>
                      )}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Day detail panel */}
      {selected && (
        <div style={{ marginTop: 20, background: P.card, border: `1px solid ${P.border}`, borderRadius: 10, padding: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}>
            {MONTH_NAMES[calMonth]} {selected.day}, {calYear}
            {selected.milestones.length === 0 && <span style={{ color: P.textDim, fontWeight: 400, fontSize: 13, marginLeft: 12 }}>No milestones due</span>}
          </div>
          {selected.milestones.map(m => {
            const st = milestoneStatus(m.pctComplete);
            const stColor = MILESTONE_STATUS_COLORS[st] || MILESTONE_STATUS_COLORS["Not Started"];
            const typeColor = m.type === "billable" ? { bg: P.accentDim, text: P.accentLight }
              : m.type === "change-order" ? { bg: P.yellowDim, text: P.yellow }
              : { bg: P.purpleDim, text: P.purple };
            return (
              <div key={m.id} style={{ padding: "10px 14px", marginBottom: 8, background: P.bg, borderRadius: 8, border: `1px solid ${P.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 4 }}>{m.name}</div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <Badge color={typeColor} text={m.type === "billable" ? "Billable" : m.type === "change-order" ? "Change Order" : "Non-Billable"} />
                    <span style={{ fontSize: 12, color: P.textDim }}>Phase: {m.phase}</span>
                    {m.fee > 0 && <span style={{ fontSize: 12, color: P.green, fontFamily: "JetBrains Mono" }}>{fmt(m.fee)}</span>}
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 80 }}><ProgressBar pct={m.pctComplete || 0} color={m.pctComplete >= 100 ? P.green : P.accent} /></div>
                  <span style={{ fontSize: 12, fontFamily: "JetBrains Mono", color: P.textMuted, minWidth: 32 }}>{m.pctComplete || 0}%</span>
                  <Badge color={stColor} text={st} />
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── TEAM CALENDAR (all projects) ────────────────────────────────────────────

function TeamCalendar({ projects, onNavigateToProject }) {
  const today = new Date();
  const [calYear, setCalYear] = useState(today.getFullYear());
  const [calMonth, setCalMonth] = useState(today.getMonth());
  const [selected, setSelected] = useState(null);
  const [filterProject, setFilterProject] = useState("All");

  const active = projects.filter(p => !p.archived);

  // Assign a distinct color per project
  const PROJECT_CAL_COLORS = ["#3b82f6","#10b981","#8b5cf6","#f59e0b","#ef4444","#06b6d4","#ec4899","#84cc16","#f97316","#6366f1"];
  const projectColorMap = {};
  active.forEach((p, i) => { projectColorMap[p.id] = PROJECT_CAL_COLORS[i % PROJECT_CAL_COLORS.length]; });

  const allMilestones = active
    .filter(p => filterProject === "All" || p.id === filterProject)
    .flatMap(p => (p.milestones || []).map(m => ({ ...m, projectName: p.name, projectNumber: p.projectNumber || "", projectId: p.id, pm: p.projectManager })));

  function prevMonth() {
    if (calMonth === 0) { setCalYear(y => y - 1); setCalMonth(11); } else setCalMonth(m => m - 1);
    setSelected(null);
  }
  function nextMonth() {
    if (calMonth === 11) { setCalYear(y => y + 1); setCalMonth(0); } else setCalMonth(m => m + 1);
    setSelected(null);
  }
  function goToday() { setCalYear(today.getFullYear()); setCalMonth(today.getMonth()); setSelected(null); }

  const daysInMonth = getDaysInMonth(calYear, calMonth);
  const firstDay = getFirstDayOfMonth(calYear, calMonth);
  const cells = Array(firstDay).fill(null).concat(Array.from({ length: daysInMonth }, (_, i) => i + 1));
  while (cells.length % 7 !== 0) cells.push(null);

  function getMilestonesForDay(day) {
    const dateStr = `${calYear}-${String(calMonth + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    return allMilestones.filter(m => m.dueDate === dateStr);
  }

  const isToday = (day) => day && today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === day;

  // Count milestones this month for the header
  const monthStr = `${calYear}-${String(calMonth + 1).padStart(2,"0")}`;
  const thisMonthCount = allMilestones.filter(m => (m.dueDate || "").startsWith(monthStr)).length;

  // ── Outlook sync state ──
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | syncing | done | error
  const [syncLog, setSyncLog] = useState([]); // [{name, status, message}]
  const [syncedCount, setSyncedCount] = useState(0);
  const [showSyncLog, setShowSyncLog] = useState(false);

  // All milestones with a due date (across all projects, not just filtered view)
  const allSyncableMilestones = active.flatMap(p =>
    (p.milestones || [])
      .filter(m => m.dueDate)
      .map(m => ({ ...m, projectName: p.name, projectNumber: p.projectNumber || "", projectId: p.id }))
  );

  async function syncToOutlook() {
    setSyncStatus("syncing");
    setSyncLog([]);
    setSyncedCount(0);

    // Load previously synced event IDs from localStorage (per-browser cache of event IDs)
    const syncMapKey = "setty_pms_cal_sync";
    let syncMap = {};
    try { syncMap = JSON.parse(localStorage.getItem(syncMapKey) || "{}"); } catch(e) {}

    const log = [];
    let successCount = 0;
    const newSyncMap = { ...syncMap };

    for (let i = 0; i < allSyncableMilestones.length; i++) {
      const m = allSyncableMilestones[i];
      const existingEventId = syncMap[m.id];
      setSyncLog([...log, { name: `${m.projectName} — ${m.name}`, status: "pending" }]);

      const result = await createOrUpdateCalendarEvent(m, m.projectName, m.projectNumber, existingEventId);

      if (result.success) {
        newSyncMap[m.id] = result.eventId;
        log.push({ name: `${m.projectName} — ${m.name}`, status: "success", message: existingEventId ? "Updated" : "Created" });
        successCount++;
      } else {
        log.push({ name: `${m.projectName} — ${m.name}`, status: "error", message: result.error });
      }
      setSyncLog([...log]);
      setSyncedCount(successCount);
    }

    try { localStorage.setItem(syncMapKey, JSON.stringify(newSyncMap)); } catch(e) {}
    setSyncStatus(log.some(l => l.status === "error") ? "done_with_errors" : "done");
    setShowSyncLog(true);
  }

  return (
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 4 }}>Team Calendar</div>
          <div style={{ color: P.textMuted, fontSize: 13 }}>{thisMonthCount} milestone{thisMonthCount !== 1 ? "s" : ""} due in {MONTH_NAMES[calMonth]}</div>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <select value={filterProject} onChange={e => setFilterProject(e.target.value)} style={{ width: 220 }}>
            <option value="All">All Projects</option>
            {active.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <Btn
            variant={syncStatus === "done" ? "success" : syncStatus === "done_with_errors" ? "warning" : "primary"}
            small
            disabled={syncStatus === "syncing"}
            onClick={syncToOutlook}
          >
            {syncStatus === "syncing"
              ? `⏳ Syncing… ${syncLog.length}/${allSyncableMilestones.length}`
              : syncStatus === "done"
              ? `✓ Synced ${syncedCount} events`
              : syncStatus === "done_with_errors"
              ? `⚠ ${syncedCount} synced, errors`
              : "📅 Sync to NYC Shared Calendar"}
          </Btn>
          {(syncStatus === "done" || syncStatus === "done_with_errors") && (
            <Btn small variant="ghost" onClick={() => setShowSyncLog(v => !v)}>
              {showSyncLog ? "Hide log" : "View log"}
            </Btn>
          )}
        </div>
      </div>

      {/* Sync log */}
      {showSyncLog && syncLog.length > 0 && (
        <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 10, padding: 16, marginBottom: 20, maxHeight: 260, overflowY: "auto" }}>
          <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 10 }}>Sync Log → NYC Shared Calendar (sara.arias@setty.com) — {syncedCount}/{allSyncableMilestones.length} events</div>
          {syncLog.map((l, i) => (
            <div key={i} style={{ padding: "5px 0", borderBottom: `1px solid ${P.border}`, fontSize: 12 }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                <span style={{ color: l.status === "success" ? P.green : P.red, minWidth: 16, marginTop: 1 }}>
                  {l.status === "success" ? "✓" : "✗"}
                </span>
                <div style={{ flex: 1 }}>
                  <div style={{ color: P.text, fontWeight: 500 }}>{l.name}</div>
                  {l.status === "error" && (
                    <div style={{ color: P.red, fontSize: 11, marginTop: 2 }}>{l.message}</div>
                  )}
                  {l.status === "error" && l.debug && (
                    <pre style={{ color: P.textDim, fontSize: 10, marginTop: 4, whiteSpace: "pre-wrap", wordBreak: "break-all", background: "#0a0c14", padding: "6px 8px", borderRadius: 4, maxHeight: 120, overflowY: "auto" }}>{l.debug}</pre>
                  )}
                  {l.status === "success" && (
                    <div style={{ color: P.green, fontSize: 11, marginTop: 2 }}>{l.message}</div>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Nav */}
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 20 }}>
        <Btn small variant="ghost" onClick={prevMonth}>‹ Prev</Btn>
        <div style={{ fontWeight: 700, fontSize: 16, minWidth: 180, textAlign: "center" }}>{MONTH_NAMES[calMonth]} {calYear}</div>
        <Btn small variant="ghost" onClick={nextMonth}>Next ›</Btn>
        <Btn small variant="ghost" onClick={goToday}>Today</Btn>
      </div>

      {/* Project color legend */}
      {filterProject === "All" && (
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
          {active.map(p => (
            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
              <div style={{ width: 10, height: 10, borderRadius: "50%", background: projectColorMap[p.id] }} />
              <span style={{ color: P.textMuted }}>{p.name || "Unnamed"}</span>
            </div>
          ))}
        </div>
      )}

      {/* Calendar grid */}
      <div style={{ border: `1px solid ${P.border}`, borderRadius: 10, overflow: "hidden" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", background: P.bg }}>
          {DAY_NAMES.map(d => (
            <div key={d} style={{ padding: "8px 0", textAlign: "center", fontSize: 11, fontWeight: 600, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em" }}>{d}</div>
          ))}
        </div>
        {Array.from({ length: cells.length / 7 }, (_, wi) => (
          <div key={wi} style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)" }}>
            {cells.slice(wi * 7, wi * 7 + 7).map((day, di) => {
              const dayMilestones = day ? getMilestonesForDay(day) : [];
              const isSelected = selected?.day === day;
              const isTodayCell = isToday(day);
              return (
                <div key={di}
                  onClick={() => day && setSelected(isSelected ? null : { day, milestones: dayMilestones })}
                  style={{
                    minHeight: 80,
                    borderTop: `1px solid ${P.border}`,
                    borderRight: di < 6 ? `1px solid ${P.border}` : "none",
                    padding: "6px 8px",
                    background: isSelected ? P.accentDim : day ? P.card : P.bg,
                    cursor: day ? "pointer" : "default",
                    transition: "background .1s",
                  }}
                  onMouseEnter={e => { if (day && !isSelected) e.currentTarget.style.background = P.cardHover; }}
                  onMouseLeave={e => { if (day && !isSelected) e.currentTarget.style.background = P.card; }}
                >
                  {day && (
                    <>
                      <div style={{
                        fontSize: 13, fontWeight: isTodayCell ? 700 : 400,
                        color: isTodayCell ? "#fff" : P.textMuted,
                        background: isTodayCell ? P.accent : "transparent",
                        width: 24, height: 24, borderRadius: "50%",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        marginBottom: 4,
                      }}>{day}</div>
                      {dayMilestones.slice(0, 3).map(m => {
                        const dotColor = projectColorMap[m.projectId] || P.accent;
                        const st = milestoneStatus(m.pctComplete);
                        return (
                          <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 2 }}>
                            <div style={{ width: 6, height: 6, borderRadius: "50%", background: st === "Completed" ? P.green : dotColor, flexShrink: 0 }} />
                            <span style={{ fontSize: 10, color: P.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: "calc(100% - 12px)" }}>{m.name}</span>
                          </div>
                        );
                      })}
                      {dayMilestones.length > 3 && (
                        <div style={{ fontSize: 10, color: P.textDim }}>+{dayMilestones.length - 3} more</div>
                      )}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Day detail panel */}
      {selected && (
        <div style={{ marginTop: 20, background: P.card, border: `1px solid ${P.border}`, borderRadius: 10, padding: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}>
            {MONTH_NAMES[calMonth]} {selected.day}, {calYear}
            {selected.milestones.length === 0 && <span style={{ color: P.textDim, fontWeight: 400, fontSize: 13, marginLeft: 12 }}>No milestones due</span>}
          </div>
          {selected.milestones.map(m => {
            const st = milestoneStatus(m.pctComplete);
            const stColor = MILESTONE_STATUS_COLORS[st] || MILESTONE_STATUS_COLORS["Not Started"];
            const dotColor = projectColorMap[m.projectId] || P.accent;
            const typeColor = m.type === "billable" ? { bg: P.accentDim, text: P.accentLight }
              : m.type === "change-order" ? { bg: P.yellowDim, text: P.yellow }
              : { bg: P.purpleDim, text: P.purple };
            return (
              <div key={m.id} style={{ padding: "10px 14px", marginBottom: 8, background: P.bg, borderRadius: 8, border: `1px solid ${P.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 4 }}>{m.name}</div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                        <div style={{ width: 8, height: 8, borderRadius: "50%", background: dotColor }} />
                        <button onClick={() => onNavigateToProject(m.projectId)}
                          style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 12, padding: 0, fontWeight: 600 }}>
                          {m.projectName}
                        </button>
                      </div>
                      <Badge color={typeColor} text={m.type === "billable" ? "Billable" : m.type === "change-order" ? "Change Order" : "Non-Billable"} />
                      <span style={{ fontSize: 12, color: P.textDim }}>Phase: {m.phase}</span>
                      {m.fee > 0 && <span style={{ fontSize: 12, color: P.green, fontFamily: "JetBrains Mono" }}>{fmt(m.fee)}</span>}
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 80 }}><ProgressBar pct={m.pctComplete || 0} color={m.pctComplete >= 100 ? P.green : P.accent} /></div>
                    <span style={{ fontSize: 12, fontFamily: "JetBrains Mono", color: P.textMuted, minWidth: 32 }}>{m.pctComplete || 0}%</span>
                    <Badge color={stColor} text={st} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ─── SUBCONSULTANTS ───────────────────────────────────────────────────────────

const SUB_DISCIPLINES = ["Civil", "Structural", "Geotechnical", "Landscape", "Facade/Curtainwall",
  "Acoustics", "AV/IT", "Security", "Vertical Transport/Elevators", "Lighting Design",
  "Commissioning", "LEED/Sustainability", "Kitchen/Food Service", "Medical Equipment", "Other"];

function SubsView({ project, onChange }) {
  const subs = project.subconsultants || [];
  const phases = (project.phases || []).filter(p => p.billable && p.fee > 0);

  function addSub() {
    onChange({ ...project, subconsultants: [...subs, {
      id: uid(), firm: "", discipline: "Civil", contact: "", phone: "", email: "",
      contractStatus: "Not Started", fee: 0, notes: "",
      phases: {}
    }]});
  }

  function updateSub(id, updates) {
    onChange({ ...project, subconsultants: subs.map(s => s.id === id ? { ...s, ...updates } : s) });
  }

  function updateSubPhase(subId, phaseCode, val) {
    const sub = subs.find(s => s.id === subId);
    if (!sub) return;
    const newPhases = { ...sub.phases, [phaseCode]: val };
    const newFee = Object.values(newPhases).reduce((a, b) => a + (+b || 0), 0);
    updateSub(subId, { phases: newPhases, fee: newFee });
  }

  const totalSubFee = subs.reduce((a, s) => a + (+s.fee || 0), 0);
  const settyFee = (project.phases || []).filter(p => p.billable).reduce((a, p) => a + (p.fee || 0), 0);
  const totalProjectFee = settyFee + totalSubFee;

  const SUB_CONTRACT_STATUSES = ["Not Started", "Requested", "Received", "In Review", "Executed"];
  const SUB_CONTRACT_COLORS = {
    "Not Started": { bg: P.border, text: P.textMuted },
    "Requested": { bg: P.accentDim, text: P.accentLight },
    "Received": { bg: P.purpleDim, text: P.purple },
    "In Review": { bg: P.yellowDim, text: P.yellow },
    "Executed": { bg: P.greenDim, text: P.green },
  };

  return (
    <div>
      <SectionTitle action={<Btn small onClick={addSub} variant="ghost">+ Add Sub</Btn>}>
        Subconsultants
      </SectionTitle>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 16 }}>
        Track sub fees per phase. Sub fees are additive to Setty's fee and shown in the total project cost.
      </div>

      {/* KPI bar */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 24 }}>
        <KpiBox label="SETTY FEE" val={fmt(settyFee)} color={P.accentLight} />
        <KpiBox label="TOTAL SUB FEES" val={fmt(totalSubFee)} color={P.purple} />
        <KpiBox label="TOTAL PROJECT FEE" val={fmt(totalProjectFee)} color={P.green} />
        <KpiBox label="SUBS" val={subs.length} />
      </div>

      {subs.length === 0 ? (
        <div style={{ textAlign: "center", padding: 40, color: P.textDim }}>
          No subconsultants added yet. <button onClick={addSub} style={{ color: P.accentLight, background: "none", border: "none", cursor: "pointer" }}>Add one</button>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {subs.map(sub => {
            const stColor = SUB_CONTRACT_COLORS[sub.contractStatus] || SUB_CONTRACT_COLORS["Not Started"];
            return (
              <div key={sub.id} style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 10, padding: 18 }}>
                {/* Header row */}
                <div style={{ display: "grid", gridTemplateColumns: "2fr 1.5fr 1.5fr 1fr 1fr auto", gap: 12, alignItems: "end", marginBottom: 16 }}>
                  <Field label="Firm Name" style={{ marginBottom: 0 }}>
                    <input value={sub.firm} onChange={e => updateSub(sub.id, { firm: e.target.value })} placeholder="Firm name…" style={{ width: "100%" }} />
                  </Field>
                  <Field label="Discipline" style={{ marginBottom: 0 }}>
                    <select value={sub.discipline} onChange={e => updateSub(sub.id, { discipline: e.target.value })} style={{ width: "100%" }}>
                      {SUB_DISCIPLINES.map(d => <option key={d}>{d}</option>)}
                    </select>
                  </Field>
                  <Field label="Contact" style={{ marginBottom: 0 }}>
                    <input value={sub.contact || ""} onChange={e => updateSub(sub.id, { contact: e.target.value })} placeholder="Contact name…" style={{ width: "100%" }} />
                  </Field>
                  <Field label="Email" style={{ marginBottom: 0 }}>
                    <input value={sub.email || ""} onChange={e => updateSub(sub.id, { email: e.target.value })} placeholder="email@firm.com" style={{ width: "100%" }} />
                  </Field>
                  <Field label="Contract Status" style={{ marginBottom: 0 }}>
                    <select value={sub.contractStatus} onChange={e => updateSub(sub.id, { contractStatus: e.target.value })} style={{ width: "100%", borderColor: stColor.text }}>
                      {SUB_CONTRACT_STATUSES.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </Field>
                  <Btn small variant="danger" onClick={() => onChange({ ...project, subconsultants: subs.filter(s => s.id !== sub.id) })}>✕</Btn>
                </div>

                {/* Phase fee breakdown */}
                {phases.length > 0 && (
                  <div>
                    <div style={{ fontSize: 11, color: P.textDim, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Fee by Phase</div>
                    <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
                      {phases.map(ph => (
                        <div key={ph.code} style={{ minWidth: 100 }}>
                          <div style={{ fontSize: 11, color: P.textMuted, marginBottom: 4 }}>{ph.code} — {ph.name}</div>
                          <input type="number" min="0" step="1000"
                            value={sub.phases?.[ph.code] || ""}
                            onChange={e => updateSubPhase(sub.id, ph.code, +e.target.value)}
                            placeholder="$0"
                            style={{ width: "100%" }}
                          />
                        </div>
                      ))}

              {subs.map(sub => {

                <td colSpan={3} style={{ fontWeight: 700 }}>Total Subconsultant Fees</td>
                <td style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.purple }}>{fmt(totalSubFee)}</td>

              <tr style={{ background: P.bg }}>

              <tr style={{ background: P.accentDim }}>
                <td colSpan={3} style={{ fontWeight: 800 }}>Total Project Fee (Setty + Subs)</td>
                <td style={{ fontFamily: "JetBrains Mono", fontWeight: 800, color: P.green }}>{fmt(totalProjectFee)}</td>
              </tr>
