function FinancialsView({ project, onChange }) {
  const [showInvoiceModal, setShowInvoiceModal] = useState(false);

  const phases = project.phases || [];
  const billablePhases = phases.filter(p => p.billable && p.fee > 0);
  const milestones = project.milestones || [];
  const changeOrders = project.changeOrders || [];
  const invoices = project.invoices || [];

  const totalFee = billablePhases.reduce((a, p) => a + p.fee, 0);
  const approvedCOTotal = changeOrders.filter(c => c.approved).reduce((a, c) => a + c.fee, 0);
  const totalContract = totalFee + approvedCOTotal;

  // Earned value: pct read from milestones (same as Schedule tab)
  const earnedValue = billablePhases.reduce((a, p) => {
    const pct = getPhasePctFromMilestones(p, milestones);
    return a + p.fee * pct / 100;
  }, 0);

  const totalInvoiced = invoices.reduce((a, inv) => a + inv.amount, 0);
  const openBalance = totalContract - totalInvoiced;

  function saveInvoice(inv) {
    onChange({ ...project, invoices: [...invoices, inv] });
  }

  function updateInvoice(id, updates) {
    onChange({ ...project, invoices: invoices.map(inv => inv.id === id ? { ...inv, ...updates } : inv) });
  }

  function deleteInvoice(id) {
    onChange({ ...project, invoices: invoices.filter(inv => inv.id !== id) });
  }

  const totalPaid        = invoices.reduce((a, inv) => a + (inv.amountPaid || 0), 0);
  const totalOutstanding = invoices.reduce((a, inv) => a + Math.max(0, inv.amount - (inv.amountPaid || 0)), 0);

  return (
    <div>
      {/* 5-column KPI row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 12, marginBottom: 28 }}>
        <KpiBox label="Base Contract Fee" val={fmt(totalFee)} />
        <KpiBox label="Approved COs" val={fmt(approvedCOTotal)} color={P.yellow} />
        <KpiBox label="Total Contract Value" val={fmt(totalContract)} color={P.green} />
        <KpiBox label="Earned Value" val={fmt(earnedValue)} color={P.accent} />
        <KpiBox label="Total Invoiced" val={fmt(totalInvoiced)} color={P.purple}
          sub={`Unbilled: ${fmt(openBalance)}`} />
        <KpiBox label="Total Received" val={fmt(totalPaid)} color={P.green}
          sub={totalInvoiced > 0 ? Math.round(totalPaid/totalInvoiced*100) + "% of invoiced" : ""} />
        <KpiBox label="Outstanding" val={fmt(totalOutstanding)} color={totalOutstanding > 0 ? P.red : P.green}
          sub={totalOutstanding > 0 ? "Awaiting payment" : "All paid"} />
      </div>

      {/* Phase summary — pct is read-only from milestones */}
      <SectionTitle>Phase Summary</SectionTitle>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 12 }}>
        % Complete is driven by milestones in the Schedule tab.
      </div>
      <table style={{ marginBottom: 30 }}>
        <thead>
          <tr>
            <th>Phase</th><th>Fee</th><th>% Complete</th>
            <th>Earned Value</th><th>Invoiced</th><th>Remaining</th>
          </tr>
        </thead>
        <tbody>
          {billablePhases.map(ph => {
            const pct = getPhasePctFromMilestones(ph, milestones);
            const earned = ph.fee * pct / 100;
            const phaseInvoiced = invoices.filter(inv => inv.phase === ph.code).reduce((a, inv) => a + inv.amount, 0);
            const remaining = ph.fee - phaseInvoiced;
            return (
              <tr key={ph.id}>
                <td style={{ fontWeight: 500 }}>{ph.name}</td>
                <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(ph.fee)}</td>
                <td>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontFamily: "JetBrains Mono", fontWeight: 600, minWidth: 36, color: pct >= 100 ? P.green : pct > 0 ? P.accentLight : P.textDim }}>
                      {pct}%
                    </span>
                    <div style={{ width: 80 }}><ProgressBar pct={pct} color={pct >= 100 ? P.green : P.accent} /></div>
                  </div>
                </td>
                <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(earned)}</td>
                <td style={{ fontFamily: "JetBrains Mono", color: phaseInvoiced > 0 ? P.purple : P.textDim }}>{fmt(phaseInvoiced)}</td>
                <td style={{ fontFamily: "JetBrains Mono", color: remaining < 0 ? P.red : remaining === 0 ? P.textDim : P.text }}>
                  {fmt(remaining)}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* Invoice Log */}
      <SectionTitle action={
        <div style={{ display: "flex", gap: 8 }}>
          {invoices.length > 0 && <Btn small variant="ghost" onClick={() => printStatement(project)}>🖨 Statement</Btn>}
          <Btn small onClick={() => setShowInvoiceModal(true)}>+ Log Invoice</Btn>
        </div>
      }>
        Invoice Log
      </SectionTitle>
      {invoices.length > 0 && (
        <div style={{ fontSize: 12, color: P.textDim, marginBottom: 12 }}>
          Enter amount paid and date received per invoice to track payment status.
        </div>
      )}

      {invoices.length === 0 ? (
        <div style={{ color: P.textDim, fontSize: 13, padding: "20px 0" }}>
          No invoices logged yet. Click "+ Log Invoice" to add one.
        </div>
      ) : (
        <table>
          <thead>
            <tr>
              <th>Invoice #</th><th>Date</th><th>Milestone / Phase</th><th>Method</th>
              <th>Description</th><th>Invoiced</th><th>Amt Paid</th><th>Date Paid</th><th>Balance</th><th>Status</th><th></th>
            </tr>
          </thead>
          <tbody>
            {invoices.map(inv => {
              const paid = inv.amountPaid || 0;
              const balance = inv.amount - paid;
              const payStatus = paid >= inv.amount ? "paid" : paid > 0 ? "partial" : "unpaid";
              const statusColor = payStatus === "paid"
                ? { bg: P.greenDim, text: P.green }
                : payStatus === "partial"
                ? { bg: P.yellowDim, text: P.yellow }
                : { bg: P.redDim, text: P.red };
              const statusLabel = payStatus === "paid" ? "✓ Paid" : payStatus === "partial" ? "Partial" : "Unpaid";
              return (
                <tr key={inv.id}>
                  <td style={{ fontFamily: "JetBrains Mono", fontWeight: 600 }}>{inv.number}</td>
                  <td style={{ color: P.textMuted, whiteSpace: "nowrap" }}>{inv.date}</td>
                  <td>
                    <div style={{ fontWeight: 500 }}>{inv.milestoneName || inv.phaseName}</div>
                    {inv.milestoneName && <div style={{ fontSize: 11, color: P.textDim }}>Phase: {inv.phaseName}</div>}
                  </td>
                  <td>
                    <Badge
                      color={inv.method === "hours" ? { bg: P.accentDim, text: P.accentLight } : { bg: P.purpleDim, text: P.purple }}
                      text={inv.method === "hours" ? "Hours" : "% of Fee"}
                    />
                  </td>
                  <td style={{ color: P.textMuted }}>{inv.description || "—"}</td>
                  <td style={{ fontFamily: "JetBrains Mono", fontWeight: 600, color: P.green }}>{fmt(inv.amount)}</td>
                  <td>
                    <input type="number" min={0} max={inv.amount} step={1}
                      value={inv.amountPaid || ""}
                      placeholder="0"
                      onChange={e => updateInvoice(inv.id, {
                        amountPaid: +e.target.value,
                        ...(+e.target.value >= inv.amount && !inv.datePaid ? { datePaid: new Date().toISOString().slice(0,10) } : {})
                      })}
                      style={{ width: 90, fontFamily: "JetBrains Mono", color: paid > 0 ? P.green : P.text }} />
                  </td>
                  <td>
                    <input type="date" value={inv.datePaid || ""}
                      onChange={e => updateInvoice(inv.id, { datePaid: e.target.value })}
                      style={{ width: 130 }} />
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono", fontWeight: 600,
                    color: balance <= 0 ? P.green : balance < inv.amount * 0.5 ? P.yellow : P.red }}>
                    {fmt(Math.max(0, balance))}
                  </td>
                  <td><Badge color={statusColor} text={statusLabel} /></td>
                  <td style={{ display: "flex", gap: 6, whiteSpace: "nowrap" }}>
                    <Btn small variant="ghost" onClick={() => printInvoice(inv, project)}>🖨 PDF</Btn>
                    <Btn small variant="danger" onClick={() => deleteInvoice(inv.id)}>✕</Btn>
                  </td>
                </tr>
              );
            })}
            <tr style={{ background: P.bg, borderTop: `2px solid ${P.border}` }}>
              <td colSpan={5} style={{ fontWeight: 700, textAlign: "right", color: P.textMuted, paddingRight: 16 }}>Totals</td>
              <td style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.purple }}>{fmt(totalInvoiced)}</td>
              <td style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>{fmt(totalPaid)}</td>
              <td />
              <td style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: totalOutstanding > 0 ? P.red : P.green }}>{fmt(totalOutstanding)}</td>
              <td colSpan={2} />
            </tr>
          </tbody>
        </table>
      )}

      {showInvoiceModal && (
        <InvoiceModal project={project} onClose={() => setShowInvoiceModal(false)} onSave={saveInvoice} />
      )}
    </div>
  );
}

function printStatement(project) {
  const invoices = project.invoices || [];
  const changeOrders = project.changeOrders || [];

  const auditLocked = (project.feeAuditLog || []).filter(e => e.action === "locked" && e.settyFee);
  const auditFee = auditLocked.length > 0 ? auditLocked[auditLocked.length - 1].settyFee : 0;
  const constructionCostSt = calcConstructionCost(project.squareFootage, project.buildingCategory, project.manualConstructionCost, project.manualRSMeansCostPerSF);
  const contractFee = project.lockedSettyFee || auditFee || (project.manualSettyFee > 0 ? project.manualSettyFee : calcSettyFee(constructionCostSt, project)) || 0;
  const approvedCOs = changeOrders.filter(c => c.approved);
  const coTotal = approvedCOs.reduce((a, c) => a + (c.fee || 0), 0);
  const totalContract = contractFee + coTotal;

  const totalInvoiced = invoices.reduce((a, i) => a + (i.amount || 0), 0);
  const totalPaid     = invoices.reduce((a, i) => a + (i.amountPaid || 0), 0);
  const totalOutstanding = totalInvoiced - totalPaid;
  const totalBalance  = totalContract - totalInvoiced;

  const statusBadge = (inv) => {
    const paid = inv.amountPaid || 0;
    if (paid >= inv.amount) return '<span style="background:#e6f4ea;color:#1a7a34;padding:2px 8px;border-radius:8px;font-size:8pt;font-weight:600;">PAID</span>';
    if (paid > 0) return '<span style="background:#fff3e0;color:#b45309;padding:2px 8px;border-radius:8px;font-size:8pt;font-weight:600;">PARTIAL</span>';
    return '<span style="background:#fde8e8;color:#c00000;padding:2px 8px;border-radius:8px;font-size:8pt;font-weight:600;">UNPAID</span>';
  };

  const invRows = invoices.map((inv, idx) => {
    const paid = inv.amountPaid || 0;
    const balance = inv.amount - paid;
    return `
      <tr style="${idx % 2 === 1 ? "background:#F8F8F8;" : ""}">
        <td style="font-family:monospace;font-weight:600;">${inv.number || "—"}</td>

        <td>${inv.milestoneName || inv.phaseName || "—"}</td>

        <td class="right">$${Math.round(inv.amount).toLocaleString()}</td>
        <td class="right" style="color:#1a7a34;">$${Math.round(paid).toLocaleString()}</td>
        <td class="right" style="${balance > 0 ? "color:#c00000;font-weight:600;" : "color:#1a7a34;"}">${balance > 0 ? "$" + Math.round(balance).toLocaleString() : "—"}</td>
        <td>${inv.datePaid ? fmtDate(inv.datePaid) : "—"}</td>

  const summaryCards = `

        ${coTotal > 0 ? `<div style="font-size:8pt;color:#44546A;">Incl. ${approvedCOs.length} CO${approvedCOs.length !== 1 ? "s" : ""}: $${Math.round(coTotal).toLocaleString()}</div>` : ""}

        <div style="font-size:8pt;color:#44546A;font-weight:700;text-transform:uppercase;margin-bottom:4px;">Total Invoiced</div>
        <div style="font-size:14pt;font-weight:700;color:#2F5496;font-family:monospace;">$${Math.round(totalInvoiced).toLocaleString()}</div>
        <div style="font-size:8pt;color:#44546A;">${invoices.length} invoice${invoices.length !== 1 ? "s" : ""}</div>
      </div>
      <div style="border:1.5px solid #1a7a34;border-radius:6px;padding:12px 16px;">

        <div style="font-size:14pt;font-weight:700;color:#1a7a34;font-family:monospace;">$${Math.round(totalPaid).toLocaleString()}</div>
        <div style="font-size:8pt;color:#44546A;">${Math.round(totalInvoiced > 0 ? totalPaid/totalInvoiced*100 : 0)}% of invoiced</div>

        <div style="font-size:8pt;color:#44546A;font-weight:700;text-transform:uppercase;margin-bottom:4px;">Outstanding</div>

        <div style="font-size:8pt;color:#44546A;">Unbilled: $${Math.round(totalBalance).toLocaleString()}</div>
      </div>
    </div>`;

function ChangeOrdersView({ project, onChange }) {
  const cos = project.changeOrders || [];

  function addCO() {
    onChange({
      ...project,
      changeOrders: [...cos, {
        id: uid(), number: `CO-${cos.length + 1}`, name: "", scope: "", fee: 0,
        sentToClient: false, approved: false,
        date: new Date().toISOString().slice(0, 10), notes: "",
      }],
    });
  }

  function updateCO(id, updates) {
    const newCOs = cos.map(c => c.id === id ? { ...c, ...updates } : c);
    const co = newCOs.find(c => c.id === id);
    let milestones = project.milestones || [];

    if (co?.approved) {
      const existing = milestones.find(m => m.coId === id);
      if (!existing) {
        milestones = [...milestones, {
          id: uid(), coId: id,
          type: "billable",   // ← CO milestones are Billable
          phase: "CO",
          name: `CO: ${co.name || co.number}`,
          fee: co.fee, startDate: co.date, dueDate: co.date,
          pctComplete: 0, status: "Not Started", notes: co.notes || "",
        }];
      } else {
        milestones = milestones.map(m =>
          m.coId === id ? { ...m, name: `CO: ${co.name || co.number}`, fee: co.fee } : m
        );
      }
    } else {
      milestones = milestones.filter(m => m.coId !== id);
    }

    onChange({ ...project, changeOrders: newCOs, milestones });
  }

  const approvedTotal = cos.filter(c => c.approved).reduce((a, c) => a + c.fee, 0);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: 15 }}>Change Orders</div>
          {cos.length > 0 && (

              Approved total: <span style={{ color: P.green, fontWeight: 600, fontFamily: "JetBrains Mono" }}>{fmt(approvedTotal)}</span>

          )}
        </div>
        <Btn small onClick={addCO}>+ Add Change Order</Btn>
      </div>
      {cos.length === 0 && (
        <div style={{ color: P.textDim, fontSize: 13, padding: "20px 0" }}>
          No change orders. Click "+ Add Change Order" to create one.
        </div>
      )}
      {cos.length > 0 && (
        <>
          <table>
            <thead><tr><th>#</th><th>Name</th><th>Scope</th><th>Fee</th><th>Sent?</th><th>Approved?</th><th>Date</th><th>Notes</th><th></th></tr></thead>
            <tbody>
              {cos.map(co => (
                <tr key={co.id}>
                  <td style={{ fontFamily: "JetBrains Mono" }}>{co.number}</td>
                  <td><input value={co.name} onChange={e => updateCO(co.id, { name: e.target.value })} style={{ width: 130 }} /></td>
                  <td><input value={co.scope} onChange={e => updateCO(co.id, { scope: e.target.value })} style={{ width: 150 }} /></td>
                  <td><input type="number" value={co.fee} onChange={e => updateCO(co.id, { fee: +e.target.value })} style={{ width: 90 }} /></td>
                  <td>
                    <input type="checkbox" checked={!!co.sentToClient} onChange={e => updateCO(co.id, { sentToClient: e.target.checked })} />
                    {co.sentToClient && <span style={{ color: P.yellow, fontSize: 11, marginLeft: 5 }}>Sent</span>}
                  </td>
                  <td>
                    <input type="checkbox" checked={!!co.approved} onChange={e => updateCO(co.id, { approved: e.target.checked })} />
                    {co.approved && <span style={{ color: P.green, fontSize: 11, marginLeft: 5 }}>✓ Approved</span>}
                  </td>
                  <td><input type="date" value={co.date} onChange={e => updateCO(co.id, { date: e.target.value })} /></td>
                  <td><input value={co.notes || ""} onChange={e => updateCO(co.id, { notes: e.target.value })} style={{ width: 130 }} /></td>

                  </td>
