            </div>
            <div>
              <div style={{ fontSize: 10, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 3 }}>Already Invoiced</div>
              <div style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>{fmt(alreadyInvoiced)}</div>
            </div>
            <div>
              <div style={{ fontSize: 10, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 3 }}>Forfeited</div>
              <div style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.red }}>{fmt(uninvoiced)}</div>
            </div>
          </div>
        </div>
        <Field label="Reason (optional — included in draft email)">
          <textarea value={reason} onChange={e => setReason(e.target.value)}
            placeholder="e.g. Scope removed by client, phase eliminated in VE…"
            style={{ width: "100%", height: 72, resize: "vertical", fontSize: 13 }} />
        </Field>
        {msg && (
          <div style={{ padding: "8px 12px", borderRadius: 6, marginBottom: 14, fontSize: 12,
            background: status === "done" ? P.greenDim : P.redDim,
            color: status === "done" ? P.green : P.red,
            border: "1px solid " + (status === "done" ? P.green : P.red) }}>
            {msg}
          </div>
        )}
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 4 }}>
          <Btn variant="ghost" onClick={onClose}>Keep Milestone</Btn>
          <Btn variant="danger" disabled={status === "sending" || status === "done"} onClick={confirm}>
            {status === "sending" ? "\u23F3 Creating draft\u2026" : "Cancel Milestone"}
          </Btn>
        </div>
      </div>
    </div>
  );
}


// ─── CUSTOM DATE PICKER ───────────────────────────────────────────────────────
// Used only in ScheduleView phase date cells. Stores/emits YYYY-MM-DD.

const DP_MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DP_MONTHS_FULL  = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DP_DAY_NAMES = ["Su","Mo","Tu","We","Th","Fr","Sa"];

function DatePicker({ value, onChange, disabled, style }) {
  const parsed = value && /^\d{4}-\d{2}-\d{2}$/.test(value) ? new Date(value + "T00:00:00") : null;
  const [open, setOpen] = React.useState(false);
  const [viewYear, setViewYear] = React.useState(() => parsed ? parsed.getFullYear() : new Date().getFullYear());
  const [viewMonth, setViewMonth] = React.useState(() => parsed ? parsed.getMonth() : new Date().getMonth());
  const [mode, setMode] = React.useState("days"); // "days" | "months" | "years"
  const ref = React.useRef(null);

  // Close on outside click
  React.useEffect(() => {
    if (!open) return;
    function handler(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  // Sync view when value changes externally
  React.useEffect(() => {
    if (parsed) { setViewYear(parsed.getFullYear()); setViewMonth(parsed.getMonth()); }
  }, [value]);

  function select(y, m, d) {
    const mm = String(m + 1).padStart(2, "0");
    const dd = String(d).padStart(2, "0");
    const iso = `${y}-${mm}-${dd}`;
    onChange(iso);
    setOpen(false);
    setMode("days");
  }

  function buildCalendar() {
    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < firstDay; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null);
    return cells;
  }

  const displayVal = parsed
    ? DP_MONTHS_SHORT[parsed.getMonth()] + " " + parsed.getDate() + ", " + parsed.getFullYear()
    : "";

  const selectedDay   = parsed && parsed.getFullYear() === viewYear && parsed.getMonth() === viewMonth ? parsed.getDate() : null;
  const todayD = new Date();
  const todayDay = todayD.getFullYear() === viewYear && todayD.getMonth() === viewMonth ? todayD.getDate() : null;

  // Year range for year picker
  const baseYear = Math.floor(viewYear / 12) * 12;
  const yearGrid = Array.from({ length: 12 }, (_, i) => baseYear + i);

  const popW = 220;

  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block", ...style }}>
      <div onClick={() => { if (!disabled) { setOpen(v => !v); setMode("days"); } }}
        style={{
          display: "flex", alignItems: "center", gap: 6,
          padding: "4px 8px", borderRadius: 6, cursor: disabled ? "not-allowed" : "pointer",
          border: `1px solid ${open ? P.accent : P.border}`,
          background: disabled ? "#2a2a2a" : P.card,
          color: disabled ? "#888" : displayVal ? P.text : P.textDim,
          fontSize: 12, fontFamily: "JetBrains Mono", minWidth: 120, userSelect: "none",
        }}>
        <span style={{ flex: 1 }}>{displayVal || "—"}</span>
        {!disabled && <span style={{ fontSize: 10, color: P.textDim }}>▼</span>}
      </div>

      {open && (
        <div style={{
          position: "absolute", top: "calc(100% + 4px)", left: 0, zIndex: 9000,
          background: P.card, border: `1px solid ${P.accent}`, borderRadius: 10,
          boxShadow: "0 8px 32px rgba(0,0,0,0.5)", width: popW, padding: 10,
        }}>
          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <button onClick={() => mode === "years" ? setMode("days") : (mode === "months" ? setMode("days") : (viewMonth === 0 ? (setViewMonth(11), setViewYear(y => y-1)) : setViewMonth(m => m-1)))}
              style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 14, padding: "0 4px" }}>‹</button>
            <div style={{ display: "flex", gap: 4 }}>
              {mode === "years" ? (
                <span style={{ fontSize: 12, fontWeight: 700, color: P.text }}>{baseYear} – {baseYear + 11}</span>
              ) : (
                <>
                  <button onClick={() => setMode(m => m === "months" ? "days" : "months")}
                    style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 12, fontWeight: 700, padding: "0 2px" }}>
                    {DP_MONTHS_FULL[viewMonth]}
                  </button>
                  <button onClick={() => setMode(m => m === "years" ? "days" : "years")}
                    style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 12, fontWeight: 700, padding: "0 2px" }}>
                    {viewYear}
                  </button>
                </>
              )}
            </div>
            <button onClick={() => mode === "years" ? (setMode("days")) : (mode === "months" ? setMode("days") : (viewMonth === 11 ? (setViewMonth(0), setViewYear(y => y+1)) : setViewMonth(m => m+1)))}
              style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 14, padding: "0 4px" }}>›</button>
          </div>

          {/* Year grid */}
          {mode === "years" && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 3 }}>
              {yearGrid.map(y => (
                <button key={y} onClick={() => { setViewYear(y); setMode("months"); }}
                  style={{ background: y === viewYear ? P.accentDim : "none", border: "none",
                    color: y === viewYear ? P.accentLight : y === todayD.getFullYear() ? P.yellow : P.text,
                    borderRadius: 4, padding: "5px 2px", cursor: "pointer", fontSize: 11, fontWeight: y === viewYear ? 700 : 400 }}>
                  {y}
                </button>
              ))}
            </div>
          )}

          {/* Month grid */}
          {mode === "months" && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 3 }}>
              {DP_MONTHS_SHORT.map((mn, mi) => (
                <button key={mi} onClick={() => { setViewMonth(mi); setMode("days"); }}
                  style={{ background: mi === viewMonth ? P.accentDim : "none", border: "none",
                    color: mi === viewMonth ? P.accentLight : P.text,
                    borderRadius: 4, padding: "6px 2px", cursor: "pointer", fontSize: 11, fontWeight: mi === viewMonth ? 700 : 400 }}>
                  {mn}
                </button>
              ))}
            </div>
          )}

          {/* Day grid */}
          {mode === "days" && (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", marginBottom: 4 }}>
                {DP_DAY_NAMES.map(d => (
                  <div key={d} style={{ textAlign: "center", fontSize: 10, color: P.textDim, fontWeight: 600, padding: "2px 0" }}>{d}</div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 1 }}>
                {buildCalendar().map((d, i) => (
                  <button key={i} onClick={() => d && select(viewYear, viewMonth, d)}
                    disabled={!d}
                    style={{
                      background: d === selectedDay ? P.accent : d === todayDay ? P.accentDim : "none",
                      border: "none", borderRadius: 4,
                      color: !d ? "transparent" : d === selectedDay ? "#fff" : d === todayDay ? P.accentLight : P.text,
                      cursor: d ? "pointer" : "default",
                      fontSize: 11, padding: "4px 1px", textAlign: "center",
                      fontWeight: d === selectedDay ? 700 : 400,
                    }}>
                    {d || ""}
                  </button>
                ))}
              </div>
              {/* Today shortcut */}
              <div style={{ marginTop: 6, textAlign: "center" }}>
                <button onClick={() => {
                  const t = new Date();
                  select(t.getFullYear(), t.getMonth(), t.getDate());
                }} style={{ background: "none", border: `1px solid ${P.border}`, borderRadius: 4,
                  color: P.textDim, cursor: "pointer", fontSize: 10, padding: "2px 10px" }}>
                  Today
                </button>
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}


function ScheduleView({ project, onChange }) {
  const phases = project.phases || [];
  const milestones = project.milestones || [];
  const billablePhases = phases.filter(p => p.billable && p.fee > 0);

  const [calState, setCalState] = useState({});
  const [syncMsg, setSyncMsg] = useState("");
  const [syncingAll, setSyncingAll] = useState(false);
  const [emailStatus, setEmailStatus] = useState("idle"); // idle | sending | done | error
  const [emailMsg, setEmailMsg] = useState("");
  const [invoicePrompt, setInvoicePrompt] = useState(null); // {milestone, newPct, invoiceAmount}
  const [cancelPrompt, setCancelPrompt] = useState(null); // milestone to cancel

  // calMap derived from milestone objects — single source of truth in project data
  const calMap = Object.fromEntries(
    (project.milestones || []).filter(m => m.calendarEventId).map(m => [m.id, m.calendarEventId])
  );

  function saveCalMap(map) {
    // Write eventIds back into the milestone objects and save via onChange
    const newMilestones = (project.milestones || []).map(m => ({
      ...m,
      calendarEventId: map[m.id] || m.calendarEventId || null,
    }));
    onChange({ ...project, milestones: newMilestones });
  }

  async function syncOne(m) {
    if (!m.dueDate) { setSyncMsg("⚠ No due date set on this milestone"); return; }
    setCalState(s => ({ ...s, [m.id]: "syncing" }));
    const result = await createOrUpdateCalendarEvent(m, project.name || "Project", project.projectNumber, calMap[m.id]);
    const newMap = { ...calMap };
    if (result.success) {
      newMap[m.id] = result.eventId;
      saveCalMap(newMap);
      setCalState(s => ({ ...s, [m.id]: "synced" }));
      setSyncMsg(result.warning
        ? `⚠ "${m.name}" — ${result.warning}`
        : `✓ "${m.name}" synced to NYC Shared Calendar`);
    } else {
      setCalState(s => ({ ...s, [m.id]: "error", [`${m.id}_err`]: result.error }));
      setSyncMsg(`✗ "${m.name}" — ${result.error}`);
    }
  }

  async function syncAll() {
    setSyncingAll(true);
    const syncable = milestones.filter(m => m.dueDate);
    const newMap = { ...calMap };
    let ok = 0;
    for (let i = 0; i < syncable.length; i++) {
      const m = syncable[i];
      setSyncMsg(`Syncing ${i+1}/${syncable.length}…`);
      setCalState(s => ({ ...s, [m.id]: "syncing" }));
      const result = await createOrUpdateCalendarEvent(m, project.name || "Project", project.projectNumber, newMap[m.id]);
      if (result.success) {
        newMap[m.id] = result.eventId;
        setCalState(s => ({ ...s, [m.id]: "synced" }));
        ok++;
      } else {
        setCalState(s => ({ ...s, [m.id]: "error", [`${m.id}_err`]: result.error }));
      }
    }
    saveCalMap(newMap);
    setSyncingAll(false);
    const warnings = syncable.filter((_, i) => {
      // detect if any synced with warning (posted to personal)
      return false; // warnings surfaced per-milestone in syncOne
    });
    setSyncMsg(ok === syncable.length
      ? `✓ All ${ok} milestones synced to NYC Shared Calendar`
      : `${ok}/${syncable.length} synced — check individual rows for errors`);
  }

  function updateMilestone(id, field, val, skipPrompt = false) {
    const m = milestones.find(x => x.id === id);
    // Confirm before reducing % complete
    if (field === "pctComplete" && m) {
      const oldPct = m.pctComplete || 0;
      const newPct = +val;
      if (newPct < oldPct && oldPct >= 100) {
        if (!window.confirm("Reduce \"" + m.name + "\" from 100% back to " + newPct + "%?\n\nThis milestone was marked complete. Reducing it will re-open it in the dashboard and affect financial projections.")) return;
      } else if (newPct < oldPct && newPct === 0 && oldPct > 20) {
        if (!window.confirm("Reset \"" + m.name + "\" from " + oldPct + "% back to 0%?\n\nAre you sure?")) return;
      }
    }
    const newMilestones = milestones.map(ms => {
      if (ms.id !== id) return ms;
      const updated = { ...ms, [field]: val };
      if (field === "pctComplete") updated.status = milestoneStatus(+val);
      return updated;
    });
    let newPhases = phases;
    if (field === "dueDate") {
      if (m && m.type === "billable")
        newPhases = phases.map(p => p.code === m.phase ? { ...p, endDate: val } : p);
      if (calMap[id]) setCalState(s => ({ ...s, [id]: "stale" }));
    }
    onChange({ ...project, milestones: newMilestones, phases: newPhases });
    if (!skipPrompt && field === "pctComplete" && +val > 0 && m && m.type === "billable" && m.fee > 0) {
      try {
        const amount = calcInvoiceAmount(m, +val, project);
        if (amount > 0) setInvoicePrompt({ milestone: { ...m }, newPct: +val, invoiceAmount: amount });
      } catch(e) { /* non-fatal — skip invoice prompt if calculation fails */ }
    }
  }

  function updatePhaseDuration(phId, newDays) {
    const ph = phases.find(p => p.id === phId);
    if (!ph || !ph.startDate) return;
    const newEnd = addWorkDays(new Date(ph.startDate + "T00:00:00"), Math.max(1, newDays));
    const newEndStr = newEnd.getFullYear() + "-" + String(newEnd.getMonth()+1).padStart(2,"0") + "-" + String(newEnd.getDate()).padStart(2,"0");
    const newPhases = phases.map(p => p.id === phId ? { ...p, endDate: newEndStr } : p);
    let newMilestones = milestones;
    newMilestones = milestones.map(m =>
      m.type === "billable" && m.phase === ph.code ? { ...m, dueDate: newEndStr } : m
    );
    onChange({ ...project, phases: newPhases, milestones: newMilestones });
  }

  function updatePhaseDate(phId, field, val) {
    const newPhases = phases.map(p => p.id === phId ? { ...p, [field]: val } : p);
    let newMilestones = milestones;
    if (field === "endDate") {
      const ph = phases.find(p => p.id === phId);
      if (ph) {
        newMilestones = milestones.map(m =>
          m.type === "billable" && m.phase === ph.code ? { ...m, dueDate: val } : m
        );
        // Mark affected synced milestones as stale
        const staleIds = milestones.filter(m => m.type === "billable" && m.phase === ph.code && calMap[m.id]).map(m => m.id);
        if (staleIds.length) setCalState(s => { const n = {...s}; staleIds.forEach(id => n[id] = "stale"); return n; });
      }
    }
    onChange({ ...project, phases: newPhases, milestones: newMilestones });
  }

  function addNonBillable() {
    onChange({ ...project, milestones: [...milestones, {
      id: uid(), type: "non-billable", phase: "NB", name: "Comment Response", fee: 0,
      startDate: new Date().toISOString().slice(0, 10),
      dueDate: new Date().toISOString().slice(0, 10),
      pctComplete: 0, status: "Not Started", notes: "",
    }]});
  }

  const syncableCount = milestones.filter(m => m.dueDate).length;
  const syncedCount = (project.milestones || []).filter(m => m.calendarEventId && calState[m.id] !== "stale" && calState[m.id] !== "error").length;

  async function emailSchedule() {
    setEmailStatus("sending");
    setEmailMsg("");
    const sorted = [...milestones].sort((a, b) => {
      if (!a.dueDate && !b.dueDate) return 0;
      if (!a.dueDate) return 1;
      if (!b.dueDate) return -1;
      return a.dueDate > b.dueDate ? 1 : -1;
    });

    const phaseRows = billablePhases.map(ph => {
      const pct = getPhasePctFromMilestones(ph, milestones);
      return `<tr>
        <td style="padding:8px 12px;font-weight:500;">${ph.name}</td>
        <td style="padding:8px 12px;">${ph.startDate ? fmtDate(ph.startDate) : "—"}</td>
        <td style="padding:8px 12px;">${ph.endDate ? fmtDate(ph.endDate) : "—"}</td>
        <td style="padding:8px 12px;">${pct}%</td>
      </tr>`;
    }).join("");

    const msRows = sorted.map(m => {
      const statusColor = m.status === "Completed" ? "#16a34a" : m.status === "In Progress" ? "#2563eb" : "#6b7280";
      return `<tr>
        <td style="padding:8px 12px;">${m.name}</td>
        <td style="padding:8px 12px;">${m.dueDate ? fmtDate(m.dueDate) : "—"}</td>
        <td style="padding:8px 12px;"><span style="color:${statusColor};font-weight:600;">${m.status || "Not Started"}</span></td>
        <td style="padding:8px 12px;">${m.pctComplete || 0}%</td>
        <td style="padding:8px 12px;color:#6b7280;font-size:12px;">${m.notes || ""}</td>
      </tr>`;
    }).join("");

    const bodyHtml = `
<div style="font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:#1a1a1a;max-width:800px;">
  <div style="border-bottom:3px solid #1F3864;padding-bottom:12px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end;">
    <div>
      <div style="font-size:24px;font-weight:900;color:#C00000;letter-spacing:2px;line-height:1;">SETTY</div>
      <div style="font-size:8px;color:#44546A;letter-spacing:1px;">&amp; ASSOCIATES, LTD, PC</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:16px;font-weight:700;color:#2F5496;">PROJECT SCHEDULE</div>
      <div style="font-size:11px;color:#44546A;">${project.name || ""}${project.projectNumber ? " · " + project.projectNumber : ""}</div>
      <div style="font-size:11px;color:#44546A;">${new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
    </div>
  </div>

  ${billablePhases.length > 0 ? `
  <div style="font-weight:700;font-size:13px;color:#1F3864;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #CBD5E1;padding-bottom:5px;margin-bottom:10px;">Phase Summary</div>
  <table style="border-collapse:collapse;width:100%;margin-bottom:24px;font-size:13px;">
    <thead><tr style="background:#F1F5F9;">
      <th style="padding:8px 12px;text-align:left;font-size:11px;color:#44546A;text-transform:uppercase;">Phase</th>
      <th style="padding:8px 12px;text-align:left;font-size:11px;color:#44546A;text-transform:uppercase;">Start</th>
      <th style="padding:8px 12px;text-align:left;font-size:11px;color:#44546A;text-transform:uppercase;">End</th>
      <th style="padding:8px 12px;text-align:left;font-size:11px;color:#44546A;text-transform:uppercase;">% Complete</th>
    </tr></thead>
    <tbody>${phaseRows}</tbody>
  </table>` : ""}

  <div style="font-weight:700;font-size:13px;color:#1F3864;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #CBD5E1;padding-bottom:5px;margin-bottom:10px;">Milestones &amp; Deliverables</div>
  ${sorted.length === 0 ? '<p style="color:#6b7280;">No milestones scheduled.</p>' : `
  <table style="border-collapse:collapse;width:100%;font-size:13px;">
    <thead><tr style="background:#F1F5F9;">
      <th style="padding:8px 12px;text-align:left;font-size:11px;color:#44546A;text-transform:uppercase;">Milestone</th>
      <th style="padding:8px 12px;text-align:left;font-size:11px;color:#44546A;text-transform:uppercase;">Due Date</th>
      <th style="padding:8px 12px;text-align:left;font-size:11px;color:#44546A;text-transform:uppercase;">Status</th>
      <th style="padding:8px 12px;text-align:left;font-size:11px;color:#44546A;text-transform:uppercase;">% Complete</th>
      <th style="padding:8px 12px;text-align:left;font-size:11px;color:#44546A;text-transform:uppercase;">Notes</th>
    </tr></thead>
    <tbody>${msRows}</tbody>
  </table>`}

  <div style="margin-top:28px;padding-top:10px;border-top:1px solid #CBD5E1;font-size:11px;color:#44546A;">
    SETTY &amp; Associates, Ltd, PC &nbsp;·&nbsp; ${project.name || ""} &nbsp;·&nbsp; Schedule as of ${new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}
  </div>
</div>`;

    try {
      await createOutlookDraft({
        subject: `Project Schedule — ${project.name || "Project"}${project.projectNumber ? " (" + project.projectNumber + ")" : ""}`,
        bodyHtml,
      });
      setEmailStatus("done");
      setEmailMsg("✓ Draft created in your Outlook Drafts folder");
      setTimeout(() => { setEmailStatus("idle"); setEmailMsg(""); }, 5000);
    } catch(e) {
      setEmailStatus("error");
      setEmailMsg("✗ " + e.message);
    }
  }

  function MilestoneSpBtn({ m, project, onSave }) {
    const [status, setStatus] = React.useState("idle");
    const url = m.outgoingFolderUrl || "";
    if (url) return (
      <a href={url} target="_blank" rel="noreferrer" title="Open Document Set Folder"
        style={{ display: "inline-flex", alignItems: "center", gap: 3,
          background: "#0078d4", color: "#fff", borderRadius: 5,
          fontSize: 11, fontWeight: 600, padding: "3px 7px", textDecoration: "none", whiteSpace: "nowrap" }}>
        📂 Open
      </a>
    );
    return (
      <button title="Create Document Set Folder"
        disabled={status === "creating" || !project.projectFolderUrl}
        onClick={async () => {
          if (!project.projectFolderUrl) return;
          setStatus("creating");
          try {
            const webUrl = await createMilestoneSpFolder(project, m);
            onSave(webUrl);
            setStatus("done");
          } catch(e) { setStatus("error"); }
        }}
        style={{ display: "inline-flex", alignItems: "center", gap: 3,
          background: status === "error" ? P.redDim : P.accentDim,
          border: `1px solid ${status === "error" ? P.red : P.border}`,
          color: status === "error" ? P.red : P.textDim,
          borderRadius: 5, fontSize: 11, padding: "3px 7px",
          cursor: project.projectFolderUrl ? "pointer" : "not-allowed",
          opacity: project.projectFolderUrl ? 1 : 0.35, whiteSpace: "nowrap" }}>
        {status === "creating" ? "⏳" : status === "error" ? "✗" : "📁+"}
      </button>
    );
  }


  function CalIcon({ m }) {
    const st = calState[m.id];
    const has = !!calMap[m.id];
    if (st === "syncing") return <span style={{ color: P.accentLight, fontSize: 12 }}>⏳</span>;
    if (st === "error") return <span title={calState[`${m.id}_err`] || "Error"} style={{ color: P.red, fontSize: 12, cursor: "help" }}>✗</span>;
    if (st === "stale") return <span title="Date changed — re-sync" style={{ color: P.yellow, fontSize: 12, cursor: "help" }}>⚠</span>;
    if (st === "synced" || has) return <span title="Synced to NYC Shared Calendar" style={{ color: P.green, fontSize: 12 }}>✓</span>;
    return <span style={{ color: P.border, fontSize: 12 }}>–</span>;
  }

  return (
    <>
    <div>
      <SectionTitle>Project Schedule</SectionTitle>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 14 }}>
        Phase % complete is automatically calculated from its associated Milestone below. Update the milestone % to track progress.
      </div>
      <table style={{ marginBottom: 28 }}>
        <thead>
          <tr>
            <th>Phase</th><th>Start</th><th>End</th>
            <th title="Editable — changing recalculates end date">Duration (WD)</th>
            <th>% Complete</th><th>Expected %</th><th>Schedule Health</th><th>Progress</th>
          </tr>
        </thead>
        <tbody>
          {billablePhases.map(ph => {
            const pct = getPhasePctFromMilestones(ph, milestones);
            const durWD = countWorkDays(ph.startDate, ph.endDate);
            const today = new Date();
            const sd = ph.startDate ? new Date(ph.startDate + "T00:00:00") : null;
            const ed = ph.endDate   ? new Date(ph.endDate   + "T00:00:00") : null;

            // Expected % = how far today is through the phase by calendar time
            let expectedPct = 0;
            let healthLabel = "—";
            let healthColor = P.textDim;
            let healthBg = "transparent";
            const phaseComplete = pct >= 100;
            if (phaseComplete) {
              expectedPct = 100;
              healthLabel = "✓ Completed"; healthColor = P.green; healthBg = P.greenDim;
            } else if (sd && ed && ed > sd) {
              const todayLocal = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");
              if (today >= ed) {
                // Past end date
                expectedPct = 100;
                healthLabel = pct >= 100 ? "✓ Complete" : "Overdue";
                healthColor = pct >= 100 ? P.green : P.red;
                healthBg    = pct >= 100 ? P.greenDim : P.redDim;
              } else if (today < sd) {
                // Before start date
                expectedPct = 0;
                if (pct > 0) {
                  // Has progress even though not started — show ahead of schedule
                  healthLabel = "Ahead"; healthColor = P.green; healthBg = P.greenDim;
                } else {
                  healthLabel = "Not Started"; healthColor = P.textDim;
                }
              } else {
                // Active phase
                const elapsed = countWorkDays(ph.startDate, todayLocal);
                expectedPct = Math.round(Math.min(100, (elapsed / Math.max(durWD, 1)) * 100));
                const gap = expectedPct - pct;
                if (gap <= 5) {
                  healthLabel = "On Track"; healthColor = P.green; healthBg = P.greenDim;
                } else if (gap <= 20) {
                  healthLabel = `Behind ${gap}%`; healthColor = P.yellow; healthBg = P.yellowDim;
                } else {
                  healthLabel = `Behind ${gap}%`; healthColor = P.red; healthBg = P.redDim;
                }
              }
            }

            return (
              <tr key={ph.id}>
                <td style={{ fontWeight: 500 }}>{ph.name}</td>
                <td>
                  <DatePicker value={ph.startDate || ""}
                    disabled={phaseComplete}
                    onChange={val => updatePhaseDate(ph.id, "startDate", val)}
                    style={phaseComplete ? { opacity: 0.5, pointerEvents: "none" } : {}} />
                </td>
                <td>
                  <DatePicker value={ph.endDate || ""}
                    disabled={phaseComplete}
                    onChange={val => updatePhaseDate(ph.id, "endDate", val)}
                    style={phaseComplete ? { opacity: 0.5, pointerEvents: "none" } : {}} />
                </td>
                <td>
                  <input type="number" min={1} step={1}
                    value={durWD || ""}
                    onChange={e => updatePhaseDuration(ph.id, +e.target.value)}
                    style={{ width: 64, fontFamily: "JetBrains Mono" }}
                    title="Business days — changing this recalculates the end date" />
                </td>
                <td><span style={{ fontFamily: "JetBrains Mono", fontWeight: 600, color: pct >= 100 ? P.green : pct > 0 ? P.accentLight : P.textDim }}>{pct}%</span></td>
                <td><span style={{ fontFamily: "JetBrains Mono", color: P.textDim, fontSize: 12 }}>{expectedPct > 0 || (sd && today >= sd) ? expectedPct + "%" : "—"}</span></td>
                <td>
                  <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 8, background: healthBg, color: healthColor }}>
                    {healthLabel}
                  </span>
                </td>
                <td style={{ width: 140 }}><ProgressBar pct={pct} color={pct >= 100 ? P.green : P.accent} /></td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* Milestones header with Sync All button */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontWeight: 700, fontSize: 15 }}>
          Milestones & Deliverables
          {syncedCount > 0 && <span style={{ marginLeft: 10, fontSize: 11, color: P.green, fontWeight: 400 }}>{syncedCount}/{syncableCount} in Outlook</span>}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn small onClick={addNonBillable} variant="ghost">+ Add Non-Billable</Btn>
          <Btn small variant="ghost" disabled={emailStatus === "sending"}
            onClick={emailSchedule}>
            {emailStatus === "sending" ? "⏳ Drafting…" : "✉ Email Schedule"}
          </Btn>
          {syncableCount > 0 && (
            <Btn small variant="primary" disabled={syncingAll} onClick={syncAll}>
              {syncingAll ? syncMsg : "📅 Sync All to NYC Calendar"}
            </Btn>
          )}
        </div>
      </div>
      {emailMsg && (
        <div style={{ padding: "8px 14px", borderRadius: 6, marginBottom: 12, fontSize: 12,
          background: emailStatus === "done" ? P.greenDim : P.redDim,
          color: emailStatus === "done" ? P.green : P.red,
          border: "1px solid " + (emailStatus === "done" ? P.green : P.red),
          display: "flex", justifyContent: "space-between" }}>
          <span>{emailMsg}</span>
          <button onClick={() => setEmailMsg("")} style={{ background: "none", border: "none", color: "inherit", cursor: "pointer" }}>✕</button>
        </div>
      )}
      {/* Sync status message */}
      {syncMsg && !syncingAll && (
        <div style={{
          padding: "8px 14px", borderRadius: 6, marginBottom: 12, fontSize: 12,
          background: syncMsg.startsWith("✓") ? P.greenDim : syncMsg.startsWith("✗") ? P.redDim : P.accentDim,
          color: syncMsg.startsWith("✓") ? P.green : syncMsg.startsWith("✗") ? P.red : P.accentLight,
          border: `1px solid ${syncMsg.startsWith("✓") ? P.green : syncMsg.startsWith("✗") ? P.red : P.accent}`,
          display: "flex", justifyContent: "space-between",
        }}>
          <span>{syncMsg}</span>
          <button onClick={() => setSyncMsg("")} style={{ background: "none", border: "none", color: "inherit", cursor: "pointer" }}>✕</button>
        </div>
      )}

      <table>
        <thead>
          <tr>
            <th>Type</th><th>Name</th><th>Phase</th><th>Due Date</th>
            <th>% Complete</th><th>Status</th><th>Notes</th>
            <th title="Outlook calendar sync">📅</th><th></th>
          </tr>
        </thead>
        <tbody>
          {/* Cancelled milestones shown collapsed at bottom */}
          {(milestones.filter(m => m.cancelled)).length > 0 && (
            <tr>
              <td colSpan={9} style={{ padding: "6px 0 2px", fontSize: 11, color: P.textDim, fontStyle: "italic", borderTop: `1px dashed ${P.border}` }}>
                Cancelled ({milestones.filter(m => m.cancelled).length})
                {milestones.filter(m => m.cancelled).map(m => (
                  <span key={m.id} style={{ marginLeft: 10, background: P.redDim, color: P.red, borderRadius: 4, padding: "1px 7px", fontStyle: "normal" }}>
                    {m.name} · {fmt(m.fee || 0)} · {m.cancelDate || ""}
                    <button onClick={() => updateMilestone(m.id, "cancelled", false)}
                      style={{ background: "none", border: "none", color: P.red, cursor: "pointer", fontSize: 11, marginLeft: 4 }} title="Restore milestone">↺</button>
                  </span>
                ))}
              </td>
            </tr>
          )}
          {[...milestones.filter(m => !m.cancelled)].sort((a, b) => {
              if (!a.dueDate && !b.dueDate) return 0;
              if (!a.dueDate) return 1;
              if (!b.dueDate) return -1;
              return a.dueDate > b.dueDate ? 1 : -1;
            }).map(m => {
            const autoStatus = milestoneStatus(m.pctComplete);
            const statusColor = MILESTONE_STATUS_COLORS[autoStatus] || MILESTONE_STATUS_COLORS["Not Started"];
            const typeColor = m.type === "billable" ? { bg: P.accentDim, text: P.accentLight } : { bg: P.purpleDim, text: P.purple };
            return (
              <tr key={m.id}>
                <td><Badge color={typeColor} text={m.type === "billable" ? "Billable" : "Non-Billable"} /></td>
                <td>
                  {m.type === "billable" && project.feeScheduleFinalized
                    ? <span title="Unlock Fee Calculator to rename" style={{ fontSize: 13, color: P.textDim, display: "inline-flex", alignItems: "center", gap: 4 }}>🔒 {m.name}</span>
                    : <input value={m.name} onChange={e => updateMilestone(m.id, "name", e.target.value)} style={{ width: 190 }} />}
                </td>
                <td style={{ color: P.textMuted, fontSize: 12 }}>{m.phase === "__CO__" ? "CO" : m.phase}</td>
                <td>
                  <input type="date" value={m.dueDate || ""}
                    disabled={(m.pctComplete || 0) >= 100}
                    onChange={e => updateMilestone(m.id, "dueDate", e.target.value)}
                    style={(m.pctComplete || 0) >= 100 ? { background: "#3a3a3a", color: "#888", borderColor: "transparent", cursor: "not-allowed" } : {}} />
                </td>
                <td>
                  {(m.pctComplete || 0) >= 100 ? (
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={100} readOnly
                        style={{ width: 72, background: "#3a3a3a", color: "#888", borderColor: "transparent", cursor: "not-allowed" }} />
                      <span style={{ color: "#888", fontSize: 12 }}>%</span>
                      <input type="checkbox" checked readOnly
                        style={{ width: 16, height: 16, cursor: "not-allowed", accentColor: P.green, opacity: 0.6 }} />
                    </div>
                  ) : (
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" min={0} max={100} value={m.pctComplete || 0}
                        onChange={e => updateMilestone(m.id, "pctComplete", +e.target.value, true)}
                        onBlur={e => updateMilestone(m.id, "pctComplete", +e.target.value)}
                        style={{ width: 72, MozAppearance: "textfield" }} />
                      <span style={{ color: P.textDim, fontSize: 12 }}>%</span>
                      <input type="checkbox" checked={false}
                        onChange={e => updateMilestone(m.id, "pctComplete", e.target.checked ? 100 : 0)}
                        title="Mark complete (100%)"
                        style={{ width: 16, height: 16, cursor: "pointer", accentColor: P.green }} />
                    </div>
                  )}
                </td>
                <td>
                  <Badge
                    color={(m.pctComplete || 0) >= 100 ? { bg: P.greenDim, text: P.green } : statusColor}
                    text={(m.pctComplete || 0) >= 100 ? "✓ Completed" : autoStatus}
                  />
                </td>
                <td><input value={m.notes || ""} onChange={e => updateMilestone(m.id, "notes", e.target.value)} placeholder="Notes…" style={{ width: 140 }} /></td>
                <td>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <CalIcon m={m} />
                    {m.dueDate && (
                      <button onClick={() => syncOne(m)} disabled={calState[m.id] === "syncing"}
                        title="Sync this milestone to Outlook"
                        style={{ background: "none", border: "none", cursor: "pointer", color: P.accentLight, fontSize: 11, padding: "2px 4px" }}>
                        ↑
                      </button>
                    )}
                  </div>
                </td>
                <td>
                  <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                    <MilestoneSpBtn m={m} project={project}
                      onSave={url => onChange({ ...project, milestones: milestones.map(x => x.id === m.id ? { ...x, outgoingFolderUrl: url } : x) })} />
                    {m.type === "billable" && (
                      <Btn small variant="danger"
                        onClick={() => setCancelPrompt(m)}
                        title="Cancel this milestone — removes from schedule and drafts team email">
                        Cancel
                      </Btn>
                    )}
                    {m.type !== "billable" && (
                      <Btn small variant="danger" onClick={() => { if (window.confirm("Delete milestone \"" + m.name + "\"?\n\nThis permanently removes it from the project. This cannot be undone.")) onChange({ ...project, milestones: milestones.filter(x => x.id !== m.id) }); }}>✕</Btn>
                    )}
                    {m.type === "billable" && !project.feeScheduleFinalized && (
                      <Btn small variant="danger" onClick={() => { if (window.confirm("Delete milestone \"" + m.name + "\"?\n\nThis permanently removes it from the project. This cannot be undone.")) onChange({ ...project, milestones: milestones.filter(x => x.id !== m.id) }); }}>✕</Btn>
                    )}
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
    {invoicePrompt && (
      <InvoicePromptModal
        milestone={invoicePrompt.milestone}
        project={project}
        newPct={invoicePrompt.newPct}
        invoiceAmount={invoicePrompt.invoiceAmount}
        onLogInvoice={inv => onChange({ ...project, invoices: [...(project.invoices || []), inv] })}
        onClose={() => setInvoicePrompt(null)}
      />
    )}
    {cancelPrompt && (
      <CancelMilestoneModal
        milestone={cancelPrompt}
        project={project}
        onConfirm={updates => {
          const newMilestones = milestones.map(x =>
            x.id === cancelPrompt.id ? { ...x, ...updates } : x
          );
          onChange({ ...project, milestones: newMilestones });
        }}
        onClose={() => setCancelPrompt(null)}
      />
    )}
    </>
  );
}

// ─── INVOICE MODAL ────────────────────────────────────────────────────────────

function InvoiceModal({ project, onClose, onSave }) {
  const billableMilestones = (project.milestones || []).filter(m => m.type === "billable" && m.fee > 0 && !m.cancelled);
  const billablePhases = (project.phases || []).filter(p => p.billable && p.fee > 0);
  const team = project.teamMembers || [];

  const [method, setMethod] = useState("pct");
  const [invoiceNumber, setInvoiceNumber] = useState(
    `INV-${String((project.invoices || []).length + 1).padStart(3, "0")}`
  );
  const [invoiceDate, setInvoiceDate] = useState(new Date().toISOString().slice(0, 10));
  const [selectedMilestoneId, setSelectedMilestoneId] = useState(billableMilestones[0]?.id || "");
  const [pctToInvoice, setPctToInvoice] = useState(100);
  const [description, setDescription] = useState("");
  const [hoursRows, setHoursRows] = useState(
    team.map(tm => ({ memberId: tm.id, name: tm.name || tm.role, role: tm.role, rate: tm.rate || 0, hours: 0 }))
  );

  function updateHoursRow(idx, updates) {
    setHoursRows(prev => prev.map((r, i) => i === idx ? { ...r, ...updates } : r));
  }

  const selectedMilestone = billableMilestones.find(m => m.id === selectedMilestoneId);
  const milestoneFee = selectedMilestone?.fee || 0;
  // Derive which phase this milestone belongs to for tracking
  const milestonePhaseCode = selectedMilestone?.phase || "";
  const milestonePhase = billablePhases.find(p => p.code === milestonePhaseCode);

  const amountByPct = milestoneFee * (pctToInvoice / 100);
  const amountByHours = hoursRows.reduce((a, r) => a + r.rate * r.hours, 0);
  const invoiceAmount = method === "pct" ? amountByPct : amountByHours;

  function handleSave() {
    if (invoiceAmount <= 0) return;
    const lineItems = method === "hours"
      ? hoursRows.filter(r => r.hours > 0).map(r => ({ name: r.name, role: r.role, rate: r.rate, hours: r.hours, amount: r.rate * r.hours }))
      : [{ name: `${pctToInvoice}% of ${selectedMilestone?.name || "Milestone"}`, amount: amountByPct }];

    onSave({
      id: uid(),
      number: invoiceNumber,
      date: invoiceDate,
      phase: milestonePhaseCode,
      phaseName: milestonePhase?.name || milestonePhaseCode,
      milestoneId: selectedMilestoneId,
      milestoneName: selectedMilestone?.name || "",
      method,
      description,
      lineItems,
      amount: invoiceAmount,
      finalized: true,
    });
    onClose();
  }

  return (
    <Modal title="Log Invoice" onClose={onClose} wide>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
        <Field label="Invoice Number">
          <input value={invoiceNumber} onChange={e => setInvoiceNumber(e.target.value)} style={{ width: "100%" }} />
        </Field>
        <Field label="Invoice Date">
          <input type="date" value={invoiceDate} onChange={e => setInvoiceDate(e.target.value)} style={{ width: "100%" }} />
        </Field>
        <Field label="Description (optional)" style={{ gridColumn: "1 / -1" }}>
          <input value={description} onChange={e => setDescription(e.target.value)} placeholder="e.g. Monthly draw, SD phase completion…" style={{ width: "100%" }} />
        </Field>
      </div>

      {/* Method toggle */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {[["pct", "% of Milestone Fee"], ["hours", "Hours × Rate"]].map(([val, label]) => (
          <button key={val} onClick={() => setMethod(val)}
            style={{ padding: "7px 18px", borderRadius: 6, fontSize: 13, fontWeight: 500, cursor: "pointer", border: `1px solid ${method === val ? P.accent : P.border}`, background: method === val ? P.accentDim : P.bg, color: method === val ? P.accentLight : P.textMuted }}>
            {label}
          </button>
        ))}
      </div>

      {method === "pct" && (
        <Card style={{ marginBottom: 20 }}>
          {billableMilestones.length === 0 ? (
            <div style={{ color: P.textDim, fontSize: 13 }}>No billable milestones found. Finalize the fee schedule first to generate milestones.</div>
          ) : (
            <>
              <Field label="Milestone">
                <select value={selectedMilestoneId} onChange={e => setSelectedMilestoneId(e.target.value)} style={{ width: "100%" }}>
                  {billableMilestones.map(m => (
                    <option key={m.id} value={m.id}>{m.name} — Phase: {m.phase} — Fee: {fmt(m.fee)}</option>
                  ))}
                </select>
              </Field>
              <Field label={`% of Milestone Fee to Invoice — Milestone total: ${fmt(milestoneFee)}`}>
                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                  <input type="number" min={0} max={100} step={5} value={pctToInvoice}
                    onChange={e => setPctToInvoice(+e.target.value)} style={{ width: 80 }} />
                  <span style={{ color: P.textMuted }}>%</span>
                  <span style={{ color: P.green, fontWeight: 700, fontFamily: "JetBrains Mono", fontSize: 18 }}>{fmt(amountByPct)}</span>
                </div>
              </Field>
            </>
          )}
        </Card>
      )}

      {method === "hours" && (
        <Card style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, color: P.textDim, marginBottom: 12 }}>
            Rates are pre-filled from Team tab. Edit hours as needed.
          </div>
          <table>
            <thead><tr><th>Team Member</th><th>Role</th><th>Rate ($/hr)</th><th>Hours</th><th>Amount</th></tr></thead>
            <tbody>
              {hoursRows.map((r, idx) => (
                <tr key={r.memberId}>
                  <td>{r.name || "—"}</td>
                  <td style={{ color: P.textMuted, fontSize: 12 }}>{r.role}</td>
                  <td>
                    <input type="number" value={r.rate} onChange={e => updateHoursRow(idx, { rate: +e.target.value })} style={{ width: 80 }} />
                  </td>
                  <td>
                    <input type="number" min={0} step={0.5} value={r.hours} onChange={e => updateHoursRow(idx, { hours: +e.target.value })} style={{ width: 70 }} />
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono", color: r.hours > 0 ? P.green : P.textDim }}>{fmt(r.rate * r.hours)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      {/* Total */}
      <div style={{ background: P.bg, borderRadius: 8, padding: "12px 16px", marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center", border: `1px solid ${P.border}` }}>
        <div style={{ fontWeight: 600 }}>Invoice Total</div>
        <div style={{ fontFamily: "JetBrains Mono", fontWeight: 700, fontSize: 22, color: P.green }}>{fmt(invoiceAmount)}</div>
      </div>

      <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        <Btn onClick={handleSave} disabled={invoiceAmount <= 0}>✓ Finalize & Log Invoice</Btn>
      </div>
    </Modal>
  );
}

function fmtDate(str) {
  if (!str) return "";
  const [y, m, d] = str.split("-");
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return (months[parseInt(m,10)-1] || m) + " " + parseInt(d,10) + ", " + y;
}

function printInvoice(inv, project) {
  const lineItemsHtml = inv.lineItems && inv.lineItems.length > 0
    ? inv.lineItems.map((li, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${li.name || li.role || "Service"}</td>
          ${inv.method === "hours" ? `<td class="right">${li.hours || "—"}</td><td class="right">$${(li.rate || 0).toLocaleString()}/hr</td>` : ""}
          <td class="right">$${Math.round(li.amount || 0).toLocaleString()}</td>
        </tr>`).join("")
    : `<tr><td colspan="${inv.method === "hours" ? 5 : 3}">— No line items —</td></tr>`;

  const hoursHeader = inv.method === "hours"
    ? `<th class="right">Hours</th><th class="right">Rate</th>`
    : "";

  // ── Fee Schedule ──
  // Use locked fee or best available
  const auditLocked = (project.feeAuditLog || []).filter(e => e.action === "locked" && e.settyFee);

  // Approved COs add to contract value
  const approvedCOs = (project.changeOrders || []).filter(c => c.approved);
  const coTotal = approvedCOs.reduce((a, c) => a + (c.fee || 0), 0);
  const totalContractFee = contractFee + coTotal;

  // Billable phases from locked fee schedule
  const billablePhases = (project.phases || []).filter(p => p.billable && p.fee > 0);

  // All invoices except the current one (already billed before this invoice)
  const priorInvoices = (project.invoices || []).filter(i => i.id !== inv.id);

  const totalInvoicedToDate = totalPriorInvoiced + (inv.amount || 0);
  const remainingBalance = totalContractFee - totalInvoicedToDate;

  // Per-phase: fee, previously invoiced, this invoice amount (if same phase)
  const feeScheduleRows = billablePhases.map(ph => {
    const phaseFee = ph.fee || 0;
    const phaseInvoiced = priorInvoices
      .filter(i => i.phase === ph.code)
      .reduce((a, i) => a + (i.amount || 0), 0);
    const thisInvAmt = (inv.phase === ph.code) ? (inv.amount || 0) : 0;
    const totalBilledThisPhase = phaseInvoiced + thisInvAmt;
    const phaseBalance = phaseFee - totalBilledThisPhase;
    const isCurrentPhase = inv.phase === ph.code;
    return { ph, phaseFee, phaseInvoiced, thisInvAmt, totalBilledThisPhase, phaseBalance, isCurrentPhase };
  });

  // CO rows for fee schedule
  const coRows = approvedCOs.map(co => {
    const coInvoiced = priorInvoices
      .filter(i => i.phase === "CO" && (project.milestones || []).find(m => m.coId === co.id && m.id === i.milestoneId))
      .reduce((a, i) => a + (i.amount || 0), 0);
    const coBalance = (co.fee || 0) - coInvoiced;
    return { co, coInvoiced, coBalance };

      <td class="right" style="color:#aaa;">—</td>
      <td class="right" style="${r.coBalance <= 0 ? "color:#1a56a0;" : ""}">${r.coBalance <= 0 ? "✓ Billed" : "$" + Math.round(r.coBalance).toLocaleString()}</td>
    </tr>`).join("");

  const html = `

      const projectKeyword = project.projectNumber || project.name || "";
      const paymentKeywords = ["payment received", "wire transfer", "ACH", "check", "remittance", "paid in full"];
      const kw = [projectKeyword, ...invNums].filter(Boolean).join(" OR ");
      const searchQ = encodeURIComponent(`"${kw}" AND (payment OR remittance OR wire OR check OR ACH)`);
      const url = `https://graph.microsoft.com/v1.0/me/messages?$search="${kw}"&$top=25&$select=id,subject,from,receivedDateTime,bodyPreview`;
      const res = await fetch(`https://graph.microsoft.com/v1.0/me/messages?$top=25&$select=id,subject,from,receivedDateTime,bodyPreview&$filter=contains(subject,'${encodeURIComponent(projectKeyword)}')`, {
        headers: { Authorization: "Bearer " + token }
      });
      if (!res.ok) throw new Error("Graph API " + res.status);
      const data = await res.json();
      const emails = data.value || [];
      // Match emails to unpaid invoices
      const unpaid = (project.invoices||[]).filter(inv => !inv.amountPaid || inv.amountPaid < inv.amount);
      const matches = emails.filter(email => {
        const txt = (email.subject + " " + email.bodyPreview).toLowerCase();
        return paymentKeywords.some(kw2 => txt.includes(kw2.toLowerCase())) ||
          unpaid.some(inv => inv.number && txt.includes(inv.number.toLowerCase()));
      }).map(email => ({
        emailId: email.id,
        subject: email.subject,
        from: email.from?.emailAddress?.name || email.from?.emailAddress?.address || "Unknown",
        received: email.receivedDateTime,
        preview: email.bodyPreview,
        suggestedInvoice: unpaid.find(inv => inv.number && (email.subject + " " + email.bodyPreview).toLowerCase().includes(inv.number.toLowerCase())) || null,
      }));
      setScanResults(matches);
      setScanStatus("done");
      setScanMsg(matches.length > 0 ? `Found ${matches.length} potential payment email${matches.length > 1 ? "s" : ""} — review and confirm below.` : "No payment-related emails found matching this project.");
    } catch(e) {
      setScanStatus("error");
      setScanMsg("✗ Scan failed: " + e.message);
    }
  }

  function applyScanMatch(match, invoiceId, amount) {
    onChange({ ...project, invoices: (project.invoices||[]).map(inv =>
      inv.id === invoiceId ? { ...inv, amountPaid: amount, datePaid: match.received ? match.received.slice(0,10) : new Date().toISOString().slice(0,10) } : inv
    )});
    setScanResults(scanResults.filter(m => m.emailId !== match.emailId));
  }

  return (
    <div>
      {/* 5-column KPI row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 12, marginBottom: 28 }}>
        <KpiBox label="Base Contract Fee" val={fmt(totalFee)} />
        <KpiBox label="Approved COs" val={fmt(approvedCOTotal)} color={P.yellow} />
        <KpiBox label="Total Contract Value" val={fmt(totalContract)} color={P.green} />
        <KpiBox label="Earned Value" val={fmt(earnedValue)} color={P.accent} />
        <KpiBox label="Total Invoiced" val={fmt(totalInvoiced)} color={P.purple}
          sub={`Unbilled: ${fmt(openBalance)}`} />
        <KpiBox label="Total Received" val={fmt(totalPaid)} color={P.green}
          sub={totalInvoiced > 0 ? Math.round(totalPaid/totalInvoiced*100) + "% of invoiced" : ""} />
        <KpiBox label="Outstanding" val={fmt(totalOutstanding)} color={totalOutstanding > 0 ? P.red : P.green}
          sub={totalOutstanding > 0 ? "Awaiting payment" : "All paid"} />
      </div>

      {/* Phase summary — pct is read-only from milestones */}
      <SectionTitle>Phase Summary</SectionTitle>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 12 }}>
        % Complete is driven by milestones in the Schedule tab.
      </div>
      <table style={{ marginBottom: 30 }}>
        <thead>
          <tr>
            <th>Phase</th><th>Fee</th><th>% Complete</th>
            <th>Earned Value</th><th>Invoiced</th><th>Remaining</th>
          </tr>
        </thead>
        <tbody>
          {billablePhases.map(ph => {
            const pct = getPhasePctFromMilestones(ph, milestones);
            const earned = ph.fee * pct / 100;
            const phaseInvoiced = invoices.filter(inv => inv.phase === ph.code).reduce((a, inv) => a + inv.amount, 0);
            const remaining = ph.fee - phaseInvoiced;
            return (
              <tr key={ph.id}>
                <td style={{ fontWeight: 500 }}>{ph.name}</td>
                <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(ph.fee)}</td>
                <td>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontFamily: "JetBrains Mono", fontWeight: 600, minWidth: 36, color: pct >= 100 ? P.green : pct > 0 ? P.accentLight : P.textDim }}>
                      {pct}%
                    </span>
                    <div style={{ width: 80 }}><ProgressBar pct={pct} color={pct >= 100 ? P.green : P.accent} /></div>
                  </div>
                </td>
                <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(earned)}</td>
                <td style={{ fontFamily: "JetBrains Mono", color: phaseInvoiced > 0 ? P.purple : P.textDim }}>{fmt(phaseInvoiced)}</td>
                <td style={{ fontFamily: "JetBrains Mono", color: remaining < 0 ? P.red : remaining === 0 ? P.textDim : P.text }}>
                  {fmt(remaining)}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* Invoice Log */}
      <SectionTitle>Accounting POC</SectionTitle>
      <div style={{ marginBottom: 24 }}>
        <POCSection
          pocList={(project.projectContacts || {}).accounting || []}
          onChange={val => onChange({ ...project, projectContacts: { ...(project.projectContacts || {}), accounting: val } })}
          clients={clients}
          companyName={project.prime || project.clientName || ""}
          onUpdateClient={onUpdateClient}
        />
      </div>
      <SectionTitle action={
        <div style={{ display: "flex", gap: 8 }}>
          {invoices.length > 0 && <Btn small variant="ghost" disabled={emailStatus === "sending"} onClick={emailInvoices}>{emailStatus === "sending" ? "⏳ Drafting…" : "✉ Email Statement"}</Btn>}
          {invoices.length > 0 && <Btn small variant="ghost" onClick={() => printStatement(project)}>🖨 Statement</Btn>}
          {invoices.some(inv => !inv.amountPaid || inv.amountPaid < inv.amount) && (
            <Btn small variant="ghost" disabled={scanStatus === "scanning"} onClick={scanInboxForPayments}>
              {scanStatus === "scanning" ? "⏳ Scanning…" : "📬 Scan Inbox"}
            </Btn>
          )}
          <Btn small onClick={() => setShowInvoiceModal(true)}>+ Log Invoice</Btn>
        </div>
      }>
        Invoice Log
      </SectionTitle>
      {emailMsg && (
        <div style={{ padding: "8px 14px", borderRadius: 6, marginBottom: 12, fontSize: 12,
          background: emailStatus === "done" ? P.greenDim : P.redDim,
          color: emailStatus === "done" ? P.green : P.red,
          border: "1px solid " + (emailStatus === "done" ? P.green : P.red),
          display: "flex", justifyContent: "space-between" }}>
          <span>{emailMsg}</span>
          <button onClick={() => setEmailMsg("")} style={{ background: "none", border: "none", color: "inherit", cursor: "pointer" }}>✕</button>
        </div>
      )}
      {scanMsg && (
        <div style={{ padding: "8px 14px", borderRadius: 6, marginBottom: 12, fontSize: 12,
          background: scanStatus === "error" ? P.redDim : P.accentDim,
          color: scanStatus === "error" ? P.red : P.accentLight,
          border: "1px solid " + (scanStatus === "error" ? P.red : P.accent) }}>
          {scanMsg}
        </div>
      )}
      {scanResults && scanResults.length > 0 && (
        <div style={{ background: P.card, border: "1px solid " + P.accent, borderRadius: 10, padding: 16, marginBottom: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 12, color: P.accentLight }}>📬 Potential Payment Emails</div>
          {scanResults.map(match => {
            const unpaid = (project.invoices||[]).filter(inv => !inv.amountPaid || inv.amountPaid < inv.amount);
            return (
              <div key={match.emailId} style={{ background: P.bg, border: "1px solid " + P.border, borderRadius: 8, padding: 14, marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 13 }}>{match.subject}</div>
                    <div style={{ fontSize: 11, color: P.textDim, marginTop: 2 }}>From: {match.from} · {match.received ? new Date(match.received).toLocaleDateString() : ""}</div>
                    <div style={{ fontSize: 11, color: P.textMuted, marginTop: 4, fontStyle: "italic" }}>{(match.preview||"").slice(0,140)}…</div>
                  </div>
                  <button onClick={() => setScanResults(scanResults.filter(m => m.emailId !== match.emailId))}
                    style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 16, marginLeft: 12 }}>✕</button>
                </div>
                <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ fontSize: 12, color: P.textDim }}>Apply to invoice:</span>
                  {unpaid.map(inv => (
                    <button key={inv.id} onClick={() => applyScanMatch(match, inv.id, inv.amount - (inv.amountPaid||0))}
                      style={{ fontSize: 12, padding: "4px 12px", borderRadius: 6, border: "1px solid " + (match.suggestedInvoice?.id === inv.id ? P.green : P.border),
                        background: match.suggestedInvoice?.id === inv.id ? P.greenDim : P.card, color: match.suggestedInvoice?.id === inv.id ? P.green : P.textMuted, cursor: "pointer" }}>
                      {inv.number} · {fmt(inv.amount - (inv.amountPaid||0))}
                      {match.suggestedInvoice?.id === inv.id && " ✓"}
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {invoices.length > 0 && (
        <div style={{ fontSize: 12, color: P.textDim, marginBottom: 12 }}>
          Enter amount paid and date received per invoice to track payment status.
        </div>
      )}

      {invoices.length === 0 ? (
        <div style={{ color: P.textDim, fontSize: 13, padding: "20px 0" }}>
          No invoices logged yet. Click "+ Log Invoice" to add one.
        </div>
      ) : (
        <table>
          <thead>
            <tr>
              <th>Invoice #</th><th>Date</th><th>Milestone / Phase</th><th>Method</th>
              <th>Description</th><th>Invoiced</th><th>Amt Paid</th><th>Date Paid</th><th>Balance</th><th>Status</th><th></th>
            </tr>
          </thead>
          <tbody>
            {invoices.map(inv => {
              const paid = inv.amountPaid || 0;
              const balance = inv.amount - paid;
              const payStatus = paid >= inv.amount ? "paid" : paid > 0 ? "partial" : "unpaid";
              const statusColor = payStatus === "paid"
                ? { bg: P.greenDim, text: P.green }
                : payStatus === "partial"
                ? { bg: P.yellowDim, text: P.yellow }
                : { bg: P.redDim, text: P.red };
              const statusLabel = payStatus === "paid" ? "✓ Paid" : payStatus === "partial" ? "Partial" : "Unpaid";
              return (
                <tr key={inv.id}>
                  <td style={{ fontFamily: "JetBrains Mono", fontWeight: 600 }}>{inv.number}</td>
                  <td style={{ whiteSpace: "nowrap" }}>
                    <input type="date" value={inv.date || ""}
                      onChange={e => updateInvoice(inv.id, { date: e.target.value })}
                      style={{ width: 130, color: P.textMuted, border: "1px solid transparent",
                        background: "transparent", cursor: "pointer" }}
                      title="Click to edit invoice date" />
                  </td>
                  <td>
                    <div style={{ fontWeight: 500 }}>{inv.milestoneName || inv.phaseName}</div>
                    {inv.milestoneName && <div style={{ fontSize: 11, color: P.textDim }}>Phase: {inv.phaseName}</div>}
                  </td>
                  <td>
                    <Badge
                      color={inv.method === "hours" ? { bg: P.accentDim, text: P.accentLight } : { bg: P.purpleDim, text: P.purple }}
                      text={inv.method === "hours" ? "Hours" : "% of Fee"}
                    />
                  </td>
                  <td style={{ color: P.textMuted }}>{inv.description || "—"}</td>
                  <td style={{ fontFamily: "JetBrains Mono", fontWeight: 600, color: P.green }}>{fmt(inv.amount)}</td>
                  <td>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" min={0} max={inv.amount} step={1}
                        value={inv.amountPaid || ""}
                        placeholder="0"
                        onChange={e => updateInvoice(inv.id, {
                          amountPaid: +e.target.value,
                          ...(+e.target.value >= inv.amount && !inv.datePaid ? { datePaid: new Date().toISOString().slice(0,10) } : {})
                        })}
                        style={{ width: 90, fontFamily: "JetBrains Mono", color: paid > 0 ? P.green : P.text }} />
                      {paid < inv.amount && (
                        <button
                          onClick={() => updateInvoice(inv.id, {
                            amountPaid: inv.amount,
                            datePaid: inv.datePaid || new Date().toISOString().slice(0,10)
                          })}
                          title="Mark fully paid"
                          style={{ background: P.greenDim, border: `1px solid ${P.green}`, borderRadius: 5,
                            color: P.green, cursor: "pointer", fontSize: 11, fontWeight: 700,
                            padding: "3px 8px", whiteSpace: "nowrap" }}>
                          Paid
                        </button>
                      )}
                    </div>
                  </td>
                  <td>
                    <input type="date" value={inv.datePaid || ""}
                      onChange={e => updateInvoice(inv.id, { datePaid: e.target.value })}
                      style={{ width: 130 }} />
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono", fontWeight: 600,
                    color: balance <= 0 ? P.green : balance < inv.amount * 0.5 ? P.yellow : P.red }}>
                    {fmt(Math.max(0, balance))}
                  </td>
                  <td><Badge color={statusColor} text={statusLabel} /></td>
                  <td style={{ display: "flex", gap: 6, whiteSpace: "nowrap" }}>
                    <Btn small variant="ghost" onClick={() => printInvoice(inv, project)}>🖨 PDF</Btn>
                    <Btn small variant="danger" onClick={() => deleteInvoice(inv.id)}>✕</Btn>
                  </td>
                </tr>
              );
            })}
            <tr style={{ background: P.bg, borderTop: `2px solid ${P.border}` }}>
              <td colSpan={5} style={{ fontWeight: 700, textAlign: "right", color: P.textMuted, paddingRight: 16 }}>Totals</td>
              <td style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.purple }}>{fmt(totalInvoiced)}</td>
              <td style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>{fmt(totalPaid)}</td>
              <td />
              <td style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: totalOutstanding > 0 ? P.red : P.green }}>{fmt(totalOutstanding)}</td>
              <td colSpan={2} />
            </tr>
          </tbody>
        </table>
      )}

      {showInvoiceModal && (
        <InvoiceModal project={project} onClose={() => setShowInvoiceModal(false)} onSave={saveInvoice} />
      )}
    </div>
  );
}

// ─── PROJECT STATEMENT ───────────────────────────────────────────────────────

function printStatement(project) {
  const invoices = project.invoices || [];
  const changeOrders = project.changeOrders || [];

  const auditLocked = (project.feeAuditLog || []).filter(e => e.action === "locked" && e.settyFee);
  const auditFee = auditLocked.length > 0 ? auditLocked[auditLocked.length - 1].settyFee : 0;
  const constructionCostSt = calcConstructionCost(project.squareFootage, project.buildingCategory, project.manualConstructionCost, project.manualRSMeansCostPerSF);
  const contractFee = project.lockedSettyFee || auditFee || (project.manualSettyFee > 0 ? project.manualSettyFee : calcSettyFee(constructionCostSt, project)) || 0;
  const approvedCOs = changeOrders.filter(c => c.approved);
  const coTotal = approvedCOs.reduce((a, c) => a + (c.fee || 0), 0);
  const totalContract = contractFee + coTotal;

  const totalInvoiced = invoices.reduce((a, i) => a + (i.amount || 0), 0);
  const totalPaid     = invoices.reduce((a, i) => a + (i.amountPaid || 0), 0);
  const totalOutstanding = totalInvoiced - totalPaid;
  const totalBalance  = totalContract - totalInvoiced;

  const statusBadge = (inv) => {
    const paid = inv.amountPaid || 0;
    if (paid >= inv.amount) return '<span style="background:#e6f4ea;color:#1a7a34;padding:2px 8px;border-radius:8px;font-size:8pt;font-weight:600;">PAID</span>';
    if (paid > 0) return '<span style="background:#fff3e0;color:#b45309;padding:2px 8px;border-radius:8px;font-size:8pt;font-weight:600;">PARTIAL</span>';
    return '<span style="background:#fde8e8;color:#c00000;padding:2px 8px;border-radius:8px;font-size:8pt;font-weight:600;">UNPAID</span>';
  };

  const invRows = invoices.map((inv, idx) => {
    const paid = inv.amountPaid || 0;
    const balance = inv.amount - paid;
    return `
      <tr style="${idx % 2 === 1 ? "background:#F8F8F8;" : ""}">
        <td style="font-family:monospace;font-weight:600;">${inv.number || "—"}</td>
        <td>${fmtDate(inv.date)}</td>
        <td>${inv.milestoneName || inv.phaseName || "—"}</td>
        <td>${inv.description || "—"}</td>
        <td class="right">$${Math.round(inv.amount).toLocaleString()}</td>
        <td class="right" style="color:#1a7a34;">$${Math.round(paid).toLocaleString()}</td>
        <td class="right" style="${balance > 0 ? "color:#c00000;font-weight:600;" : "color:#1a7a34;"}">${balance > 0 ? "$" + Math.round(balance).toLocaleString() : "—"}</td>
        <td>${inv.datePaid ? fmtDate(inv.datePaid) : "—"}</td>
        <td>${statusBadge(inv)}</td>
      </tr>`;
  }).join("");

  const summaryCards = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;">
      <div style="border:1.5px solid #1F3864;border-radius:6px;padding:12px 16px;">
        <div style="font-size:8pt;color:#44546A;font-weight:700;text-transform:uppercase;margin-bottom:4px;">Contract Value</div>
        <div style="font-size:14pt;font-weight:700;color:#1F3864;font-family:monospace;">$${Math.round(totalContract).toLocaleString()}</div>
        ${coTotal > 0 ? `<div style="font-size:8pt;color:#44546A;">Incl. ${approvedCOs.length} CO${approvedCOs.length !== 1 ? "s" : ""}: $${Math.round(coTotal).toLocaleString()}</div>` : ""}
      </div>
      <div style="border:1.5px solid #2F5496;border-radius:6px;padding:12px 16px;">
        <div style="font-size:8pt;color:#44546A;font-weight:700;text-transform:uppercase;margin-bottom:4px;">Total Invoiced</div>
        <div style="font-size:14pt;font-weight:700;color:#2F5496;font-family:monospace;">$${Math.round(totalInvoiced).toLocaleString()}</div>
        <div style="font-size:8pt;color:#44546A;">${invoices.length} invoice${invoices.length !== 1 ? "s" : ""}</div>
      </div>
      <div style="border:1.5px solid #1a7a34;border-radius:6px;padding:12px 16px;">
        <div style="font-size:8pt;color:#44546A;font-weight:700;text-transform:uppercase;margin-bottom:4px;">Total Received</div>
        <div style="font-size:14pt;font-weight:700;color:#1a7a34;font-family:monospace;">$${Math.round(totalPaid).toLocaleString()}</div>
        <div style="font-size:8pt;color:#44546A;">${Math.round(totalInvoiced > 0 ? totalPaid/totalInvoiced*100 : 0)}% of invoiced</div>
      </div>
      <div style="border:1.5px solid #c00000;border-radius:6px;padding:12px 16px;">
        <div style="font-size:8pt;color:#44546A;font-weight:700;text-transform:uppercase;margin-bottom:4px;">Outstanding</div>
        <div style="font-size:14pt;font-weight:700;color:${totalOutstanding > 0 ? "#c00000" : "#1a7a34"};font-family:monospace;">$${Math.round(totalOutstanding).toLocaleString()}</div>
        <div style="font-size:8pt;color:#44546A;">Unbilled: $${Math.round(totalBalance).toLocaleString()}</div>
      </div>
    </div>`;

  const html = `
    <div class="doc-header">
      <div>
        <div class="logo-text">SETTY</div>
        <div class="logo-sub">& ASSOCIATES, LTD, PC</div>
        <div style="margin-top:10px;font-size:8.5pt;color:#44546A;line-height:1.6;">
          Fairfax, VA (HQ) · Washington DC · New York · Baltimore<br>
          Atlanta · Philadelphia · Los Angeles · Tampa · India
        </div>
      </div>
      <div class="doc-type-badge">
        <div class="doc-type">STATEMENT</div>
        <div class="doc-number">${project.projectNumber || project.name || "Project"}</div>
        <div style="font-size:9pt;color:#44546A;margin-top:6px;">As of: ${fmtDate(new Date().toISOString().slice(0,10))}</div>
      </div>
    </div>

    <div class="meta-grid">
      <div class="meta-block">
        <div class="meta-label">Project</div>
        <div class="meta-value">${project.name || "—"}</div>
        ${project.projectNumber ? `<div style="font-size:9pt;color:#44546A;">${project.projectNumber}</div>` : ""}
      </div>
      <div class="meta-block">
        <div class="meta-label">Client / Prime</div>
        <div class="meta-value">${project.prime || "—"}</div>
        ${project.primeProjectNumber ? `<div style="font-size:9pt;color:#44546A;">Prime #: ${project.primeProjectNumber}</div>` : ""}
      </div>
      <div class="meta-block">
        <div class="meta-label">Contract Number</div>
        <div class="meta-value">${project.contractNumber || "—"}</div>
        ${project.contractDate ? `<div style="font-size:9pt;color:#44546A;">Dated: ${fmtDate(project.contractDate)}</div>` : ""}
      </div>
      <div class="meta-block">
        <div class="meta-label">Fee Type</div>
        <div class="meta-value">${project.feeType || "Lump Sum"}</div>
      </div>
    </div>

    ${summaryCards}

    <div class="section-heading">Invoice Register</div>
    <table class="line-items">
      <thead>
        <tr>
          <th>Invoice #</th>
          <th>Invoice Date</th>
          <th>Milestone / Phase</th>
          <th>Description</th>
          <th class="right">Amount</th>
          <th class="right">Paid</th>
          <th class="right">Balance</th>
          <th>Date Paid</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>${invRows.length ? invRows : `<tr><td colspan="9" style="text-align:center;color:#44546A;font-style:italic;padding:16px;">No invoices recorded</td></tr>`}</tbody>
      <tfoot>
        <tr>
          <td colspan="4" style="text-align:right;font-weight:700;">Totals</td>
          <td class="right">$${Math.round(totalInvoiced).toLocaleString()}</td>
          <td class="right" style="color:#1a7a34;">$${Math.round(totalPaid).toLocaleString()}</td>
          <td class="right" style="color:${totalOutstanding > 0 ? "#c00000" : "#1a7a34"};">$${Math.round(totalOutstanding).toLocaleString()}</td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>

    ${approvedCOs.length > 0 ? `
    <div class="section-heading">Approved Change Orders</div>
    <table class="line-items">
      <thead><tr><th>#</th><th>Name</th><th>Date</th><th>Scope</th><th class="right">Fee</th></tr></thead>
      <tbody>
        ${approvedCOs.map((co, i) => `
          <tr style="${i % 2 === 1 ? "background:#F8F8F8;" : ""}">
            <td style="font-family:monospace;">${co.number}</td>
            <td>${co.name || "—"}</td>
            <td>${fmtDate(co.date)}</td>
            <td>${co.scope || "—"}</td>
            <td class="right">$${Math.round(co.fee || 0).toLocaleString()}</td>
          </tr>`).join("")}
      </tbody>
      <tfoot>

function MiniRichEditor({ value, onChange, placeholder }) {
  const editorRef = React.useRef(null);
  const initialized = React.useRef(false);

  React.useEffect(() => {
    if (editorRef.current && !initialized.current) {
      editorRef.current.innerHTML = value || "";
      initialized.current = true;
    }
  }, []);

  function exec(cmd, val) {
    document.execCommand(cmd, false, val || null);
    editorRef.current?.focus();
    save();
  }

  function save() {
    const html = editorRef.current ? editorRef.current.innerHTML : "";
    onChange(html);
  }

  const tbBtn = (label, cmd, val, title) => (
    <button key={label}
      onMouseDown={e => { e.preventDefault(); exec(cmd, val); }}
      title={title || label}
      style={{ background: "none", border: "1px solid " + P.border, color: P.text, borderRadius: 4, padding: "2px 8px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", minWidth: 28, lineHeight: 1.4 }}>
      {label}
    </button>
  );

  return (
    <div style={{ border: "1px solid " + P.accent, borderRadius: 8, overflow: "hidden", background: P.bg }}>
      {/* Toolbar */}
      <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "6px 8px", borderBottom: "1px solid " + P.border, flexWrap: "wrap", background: P.card }}>
        {tbBtn("B", "bold", null, "Bold")}
        {tbBtn("I", "italic", null, "Italic")}
        {tbBtn("U", "underline", null, "Underline")}
        <div style={{ width: 1, height: 18, background: P.border, margin: "0 2px" }} />
        {tbBtn("• List", "insertUnorderedList", null, "Bullet list")}
        {tbBtn("1. List", "insertOrderedList", null, "Numbered list")}
        <div style={{ width: 1, height: 18, background: P.border, margin: "0 2px" }} />
        {tbBtn("H3", "formatBlock", "h3", "Heading")}
        {tbBtn("¶", "formatBlock", "p", "Paragraph")}
        <div style={{ width: 1, height: 18, background: P.border, margin: "0 2px" }} />
        <button onMouseDown={e => { e.preventDefault(); exec("removeFormat"); exec("formatBlock", "p"); }}
          title="Clear formatting"
          style={{ background: "none", border: "1px solid " + P.border, color: P.textDim, borderRadius: 4, padding: "2px 8px", fontSize: 11, cursor: "pointer" }}>
          Clear
        </button>
      </div>
      {/* Editor */}
      <div
        ref={editorRef}
        contentEditable
        suppressContentEditableWarning
        onInput={save}
        onBlur={save}
        data-placeholder={placeholder || "Enter scope of change…"}
        style={{ minHeight: 120, maxHeight: 320, overflowY: "auto", padding: "10px 14px", outline: "none", fontSize: 13, lineHeight: 1.65, color: P.text }}
      />
      <style>{`
        [contenteditable]:empty:before { content: attr(data-placeholder); color: ${P.textDim}; pointer-events: none; }
        [contenteditable] h3 { font-size: 13px; font-weight: 700; margin: 6px 0 3px; }
        [contenteditable] p { margin: 0 0 6px; }
        [contenteditable] ul, [contenteditable] ol { margin: 4px 0 6px 20px; }
        [contenteditable] li { margin-bottom: 2px; }
      `}</style>
    </div>
  );
}

function addWD(dateStr, days) {
  const d = new Date(dateStr + "T00:00:00");
  let count = 0;
  while (count < days) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0 && d.getDay() !== 6) count++;
  }
  return d.toISOString().slice(0, 10);
}

function isOverdue(item) {
  if (!item.dueDate) return false;
  const closed = ["Closed", "Void", "Responded", "Returned"];
  if (closed.includes(item.status)) return false;
  return new Date(item.dueDate + "T00:00:00") < new Date();
}

function newRFI(cos, dueDays) {
  const today = new Date().toISOString().slice(0, 10);
  const num = cos.length + 1;
  return {
    id: uid(), number: "RFI-" + String(num).padStart(3, "0"),
    title: "", description: "", from: "", discipline: "Mechanical",
    assignedTo: [], subAssigned: "",
    dateReceived: today, dueDate: addWD(today, dueDays || 5),
    dateResponded: "", response: "",
    status: "Open", notes: "",
    spFolderUrl: "",
  };
}

function newSubmittal(subs, dueDays) {
  const today = new Date().toISOString().slice(0, 10);

    id: uid(), number: "SUB-" + String(num).padStart(3, "0"),

    status: "Received", stamp: "—", resubNumber: 0,

    registerItemId: "",
  };
}
