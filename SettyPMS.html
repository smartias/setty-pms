// ─── INVOICE PROJECTIONS ──────────────────────────────────────────────────────

function ProjectionsView({ project }) {
  const phases = (project.phases || []).filter(p => p.billable && p.fee > 0 && p.endDate);
  const invoices = project.invoices || [];
  const milestones = (project.milestones || []).filter(m => m.type === "billable" && m.fee > 0 && m.dueDate);
  const today = new Date();

  // Build projection rows from billable milestones
  const rows = milestones.map(m => {
    const invoiced = invoices
      .filter(inv => inv.milestoneId === m.id)
      .reduce((a, inv) => a + (inv.amount || 0), 0);
    const remaining = (m.fee || 0) - invoiced;
    const due = m.dueDate ? new Date(m.dueDate + "T00:00:00") : null;
    const isOverdue = due && due < today && remaining > 0;
    const isPending = due && due >= today && due <= new Date(today.getTime() + 30 * 86400000);
    return { ...m, invoiced, remaining, due, isOverdue, isPending };
  });

  const totalFee = rows.reduce((a, r) => a + r.fee, 0);
  const totalInvoiced = rows.reduce((a, r) => a + r.invoiced, 0);
  const totalRemaining = rows.reduce((a, r) => a + r.remaining, 0);
  const overdueAmt = rows.filter(r => r.isOverdue).reduce((a, r) => a + r.remaining, 0);
  const next30Amt = rows.filter(r => r.isPending).reduce((a, r) => a + r.remaining, 0);

  // Monthly cash flow — distribute each phase fee proportionally across its duration
  // Uses phase startDate/endDate from the schedule; falls back to milestone due date if missing
  const monthlyMap = {};

  function addToMonth(key, fee, invoiced, label) {
    if (!monthlyMap[key]) monthlyMap[key] = { month: key, fee: 0, invoiced: 0, milestones: [] };
    monthlyMap[key].fee += fee;
    monthlyMap[key].invoiced += invoiced;
    if (label && !monthlyMap[key].milestones.includes(label)) monthlyMap[key].milestones.push(label);
  }

  // Build a map of phase code → phase for schedule lookup
  const phaseSchedule = {};
  (project.phases || []).forEach(ph => { if (ph.code) phaseSchedule[ph.code] = ph; });

  // Distribute expected fees proportionally across phase duration months
  rows.forEach(r => {
    const ph = phaseSchedule[r.phase];
    const sd = ph?.startDate ? new Date(ph.startDate + "T00:00:00") : null;
    const ed = ph?.endDate   ? new Date(ph.endDate   + "T00:00:00") : null;

    if (sd && ed && ed > sd) {
      const totalDays = (ed - sd) / 86400000 + 1;
      const startYM = sd.getFullYear() * 12 + sd.getMonth();
      const endYM   = ed.getFullYear() * 12 + ed.getMonth();
      for (let ym = startYM; ym <= endYM; ym++) {
        const yr  = Math.floor(ym / 12);
        const mo  = ym % 12;
        const key = `${yr}-${String(mo + 1).padStart(2, "0")}`;
        const mStart = new Date(yr, mo, 1);
        const mEnd   = new Date(yr, mo + 1, 0);
        const overlapStart = sd > mStart ? sd : mStart;
        const overlapEnd   = ed < mEnd   ? ed : mEnd;
        const overlapDays  = Math.max(0, (overlapEnd - overlapStart) / 86400000 + 1);
        const fraction = overlapDays / totalDays;
        // Only distribute expected fee here — invoiced amounts are placed by actual invoice date below
        addToMonth(key, r.fee * fraction, 0, r.name);
      }
    } else if (r.dueDate) {
      addToMonth(r.dueDate.slice(0, 7), r.fee, 0, r.name);
    }
  });

  // Place actual invoiced amounts in the month the invoice was issued
  (project.invoices || []).forEach(inv => {
    if (!inv.date || !inv.amount) return;
    const key = inv.date.slice(0, 7);
    if (!monthlyMap[key]) monthlyMap[key] = { month: key, fee: 0, invoiced: 0, milestones: [] };
    monthlyMap[key].invoiced += inv.amount;
    const label = inv.milestoneName || inv.phaseName;
    if (label && !monthlyMap[key].milestones.includes(label)) monthlyMap[key].milestones.push(label);
  });

  const monthlyCashFlow = Object.values(monthlyMap).sort((a, b) => a.month > b.month ? 1 : -1);
  const maxMonthFee = Math.max(...monthlyCashFlow.map(m => m.fee), 1);

  // Group by phase for summary
  const byPhase = {};
  rows.forEach(r => {
    if (!byPhase[r.phase]) byPhase[r.phase] = { phase: r.phase, fee: 0, invoiced: 0, remaining: 0 };
    byPhase[r.phase].fee += r.fee;
    byPhase[r.phase].invoiced += r.invoiced;
    byPhase[r.phase].remaining += r.remaining;
  });

  function statusBadge(row) {
    if (row.invoiced >= row.fee) return <Badge color={{ bg: P.greenDim, text: P.green }} text="Fully Invoiced" />;
    if (row.isOverdue) return <Badge color={{ bg: P.redDim, text: P.red }} text="Overdue" />;
    if (row.isPending) return <Badge color={{ bg: P.yellowDim, text: P.yellow }} text="Due Soon" />;
    if (row.invoiced > 0) return <Badge color={{ bg: P.accentDim, text: P.accentLight }} text="Partially Invoiced" />;
    return <Badge color={{ bg: P.border, text: P.textMuted }} text="Pending" />;
  }

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontWeight: 700, fontSize: 16 }}>Invoice Projections</div>
        <Btn small variant="ghost" onClick={() => {
          const headers = ["Milestone", "Phase", "Due Date", "Fee", "Invoiced", "Remaining", "Overdue", "Due in 30d"];
          const csvRows = rows.map(r => [
            r.name, r.phase || "", r.dueDate || "",
            Math.round(r.fee), Math.round(r.invoiced), Math.round(r.remaining),
            r.isOverdue ? "Yes" : "No", r.isPending ? "Yes" : "No"
          ]);
          csvRows.push([]);
          csvRows.push(["TOTALS", "", "", Math.round(totalFee), Math.round(totalInvoiced), Math.round(totalRemaining), "", ""]);
          csvRows.push([]);
          csvRows.push(["MONTHLY CASH FLOW"]);
          csvRows.push(["Month", "Expected Fee", "Invoiced"]);
          Object.values(monthlyMap).sort((a,b) => a.month > b.month ? 1:-1).forEach(m => csvRows.push([m.month, Math.round(m.fee), Math.round(m.invoiced)]));
          downloadCSV((project.projectNumber || project.name || "project").replace(/[^a-zA-Z0-9]/g,"_") + "_projections_" + new Date().toISOString().slice(0,10) + ".csv", headers, csvRows);
        }}>⬇ Export CSV</Btn>
      </div>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 20 }}>
        Projected billing schedule based on milestone due dates. Amounts shown are remaining uninvoiced fees.
      </div>

      {/* KPI row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 28 }}>
        <KpiBox label="TOTAL CONTRACT" val={fmt(totalFee)} color={P.text} />
        <KpiBox label="INVOICED TO DATE" val={fmt(totalInvoiced)} color={P.green} sub={`${totalFee > 0 ? Math.round(totalInvoiced/totalFee*100) : 0}% of contract`} />
        <KpiBox label="REMAINING" val={fmt(totalRemaining)} color={P.accentLight} />
        <KpiBox label="OVERDUE" val={fmt(overdueAmt)} color={overdueAmt > 0 ? P.red : P.textDim} sub={overdueAmt > 0 ? "Needs immediate invoicing" : "None"} />
      </div>

      {/* Next 30 days callout */}
      {next30Amt > 0 && (
        <div style={{ background: P.yellowDim, border: `1px solid ${P.yellow}`, borderRadius: 8, padding: "12px 16px", marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontWeight: 700, color: P.yellow, marginBottom: 2 }}>⏰ {fmt(next30Amt)} due in the next 30 days</div>
            <div style={{ fontSize: 12, color: P.textMuted }}>{rows.filter(r => r.isPending).length} milestone{rows.filter(r => r.isPending).length !== 1 ? "s" : ""} approaching</div>
          </div>
        </div>
      )}

      {/* Projection table */}
      {rows.length === 0 ? (
        <div style={{ textAlign: "center", padding: 40, color: P.textDim }}>
          No billable milestones with due dates found. Finalize the fee schedule in the Fee Calculator tab first.
        </div>
      ) : (
        <>
          <table style={{ marginBottom: 28 }}>
            <thead>
              <tr>
                <th>Milestone</th><th>Phase</th><th>Due Date</th>
                <th>Contract Amt</th><th>Invoiced</th><th>Remaining</th><th>Status</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.id} style={{ background: r.isOverdue ? "#1a0505" : undefined }}>
                  <td style={{ fontWeight: 500 }}>{r.name}</td>
                  <td style={{ color: P.textMuted, fontSize: 12 }}>{r.phase}</td>
                  <td style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: r.isOverdue ? P.red : P.textMuted }}>
                    {r.dueDate || "—"}
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(r.fee)}</td>
                  <td style={{ fontFamily: "JetBrains Mono", color: r.invoiced > 0 ? P.green : P.textDim }}>
                    {r.invoiced > 0 ? fmt(r.invoiced) : "—"}
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono", fontWeight: 600, color: r.remaining <= 0 ? P.green : r.isOverdue ? P.red : P.text }}>
                    {r.remaining <= 0 ? "✓ Paid" : fmt(r.remaining)}
                  </td>
                  <td>{statusBadge(r)}</td>
                </tr>
              ))}
              <tr style={{ background: P.bg, fontWeight: 700 }}>
                <td colSpan={3}>Total</td>
                <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(totalFee)}</td>
                <td style={{ fontFamily: "JetBrains Mono", color: P.green }}>{fmt(totalInvoiced)}</td>
                <td style={{ fontFamily: "JetBrains Mono", color: P.accentLight }}>{fmt(totalRemaining)}</td>
                <td></td>
              </tr>
            </tbody>
          </table>

          {/* Monthly cash flow bar chart */}
          {monthlyCashFlow.length > 0 && (
            <div>
              <SectionTitle>Monthly Cash Flow</SectionTitle>
              <div style={{ fontSize: 12, color: P.textDim, marginBottom: 16 }}>Fee expected per month based on milestone due dates</div>
              <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 10, padding: "20px 20px 8px" }}>
                {/* Bar chart */}
                <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 160, marginBottom: 8 }}>
                  {monthlyCashFlow.map(m => {
                    const barH = Math.round((m.fee / maxMonthFee) * 140);
                    const isFullyInvoiced = m.invoiced >= m.fee;
                    const label = new Date(m.month + "-02").toLocaleDateString("en-US", { month: "short", year: "2-digit" });
                    return (
                      <div key={m.month} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, minWidth: 0 }}
                        title={label + ": " + fmt(m.fee) + " | " + m.milestones.join(", ")}>
                        <span style={{ fontSize: 10, color: P.accentLight, fontFamily: "JetBrains Mono", fontWeight: 600, whiteSpace: "nowrap" }}>
                          {fmt(m.fee)}
                        </span>
                        <div style={{ width: "100%", height: barH, borderRadius: "4px 4px 0 0", background: isFullyInvoiced ? P.green : P.accent, minHeight: 4, transition: "height .3s" }} />
                        <span style={{ fontSize: 10, color: P.textMuted, textAlign: "center", whiteSpace: "nowrap", overflow: "hidden", width: "100%", textOverflow: "ellipsis" }}>{label}</span>
                      </div>
                    );
                  })}
                </div>
                {/* Monthly breakdown table */}
                <table style={{ marginTop: 12 }}>
                  <thead>
                    <tr><th>Month</th><th>Milestones</th><th>Expected Fee</th><th>Invoiced</th><th>Remaining</th></tr>
                  </thead>
                  <tbody>
                    {monthlyCashFlow.map(m => {
                      const label = new Date(m.month + "-02").toLocaleDateString("en-US", { month: "long", year: "numeric" });
                      const remaining = m.fee - m.invoiced;
                      return (
                        <tr key={m.month}>
                          <td style={{ fontWeight: 600 }}>{label}</td>
                          <td style={{ fontSize: 12, color: P.textMuted }}>{m.milestones.join(", ")}</td>
                          <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(m.fee)}</td>
                          <td style={{ fontFamily: "JetBrains Mono", color: m.invoiced > 0 ? P.green : P.textDim }}>{m.invoiced > 0 ? fmt(m.invoiced) : "—"}</td>
                          <td style={{ fontFamily: "JetBrains Mono", color: remaining <= 0 ? P.green : P.text }}>{remaining <= 0 ? "✓ Paid" : fmt(remaining)}</td>
                        </tr>
                      );
                    })}
                    <tr style={{ background: P.bg, fontWeight: 700 }}>
                      <td>Total</td><td></td>
                      <td style={{ fontFamily: "JetBrains Mono" }}>{fmt(totalFee)}</td>
                      <td style={{ fontFamily: "JetBrains Mono", color: P.green }}>{fmt(totalInvoiced)}</td>
                      <td style={{ fontFamily: "JetBrains Mono", color: P.accentLight }}>{fmt(totalRemaining)}</td>
                    </tr>
                  </tbody>
                </table>
                <div style={{ marginTop: 12, display: "flex", gap: 16, fontSize: 11, color: P.textDim }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 12, height: 6, borderRadius: 2, background: P.accent }} /> Projected
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 12, height: 6, borderRadius: 2, background: P.green }} /> Invoiced
                  </div>
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

const TABS = ["Overview", "Scope", "Fee Calculator", "Team", "Schedule", "Notes", "Emails", "Gantt", "Contract", "Change Orders", "RFIs", "Submittals", "Subconsultants", "Financials", "Reimbursables", "Projections"];

function ProjectDetail({ project, onUpdate, onBack, termContracts, clients, staff, onAddClient, onUpdateClient, onAddStaff }) {
  const [tab, setTab] = useState("Overview");
  const [proposalSyncState, setProposalSyncState] = useState(project.proposalCalendarEventId ? "synced" : "idle"); // idle | syncing | synced | error
  const [proposalSyncMsg, setProposalSyncMsg] = useState("");
  const [contractExpSyncState, setContractExpSyncState] = useState("idle");
  const [contractExpSyncMsg, setContractExpSyncMsg] = useState("");

  function updateField(field, val) {
    onUpdate({ ...project, [field]: val });
  }

  async function syncProposalDueDate() {
    if (!project.proposalDueDate) { setProposalSyncMsg("⚠ No proposal due date set"); return; }
    setProposalSyncState("syncing");
    setProposalSyncMsg("");
    const fakeMilestone = {
      id: "proposal-" + project.id,

function EmailsView({ project, onChange }) {
  const saved = project.emails || [];

  // Search state
  const [query, setQuery] = useState(project.name || project.projectNumber || "");
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [searchErr, setSearchErr] = useState(null);
  const [selected, setSelected] = useState({}); // { [msgId]: bool }

  // View state
  const [expanded, setExpanded] = useState(null); // msgId of open email
  const [fetchingBody, setFetchingBody] = useState(null);
  const [spSaveState, setSpSaveState] = useState({}); // msgId -> {status, msg}
  const [liveBody, setLiveBody] = useState({}); // { [msgId]: html string }
  const [filterSender, setFilterSender] = useState("All");

  // Strip HTML to plain text
  function htmlToText(html) {
    if (!html) return "";
    let cleaned = html
      .replace(/<!--[\s\S]*?-->/g, "")
      .replace(/<style[\s\S]*?<\/style>/gi, "")
      .replace(/<head[\s\S]*?<\/head>/gi, "");

    // Insert newlines at block-level boundaries before stripping tags
    cleaned = cleaned
      .replace(/<br\s*\/?>/gi, "\n")
      .replace(/<\/p>/gi, "\n")
      .replace(/<\/div>/gi, "\n")
      .replace(/<\/tr>/gi, "\n")
      .replace(/<\/li>/gi, "\n")
      .replace(/<\/h[1-6]>/gi, "\n");

    // Strip remaining tags
    const d = document.createElement("div");
    d.innerHTML = cleaned;
    let text = (d.innerText || d.textContent || "");

    // Collapse 3+ blank lines to 2
    text = text.replace(/\n{3,}/g, "\n\n").trim();
    return text;
  }

  // Format bytes
  function parseEmailChain(text) {
    if (!text) return [];

    // Split on Outlook reply headers: "From: X\nSent: Y\nTo: Z"
    const parts = text.split(/(?=^From:\s*.+\nSent:\s*.+\nTo:\s*)/m).map(s => s.trim()).filter(Boolean);

    if (parts.length <= 1) {
      // Fallback: flat text with no preserved newlines
      const DELIM = "\x00SPLIT\x00";
      const tagged = text.replace(/(From:\s*[^\n]{3,100}\s+Sent:\s*[^\n]{5,60}\s+To:\s*)/g, DELIM + "$1");
      const flatParts = tagged.split(DELIM).map(s => s.trim()).filter(Boolean);
      if (flatParts.length <= 1) return null;
      return parseFlatParts(flatParts);
    }

    return parts.map((part, i) => {
      const lines = part.split("\n").map(l => l.trim()).filter(l => l.length > 0);
      const fromIdx = lines.findIndex(l => /^From:/i.test(l));
      const sentIdx = lines.findIndex(l => /^Sent:/i.test(l));
      const toIdx   = lines.findIndex(l => /^To:/i.test(l));
      const ccIdx   = lines.findIndex(l => /^Cc:/i.test(l));
      const subjIdx = lines.findIndex(l => /^Subject:/i.test(l));

      const fromL = fromIdx >= 0 ? lines[fromIdx] : "";
      const sentL = sentIdx >= 0 ? lines[sentIdx] : "";
      const toL   = toIdx   >= 0 ? lines[toIdx]   : "";
      const ccL   = ccIdx   >= 0 ? lines[ccIdx]   : "";
      const subjL = subjIdx >= 0 ? lines[subjIdx] : "";

      // Body starts after the last recognized header line
      const headerIndices = [fromIdx, sentIdx, toIdx, ccIdx, subjIdx].filter(n => n >= 0);
      const lastHeaderIdx = headerIndices.length > 0 ? Math.max(...headerIndices) : -1;
      const bodyLines = lastHeaderIdx >= 0 ? lines.slice(lastHeaderIdx + 1) : lines;
      const body = bodyLines.join("\n").trim();

      return buildMsg(
        fromL.replace(/^From:\s*/i, "").trim(),
        sentL.replace(/^Sent:\s*/i, "").trim(),
        toL.replace(/^To:\s*/i,   "").trim(),
        ccL.replace(/^Cc:\s*/i,   "").trim(),
        subjL.replace(/^Subject:\s*/i, "").trim(),
        cleanBodyText(body),
        i === 0
      );
    }).filter(p => p.body.length > 0 || p.from);
  }

  function parseFlatParts(parts) {
    return parts.map((part, i) => {
      const fromM = part.match(/From:\s*(.+?)(?=\s*Sent:)/s);
      const sentM = part.match(/Sent:\s*(.+?)(?=\s*To:)/s);
      const toM   = part.match(/To:\s*(.+?)(?=\s*(?:Cc:|Subject:))/s);
      const ccM   = part.match(/Cc:\s*(.+?)(?=\s*Subject:)/s);
      const subjM = part.match(/Subject:\s*(.+?)(?=\n|\s{3,})/s);
      // Body: strip everything up to and including the Subject line
      const body = subjM
        ? part.slice(part.indexOf(subjM[0]) + subjM[0].length).trim()
        : part.replace(/^From:[\s\S]+?(?:\n\n|\s{4,})/, "").trim();
      return buildMsg(
        (fromM?.[1] || "").replace(/<[^>]+>/g,"").trim(),
        (sentM?.[1] || "").trim(),
        (toM?.[1]  || "").trim(),
        (ccM?.[1]  || "").trim(),
        (subjM?.[1]|| "").trim(),
        cleanBodyText(body),
        i === 0
      );
    }).filter(p => p.body.length > 0 || p.from);
  }

  function buildMsg(from, sent, to, cc, subject, body, isFirst) {
    return { from: from.replace(/<[^>]+>/g,"").trim(), sent, to, cc, subject, body, isFirst };
  }

  function cleanBodyText(text) {
    return text
      .replace(/CAUTION:\s*External E-?mail[^\n]*/gi, "")
      .replace(/Book time to meet with me[^\n]*/gi, "")
      .replace(/This message is sent by[\s\S]{0,900}?confidential\.[^\n]*/gi, "")
      .replace(/T\.\s*\+?[\d\s().+-]{7,}\n?/g, "")
      .replace(/E\.\s*\S+@\S+\n?/g, "")
      .replace(/www\.\S+\n?/gi, "")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  }

  function cleanBody(text) {
    return cleanBodyText(text || "");
  }

  // Renders raw HTML email in a sandboxed iframe — preserves all formatting,
  // isolates email CSS, and handles chains the way the email client intended.
  function EmailIframe({ html }) {
    const ref = React.useRef(null);
    const [height, setHeight] = React.useState(300);

    const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>
      *{box-sizing:border-box;}
      body{background:#fff;color:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
           font-size:13px;line-height:1.6;padding:16px;margin:0;word-break:break-word;}
      img{max-width:100%;height:auto;}
      a{color:#1d4ed8;}
      table{max-width:100%!important;}
      td,th{word-break:break-word;}
    </style></head><body>${html}</body></html>`;

    function onLoad() {
      try {
        const body = ref.current?.contentDocument?.body;
        if (body) setHeight(Math.min(body.scrollHeight + 24, 600));
      } catch(e) { /* cross-origin guard */ }
    }

    return (
      <div style={{ background: "#fff", borderRadius: 8, overflow: "hidden", border: `1px solid ${P.border}` }}>
        <iframe
          ref={ref}
          srcDoc={doc}
          sandbox="allow-same-origin"
          onLoad={onLoad}
          style={{ width: "100%", height, border: "none", display: "block" }}
          title="email-body"
        />
      </div>
    );
  }

  function EmailChain({ body }) {
    const chain = parseEmailChain(body);

    // Debug: if chain exists but all bodies are empty, fall back to raw display
    const allEmpty = chain && chain.every(m => !m.body);

    if (!chain || allEmpty) {
      return (
        <pre style={{ fontFamily: "inherit", fontSize: 12, lineHeight: 1.7, color: P.text, whiteSpace: "pre-wrap", wordBreak: "break-word", margin: 0, maxHeight: 500, overflowY: "auto" }}>
          {cleanBody(body)}
        </pre>
      );
    }
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: 520, overflowY: "auto" }}>
        {chain.map((msg, i) => {
          const isFirst = i === 0;
          // Extract sender name only (strip email address)
          const senderName = msg.from.replace(/<[^>]+>/, "").trim() || msg.from;
          const isSara = msg.from.toLowerCase().includes("setty");
          return (
            <div key={i} style={{
              border: `1px solid ${isFirst ? P.accent : P.border}`,
              borderRadius: 8,
              overflow: "hidden",
              background: isFirst ? P.bg : P.card,
            }}>
              {/* Message header */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start",
                padding: "8px 12px", borderBottom: `1px solid ${P.border}`,
                background: isFirst ? P.accentDim : "transparent" }}>
                <div>
                  <span style={{ fontWeight: 700, fontSize: 12, color: isSara ? P.accentLight : P.text }}>
                    {senderName}
                  </span>
                  {msg.to && <span style={{ fontSize: 11, color: P.textDim, marginLeft: 8 }}>→ {msg.to.length > 60 ? msg.to.slice(0,60)+"…" : msg.to}</span>}
                  {msg.cc && <div style={{ fontSize: 10, color: P.textDim, marginTop: 1 }}>CC: {msg.cc.length > 70 ? msg.cc.slice(0,70)+"…" : msg.cc}</div>}
                </div>
                <span style={{ fontSize: 11, color: P.textDim, flexShrink: 0, marginLeft: 12 }}>{msg.sent}</span>
              </div>
              {/* Body */}
              <div style={{ padding: "10px 12px", fontSize: 12, lineHeight: 1.7, color: P.text, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>
                {msg.body || <span style={{ color: P.textDim, fontStyle: "italic" }}>No body content.</span>}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  function fmtBytes(b) {
    if (!b) return "";
    if (b < 1024) return b + " B";
    if (b < 1048576) return (b/1024).toFixed(0) + " KB";
    return (b/1048576).toFixed(1) + " MB";
  }

  // Build search queries: name first, project number second, sender from client
  async function doSearch() {
    setSearching(true);
    setSearchErr(null);
    setResults([]);
    setSelected({});
    try {
      const token = await getToken();
      const terms = [project.name, project.projectNumber].filter(Boolean);
      const clientDomain = (() => {
        // Try to extract domain from project prime/client name — crude but useful
        const c = project.prime || project.clientName || "";
        // Check if any saved contact has an email domain
        return null; // extend later if client directory has emails
      })();

      let allMsgs = [];
      const seen = new Set();

      for (const term of terms) {
        if (!term || term.trim().length < 2) continue;
        const q = encodeURIComponent(`"${term.trim()}"`);
        const url = `/me/messages?$search=${q}&$top=25&$select=id,subject,from,toRecipients,ccRecipients,receivedDateTime,bodyPreview,hasAttachments,body,conversationId`;
        const resp = await graphFetch("GET", url, undefined, token);
        if (resp && resp.value) {
          for (const m of resp.value) {
            if (!seen.has(m.id)) {
              seen.add(m.id);
              allMsgs.push(m);
            }
          }
        }
      }

      // Sort by date desc
      allMsgs.sort((a, b) => new Date(b.receivedDateTime) - new Date(a.receivedDateTime));
      setResults(allMsgs);
      if (allMsgs.length === 0) setSearchErr("No emails found. Try adjusting the search term.");
    } catch(e) {
      setSearchErr("Search failed: " + (e.message || "unknown error"));
    } finally {
      setSearching(false);
    }
  }

  function toggleSelect(id) {
    setSelected(prev => ({ ...prev, [id]: !prev[id] }));
  }

  async function saveSelected() {
    const existingIds = new Set(saved.map(e => e.msgId));
    const toSave = results.filter(m => selected[m.id] && !existingIds.has(m.id));
    const dupeCount = results.filter(m => selected[m.id] && existingIds.has(m.id)).length;

    if (toSave.length === 0 && dupeCount > 0) {
      alert(`${dupeCount} email${dupeCount > 1 ? "s" : ""} already saved.`);
      return;
    }

    // Fetch attachment names for any email that has attachments
    const token = await getToken();
    const toAdd = await Promise.all(toSave.map(async m => {
      let attachmentNames = [];
      if (m.hasAttachments) {
        try {
          const res = await graphFetch("GET", `/me/messages/${m.id}/attachments?$select=name,size,contentType`, undefined, token);
          attachmentNames = (res?.value || [])
            .filter(a => !a.contentType?.startsWith("image/") || a.size > 10000) // skip tiny inline images
            .map(a => a.name)
            .filter(Boolean);
        } catch(e) { /* non-fatal */ }
      }
      return {
        msgId: m.id,
        conversationId: m.conversationId || null,
        subject: m.subject || "(no subject)",
        from: m.from?.emailAddress?.name || m.from?.emailAddress?.address || "Unknown",
        fromAddress: m.from?.emailAddress?.address || "",
        to: (m.toRecipients || []).map(r => r.emailAddress?.address).filter(Boolean).join(", "),
        cc: (m.ccRecipients || []).map(r => r.emailAddress?.address).filter(Boolean).join(", "),
        date: m.receivedDateTime,
        preview: m.bodyPreview || "",
        hasAttachments: !!m.hasAttachments,
        attachmentNames,
        bodyText: htmlToText(m.body?.content || ""),
        savedAt: new Date().toISOString(),
        savedBy: getCurrentUser(),
      };
    }));

    onChange({ ...project, emails: [...saved, ...toAdd] });
    setSelected({});
    setResults([]);
    if (dupeCount > 0) alert(`${toAdd.length} saved. ${dupeCount} skipped (already on record).`);
  }

  async function saveToSharePoint(email) {
    if (!project.projectFolderUrl) {
      setSpSaveState(s => ({ ...s, [email.msgId]: { status: "error", msg: "No project folder — create one on the Overview tab first." } }));
      return;
    }
    setSpSaveState(s => ({ ...s, [email.msgId]: { status: "saving", msg: "" } }));
    try {
      let bodyHtml = "";
      try {
        const token = await getToken();
        const data = await graphFetch("GET", "/me/messages/" + email.msgId + "?$select=body", undefined, token);
        bodyHtml = data?.body?.content || "";
      } catch(e) { /* fallback to stored text */ }
      const { folderName, attachCount, folderWebUrl } = await saveEmailToSharePoint(email, project, bodyHtml);
      const msg = "✓ Saved to Emails/" + folderName + (attachCount > 0 ? " + " + attachCount + " attachment" + (attachCount !== 1 ? "s" : "") : "");
      setSpSaveState(s => ({ ...s, [email.msgId]: { status: "done", msg, folderWebUrl } }));
      // Persist the SP folder URL on the email record so it survives page refresh
      onChange({ ...project, emails: saved.map(e => e.msgId === email.msgId ? { ...e, spFolderUrl: folderWebUrl } : e) });
    } catch(e) {
      setSpSaveState(s => ({ ...s, [email.msgId]: { status: "error", msg: "✗ " + (e.message || "Unknown error") } }));
    }
  }

  function deleteEmail(msgId) {
    onChange({ ...project, emails: saved.filter(e => e.msgId !== msgId) });
    if (expanded === msgId) setExpanded(null);
  }

  async function fetchLiveBody(msgId) {
    if (liveBody[msgId]) { setExpanded(msgId); return; }
    setFetchingBody(msgId);
    try {
      const token = await getToken();
      const data = await graphFetch("GET", `/me/messages/${msgId}?$select=body,hasAttachments`, undefined, token);
      if (data?.body?.content) {
        // Store raw HTML — rendered via iframe to preserve all formatting
        setLiveBody(prev => ({ ...prev, [msgId]: data.body.content }));
      }
    } catch(e) {
      // fallback to stored body — already there
    } finally {
      setFetchingBody(null);
      setExpanded(msgId);
    }
  }

  function toggleExpand(email) {
    if (expanded === email.msgId) { setExpanded(null); return; }
    fetchLiveBody(email.msgId);
  }

  // Unique senders for filter
  const senders = useMemo(() => {
    const s = new Set(saved.map(e => e.from));
    return ["All", ...Array.from(s).sort()];
  }, [saved]);

  const filtered = filterSender === "All" ? saved : saved.filter(e => e.from === filterSender);
  const sortedSaved = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));

  const selectedCount = Object.values(selected).filter(Boolean).length;
  const newCount = results.filter(m => selected[m.id] && !saved.find(e => e.msgId === m.id)).length;

  return (
    <div style={{ paddingBottom: 40 }}>
      {/* ── Search panel ── */}
      <SectionTitle>Search & Import Emails</SectionTitle>
      <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, padding: 16, marginBottom: 28 }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <input
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={e => e.key === "Enter" && doSearch()}
            placeholder="Search term (project name or number)…"
            style={{ flex: 1, fontSize: 13 }}
          />
          <Btn onClick={doSearch} disabled={searching || !query.trim()}>
            {searching ? "⏳ Searching…" : "🔍 Search Outlook"}
          </Btn>
        </div>
        <div style={{ fontSize: 11, color: P.textDim }}>
          Searches your Outlook mailbox for emails matching the project name and number. Results show emails you have access to only.
        </div>

        {searchErr && (
          <div style={{ marginTop: 10, fontSize: 12, color: P.red }}>{searchErr}</div>
        )}

        {results.length > 0 && (
          <div style={{ marginTop: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 600 }}>
                {results.length} result{results.length !== 1 ? "s" : ""} — select to save
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setSelected(Object.fromEntries(results.map(m => [m.id, true])))}
                  style={{ background: "none", border: "none", color: P.accentLight, fontSize: 12, cursor: "pointer" }}>
                  Select all
                </button>
                <button onClick={() => setSelected({})}
                  style={{ background: "none", border: "none", color: P.textDim, fontSize: 12, cursor: "pointer" }}>
                  Clear
                </button>
                {selectedCount > 0 && (
                  <Btn small onClick={saveSelected}>
                    Save {newCount > 0 ? newCount : selectedCount} to record
                  </Btn>
                )}
              </div>
            </div>
            <div style={{ maxHeight: 320, overflowY: "auto", border: `1px solid ${P.border}`, borderRadius: 6 }}>
              {results.map((m, i) => {
                const alreadySaved = saved.some(e => e.msgId === m.id);
                const isChecked = !!selected[m.id];
                return (
                  <div key={m.id}
                    onClick={() => !alreadySaved && toggleSelect(m.id)}
                    style={{
                      display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 12px",
                      borderBottom: i < results.length - 1 ? `1px solid ${P.border}` : "none",
                      background: isChecked ? P.accentDim : alreadySaved ? P.greenDim : "transparent",
                      cursor: alreadySaved ? "default" : "pointer",
                      opacity: alreadySaved ? 0.7 : 1,
                    }}
                    onMouseOver={e => { if (!alreadySaved) e.currentTarget.style.background = isChecked ? P.accentDim : P.bg; }}
                    onMouseOut={e => { e.currentTarget.style.background = isChecked ? P.accentDim : alreadySaved ? P.greenDim : "transparent"; }}
                  >
                    <input type="checkbox" checked={isChecked} readOnly disabled={alreadySaved}
                      style={{ marginTop: 3, flexShrink: 0 }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                        <div style={{ fontWeight: 600, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {m.subject || "(no subject)"}
                        </div>
                        <div style={{ fontSize: 11, color: P.textDim, flexShrink: 0 }}>
                          {new Date(m.receivedDateTime).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}
                        </div>
                      </div>
                      <div style={{ fontSize: 12, color: P.textMuted, marginTop: 1 }}>
                        From: {m.from?.emailAddress?.name || m.from?.emailAddress?.address || "Unknown"}
                        {m.hasAttachments && <span style={{ marginLeft: 8, color: P.yellow, fontSize: 11 }}>📎 has attachments</span>}
                        {alreadySaved && <span style={{ marginLeft: 8, color: P.green, fontSize: 11, fontWeight: 600 }}>✓ already saved</span>}
                      </div>
                      <div style={{ fontSize: 12, color: P.textDim, marginTop: 3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {m.bodyPreview}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* ── Saved emails ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <SectionTitle style={{ margin: 0 }}>
          Saved Emails
          <span style={{ marginLeft: 8, fontSize: 12, fontWeight: 400, color: P.textDim }}>({saved.length})</span>
        </SectionTitle>
        {senders.length > 2 && (
          <select value={filterSender} onChange={e => setFilterSender(e.target.value)}
            style={{ fontSize: 12, padding: "3px 8px" }}>
            {senders.map(s => <option key={s}>{s}</option>)}
          </select>
        )}
      </div>

      {sortedSaved.length === 0 ? (
        <div style={{ color: P.textDim, fontSize: 13, padding: "20px 0" }}>
          No emails saved yet. Use the search above to find and import emails from Outlook.
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
          {sortedSaved.map(email => {
            const isOpen = expanded === email.msgId;
            const body = liveBody[email.msgId] || email.bodyText || "";
            const isFetching = fetchingBody === email.msgId;
            return (
              <div key={email.msgId}
                style={{ border: `1px solid ${isOpen ? P.accent : P.border}`, borderRadius: 8, overflow: "hidden",
                  marginBottom: 4, background: isOpen ? P.bg : P.card }}>
                {/* Header row */}
                <div
                  onClick={() => toggleExpand(email)}
                  style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "10px 14px", cursor: "pointer" }}
                  onMouseOver={e => e.currentTarget.style.background = P.accentDim}
                  onMouseOut={e => e.currentTarget.style.background = "transparent"}
                >
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", gap: 8, alignItems: "flex-start" }}>
                      <div style={{ fontWeight: 600, fontSize: 13 }}>{email.subject}</div>
                      <div style={{ fontSize: 11, color: P.textDim, flexShrink: 0 }}>
                        {new Date(email.date).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}
                      </div>
                    </div>
                    <div style={{ fontSize: 12, color: P.textMuted, marginTop: 2 }}>
                      <span>From: <strong>{email.from}</strong></span>
                      {email.to && <span style={{ marginLeft: 10 }}>To: {email.to.length > 60 ? email.to.slice(0, 60) + "…" : email.to}</span>}
                    </div>
                    {email.cc && (
                      <div style={{ fontSize: 11, color: P.textDim, marginTop: 1 }}>CC: {email.cc.length > 80 ? email.cc.slice(0, 80) + "…" : email.cc}</div>
                    )}
                    <div style={{ display: "flex", gap: 8, marginTop: 4, flexWrap: "wrap" }}>
                      {email.hasAttachments && (
                      <div style={{ marginTop: 5 }}>
                        {email.attachmentNames?.length > 0
                          ? email.attachmentNames.map((name, i) => (
                              <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 11,
                                background: P.yellowDim, color: P.yellow, borderRadius: 4, padding: "1px 7px", marginRight: 4, marginBottom: 2 }}>
                                📎 {name}
                              </span>
                            ))
                          : <span style={{ fontSize: 11, background: P.yellowDim, color: P.yellow, borderRadius: 4, padding: "1px 7px" }}>📎 Has attachments (names unavailable)</span>
                        }
                      </div>
                    )}
                      <span style={{ fontSize: 10, color: P.textDim }}>Saved {new Date(email.savedAt).toLocaleDateString()} by {email.savedBy}</span>
                    </div>
                  </div>
                  <div style={{ flexShrink: 0, fontSize: 16, color: P.textDim, marginTop: 2 }}>{isOpen ? "▲" : "▼"}</div>
                </div>

                {/* Body */}
                {isOpen && (
                  <div style={{ borderTop: `1px solid ${P.border}`, padding: "14px 16px" }}>
                    {isFetching ? (
                      <div style={{ color: P.textDim, fontSize: 12 }}>⏳ Loading…</div>
                    ) : liveBody[email.msgId] ? (
                      // Live HTML from Graph — render in sandboxed iframe for correct formatting
                      <EmailIframe html={liveBody[email.msgId]} />
                    ) : email.bodyText ? (
                      // Fallback: stored plain text — use chain parser
                      <EmailChain body={email.bodyText} />
                    ) : (
                      <div style={{ color: P.textDim, fontSize: 12 }}>No body content stored.</div>
                    )}
                    <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1 }}>
                        {spSaveState[email.msgId] && (
                          <span style={{ fontSize: 11, fontWeight: 500,
                            color: spSaveState[email.msgId].status === "done" ? P.green
                                 : spSaveState[email.msgId].status === "error" ? P.red : P.accentLight }}>
                            {spSaveState[email.msgId].status === "saving" ? "⏳ Saving to SharePoint…" : spSaveState[email.msgId].msg}
                          </span>
                        )}
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        {(() => {
                          const spUrl = spSaveState[email.msgId]?.folderWebUrl || email.spFolderUrl || "";
                          if (spUrl) return (
                            <a href={spUrl} target="_blank" rel="noreferrer"
                              style={{ display: "inline-flex", alignItems: "center", gap: 5,
                                background: "#0078d4", color: "#fff", borderRadius: 6,
                                fontSize: 12, fontWeight: 600, padding: "5px 12px",
                                textDecoration: "none", whiteSpace: "nowrap" }}>
                              📂 Open in SharePoint
                            </a>
                          );
                          return (
                            <Btn small variant="ghost"
                              disabled={spSaveState[email.msgId]?.status === "saving"}
                              onClick={() => saveToSharePoint(email)}
                              title={project.projectFolderUrl ? "Save email + attachments to SharePoint" : "Create a project folder first (Overview tab)"}>
                              {spSaveState[email.msgId]?.status === "saving" ? "⏳ Saving…" : "📁 Save to SharePoint"}
                            </Btn>
                          );
                        })()}
                        <Btn small variant="danger" onClick={() => { if (window.confirm("Remove this email from the project record?")) deleteEmail(email.msgId); }}>
                          Remove
                        </Btn>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── NOTES VIEW ──────────────────────────────────────────────────────────────

const NOTE_CATEGORIES = ["Meeting", "Site Visit", "Decision", "Client Communication", "Internal", "Issue", "Action Item", "General"];
const NOTE_CAT_COLORS = {
  "Meeting":              { bg: P.accentDim,  text: P.accentLight },
  "Decision":             { bg: P.purpleDim,  text: P.purple },
  "Client Communication": { bg: P.greenDim,   text: P.green },
  "Internal":             { bg: P.border,     text: P.textMuted },
  "Issue":                { bg: P.redDim,     text: P.red },
  "Action Item":          { bg: P.yellowDim,  text: P.yellow },
  "Site Visit":           { bg: "#1a3020",    text: "#4ade80" },
  "General":              { bg: P.border,     text: P.textDim },
};

function CalendarImportPanel({ project, onImport }) {
  const [open, setOpen] = React.useState(false);
  const [searching, setSearching] = React.useState(false);
  const [events, setEvents] = React.useState([]);
  const [searchErr, setSearchErr] = React.useState(null);
  const [selected, setSelected] = React.useState({});
  const [noteType, setNoteType] = React.useState({});
  const [importing, setImporting] = React.useState(false);
  const [importStatus, setImportStatus] = React.useState("");

  const defaultKeyword = React.useMemo(() => {
    const GENERIC = new Set(["the","a","an","of","for","and","or","at","in","on","to","by","with","from","new","york","city","nyc","building","garage","marina","park","plaza","center","campus","tower","hall","house","complex","facility","site","phase","rehab","rehabilitation","renovation","restoration","design","engineering","services","systems","study","survey","report","plan","program","management"]);
    const tokens = (project.name || "").split(/[\s\-\/,()&]+/).map(w => w.replace(/[^a-zA-Z0-9]/g,"")).filter(w => w.length >= 3 && !GENERIC.has(w.toLowerCase()));
    return tokens.length > 0 ? tokens[0] : (project.name || "");
  }, [project.name]);

  const [query, setQuery] = React.useState(defaultKeyword);

  async function searchCalendars() {
    setSearching(true);
    setSearchErr(null);
    setEvents([]);
    setSelected({});
    try {
      const token = await getToken();
      const allEvents = [];
      const seen = new Set();
      const calIds = [null];
      try {
        const calData = await graphFetch("GET", "/me/calendars?$top=50", undefined, token);
        const cals = calData?.value || [];
        const shared = cals.filter(c => c.name === "NYC Shared Calendar");
        shared.forEach(c => calIds.push(c.id));
      } catch(e) {}

      const q = query.trim();
      if (!q) { setSearchErr("Enter a search term."); setSearching(false); return; }

      const start = new Date(); start.setFullYear(start.getFullYear() - 2);
      const end = new Date(); end.setFullYear(end.getFullYear() + 1);
      const startISO = start.toISOString();
      const endISO = end.toISOString();

      for (const calId of calIds) {
        const base = calId ? `/me/calendars/${calId}` : "/me";
        const url = `${base}/calendarView?startDateTime=${startISO}&endDateTime=${endISO}&$top=100&$select=id,subject,start,end,attendees,bodyPreview,organizer,location&$filter=contains(subject,'${encodeURIComponent(q.replace(/"/g,""))}')`;
        try {
          const resp = await graphFetch("GET", url, undefined, token);
          for (const ev of (resp?.value || [])) {
            if (!seen.has(ev.id)) { seen.add(ev.id); allEvents.push({ ...ev, _calId: calId }); }
          }
        } catch(e) {}
      }

      allEvents.sort((a, b) => new Date(b.start?.dateTime || b.start?.date) - new Date(a.start?.dateTime || a.start?.date));
      setEvents(allEvents);
      if (allEvents.length === 0) setSearchErr("No events found. Try a different search term.");
    } catch(e) {
      setSearchErr("Search failed: " + (e.message || "unknown error"));
    } finally {
      setSearching(false);
    }
  }

  function fmtEventDate(ev) {
    const dt = ev.start?.dateTime || ev.start?.date;
    if (!dt) return "";
    const d = new Date(dt);
    return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" }) +
      (ev.start?.dateTime ? " " + d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }) : "");
  }

  function fmtAttendees(ev) {
    const atts = (ev.attendees || []).map(a => a.emailAddress?.name || a.emailAddress?.address || "").filter(Boolean);
    if (atts.length === 0) return "";
    if (atts.length <= 4) return atts.join(", ");
    return atts.slice(0, 4).join(", ") + ` +${atts.length - 4} more`;
  }

  function buildNoteBody(ev) {
    const lines = [];
    lines.push(ev.subject || "(No title)");
    lines.push("Date: " + fmtEventDate(ev));
    if (ev.location?.displayName) lines.push("Location: " + ev.location.displayName);
    const atts = fmtAttendees(ev);
    if (atts) lines.push("Attendees: " + atts);
    if (ev.bodyPreview && ev.bodyPreview.trim()) lines.push("\n" + ev.bodyPreview.trim().slice(0, 300) + (ev.bodyPreview.length > 300 ? "\u2026" : ""));
    return lines.join("\n");
  }

  function toggleSelect(id) {
    setSelected(prev => ({ ...prev, [id]: !prev[id] }));
    if (!noteType[id]) setNoteType(prev => ({ ...prev, [id]: "Meeting" }));
  }

  async function importSelected() {
    setImporting(true);
    const toImport = events.filter(ev => selected[ev.id]);
    const notebookId = project.oneNoteNotebookId || "";
    const notes = [];
    for (const ev of toImport) {
      const cat = noteType[ev.id] || "Meeting";
      const noteBody = buildNoteBody(ev);
      let oneNoteUrl = "";
      // Auto-create OneNote page if notebook exists and category warrants it
      const createPage = notebookId && ["Meeting", "Site Visit", "Client Communication"].includes(cat);
      if (createPage) {
        try {
          const title = ev.subject || "(No title)";
          const dt = ev.start?.dateTime || ev.start?.date || "";
          const dtFmt = dt ? new Date(dt).toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" }) : "";
          const atts = fmtAttendees(ev);
          const loc = ev.location?.displayName || "";
          const preview = ev.bodyPreview ? ev.bodyPreview.trim().slice(0, 500) : "";
          const tdStyle = "padding:6px 12px";
          const thStyle = "padding:6px 12px;font-weight:bold;background:#f0f0f0";
          const pageHtml = "<h1>" + title + "</h1>"
            + "<table style='border-collapse:collapse;width:100%;font-size:13px'>"
            + (dtFmt ? "<tr><td style='" + thStyle + ";width:140px'>Date</td><td style='" + tdStyle + "'>" + dtFmt + "</td></tr>" : "")
            + (loc ? "<tr><td style='" + thStyle + "'>Location</td><td style='" + tdStyle + "'>" + loc + "</td></tr>" : "")
            + (atts ? "<tr><td style='" + thStyle + "'>Attendees</td><td style='" + tdStyle + "'>" + atts + "</td></tr>" : "")
            + (preview ? "<tr><td style='" + thStyle + "'>Agenda / Notes</td><td style='" + tdStyle + "'>" + preview + "</td></tr>" : "")
            + "</table>"
            + "<h2>Discussion</h2><p>&nbsp;</p>"
            + "<h2>Decisions</h2><p>&nbsp;</p>"
            + "<h2>Action Items</h2>"
            + "<table style='border-collapse:collapse;width:100%'>"
            + "<tr style='background:#f0f0f0'>"
              + "<th style='" + tdStyle + ";text-align:left'>Item</th>"
              + "<th style='" + tdStyle + ";text-align:left'>Owner</th>"
              + "<th style='" + tdStyle + ";text-align:left'>Due</th>"
            + "</tr>"
            + "<tr><td style='" + tdStyle + "'>&nbsp;</td><td style='" + tdStyle + "'>&nbsp;</td><td style='" + tdStyle + "'>&nbsp;</td></tr>"
            + "</table>";
          const sectionName = cat === "Site Visit" ? "Site Visits" : cat === "Client Communication" ? "Client Communications" : "Meetings";
          const page = await createOneNotePage(notebookId, sectionName, title, pageHtml, dt || "");
          oneNoteUrl = page.webUrl || "";
        } catch(e) {
          // Non-fatal — log the note without the OneNote link
        }
      }
      notes.push({
        id: uid(),
        body: noteBody,
        category: cat,
        actionItem: false,
        visitDate: cat === "Site Visit" ? (ev.start?.dateTime || ev.start?.date || "").slice(0, 10) : undefined,
        author: getCurrentUser(),
        createdAt: ev.start?.dateTime || ev.start?.date || new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        importedFromCalendar: true,
        oneNoteUrl,
      });
    }
    onImport(notes);
    setSelected({});
    setEvents([]);
    setOpen(false);
    setImporting(false);
  }

  const selectedCount = Object.values(selected).filter(Boolean).length;

  if (!open) return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <Btn small variant="ghost" onClick={() => { setOpen(true); setImportStatus(""); }}>&#128197; Import from Calendar</Btn>
      {importStatus && (
        <span style={{ fontSize: 11, fontWeight: 600,
          color: importStatus.startsWith("✓") ? "#34d399" : "#f87171" }}>
          {importStatus}
        </span>
      )}
    </div>
  );

  return (
    <div style={{ background: P.card, border: `1px solid ${P.accent}`, borderRadius: 10, padding: 16, marginBottom: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontWeight: 700, fontSize: 13, color: P.accentLight }}>&#128197; Import Calendar Events as Notes</div>
        <button onClick={() => setOpen(false)} style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 16 }}>\u2715</button>
      </div>
      <div style={{ fontSize: 11, color: P.textDim, marginBottom: 10 }}>
        Searches your personal Outlook calendar and NYC Shared Calendar (2 years back, 1 year forward). Select events to import as Site Visit, Meeting, or Client Communication notes.
        {project.oneNoteNotebookId
          ? <span style={{ color: "#a78bfa", marginLeft: 4 }}>📓 OneNote pages will be auto-created for Meetings, Site Visits, and Client Communications.</span>
          : <span style={{ marginLeft: 4 }}>Tip: Create a OneNote Notebook on the Overview tab to auto-generate note pages on import.</span>}
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
        <input value={query} onChange={e => setQuery(e.target.value)}
          onKeyDown={e => e.key === "Enter" && searchCalendars()}
          placeholder="Search term\u2026" style={{ flex: 1, fontSize: 13 }} />
        <Btn onClick={searchCalendars} disabled={searching || !query.trim()}>
          {searching ? "\u23f3 Searching\u2026" : "\ud83d\udd0d Search"}
        </Btn>
      </div>
      {searchErr && <div style={{ fontSize: 12, color: P.red, marginTop: 6 }}>{searchErr}</div>}
      {events.length > 0 && (
        <div style={{ marginTop: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 12, fontWeight: 600 }}>{events.length} event{events.length !== 1 ? "s" : ""} found</div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <button onClick={() => setSelected(Object.fromEntries(events.map(ev => [ev.id, true])))}
                style={{ background: "none", border: "none", color: P.accentLight, fontSize: 12, cursor: "pointer" }}>Select all</button>
              <button onClick={() => setSelected({})}
                style={{ background: "none", border: "none", color: P.textDim, fontSize: 12, cursor: "pointer" }}>Clear</button>
              {selectedCount > 0 && (
                <Btn small onClick={importSelected} disabled={importing}>
                  {importing ? "⏳ Creating pages…" : "Import " + selectedCount + " as note" + (selectedCount !== 1 ? "s" : "")}
                </Btn>
              )}
            </div>
          </div>
          <div style={{ maxHeight: 340, overflowY: "auto", border: `1px solid ${P.border}`, borderRadius: 6 }}>
            {events.map((ev, i) => {
              const isChecked = !!selected[ev.id];
              const isShared = !!ev._calId;
              return (
                <div key={ev.id} onClick={() => toggleSelect(ev.id)}
                  style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 12px",
                    borderBottom: i < events.length - 1 ? `1px solid ${P.border}` : "none",
                    background: isChecked ? P.accentDim : "transparent", cursor: "pointer" }}>
                  <input type="checkbox" checked={isChecked} readOnly style={{ marginTop: 3, flexShrink: 0 }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                      <div style={{ fontWeight: 600, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {ev.subject || "(No title)"}
                      </div>
                      <div style={{ fontSize: 11, color: P.textDim, flexShrink: 0 }}>{fmtEventDate(ev)}</div>
                    </div>
                    <div style={{ fontSize: 11, color: P.textDim, marginTop: 2 }}>
                      {isShared && <span style={{ color: P.accentLight, marginRight: 6, fontWeight: 600 }}>Shared</span>}
                      {ev.organizer?.emailAddress?.name && <span>Org: {ev.organizer.emailAddress.name}</span>}
                      {fmtAttendees(ev) && <span style={{ marginLeft: 6 }}>\u00b7 {fmtAttendees(ev)}</span>}
                    </div>
                    {ev.bodyPreview && <div style={{ fontSize: 11, color: P.textDim, marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ev.bodyPreview}</div>}
                    {isChecked && (
                      <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 6 }} onClick={e => e.stopPropagation()}>
                        <span style={{ fontSize: 11, color: P.textDim }}>Log as:</span>
                        <select value={noteType[ev.id] || "Meeting"}
                          onChange={e => setNoteType(prev => ({ ...prev, [ev.id]: e.target.value }))}
                          style={{ fontSize: 11, padding: "2px 6px" }}>
                          {NOTE_CATEGORIES.map(c => <option key={c}>{c}</option>)}
                        </select>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function NotesView({ project, onChange }) {
  const notes = (project.notes || []).slice().sort((a, b) => b.createdAt.localeCompare(a.createdAt));
  const [draft, setDraft] = useState({ body: "", category: "General", actionItem: false, visitDate: "" });
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState({});
  const [filterCat, setFilterCat] = useState("All");
  const [search, setSearch] = useState("");
  const [calStatus, setCalStatus] = useState({}); // { [noteId]: "syncing"|"synced"|"error" }
  const [calMsg, setCalMsg] = useState({});   // { [noteId]: message string }

  async function syncSiteVisit(note) {
    if (!note.visitDate) return;
    setCalStatus(s => ({ ...s, [note.id]: "syncing" }));
    const milestoneProxy = {
      dueDate: note.visitDate,
      name: "Site Visit" + (note.body ? " — " + note.body.slice(0, 60) + (note.body.length > 60 ? "…" : "") : ""),
      calendarEventId: note.calendarEventId || null,
    };
    const result = await createOrUpdateCalendarEvent(milestoneProxy, project.name || "Project", project.projectNumber, note.calendarEventId || null);
    if (result.success) {
      if (result.eventId) {
        onChange({ ...project, notes: (project.notes || []).map(n => n.id === note.id ? { ...n, calendarEventId: result.eventId } : n) });
      }
      setCalStatus(s => ({ ...s, [note.id]: "synced" }));
      setCalMsg(s => ({ ...s, [note.id]: result.warning ? "⚠ " + result.warning : "✓ Synced to NYC Calendar" }));
    } else {
      setCalStatus(s => ({ ...s, [note.id]: "error" }));
      setCalMsg(s => ({ ...s, [note.id]: "✗ " + result.error }));
    }
  }

  function addNote() {
    if (!draft.body.trim()) return;
    const entry = {
      id: uid(), body: draft.body.trim(), category: draft.category, actionItem: draft.actionItem,
      ...(draft.category === "Site Visit" && draft.visitDate ? { visitDate: draft.visitDate } : {}),
      author: getCurrentUser(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
    };
    onChange({ ...project, notes: [entry, ...(project.notes || [])] });
    setDraft({ body: "", category: "General", actionItem: false, visitDate: "" });
  }

  function startEdit(note) { setEditingId(note.id); setEditDraft({ body: note.body, category: note.category, actionItem: note.actionItem, visitDate: note.visitDate || "" }); }
  function saveEdit(id) {
    onChange({ ...project, notes: (project.notes||[]).map(n => n.id === id ? { ...n, ...editDraft, ...(editDraft.category === "Site Visit" && editDraft.visitDate ? { visitDate: editDraft.visitDate } : { visitDate: undefined }) , updatedAt: new Date().toISOString() } : n) });
    setEditingId(null);
  }
  function deleteNote(id) {
    const note = (project.notes||[]).find(n => n.id === id);
    if (!window.confirm("Delete this note" + (note?.content ? " (\"" + note.content.slice(0,60) + (note.content.length > 60 ? "…" : "") + "\")" : "") + "?\n\nThis cannot be undone.")) return;
    onChange({ ...project, notes: (project.notes||[]).filter(n => n.id !== id) });
  }

  const filtered = notes.filter(n =>
    (filterCat === "All" || n.category === filterCat) &&
    (!search || n.body.toLowerCase().includes(search.toLowerCase()) || (n.author||"").toLowerCase().includes(search.toLowerCase()))
  );
  const actionItems = notes.filter(n => n.actionItem);

  const [linkingNoteId, setLinkingNoteId] = useState(null); // note.id being linked
  const [oneNoteLinkDraft, setOneNoteLinkDraft] = useState("");

  return (
    <div>
      <SectionTitle>Project Notes &amp; Log</SectionTitle>

      {actionItems.length > 0 && (
        <div style={{ background: P.yellowDim, border: "1px solid " + P.yellow, borderRadius: 8, padding: 12, marginBottom: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 12, color: P.yellow, marginBottom: 6 }}>ACTION ITEMS ({actionItems.length})</div>
          {actionItems.map(n => (
            <div key={n.id} style={{ fontSize: 12, color: P.text, marginBottom: 3 }}>
              {"\u00b7"} {n.body.length > 120 ? n.body.slice(0, 120) + "\u2026" : n.body}
              <span style={{ color: P.textDim, marginLeft: 8 }}>{"\u2014"} {n.author}</span>
            </div>
          ))}
        </div>
      )}

      <div style={{ background: P.card, border: "1px solid " + P.border, borderRadius: 10, padding: 16, marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 10, alignItems: "center", flexWrap: "wrap" }}>
          <select value={draft.category} onChange={e => setDraft({ ...draft, category: e.target.value })} style={{ fontSize: 12 }}>
            {NOTE_CATEGORIES.map(c => <option key={c}>{c}</option>)}
          </select>
          <label style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, color: P.yellow, cursor: "pointer" }}>
            <input type="checkbox" checked={draft.actionItem} onChange={e => setDraft({ ...draft, actionItem: e.target.checked })} />
            Action Item
          </label>
          <span style={{ fontSize: 11, color: P.textDim, marginLeft: "auto" }}>Posting as: {getCurrentUser()}</span>
        </div>
        {draft.category === "Site Visit" && (
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <label style={{ fontSize: 12, color: "#4ade80", fontWeight: 600, whiteSpace: "nowrap" }}>Visit Date:</label>
            <input type="date" value={draft.visitDate} onChange={e => setDraft({ ...draft, visitDate: e.target.value })}
              style={{ fontSize: 12, width: 160, borderColor: "#4ade80" }} />
          </div>
        )}
        <textarea value={draft.body} onChange={e => setDraft({ ...draft, body: e.target.value })}
          placeholder="Add a note, meeting summary, decision, or action item..."
          onKeyDown={e => { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) addNote(); }}
          style={{ width: "100%", minHeight: 80, background: P.bg, border: "1px solid " + P.border, borderRadius: 6,
            color: P.text, padding: 10, fontSize: 13, resize: "vertical", fontFamily: "inherit" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
          <span style={{ fontSize: 11, color: P.textDim }}>Ctrl+Enter to post</span>
          <div style={{ display: "flex", gap: 8 }}>
            <CalendarImportPanel project={project} onImport={imported => onChange({ ...project, notes: [...(project.notes || []), ...imported] })} />
            <Btn onClick={addNote} disabled={!draft.body.trim()}>Post Note</Btn>
          </div>
        </div>
      </div>

      {notes.length > 0 && (
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
          <input placeholder="Search notes..." value={search} onChange={e => setSearch(e.target.value)} style={{ width: 220, fontSize: 12 }} />
          <select value={filterCat} onChange={e => setFilterCat(e.target.value)} style={{ fontSize: 12 }}>
            <option value="All">All Categories</option>
            {NOTE_CATEGORIES.map(c => <option key={c}>{c}</option>)}
          </select>
          <span style={{ fontSize: 11, color: P.textDim }}>{filtered.length} note{filtered.length !== 1 ? "s" : ""}</span>
        </div>
      )}

      {filtered.length === 0 ? (
        <div style={{ color: P.textDim, fontSize: 13, padding: "20px 0" }}>
          {notes.length === 0 ? "No notes yet. Post the first one above." : "No notes match your filter."}
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {filtered.map(note => {
            const cc = NOTE_CAT_COLORS[note.category] || NOTE_CAT_COLORS["General"];
            const isEditing = editingId === note.id;
            const edited = note.updatedAt !== note.createdAt;
            return (
              <div key={note.id} style={{ background: P.card, border: "1px solid " + (note.actionItem ? P.yellow : P.border), borderRadius: 8, padding: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                    <Badge color={cc} text={note.category} />
                    {note.actionItem && <Badge color={{ bg: P.yellowDim, text: P.yellow }} text="Action Item" />}
                    <span style={{ fontSize: 11, color: P.textDim }}>{note.author}</span>
                    <span style={{ fontSize: 11, color: P.textDim }}>{"\u00b7"} {new Date(note.createdAt).toLocaleString()}</span>
                    {edited && <span style={{ fontSize: 10, color: P.textDim, fontStyle: "italic" }}>(edited)</span>}
                  </div>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    {note.oneNoteUrl && (
                      <a href={note.oneNoteUrl} target="_blank" rel="noreferrer"
                        title="Open linked OneNote page"
                        style={{ display: "inline-flex", alignItems: "center", gap: 4, background: "#3b1d6e", border: "1px solid #7c3aed",
                          borderRadius: 5, color: "#c4b5fd", fontSize: 11, fontWeight: 600, padding: "3px 8px", textDecoration: "none" }}>
                        📓 OneNote
                      </a>
                    )}
                    <button onClick={() => { setLinkingNoteId(linkingNoteId === note.id ? null : note.id); setOneNoteLinkDraft(note.oneNoteUrl || ""); }}
                      title={note.oneNoteUrl ? "Edit OneNote link" : "Link a OneNote page"}
                      style={{ background: "none", border: "1px solid " + P.border, borderRadius: 5, color: P.textDim,
                        cursor: "pointer", fontSize: 11, padding: "3px 7px" }}>
                      {note.oneNoteUrl ? "✎" : "📓"}
                    </button>
                    <Btn small variant="ghost" onClick={() => isEditing ? setEditingId(null) : startEdit(note)}>{isEditing ? "Cancel" : "Edit"}</Btn>
                    <Btn small variant="danger" onClick={() => deleteNote(note.id)}>{"x"}</Btn>
                  </div>
                </div>
                {linkingNoteId === note.id && (
                  <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10, padding: "8px 10px", background: P.bg, borderRadius: 6, border: "1px solid #7c3aed" }}>
                    <span style={{ fontSize: 11, color: "#c4b5fd", whiteSpace: "nowrap" }}>📓 OneNote URL:</span>
                    <input value={oneNoteLinkDraft} onChange={e => setOneNoteLinkDraft(e.target.value)}
                      placeholder="Paste OneNote page link…"
                      style={{ flex: 1, fontSize: 12 }} autoFocus
                      onKeyDown={e => {
                        if (e.key === "Enter") {
                          onChange({ ...project, notes: (project.notes||[]).map(n => n.id === note.id ? { ...n, oneNoteUrl: oneNoteLinkDraft.trim() } : n) });
                          setLinkingNoteId(null);
                        }
                        if (e.key === "Escape") setLinkingNoteId(null);
                      }} />
                    <Btn small onClick={() => { onChange({ ...project, notes: (project.notes||[]).map(n => n.id === note.id ? { ...n, oneNoteUrl: oneNoteLinkDraft.trim() } : n) }); setLinkingNoteId(null); }}>Save</Btn>
                    {note.oneNoteUrl && (
                      <Btn small variant="danger" onClick={() => { onChange({ ...project, notes: (project.notes||[]).map(n => n.id === note.id ? { ...n, oneNoteUrl: "" } : n) }); setLinkingNoteId(null); }}>Remove</Btn>
                    )}
                  </div>
                )}
                {note.category === "Site Visit" && note.visitDate && (
                  <div style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 12, color: "#4ade80", fontWeight: 600 }}>
                        📅 Site Visit: {new Date(note.visitDate + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "long", day: "numeric", year: "numeric" })}
                      </span>
                      <button
                        onClick={() => syncSiteVisit(note)}
                        disabled={calStatus[note.id] === "syncing"}
                        style={{
                          fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 6, cursor: calStatus[note.id] === "syncing" ? "default" : "pointer",
                          border: "1px solid " + (calStatus[note.id] === "synced" || note.calendarEventId ? "#4ade80" : P.accent),
                          background: calStatus[note.id] === "synced" || note.calendarEventId ? "#1a3020" : P.accentDim,
                          color: calStatus[note.id] === "synced" || note.calendarEventId ? "#4ade80" : P.accentLight,
                        }}>
                        {calStatus[note.id] === "syncing" ? "⏳ Syncing…" : calStatus[note.id] === "synced" || note.calendarEventId ? "✓ 📅 Synced" : "📅 Sync to NY Calendar"}
                      </button>
                      {calMsg[note.id] && (
                        <span style={{ fontSize: 11, color: calMsg[note.id].startsWith("✓") ? "#4ade80" : calMsg[note.id].startsWith("⚠") ? P.yellow : P.red }}>
                          {calMsg[note.id]}
                        </span>
                      )}
                    </div>
                  </div>
                )}
                {isEditing ? (
                  <div>
                    <div style={{ display: "flex", gap: 10, marginBottom: 8, alignItems: "center" }}>
                      <select value={editDraft.category} onChange={e => setEditDraft({ ...editDraft, category: e.target.value })} style={{ fontSize: 12 }}>
                        {NOTE_CATEGORIES.map(c => <option key={c}>{c}</option>)}
                      </select>
                      <label style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, color: P.yellow, cursor: "pointer" }}>
                        <input type="checkbox" checked={editDraft.actionItem} onChange={e => setEditDraft({ ...editDraft, actionItem: e.target.checked })} />
                        Action Item
                      </label>
                    </div>
                    {editDraft.category === "Site Visit" && (
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                        <label style={{ fontSize: 12, color: "#4ade80", fontWeight: 600, whiteSpace: "nowrap" }}>Visit Date:</label>
                        <input type="date" value={editDraft.visitDate || ""} onChange={e => setEditDraft({ ...editDraft, visitDate: e.target.value })}
                          style={{ fontSize: 12, width: 160, borderColor: "#4ade80" }} />
                      </div>
                    )}
                    <textarea value={editDraft.body} onChange={e => setEditDraft({ ...editDraft, body: e.target.value })}
                      style={{ width: "100%", minHeight: 80, background: P.bg, border: "1px solid " + P.border, borderRadius: 6,
                        color: P.text, padding: 10, fontSize: 13, resize: "vertical", fontFamily: "inherit" }} />
                    <div style={{ marginTop: 8 }}>
                      <Btn small onClick={() => saveEdit(note.id)} disabled={!editDraft.body.trim()}>Save</Btn>
                    </div>
                  </div>
                ) : (
                  <div style={{ fontSize: 13, color: P.text, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{note.body}</div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── REIMBURSABLES VIEW ───────────────────────────────────────────────────────

const REIMB_CATEGORIES = ["Printing / Reprographics", "Travel", "Filing Fees / Permits", "Postage / Courier", "Subconsultant Reimbursable", "Software / Licensing", "Other"];
const REIMB_CAT_ICONS  = { "Printing / Reprographics": "\ud83d\udda8", "Travel": "\u2708", "Filing Fees / Permits": "\ud83d\udccb", "Postage / Courier": "\ud83d\udce6", "Subconsultant Reimbursable": "\ud83e\udd1d", "Software / Licensing": "\ud83d\udcbb", "Other": "\ud83d\udccf" };

function ReimbursablesView({ project, onChange }) {
  const reimbs = project.reimbursables || [];
  const budget  = project.reimbursableBudget || 0;
  const [form, setForm] = useState({ date: new Date().toISOString().slice(0,10), category: "Printing / Reprographics", description: "", amount: "", billable: true });

  function addEntry() {
    if (!form.amount || +form.amount <= 0) return;
    const entry = { id: uid(), date: form.date, category: form.category, description: form.description.trim(), amount: +form.amount, billable: form.billable };
    onChange({ ...project, reimbursables: [...reimbs, entry] });
    setForm(f => ({ ...f, description: "", amount: "" }));
  }
  function deleteEntry(id) { onChange({ ...project, reimbursables: reimbs.filter(r => r.id !== id) }); }
  function updateEntry(id, updates) { onChange({ ...project, reimbursables: reimbs.map(r => r.id === id ? { ...r, ...updates } : r) }); }

  const totalSpent    = reimbs.reduce((a, r) => a + r.amount, 0);
  const totalBillable = reimbs.filter(r => r.billable).reduce((a, r) => a + r.amount, 0);
  const remaining     = budget - totalSpent;
  const overBudget    = budget > 0 && remaining < 0;
  const byCategory    = REIMB_CATEGORIES.map(cat => ({ cat, total: reimbs.filter(r => r.category === cat).reduce((a,r) => a+r.amount, 0) })).filter(x => x.total > 0);

  return (
    <div>
      <SectionTitle>Reimbursable Expenses</SectionTitle>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 24 }}>
        <div style={{ background: P.card, border: "1px solid " + P.border, borderRadius: 10, padding: 14 }}>
          <div style={{ fontSize: 10, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 6 }}>Contract Budget</div>
          <input type="number" min="0" step="500" value={budget || ""} placeholder="$0"
            onChange={e => onChange({ ...project, reimbursableBudget: +e.target.value })}
            style={{ fontFamily: "JetBrains Mono", fontSize: 18, fontWeight: 700, color: P.accentLight, background: "none", border: "none", width: "100%", padding: 0 }} />
          <div style={{ fontSize: 10, color: P.textDim, marginTop: 2 }}>Click to set</div>

function InvoicePromptModal({ milestone, project, newPct, invoiceAmount, onLogInvoice, onClose }) {
  // Safety guard — if milestone is missing critical data, close immediately
  if (!milestone || !project || !milestone.id) { if (onClose) onClose(); return null; }
  const [status, setStatus] = useState("idle");
  const [msg, setMsg] = useState("");
  const invNumber = "INV-" + String((project.invoices || []).length + 1).padStart(3, "0");
  const invDate = new Date().toISOString().slice(0, 10);
  const alreadyInvoiced = (project.invoices || [])
    .filter(function(inv) { return inv.milestoneId === milestone.id; })
    .reduce(function(a, inv) { return a + (inv.amount || 0); }, 0);
  const lineDesc = newPct < 100
    ? newPct + "% of " + milestone.name + " (" + fmt(milestone.fee) + " total)" + (alreadyInvoiced > 0 ? " less prev. invoiced " + fmt(alreadyInvoiced) : "")

    var projNum = project.projectNumber ? "<div style='font-size:11px;color:#44546A'>" + project.projectNumber + "</div>" : "";
    var primeNum = project.primeProjectNumber ? "<div style='font-size:11px;color:#44546A'>Prime #: " + project.primeProjectNumber + "</div>" : "";

      ? "<div style='background:#F8FAFC;border:1px solid #CBD5E1;border-radius:4px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#44546A'><strong>Billing basis:</strong> " + newPct + "% complete &nbsp;&middot;&nbsp; Milestone fee: " + fmt(milestone.fee) + " &nbsp;&middot;&nbsp; Prev. invoiced: " + fmt(alreadyInvoiced) + " &nbsp;&middot;&nbsp; This invoice: " + fmt(invoiceAmount) + "</div>"
      : "";
    return "<div style='font-family:Segoe UI,system-ui,sans-serif;font-size:13px;color:#1a1a1a;max-width:700px'>"
      + "<div style='border-bottom:3px solid #1F3864;padding-bottom:12px;margin-bottom:20px;display:flex;justify-content:space-between'>"
        + "<div><div style='font-size:24px;font-weight:900;color:#C00000;letter-spacing:2px;line-height:1'>SETTY</div>"
