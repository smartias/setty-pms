        <KpiBox label="Overdue Follow-up" val={urgentCount} color={urgentCount > 0 ? P.red : P.textDim} sub=">14 days since sent" />
        <KpiBox label="Pending Fee Value" val={fmt(totalPendingFee)} color={P.purple} sub="not yet approved" />
      </div>

      {/* Sent to client — awaiting approval */}
      {sentCount > 0 && (
        <>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10, display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ background: P.yellowDim, color: P.yellow, padding: "2px 10px", borderRadius: 8, fontSize: 12 }}>Sent to Client — Awaiting Approval</span>
            <span style={{ color: P.textDim, fontWeight: 400, fontSize: 13 }}>{sentCount} CO{sentCount !== 1 ? "s" : ""}</span>
          </div>
          <table style={{ marginBottom: 28 }}>
            <thead>
              <tr>
                <th>Project</th><th>CO #</th><th>Name</th><th>Fee</th>
                <th>Date Sent</th><th>Days Out</th><th>Notes</th><th></th>
              </tr>
            </thead>
            <tbody>
              {pendingItems.filter(i => i.isWaiting).map(({ co, proj, daysSent, isUrgent }) => (
                <tr key={co.id} style={{ background: isUrgent ? "#1a0a00" : "transparent" }}>
                  <td>
                    <button onClick={() => onNavigateToProject(proj.id)}
                      style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 13, padding: 0, fontWeight: 500, textAlign: "left" }}>
                      {proj.projectNumber ? `[${proj.projectNumber}] ` : ""}{proj.name}
                    </button>
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono", fontSize: 12 }}>{co.number}</td>
                  <td style={{ fontWeight: 500 }}>{co.name || "—"}</td>
                  <td style={{ fontFamily: "JetBrains Mono", color: P.green }}>{fmt(co.fee || 0)}</td>
                  <td style={{ color: P.textMuted, whiteSpace: "nowrap" }}>{co.dateSent || "—"}</td>
                  <td>
                    {daysSent !== null && (
                      <span style={{ fontFamily: "JetBrains Mono", fontWeight: 600,
                        color: isUrgent ? P.red : daysSent > 7 ? P.yellow : P.textMuted }}>
                        {daysSent}d {isUrgent && "⚠"}
                      </span>
                    )}
                  </td>
                  <td style={{ color: P.textDim, fontSize: 12, maxWidth: 200 }}>{co.notes || "—"}</td>
                  <td style={{ whiteSpace: "nowrap" }}>
                    <Btn small variant="success" onClick={() => markApproved(proj, co.id)}>✓ Approve</Btn>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}

      {/* Draft / not yet sent */}
      {draftCount > 0 && (
        <>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10, display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ background: P.border, color: P.textMuted, padding: "2px 10px", borderRadius: 8, fontSize: 12 }}>Draft — Not Yet Sent</span>
            <span style={{ color: P.textDim, fontWeight: 400, fontSize: 13 }}>{draftCount} CO{draftCount !== 1 ? "s" : ""}</span>
          </div>
          <table style={{ marginBottom: 28 }}>
            <thead>
              <tr>
                <th>Project</th><th>CO #</th><th>Name</th><th>Fee</th>
                <th>Date Created</th><th>Scope</th><th>Notes</th><th></th>
              </tr>
            </thead>
            <tbody>
              {pendingItems.filter(i => !i.isWaiting).map(({ co, proj }) => (
                <tr key={co.id}>
                  <td>
                    <button onClick={() => onNavigateToProject(proj.id)}
                      style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 13, padding: 0, fontWeight: 500, textAlign: "left" }}>
                      {proj.projectNumber ? `[${proj.projectNumber}] ` : ""}{proj.name}
                    </button>
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono", fontSize: 12 }}>{co.number}</td>
                  <td style={{ fontWeight: 500 }}>{co.name || "—"}</td>
                  <td style={{ fontFamily: "JetBrains Mono", color: P.green }}>{fmt(co.fee || 0)}</td>
                  <td style={{ color: P.textMuted, whiteSpace: "nowrap" }}>{co.date || "—"}</td>
                  <td style={{ color: P.textDim, fontSize: 12, maxWidth: 180 }}>{co.scope ? co.scope.slice(0, 60) + (co.scope.length > 60 ? "…" : "") : "—"}</td>
                  <td style={{ color: P.textDim, fontSize: 12, maxWidth: 150 }}>{co.notes || "—"}</td>
                  <td style={{ whiteSpace: "nowrap" }}>
                    <Btn small variant="ghost" onClick={() => markSent(proj, co.id)}>📤 Mark Sent</Btn>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}
    </div>
  );
}

// ─── CASH FLOW VIEW (cross-project) ──────────────────────────────────────────

function buildProjectCashFlow(project) {
  // Returns { monthlyMap, totalFee, totalInvoiced, totalPaid, totalRemaining }
  const billablePhases = (project.phases || []).filter(p => p.billable && p.fee > 0);
  const invoices = project.invoices || [];
  const changeOrders = project.changeOrders || [];

  const auditLocked = (project.feeAuditLog || []).filter(e => e.action === "locked" && e.settyFee);
  const auditFee = auditLocked.length > 0 ? auditLocked[auditLocked.length - 1].settyFee : 0;
  const constructionCostCF = calcConstructionCost(project.squareFootage, project.buildingCategory, project.manualConstructionCost, project.manualRSMeansCostPerSF);
  const baseFee = project.lockedSettyFee || auditFee || (project.manualSettyFee > 0 ? project.manualSettyFee : calcSettyFee(constructionCostCF, project)) || 0;
  const approvedCOTotal = changeOrders.filter(c => c.approved).reduce((a, c) => a + (c.fee || 0), 0);
  const totalFee = baseFee + approvedCOTotal;
  const totalInvoiced = invoices.reduce((a, i) => a + (i.amount || 0), 0);
  const totalPaid = invoices.reduce((a, i) => a + (i.amountPaid || 0), 0);
  const totalRemaining = totalFee - totalInvoiced;

  const monthlyMap = {};
  function addMonth(key, fee, invoiced, paid, projectId) {
    if (!monthlyMap[key]) monthlyMap[key] = { month: key, fee: 0, invoiced: 0, paid: 0, projects: [] };
    monthlyMap[key].fee += fee;
    monthlyMap[key].invoiced += invoiced;
    monthlyMap[key].paid += paid;
    if (!monthlyMap[key].projects.includes(projectId)) monthlyMap[key].projects.push(projectId);
  }

  // Distribute phase fees proportionally across months
  billablePhases.forEach(ph => {
    const sd = ph.startDate ? new Date(ph.startDate + "T00:00:00") : null;
    const ed = ph.endDate   ? new Date(ph.endDate   + "T00:00:00") : null;
    if (!sd || !ed || ed <= sd) return;
    const totalDays = (ed - sd) / 86400000 + 1;
    const startYM = sd.getFullYear() * 12 + sd.getMonth();
    const endYM   = ed.getFullYear() * 12 + ed.getMonth();
    for (let ym = startYM; ym <= endYM; ym++) {
      const yr = Math.floor(ym / 12), mo = ym % 12;
      const key = yr + "-" + String(mo + 1).padStart(2, "0");
      const mStart = new Date(yr, mo, 1), mEnd = new Date(yr, mo + 1, 0);
      const overlapStart = sd > mStart ? sd : mStart;
      const overlapEnd   = ed < mEnd   ? ed : mEnd;
      const overlapDays  = Math.max(0, (overlapEnd - overlapStart) / 86400000 + 1);
      addMonth(key, ph.fee * (overlapDays / totalDays), 0, 0, project.id);
    }
  });

  // Place invoiced & paid amounts in actual invoice month
  invoices.forEach(inv => {
    if (!inv.date || !inv.amount) return;
    const key = inv.date.slice(0, 7);
    if (!monthlyMap[key]) monthlyMap[key] = { month: key, fee: 0, invoiced: 0, paid: 0, projects: [] };
    monthlyMap[key].invoiced += inv.amount;
    monthlyMap[key].paid += inv.amountPaid || 0;
    if (!monthlyMap[key].projects.includes(project.id)) monthlyMap[key].projects.push(project.id);
  });

  return { monthlyMap, totalFee, totalInvoiced, totalPaid, totalRemaining };
}

function CashFlowView({ projects, onNavigateToProject }) {
  const today = new Date();
  const todayStr = localDateStr(today);
  const currentYM = todayStr.slice(0, 7);

  const activeProjects = projects.filter(p =>
    !p.archived && isAwarded(p) &&
    p.status !== "Completed" && p.status !== "Cancelled" && p.status !== "Lost"
  );

  // Aggregate monthly data across all projects
  const { combinedMap, projectTotals } = useMemo(() => {
    const combinedMap = {};
    const projectTotals = {};

    activeProjects.forEach(proj => {
      const { monthlyMap, totalFee, totalInvoiced, totalPaid, totalRemaining } = buildProjectCashFlow(proj);
      projectTotals[proj.id] = { totalFee, totalInvoiced, totalPaid, totalRemaining, name: proj.name, projectNumber: proj.projectNumber };

      Object.entries(monthlyMap).forEach(([key, val]) => {
        if (!combinedMap[key]) combinedMap[key] = { month: key, fee: 0, invoiced: 0, paid: 0, projects: [] };
        combinedMap[key].fee      += val.fee;
        combinedMap[key].invoiced += val.invoiced;
        combinedMap[key].paid     += val.paid;
        val.projects.forEach(id => { if (!combinedMap[key].projects.includes(id)) combinedMap[key].projects.push(id); });
      });
    });

    return { combinedMap, projectTotals };
  }, [projects]);

  const months = Object.values(combinedMap).sort((a, b) => a.month > b.month ? 1 : -1);
  // Start from current month
  const visibleMonths = months.filter(m => m.month >= currentYM);

  const grandTotalFee       = Object.values(projectTotals).reduce((a, p) => a + p.totalFee, 0);
  const grandTotalInvoiced  = Object.values(projectTotals).reduce((a, p) => a + p.totalInvoiced, 0);
  const grandTotalPaid      = Object.values(projectTotals).reduce((a, p) => a + p.totalPaid, 0);
  const grandTotalRemaining = Object.values(projectTotals).reduce((a, p) => a + p.totalRemaining, 0);
  const grandOutstanding    = grandTotalInvoiced - grandTotalPaid;

  // Past invoiced (before current month) — already billed
  const pastInvoiced = months.filter(m => m.month < currentYM).reduce((a, m) => a + m.invoiced, 0);

  const maxFee = Math.max(...visibleMonths.map(m => m.fee), 1);
  const [highlightProject, setHighlightProject] = useState(null);

  // Per-project monthly breakdown for tooltip
  function projectBreakdownForMonth(monthKey) {
    return activeProjects
      .map(proj => {
        const { monthlyMap } = buildProjectCashFlow(proj);
        const m = monthlyMap[monthKey];
        return m ? { id: proj.id, name: proj.projectNumber || proj.name, fee: m.fee, invoiced: m.invoiced } : null;
      })
      .filter(Boolean)
      .filter(x => x.fee > 0 || x.invoiced > 0);
  }

  if (activeProjects.length === 0) return (
    <div style={{ padding: "24px 32px", color: P.textDim }}>No active awarded projects found.</div>
  );

  return (
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <div style={{ fontSize: 22, fontWeight: 800 }}>Cash Flow — All Projects</div>
        <Btn small variant="ghost" onClick={() => {
          const headers = ["Month", "Expected Fee", "Invoiced", "Paid", "Projects"];
          const rows = months.map(m => [
            m.month,
            Math.round(m.fee),
            Math.round(m.invoiced),
            Math.round(m.paid),
            m.projects.map(id => { const p = activeProjects.find(x => x.id === id); return p ? (p.projectNumber || p.name) : id; }).join("; ")
          ]);
          // Append project totals summary
          rows.push([]);
          rows.push(["PROJECT TOTALS", "", "", "", ""]);
          rows.push(["Project Number", "Project Name", "Total Fee", "Total Invoiced", "Total Paid", "Remaining"]);
          Object.values(projectTotals).forEach(p => rows.push([p.projectNumber || "", p.name, Math.round(p.totalFee), Math.round(p.totalInvoiced), Math.round(p.totalPaid || 0), Math.round(p.totalRemaining)]));
          downloadCSV("cashflow_" + new Date().toISOString().slice(0,10) + ".csv", headers, rows);
        }}>⬇ Export CSV</Btn>
        <Btn small variant="ghost" onClick={() => {
          // ── Monthly Invoicing Update & 6-Month Projections ────────────────
          const today = new Date();
          const todayStr = today.toISOString().slice(0,10);
          const currentYM = todayStr.slice(0,7);
          // Last 30 days window
          const thirtyDaysAgo = new Date(today); thirtyDaysAgo.setDate(today.getDate() - 30);
          const thirtyStr = thirtyDaysAgo.toISOString().slice(0,10);
          // Next 6 months (skip current month)
          const futureMonths = [];
          for (let i = 1; i <= 6; i++) {
            const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
            futureMonths.push(d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0"));
          }

          const rows = [];

          // ── Section 1: Summary header ─────────────────────────────────────
          rows.push(["MONTHLY INVOICING UPDATE & PROJECTIONS", "", "", "", "Generated: " + todayStr]);
          rows.push([]);

          // ── Section 2: Last 30 Days — Invoices Issued ─────────────────────
          rows.push(["INVOICES ISSUED — LAST 30 DAYS (since " + thirtyStr + ")"]);
          rows.push(["Project #", "Project Name", "PM", "Invoice #", "Invoice Date", "Milestone", "Amount", "Amount Paid", "Balance"]);
          let any30 = false;
          activeProjects.forEach(proj => {
            const recent = (proj.invoices || []).filter(inv => inv.date && inv.date >= thirtyStr);
            recent.forEach(inv => {
              any30 = true;
              rows.push([
                proj.projectNumber || "",
                proj.name || "",
                proj.projectManager || "",
                inv.number || "",
                inv.date || "",
                inv.milestoneName || inv.description || "",
                Math.round(inv.amount || 0),
                Math.round(inv.amountPaid || 0),
                Math.round((inv.amount || 0) - (inv.amountPaid || 0)),
              ]);
            });
          });
          if (!any30) rows.push(["No invoices issued in the last 30 days"]);
          rows.push([]);

          // ── Section 3: Projects Needing Invoicing (uninvoiced remaining > 0) ──
          rows.push(["UNINVOICED BALANCE — ACTIVE PROJECTS"]);
          rows.push(["Project #", "Project Name", "PM", "Status", "Total Contract", "Total Invoiced", "Balance Remaining", "% Invoiced"]);
          activeProjects.forEach(proj => {
            const { totalFee, totalInvoiced, totalRemaining } = buildProjectCashFlow(proj);
            if (totalRemaining <= 0) return;
            rows.push([
              proj.projectNumber || "",
              proj.name || "",
              proj.projectManager || "",
              proj.status || "",
              Math.round(totalFee),
              Math.round(totalInvoiced),
              Math.round(totalRemaining),
              totalFee > 0 ? Math.round(totalInvoiced / totalFee * 100) + "%" : "0%",
            ]);
          });
          rows.push([]);

          // ── Section 4: 6-Month Fee Projections (next 6 months, skip current) ──
          rows.push(["FEE PROJECTIONS — NEXT 6 MONTHS (expected, excluding current month)"]);
          const projHeader = ["Project #", "Project Name", "PM", "Status", "Total Contract", "Remaining", ...futureMonths];
          rows.push(projHeader);
          let monthTotals = new Array(6).fill(0);
          activeProjects.forEach(proj => {
            const { monthlyMap, totalFee, totalRemaining } = buildProjectCashFlow(proj);
            const monthFees = futureMonths.map((ym, i) => {
              const m = monthlyMap[ym];
              const v = Math.round(m ? m.fee : 0);
              monthTotals[i] += v;
              return v;
            });
            if (monthFees.every(v => v === 0) && totalRemaining <= 0) return;
            rows.push([
              proj.projectNumber || "",
              proj.name || "",
              proj.projectManager || "",
              proj.status || "",
              Math.round(totalFee),
              Math.round(totalRemaining),
              ...monthFees,
            ]);
          });
          rows.push(["", "", "", "", "TOTAL PROJECTED", "", ...monthTotals]);
          downloadCSV("invoicing_update_" + currentYM + ".csv", [], rows);
        }}>⬇ Invoicing Update</Btn>
      </div>
      <div style={{ color: P.textMuted, fontSize: 13, marginBottom: 24 }}>
        Combined fee projections and billing across {activeProjects.length} active project{activeProjects.length !== 1 ? "s" : ""}. Expected fee distributed by phase schedule; invoiced amounts shown by actual invoice date.
      </div>

      {/* KPI row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 12, marginBottom: 28 }}>
        <KpiBox label="Total Contract Value" val={fmt(grandTotalFee)} />
        <KpiBox label="Total Invoiced" val={fmt(grandTotalInvoiced)} color={P.purple}
          sub={grandTotalFee > 0 ? Math.round(grandTotalInvoiced / grandTotalFee * 100) + "% of contract" : ""} />
        <KpiBox label="Total Received" val={fmt(grandTotalPaid)} color={P.green}
          sub={grandTotalInvoiced > 0 ? Math.round(grandTotalPaid / grandTotalInvoiced * 100) + "% of invoiced" : ""} />
        <KpiBox label="Outstanding" val={fmt(grandOutstanding)} color={grandOutstanding > 0 ? P.red : P.green}
          sub={grandOutstanding > 0 ? "Invoiced, not received" : "All received"} />
        <KpiBox label="Remaining to Bill" val={fmt(grandTotalRemaining)} color={P.accentLight}
          sub={grandTotalFee > 0 ? Math.round(grandTotalRemaining / grandTotalFee * 100) + "% unbilled" : ""} />
      </div>

      {/* Bar chart */}
      <div style={{ marginBottom: 28 }}>
        <div style={{ overflowX: "auto" }}>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 6, minWidth: visibleMonths.length * 56, height: 160, paddingBottom: 0 }}>
            {visibleMonths.map(m => {
              const barH = Math.round((m.fee / maxFee) * 130);
              const invH = Math.round((m.invoiced / maxFee) * 130);
              const isCurrent = m.month === currentYM;
              return (
                <div key={m.month} style={{ display: "flex", flexDirection: "column", alignItems: "center", minWidth: 50, flex: "0 0 50px" }}>
                  <div style={{ fontSize: 9, color: P.accentLight, fontFamily: "JetBrains Mono", marginBottom: 2, whiteSpace: "nowrap" }}>
                    {m.fee >= 1000 ? "$" + Math.round(m.fee / 1000) + "k" : m.fee > 0 ? fmt(m.fee) : ""}
                  </div>
                  <div style={{ position: "relative", width: "100%", display: "flex", alignItems: "flex-end", gap: 2, height: 130 }}>
                    {/* Expected fee bar */}
                    <div style={{ flex: 1, height: barH, background: isCurrent ? P.accent : P.accentDim, borderRadius: "3px 3px 0 0", minHeight: m.fee > 0 ? 2 : 0 }} />
                    {/* Invoiced bar */}
                    {m.invoiced > 0 && (
                      <div style={{ flex: 1, height: invH, background: P.green, borderRadius: "3px 3px 0 0", opacity: 0.85, minHeight: 2 }} />
                    )}
                  </div>
                  <div style={{ fontSize: 9, color: isCurrent ? P.accentLight : P.textDim, marginTop: 4, textAlign: "center", whiteSpace: "nowrap",
                    fontWeight: isCurrent ? 700 : 400 }}>
                    {new Date(m.month + "-15").toLocaleDateString("en-US", { month: "short", year: "2-digit" })}
                    {isCurrent && <div style={{ fontSize: 8, color: P.green }}>NOW</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{ display: "flex", gap: 16, marginTop: 8, fontSize: 11, color: P.textDim }}>
          <span><span style={{ display: "inline-block", width: 10, height: 10, background: P.accentDim, borderRadius: 2, marginRight: 4 }} />Expected Fee</span>
          <span><span style={{ display: "inline-block", width: 10, height: 10, background: P.green, borderRadius: 2, marginRight: 4, opacity: 0.85 }} />Invoiced</span>
        </div>
      </div>

      {/* Monthly table — from current month forward */}
      <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10 }}>Monthly Breakdown</div>
      <div style={{ overflowX: "auto", marginBottom: 32 }}>
        <table>
          <thead>
            <tr>
              <th style={{ minWidth: 110 }}>Month</th>
              <th style={{ textAlign: "right" }}>Expected Fee</th>
              <th style={{ textAlign: "right" }}>Invoiced</th>
              <th style={{ textAlign: "right" }}>Received</th>
              <th style={{ textAlign: "right" }}>Cumul. Expected</th>
              <th style={{ textAlign: "right" }}>Cumul. Invoiced</th>
              <th style={{ minWidth: 180 }}>Active Projects</th>
            </tr>
          </thead>
          <tbody>
            {(() => {
              let cumulFee = 0, cumulInv = 0;
              // Add past invoiced to cumulative
              cumulInv = pastInvoiced;
              return visibleMonths.map(m => {
                cumulFee += m.fee;
                cumulInv += m.invoiced;
                const isCurrent = m.month === currentYM;
                const label = new Date(m.month + "-15").toLocaleDateString("en-US", { month: "long", year: "numeric" });
                const breakdown = projectBreakdownForMonth(m.month);
                return (
                  <tr key={m.month} style={{ background: isCurrent ? "#1a2500" : "transparent" }}>
                    <td style={{ fontWeight: isCurrent ? 700 : 400, color: isCurrent ? P.green : P.text, whiteSpace: "nowrap" }}>
                      {label}{isCurrent && <span style={{ fontSize: 10, color: P.green, marginLeft: 6 }}>← NOW</span>}
                    </td>
                    <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", color: P.accentLight }}>{m.fee > 0 ? fmt(m.fee) : <span style={{ color: P.border }}>—</span>}</td>
                    <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", color: m.invoiced > 0 ? P.green : P.textDim }}>{m.invoiced > 0 ? fmt(m.invoiced) : <span style={{ color: P.border }}>—</span>}</td>
                    <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", color: m.paid > 0 ? P.green : P.textDim }}>{m.paid > 0 ? fmt(m.paid) : <span style={{ color: P.border }}>—</span>}</td>
                    <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", color: P.textMuted }}>{fmt(cumulFee)}</td>
                    <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", color: P.purple }}>{fmt(cumulInv)}</td>
                    <td style={{ fontSize: 11 }}>

                <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", color: outstanding > 0 ? P.red : P.textDim }}>{outstanding > 0 ? fmt(outstanding) : "—"}</td>
                <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", color: pt.totalRemaining > 0 ? P.accentLight : P.textDim }}>{fmt(pt.totalRemaining)}</td>

            <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.purple }}>{fmt(grandTotalInvoiced)}</td>
            <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>{fmt(grandTotalPaid)}</td>
            <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", fontWeight: 700, color: grandOutstanding > 0 ? P.red : P.textDim }}>{fmt(grandOutstanding)}</td>
            <td style={{ textAlign: "right", fontFamily: "JetBrains Mono", fontWeight: 700, color: P.accentLight }}>{fmt(grandTotalRemaining)}</td>
          </tr>
        </tfoot>
      </table>
    </div>
  );
}

// ─── CALENDAR HELPERS ─────────────────────────────────────────────────────────

const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

function getFirstDayOfMonth(year, month) {
  return new Date(year, month, 1).getDay();
}

// Parse "YYYY-MM-DD" safely without timezone shift
function parseLocalDate(str) {
  if (!str) return null;
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function isSameDay(dateStr, year, month, day) {
  const d = parseLocalDate(dateStr);
  if (!d) return false;
  return d.getFullYear() === year && d.getMonth() === month && d.getDate() === day;
}

// ─── SINGLE-PROJECT CALENDAR ─────────────────────────────────────────────────

function GanttView({ project }) {
  const todayStr = new Date().toISOString().slice(0, 10);
  const allMilestones = project.milestones || [];
  const phases       = (project.phases || []).filter(p => p.billable && p.startDate && p.endDate);
  const milestones   = allMilestones.filter(m => m.dueDate);

  const hasData = phases.length > 0 || milestones.length > 0;
  if (!hasData) {
    return (
      <div style={{ color: P.textDim, fontSize: 13, padding: "40px 0", textAlign: "center" }}>
        No schedule data yet — add billable phases with dates in the Schedule tab.
      </div>
    );
  }

  // ── Date range ──────────────────────────────────────────────────────────────
  const dateCandidates = [
    ...phases.flatMap(p => [p.startDate, p.endDate]),
    ...milestones.map(m => m.dueDate),
    project.startDate, project.proposalDueDate, project.contractExpirationDate, todayStr,
  ].filter(Boolean);

  const timestamps  = dateCandidates.map(d => parseLocalDate(d).getTime());
  const PAD         = 21 * 86400000;
  const rangeStart  = new Date(Math.min(...timestamps) - PAD);
  const rangeEnd    = new Date(Math.max(...timestamps) + PAD);
  rangeStart.setDate(1); // snap to month boundary

  const PX_PER_DAY  = 5;
  const ROW_H       = 38;
  const HEADER_H    = ROW_H;
  const LABEL_W     = 210;
  const totalDays   = Math.ceil((rangeEnd - rangeStart) / 86400000);
  const totalWidth  = Math.max(totalDays * PX_PER_DAY, 400);

  function dateToX(dateStr) {
    return Math.max(0, Math.floor((parseLocalDate(dateStr) - rangeStart) / 86400000) * PX_PER_DAY);
  }

  // ── Month header segments ────────────────────────────────────────────────────
  const months = [];
  const mc = new Date(rangeStart);
  while (mc < rangeEnd) {
    months.push({
      label: MONTH_NAMES[mc.getMonth()].slice(0, 3) + " '" + String(mc.getFullYear()).slice(2),
      x:     Math.floor((mc - rangeStart) / 86400000) * PX_PER_DAY,
      width: getDaysInMonth(mc.getFullYear(), mc.getMonth()) * PX_PER_DAY,
      even:  months.length % 2 === 0,
    });
    mc.setMonth(mc.getMonth() + 1);
  }

  // ── Row definitions ──────────────────────────────────────────────────────────
  const PHASE_COLORS = ["#2563eb","#0d9488","#7c3aed","#d97706","#db2777","#059669","#1d4ed8","#0f766e"];

  const phaseRows = phases.map((ph, i) => ({
    type: "phase", id: ph.id,
    label: ph.name,
    subLabel: ph.fee > 0 ? "$" + (ph.fee >= 1000 ? (ph.fee / 1000).toFixed(0) + "K" : ph.fee) : null,
    x:   dateToX(ph.startDate),
    x2:  dateToX(ph.endDate),
    color: PHASE_COLORS[i % PHASE_COLORS.length],
    pct: getPhasePctFromMilestones(ph, allMilestones),
  }));

  const milestoneRows = milestones.map(m => ({
    type: "milestone", id: m.id,
    label: m.name,
    x: dateToX(m.dueDate),
    color: m.type === "billable" ? "#3b82f6" : m.type === "change-order" ? "#eab308" : "#8b5cf6",
    done: (m.pctComplete || 0) >= 100,
  }));

  const allRows  = [...phaseRows, ...milestoneRows];
  const svgH     = HEADER_H + allRows.length * ROW_H;
  const todayX   = dateToX(todayStr);
  const showToday = todayX >= 0 && todayX <= totalWidth;

  // ── CSV export ───────────────────────────────────────────────────────────────
  function exportCSV() {
    const header = ["Task", "Type", "Phase Code", "Start Date", "End / Due Date", "Duration (days)", "% Complete", "Fee ($)"];
    const rows = [
      ...phases.map(ph => [
        ph.name, "Phase", ph.code || "",
        ph.startDate, ph.endDate,
        Math.ceil((parseLocalDate(ph.endDate) - parseLocalDate(ph.startDate)) / 86400000),
        getPhasePctFromMilestones(ph, allMilestones) + "%",
        ph.fee > 0 ? ph.fee : "",
      ]),
      ...milestones.map(m => [
        m.name, "Milestone", m.phase || "",
        m.dueDate, m.dueDate, 0,
        (m.pctComplete || 0) + "%",
        m.fee > 0 ? m.fee : "",
      ]),
    ];
    const csv = [header, ...rows]
      .map(r => r.map(v => `"${String(v ?? "").replace(/"/g, '""')}"`).join(","))
      .join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = ((project.projectNumber || project.name || "Project").replace(/[^a-z0-9]/gi, "_")) + "_Gantt.csv";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  return (
    <div>
      {/* Header row */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <span style={{ fontWeight: 700, fontSize: 15 }}>Project Gantt</span>
          <span style={{ color: P.textDim, fontSize: 12, marginLeft: 10 }}>
            {phases.length} phase{phases.length !== 1 ? "s" : ""} · {milestones.length} milestone{milestones.length !== 1 ? "s" : ""}
          </span>
        </div>
        <Btn small variant="ghost" onClick={exportCSV}>⬇ Export to Excel</Btn>
      </div>

      {/* Gantt body */}
      <div style={{ display: "flex", border: `1px solid ${P.border}`, borderRadius: 10, overflow: "hidden" }}>

        {/* Fixed label column */}
        <div style={{ minWidth: LABEL_W, maxWidth: LABEL_W, borderRight: `1px solid ${P.border}`, flexShrink: 0 }}>
          <div style={{ height: HEADER_H, background: "#1a1f35", borderBottom: `1px solid ${P.border}` }} />
          {allRows.map((row, i) => (
            <div key={row.id} style={{
              height: ROW_H, display: "flex", alignItems: "center",
              paddingLeft: row.type === "milestone" ? 20 : 12,
              paddingRight: 8,
              background: i % 2 === 0 ? P.card : "#151828",
              borderBottom: `1px solid ${P.border}`,
              gap: 5, overflow: "hidden",
            }}>
              {row.type === "milestone" && (
                <span style={{ color: row.color, fontSize: 10, flexShrink: 0 }}>◆</span>
              )}
              <span style={{ fontSize: 12, color: P.textMuted, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {row.label}
              </span>
              {row.subLabel && (
                <span style={{ fontSize: 10, color: P.green, fontFamily: "JetBrains Mono", flexShrink: 0 }}>{row.subLabel}</span>
              )}
            </div>
          ))}
        </div>

        {/* Scrollable SVG timeline */}
        <div style={{ flex: 1, overflowX: "auto", overflowY: "visible" }}>
          <svg width={totalWidth} height={svgH} style={{ display: "block", fontFamily: "inherit" }}>

            {/* Month columns */}
            {months.map((m, i) => (
              <g key={i}>
                <rect x={m.x} y={0} width={m.width} height={svgH}
                  fill={m.even ? "#151828" : "#181c2e"} />
                <line x1={m.x} y1={0} x2={m.x} y2={svgH} stroke="#2d3452" strokeWidth={1} />
                {m.width > 28 && (
                  <text x={m.x + 5} y={HEADER_H - 10} fill="#4b5675" fontSize={10} fontFamily="inherit">{m.label}</text>
                )}
              </g>
            ))}
            <line x1={0} y1={HEADER_H} x2={totalWidth} y2={HEADER_H} stroke="#2d3452" strokeWidth={1} />

            {/* Row dividers */}
            {allRows.map((_, i) => (
              <line key={i} x1={0} y1={HEADER_H + (i + 1) * ROW_H} x2={totalWidth} y2={HEADER_H + (i + 1) * ROW_H}
                stroke="#2d3452" strokeWidth={1} />
            ))}

            {/* Phase bars */}
            {phaseRows.map((row, i) => {
              const barW    = Math.max(6, row.x2 - row.x);
              const barTop  = HEADER_H + i * ROW_H + ROW_H * 0.22;
              const barH    = ROW_H * 0.56;
              const progW   = barW * (row.pct / 100);
              return (
                <g key={row.id}>
                  <rect x={row.x} y={barTop} width={barW} height={barH} rx={3}
                    fill={row.color} opacity={0.18} />
                  {progW > 0 && (
                    <rect x={row.x} y={barTop} width={progW} height={barH} rx={3}
                      fill={row.color} opacity={0.85} />
                  )}
                  {barW > 40 && (
                    <text x={row.x + barW / 2} y={barTop + barH / 2 + 4}
                      fill="rgba(255,255,255,0.9)" fontSize={10} textAnchor="middle"
                      fontFamily="inherit" fontWeight={600}>{row.pct}%</text>
                  )}
                </g>
              );
            })}

            {/* Milestone diamonds */}
            {milestoneRows.map((row, mi) => {
              const cy = HEADER_H + (phases.length + mi) * ROW_H + ROW_H / 2;
              const sz = 7;
              return (
                <polygon key={row.id}
                  points={`${row.x},${cy - sz} ${row.x + sz},${cy} ${row.x},${cy + sz} ${row.x - sz},${cy}`}
                  fill={row.done ? P.green : row.color} opacity={0.9} />
              );
            })}

            {/* Today line */}
            {showToday && (
              <g>
                <line x1={todayX} y1={0} x2={todayX} y2={svgH}
                  stroke="#C00000" strokeWidth={1.5} strokeDasharray="4 3" opacity={0.75} />
                <rect x={todayX - 1} y={2} width={30} height={14} rx={3} fill="#C00000" opacity={0.8} />
                <text x={todayX + 3} y={13} fill="white" fontSize={9} fontFamily="inherit" fontWeight={700}>Today</text>
              </g>
            )}
          </svg>
        </div>
      </div>
    </div>
  );
}

function CalendarView({ project, onChange }) {
  const today = new Date();
  const [calYear, setCalYear] = useState(today.getFullYear());
  const [calMonth, setCalMonth] = useState(today.getMonth());
  const [selected, setSelected] = useState(null); // { day, milestones[] }

  const milestones = project.milestones || [];

  function prevMonth() {
    if (calMonth === 0) { setCalYear(y => y - 1); setCalMonth(11); }
    else setCalMonth(m => m - 1);
    setSelected(null);
  }
  function nextMonth() {
    if (calMonth === 11) { setCalYear(y => y + 1); setCalMonth(0); }
    else setCalMonth(m => m + 1);
    setSelected(null);
  }
  function goToday() { setCalYear(today.getFullYear()); setCalMonth(today.getMonth()); setSelected(null); }

  const daysInMonth = getDaysInMonth(calYear, calMonth);
  const firstDay = getFirstDayOfMonth(calYear, calMonth);
  const cells = Array(firstDay).fill(null).concat(Array.from({ length: daysInMonth }, (_, i) => i + 1));
  // pad to complete last row
  while (cells.length % 7 !== 0) cells.push(null);

  function getMilestonesForDay(day) {
    const dateStr = `${calYear}-${String(calMonth + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    return milestones.filter(m => m.dueDate === dateStr);
  }

  const isToday = (day) => day && today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === day;

  // Phase bands — show colored bar spanning start→end dates
  const phases = (project.phases || []).filter(p => p.billable && p.startDate && p.endDate);

  function getPhaseColorForDay(day) {
    if (!day) return null;
    const dateStr = `${calYear}-${String(calMonth + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const d = parseLocalDate(dateStr);
    for (const ph of phases) {
      const start = parseLocalDate(ph.startDate);
      const end = parseLocalDate(ph.endDate);
      if (d >= start && d <= end) return ph;
    }
    return null;
  }

  // Assign a distinct color per phase
  const PHASE_COLORS = ["#1d4ed8","#0f766e","#7c3aed","#b45309","#be185d","#065f46"];
  const phaseColorMap = {};
  phases.forEach((ph, i) => { phaseColorMap[ph.code] = PHASE_COLORS[i % PHASE_COLORS.length]; });

  const TYPE_COLORS = {
    "billable": { dot: P.accentLight, label: "Billable" },
    "non-billable": { dot: P.purple, label: "Non-Billable" },
    "change-order": { dot: P.yellow, label: "Change Order" },
    "note": { dot: P.green, label: "Note" },
  };

  return (
    <div>
      {/* Nav */}
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 20 }}>
        <Btn small variant="ghost" onClick={prevMonth}>‹ Prev</Btn>
        <div style={{ fontWeight: 700, fontSize: 16, minWidth: 180, textAlign: "center" }}>
          {MONTH_NAMES[calMonth]} {calYear}
        </div>
        <Btn small variant="ghost" onClick={nextMonth}>Next ›</Btn>
        <Btn small variant="ghost" onClick={goToday}>Today</Btn>
      </div>

      {/* Phase legend */}
      {phases.length > 0 && (
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
          {phases.map(ph => (
            <div key={ph.code} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
              <div style={{ width: 20, height: 6, borderRadius: 3, background: phaseColorMap[ph.code] }} />
              <span style={{ color: P.textMuted }}>{ph.name}</span>
            </div>
          ))}
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: P.accentLight }} />
            <span style={{ color: P.textMuted }}>Billable</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: P.purple }} />
            <span style={{ color: P.textMuted }}>Non-Billable</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: P.yellow }} />
            <span style={{ color: P.textMuted }}>Change Order</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: P.green }} />
            <span style={{ color: P.textMuted }}>Note</span>
          </div>
        </div>
      )}

      {/* Calendar grid */}
      <div style={{ border: `1px solid ${P.border}`, borderRadius: 10, overflow: "hidden" }}>
        {/* Day headers */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", background: P.bg }}>
          {DAY_NAMES.map(d => (
            <div key={d} style={{ padding: "8px 0", textAlign: "center", fontSize: 11, fontWeight: 600, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em" }}>{d}</div>
          ))}
        </div>
        {/* Weeks */}
        {Array.from({ length: cells.length / 7 }, (_, wi) => (
          <div key={wi} style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)" }}>
            {cells.slice(wi * 7, wi * 7 + 7).map((day, di) => {
              const dayMilestones = day ? getMilestonesForDay(day) : [];
              const phaseForDay = day ? getPhaseColorForDay(day) : null;
              const isSelected = selected?.day === day;
              const isTodayCell = isToday(day);
              const dateStr = day ? `${calYear}-${String(calMonth + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}` : null;
              const hasOverdue = dayMilestones.some(m => milestoneStatus(m.pctComplete) !== "Completed");
              return (
                <div key={di}
                  onClick={() => { if (!day) return; setSelected(isSelected ? null : { day, milestones: dayMilestones, dateStr }); }}
                  style={{
                    minHeight: 80,
                    borderTop: `1px solid ${P.border}`,
                    borderRight: di < 6 ? `1px solid ${P.border}` : "none",
                    padding: "6px 8px",
                    background: isSelected ? P.accentDim : phaseForDay ? phaseColorMap[phaseForDay.code] + "18" : day ? P.card : P.bg,
                    cursor: day ? "pointer" : "default",
                    position: "relative",
                    transition: "background .1s",
                  }}
                  onMouseEnter={e => { if (day) e.currentTarget.style.background = isSelected ? P.accentDim : P.cardHover; }}
                  onMouseLeave={e => { if (day) e.currentTarget.style.background = isSelected ? P.accentDim : phaseForDay ? phaseColorMap[phaseForDay.code] + "18" : P.card; }}
                >
                  {day && (
                    <>
                      {/* Phase top bar */}
                      {phaseForDay && (
                        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: phaseColorMap[phaseForDay.code], borderRadius: "2px 2px 0 0" }} />
                      )}
                      {/* Day number */}
                      <div style={{
                        fontSize: 13, fontWeight: isTodayCell ? 700 : 400,
                        color: isTodayCell ? "#fff" : P.textMuted,
                        background: isTodayCell ? P.accent : "transparent",
                        width: 24, height: 24, borderRadius: "50%",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        marginBottom: 4,
                      }}>{day}</div>
                      {/* Milestone dots */}
                      {dayMilestones.slice(0, 3).map(m => {
                        const st = milestoneStatus(m.pctComplete);
                        const dotColor = st === "Completed" ? P.green : m.type === "non-billable" ? P.purple : m.type === "change-order" ? P.yellow : P.accentLight;
                        return (
                          <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 2 }}>
                            <div style={{ width: 6, height: 6, borderRadius: "50%", background: dotColor, flexShrink: 0 }} />
                            <span style={{ fontSize: 10, color: P.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: "calc(100% - 12px)" }}>{m.name}</span>
                          </div>
                        );
                      })}
                      {dayMilestones.length > 3 && (
                        <div style={{ fontSize: 10, color: P.textDim }}>+{dayMilestones.length - 3} more</div>
                      )}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Day detail panel */}
      {selected && (
        <div style={{ marginTop: 20, background: P.card, border: `1px solid ${P.border}`, borderRadius: 10, padding: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}>
            {MONTH_NAMES[calMonth]} {selected.day}, {calYear}
            {selected.milestones.length === 0 && <span style={{ color: P.textDim, fontWeight: 400, fontSize: 13, marginLeft: 12 }}>Nothing logged</span>}
          </div>
          {selected.milestones.map(m => {
            const st = milestoneStatus(m.pctComplete);
            const stColor = MILESTONE_STATUS_COLORS[st] || MILESTONE_STATUS_COLORS["Not Started"];
            const typeColor = m.type === "billable" ? { bg: P.accentDim, text: P.accentLight }
              : m.type === "change-order" ? { bg: P.yellowDim, text: P.yellow }
              : { bg: P.purpleDim, text: P.purple };
            return (
              <div key={m.id} style={{ padding: "10px 14px", marginBottom: 8, background: P.bg, borderRadius: 8, border: `1px solid ${P.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 4 }}>{m.name}</div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <Badge color={typeColor} text={m.type === "billable" ? "Billable" : m.type === "change-order" ? "Change Order" : "Non-Billable"} />
                    <span style={{ fontSize: 12, color: P.textDim }}>Phase: {m.phase}</span>
                    {m.fee > 0 && <span style={{ fontSize: 12, color: P.green, fontFamily: "JetBrains Mono" }}>{fmt(m.fee)}</span>}
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 80 }}><ProgressBar pct={m.pctComplete || 0} color={m.pctComplete >= 100 ? P.green : P.accent} /></div>
                  <span style={{ fontSize: 12, fontFamily: "JetBrains Mono", color: P.textMuted, minWidth: 32 }}>{m.pctComplete || 0}%</span>
                  <Badge color={stColor} text={st} />
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

<script type="text/babel" data-presets="react">

function printWeeklyDeliverables(projects) {
  const today = new Date();
  const todayStr = localDateStr(today);
  // Get Monday and Friday of current week
  const day = today.getDay();
  const diffMon = day === 0 ? -6 : 1 - day;
  const monDate = new Date(today); monDate.setDate(today.getDate() + diffMon);
  const friDate = new Date(monDate); friDate.setDate(monDate.getDate() + 4);
  const weekStart = localDateStr(monDate);
  const weekEnd   = localDateStr(friDate);

  const fmtD = d => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

  // Collect all milestones due this week across all active projects
  const active = projects.filter(p => !p.archived);
  const items = [];
  active.forEach(proj => {
    (proj.milestones || []).forEach(m => {
      if (!m.dueDate) return;
      if (m.dueDate >= weekStart && m.dueDate <= weekEnd) {
        items.push({
          dueDate: m.dueDate,
          projectName: proj.name || "—",
          projectNumber: proj.projectNumber || "—",
          pm: proj.projectManager || "—",
          milestoneName: m.name || "—",
          phase: m.phaseName || m.phase || "—",
          status: m.pctComplete >= 100 ? "Complete" : m.pctComplete > 0 ? "In Progress" : "Not Started",
          pct: m.pctComplete || 0,
          notes: m.notes || "",
        });
      }
    });
  });

  // Sort by date then project
  items.sort((a, b) => a.dueDate !== b.dueDate ? (a.dueDate > b.dueDate ? 1 : -1) : a.projectName.localeCompare(b.projectName));

  const statusColor = s => s === "Complete" ? "#1a7a34" : s === "In Progress" ? "#b45309" : "#44546A";
  const statusBg    = s => s === "Complete" ? "#e6f4ea"  : s === "In Progress" ? "#fff3e0"  : "#f0f0f0";

  // Group by day
  const DAY_LABELS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const byDay = {};
  items.forEach(it => {
    if (!byDay[it.dueDate]) byDay[it.dueDate] = [];
    byDay[it.dueDate].push(it);
  });
  const sortedDays = Object.keys(byDay).sort();

  let rowIdx = 0;
  const rows = items.length ? sortedDays.map(dateKey => {
    const dayItems = byDay[dateKey];
    const dow = new Date(dateKey + "T00:00:00").getDay();
    const dayHeader = `
      <tr>
        <td colspan="8" style="background:#1F3864;color:#fff;font-weight:700;font-size:10pt;padding:8px 10px;letter-spacing:0.3px;">
          ${DAY_LABELS[dow]} &mdash; ${fmtD(dateKey)}
          <span style="font-weight:400;font-size:8.5pt;margin-left:12px;opacity:0.8;">${dayItems.length} deliverable${dayItems.length !== 1 ? "s" : ""}</span>
        </td>
      </tr>`;
    const itemRows = dayItems.map(it => {
      const bg = rowIdx++ % 2 === 0 ? "" : "background:#F8F8F8;";
      return `
      <tr style="${bg}">
        <td style="font-weight:600;">${it.projectName}</td>
        <td style="font-family:monospace;font-size:9pt;">${it.projectNumber}</td>
        <td style="font-weight:500;">${it.milestoneName}</td>
        <td style="color:#44546A;font-size:9pt;">${it.phase}</td>
        <td>${it.pm}</td>
        <td>
          <span style="background:${statusBg(it.status)};color:${statusColor(it.status)};padding:2px 8px;border-radius:8px;font-size:8pt;font-weight:600;white-space:nowrap;">
            ${it.status}${it.pct > 0 && it.pct < 100 ? " (" + it.pct + "%)" : ""}
          </span>
        </td>
        <td style="color:#44546A;font-size:9pt;">${it.notes || "—"}</td>
      </tr>`;
    }).join("");
    return dayHeader + itemRows;
  }).join("") : `
    <tr><td colspan="7" style="text-align:center;padding:24px;color:#44546A;font-style:italic;">No deliverables due this week.</td></tr>`;

  const html = `
    <div class="doc-header">
      <div>
        <div class="logo-text">SETTY</div>
        <div class="logo-sub">&amp; ASSOCIATES, LTD, PC</div>
        <div style="margin-top:10px;font-size:8.5pt;color:#44546A;line-height:1.6;">
          Fairfax, VA (HQ) · Washington DC · New York · Baltimore<br>
          Atlanta · Philadelphia · Los Angeles · Tampa · India
        </div>
      </div>
      <div class="doc-type-badge">
        <div class="doc-type">WEEKLY DELIVERABLES</div>
        <div class="doc-number">Week of ${fmtD(weekStart)}</div>
        <div style="font-size:9pt;color:#44546A;margin-top:6px;">Through ${fmtD(weekEnd)}</div>
      </div>
    </div>

    <div style="background:#f0f4ff;border-left:4px solid #2F5496;padding:10px 16px;border-radius:0 6px 6px 0;margin-bottom:20px;font-size:10pt;color:#1F3864;">
      <strong>${items.length} deliverable${items.length !== 1 ? "s" : ""}</strong> due ${fmtD(weekStart)} – ${fmtD(weekEnd)}
      · <span style="color:#44546A;">${[...new Set(items.map(i => i.projectNumber))].filter(n => n !== "—").join(", ") || "No active projects"}</span>
    </div>

    <table class="line-items">
      <thead>
        <tr>
          <th>Project</th>
          <th>Proj #</th>
          <th>Milestone</th>
          <th>Phase</th>
          <th>PM</th>
          <th>Status</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>

    <div class="doc-footer">
      <span>SETTY &amp; Associates, LTD, PC</span>
      <span>Weekly Deliverables · Week of ${fmtD(weekStart)}</span>
      <span>Printed ${fmtD(todayStr)}</span>
    </div>
  `;
  printDocument(html, "Weekly Deliverables — " + fmtD(weekStart));
}

function TeamCalendar({ projects, onNavigateToProject }) {
  const today = new Date();
  const [calYear, setCalYear] = useState(today.getFullYear());
  const [calMonth, setCalMonth] = useState(today.getMonth());
  const [selected, setSelected] = useState(null);
  const [filterProject, setFilterProject] = useState("All");

  const active = projects.filter(p => !p.archived);

  // Assign a distinct color per project
  const PROJECT_CAL_COLORS = ["#3b82f6","#10b981","#8b5cf6","#f59e0b","#ef4444","#06b6d4","#ec4899","#84cc16","#f97316","#6366f1"];
  const projectColorMap = {};
  active.forEach((p, i) => { projectColorMap[p.id] = PROJECT_CAL_COLORS[i % PROJECT_CAL_COLORS.length]; });

  const allMilestones = active
    .filter(p => filterProject === "All" || p.id === filterProject)
    .flatMap(p => (p.milestones || []).map(m => ({ ...m, projectName: p.name, projectNumber: p.projectNumber || "", projectId: p.id, pm: p.projectManager })));

  function prevMonth() {
    if (calMonth === 0) { setCalYear(y => y - 1); setCalMonth(11); } else setCalMonth(m => m - 1);
    setSelected(null);
  }
  function nextMonth() {
    if (calMonth === 11) { setCalYear(y => y + 1); setCalMonth(0); } else setCalMonth(m => m + 1);
    setSelected(null);
  }
  function goToday() { setCalYear(today.getFullYear()); setCalMonth(today.getMonth()); setSelected(null); }

  const daysInMonth = getDaysInMonth(calYear, calMonth);
  const firstDay = getFirstDayOfMonth(calYear, calMonth);
  const cells = Array(firstDay).fill(null).concat(Array.from({ length: daysInMonth }, (_, i) => i + 1));
  while (cells.length % 7 !== 0) cells.push(null);

  function getMilestonesForDay(day) {
    const dateStr = `${calYear}-${String(calMonth + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    return allMilestones.filter(m => m.dueDate === dateStr);
  }

  const isToday = (day) => day && today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === day;

  // Count milestones this month for the header
  const monthStr = `${calYear}-${String(calMonth + 1).padStart(2,"0")}`;
  const thisMonthCount = allMilestones.filter(m => (m.dueDate || "").startsWith(monthStr)).length;

  // ── Outlook sync state ──
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | syncing | done | error
  const [syncLog, setSyncLog] = useState([]); // [{name, status, message}]
  const [syncedCount, setSyncedCount] = useState(0);
  const [showSyncLog, setShowSyncLog] = useState(false);

  // All milestones with a due date (across all projects, not just filtered view)
  const allSyncableMilestones = active.flatMap(p =>
    (p.milestones || [])
      .filter(m => m.dueDate)
      .map(m => ({ ...m, projectName: p.name, projectNumber: p.projectNumber || "", projectId: p.id }))
  );

  async function syncToOutlook() {
    setSyncStatus("syncing");
    setSyncLog([]);
    setSyncedCount(0);

    // Event IDs stored in milestone.calendarEventId (Supabase) — no localStorage needed
    const log = [];
    let successCount = 0;
    // Track updates: { projectId -> { milestoneId -> eventId } }
    const projectMilestoneUpdates = {};

    for (let i = 0; i < allSyncableMilestones.length; i++) {
      const m = allSyncableMilestones[i];
      const existingEventId = m.calendarEventId || null;
      setSyncLog([...log, { name: `${m.projectName} — ${m.name}`, status: "pending" }]);

      const result = await createOrUpdateCalendarEvent(m, m.projectName, m.projectNumber, existingEventId);

      if (result.success) {
        if (!projectMilestoneUpdates[m.projectId]) projectMilestoneUpdates[m.projectId] = {};
        projectMilestoneUpdates[m.projectId][m.id] = result.eventId;
        log.push({ name: `${m.projectName} — ${m.name}`, status: "success", message: existingEventId ? "Updated" : "Created" });
        successCount++;
      } else {
        log.push({ name: `${m.projectName} — ${m.name}`, status: "error", message: result.error });
      }
      setSyncLog([...log]);
      setSyncedCount(successCount);
    }

    // Write eventIds back into project milestone objects via onUpdateProject
    Object.entries(projectMilestoneUpdates).forEach(([projectId, milestoneUpdates]) => {
      const proj = projects.find(p => p.id === projectId);
      if (!proj) return;
      const newMilestones = (proj.milestones || []).map(m =>
        milestoneUpdates[m.id] ? { ...m, calendarEventId: milestoneUpdates[m.id] } : m
      );
      onUpdateProject({ ...proj, milestones: newMilestones });
    });
    setSyncStatus(log.some(l => l.status === "error") ? "done_with_errors" : "done");
    setShowSyncLog(true);
  }

  return (
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 4 }}>Team Calendar</div>
          <div style={{ color: P.textMuted, fontSize: 13 }}>{thisMonthCount} milestone{thisMonthCount !== 1 ? "s" : ""} due in {MONTH_NAMES[calMonth]}</div>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <select value={filterProject} onChange={e => setFilterProject(e.target.value)} style={{ width: 220 }}>
            <option value="All">All Projects</option>
            {active.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <Btn small variant="ghost" onClick={() => printWeeklyDeliverables(active)}>🖨 Weekly Report</Btn>

        </div>
      </div>

      {/* Sync log */}
      {showSyncLog && syncLog.length > 0 && (
        <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 10, padding: 16, marginBottom: 20, maxHeight: 260, overflowY: "auto" }}>
          <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 10 }}>Sync Log → NYC Shared Calendar (sara.arias@setty.com) — {syncedCount}/{allSyncableMilestones.length} events</div>
          {syncLog.map((l, i) => (
            <div key={i} style={{ padding: "5px 0", borderBottom: `1px solid ${P.border}`, fontSize: 12 }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                <span style={{ color: l.status === "success" ? P.green : P.red, minWidth: 16, marginTop: 1 }}>
                  {l.status === "success" ? "✓" : "✗"}
                </span>
                <div style={{ flex: 1 }}>
                  <div style={{ color: P.text, fontWeight: 500 }}>{l.name}</div>
                  {l.status === "error" && (
                    <div style={{ color: P.red, fontSize: 11, marginTop: 2 }}>{l.message}</div>
                  )}
                  {l.status === "error" && l.debug && (
                    <pre style={{ color: P.textDim, fontSize: 10, marginTop: 4, whiteSpace: "pre-wrap", wordBreak: "break-all", background: "#0a0c14", padding: "6px 8px", borderRadius: 4, maxHeight: 120, overflowY: "auto" }}>{l.debug}</pre>
                  )}
                  {l.status === "success" && (
                    <div style={{ color: P.green, fontSize: 11, marginTop: 2 }}>{l.message}</div>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Nav */}
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 20 }}>
        <Btn small variant="ghost" onClick={prevMonth}>‹ Prev</Btn>
        <div style={{ fontWeight: 700, fontSize: 16, minWidth: 180, textAlign: "center" }}>{MONTH_NAMES[calMonth]} {calYear}</div>
        <Btn small variant="ghost" onClick={nextMonth}>Next ›</Btn>
        <Btn small variant="ghost" onClick={goToday}>Today</Btn>
      </div>

      {/* Project color legend */}
      {filterProject === "All" && (
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
          {active.map(p => (
            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
              <div style={{ width: 10, height: 10, borderRadius: "50%", background: projectColorMap[p.id] }} />
              <span style={{ color: P.textMuted }}>{p.name || "Unnamed"}</span>
            </div>
          ))}
        </div>
      )}

      {/* Calendar grid */}
      <div style={{ border: `1px solid ${P.border}`, borderRadius: 10, overflow: "hidden" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", background: P.bg }}>
          {DAY_NAMES.map(d => (
            <div key={d} style={{ padding: "8px 0", textAlign: "center", fontSize: 11, fontWeight: 600, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em" }}>{d}</div>
          ))}
        </div>
        {Array.from({ length: cells.length / 7 }, (_, wi) => (
          <div key={wi} style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)" }}>
            {cells.slice(wi * 7, wi * 7 + 7).map((day, di) => {
              const dayMilestones = day ? getMilestonesForDay(day) : [];
              const isSelected = selected?.day === day;
              const isTodayCell = isToday(day);
              return (
                <div key={di}
                  onClick={() => day && setSelected(isSelected ? null : { day, milestones: dayMilestones })}
                  style={{
                    minHeight: 80,
                    borderTop: `1px solid ${P.border}`,
                    borderRight: di < 6 ? `1px solid ${P.border}` : "none",
                    padding: "6px 8px",
                    background: isSelected ? P.accentDim : day ? P.card : P.bg,
                    cursor: day ? "pointer" : "default",
                    transition: "background .1s",
                  }}
                  onMouseEnter={e => { if (day && !isSelected) e.currentTarget.style.background = P.cardHover; }}
                  onMouseLeave={e => { if (day && !isSelected) e.currentTarget.style.background = P.card; }}
                >
                  {day && (
                    <>
                      <div style={{
                        fontSize: 13, fontWeight: isTodayCell ? 700 : 400,
                        color: isTodayCell ? "#fff" : P.textMuted,
                        background: isTodayCell ? P.accent : "transparent",
                        width: 24, height: 24, borderRadius: "50%",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        marginBottom: 4,
                      }}>{day}</div>
                      {dayMilestones.slice(0, 3).map(m => {
                        const dotColor = projectColorMap[m.projectId] || P.accent;
                        const st = milestoneStatus(m.pctComplete);
                        return (
                          <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 2 }}>
                            <div style={{ width: 6, height: 6, borderRadius: "50%", background: st === "Completed" ? P.green : dotColor, flexShrink: 0 }} />
                            <span style={{ fontSize: 10, color: P.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: "calc(100% - 12px)" }}>{m.name}</span>
                          </div>
                        );
                      })}
                      {dayMilestones.length > 3 && (
                        <div style={{ fontSize: 10, color: P.textDim }}>+{dayMilestones.length - 3} more</div>
                      )}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Day detail panel */}
      {selected && (
        <div style={{ marginTop: 20, background: P.card, border: `1px solid ${P.border}`, borderRadius: 10, padding: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}>
            {MONTH_NAMES[calMonth]} {selected.day}, {calYear}
            {selected.milestones.length === 0 && <span style={{ color: P.textDim, fontWeight: 400, fontSize: 13, marginLeft: 12 }}>Nothing logged</span>}
          </div>
          {selected.milestones.map(m => {
            const st = milestoneStatus(m.pctComplete);
            const stColor = MILESTONE_STATUS_COLORS[st] || MILESTONE_STATUS_COLORS["Not Started"];
            const dotColor = projectColorMap[m.projectId] || P.accent;
            const typeColor = m.type === "billable" ? { bg: P.accentDim, text: P.accentLight }
              : m.type === "change-order" ? { bg: P.yellowDim, text: P.yellow }
              : { bg: P.purpleDim, text: P.purple };
            return (
              <div key={m.id} style={{ padding: "10px 14px", marginBottom: 8, background: P.bg, borderRadius: 8, border: `1px solid ${P.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 4 }}>{m.name}</div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                        <div style={{ width: 8, height: 8, borderRadius: "50%", background: dotColor }} />
                        <button onClick={() => onNavigateToProject(m.projectId)}
                          style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 12, padding: 0, fontWeight: 600 }}>
                          {m.projectName}
                        </button>
                      </div>
                      <Badge color={typeColor} text={m.type === "billable" ? "Billable" : m.type === "change-order" ? "Change Order" : "Non-Billable"} />
                      <span style={{ fontSize: 12, color: P.textDim }}>Phase: {m.phase}</span>
                      {m.fee > 0 && <span style={{ fontSize: 12, color: P.green, fontFamily: "JetBrains Mono" }}>{fmt(m.fee)}</span>}
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 80 }}><ProgressBar pct={m.pctComplete || 0} color={m.pctComplete >= 100 ? P.green : P.accent} /></div>
                    <span style={{ fontSize: 12, fontFamily: "JetBrains Mono", color: P.textMuted, minWidth: 32 }}>{m.pctComplete || 0}%</span>
                    <Badge color={stColor} text={st} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ─── SUBCONSULTANTS ───────────────────────────────────────────────────────────

const SUB_DISCIPLINES = ["Civil", "Structural", "Geotechnical", "Landscape", "Facade/Curtainwall",
  "Acoustics", "AV/IT", "Security", "Vertical Transport/Elevators", "Lighting Design",
  "Commissioning", "LEED/Sustainability", "Kitchen/Food Service", "Medical Equipment", "Other"];

function SubsView({ project, onChange }) {
  const subs = project.subconsultants || [];
  const phases = (project.phases || []).filter(p => p.billable && p.fee > 0);

  function addSub() {
    onChange({ ...project, subconsultants: [...subs, {
      id: uid(), firm: "", discipline: "Civil", contact: "", phone: "", email: "",
      contractStatus: "Not Started", fee: 0, notes: "",
      phases: {},
      poAmount: 0, poDate: "", amountBilled: 0, amountPaid: 0,
    }]});
  }

  function updateSub(id, updates) {
    onChange({ ...project, subconsultants: subs.map(s => s.id === id ? { ...s, ...updates } : s) });
  }

  function updateSubPhase(subId, phaseCode, val) {
    const sub = subs.find(s => s.id === subId);
    if (!sub) return;
    const newPhases = { ...sub.phases, [phaseCode]: val };
    const newFee = Object.values(newPhases).reduce((a, b) => a + (+b || 0), 0);
    updateSub(subId, { phases: newPhases, fee: newFee });
  }

  const totalSubFee = subs.reduce((a, s) => a + (+s.fee || 0), 0);
  const settyFee = (project.phases || []).filter(p => p.billable).reduce((a, p) => a + (p.fee || 0), 0);
  const totalProjectFee = settyFee + totalSubFee;

  const SUB_CONTRACT_STATUSES = ["Not Started", "Requested", "Received", "In Review", "Executed"];
  const SUB_CONTRACT_COLORS = {
    "Not Started": { bg: P.border, text: P.textMuted },
    "Requested": { bg: P.accentDim, text: P.accentLight },
    "Received": { bg: P.purpleDim, text: P.purple },
    "In Review": { bg: P.yellowDim, text: P.yellow },
    "Executed": { bg: P.greenDim, text: P.green },
  };

  return (
    <div>
      <SectionTitle action={<Btn small onClick={addSub} variant="ghost">+ Add Sub</Btn>}>
        Subconsultants
      </SectionTitle>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 16 }}>
        Track sub fees per phase. Sub fees are additive to Setty's fee and shown in the total project cost.

                  {(sub.poAmount > 0 || sub.amountBilled > 0) && (
