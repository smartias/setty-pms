        + "<div style='text-align:right'><div style='font-size:16px;font-weight:700;color:#2F5496'>INVOICE</div>"
        + "<div style='font-size:13px;font-weight:700;color:#1F3864'>" + invNumber + "</div>"
        + "<div style='font-size:11px;color:#44546A'>" + fmtDate(invDate) + "</div></div></div>"
      + "<div style='display:grid;grid-template-columns:1fr 1fr;border:1px solid #CBD5E1;border-radius:4px;margin-bottom:20px;overflow:hidden'>"
        + "<div style='padding:12px 16px;border-right:1px solid #CBD5E1'>"
          + "<div style='font-size:10px;color:#44546A;text-transform:uppercase;margin-bottom:4px'>Project</div>"
          + "<div style='font-size:13px;font-weight:600;color:#1F3864'>" + (project.name || "—") + "</div>" + projNum + "</div>"
        + "<div style='padding:12px 16px'>"
          + "<div style='font-size:10px;color:#44546A;text-transform:uppercase;margin-bottom:4px'>Client / Prime</div>"
          + "<div style='font-size:13px;font-weight:600;color:#1F3864'>" + (project.prime || project.clientName || "—") + "</div>" + primeNum + "</div></div>"

      + "<table style='border-collapse:collapse;width:100%;font-size:13px;margin-bottom:20px'>"
        + "<thead><tr style='background:#F1F5F9'><th style='padding:8px 12px;text-align:left;font-size:11px;color:#44546A;text-transform:uppercase'>Description</th>"
        + "<th style='padding:8px 12px;text-align:right;font-size:11px;color:#44546A;text-transform:uppercase'>Amount</th></tr></thead>"
        + "<tbody><tr><td style='padding:10px 12px;font-weight:500'>" + lineDesc + "</td>"

        + "SETTY &amp; Associates, Ltd, PC &nbsp;&middot;&nbsp; " + (project.name || "") + " &nbsp;&middot;&nbsp; " + invNumber + "</div></div>";

          <strong style={{ color: P.text }}>{milestone.name}</strong>
          {project.name ? <span style={{ color: P.textDim }}> &middot; {project.name}</span> : null}

        <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>
          <div style={{ display: "grid", gridTemplateColumns: alreadyInvoiced > 0 ? "1fr 1fr 1fr" : "1fr 1fr", gap: 12 }}>
            <div>
              <div style={{ fontSize: 10, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 3 }}>Milestone Fee</div>
              <div style={{ fontFamily: "JetBrains Mono", fontWeight: 700 }}>{fmt(milestone.fee)}</div>
            </div>
            <div>
              <div style={{ fontSize: 10, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 3 }}>Earned at {newPct}%</div>
              <div style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.accentLight }}>{fmt(Math.round(milestone.fee * newPct / 100))}</div>
            </div>
            {alreadyInvoiced > 0 && (
              <div>
                <div style={{ fontSize: 10, color: P.textDim, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 3 }}>Prev. Invoiced</div>
                <div style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.yellow }}>{fmt(alreadyInvoiced)}</div>
              </div>
            )}
          </div>
          <div style={{ marginTop: 12, paddingTop: 10, borderTop: `1px solid ${P.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: P.textMuted }}>Amount to invoice now:</span>
            <span style={{ fontFamily: "JetBrains Mono", fontWeight: 800, fontSize: 18, color: P.green }}>{fmt(invoiceAmount)}</span>
          </div>
        </div>
        {msg && (
          <div style={{ padding: "8px 12px", borderRadius: 6, marginBottom: 16, fontSize: 12,
            background: status === "done" ? P.greenDim : P.redDim,
            color: status === "done" ? P.green : P.red,
            border: "1px solid " + (status === "done" ? P.green : P.red) }}>
            {msg}
          </div>
        )}
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <Btn variant="ghost" onClick={onClose}>Not Now</Btn>
          <Btn variant="success" disabled={status === "sending" || status === "done"} onClick={createDraftAndLog}>
            {status === "sending" ? "\u23F3 Creating draft\u2026" : "\u2709 Invoice " + fmt(invoiceAmount)}
          </Btn>
        </div>
      </div>
    </div>
  );
}

function Dashboard({ projects, onNavigateToProject, onUpdateProject, staff }) {
  const allActive = projects.filter(p => !p.archived && isAwarded(p) && p.status !== "Completed" && p.status !== "Cancelled" && p.status !== "Lost");
  const [dashPMFilter, setDashPMFilter] = useState("All");
  const [milPMFilter, setMilPMFilter] = useState("All");
  const allPMs = useMemo(() => ["All", ...new Set(allActive.map(p => p.projectManager).filter(Boolean)).values()], [allActive]);
  const active = dashPMFilter === "All" ? allActive : allActive.filter(p => p.projectManager === dashPMFilter);
  const [dashCalState, setDashCalState] = useState({}); // { [milestoneId]: "syncing"|"synced"|"error" }
  const [dashSyncMsg, setDashSyncMsg] = useState("");
  const [showAddMilestone, setShowAddMilestone] = useState(false);
  const [addMilSearch, setAddMilSearch] = useState("");
  const [addMilProjectId, setAddMilProjectId] = useState("");
  const [addMilForm, setAddMilForm] = useState({ name: "", dueDate: "", notes: "" });
  const [addMilMsg, setAddMilMsg] = useState("");
  const [dashInvoicePrompt, setDashInvoicePrompt] = useState(null);
  const [showCAInvoice, setShowCAInvoice] = useState(false);
  const [caInvoiceState, setCAInvoiceState] = useState({}); // projId -> {amount, desc, milestoneId, include, status, msg}
  const [dashRfiModal, setDashRfiModal] = useState(null);    // { item, project }
  const [dashSubModal, setDashSubModal] = useState(null);    // { item, project }

  function submitAddMilestone() {
    if (!addMilProjectId) { setAddMilMsg("Please select a project."); return; }
    if (!addMilForm.name.trim()) { setAddMilMsg("Please enter a milestone name."); return; }
    const proj = projects.find(p => p.id === addMilProjectId);
    if (!proj) return;
    const newMilestone = {
      id: "m_" + Date.now(),
      type: "non-billable",
      name: addMilForm.name.trim(),
      dueDate: addMilForm.dueDate || "",
      notes: addMilForm.notes || "",
      pctComplete: 0,
      phase: "",
    };
    onUpdateProject({ ...proj, milestones: [...(proj.milestones || []), newMilestone] });
    setAddMilMsg("✓ Milestone added to " + proj.name);
    setAddMilForm({ name: "", dueDate: "", notes: "" });
    setAddMilProjectId("");
    setAddMilSearch("");
    setTimeout(() => { setShowAddMilestone(false); setAddMilMsg(""); }, 1200);
  }

  const filteredProjects = active.filter(p =>
    p.name.toLowerCase().includes(addMilSearch.toLowerCase()) ||
    (p.projectNumber || "").toLowerCase().includes(addMilSearch.toLowerCase())
  );

  async function syncMilestoneFromDash(m) {
    if (!m.dueDate) { setDashSyncMsg("⚠ No due date on " + m.name); return; }
    setDashCalState(s => ({ ...s, [m.id]: "syncing" }));
    const proj = projects.find(p => p.id === m.projectId);
    const existingEventId = m.calendarEventId || null;
    const result = await createOrUpdateCalendarEvent(m, proj?.name || "Project", proj?.projectNumber, existingEventId);
    if (result.success) {
      if (result.eventId && proj) {
        const newMilestones = (proj.milestones || []).map(ms =>
          ms.id === m.id ? { ...ms, calendarEventId: result.eventId } : ms
        );
        onUpdateProject({ ...proj, milestones: newMilestones });
      }
      setDashCalState(s => ({ ...s, [m.id]: "synced" }));
      setDashSyncMsg(result.warning ? "⚠ " + result.warning : "✓ \"" + m.name + "\" synced to NYC Shared Calendar");
    } else {
      setDashCalState(s => ({ ...s, [m.id]: "error" }));
      setDashSyncMsg("✗ \"" + m.name + "\" — " + result.error);
    }
  }
  // Build a quick lookup: projectId → project
  const projectMap = Object.fromEntries(active.map(p => [p.id, p]));
  const allMilestones = [
    ...active.flatMap(p => (p.milestones || []).filter(m => !m.cancelled).map(m => ({
      ...m,
      projectName: p.name, projectId: p.id, pm: p.projectManager,
      projectStatus: p.status, contractStatus: p.contractStatus || "",
    }))),
    ...active.flatMap(p => (p.rfis || [])
      .filter(r => !["Closed","Void","Responded"].includes(r.status))
      .map(r => ({
        id: r.id, type: "rfi", name: r.number + (r.title ? " — " + r.title : ""),
        dueDate: r.dueDate, pctComplete: 0, notes: r.status,
        projectName: p.name, projectId: p.id, pm: p.projectManager,
        projectStatus: p.status, _rfi: r, _project: p,
      }))),
    ...active.flatMap(p => (p.submittals || [])
      .filter(s => !["Returned","Void"].includes(s.status))
      .map(s => ({
        id: s.id, type: "submittal", name: s.number + (s.description ? " — " + s.description : ""),
        dueDate: s.dueDate, pctComplete: 0, notes: s.status,
        projectName: p.name, projectId: p.id, pm: p.projectManager,
        projectStatus: p.status, _sub: s, _project: p,
      }))),
  ];
  const now = new Date();
  const in14 = new Date(); in14.setDate(in14.getDate() + 14);
  const isItemDone = m => ["rfi","submittal"].includes(m.type) ? false : milestoneStatus(m.pctComplete) === "Completed";
  const overdue = allMilestones.filter(m => m.dueDate && new Date(m.dueDate) < now && !isItemDone(m));
  const upcoming = allMilestones.filter(m => { const d = new Date(m.dueDate); return d >= now && d <= in14 && !isItemDone(m); });

  // ── Financial KPIs ──
  const nowDate = new Date();
  const curYear  = nowDate.getFullYear();
  const curYearStr = String(curYear);
  const curMonthStr = curYear + "-" + String(nowDate.getMonth() + 1).padStart(2, "0");

  const inConstructionProjects = active.filter(p => p.status === "In Construction Administration");

  const backlog = active.reduce((a, p) => {
    const { totalFee, totalInvoiced } = buildProjectCashFlow(p);
    return a + Math.max(0, totalFee - totalInvoiced);
  }, 0);

  const currentYearTotal = active.reduce((a, p) => {
    const { monthlyMap } = buildProjectCashFlow(p);
    return a + Object.entries(monthlyMap)
      .filter(([k]) => k.startsWith(curYearStr))
      .reduce((b, [, v]) => b + Math.max(v.fee, v.invoiced), 0);
  }, 0);

  const currentMonthTotal = active.reduce((a, p) => {
    const { monthlyMap } = buildProjectCashFlow(p);
    const m = monthlyMap[curMonthStr];
    if (!m) return a;
    return a + Math.max(m.fee, m.invoiced);
  }, 0);

  const [showInConstruction, setShowInConstruction] = useState(false);

  const byStatus = PROJECT_STATUSES.slice(0, 6).map(s => ({
    status: s, count: active.filter(p => p.status === s).length,
    color: STATUS_COLORS[s] || { bg: P.border, text: P.textMuted },

  return (
    <>
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 22, fontWeight: 800 }}>Team Dashboard</div>
        <button onClick={() => { setShowAddMilestone(true); setAddMilMsg(""); }}

      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24, flexWrap: "wrap" }}>
        <div style={{ color: P.textMuted, fontSize: 13 }}>Setty & Associates, LTD, PC – Project Management System</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: "auto" }}>
          <span style={{ fontSize: 12, color: P.textDim }}>Filter by PM:</span>
          <select value={dashPMFilter} onChange={e => setDashPMFilter(e.target.value)}
            style={{ fontSize: 12, padding: "4px 8px", borderRadius: 6 }}>
            {allPMs.map(pm => <option key={pm}>{pm}</option>)}
          </select>
          {dashPMFilter !== "All" && (
            <button onClick={() => setDashPMFilter("All")}
              style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 12 }}>✕ Clear</button>
          )}
        </div>
      </div>

      {/* Add Non-Billable Milestone Modal */}
      {showAddMilestone && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={e => { if (e.target === e.currentTarget) setShowAddMilestone(false); }}>
          <div style={{ background: P.card, border: `1px solid ${P.border}`, borderRadius: 14, padding: 28, width: 480, maxWidth: "90vw" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div style={{ fontWeight: 700, fontSize: 16 }}>+ Non-Billable Milestone</div>
              <button onClick={() => setShowAddMilestone(false)}
                style={{ background: "none", border: "none", color: P.textMuted, cursor: "pointer", fontSize: 18, lineHeight: 1 }}>✕</button>
            </div>

            {/* Project search */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 6, fontWeight: 600 }}>Search Project</div>
              <input
                value={addMilSearch}
                onChange={e => { setAddMilSearch(e.target.value); setAddMilProjectId(""); }}
                placeholder="Type project name or number…"
                autoFocus
                style={{ width: "100%", marginBottom: 8 }} />
              {addMilSearch && !addMilProjectId && (
                <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, maxHeight: 180, overflowY: "auto" }}>
                  {filteredProjects.length === 0
                    ? <div style={{ padding: "10px 14px", color: P.textDim, fontSize: 13 }}>No projects found</div>
                    : filteredProjects.map(p => (
                      <div key={p.id}
                        onClick={() => { setAddMilProjectId(p.id); setAddMilSearch(p.name + (p.projectNumber ? " [" + p.projectNumber + "]" : "")); }}
                        style={{ padding: "10px 14px", cursor: "pointer", borderBottom: `1px solid ${P.border}`, fontSize: 13 }}
                        onMouseEnter={e => e.currentTarget.style.background = P.cardHover}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                        <span style={{ fontWeight: 600, color: P.accentLight }}>{p.name}</span>
                        {p.projectNumber && <span style={{ color: P.textMuted, marginLeft: 8, fontSize: 12 }}>[{p.projectNumber}]</span>}
                        {p.projectManager && <span style={{ color: P.textDim, marginLeft: 8, fontSize: 11 }}>PM: {p.projectManager}</span>}
                      </div>
                    ))
                  }
                </div>
              )}
              {addMilProjectId && (
                <div style={{ fontSize: 12, color: P.green, marginTop: 4 }}>✓ Project selected</div>
              )}
            </div>

            {/* Milestone fields */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 6, fontWeight: 600 }}>Milestone Name *</div>
              <input value={addMilForm.name} onChange={e => setAddMilForm(f => ({ ...f, name: e.target.value }))}
                placeholder="e.g. City Submission, Internal Review…" style={{ width: "100%" }} />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
              <div>
                <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 6, fontWeight: 600 }}>Due Date</div>
                <input type="date" value={addMilForm.dueDate} onChange={e => setAddMilForm(f => ({ ...f, dueDate: e.target.value }))} style={{ width: "100%" }} />
              </div>
              <div>
                <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 6, fontWeight: 600 }}>Notes</div>
                <input value={addMilForm.notes} onChange={e => setAddMilForm(f => ({ ...f, notes: e.target.value }))}
                  placeholder="Optional…" style={{ width: "100%" }} />
              </div>
            </div>

            {addMilMsg && (
              <div style={{ fontSize: 13, marginBottom: 14, padding: "8px 12px", borderRadius: 6,
                background: addMilMsg.startsWith("✓") ? P.greenDim : P.redDim,
                color: addMilMsg.startsWith("✓") ? P.green : P.red,
                border: `1px solid ${addMilMsg.startsWith("✓") ? P.green : P.red}` }}>
                {addMilMsg}
              </div>
            )}

            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button onClick={() => setShowAddMilestone(false)}
                style={{ background: "none", border: `1px solid ${P.border}`, borderRadius: 8, color: P.textMuted, cursor: "pointer", padding: "8px 18px", fontSize: 13 }}>
                Cancel
              </button>
              <button onClick={submitAddMilestone}
                style={{ background: P.accent, border: "none", borderRadius: 8, color: "#fff", cursor: "pointer", fontWeight: 700, padding: "8px 20px", fontSize: 13 }}>
                Add Milestone
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 24 }}>
        <KpiBox label="In Construction" val={inConstructionProjects.length}
          color={inConstructionProjects.length > 0 ? P.green : P.textMuted}
          sub={inConstructionProjects.length > 0 ? "click to view projects" : "none active"}
          onClick={() => setShowInConstruction(true)} />
        <KpiBox label="Backlog" val={fmt(backlog)} color={P.accent}
          sub="total uninvoiced" />
        <KpiBox label={"Current Year (" + curYear + ")"}
          val={fmt(currentYearTotal)} color={P.purple}
          sub="projected + invoiced" />
        <KpiBox label={"Current Month (" + curMonthStr + ")"}
          val={fmt(currentMonthTotal)} color={P.yellow}
          sub="projected + invoiced" />
      </div>

      {/* In Construction modal */}
      {showInConstruction && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}
          onClick={e => { if (e.target === e.currentTarget) setShowInConstruction(false); }}>
          <div style={{ background: P.card, border: "1px solid " + P.border, borderRadius: 14, padding: 28, width: "min(1280px, 98vw)", maxHeight: "92vh", overflowY: "auto", overflowX: "hidden" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div style={{ fontWeight: 700, fontSize: 16 }}>In Construction Administration{dashPMFilter !== "All" ? " — " + dashPMFilter : ""}</div>
              <div style={{ display: "flex", gap: 8 }}>
                <Btn small variant={showCAInvoice ? "primary" : "ghost"} onClick={() => {
                  setShowCAInvoice(v => !v);
                  if (!showCAInvoice) {
                    // Pre-populate state for each CA project
                    const today = new Date();
                    const currentYM = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0");
                    const monthLabel = today.toLocaleDateString("en-US", { month: "long", year: "numeric" });
                    const init = {};
                    inConstructionProjects.forEach(p => {
                      const { monthlyMap, totalInvoiced, totalFee } = buildProjectCashFlow(p);
                      const projected = Math.round((monthlyMap[currentYM]?.fee || 0));
                      // Build per-milestone entries for this project
                      const openMilestones = (p.milestones || []).filter(m => {
                        if (m.type !== "billable" || m.cancelled || (m.pctComplete || 0) >= 100) return false;
                        const inv = (p.invoices || []).filter(i => i.milestoneId === m.id).reduce((a, i) => a + (i.amount || 0), 0);
                        return m.fee > 0 && inv < m.fee;
                      });
                      init[p.id] = {
                        milestones: openMilestones.map(m => {
                          // Per-milestone projection: phase schedule overlap with current month
                          const ph = (p.phases || []).find(ph => ph.code === m.phase);
                          let milestoneProjection = 0;
                          if (ph && ph.startDate && ph.endDate && m.fee > 0) {
                            const sd = new Date(ph.startDate + "T00:00:00"), ed = new Date(ph.endDate + "T00:00:00");
                            const now3 = new Date();
                            const mStart = new Date(now3.getFullYear(), now3.getMonth(), 1);
                            const mEnd = new Date(now3.getFullYear(), now3.getMonth() + 1, 0);
                            const totalDays = (ed - sd) / 86400000 + 1;
                            const overlapStart = sd > mStart ? sd : mStart;
                            const overlapEnd = ed < mEnd ? ed : mEnd;
                            const overlapDays = Math.max(0, (overlapEnd - overlapStart) / 86400000 + 1);
                            milestoneProjection = Math.round(m.fee * (overlapDays / totalDays));
                          }
                          // Fallback for milestones with no phase schedule (e.g. COs): remaining ÷ months to due date
                          if (milestoneProjection === 0 && m.dueDate && m.fee > 0) {
                            const mInv = (p.invoices || []).filter(i => i.milestoneId === m.id).reduce((a, i) => a + (i.amount || 0), 0);
                            const mRem = Math.max(0, m.fee - mInv);
                            const now3 = new Date();
                            const due3 = new Date(m.dueDate + "T00:00:00");
                            const monthsLeft = Math.max(1, (due3.getFullYear() * 12 + due3.getMonth()) - (now3.getFullYear() * 12 + now3.getMonth()));
                            milestoneProjection = Math.round(mRem / monthsLeft);
                          }
                          return { milestoneId: m.id, amount: milestoneProjection || "", desc: m.name + " — " + monthLabel, include: milestoneProjection > 0, status: "idle", msg: "" };
                        }),
                        status: "idle", msg: "",
                      };
                    });
                    setCAInvoiceState(init);
                  }
                }}>
                  {showCAInvoice ? "✕ Cancel Batch Invoice" : "✉ Invoice CA Projects"}
                </Btn>
                <button onClick={() => { setShowInConstruction(false); setShowCAInvoice(false); }}
                  style={{ background: "none", border: "none", color: P.textMuted, cursor: "pointer", fontSize: 20 }}>✕</button>
              </div>
            </div>

            {!showCAInvoice ? (
              inConstructionProjects.length === 0
                ? <div style={{ color: P.textDim, textAlign: "center", padding: 40 }}>No projects currently in construction.</div>
                : (
                  <table>
                    <thead><tr><th>#</th><th>Project</th><th>Client</th><th>PM</th><th>Total Fee</th><th>Invoiced</th><th>Remaining</th></tr></thead>
                    <tbody>
                      {inConstructionProjects.map(p => {
                        const { totalFee, totalInvoiced } = buildProjectCashFlow(p);
                        const remaining = Math.max(0, totalFee - totalInvoiced);
                        return (
                          <tr key={p.id} style={{ cursor: "pointer" }} onClick={() => { setShowInConstruction(false); onNavigateToProject(p.id); }}>
                            <td style={{ color: P.textMuted, fontSize: 12 }}>{p.projectNumber || "—"}</td>
                            <td style={{ fontWeight: 600, color: P.accentLight }}>{p.name}</td>
                            <td style={{ color: P.textMuted, fontSize: 12 }}>{p.client || "—"}</td>
                            <td style={{ color: P.textMuted, fontSize: 12 }}>{p.projectManager || "—"}</td>
                            <td style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: P.green }}>{fmt(totalFee)}</td>
                            <td style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: P.purple }}>{fmt(totalInvoiced)}</td>
                            <td style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: remaining > 0 ? P.accent : P.textDim }}>{fmt(remaining)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )
            ) : (
              <div>
                <div style={{ fontSize: 12, color: P.textDim, marginBottom: 16, padding: "10px 14px", background: P.bg, borderRadius: 8, border: "1px solid " + P.border }}>
                  Pre-filled with this month's projected amount per project. Adjust amounts as needed, then click <strong style={{ color: P.accentLight }}>Generate Invoices</strong> to create invoice records and draft Outlook emails for all checked projects.
                  CA milestone % complete will be back-calculated from the cumulative invoiced amount.
                </div>
                <table style={{ fontSize: 13 }}>
                  <thead>
                    <tr>
                      <th style={{ width: 28 }}></th>
                      <th>Project</th>
                      <th>Milestone</th>
                      <th>Due Date</th>
                      <th>Milestone Fee</th>
                      <th>% Invoiced</th>
                      <th>This Month Projection</th>
                      <th>Amount to Invoice</th>
                      <th>Description</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {inConstructionProjects.flatMap(p => {
                      const pSt = caInvoiceState[p.id] || {};
                      const msList = pSt.milestones || [];
                      if (msList.length === 0) {
                        return [(
                          <tr key={p.id} style={{ opacity: 0.5 }}>
                            <td><input type="checkbox" disabled style={{ width: 16, height: 16 }} /></td>
                            <td><div style={{ fontWeight: 600, fontSize: 13 }}>{p.name}</div><div style={{ fontSize: 11, color: P.textDim }}>{p.projectNumber || ""}{p.projectManager ? " · " + p.projectManager : ""}</div></td>
                            <td colSpan={8}><span style={{ fontSize: 11, color: P.red }}>No uninvoiced milestones</span></td>
                          </tr>
                        )];
                      }
                      return msList.map((ms, mi) => {
                        const milestone = (p.milestones || []).find(m => m.id === ms.milestoneId);
                        const mFee = milestone?.fee || 0;
                        const alreadyInv = (p.invoices || []).filter(inv => inv.milestoneId === ms.milestoneId).reduce((a, inv) => a + (inv.amount || 0), 0);
                        const remaining = Math.max(0, mFee - alreadyInv);
                        const pctInvoiced = mFee > 0 ? Math.round(alreadyInv / mFee * 100) : 0;
                        const isFirst = mi === 0;
                        const rowBg = ms.status === "done" ? "rgba(52,211,153,.07)" : ms.status === "error" ? "rgba(239,68,68,.07)" : isFirst && mi < msList.length - 1 ? "rgba(255,255,255,.02)" : "transparent";
                        const updateMs = (key, val) => setCAInvoiceState(s => ({
                          ...s, [p.id]: { ...s[p.id], milestones: s[p.id].milestones.map((x, i) => i === mi ? { ...x, [key]: val } : x) }
                        }));
                        return (
                          <tr key={p.id + ms.milestoneId} style={{ background: rowBg, borderTop: isFirst ? "2px solid " + P.border : "none" }}>
                            <td style={{ verticalAlign: "top", paddingTop: 10 }}>
                              <input type="checkbox" checked={!!ms.include}
                                onChange={e => updateMs("include", e.target.checked)}
                                style={{ width: 16, height: 16 }} />
                            </td>
                            {isFirst ? (
                              <td rowSpan={msList.length} style={{ verticalAlign: "top", paddingTop: 10, borderRight: "1px solid " + P.border }}>
                                <div style={{ fontWeight: 600, fontSize: 13 }}>{p.name}</div>
                                <div style={{ fontSize: 11, color: P.textDim }}>{p.projectNumber || ""}{p.projectManager ? " · " + p.projectManager : ""}</div>
                              </td>
                            ) : null}
                            <td style={{ fontSize: 12, fontWeight: 500 }}>{milestone?.name || "—"}</td>
                            <td>
                              {milestone ? (
                                <input type="date" value={milestone.dueDate || ""}
                                  onChange={e => {
                                    const newMilestones = (p.milestones || []).map(m => m.id === milestone.id ? { ...m, dueDate: e.target.value } : m);
                                    onUpdateProject({ ...p, milestones: newMilestones });
                                  }}
                                  style={{ fontSize: 11, width: 120 }} />
                              ) : "—"}
                            </td>
                            <td style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: P.green }}>{mFee > 0 ? fmt(mFee) : "—"}</td>
                            <td>
                              {mFee > 0 ? (
                                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                  <div style={{ flex: 1, background: P.border, borderRadius: 3, height: 6, minWidth: 44 }}>
                                    <div style={{ width: Math.min(100, pctInvoiced) + "%", background: pctInvoiced >= 90 ? P.green : pctInvoiced >= 50 ? P.yellow : P.accent, height: 6, borderRadius: 3 }} />
                                  </div>
                                  <span style={{ fontFamily: "JetBrains Mono", fontSize: 11, color: P.textMuted, minWidth: 28 }}>{pctInvoiced}%</span>
                                </div>
                              ) : "—"}
                            </td>
                            <td style={{ fontFamily: "JetBrains Mono", fontSize: 12 }}>
                              {(() => {
                                // Per-milestone projection: phase overlap with current month
                                if (!milestone) return <span style={{ color: P.textDim }}>—</span>;
                                const ph = (p.phases || []).find(ph => ph.code === milestone.phase);
                                const today3 = new Date();
                                const yr = today3.getFullYear(), mo = today3.getMonth();
                                const mStart = new Date(yr, mo, 1), mEnd = new Date(yr, mo + 1, 0);
                                let proj = 0;
                                if (ph && ph.startDate && ph.endDate && ph.fee > 0) {
                                  const sd = new Date(ph.startDate + "T00:00:00"), ed = new Date(ph.endDate + "T00:00:00");
                                  const totalDays = (ed - sd) / 86400000 + 1;
                                  const overlapStart = sd > mStart ? sd : mStart;
                                  const overlapEnd = ed < mEnd ? ed : mEnd;
                                  const overlapDays = Math.max(0, (overlapEnd - overlapStart) / 86400000 + 1);
                                  proj = Math.round(milestone.fee * (overlapDays / totalDays));
                                }
                                // Fallback: remaining ÷ months to due date
                                if (proj === 0 && milestone.dueDate && milestone.fee > 0) {
                                  const mInv2 = (p.invoices || []).filter(i => i.milestoneId === milestone.id).reduce((a, i) => a + (i.amount || 0), 0);
                                  const mRem2 = Math.max(0, milestone.fee - mInv2);
                                  const due4 = new Date(milestone.dueDate + "T00:00:00");
                                  const monthsLeft2 = Math.max(1, (due4.getFullYear() * 12 + due4.getMonth()) - (today3.getFullYear() * 12 + today3.getMonth()));
                                  proj = Math.round(mRem2 / monthsLeft2);
                                }
                                return proj > 0
                                  ? <span style={{ color: P.accentLight }}>{fmt(proj)}</span>
                                  : <span style={{ color: P.textDim }}>—</span>;
                              })()}
                            </td>
                            <td>
                              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                <input type="number" min={0} step={500}
                                  value={ms.amount || ""}
                                  placeholder={String(remaining > 0 ? remaining : "")}
                                  disabled={ms.status === "done"}
                                  onChange={e => updateMs("amount", e.target.value)}
                                  style={{ width: 96, fontFamily: "JetBrains Mono", fontSize: 12 }} />

                                  <button onClick={() => updateMs("amount", remaining)}
                                    style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 11 }} title="Full remaining balance">bal</button>

                              <input value={ms.desc || ""} disabled={ms.status === "done"}

                            </td>
                            <td style={{ fontSize: 11, fontWeight: 600, whiteSpace: "nowrap" }}>
                              {ms.status === "done" && <span style={{ color: P.green }}>{ms.msg}</span>}
                              {ms.status === "error" && <span style={{ color: P.red }}>{ms.msg}</span>}
                              {ms.status === "sending" && <span style={{ color: P.accentLight }}>⏳</span>}
                              {ms.status === "idle" && <span style={{ color: P.textDim, fontSize: 10 }}>Ready</span>}
                            </td>
                          </tr>
                        );
                      });
                    })}
                  </tbody>
                </table>
                <div style={{ marginTop: 20, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ fontSize: 12, color: P.textDim }}>
                    {Object.values(caInvoiceState).reduce((a, s) => a + (s.milestones||[]).filter(ms => ms.include && +ms.amount > 0).length, 0)} line item(s) selected · {fmt(Object.values(caInvoiceState).reduce((a, s) => a + (s.milestones||[]).reduce((b, ms) => b + (ms.include ? +ms.amount||0 : 0), 0), 0))} total
                  </div>
                  <Btn variant="primary"
                    disabled={!Object.values(caInvoiceState).some(s => (s.milestones||[]).some(ms => ms.include && +ms.amount > 0))}
                    onClick={async () => {
                      const today = new Date().toISOString().slice(0, 10);
                      for (const p of inConstructionProjects) {
                        const pSt = caInvoiceState[p.id];
                        const msEntries = (pSt?.milestones || []).filter(ms => ms.include && +ms.amount > 0);
                        if (!msEntries.length) continue;
                        // Collect all new invoices for this project first, then save in one update
                        let updatedInvoices = [...(p.invoices || [])];
                        let updatedMilestones = [...(p.milestones || [])];
                        const lineItems = [];
                        for (let mi = 0; mi < msEntries.length; mi++) {
                          const ms = msEntries[mi];
                          const milestone = p.milestones.find(m => m.id === ms.milestoneId);
                          if (!milestone) continue;
                          setCAInvoiceState(s => ({ ...s, [p.id]: { ...s[p.id], milestones: s[p.id].milestones.map(x => x.milestoneId === ms.milestoneId ? { ...x, status: "sending" } : x) } }));
                          try {
                            const amount = +ms.amount;
                            const invNumber = "INV-" + String(updatedInvoices.length + 1).padStart(3, "0");
                            const alreadyInv = updatedInvoices.filter(inv => inv.milestoneId === milestone.id).reduce((a, inv) => a + (inv.amount || 0), 0);
                            const newTotal = alreadyInv + amount;
                            const newPct = milestone.fee > 0 ? Math.min(100, Math.round(newTotal / milestone.fee * 100)) : 0;
                            lineItems.push({ name: ms.desc || milestone.name, amount });
                            const newInvoice = { id: uid(), number: invNumber, date: today, phase: milestone.phase || "CA", phaseName: milestone.name, milestoneId: milestone.id, milestoneName: milestone.name, method: "ca_batch", description: ms.desc || milestone.name, lineItems: [{ name: ms.desc || milestone.name, amount }], amount, finalized: true };
                            updatedInvoices = [...updatedInvoices, newInvoice];
                            updatedMilestones = updatedMilestones.map(m => m.id === milestone.id ? { ...m, pctComplete: newPct } : m);
                            setCAInvoiceState(s => ({ ...s, [p.id]: { ...s[p.id], milestones: s[p.id].milestones.map(x => x.milestoneId === ms.milestoneId ? { ...x, status: "done", msg: "✓ " + invNumber + " · " + newPct + "%" } : x) } }));
                          } catch(e) {
                            setCAInvoiceState(s => ({ ...s, [p.id]: { ...s[p.id], milestones: s[p.id].milestones.map(x => x.milestoneId === ms.milestoneId ? { ...x, status: "error", msg: "✗ " + e.message } : x) } }));
                          }
                        }
                        // Draft one combined email per project with all line items
                        if (lineItems.length > 0) {
                          const totalAmt = lineItems.reduce((a, l) => a + l.amount, 0);
                          const invNumber = "INV-" + String((p.invoices || []).length + 1).padStart(3, "0");
                          // Build email
                          const lineRows = lineItems.map(l => "<tr><td style='padding:7px 12px'>" + l.name + "</td><td style='padding:7px 12px;text-align:right;font-family:monospace;font-weight:700'>" + fmt(l.amount) + "</td></tr>").join("");
                          const bodyHtml = "<div style='font-family:Segoe UI,sans-serif;font-size:13px;color:#1a1a1a;max-width:700px'>"
                            + "<div style='border-bottom:3px solid #1F3864;padding-bottom:10px;margin-bottom:18px;display:flex;justify-content:space-between'>"
                              + "<div><div style='font-size:22px;font-weight:900;color:#C00000;letter-spacing:2px'>SETTY</div>"
                              + "<div style='font-size:8px;color:#44546A;letter-spacing:1px'>&amp; ASSOCIATES, LTD, PC</div></div>"
                              + "<div style='text-align:right'><div style='font-size:16px;font-weight:700;color:#2F5496'>INVOICE</div>"
                              + "<div style='font-size:13px;font-weight:700;color:#1F3864'>" + invNumber + "</div>"
                              + "<div style='font-size:11px;color:#44546A'>" + fmtDate(today) + "</div></div></div>"
                            + "<table style='border-collapse:collapse;width:100%;font-size:13px;margin-bottom:8px'>"
                              + "<tr style='background:#F1F5F9'><td style='padding:8px 12px;font-weight:700;width:160px'>Project</td><td style='padding:8px 12px'>" + (p.name || "—") + (p.projectNumber ? " (" + p.projectNumber + ")" : "") + "</td></tr>"
                              + "<tr><td style='padding:8px 12px;font-weight:700'>Client / Prime</td><td style='padding:8px 12px'>" + (p.prime || p.clientName || "—") + "</td></tr>"
                            + "</table>"
                            + "<table style='border-collapse:collapse;width:100%;font-size:13px;margin-bottom:20px'>"
                              + "<thead><tr style='background:#F1F5F9'><th style='padding:8px 12px;text-align:left'>Description</th><th style='padding:8px 12px;text-align:right'>Amount</th></tr></thead>"
                              + "<tbody>" + lineRows + "</tbody>"
                              + "<tfoot><tr style='background:#F1F5F9;border-top:2px solid #CBD5E1'><td style='padding:8px 12px;font-weight:700'>Total Due</td><td style='padding:8px 12px;text-align:right;font-family:monospace;font-weight:700;font-size:15px;color:#1F3864'>" + fmt(totalAmt) + "</td></tr></tfoot>"
                            + "</table>"
                            + "<div style='font-size:11px;color:#44546A'>SETTY &amp; Associates, Ltd, PC &nbsp;&middot;&nbsp; " + (p.name || "") + " &nbsp;&middot;&nbsp; " + invNumber + "</div></div>";
                          try {
                            await createOutlookDraft({ subject: "Invoice " + invNumber + " — " + (p.name || "Project") + (p.projectNumber ? " (" + p.projectNumber + ")" : ""), bodyHtml });
                          } catch(e) { /* non-fatal — invoices already logged */ }
                          onUpdateProject({ ...p, invoices: updatedInvoices, milestones: updatedMilestones });
                        }
                      }
                    }}>
                    ✉ Generate Invoices
                  </Btn>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap" }}>
        {byStatus.map(({ status, count, color }) => (
          <div key={status} style={{ background: color.bg, borderRadius: 8, padding: "8px 16px", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: color.text, fontWeight: 700, fontSize: 16 }}>{count}</span>
            <span style={{ color: color.text, fontSize: 12 }}>{status}</span>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
        <Card>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 14, color: P.red }}>⚠ Overdue Milestones</div>
          {overdue.length === 0
            ? <div style={{ color: P.textDim, fontSize: 13 }}>None – great work!</div>
            : overdue.slice(0, 6).map(m => (
              <div key={m.id} style={{ padding: "8px 0", borderBottom: `1px solid ${P.border}` }}>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{m.name}</div>
                <div style={{ fontSize: 12, color: P.textMuted }}>
                  <button onClick={() => onNavigateToProject(m.projectId)}
                    style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 12, padding: 0, fontWeight: 600 }}>
                    {m.projectName}
                  </button>
                  {" "}· PM: {m.pm || "—"} · Due: {m.dueDate}
                </div>
              </div>
            ))
          }
        </Card>
        <Card>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 14, color: P.yellow }}>📅 Due in 14 Days</div>
          {upcoming.length === 0
            ? <div style={{ color: P.textDim, fontSize: 13 }}>Nothing due soon.</div>
            : upcoming.slice(0, 6).map(m => (
              <div key={m.id} style={{ padding: "8px 0", borderBottom: `1px solid ${P.border}` }}>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{m.name}</div>
                <div style={{ fontSize: 12, color: P.textMuted }}>
                  <button onClick={() => onNavigateToProject(m.projectId)}
                    style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 12, padding: 0, fontWeight: 600 }}>
                    {m.projectName}
                  </button>
                  {" "}· PM: {m.pm || "—"} · Due: {m.dueDate}
                </div>
              </div>
            ))
          }
        </Card>
      </div>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ fontWeight: 700, fontSize: 14 }}>All Active Milestones</div>
            {(() => {
              const milPMs = ["All", ...new Set(allMilestones.map(m => m.pm).filter(Boolean))];
              return milPMs.length > 1 ? (
                <select value={milPMFilter} onChange={e => setMilPMFilter(e.target.value)}
                  style={{ fontSize: 12, padding: "3px 8px", borderRadius: 6 }}>
                  {milPMs.map(pm => <option key={pm}>{pm}</option>)}
                </select>
              ) : null;
            })()}
            {milPMFilter !== "All" && (
              <button onClick={() => setMilPMFilter("All")}
                style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 12 }}>✕ Clear</button>
            )}
          </div>
          {dashSyncMsg && (
            <div style={{ fontSize: 12, padding: "4px 12px", borderRadius: 6,
              background: dashSyncMsg.startsWith("✓") ? P.greenDim : dashSyncMsg.startsWith("⚠") ? P.yellowDim : P.redDim,
              color: dashSyncMsg.startsWith("✓") ? P.green : dashSyncMsg.startsWith("⚠") ? P.yellow : P.red,
              border: `1px solid ${dashSyncMsg.startsWith("✓") ? P.green : dashSyncMsg.startsWith("⚠") ? P.yellow : P.red}`,
              display: "flex", alignItems: "center", gap: 8 }}>
              {dashSyncMsg}
              <button onClick={() => setDashSyncMsg("")} style={{ background: "none", border: "none", color: "inherit", cursor: "pointer", fontSize: 12 }}>✕</button>
            </div>
          )}
        </div>
        <table>
          <thead>
            <tr><th>Project</th><th>PM</th><th>Milestone</th><th>Type</th><th>Due</th><th>Progress</th><th>Notes</th><th>Project Status</th><th style={{width:44}}>📅</th></tr>
          </thead>
          <tbody>
            {allMilestones.filter(m => !(!["rfi","submittal"].includes(m.type) && m.dueDate && new Date(m.dueDate + "T00:00:00") < now && (m.pctComplete || 0) >= 100) && (milPMFilter === "All" || m.pm === milPMFilter)).sort((a, b) => (a.dueDate || "") > (b.dueDate || "") ? 1 : -1).map(m => {
              const mst = milestoneStatus(m.pctComplete);
              const projStatus = m.projectStatus || "Not Started";
              const projStatusColor = STATUS_COLORS[projStatus] || STATUS_COLORS["Not Started"];
              const isOverdue = m.dueDate && new Date(m.dueDate) < now && mst !== "Completed";

              function updateMilestoneField(field, val, skipPrompt = false) {
                if (!onUpdateProject) return;
                const proj = projects.find(p => p.id === m.projectId);
                if (!proj) return;
                const newMilestones = (proj.milestones || []).map(x =>
                  x.id === m.id ? { ...x, [field]: val } : x
                );
                onUpdateProject({ ...proj, milestones: newMilestones });
                if (!skipPrompt && field === "pctComplete" && +val > 0 && m.type === "billable" && m.fee > 0) {
                  const amount = calcInvoiceAmount(m, +val, proj);
                  if (amount > 0) setDashInvoicePrompt({ milestone: m, project: proj, newPct: +val, invoiceAmount: amount });
                }
              }
              function updateProjectStatus(newStatus) {
                const proj = projects.find(p => p.id === m.projectId);
                if (!proj) return;
                onUpdateProject({ ...proj, status: newStatus });
              }

              return (
                <tr key={m.id}>
                  <td>
                    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <button onClick={() => onNavigateToProject(m.projectId)}
                        style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 13, padding: 0, fontWeight: 600, textAlign: "left" }}
                        onMouseEnter={e => e.currentTarget.style.textDecoration = "underline"}
                        onMouseLeave={e => e.currentTarget.style.textDecoration = "none"}>
                        {m.projectName}
                      </button>
                      {m.contractStatus !== "Fully Executed" && !["rfi","submittal"].includes(m.type) && (
                        <span title={"No fully executed contract — current status: " + (m.contractStatus || "Not set")}
                          style={{ fontSize: 13, cursor: "help", lineHeight: 1 }}>⚠️</span>
                      )}
                    </div>
                  </td>
                  <td style={{ color: P.textMuted }}>{m.pm || "—"}</td>
                  <td style={{ fontWeight: 500 }}>
                    {m.type === "rfi" ? (
                      <button onClick={() => setDashRfiModal({ item: m._rfi, project: m._project })}
                        style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer",
                          fontSize: 13, padding: 0, fontWeight: 600, textAlign: "left", textDecoration: "underline dotted" }}>
                        {m.name}
                      </button>
                    ) : m.type === "submittal" ? (
                      <button onClick={() => setDashSubModal({ item: m._sub, project: m._project })}
                        style={{ background: "none", border: "none", color: "#a78bfa", cursor: "pointer",
                          fontSize: 13, padding: 0, fontWeight: 600, textAlign: "left", textDecoration: "underline dotted" }}>
                        {m.name}
                      </button>
                    ) : m.name}
                  </td>
                  <td>
                    {m.type === "rfi"
                      ? <Badge color={{ bg: "#1e3a5f", text: "#60a5fa" }} text="RFI" />
                      : m.type === "submittal"
                      ? <Badge color={{ bg: "#2a1a3b", text: "#a78bfa" }} text="Submittal" />
                      : <Badge color={m.type === "billable" ? { bg: P.accentDim, text: P.accentLight } : { bg: P.purpleDim, text: P.purple }} text={m.type === "billable" ? "Billable" : "Non-Billable"} />}
                  </td>
                  <td>
                    <input type="date" value={m.dueDate || ""}
                      onChange={e => !["rfi","submittal"].includes(m.type) && updateMilestoneField("dueDate", e.target.value)}
                      readOnly={["rfi","submittal"].includes(m.type)}
                      style={{ fontFamily: "JetBrains Mono", fontSize: 12, width: 130,
                        borderColor: isOverdue ? P.red : ["rfi","submittal"].includes(m.type) ? "transparent" : P.border,
                        color: isOverdue ? P.red : P.text,
                        background: ["rfi","submittal"].includes(m.type) ? "transparent" : undefined }} />
                  </td>
                  <td>
                    {["rfi","submittal"].includes(m.type) ? (
                      <span style={{ fontSize: 12, fontWeight: 600, padding: "2px 8px", borderRadius: 8,
                        color: (RFI_STATUS_COLORS[m.notes] || SUBMITTAL_STATUS_COLORS[m.notes] || {}).text || P.textDim,
                        background: (RFI_STATUS_COLORS[m.notes] || SUBMITTAL_STATUS_COLORS[m.notes] || {}).bg || "transparent" }}>
                        {m.notes}
                      </span>
                    ) : (
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <input type="number" min={0} max={100}
                          value={m.pctComplete || 0}
                          onChange={e => updateMilestoneField("pctComplete", +e.target.value, true)}
                          onBlur={e => updateMilestoneField("pctComplete", +e.target.value)}
                          style={{ width: 72, fontFamily: "JetBrains Mono", fontSize: 12, MozAppearance: "textfield" }} />
                        <span style={{ fontSize: 11, color: P.textDim }}>%</span>
                        <input type="checkbox" checked={(m.pctComplete || 0) >= 100}
                          onChange={e => updateMilestoneField("pctComplete", e.target.checked ? 100 : 0)}
                          title="Mark complete (100%)"
                          style={{ width: 16, height: 16, cursor: "pointer", accentColor: P.green }} />
                        <ProgressBar pct={m.pctComplete || 0} color={m.pctComplete >= 100 ? P.green : P.accent} />
                      </div>
                    )}
                  </td>
                  <td>
                    <input value={m.notes || ""} placeholder="Notes…"
                      onChange={e => updateMilestoneField("notes", e.target.value)}
                      style={{ width: 160, fontSize: 12 }} />
                  </td>
                  <td>
                    <select value={projStatus} onChange={e => updateProjectStatus(e.target.value)}
                      style={{ fontSize: 11, padding: "3px 6px", borderRadius: 6,
                        background: projStatusColor.bg, color: projStatusColor.text,
                        border: "1px solid " + projStatusColor.text, fontWeight: 600, cursor: "pointer" }}>
                      {PROJECT_STATUSES.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </td>
                  <td>
                    {!["rfi","submittal"].includes(m.type) && (() => {
                      const proj = projects.find(p => p.id === m.projectId);
                      if (!proj) return null;
                      return (
                        <DashMilestoneSpBtn
                          key={m.id}
                          milestone={m}
                          project={proj}
                          onSave={webUrl => {
                            const newMilestones = (proj.milestones || []).map(x => x.id === m.id ? { ...x, outgoingFolderUrl: webUrl } : x);
                            onUpdateProject({ ...proj, milestones: newMilestones });
                          }}
                        />
                      );
                    })()}
                  </td>
                  <td>
                    {m.dueDate && (() => {
                      const sessionState = dashCalState[m.id];
                      const isSynced = sessionState === "synced" || (!sessionState && !!m.calendarEventId);
                      const isStale = sessionState === "stale";
                      const isSyncing = sessionState === "syncing";
                      const isError = sessionState === "error";
                      const bg = isError ? P.redDim : isStale ? "#1a1400" : isSynced ? P.greenDim : P.accentDim;
                      const border = isError ? P.red : isStale ? P.yellow : isSynced ? P.green : P.accent;
                      const color = isError ? P.red : isStale ? P.yellow : isSynced ? P.green : P.accentLight;
                      const label = isSyncing ? "⏳" : isError ? "✗ 📅" : isStale ? "⚠ 📅" : isSynced ? "✓ 📅" : "📅";
                      const tip = isSyncing ? "Syncing…" : isError ? "Sync failed — click to retry" : isStale ? "Date changed — click to re-sync" : isSynced ? "Synced to NYC Shared Calendar — click to re-sync" : "Sync to NYC Shared Calendar";
                      return (
                        <button onClick={() => syncMilestoneFromDash(m)}
                          disabled={isSyncing}
                          title={tip}
                          style={{ background: bg, border: `1px solid ${border}`, borderRadius: 6, color, cursor: "pointer", fontSize: 11, padding: "3px 7px" }}>
                          {label}
                        </button>
                      );
                    })()}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
    {dashInvoicePrompt && (
      <InvoicePromptModal
        milestone={dashInvoicePrompt.milestone}
        project={dashInvoicePrompt.project}
        newPct={dashInvoicePrompt.newPct}
        invoiceAmount={dashInvoicePrompt.invoiceAmount}
        onLogInvoice={inv => {
          const proj = dashInvoicePrompt.project;
          onUpdateProject({ ...proj, invoices: [...(proj.invoices || []), inv] });
        }}
        onClose={() => setDashInvoicePrompt(null)}
      />
    )}
    {dashRfiModal && (
      <RFIDetailModal
        item={dashRfiModal.item}
        project={dashRfiModal.project}
        staff={staff}
        clients={[]}
        type="rfi"
        onSave={updated => {
          const p = dashRfiModal.project;
          onUpdateProject({ ...p, rfis: (p.rfis || []).map(r => r.id === updated.id ? updated : r) });
        }}
        onClose={() => setDashRfiModal(null)}
      />
    )}
    {dashSubModal && (
      <RFIDetailModal
        item={dashSubModal.item}
        project={dashSubModal.project}
        staff={staff}
        clients={[]}
        type="submittal"
        onSave={updated => {
          const p = dashSubModal.project;
          onUpdateProject({ ...p, submittals: (p.submittals || []).map(s => s.id === updated.id ? updated : s) });
        }}
        onClose={() => setDashSubModal(null)}
      />
    )}
    </>
  );
}

<body>

        </div>

      <div>

        </div>

    <div class="meta-grid">
      <div class="meta-block">
        <div class="meta-label">Project</div>
        <div class="meta-value">${project.name || "—"}</div>

      </div>

        <div class="meta-label">Client / Prime</div>
        <div class="meta-value">${project.prime || project.clientName || "—"}</div>
