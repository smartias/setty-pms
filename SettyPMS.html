        ${project.primeProjectNumber ? '<div class="meta-sub">Prime #: ' + project.primeProjectNumber + "</div>" : ""}
        ${project.projectManager ? '<div class="meta-sub">PM: ' + project.projectManager + "</div>" : ""}
      </div>
    </div>

    <div class="scope-body">${scopeHtml}</div>

    <div class="doc-footer">
      <span>SETTY &amp; Associates, Ltd, PC · Scope of Services</span>
      <span>${project.name || ""} · ${new Date().toLocaleDateString("en-US", { month: "long", year: "numeric" })}</span>
    </div>
  </div>
</body>
</html>`);
  win.document.close();
}

function ScopeView({ project, onChange }) {
  const editorRef = React.useRef(null);
  const [wc, setWc] = React.useState(0);
  const [showLockModal, setShowLockModal] = React.useState(false); // "lock" | "unlock" | false
  const [lockNote, setLockNote] = React.useState("");
  const [showAudit, setShowAudit] = React.useState(false);

  const scopeLocked = project.scopeLocked || false;
  const auditLog = project.scopeAuditLog || [];

  React.useEffect(() => {
    if (editorRef.current) {
      editorRef.current.innerHTML = project.scopeContent || "";
      const text = editorRef.current.innerText || "";
      setWc(text.trim() ? text.trim().split(/\s+/).length : 0);
    }
  }, []);

  function exec(cmd, val) {
    if (scopeLocked) return;
    document.execCommand(cmd, false, val || null);
    if (editorRef.current) editorRef.current.focus();
    saveContent();
  }

  function saveContent() {
    if (scopeLocked) return;
    const html = editorRef.current ? editorRef.current.innerHTML : "";
    const text = editorRef.current ? editorRef.current.innerText : "";
    onChange({ ...project, scopeContent: html });
    setWc(text.trim() ? text.trim().split(/\s+/).length : 0);
  }

  function doLock() {
    const entry = { id: uid(), action: "locked", user: getCurrentUser(), date: new Date().toISOString(), note: lockNote.trim() };
    onChange({ ...project, scopeLocked: true, scopeAuditLog: [...auditLog, entry] });
    setShowLockModal(false);
    setLockNote("");
  }

  function doUnlock() {
    const entry = { id: uid(), action: "unlocked", user: getCurrentUser(), date: new Date().toISOString(), note: lockNote.trim() };
    onChange({ ...project, scopeLocked: false, scopeAuditLog: [...auditLog, entry] });
    setShowLockModal(false);
    setLockNote("");
  }

  const tbStyle = {
    background: "none",
    border: "1px solid " + P.border,
    color: scopeLocked ? P.textDim : P.text,
    borderRadius: 4,
    padding: "3px 9px",
    fontSize: 12,
    cursor: scopeLocked ? "not-allowed" : "pointer",
    fontFamily: "inherit",
    minWidth: 30,
    opacity: scopeLocked ? 0.4 : 1,
  };

  const TB = ({ label, cmd, val, title }) => (
    <button onMouseDown={e => { e.preventDefault(); exec(cmd, val); }} title={title || label} style={tbStyle} disabled={scopeLocked}>
      {label}
    </button>
  );

  const divider = <div style={{ width: 1, height: 20, background: P.border, margin: "0 2px" }} />;

  const lastLocked = [...auditLog].reverse().find(e => e.action === "locked");

  return (
    <div style={{ paddingBottom: 40 }}>
      {/* Header row */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 2 }}>
            <div style={{ fontWeight: 700, fontSize: 16 }}>Scope of Services</div>
            {scopeLocked && (
              <span style={{ fontSize: 11, fontWeight: 600, background: P.greenDim, color: P.green, border: "1px solid " + P.green, borderRadius: 8, padding: "2px 8px" }}>
                🔒 Locked
              </span>
            )}
          </div>
          <div style={{ fontSize: 12, color: P.textDim }}>
            {wc} word{wc !== 1 ? "s" : ""}
            {scopeLocked
              ? " · scope is locked — unlock to edit"
              : " · auto-saves as you type"}
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {scopeLocked
            ? <Btn variant="warning" onClick={() => { setShowLockModal("unlock"); setLockNote(""); }}>🔓 Unlock Scope</Btn>
            : <Btn variant="success" onClick={() => { setShowLockModal("lock"); setLockNote(""); }}>🔒 Lock Scope</Btn>
          }
          <Btn onClick={() => printScopeOfServices(project)}>🖨 Print</Btn>
        </div>
      </div>

      {/* Lock status banner */}
      {scopeLocked && lastLocked && (
        <div style={{ background: P.greenDim, border: "1px solid " + P.green, borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 12 }}>
          <span style={{ color: P.green, fontWeight: 600 }}>🔒 Scope locked</span>
          <span style={{ color: P.textMuted, marginLeft: 8 }}>
            by {lastLocked.user} on {fmtDate(lastLocked.date.slice(0, 10))}
            {lastLocked.note ? " · " + lastLocked.note : ""}
          </span>
        </div>
      )}

      {/* Toolbar */}
      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", alignItems: "center", padding: "8px 10px", background: P.card, border: "1px solid " + P.border, borderBottom: "none", borderRadius: "8px 8px 0 0", opacity: scopeLocked ? 0.5 : 1 }}>
        <select
          onChange={e => { exec("formatBlock", e.target.value); e.target.value = "p"; }}
          defaultValue="p"
          disabled={scopeLocked}
          style={{ fontSize: 12, padding: "3px 6px", borderRadius: 4, border: "1px solid " + P.border, background: P.bg, color: P.text, cursor: scopeLocked ? "not-allowed" : "pointer" }}>
          <option value="p">Paragraph</option>
          <option value="h1">Heading 1</option>
          <option value="h2">Heading 2</option>
          <option value="h3">Heading 3</option>
        </select>
        {divider}
        <TB label="B" cmd="bold" title="Bold" />
        <TB label="I" cmd="italic" title="Italic" />
        <TB label="U" cmd="underline" title="Underline" />
        {divider}
        <TB label="• List" cmd="insertUnorderedList" title="Bullet list" />
        <TB label="1. List" cmd="insertOrderedList" title="Numbered list" />
        {divider}
        <TB label="⇤" cmd="outdent" title="Decrease indent" />
        <TB label="⇥" cmd="indent" title="Increase indent" />
        {divider}
        <TB label="✕ Clear" cmd="removeFormat" title="Clear formatting" />
      </div>

      {/* Editor */}
      <div
        ref={editorRef}
        contentEditable={scopeLocked ? "false" : "true"}
        suppressContentEditableWarning={true}
        onInput={saveContent}
        style={{
          minHeight: 520,
          padding: "20px 24px",
          background: "#ffffff",
          border: "1px solid " + (scopeLocked ? P.green : P.border),
          borderTop: "none",
          borderRadius: "0 0 8px 8px",
          outline: "none",
          fontSize: 13,
          lineHeight: 1.75,
          color: "#1a1a1a",
          overflowY: "auto",
          cursor: scopeLocked ? "default" : "text",
        }}
      />

      <div style={{ marginTop: 10, fontSize: 11, color: P.textDim }}>
        💡 Use <strong style={{ color: P.text }}>Heading 1</strong> for discipline sections, <strong style={{ color: P.text }}>Heading 2</strong> for subsections, bullet lists for deliverables and exclusions.
      </div>

      {/* Audit log */}
      {auditLog.length > 0 && (
        <div style={{ marginTop: 20 }}>
          <button onClick={() => setShowAudit(v => !v)}
            style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 12, padding: 0 }}>
            {showAudit ? "▲ Hide" : "▼ Show"} scope audit log ({auditLog.length} {auditLog.length === 1 ? "entry" : "entries"})
          </button>
          {showAudit && (
            <table style={{ marginTop: 8, fontSize: 12 }}>
              <thead>
                <tr>
                  <th>Action</th>
                  <th>User</th>
                  <th>Date</th>
                  <th>Note</th>
                </tr>
              </thead>
              <tbody>
                {[...auditLog].reverse().map(e => (
                  <tr key={e.id}>
                    <td>
                      <span style={{ fontWeight: 600, color: e.action === "locked" ? P.green : P.yellow }}>
                        {e.action === "locked" ? "🔒 Locked" : "🔓 Unlocked"}
                      </span>
                    </td>
                    <td style={{ color: P.textMuted }}>{e.user || "—"}</td>
                    <td style={{ color: P.textMuted, whiteSpace: "nowrap" }}>{fmtDate(e.date.slice(0, 10))}</td>
                    <td style={{ color: P.textMuted }}>{e.note || "—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* Lock/Unlock modal */}
      {showLockModal && (
        <Modal title={showLockModal === "lock" ? "🔒 Lock Scope of Services" : "🔓 Unlock Scope of Services"} onClose={() => setShowLockModal(false)}>
          <div style={{ fontSize: 13, color: P.textMuted, marginBottom: 14, lineHeight: 1.6 }}>
            {showLockModal === "lock"
              ? "Locking the scope prevents further edits. You can unlock it at any time. Add an optional note for the audit log."
              : "Unlocking allows the scope to be edited again. Add an optional note explaining why."}
          </div>
          <Field label="Note (optional)">
            <textarea
              value={lockNote}
              onChange={e => setLockNote(e.target.value)}
              rows={3}
              style={{ width: "100%", resize: "vertical" }}
              placeholder={showLockModal === "lock" ? "e.g. Approved by PM, issued to client..." : "e.g. Revising scope per amendment #2..."}
            />
          </Field>
          <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
            <button
              onClick={showLockModal === "lock" ? doLock : doUnlock}
              style={{ background: showLockModal === "lock" ? P.green : P.red, border: "none", borderRadius: 8, color: "#fff", cursor: "pointer", fontWeight: 700, padding: "8px 20px", fontSize: 13 }}>
              {showLockModal === "lock" ? "Lock Scope" : "Unlock Scope"}
            </button>
            <Btn variant="ghost" onClick={() => setShowLockModal(false)}>Cancel</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}



// ─── CLIENT & PRIME DIRECTORY ─────────────────────────────────────────────────

function newContact(overrides) {
  return { id: uid(), name: "", title: "", role: "Owner", phone: "", email: "", lastContacted: "", notes: "", ...overrides };
}

const CONTACT_ROLES = ["Owner", "Owner's Representative", "Developer", "Architect", "Engineer", "Construction Manager", "GC", "Agency", "Inspector", "PM", "Legal", "Accounting", "Other"];

function newClient(overrides) {
  return {
    id: uid(),
    name: "",
    type: "Client",
    contacts: [],
    ...overrides,
  };
}

function ClientDirectoryView({ clients, onUpdateClients, projects, onNavigateToProject }) {
  const [editingId, setEditingId] = React.useState(null);
  const [form, setForm] = React.useState(null);
  const [search, setSearch] = React.useState("");

  function startNew() { setForm(newClient()); setEditingId("__new__"); }
  function startEdit(c) { setForm({ ...c }); setEditingId(c.id); }
  function cancelEdit() { setEditingId(null); setForm(null); }

  function saveForm() {
    if (!form.name.trim()) return;
    if (editingId === "__new__") {
      onUpdateClients([...clients, form]);
    } else {
      onUpdateClients(clients.map(c => c.id === editingId ? form : c));
    }
    cancelEdit();
  }

  function deleteClient(id) {
    if (!window.confirm("Remove this company from the directory?")) return;
    onUpdateClients(clients.filter(c => c.id !== id));
  }

  const filtered = clients.filter(c =>
    !search ||
    c.name.toLowerCase().includes(search.toLowerCase()) ||
    (c.contacts||[]).some(ct => ct.name.toLowerCase().includes(search.toLowerCase()) || ct.email.toLowerCase().includes(search.toLowerCase())) ||
    (c.type || "").toLowerCase().includes(search.toLowerCase())
  );

  const TYPE_COLORS = {
    "Client":    { bg: P.accentDim, text: P.accentLight },
    "Prime/GC":  { bg: P.purpleDim, text: P.purple },
    "Both":      { bg: P.greenDim,  text: P.green },
  };

  function addContact() {
    setForm({ ...form, contacts: [...(form.contacts||[]), newContact()] });
  }
  function updateContact(cid, updates) {
    setForm({ ...form, contacts: (form.contacts||[]).map(c => c.id === cid ? { ...c, ...updates } : c) });
  }
  function removeContact(cid) {
    setForm({ ...form, contacts: (form.contacts||[]).filter(c => c.id !== cid) });
  }

  if (editingId !== null) {
    const contacts = form.contacts || [];
    return (
      <div style={{ padding: "24px 32px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
          <button onClick={cancelEdit} style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 18 }}>←</button>
          <div style={{ fontSize: 20, fontWeight: 800 }}>{editingId === "__new__" ? "Add Company" : "Edit Company"}</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, maxWidth: 900 }}>
          {/* Company info */}
          <div style={{ background: P.card, border: "1px solid " + P.border, borderRadius: 12, padding: 24 }}>
            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 16 }}>Company Info</div>
            <Field label="Company Name">
              <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })}
                placeholder="e.g. Acme Construction" style={{ width: "100%" }} autoFocus />
            </Field>
            <Field label="Type">
              <div style={{ display: "flex", gap: 8 }}>
                {["Client", "Prime/GC", "Both"].map(t => {
                  const on = form.type === t;
                  const tc = TYPE_COLORS[t];
                  return (
                    <button key={t} onClick={() => setForm({ ...form, type: t })}
                      style={{ padding: "5px 14px", borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: "pointer",
                        background: on ? tc.bg : "transparent", color: on ? tc.text : P.textDim,
                        border: "1px solid " + (on ? tc.text : P.border) }}>
                      {t}
                    </button>
                  );
                })}
              </div>
              <div style={{ fontSize: 11, color: P.textDim, marginTop: 5 }}>Controls which typeahead fields this company appears in on projects.</div>
            </Field>
            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              <Btn onClick={saveForm} disabled={!form.name.trim()}>{editingId === "__new__" ? "Add Company" : "Save Changes"}</Btn>
              <Btn variant="ghost" onClick={cancelEdit}>Cancel</Btn>
            </div>
          </div>
          {/* Linked Projects */}
          {(() => {
            const linked = (projects||[]).filter(p => !p.archived && (p.client === form.name || p.prime === form.name));
            if (linked.length === 0) return null;
            return (
              <div style={{ gridColumn: "1/-1", background: P.card, border: "1px solid " + P.border, borderRadius: 12, padding: 24 }}>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 12 }}>Linked Projects <span style={{ color: P.textDim, fontWeight: 400, fontSize: 12 }}>({linked.length})</span></div>
                <table>
                  <thead><tr><th>#</th><th>Project</th><th>Role</th><th>PM</th><th>Status</th></tr></thead>
                  <tbody>
                    {linked.map(p => {
                      const role = p.client === form.name && p.prime === form.name ? "Client + Prime" : p.client === form.name ? "Client" : "Prime/GC";
                      const sc = STATUS_COLORS[p.status] || STATUS_COLORS["Not Started"];
                      return (
                        <tr key={p.id} style={{ cursor: "pointer" }} onClick={() => onNavigateToProject(p.id)}>
                          <td style={{ color: P.textMuted, fontSize: 12 }}>{p.projectNumber || "—"}</td>
                          <td style={{ fontWeight: 600, color: P.accentLight }}>{p.name}</td>
                          <td><Badge color={role === "Client" ? { bg: P.accentDim, text: P.accentLight } : { bg: P.purpleDim, text: P.purple }} text={role} /></td>
                          <td style={{ color: P.textMuted, fontSize: 12 }}>{p.projectManager || "—"}</td>
                          <td><Badge color={sc} text={p.status || "Not Started"} /></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            );
          })()}
          {/* Contacts */}
          <div style={{ background: P.card, border: "1px solid " + P.border, borderRadius: 12, padding: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontWeight: 700, fontSize: 14 }}>Contacts <span style={{ color: P.textDim, fontWeight: 400, fontSize: 12 }}>({contacts.length})</span></div>
              <Btn small variant="ghost" onClick={addContact}>+ Add Contact</Btn>
            </div>
            {contacts.length === 0 && (
              <div style={{ color: P.textDim, fontSize: 13, textAlign: "center", padding: "20px 0" }}>No contacts yet.</div>
            )}
            {contacts.map((ct, i) => (
              <div key={ct.id} style={{ background: P.bg, border: "1px solid " + P.border, borderRadius: 8, padding: 14, marginBottom: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <Field label="Name" style={{ marginBottom: 8 }}>
                    <input value={ct.name} onChange={e => updateContact(ct.id, { name: e.target.value })} placeholder="Full name" style={{ width: "100%" }} />
                  </Field>
                  <Field label="Title" style={{ marginBottom: 8 }}>
                    <input value={ct.title||""} onChange={e => updateContact(ct.id, { title: e.target.value })} placeholder="e.g. Project Manager" style={{ width: "100%" }} />
                  </Field>
                  <Field label="Role" style={{ marginBottom: 8 }}>
                    <select value={ct.role||"Other"} onChange={e => updateContact(ct.id, { role: e.target.value })} style={{ width: "100%" }}>
                      {CONTACT_ROLES.map(r => <option key={r}>{r}</option>)}
                    </select>
                  </Field>
                  <Field label="Last Contacted" style={{ marginBottom: 8 }}>
                    <input type="date" value={ct.lastContacted||""} onChange={e => updateContact(ct.id, { lastContacted: e.target.value })} style={{ width: "100%" }} />
                  </Field>
                  <Field label="Email" style={{ marginBottom: 8 }}>
                    <input type="email" value={ct.email||""} onChange={e => updateContact(ct.id, { email: e.target.value })} placeholder="email@firm.com" style={{ width: "100%" }} />
                  </Field>
                  <Field label="Phone" style={{ marginBottom: 8 }}>
                    <input value={ct.phone||""} onChange={e => updateContact(ct.id, { phone: e.target.value })} placeholder="(212) 555-0100" style={{ width: "100%" }} />
                  </Field>
                  <Field label="Notes" style={{ gridColumn: "1/-1", marginBottom: 0 }}>
                    <input value={ct.notes||""} onChange={e => updateContact(ct.id, { notes: e.target.value })} placeholder="Any notes…" style={{ width: "100%" }} />
                  </Field>
                </div>
                <div style={{ textAlign: "right", marginTop: 8 }}>
                  <Btn small variant="danger" onClick={() => removeContact(ct.id)}>Remove</Btn>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>Client & Prime Directory</div>
          <div style={{ fontSize: 13, color: P.textMuted }}>{clients.length} compan{clients.length !== 1 ? "ies" : "y"} · auto-suggest on project Overview tab</div>
        </div>
        <Btn onClick={startNew}>+ Add Company</Btn>
      </div>

      <input placeholder="Search by name, contact, or type…" value={search} onChange={e => setSearch(e.target.value)}
        style={{ width: 300, marginBottom: 16 }} />

      {filtered.length === 0 ? (
        <div style={{ background: P.card, border: "1px solid " + P.border, borderRadius: 10, padding: 40, textAlign: "center", color: P.textDim, fontSize: 13 }}>
          {clients.length === 0
            ? <><div style={{ fontSize: 32, marginBottom: 12 }}>🏢</div><div style={{ fontWeight: 600, marginBottom: 6 }}>No companies yet</div><div>Add your clients and prime contractors here — their names auto-suggest on projects.</div><div style={{ marginTop: 16 }}><Btn onClick={startNew}>+ Add First Company</Btn></div></>
            : "No companies match your search."}
        </div>
      ) : (
        <table>
          <thead>
            <tr>
              <th>Company</th>
              <th>Type</th>
              <th>Contacts</th>
              <th>Primary Contact</th>
              <th>Projects</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(c => {
              const tc = TYPE_COLORS[c.type] || TYPE_COLORS["Client"];
              const contacts = c.contacts || [];
              const primary = contacts[0];
              return (
                <tr key={c.id} style={{ cursor: "pointer" }} onClick={() => startEdit(c)}>
                  <td style={{ fontWeight: 600 }}>{c.name}</td>
                  <td><Badge color={tc} text={c.type || "Client"} /></td>
                  <td style={{ color: P.textMuted }}>{contacts.length || "—"}</td>
                  <td style={{ color: P.textMuted, fontSize: 12 }}>{primary ? primary.name + (primary.role ? " · " + primary.role : "") : "—"}</td>
                  <td style={{ fontSize: 12 }} onClick={e => e.stopPropagation()}>
                    {(() => {
                      const linked = (projects||[]).filter(p => !p.archived && (p.client === c.name || p.prime === c.name));
                      return linked.length === 0
                        ? <span style={{ color: P.textDim }}>—</span>
                        : <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                            {linked.slice(0,3).map(p => (
                              <button key={p.id} onClick={() => onNavigateToProject(p.id)}
                                style={{ background: P.accentDim, border: "1px solid " + P.accent, borderRadius: 4,
                                  color: P.accentLight, cursor: "pointer", fontSize: 11, padding: "2px 7px", fontWeight: 600 }}
                                title={p.name + (p.projectNumber ? " [" + p.projectNumber + "]" : "")}>
                                {p.projectNumber || p.name.slice(0,12)}
                              </button>
                            ))}
                            {linked.length > 3 && <span style={{ color: P.textDim, fontSize: 11, alignSelf: "center" }}>+{linked.length - 3} more</span>}
                          </div>;
                    })()}
                  </td>
                  <td onClick={e => e.stopPropagation()}>
                    <div style={{ display: "flex", gap: 6 }}>
                      <Btn small variant="ghost" onClick={() => startEdit(c)}>Edit</Btn>
                      <Btn small variant="danger" onClick={() => { const linkedCount = (projects||[]).filter(p => p.client === c.name || p.prime === c.name).length; const msg = linkedCount > 0 ? "Remove \"" + c.name + "\" from the client directory?\n\n⚠ This client appears on " + linkedCount + " project" + (linkedCount !== 1 ? "s" : "") + ". Removing them does not change those projects, but the client name will no longer link back here." : "Remove \"" + c.name + "\" from the client directory?"; if (window.confirm(msg)) deleteClient(c.id); }}>✕</Btn>

                  </td>

// ── Teams Notifications opt-in field ─────────────────────────────────────────
function TeamsNotificationsField({ project, onUpdate }) {
  const [status, setStatus]   = React.useState("idle"); // idle | creating | error | done
  const [msg,    setMsg]      = React.useState("");
  const enabled   = !!project.teamsNotificationsEnabled;
  const channelId = project.teamsChannelId || "";

  const channelUrl = channelId
    ? `https://teams.microsoft.com/l/channel/${encodeURIComponent(channelId)}/conversations?groupId=${TEAMS_TEAM_ID}&tenantId=f374c024-71c2-48b6-8420-076fff97327c`
    : null;

  async function handleEnable() {
    setStatus("creating");
    setMsg("");
    try {
      const id = await getOrCreateProjectChannel(project);
      if (!id) throw new Error("No channel ID returned — you may need to be a member of the NYC Project Team.");
      onUpdate({ ...project, teamsNotificationsEnabled: true, teamsChannelId: id });
      setStatus("done");
      setMsg("Channel ready. Cards will be posted for milestones, RFIs, submittals, COs, and team changes.");
    } catch(e) {
      setStatus("error");
      setMsg(e.message || "Failed to create channel.");
    }
  }

  function handleDisable() {
    // Keeps the channelId in case they re-enable later — just stops posting
    onUpdate({ ...project, teamsNotificationsEnabled: false });
    setStatus("idle");
    setMsg("");
  }

  const boxStyle = {
    background: enabled ? "#f0f7f0" : P.card,
    border: `1.5px solid ${enabled ? "#375623" : P.border}`,
    borderRadius: 8, padding: "14px 16px",
    display: "flex", flexDirection: "column", gap: 10,
  };
  const rowStyle = { display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" };

  return (
    <div style={boxStyle}>
      <div style={rowStyle}>
        {/* Status dot */}
        <div style={{
          width: 10, height: 10, borderRadius: "50%", flexShrink: 0,
          background: enabled ? "#375623" : "#aaa",
          boxShadow: enabled ? "0 0 0 3px #c6dfc6" : "none",
        }} />
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: P.text }}>
            {enabled ? "Teams Notifications Active" : "Teams Notifications Off"}
          </div>
          <div style={{ fontSize: 11, color: P.textDim, marginTop: 2 }}>
            {enabled && channelId
              ? "Adaptive Cards are posted to the project channel in NYC Project Team."
              : "Opt in to receive milestone, RFI, submittal, CO, and team-change cards in Teams."}
          </div>
        </div>

        {!enabled && (
          <button onClick={handleEnable} disabled={status === "creating"}
            style={{ background: "#1F3864", color: "#fff", border: "none", borderRadius: 6,
              padding: "7px 16px", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
            {status === "creating" ? "Creating channel…" : "Enable Notifications"}
          </button>
        )}
        {enabled && (
          <button onClick={handleDisable}
            style={{ background: "none", color: P.textDim, border: `1px solid ${P.border}`,
              borderRadius: 6, padding: "6px 14px", fontSize: 12, cursor: "pointer", whiteSpace: "nowrap" }}>
            Disable
          </button>
        )}
      </div>

      {/* Channel link */}
      {enabled && channelUrl && (
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 18 }}>💬</span>
          <a href={channelUrl} target="_blank" rel="noopener noreferrer"
            style={{ fontSize: 12, color: "#2F5496", fontWeight: 600 }}>
            Open project channel in Teams
          </a>
          <span style={{ fontSize: 11, color: P.textDim }}>— {project.projectNumber || project.name}</span>
        </div>
      )}

      {/* Notification types legend */}
      {enabled && (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {[["🏁","Milestones"],["🔴","RFIs"],["📋","Submittals"],["📝","Change Orders"],["👤","Team Changes"]].map(([ic,lbl]) => (
            <div key={lbl} style={{ display: "flex", alignItems: "center", gap: 4,
              background: "#fff", border: `1px solid #d4e6d4`, borderRadius: 20,
              padding: "3px 10px", fontSize: 11, color: "#375623", fontWeight: 600 }}>
              {ic} {lbl}
            </div>
          ))}
        </div>
      )}

      {/* Status message */}
      {msg && (
        <div style={{ fontSize: 11, color: status === "error" ? P.red : "#375623",
          background: status === "error" ? "#fff0f0" : "#f0f7f0",
          border: `1px solid ${status === "error" ? "#f5c6c6" : "#c6dfc6"}`,
          borderRadius: 5, padding: "6px 10px" }}>
          {status === "error" ? "⚠️ " : "✅ "}{msg}
        </div>
      )}
    </div>
  );
}

          </div>
        </div>
      ) : (
        <Btn small variant="ghost" onClick={() => setAdding(true)}>+ Add External Link</Btn>
      )}

  );

    return dirContacts.filter(ct => !q || ct.name.toLowerCase().includes(q) || (ct.email || "").toLowerCase().includes(q)).slice(0, 8);
  }, [dirContacts, query]);
  function addFromDir(ct) {
    if ((pocList || []).some(p => p.name === ct.name)) return;
    onChange([...(pocList || []), { id: ct.id || uid(), name: ct.name, title: ct.title || "", email: ct.email || "", phone: ct.phone || "" }]);

    if ((pocList || []).some(p => p.name === ct.name)) return;

  function remove(idx) { onChange((pocList || []).filter((_, i) => i !== idx)); }

        </div>
      ))}
      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>

function TimesheetHelper({ staff, projects, onClose }) {
  const today = new Date();
  const [month, setMonth] = React.useState(today.getMonth());
  const [year, setYear] = React.useState(today.getFullYear());
  const [period, setPeriod] = React.useState(today.getDate() <= 15 ? "first" : "second");
  const [searching, setSearching] = React.useState(false);
  const [calEvents, setCalEvents] = React.useState(null);
  const [rows, setRows] = React.useState([]);
  const [extraRows, setExtraRows] = React.useState([]);
  const [activeTab, setActiveTab] = React.useState("calendar"); // "calendar" | "active"

  const TS_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const YEARS = [today.getFullYear() - 1, today.getFullYear()];

  const periodStart = new Date(year, month, period === "first" ? 1 : 16);
  const periodEnd   = period === "first"
    ? new Date(year, month, 15, 23, 59, 59)
    : new Date(year, month + 1, 0, 23, 59, 59);
  const fmtPeriod = TS_MONTHS[month] + " " + (period === "first" ? "1\u201315" : "16\u2013" + new Date(year, month + 1, 0).getDate()) + ", " + year;

  function resetPeriod() { setCalEvents(null); setRows([]); setExtraRows([]); }

  // ── Projects this staff member is on ──────────────────────────────────────
  const staffName = (staff.name || "").trim().toLowerCase();
  const staffProjects = React.useMemo(() =>
    projects.filter(p => !p.archived && (p.teamMembers || []).some(m =>
      m.name && m.name.trim().toLowerCase() === staffName
    )),
  [staff, projects]);

  // ── Active Work: WBS + RFIs + Submittals + Non-billable milestones ────────
  const activeWork = React.useMemo(() => {
    const items = [];
    const pStart = periodStart.getTime();
    const pEnd   = periodEnd.getTime();

    staffProjects.forEach(p => {
      const member = (p.teamMembers || []).find(m =>
        m.name && m.name.trim().toLowerCase() === staffName
      );
      if (!member) return;

      // WBS — disciplines on this project, prorated to the pay period
      const discs = member.disciplines || [];
      const totalFee = (p.phases || []).reduce((a, ph) => a + (ph.fee || 0), 0);
      const totalHrs = totalFee > 0 ? Math.round(totalFee / 170) : 0; // WBS_HOURLY_RATE
      const pmHrs  = Math.round(totalHrs * 0.08);
      const dpmHrs = Math.round(totalHrs * 0.02);
      const discHrs = totalHrs - pmHrs - dpmHrs;
      const discTotal = discs.length;
      let fullWbsHours = 0;
      if (member.role === "Project Manager") fullWbsHours = pmHrs;
      else if (member.role === "Deputy Project Manager") fullWbsHours = dpmHrs;
      else if (discTotal > 0) fullWbsHours = Math.round(discHrs / discTotal);

      // Prorate to pay period: find overlap of project phases with this period
      const activePhaseDays = (p.phases || [])
        .filter(ph => ph.startDate && ph.endDate)
        .reduce((sum, ph) => {
          const phStart = new Date(ph.startDate + "T00:00:00").getTime();
          const phEnd   = new Date(ph.endDate   + "T00:00:00").getTime();
          const overlapStart = Math.max(phStart, pStart);
          const overlapEnd   = Math.min(phEnd, pEnd);
          return overlapStart < overlapEnd ? sum + (overlapEnd - overlapStart) / 86400000 : sum;
        }, 0);
      const totalPhaseDays = Math.max(1, (p.phases || [])
        .filter(ph => ph.startDate && ph.endDate)
        .reduce((sum, ph) => {
          const s = new Date(ph.startDate + "T00:00:00").getTime();
          const e = new Date(ph.endDate   + "T00:00:00").getTime();
          return e > s ? sum + (e - s) / 86400000 : sum;
        }, 0));
      // If no phase dates, fall back to pay period / 260 working days per year
      const periodDays = (pEnd - pStart) / 86400000;
      const ratio = activePhaseDays > 0
        ? Math.min(1, activePhaseDays / totalPhaseDays)
        : periodDays / 260;
      const wbsHours = Math.round(fullWbsHours * ratio * 4) / 4; // round to quarter hour

      if (wbsHours > 0 || discs.length > 0) {
        items.push({
          id: "wbs-" + p.id,
          type: "wbs",
          projectId: p.id,
          projectName: p.name,
          projectNumber: p.projectNumber || "",
          label: (discs.length > 0 ? discs.join(", ") : member.role || "Engineering") + " — WBS",
          wbsHours,
          role: member.role,
          disciplines: discs,
        });
      }

      // Non-billable milestones due in period
      (p.milestones || [])
        .filter(ms => ms.type !== "billable" && ms.dueDate && !ms.cancelled) 
        .forEach(ms => {
          const d = new Date(ms.dueDate + "T00:00:00").getTime();
          if (d >= pStart && d <= pEnd) {
            items.push({
              id: "ms-" + ms.id,
              type: "milestone",
              projectId: p.id,
              projectName: p.name,
              projectNumber: p.projectNumber || "",
              label: ms.name,
              dueDate: ms.dueDate,
              pct: ms.pctComplete || 0,
            });
          }
        });

      // RFIs assigned to this staff member, due or closed in period
      (p.rfis || [])
        .filter(r => (r.assignedTo || []).some(sid => {
          const mbr = (p.teamMembers || []).find(m => m.id === sid);
          return mbr && mbr.name && mbr.name.trim().toLowerCase() === staffName;
        }))
        .forEach(r => {
          const due = r.dueDate ? new Date(r.dueDate + "T00:00:00").getTime() : null;
          const inPeriod = due && due >= pStart && due <= pEnd;
          const closedInPeriod = ["Responded","Closed"].includes(r.status);
          if (inPeriod || closedInPeriod) {
            items.push({
              id: "rfi-" + r.id,
              type: "rfi",
              projectId: p.id,
              projectName: p.name,
              projectNumber: p.projectNumber || "",
              label: (r.number || "RFI") + (r.title ? " — " + r.title : ""),
              dueDate: r.dueDate,
              status: r.status,
            });
          }
        });

      // Submittals assigned to this staff member, due or closed in period
      (p.submittals || [])
        .filter(s => (s.assignedTo || []).some(sid => {
          const mbr = (p.teamMembers || []).find(m => m.id === sid);
          return mbr && mbr.name && mbr.name.trim().toLowerCase() === staffName;
        }))
        .forEach(s => {
          const due = s.dueDate ? new Date(s.dueDate + "T00:00:00").getTime() : null;
          const inPeriod = due && due >= pStart && due <= pEnd;
          const closedInPeriod = ["Returned","Void"].includes(s.status);
          if (inPeriod || closedInPeriod) {
            items.push({
              id: "sub-" + s.id,
              type: "submittal",
              projectId: p.id,
              projectName: p.name,
              projectNumber: p.projectNumber || "",
              label: (s.number || "SUB") + (s.description ? " — " + s.description : ""),
              dueDate: s.dueDate,
              status: s.status,
            });
          }
        });
    });

    return items;
  }, [staffProjects, staffName, period, month, year]);

  // ── Calendar helpers ───────────────────────────────────────────────────────
  const GENERIC_KW = new Set(["the","a","an","of","for","and","or","at","in","on","to","by","with","from","new","york","city","nyc","building","phase","design","engineering","services","meeting","call","coordination","review"]);
  function projectKeywords(p) {
    return ((p.projectNumber || "") + " " + (p.name || ""))
      .split(/[\s\-\/,()&]+/)
      .map(w => w.replace(/[^a-zA-Z0-9]/g,"").toLowerCase())
      .filter(w => w.length >= 3 && !GENERIC_KW.has(w));
  }
  function matchEventToProject(subject) {
    const subj = subject.toLowerCase();
    let best = null, bestScore = 0;
    for (const p of staffProjects) {
      const score = projectKeywords(p).filter(kw => subj.includes(kw)).length;
      if (score > bestScore) { bestScore = score; best = p; }
    }
    return bestScore >= 1 ? best : null;
  }
  function eventHours(ev) {
    const s = new Date(ev.start?.dateTime || ev.start?.date);
    const e = new Date(ev.end?.dateTime   || ev.end?.date);
    if (!s || !e || isNaN(s) || isNaN(e)) return 0;
    return Math.round((e - s) / 36000) / 100;
  }

  async function searchCalendar() {
    setSearching(true); setCalEvents(null);
    try {
      const token = await getToken();
      const all = []; const seen = new Set();
      const calIds = [null];
      try {
        const cd = await graphFetch("GET", "/me/calendars?$top=50", undefined, token);
        (cd?.value || []).filter(c =>
          c.name.toLowerCase().includes("nyc") ||
          c.name.toLowerCase().includes("shared") ||
          c.name.toLowerCase().includes("setty")
        ).forEach(c => calIds.push(c.id));
      } catch(e) {}
      for (const calId of calIds) {
        const base = calId ? `/me/calendars/${calId}` : "/me";
        const url = `${base}/calendarView?startDateTime=${periodStart.toISOString()}&endDateTime=${periodEnd.toISOString()}&$top=100&$select=id,subject,start,end,isCancelled,showAs`;
        try {
          const resp = await graphFetch("GET", url, undefined, token);
          for (const ev of (resp?.value || [])) {
            if (!seen.has(ev.id) && !ev.isCancelled && ev.showAs !== "free") {
              seen.add(ev.id); all.push(ev);
            }
          }
        } catch(e) {}
      }
      all.sort((a,b) => new Date(a.start?.dateTime||a.start?.date) - new Date(b.start?.dateTime||b.start?.date));
      setCalEvents(all);

      // Build rows from calendar
      const hourMap = {};
      const unmatched = [];
      for (const ev of all) {
        const proj = matchEventToProject(ev.subject || "");
        const hrs  = eventHours(ev);
        if (proj) {
          if (!hourMap[proj.id]) hourMap[proj.id] = { project: proj, hours: 0, evts: [] };
          hourMap[proj.id].hours += hrs;
          hourMap[proj.id].evts.push(ev.subject);
        } else { unmatched.push(ev); }
      }
      const newRows = Object.values(hourMap).map(({ project, hours }) => ({
        id: "cal-" + project.id,
        projectId: project.id,
        projectName: project.name,
        projectNumber: project.projectNumber || "",
        hours: Math.round(hours * 4) / 4,
        notes: "",
        source: "calendar",
      }));
      if (unmatched.length > 0) {
        const uHrs = unmatched.reduce((a,ev) => a + eventHours(ev), 0);
        newRows.push({
          id: "__unmatched__",
          projectId: "__unmatched__",
          projectName: "\u26a0 Unmatched / Review",
          projectNumber: "",
          hours: Math.round(uHrs * 4) / 4,
          notes: "",
          source: "calendar",
        });
      }
      setRows(newRows);
    } catch(e) { setCalEvents([]); }
    finally { setSearching(false); }
  }

  function updateRow(id, field, val) { setRows(prev => prev.map(r => r.id===id ? {...r,[field]:val} : r)); }
  function removeRow(id) { setRows(prev => prev.filter(r => r.id!==id)); }
  function addExtraRow() { setExtraRows(prev => [...prev, { id: uid(), projectName: "", hours: "", notes: "" }]); }
  function updateExtra(id, field, val) { setExtraRows(prev => prev.map(r => r.id===id ? {...r,[field]:val} : r)); }
  function removeExtra(id) { setExtraRows(prev => prev.filter(r => r.id!==id)); }

  const allRows = [...rows, ...extraRows];
  const totalHours = allRows.reduce((a,r) => a + (parseFloat(r.hours)||0), 0);

  const typeColors = {
    wbs: { bg: P.accentDim, text: P.accentLight, label: "WBS" },
    milestone: { bg: "#1a2a1a", text: "#4ade80", label: "Milestone" },
    rfi: { bg: "#1a2233", text: "#60b4ff", label: "RFI" },
    submittal: { bg: "#2a1a3a", text: "#a78bfa", label: "SUB" },
  };

  return (
    <Modal title={"📋 Timesheet Helper — " + staff.name} onClose={onClose} wide>
      {/* Period selector */}
      <div style={{ display: "flex", gap: 12, alignItems: "flex-end", marginBottom: 16, flexWrap: "wrap" }}>
        <div>
          <label style={{ fontSize: 11, color: P.textDim, display: "block", marginBottom: 4 }}>Month</label>
          <select value={month} onChange={e => { setMonth(+e.target.value); resetPeriod(); }} style={{ fontSize: 13 }}>
            {TS_MONTHS.map((m,i) => <option key={i} value={i}>{m}</option>)}
          </select>
        </div>
        <div>
          <label style={{ fontSize: 11, color: P.textDim, display: "block", marginBottom: 4 }}>Year</label>
          <select value={year} onChange={e => { setYear(+e.target.value); resetPeriod(); }} style={{ fontSize: 13 }}>
            {YEARS.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div>
          <label style={{ fontSize: 11, color: P.textDim, display: "block", marginBottom: 4 }}>Period</label>
          <div style={{ display: "flex" }}>
            {["first","second"].map(p => (
              <button key={p} onClick={() => { setPeriod(p); resetPeriod(); }}
                style={{ padding: "6px 14px", fontSize: 12, fontWeight: period===p ? 700 : 400, cursor: "pointer",
                  background: period===p ? P.accent : P.card, color: period===p ? "#fff" : P.textMuted,
                  border: `1px solid ${P.accent}`,
                  borderRadius: p==="first" ? "6px 0 0 6px" : "0 6px 6px 0",
                  borderLeft: p==="second" ? "none" : undefined }}>
                {p==="first" ? "1st\u201315th" : "16th\u2013End"}
              </button>
            ))}
          </div>
        </div>
        <div style={{ fontSize: 11, color: P.textDim, alignSelf: "center" }}>{fmtPeriod}</div>
      </div>

      {/* Source tabs */}
      <div style={{ display: "flex", gap: 0, marginBottom: 16, borderBottom: `1px solid ${P.border}` }}>
        {[["calendar","📅 Calendar Import"],["active","📌 Active Work (PMS)"]].map(([key,label]) => (
          <button key={key} onClick={() => setActiveTab(key)}
            style={{ background: "none", border: "none", borderBottom: activeTab===key ? `2px solid ${P.accentLight}` : "2px solid transparent",
              color: activeTab===key ? P.accentLight : P.textDim, cursor: "pointer",
              fontSize: 12, fontWeight: activeTab===key ? 700 : 400, padding: "8px 16px", marginBottom: -1 }}>
            {label}
          </button>
        ))}
      </div>

      {/* Calendar tab */}
      {activeTab === "calendar" && (
        <div>
          <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 12 }}>
            <Btn onClick={searchCalendar} disabled={searching}>
              {searching ? "⏳ Searching…" : "🔍 Pull from Calendar"}
            </Btn>
            {calEvents !== null && (
              <span style={{ fontSize: 11, color: P.textDim }}>
                {calEvents.length} event{calEvents.length !== 1 ? "s" : ""} found · {rows.filter(r=>r.projectId!=="__unmatched__").length} projects matched
              </span>
            )}
          </div>
          {calEvents === null && !searching && (
            <div style={{ padding: "24px 0", textAlign: "center", color: P.textDim, fontSize: 13 }}>
              Click Pull from Calendar to search your Outlook calendar for this period.
            </div>
          )}
        </div>
      )}

      {/* Active Work tab */}
      {activeTab === "active" && (
        <div style={{ marginBottom: 12 }}>
          {activeWork.length === 0 ? (
            <div style={{ padding: "24px 0", textAlign: "center", color: P.textDim, fontSize: 13 }}>
              No WBS assignments, RFIs, Submittals, or milestones found for this period.
            </div>
          ) : (
            <div>
              <div style={{ fontSize: 11, color: P.textDim, marginBottom: 10 }}>
                {activeWork.length} item{activeWork.length !== 1 ? "s" : ""} found across {staffProjects.length} assigned project{staffProjects.length !== 1 ? "s" : ""}.
                These are reference only — review and transfer hours to the timesheet below.
              </div>
              <table style={{ width: "100%", marginBottom: 0 }}>
                <thead>
                  <tr>
                    <th>Type</th>
                    <th>Project</th>
                    <th>Item</th>
                    <th>Due / Status</th>
                    <th>WBS Hrs</th>
                  </tr>
                </thead>
                <tbody>
                  {activeWork.map((item, i) => {
                    const tc = typeColors[item.type] || typeColors.wbs;
                    return (
                      <tr key={item.id} style={{ background: i % 2 === 0 ? P.card : "transparent" }}>
                        <td>
                          <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 6px", borderRadius: 4,
                            background: tc.bg, color: tc.text, whiteSpace: "nowrap" }}>
                            {tc.label}
                          </span>
                        </td>
                        <td>
                          <div style={{ fontWeight: 500, fontSize: 12 }}>{item.projectName}</div>
                          {item.projectNumber && <div style={{ fontSize: 10, color: P.textDim }}>{item.projectNumber}</div>}
                        </td>
                        <td style={{ fontSize: 12 }}>
                          {item.label}
                          {item.disciplines && item.disciplines.length > 0 && (
                            <div style={{ fontSize: 10, color: P.textDim }}>{item.disciplines.join(", ")}</div>
                          )}
                        </td>
                        <td style={{ fontSize: 11, color: P.textDim, fontFamily: "JetBrains Mono" }}>
                          {item.dueDate && fmtDate(item.dueDate)}
                          {item.status && <span style={{ marginLeft: 4, color: ["Responded","Closed","Returned"].includes(item.status) ? P.green : P.yellow }}>
                            {item.status}
                          </span>}
                        </td>
                        <td style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: P.accentLight, textAlign: "center" }}>
                          {item.wbsHours > 0 ? item.wbsHours : "—"}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Timesheet table — always visible */}
      {(rows.length > 0 || extraRows.length > 0 || calEvents !== null) && (
        <>
          <div style={{ borderTop: `1px solid ${P.border}`, marginTop: 8, paddingTop: 14 }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 10, color: P.accentLight }}>
              📋 Timesheet — {fmtPeriod}
            </div>
            <div id="ts-print-area">
              <div style={{ marginBottom: 10 }}>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{staff.name} — Timesheet</div>
                <div style={{ fontSize: 12, color: P.textDim }}>{fmtPeriod}{staff.role ? " · " + staff.role : ""}</div>
              </div>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ background: P.accentDim }}>
                    <th style={{ textAlign: "left", padding: "7px 10px", fontSize: 11, color: P.accentLight, width: 100 }}>Project #</th>
                    <th style={{ textAlign: "left", padding: "7px 10px", fontSize: 11, color: P.accentLight }}>Project Name</th>
                    <th style={{ textAlign: "center", padding: "7px 10px", fontSize: 11, color: P.accentLight, width: 72 }}>Hours</th>
                    <th style={{ textAlign: "left", padding: "7px 10px", fontSize: 11, color: P.accentLight }}>Notes / Tasks</th>
                    <th style={{ width: 28 }} className="no-print"></th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r, i) => (
                    <tr key={r.id} style={{ background: i%2===0 ? P.card : "transparent", borderBottom: `1px solid ${P.border}`,
                      opacity: r.projectId==="__unmatched__" ? 0.7 : 1 }}>
                      <td style={{ padding: "6px 10px", fontSize: 11, fontFamily: "JetBrains Mono", color: P.textDim }}>{r.projectNumber}</td>
                      <td style={{ padding: "6px 10px", fontSize: 13, fontWeight: 500 }}>
                        {r.projectId==="__unmatched__"
                          ? <span style={{ color: P.yellow }}>{r.projectName}</span>
                          : r.projectName}
                      </td>
                      <td style={{ padding: "6px 10px", textAlign: "center" }}>
                        <input type="number" min={0} step={0.25} value={r.hours}
                          onChange={e => updateRow(r.id, "hours", e.target.value)}
                          style={{ width: 60, textAlign: "center", fontFamily: "JetBrains Mono", fontSize: 12 }} />
                      </td>
                      <td style={{ padding: "6px 10px" }}>
                        <input value={r.notes} onChange={e => updateRow(r.id, "notes", e.target.value)}
                          style={{ width: "100%", fontSize: 12 }} placeholder="Tasks, meetings, deliverables…" />
                      </td>
                      <td className="no-print" style={{ textAlign: "center" }}>
                        <button onClick={() => removeRow(r.id)}
                          style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 11 }}>✕</button>
                      </td>
                    </tr>
                  ))}
                  {extraRows.map((r, i) => (
                    <tr key={r.id} style={{ background: (rows.length+i)%2===0 ? P.card : "transparent", borderBottom: `1px solid ${P.border}` }}>
                      <td colSpan={2} style={{ padding: "6px 10px" }}>
                        <input value={r.projectName} onChange={e => updateExtra(r.id, "projectName", e.target.value)}
                          style={{ width: "100%", fontSize: 12 }} placeholder="Project name or description…" />
                      </td>
                      <td style={{ padding: "6px 10px", textAlign: "center" }}>
                        <input type="number" min={0} step={0.25} value={r.hours}
                          onChange={e => updateExtra(r.id, "hours", e.target.value)}
                          style={{ width: 60, textAlign: "center", fontFamily: "JetBrains Mono", fontSize: 12 }} />
                      </td>
                      <td style={{ padding: "6px 10px" }}>
                        <input value={r.notes} onChange={e => updateExtra(r.id, "notes", e.target.value)}
                          style={{ width: "100%", fontSize: 12 }} placeholder="Notes…" />
                      </td>
                      <td className="no-print" style={{ textAlign: "center" }}>
                        <button onClick={() => removeExtra(r.id)}
                          style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 11 }}>✕</button>
                      </td>
                    </tr>
                  ))}
                  <tr style={{ borderTop: `2px solid ${P.accent}`, background: P.accentDim }}>
                    <td colSpan={2} style={{ padding: "7px 10px", fontWeight: 700, fontSize: 13, color: P.accentLight }}>Total</td>
                    <td style={{ padding: "7px 10px", textAlign: "center", fontWeight: 700, fontFamily: "JetBrains Mono", fontSize: 14,
                      color: totalHours < 50 ? P.yellow : P.green }}>
                      {Math.round(totalHours * 100) / 100}
                    </td>
                    <td colSpan={2} style={{ padding: "7px 10px", fontSize: 11, color: P.textDim }}>
                      {totalHours < 50
                        ? "\u26a0 Under \u2014 check Active Work tab for missing items"
                        : "\u2713 Looks complete"}
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 12, alignItems: "center" }} className="no-print">
              <Btn small variant="ghost" onClick={addExtraRow}>+ Add Row</Btn>
              <Btn small variant="primary" onClick={() => window.print()}>🖨 Print / Save as PDF</Btn>
              <span style={{ fontSize: 11, color: P.textDim }}>Browser Print → Save as PDF</span>
            </div>
          </div>
        </>
      )}
    </Modal>
  );
}



function StaffDirectoryView({ staff, onUpdateStaff, projects = [], onNavigateToProject, onUpdateProject }) {
  const [editingId, setEditingId] = React.useState(null); // null=list, "__new__"=new, id=editing
  const [form, setForm] = React.useState(null);
  const [search, setSearch] = React.useState("");
  const [expandedStaff, setExpandedStaff] = React.useState({});
  const [staffRfiModal, setStaffRfiModal] = React.useState(null);
  const [staffSubModal, setStaffSubModal] = React.useState(null);
  const [timesheetStaff, setTimesheetStaff] = React.useState(null); // staff member to generate timesheet for

  // Build lookup: staffName → upcoming milestones across all active projects
  const activeProjects = React.useMemo(() =>
    projects.filter(p => !p.archived && isAwarded(p) && p.status !== "Completed" && p.status !== "Cancelled"),
  [projects]);

  const now = new Date();
  const staffMilestones = React.useMemo(() => {
    const map = {};
    activeProjects.forEach(p => {
      const memberById = {};
      (p.teamMembers || []).forEach(m => { if (m.id) memberById[m.id] = m; });
      // Regular milestones
      (p.teamMembers || []).forEach(m => {
        if (!m.name) return;
        const key = m.name.trim().toLowerCase();
        if (!map[key]) map[key] = [];
        (p.milestones || [])
          .filter(ms => !ms.cancelled && ms.dueDate && milestoneStatus(ms.pctComplete) !== "Completed")
          .forEach(ms => map[key].push({ ms, project: p, role: m.role, disciplines: m.disciplines, itemType: "milestone" }));
      });
      // RFIs assigned to staff
      (p.rfis || []).filter(r => !["Closed","Void","Responded"].includes(r.status) && r.dueDate)
        .forEach(r => (r.assignedTo || []).forEach(sid => {
          const mbr = memberById[sid];
          if (!mbr || !mbr.name) return;
          const key = mbr.name.trim().toLowerCase();
          if (!map[key]) map[key] = [];
          map[key].push({ ms: { id: r.id, name: r.number + (r.title ? " — " + r.title : ""), dueDate: r.dueDate, pctComplete: 0, status: r.status }, project: p, role: mbr.role, itemType: "rfi", _rfi: r, _project: p });
        }));
      // Submittals assigned to staff
      (p.submittals || []).filter(s => !["Returned","Void"].includes(s.status) && s.dueDate)
        .forEach(s => (s.assignedTo || []).forEach(sid => {
          const mbr = memberById[sid];
          if (!mbr || !mbr.name) return;
          const key = mbr.name.trim().toLowerCase();
          if (!map[key]) map[key] = [];
          map[key].push({ ms: { id: s.id, name: s.number + (s.description ? " — " + s.description : ""), dueDate: s.dueDate, pctComplete: 0, status: s.status }, project: p, role: mbr.role, itemType: "submittal", _sub: s, _project: p });
        }));
    });
    Object.values(map).forEach(arr => arr.sort((a, b) => (a.ms.dueDate||"").localeCompare(b.ms.dueDate||"")));
    return map;
  }, [activeProjects]);

  function startNew() {
    setForm(newStaffMember());
    setEditingId("__new__");
  }

  function startEdit(s) {
    setForm({ ...s });
    setEditingId(s.id);
  }

  function cancelEdit() {
    setEditingId(null);
    setForm(null);
  }

  function saveForm() {
    if (!form.name.trim()) return;
    if (editingId === "__new__") {
      onUpdateStaff([...staff, form]);
    } else {
      onUpdateStaff(staff.map(s => s.id === editingId ? form : s));
    }
    cancelEdit();
  }

  function deleteStaff(id) {
    if (!window.confirm("Remove this staff member from the directory? They will remain on any projects they are already assigned to.")) return;
    onUpdateStaff(staff.filter(s => s.id !== id));
  }

  function toggleDisc(disc) {
    const discs = form.disciplines || [];
    setForm({ ...form, disciplines: discs.includes(disc) ? discs.filter(d => d !== disc) : [...discs, disc] });
  }

  const filtered = staff.filter(s =>
    !search || s.name.toLowerCase().includes(search.toLowerCase()) || (s.email || "").toLowerCase().includes(search.toLowerCase()) || (s.role || "").toLowerCase().includes(search.toLowerCase())
  );

  if (editingId !== null) {
    return (
      <div style={{ padding: "24px 32px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
          <button onClick={cancelEdit} style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 18 }}>←</button>
          <div style={{ fontSize: 20, fontWeight: 800 }}>{editingId === "__new__" ? "Add Staff Member" : "Edit Staff Member"}</div>
        </div>
        <div style={{ background: P.card, border: "1px solid " + P.border, borderRadius: 12, padding: 28, maxWidth: 540 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <Field label="Full Name" style={{ gridColumn: "1 / -1" }}>
              <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })}
                placeholder="e.g. Jane Smith" style={{ width: "100%" }} autoFocus />
            </Field>
            <Field label="Email">
              <input value={form.email || ""} onChange={e => setForm({ ...form, email: e.target.value })}
                placeholder="e.g. jane@setty.com" style={{ width: "100%" }} type="email" />
            </Field>
            <Field label="Default Role / Title">
              <input value={form.role || ""} onChange={e => setForm({ ...form, role: e.target.value })}
                placeholder="e.g. Mechanical Engineer" style={{ width: "100%" }} />
            </Field>
            <Field label="Default Billing Rate ($/hr)" style={{ gridColumn: "1 / -1" }}>
              <input type="number" value={form.rate || ""} onChange={e => setForm({ ...form, rate: +e.target.value })}
                placeholder="0" style={{ width: 160 }} />
            </Field>
            <Field label="Default Disciplines" style={{ gridColumn: "1 / -1" }}>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {["Mechanical", "Electrical", "Plumbing", "Fire Protection"].map(d => {
                  const on = (form.disciplines || []).includes(d);
                  const dc = { "Mechanical": { bg: "#1a2a3a", text: "#60b4ff" }, "Electrical": { bg: "#2a1a3a", text: "#c084fc" }, "Plumbing": { bg: "#1a3a2a", text: "#34d399" }, "Fire Protection": { bg: "#3a1a1a", text: "#f87171" } }[d];
                  return (
                    <button key={d} onClick={() => toggleDisc(d)}
                      style={{ fontSize: 12, fontWeight: 600, padding: "5px 12px", borderRadius: 8, cursor: "pointer",
                        background: on ? dc.bg : "transparent", color: on ? dc.text : P.textDim,
                        border: "1px solid " + (on ? dc.text : P.border) }}>
                      {d}
                    </button>
                  );
                })}
              </div>
              <div style={{ fontSize: 11, color: P.textDim, marginTop: 6 }}>These defaults pre-fill when adding this person to a project team — editable per project.</div>
            </Field>
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
            <Btn onClick={saveForm} disabled={!form.name.trim()}>{editingId === "__new__" ? "Add to Directory" : "Save Changes"}</Btn>
            <Btn variant="ghost" onClick={cancelEdit}>Cancel</Btn>
          </div>
        </div>
      </div>
    );
  }

  return (
    <>
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>Staff Directory</div>
          <div style={{ fontSize: 13, color: P.textMuted }}>{staff.length} staff member{staff.length !== 1 ? "s" : ""} · names auto-suggest when assigning to project teams</div>
        </div>
        <Btn onClick={startNew}>+ Add Staff Member</Btn>
      </div>

      <input placeholder="Search by name, email, or role…" value={search} onChange={e => setSearch(e.target.value)}
        style={{ width: 300, marginBottom: 16 }} />

      {filtered.length === 0 ? (
        <div style={{ background: P.card, border: "1px solid " + P.border, borderRadius: 10, padding: 40, textAlign: "center", color: P.textDim, fontSize: 13 }}>
          {staff.length === 0
            ? <><div style={{ fontSize: 32, marginBottom: 12 }}>👥</div><div style={{ fontWeight: 600, marginBottom: 6 }}>No staff yet</div><div>Add your team members here so their names, roles, and rates auto-fill when assigning to projects.</div><div style={{ marginTop: 16 }}><Btn onClick={startNew}>+ Add First Staff Member</Btn></div></>
            : "No staff match your search."}
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {filtered.map(s => {
            const key = s.name.trim().toLowerCase();
            const milEntries = staffMilestones[key] || [];
            const overdue = milEntries.filter(({ ms }) => new Date(ms.dueDate) < now);
            const upcoming = milEntries.filter(({ ms }) => new Date(ms.dueDate) >= now).slice(0, 10);
            const isExpanded = !!expandedStaff[s.id];
            const dcMap = { "Mechanical": { bg: "#1a2a3a", text: "#60b4ff" }, "Electrical": { bg: "#2a1a3a", text: "#c084fc" }, "Plumbing": { bg: "#1a3a2a", text: "#34d399" }, "Fire Protection": { bg: "#3a1a1a", text: "#f87171" } };

            return (
              <div key={s.id} style={{ background: P.card, border: "1px solid " + (isExpanded ? P.accent : P.border), borderRadius: 10, overflow: "hidden", transition: "border-color .15s" }}>
                {/* Staff header row */}
