function uid() { return Math.random().toString(36).slice(2,10); }

function addWorkDays(startDate, days) {
  let d = new Date(startDate);
  let count = 0;
  while (count < days) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  return d;
}

function fmt(n) {
  if (n == null || isNaN(n)) return "$0";
  return "$" + Math.round(n).toLocaleString();
}

function fmtPct(n) { return (n * 100).toFixed(1) + "%"; }

function getFeePercent(constructionCost, projectType) {
  const row = FEE_PERCENT_TABLE.find(r => constructionCost >= r.min && constructionCost < r.max)
    || FEE_PERCENT_TABLE[FEE_PERCENT_TABLE.length - 1];
  return row.pct[projectType] || 0.06;
}

function calcConstructionCost(sqft, category, manualCost, manualCostPerSF) {
  if (manualCost && manualCost > 0) return manualCost;
  const costPerSF = (manualCostPerSF && manualCostPerSF > 0) ? manualCostPerSF : (RS_MEANS_COST_PER_SF[category] || 300);
  return sqft * costPerSF;
}

// Returns effective discipline percentages — overrides merged on top of defaults
function getEffectiveDisciplines(project) {
  const defaults = DISCIPLINE_PERCENTAGES[project.projectType] || {};
  const overrides = project.disciplinePercentOverrides || {};
  const result = {};
  for (const disc of Object.keys(defaults)) {
    result[disc] = overrides[disc] != null ? overrides[disc] : defaults[disc];
  }
  return result;
}

function calcAEFee(constructionCost, project) {
  // Total AE fee = construction cost × fee percentage from table
  const pct = getFeePercent(constructionCost, project.projectType);
  return constructionCost * pct;
}

function calcSettyFee(constructionCost, project) {
  // Setty fee = AE fee × sum of discipline percentages (each disc % is a share of AE fee)
  const aeFee = calcAEFee(constructionCost, project);
  const discs = getEffectiveDisciplines(project);
  const settyShare = Object.values(discs).reduce((a, b) => a + b, 0);
  return aeFee * settyShare;
}

function countWorkDays(startDate, endDate) {
  if (!startDate || !endDate) return 0;
  let sd = new Date(startDate + "T00:00:00");
  const ed = new Date(endDate + "T00:00:00");
  if (ed <= sd) return 0;
  let count = 0;
  const d = new Date(sd);
  while (d <= ed) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
    d.setDate(d.getDate() + 1);
  }
  return count;
}

function buildPhaseFees(settyFee, phases) {
  const total = phases.filter(p => p.billable).reduce((a, p) => a + p.pct, 0);
  return phases.map(p => {
    const calcedFee = p.billable && total > 0 ? settyFee * (p.pct / total) : 0;
    const fee = (p.billable && p.manualFee > 0) ? p.manualFee : calcedFee;
    return { ...p, fee, calcedFee };
  });
}

function buildSchedule(startDate, phases) {
  let cursor = startDate ? new Date(startDate + "T00:00:00") : new Date();
  const GAP_DAYS = 10;
  return phases.map(ph => {
    if (!ph.billable || ph.fee === 0) return { ...ph, startDate: null, endDate: null };
    const durationWD = PHASE_DURATIONS_WD[ph.code] || 30;
    const sd = new Date(cursor);
    const ed = addWorkDays(sd, durationWD);
    cursor = addWorkDays(ed, GAP_DAYS);
    const sdStr = sd.getFullYear() + "-" + String(sd.getMonth()+1).padStart(2,"0") + "-" + String(sd.getDate()).padStart(2,"0");
    const edStr = ed.getFullYear() + "-" + String(ed.getMonth()+1).padStart(2,"0") + "-" + String(ed.getDate()).padStart(2,"0");
    return { ...ph, startDate: sdStr, endDate: edStr };
  });
}

// Milestone status auto-derived from pctComplete
function milestoneStatus(pct) {
  if (!pct || pct === 0) return "Not Started";
  if (pct >= 100) return "Completed";
  return "In Progress";
}

// Phase pctComplete is derived from its billable milestones
function getPhasePctFromMilestones(phase, milestones) {
  const matching = milestones.filter(m => m.type === "billable" && m.phase === phase.code);
  if (!matching.length) return phase.pctComplete || 0;
  return Math.round(matching.reduce((a, m) => a + (m.pctComplete || 0), 0) / matching.length);
}

function projectOverallPct(project) {
  if (!project.feeScheduleFinalized || !project.phases?.length) return 0;
  const billable = project.phases.filter(p => p.billable && p.fee > 0);
  if (!billable.length) return 0;
  const milestones = project.milestones || [];
  const totalFee = billable.reduce((a, p) => a + p.fee, 0);
  const earned = billable.reduce((a, p) => {
    const pct = getPhasePctFromMilestones(p, milestones);
    return a + p.fee * pct / 100;
  }, 0);
  return totalFee > 0 ? Math.round(earned / totalFee * 100) : 0;
}

async function graphFetch(method, path, body, token) {
  const t = token || await getToken();
  const isBytes = body instanceof Uint8Array;

  const headers = { Authorization: "Bearer " + t };
  let reqBody;
  if (body !== undefined) {
    if (isBytes) {
      headers["Content-Type"] = "application/octet-stream";
      reqBody = body;
    } else {
      headers["Content-Type"] = "application/json";
      reqBody = JSON.stringify(body);
    }
  }

  console.log("graphFetch", method, path, reqBody ? reqBody.slice(0, 200) : "(no body)");

  const makeReq = (tok) => fetch(GRAPH_BASE + path, {
    method,
    headers: { ...headers, Authorization: "Bearer " + tok },
    ...(reqBody !== undefined ? { body: reqBody } : {}),
  });

  let resp = await makeReq(t);
  if (resp.status === 401) {
    const fresh = await getToken(true);
    resp = await makeReq(fresh);
  }
  if (resp.status === 204 || resp.status === 202) return null;
  if (resp.status === 404) return null;
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error("Graph " + resp.status + ": " + txt.slice(0, 300));
  }
  return resp.json();
}

// ── File path helpers ──
// Primary: signed-in user's OneDrive › SettyPMS › setty-pms-data.json
// If a shared item ID is stored (from setup), use that drive item directly.
// This means whoever runs setup first owns the file; everyone else accesses
// it via the shared driveItem URL they paste in setup.

// Encode a share URL into the Graph API sharing token format
function encodeShareUrl(url) {
  const encoded = btoa("u!" + url)
    .replace(/=/g, "").replace(/\+/g, "-").replace(/\//g, "_");
  return encoded;
}

// Own OneDrive path (used by first user / data owner)
function ownFileUrl(token) {
  return `${GRAPH_BASE}/me/drive/root:/${OD_FOLDER}/${OD_FILE}:/content`;
}

// Resolve the correct content URL for reading/writing the data file.
// Strategy:
//   1. If a share URL is configured, use Graph /shares endpoint to get the
//      driveId + itemId of the shared file, then use those for content access.
//      This avoids the broken /shares/{id}/driveItem/content PUT pattern.
//   2. Fall back to the signed-in user's own OneDrive (first-run / owner).
let _resolvedContentUrl = null; // cached after first resolve

async function resolveContentUrl(token, forceRefresh = false) {
  if (_resolvedContentUrl && !forceRefresh) return _resolvedContentUrl;

  const shareUrl = localStorage.getItem("setty_pms_share_url") || "";
  if (!shareUrl) {
    _resolvedContentUrl = ownFileUrl(token);
    return _resolvedContentUrl;
  }

  // Step 1: decode the share URL to get driveId + itemId
  try {
    const encoded = encodeShareUrl(shareUrl);
    const metaResp = await fetch(`${GRAPH_BASE}/shares/${encoded}/driveItem`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (metaResp.ok) {
      const meta = await metaResp.json();
      const driveId = meta.parentReference?.driveId;
      const itemId  = meta.id;
      if (driveId && itemId) {
        // Use drives/{driveId}/items/{itemId}/content — works for GET and PUT
        _resolvedContentUrl = `${GRAPH_BASE}/drives/${driveId}/items/${itemId}/content`;
        return _resolvedContentUrl;
      }
    }
    console.warn("Could not resolve share URL via Graph, falling back to own drive");
  } catch(e) {
    console.warn("Share URL resolution failed:", e.message);
  }

  // Fallback
  _resolvedContentUrl = ownFileUrl(token);
  return _resolvedContentUrl;
}

async function loadState() {
  try {
    const token = await getToken();
    const url = await resolveContentUrl(token);

    const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (resp.status === 404) return null;
    if (!resp.ok) {
      const txt = await resp.text();
      throw new Error(`Graph ${resp.status}: ${txt.slice(0, 200)}`);
    }
    return await resp.json();
  } catch(e) {
    if (e.message === "NO_CLIENT_ID") throw e;
    if (e.message?.includes("404")) return null;
    console.warn("loadState:", e.message);
    throw e;
  }
}

async function saveState(state) {
  const token = await getToken();
  const payload = new TextEncoder().encode(
    JSON.stringify({ ...state, _savedAt: new Date().toISOString(), _version: 3 }, null, 2)
  );

  // Try resolved URL first
  const url = await resolveContentUrl(token);
  const resp = await fetch(url, {
    method: "PUT",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/octet-stream" },
    body: payload,
  });

  if (!resp.ok) {
    const txt = await resp.text();
    // If resolved URL failed, force re-resolve and retry once
    _resolvedContentUrl = null;
    const url2 = await resolveContentUrl(token, true);
    if (url2 !== url) {
      const resp2 = await fetch(url2, {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/octet-stream" },
        body: payload,
      });
      if (resp2.ok) return;
    }
    throw new Error(`Save failed ${resp.status}: ${txt.slice(0, 200)}`);
  }
}

async function createOrUpdateCalendarEvent(milestone, projectName, projectNumber, existingEventId) {
  if (!milestone.dueDate) return { success: false, error: "No due date" };

  // Compute end date (next day — Outlook all-day events use exclusive end)
  const endDateObj = new Date(milestone.dueDate + "T12:00:00");
  endDateObj.setDate(endDateObj.getDate() + 1);
  const endDate = endDateObj.toISOString().slice(0, 10);

  const prefix = projectNumber ? "[" + projectNumber + "] " : "";
  const subject = prefix + projectName + " - " + milestone.name;

  const eventBody = {
    subject: subject,
    isAllDay: true,
    start: { dateTime: milestone.dueDate + "T00:00:00", timeZone: "Eastern Standard Time" },
    end:   { dateTime: endDate + "T00:00:00",           timeZone: "Eastern Standard Time" },
  };

  console.log("Calendar event body:", JSON.stringify(eventBody));

  // Build the correct calendar path
  async function calPath(eventId) {
    const calId = await getNYCCalendarId();
    const base = calId ? "/me/calendars/" + calId : "/me";
    if (eventId) return base + "/events/" + eventId;
    return base + "/events";
  }

  const calId = await getNYCCalendarId();
  const postedToShared = !!calId;

  try {
    let result;
    if (existingEventId) {
      const patchPath = await calPath(existingEventId);
      result = await graphFetch("PATCH", patchPath, eventBody);
      if (!result) result = await graphFetch("POST", await calPath(null), eventBody);
    } else {
      result = await graphFetch("POST", await calPath(null), eventBody);
    }
    return {
      success: true,
      eventId: result?.id,
      warning: postedToShared ? null : "Added to your personal calendar — NYC Shared Calendar was not found in your account. Ask Sara to check sharing permissions.",
    };
  } catch(e) {
    return { success: false, error: e.message };
  }
}

// ─── FEE CALCULATOR ──────────────────────────────────────────────────────────

function FeeCalculator({ project, onChange }) {
  const constructionCost = calcConstructionCost(project.squareFootage, project.buildingCategory, project.manualConstructionCost, project.manualRSMeansCostPerSF);
  const effectiveDiscs = getEffectiveDisciplines(project);
  const aeFee = calcAEFee(constructionCost, project);
  const calcedFee = calcSettyFee(constructionCost, project);
  const baseFee = project.manualSettyFee > 0 ? project.manualSettyFee : calcedFee;
  const phases = project.phases || [];
  const phasedFees = buildPhaseFees(baseFee, phases);
  const defaultDiscs = DISCIPLINE_PERCENTAGES[project.projectType] || {};
  const overrides = project.disciplinePercentOverrides || {};

  function setField(field, val) {
    onChange({ ...project, [field]: val });
  }

  function setDisciplineOverride(disc, rawVal) {
    // rawVal is already divided by 100 before calling this
    const val = +rawVal;
    const newOverrides = { ...overrides };
    if (Math.abs(val - (defaultDiscs[disc] || 0)) < 0.000001) {
      delete newOverrides[disc];
    } else {
      newOverrides[disc] = val;
    }
    onChange({ ...project, disciplinePercentOverrides: newOverrides });
  }

  function clearDisciplineOverrides() {
    onChange({ ...project, disciplinePercentOverrides: {} });
  }

  function updatePhase(idx, updates) {
    const newPhases = phases.map((p, i) => i === idx ? { ...p, ...updates } : p);
    onChange({ ...project, phases: buildSchedule(project.startDate, newPhases) });
  }

  function movePhase(idx, dir) {
    const newPhases = [...phases];
    const target = idx + dir;
    if (target < 0 || target >= newPhases.length) return;
    [newPhases[idx], newPhases[target]] = [newPhases[target], newPhases[idx]];
    onChange({ ...project, phases: buildSchedule(project.startDate, newPhases) });
  }

  function addPhase() {
    const newPhases = [...phases, { id: uid(), code: `PH${phases.length + 1}`, name: "Custom Phase", pct: 0, billable: true, fee: 0, pctComplete: 0 }];
    onChange({ ...project, phases: buildSchedule(project.startDate, newPhases) });
  }

  // finalizeSchedule replaced by doLock (which also captures audit entry)

  const totalPhasePct = phases.filter(p => p.billable).reduce((a, p) => a + p.pct, 0);
  const totalPhaseFee = phasedFees.filter(p => p.billable).reduce((a, p) => a + p.fee, 0);
  const phaseFeeVar = totalPhaseFee - baseFee;
  const phaseFeeOk = Math.abs(phaseFeeVar) < 0.5;
  const discTotal = Object.values(effectiveDiscs).reduce((a, b) => a + b, 0);
  const hasOverrides = Object.keys(overrides).length > 0;
  const [showLegend, setShowLegend] = useState(false);
  const [showLockModal, setShowLockModal] = useState(false);
  const [lockNote, setLockNote] = useState("");
  const [showAudit, setShowAudit] = useState(false);
  const auditLog = project.feeAuditLog || [];

  function doLock() {
    const entry = {
      id: uid(),
      action: "locked",
      user: getCurrentUser(),
      date: new Date().toISOString(),
      note: lockNote.trim(),
      settyFee: baseFee,
      totalPhaseFee,
      phases: phasedFees.filter(p => p.billable).map(p => ({ code: p.code, name: p.name, fee: p.fee })),
    };
    const finalized = buildPhaseFees(baseFee, phases);
    const scheduled = buildSchedule(project.startDate, finalized);
    const existingNonBillable = (project.milestones || []).filter(m => m.type !== "billable");
    const newBillable = scheduled.filter(p => p.billable && p.fee > 0).map(p => ({
      id: uid(), type: "billable", phase: p.code, name: p.name, fee: p.fee,
      startDate: p.startDate, dueDate: p.endDate, pctComplete: 0, notes: "",
    }));
    onChange({ ...project, phases: scheduled, feeScheduleFinalized: true,
      milestones: [...existingNonBillable, ...newBillable],
      lockedSettyFee: baseFee,
      feeAuditLog: [...auditLog, entry] });
    setShowLockModal(false);
    setLockNote("");
  }

  function doUnlock() {
    const entry = {
      id: uid(),
      action: "unlocked",
      user: getCurrentUser(),
      date: new Date().toISOString(),
      note: lockNote.trim(),
    };
    onChange({ ...project, feeScheduleFinalized: false, feeAuditLog: [...auditLog, entry] });
    setShowLockModal(false);
    setLockNote("");
  }

  const PROJECT_TYPE_LEGEND = [
    { type: "Type I", desc: "Simple, low-complexity building — single discipline, minimal coordination. Examples: storage facilities, simple warehouses, basic shell buildings." },
    { type: "Type II", desc: "Standard commercial construction — moderate complexity, common MEP systems. Examples: offices, retail, standard schools, light industrial." },
    { type: "Type III", desc: "Above-average complexity — specialized systems or multiple disciplines with coordination needs. Examples: mid-rise mixed-use, higher-ed classrooms, mid-complexity healthcare." },
    { type: "Type IV", desc: "High complexity — multiple interacting systems, strict code requirements, or specialty environments. Examples: hospitals, research buildings, data centers, airports." },
    { type: "Type V", desc: "Very high complexity — process-driven or mission-critical facilities with significant MEP intensity. Examples: pharmaceutical plants, advanced labs, clean rooms, cogen plants." },
    { type: "Type VI", desc: "Maximum complexity — highly engineered, MEP-dominant projects. Examples: semiconductor fabs, nuclear facilities, advanced research centers, specialized industrial." },
  ];

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
        <Field label="Project Type">
          <select value={project.projectType} onChange={e => setField("projectType", e.target.value)} style={{ width: "100%" }}>
            {PROJECT_TYPES.map(t => <option key={t}>{t}</option>)}
          </select>
          <button onClick={() => setShowLegend(v => !v)}
            style={{ marginTop: 6, background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontSize: 12, padding: 0, display: "flex", alignItems: "center", gap: 4 }}>
            <span>{showLegend ? "▾" : "▸"}</span> {showLegend ? "Hide" : "What do the types mean?"}
          </button>
        </Field>
        <Field label="Building Category (RS Means)">
          <select value={project.buildingCategory} onChange={e => setField("buildingCategory", e.target.value)} style={{ width: "100%" }}>
            {Object.keys(RS_MEANS_COST_PER_SF).map(k => <option key={k}>{k}</option>)}
          </select>
        </Field>
        <Field label="Square Footage">
          <input type="number" value={project.squareFootage || ""} onChange={e => setField("squareFootage", +e.target.value)} placeholder="0" style={{ width: "100%" }} />
        </Field>
        <Field label="Manual Construction Cost (overrides SF calc)">
          <input type="number" value={project.manualConstructionCost || ""} onChange={e => setField("manualConstructionCost", +e.target.value)} placeholder="Leave 0 to use SF × Cost/SF" style={{ width: "100%" }} />
        </Field>
        <Field label="Project Start Date">
          <input type="date" value={project.startDate || ""} onChange={e => setField("startDate", e.target.value)} style={{ width: "100%" }} />
        </Field>
      </div>

      {/* Project type legend */}
      {showLegend && (
        <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, padding: 18, marginBottom: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 14, color: P.accentLight }}>📋 Project Construction Type Guide</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {PROJECT_TYPE_LEGEND.map(({ type, desc }) => {
              const isNewSelected = project.projectType.startsWith(type) && project.projectType.includes("New");
              const isRenSelected = project.projectType.startsWith(type) && project.projectType.includes("Renovation");
              const isAnySelected = project.projectType.startsWith(type);
              return (
                <div key={type} style={{ background: isAnySelected ? P.accentDim : P.card, border: `1px solid ${isAnySelected ? P.accent : P.border}`, borderRadius: 8, padding: "10px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                    <span style={{ fontWeight: 700, fontSize: 13, color: isAnySelected ? P.accentLight : P.text }}>{type}</span>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => setField("projectType", type + " New Construction")}
                        style={{ padding: "2px 8px", borderRadius: 4, fontSize: 11, cursor: "pointer", border: `1px solid ${isNewSelected ? P.accent : P.border}`, background: isNewSelected ? P.accent : "transparent", color: isNewSelected ? "#fff" : P.textMuted }}>
                        New
                      </button>
                      <button onClick={() => setField("projectType", type + " Renovation")}
                        style={{ padding: "2px 8px", borderRadius: 4, fontSize: 11, cursor: "pointer", border: `1px solid ${isRenSelected ? P.accent : P.border}`, background: isRenSelected ? P.accent : "transparent", color: isRenSelected ? "#fff" : P.textMuted }}>
                        Reno
                      </button>
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: P.textMuted, lineHeight: 1.5 }}>{desc}</div>
                </div>
              );
            })}
          </div>
          <div style={{ marginTop: 12, fontSize: 11, color: P.textDim }}>
            💡 Renovation projects carry higher fee percentages than New Construction of the same type due to complexity of working in existing conditions.
          </div>
        </div>
      )}

      {/* Summary bar */}
      <div style={{ background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, padding: "14px 18px", marginBottom: 24, display: "flex", gap: 32, flexWrap: "wrap" }}>
        <div>
          <div style={{ fontSize: 11, color: P.textDim, marginBottom: 4 }}>RS MEANS COST/SF</div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontWeight: 700, color: project.manualRSMeansCostPerSF > 0 ? P.yellow : P.text }}>
              ${(project.manualRSMeansCostPerSF > 0 ? project.manualRSMeansCostPerSF : RS_MEANS_COST_PER_SF[project.buildingCategory] || 300).toLocaleString()}/sf
            </span>
            {project.manualRSMeansCostPerSF > 0 && (
              <span style={{ fontSize: 11, color: P.yellow, background: P.yellowDim, padding: "2px 8px", borderRadius: 10 }}>Custom</span>
            )}
          </div>
          <div style={{ marginTop: 6 }}>
            <label style={{ fontSize: 11, color: P.textDim, display: "block", marginBottom: 4 }}>Override $/SF:</label>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <input type="number" min="0" step="5"
                value={project.manualRSMeansCostPerSF || ""}
                onChange={e => setField("manualRSMeansCostPerSF", +e.target.value)}
                placeholder={String(RS_MEANS_COST_PER_SF[project.buildingCategory] || 300)}
                style={{ width: 90, borderColor: project.manualRSMeansCostPerSF > 0 ? P.yellow : P.border }}
              />
              {project.manualRSMeansCostPerSF > 0 && (
                <button onClick={() => setField("manualRSMeansCostPerSF", 0)}
                  style={{ background: "none", color: P.yellow, fontSize: 13, border: "none", cursor: "pointer" }} title="Reset to default">↺</button>
              )}
            </div>
          </div>
        </div>
        <div><div style={{ fontSize: 11, color: P.textDim, marginBottom: 4 }}>CONSTRUCTION COST</div><div style={{ fontWeight: 700 }}>{fmt(constructionCost)}</div></div>
        <div><div style={{ fontSize: 11, color: P.textDim, marginBottom: 4 }}>AE FEE %</div><div style={{ fontWeight: 700 }}>{fmtPct(getFeePercent(constructionCost, project.projectType))}</div></div>
        <div><div style={{ fontSize: 11, color: P.textDim, marginBottom: 4 }}>TOTAL AE FEE</div><div style={{ fontWeight: 700 }}>{fmt(aeFee)}</div></div>
        <div style={{ borderLeft: `2px solid ${project.manualSettyFee > 0 ? P.yellow : P.accent}`, paddingLeft: 16 }}>
          <div style={{ fontSize: 11, color: P.textDim, marginBottom: 6 }}>
            SETTY FEE (MEP+FP)
            {project.manualSettyFee > 0 && <span style={{ marginLeft: 6, fontSize: 10, color: P.yellow, background: P.yellowDim, padding: "1px 6px", borderRadius: 8 }}>overridden</span>}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
            <input
              type="number" min="0" step="1000"
              value={project.manualSettyFee || ""}
              onChange={e => setField("manualSettyFee", +e.target.value)}
              placeholder={fmt(calcedFee)}
              style={{ width: 130, fontWeight: 700, fontSize: 14, color: project.manualSettyFee > 0 ? P.yellow : P.green, borderColor: project.manualSettyFee > 0 ? P.yellow : P.border }}
            />
            {project.manualSettyFee > 0 && (
              <button onClick={() => setField("manualSettyFee", 0)}
                style={{ background: "none", color: P.yellow, fontSize: 13, border: "none", cursor: "pointer" }} title="Reset to calculated fee">↺</button>
            )}
          </div>
          <div style={{ fontSize: 10, color: P.textDim }}>
            {project.manualSettyFee > 0 ? `Calc: ${fmt(calcedFee)}` : `${fmtPct(discTotal)} of AE fee`}
          </div>
        </div>
      </div>

      {/* ── Discipline Fees with overrides ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontWeight: 700, fontSize: 13 }}>
          Discipline Fees
          {hasOverrides && (
            <span style={{ marginLeft: 8, fontSize: 11, color: P.yellow, background: P.yellowDim, padding: "2px 8px", borderRadius: 10 }}>
              Custom overrides active
            </span>
          )}
        </div>
        {hasOverrides && <Btn small variant="ghost" onClick={clearDisciplineOverrides}>↺ Reset All to Defaults</Btn>}
      </div>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 10 }}>
        Edit the "Override %" column to adjust any discipline's share of the total fee. Click ↺ next to a row to revert it individually.
      </div>
      <table style={{ marginBottom: 24 }}>
        <thead>
          <tr>
            <th>Discipline</th>
            <th>Default % of AE Fee</th>
            <th>Override % of AE Fee <span style={{ fontWeight: 400 }}>(edit to customize)</span></th>
            <th>Fee Amount</th>
          </tr>
        </thead>
        <tbody>
          {Object.entries(defaultDiscs).map(([disc, defaultPct]) => {
            const effective = effectiveDiscs[disc] ?? defaultPct;
            const isOverridden = overrides[disc] != null;
            const feeAmt = aeFee * effective; // each disc % applied directly to AE fee
            return (
              <tr key={disc}>
                <td style={{ fontWeight: 500 }}>{disc}</td>
                <td style={{ fontFamily: "JetBrains Mono", color: P.textDim }}>{(defaultPct * 100).toFixed(2)}%</td>
                <td>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input
                      type="number" step="0.1" min="0" max="100"
                      value={parseFloat((effective * 100).toFixed(2))}
                      onChange={e => setDisciplineOverride(disc, +e.target.value / 100)}
                      style={{ width: 85, fontFamily: "JetBrains Mono", borderColor: isOverridden ? P.yellow : P.border }}
                    />
                    {isOverridden ? (
                      <button onClick={() => setDisciplineOverride(disc, defaultPct)}
                        style={{ background: "none", color: P.yellow, fontSize: 13, border: "none", cursor: "pointer" }}
                        title="Reset to default">↺</button>
                    ) : (
                      <span style={{ color: P.textDim, fontSize: 11 }}>default</span>
                    )}
                  </div>
                </td>
                <td style={{ fontFamily: "JetBrains Mono", fontWeight: 600, color: isOverridden ? P.yellow : P.text }}>{fmt(feeAmt)}</td>
              </tr>
            );
          })}
          <tr style={{ background: P.bg }}>
            <td colSpan={2} style={{ fontWeight: 700, color: P.textMuted }}>Total (sum of disciplines)</td>
            <td style={{ fontFamily: "JetBrains Mono", fontWeight: 700 }}>{(discTotal * 100).toFixed(2)}% of AE fee</td>
            <td style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: P.green }}>{fmt(baseFee)}</td>
          </tr>
        </tbody>
      </table>

      {/* ── Phase Fees ── */}
      <SectionTitle action={<Btn small onClick={addPhase} variant="ghost">+ Add Phase</Btn>}>
        Phase Fees{" "}
        <span style={{ color: totalPhasePct > 1.001 ? P.red : Math.abs(totalPhasePct - 1) < 0.001 ? P.green : P.textMuted, fontSize: 11, fontWeight: 400 }}>
          ({Math.round(totalPhasePct * 100)}% allocated{totalPhasePct > 1.001 ? " ⚠ over 100%" : Math.abs(totalPhasePct - 1) < 0.001 ? " ✓" : ""})
        </span>
      </SectionTitle>
      <table style={{ marginBottom: 20 }}>
        <thead><tr><th style={{width:48}}>Order</th><th>Code</th><th>Phase Name</th><th>% of Setty Fee</th><th>Fee Amount</th><th>Billable</th><th></th></tr></thead>
        <tbody>
          {phasedFees.map((ph, idx) => (
            <tr key={ph.id}>
              <td>
                <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                  <button onClick={() => movePhase(idx, -1)} disabled={idx === 0}
                    style={{ background: "none", border: `1px solid ${P.border}`, borderRadius: 3, color: idx === 0 ? P.textDim : P.accentLight, cursor: idx === 0 ? "default" : "pointer", fontSize: 10, padding: "1px 5px", lineHeight: 1 }}>▲</button>
                  <button onClick={() => movePhase(idx, 1)} disabled={idx === phasedFees.length - 1}
                    style={{ background: "none", border: `1px solid ${P.border}`, borderRadius: 3, color: idx === phasedFees.length - 1 ? P.textDim : P.accentLight, cursor: idx === phasedFees.length - 1 ? "default" : "pointer", fontSize: 10, padding: "1px 5px", lineHeight: 1 }}>▼</button>
                </div>
              </td>
              <td><input value={ph.code} onChange={e => updatePhase(idx, { code: e.target.value })} style={{ width: 60 }} /></td>
              <td><input value={ph.name} onChange={e => updatePhase(idx, { name: e.target.value })} style={{ width: 180 }} /></td>
              <td>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <input type="number" step="1" min="0" max="100"
                    value={Math.round(ph.pct * 100)}
                    onChange={e => updatePhase(idx, { pct: +e.target.value / 100 })}
                    style={{ width: 60 }} />
                  <span style={{ color: P.textMuted, fontSize: 12 }}>%</span>
                </div>
              </td>
              <td>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <input type="number" min="0" step="500"
                    value={ph.manualFee > 0 ? ph.manualFee : ""}
                    onChange={e => updatePhase(idx, { manualFee: +e.target.value })}
                    placeholder={fmt(ph.calcedFee ?? ph.fee)}
                    style={{ width: 110, fontFamily: "JetBrains Mono", borderColor: ph.manualFee > 0 ? P.yellow : P.border, color: ph.manualFee > 0 ? P.yellow : P.text }}
                  />
                  {ph.manualFee > 0 && (
                    <button onClick={() => updatePhase(idx, { manualFee: 0 })}
                      style={{ background: "none", color: P.yellow, fontSize: 13, border: "none", cursor: "pointer" }} title="Reset to calculated">↺</button>
                  )}
                </div>
                {ph.manualFee > 0 && (
                  <div style={{ fontSize: 10, color: P.textDim, marginTop: 2 }}>Calc: {fmt(ph.calcedFee ?? 0)}</div>
                )}
              </td>
              <td><input type="checkbox" checked={!!ph.billable} onChange={e => updatePhase(idx, { billable: e.target.checked })} /></td>
              <td><Btn small variant="danger" onClick={() => onChange({ ...project, phases: phases.filter((_, i) => i !== idx) })}>✕</Btn></td>
            </tr>
          ))}
        </tbody>
      </table>

      {/* Phase fee total check */}
      {phasedFees.some(p => p.billable && p.manualFee > 0) && (
        <div style={{ marginBottom: 12, padding: "10px 16px", borderRadius: 8,
          background: phaseFeeOk ? P.greenDim : P.redDim,
          border: `1px solid ${phaseFeeOk ? P.green : P.red}`,
          display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ color: phaseFeeOk ? P.green : P.red, fontWeight: 600, fontSize: 13 }}>
            {phaseFeeOk
              ? "✓ Phase fees match Setty fee"
              : `⚠ Phase fees total ${fmt(totalPhaseFee)} — ${phaseFeeVar > 0 ? "over" : "under"} by ${fmt(Math.abs(phaseFeeVar))}`}
          </div>
          {!phaseFeeOk && (
            <button onClick={() => {
              // Distribute the remainder proportionally across billable phases without a manual override
              const nonManual = phases.filter(p => p.billable && !(p.manualFee > 0));
              if (nonManual.length === 0) return;
              const manualTotal = phases.filter(p => p.billable && p.manualFee > 0).reduce((a, p) => a + p.manualFee, 0);
              const remainder = baseFee - manualTotal;
              const pctTotal = nonManual.reduce((a, p) => a + p.pct, 0) || 1;
              const newPhases = phases.map(p => {
                if (!p.billable || p.manualFee > 0) return p;
                return { ...p, manualFee: Math.round(remainder * (p.pct / pctTotal)) };
              });
              onChange({ ...project, phases: buildSchedule(project.startDate, newPhases) });
            }}
              style={{ background: P.accent, border: "none", borderRadius: 6, color: "#fff", cursor: "pointer", fontSize: 12, fontWeight: 600, padding: "4px 12px" }}>
              Auto-balance remaining phases
            </button>
          )}
        </div>
      )}

      {/* Lock / Unlock */}
      {project.feeScheduleFinalized ? (
        <div style={{ background: P.greenDim, color: P.green, padding: "10px 16px", borderRadius: 8, fontWeight: 600, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          ✓ Fee Schedule Finalized & Locked
          <div style={{ display: "flex", gap: 8 }}>
            {auditLog.length > 0 && <Btn small variant="ghost" onClick={() => setShowAudit(v => !v)}>📋 History ({auditLog.length})</Btn>}
            <Btn small variant="danger" onClick={() => { setShowLockModal("unlock"); setLockNote(""); }}>Unlock & Edit</Btn>
          </div>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <Btn onClick={() => { setShowLockModal("lock"); setLockNote(""); }} variant="success">🔒 Finalize & Lock Fee Schedule → Populate Milestones</Btn>
          {auditLog.length > 0 && <Btn small variant="ghost" onClick={() => setShowAudit(v => !v)}>📋 History ({auditLog.length})</Btn>}
        </div>
      )}

      {/* Audit log */}
      {showAudit && auditLog.length > 0 && (
        <div style={{ marginTop: 14, background: P.bg, border: `1px solid ${P.border}`, borderRadius: 10, padding: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 12 }}>📋 Fee Schedule Audit Log</div>
          <table>
            <thead><tr><th>Action</th><th>User</th><th>Date</th><th>Setty Fee</th><th>Phase Total</th><th>Notes</th></tr></thead>
            <tbody>
              {[...auditLog].reverse().map(e => (
                <tr key={e.id}>
                  <td><span style={{ fontWeight: 600, color: e.action === "locked" ? P.green : P.yellow, textTransform: "capitalize" }}>{e.action === "locked" ? "🔒 Locked" : "🔓 Unlocked"}</span></td>
                  <td style={{ color: P.textMuted }}>{e.user}</td>
                  <td style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: P.textDim }}>{new Date(e.date).toLocaleString()}</td>
                  <td style={{ fontFamily: "JetBrains Mono" }}>{e.settyFee ? fmt(e.settyFee) : "—"}</td>
                  <td style={{ fontFamily: "JetBrains Mono" }}>{e.totalPhaseFee ? fmt(e.totalPhaseFee) : "—"}</td>
                  <td style={{ color: P.textMuted, fontSize: 12 }}>{e.note || <span style={{ color: P.textDim, fontStyle: "italic" }}>No notes</span>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Lock / Unlock modal */}
      {showLockModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={e => { if (e.target === e.currentTarget) setShowLockModal(false); }}>
          <div style={{ background: P.card, border: `1px solid ${P.border}`, borderRadius: 14, padding: 28, width: 440, maxWidth: "90vw" }}>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 6 }}>
              {showLockModal === "lock" ? "🔒 Finalize & Lock Fee Schedule" : "🔓 Unlock Fee Schedule"}
            </div>
            <div style={{ color: P.textMuted, fontSize: 13, marginBottom: 20 }}>
              {showLockModal === "lock"
                ? "This will lock the fee schedule and populate milestones. Add an optional note for the audit log."
                : "This will unlock the fee schedule for editing. Add an optional note explaining why."}
            </div>
            {showLockModal === "lock" && !phaseFeeOk && phasedFees.some(p => p.billable && p.manualFee > 0) && (
              <div style={{ background: P.redDim, border: `1px solid ${P.red}`, borderRadius: 8, padding: "10px 14px", marginBottom: 16, color: P.red, fontSize: 13 }}>
                ⚠ Phase fees total {fmt(totalPhaseFee)}, Setty fee is {fmt(baseFee)} (difference: {fmt(Math.abs(phaseFeeVar))}). You can still lock, but review the discrepancy.
              </div>
            )}
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 6, fontWeight: 600 }}>Notes <span style={{ fontWeight: 400 }}>(optional)</span></div>
              <textarea value={lockNote} onChange={e => setLockNote(e.target.value)}
                placeholder={showLockModal === "lock" ? "e.g. Approved by PM, revised per client negotiation..." : "e.g. Updating SD fee per amendment..."}
                style={{ width: "100%", minHeight: 80, resize: "vertical", background: P.bg, border: `1px solid ${P.border}`, borderRadius: 8, color: P.text, padding: "8px 12px", fontSize: 13 }} />
            </div>
            <div style={{ fontSize: 12, color: P.textDim, marginBottom: 16 }}>
              Will be logged as: <strong style={{ color: P.accentLight }}>{getCurrentUser()}</strong> · {new Date().toLocaleString()}
            </div>
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button onClick={() => setShowLockModal(false)}
                style={{ background: "none", border: `1px solid ${P.border}`, borderRadius: 8, color: P.textMuted, cursor: "pointer", padding: "8px 18px", fontSize: 13 }}>
                Cancel
              </button>
              <button onClick={showLockModal === "lock" ? doLock : doUnlock}
                style={{ background: showLockModal === "lock" ? P.green : P.red, border: "none", borderRadius: 8, color: "#fff", cursor: "pointer", fontWeight: 700, padding: "8px 20px", fontSize: 13 }}>
                {showLockModal === "lock" ? "Lock Fee Schedule" : "Unlock Fee Schedule"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SCHEDULE VIEW ────────────────────────────────────────────────────────────

function ScheduleView({ project, onChange }) {
  const phases = project.phases || [];
  const milestones = project.milestones || [];
  const billablePhases = phases.filter(p => p.billable && p.fee > 0);

  // Per-milestone calendar sync state (not persisted — session only)
  const CAL_KEY = `setty_pms_cal_${project.id}`;
  const [calMap, setCalMap] = useState(() => {
    try { return JSON.parse(localStorage.getItem(CAL_KEY) || "{}"); } catch(e) { return {}; }
  });
  const [calState, setCalState] = useState({}); // { [milestoneId]: "syncing"|"synced"|"error"|"stale" }
  const [syncMsg, setSyncMsg] = useState("");
  const [syncingAll, setSyncingAll] = useState(false);

  function saveCalMap(map) {
    try { localStorage.setItem(CAL_KEY, JSON.stringify(map)); } catch(e) {}
    setCalMap(map);
  }

  async function syncOne(m) {
    if (!m.dueDate) { setSyncMsg("⚠ No due date set on this milestone"); return; }
    setCalState(s => ({ ...s, [m.id]: "syncing" }));
    const result = await createOrUpdateCalendarEvent(m, project.name || "Project", project.projectNumber, calMap[m.id]);
    const newMap = { ...calMap };
    if (result.success) {
      newMap[m.id] = result.eventId;
      saveCalMap(newMap);
      setCalState(s => ({ ...s, [m.id]: "synced" }));
      setSyncMsg(result.warning
        ? `⚠ "${m.name}" — ${result.warning}`
        : `✓ "${m.name}" synced to NYC Shared Calendar`);
    } else {
      setCalState(s => ({ ...s, [m.id]: "error", [`${m.id}_err`]: result.error }));
      setSyncMsg(`✗ "${m.name}" — ${result.error}`);
    }
  }

  async function syncAll() {
    setSyncingAll(true);
    const syncable = milestones.filter(m => m.dueDate);
    const newMap = { ...calMap };
    let ok = 0;
    for (let i = 0; i < syncable.length; i++) {
      const m = syncable[i];
      setSyncMsg(`Syncing ${i+1}/${syncable.length}…`);
      setCalState(s => ({ ...s, [m.id]: "syncing" }));
      const result = await createOrUpdateCalendarEvent(m, project.name || "Project", project.projectNumber, newMap[m.id]);
      if (result.success) {
        newMap[m.id] = result.eventId;
        setCalState(s => ({ ...s, [m.id]: "synced" }));
        ok++;
      } else {
        setCalState(s => ({ ...s, [m.id]: "error", [`${m.id}_err`]: result.error }));
      }
    }
    saveCalMap(newMap);
    setSyncingAll(false);
    const warnings = syncable.filter((_, i) => {
      // detect if any synced with warning (posted to personal)
      return false; // warnings surfaced per-milestone in syncOne
    });
    setSyncMsg(ok === syncable.length
      ? `✓ All ${ok} milestones synced to NYC Shared Calendar`
      : `${ok}/${syncable.length} synced — check individual rows for errors`);
  }

  function updateMilestone(id, field, val) {
    const newMilestones = milestones.map(m => {
      if (m.id !== id) return m;
      const updated = { ...m, [field]: val };
      if (field === "pctComplete") updated.status = milestoneStatus(+val);
      return updated;
    });
    let newPhases = phases;
    if (field === "dueDate") {
      const m = milestones.find(x => x.id === id);
      if (m && m.type === "billable")
        newPhases = phases.map(p => p.code === m.phase ? { ...p, endDate: val } : p);
      // Mark as stale if already synced
      if (calMap[id]) setCalState(s => ({ ...s, [id]: "stale" }));
    }
    onChange({ ...project, milestones: newMilestones, phases: newPhases });
  }

  function updatePhaseDuration(phId, newDays) {
    const ph = phases.find(p => p.id === phId);
    if (!ph || !ph.startDate) return;
    const newEnd = addWorkDays(new Date(ph.startDate + "T00:00:00"), Math.max(1, newDays));
    const newEndStr = newEnd.getFullYear() + "-" + String(newEnd.getMonth()+1).padStart(2,"0") + "-" + String(newEnd.getDate()).padStart(2,"0");
    const newPhases = phases.map(p => p.id === phId ? { ...p, endDate: newEndStr } : p);
    let newMilestones = milestones;
    newMilestones = milestones.map(m =>
      m.type === "billable" && m.phase === ph.code ? { ...m, dueDate: newEndStr } : m
    );
    onChange({ ...project, phases: newPhases, milestones: newMilestones });
  }

  function updatePhaseDate(phId, field, val) {
    const newPhases = phases.map(p => p.id === phId ? { ...p, [field]: val } : p);
    let newMilestones = milestones;
    if (field === "endDate") {
      const ph = phases.find(p => p.id === phId);
      if (ph) {
        newMilestones = milestones.map(m =>
          m.type === "billable" && m.phase === ph.code ? { ...m, dueDate: val } : m
        );
        // Mark affected synced milestones as stale
        const staleIds = milestones.filter(m => m.type === "billable" && m.phase === ph.code && calMap[m.id]).map(m => m.id);
        if (staleIds.length) setCalState(s => { const n = {...s}; staleIds.forEach(id => n[id] = "stale"); return n; });
      }
    }
    onChange({ ...project, phases: newPhases, milestones: newMilestones });
  }

  function addNonBillable() {
    onChange({ ...project, milestones: [...milestones, {
      id: uid(), type: "non-billable", phase: "NB", name: "Comment Response", fee: 0,
      startDate: new Date().toISOString().slice(0, 10),
      dueDate: new Date().toISOString().slice(0, 10),
      pctComplete: 0, status: "Not Started", notes: "",
    }]});
  }

  const syncableCount = milestones.filter(m => m.dueDate).length;
  const syncedCount = Object.keys(calMap).filter(id => calState[id] !== "stale" && calState[id] !== "error").length;

  function CalIcon({ m }) {
    const st = calState[m.id];
    const has = !!calMap[m.id];
    if (st === "syncing") return <span style={{ color: P.accentLight, fontSize: 12 }}>⏳</span>;
    if (st === "error") return <span title={calState[`${m.id}_err`] || "Error"} style={{ color: P.red, fontSize: 12, cursor: "help" }}>✗</span>;
    if (st === "stale") return <span title="Date changed — re-sync" style={{ color: P.yellow, fontSize: 12, cursor: "help" }}>⚠</span>;
    if (st === "synced" || has) return <span title="Synced to NYC Shared Calendar" style={{ color: P.green, fontSize: 12 }}>✓</span>;
    return <span style={{ color: P.border, fontSize: 12 }}>–</span>;
  }

  return (
    <div>
      <SectionTitle>Project Schedule</SectionTitle>
      <div style={{ fontSize: 12, color: P.textDim, marginBottom: 14 }}>
        Phase % complete is automatically calculated from its associated Milestone below. Update the milestone % to track progress.
      </div>
      <table style={{ marginBottom: 28 }}>
        <thead>
          <tr>
            <th>Phase</th><th>Start</th><th>End</th>
            <th title="Editable — changing recalculates end date">Duration (WD)</th>
            <th>% Complete</th><th>Expected %</th><th>Schedule Health</th><th>Progress</th>
          </tr>
        </thead>
        <tbody>
          {billablePhases.map(ph => {
            const pct = getPhasePctFromMilestones(ph, milestones);
            const durWD = countWorkDays(ph.startDate, ph.endDate);
            const today = new Date();
            const sd = ph.startDate ? new Date(ph.startDate + "T00:00:00") : null;
            const ed = ph.endDate   ? new Date(ph.endDate   + "T00:00:00") : null;

            // Expected % = how far today is through the phase by calendar time
            let expectedPct = 0;
            let healthLabel = "—";
            let healthColor = P.textDim;
            let healthBg = "transparent";
            if (sd && ed && ed > sd) {
              const todayLocal = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");
              if (today >= ed) {
                // Past end date
                expectedPct = 100;
                healthLabel = pct >= 100 ? "✓ Complete" : "Overdue";
                healthColor = pct >= 100 ? P.green : P.red;
                healthBg    = pct >= 100 ? P.greenDim : P.redDim;
              } else if (today < sd) {
                // Before start date
                expectedPct = 0;
                if (pct > 0) {
                  // Has progress even though not started — show ahead of schedule
                  healthLabel = "Ahead"; healthColor = P.green; healthBg = P.greenDim;
                } else {
                  healthLabel = "Not Started"; healthColor = P.textDim;
                }
              } else {
                // Active phase
                const elapsed = countWorkDays(ph.startDate, todayLocal);
                expectedPct = Math.round(Math.min(100, (elapsed / Math.max(durWD, 1)) * 100));
                const gap = expectedPct - pct;
                if (gap <= 5) {
                  healthLabel = "On Track"; healthColor = P.green; healthBg = P.greenDim;
                } else if (gap <= 20) {
                  healthLabel = `Behind ${gap}%`; healthColor = P.yellow; healthBg = P.yellowDim;
                } else {
                  healthLabel = `Behind ${gap}%`; healthColor = P.red; healthBg = P.redDim;
                }
              }
            }

            return (
              <tr key={ph.id}>
                <td style={{ fontWeight: 500 }}>{ph.name}</td>
                <td><input type="date" value={ph.startDate || ""} onChange={e => updatePhaseDate(ph.id, "startDate", e.target.value)} /></td>
                <td><input type="date" value={ph.endDate || ""} onChange={e => updatePhaseDate(ph.id, "endDate", e.target.value)} /></td>
                <td>
                  <input type="number" min={1} step={1}
                    value={durWD || ""}
                    onChange={e => updatePhaseDuration(ph.id, +e.target.value)}
                    style={{ width: 64, fontFamily: "JetBrains Mono" }}
                    title="Business days — changing this recalculates the end date" />
                </td>
                <td><span style={{ fontFamily: "JetBrains Mono", fontWeight: 600, color: pct >= 100 ? P.green : pct > 0 ? P.accentLight : P.textDim }}>{pct}%</span></td>
                <td><span style={{ fontFamily: "JetBrains Mono", color: P.textDim, fontSize: 12 }}>{expectedPct > 0 || (sd && today >= sd) ? expectedPct + "%" : "—"}</span></td>
                <td>
                  <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 8, background: healthBg, color: healthColor }}>
                    {healthLabel}
                  </span>
                </td>
                <td style={{ width: 140 }}><ProgressBar pct={pct} color={pct >= 100 ? P.green : P.accent} /></td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* Milestones header with Sync All button */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontWeight: 700, fontSize: 15 }}>
          Milestones & Deliverables
          {syncedCount > 0 && <span style={{ marginLeft: 10, fontSize: 11, color: P.green, fontWeight: 400 }}>{syncedCount}/{syncableCount} in Outlook</span>}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn small onClick={addNonBillable} variant="ghost">+ Add Non-Billable</Btn>
          {syncableCount > 0 && (
            <Btn small variant="primary" disabled={syncingAll} onClick={syncAll}>
              {syncingAll ? syncMsg : "📅 Sync All to NYC Calendar"}
            </Btn>
          )}
        </div>
      </div>

      {/* Sync status message */}
      {syncMsg && !syncingAll && (
        <div style={{
          padding: "8px 14px", borderRadius: 6, marginBottom: 12, fontSize: 12,
          background: syncMsg.startsWith("✓") ? P.greenDim : syncMsg.startsWith("✗") ? P.redDim : P.accentDim,
          color: syncMsg.startsWith("✓") ? P.green : syncMsg.startsWith("✗") ? P.red : P.accentLight,
          border: `1px solid ${syncMsg.startsWith("✓") ? P.green : syncMsg.startsWith("✗") ? P.red : P.accent}`,
          display: "flex", justifyContent: "space-between",
        }}>
          <span>{syncMsg}</span>
          <button onClick={() => setSyncMsg("")} style={{ background: "none", border: "none", color: "inherit", cursor: "pointer" }}>✕</button>
        </div>
      )}

      <table>
        <thead>
          <tr>
            <th>Type</th><th>Name</th><th>Phase</th><th>Due Date</th>
            <th>% Complete</th><th>Status</th><th>Notes</th>
            <th title="Outlook calendar sync">📅</th><th></th>
          </tr>
        </thead>
        <tbody>
          {[...milestones].sort((a, b) => {
              if (!a.dueDate && !b.dueDate) return 0;
              if (!a.dueDate) return 1;
              if (!b.dueDate) return -1;
              return a.dueDate > b.dueDate ? 1 : -1;
            }).map(m => {
            const autoStatus = milestoneStatus(m.pctComplete);
            const statusColor = MILESTONE_STATUS_COLORS[autoStatus] || MILESTONE_STATUS_COLORS["Not Started"];
            const typeColor = m.type === "billable" ? { bg: P.accentDim, text: P.accentLight } : { bg: P.purpleDim, text: P.purple };
            return (
              <tr key={m.id}>
                <td><Badge color={typeColor} text={m.type === "billable" ? "Billable" : "Non-Billable"} /></td>
                <td><input value={m.name} onChange={e => updateMilestone(m.id, "name", e.target.value)} style={{ width: 190 }} /></td>
                <td style={{ color: P.textMuted, fontSize: 12 }}>{m.phase}</td>
                <td><input type="date" value={m.dueDate || ""} onChange={e => updateMilestone(m.id, "dueDate", e.target.value)} /></td>
                <td>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <input type="number" min={0} max={100} value={m.pctComplete || 0}
                      onChange={e => updateMilestone(m.id, "pctComplete", +e.target.value)} style={{ width: 72 }} />
                    <span style={{ color: P.textDim, fontSize: 12 }}>%</span>
                    <input type="checkbox" checked={(m.pctComplete || 0) >= 100}
                      onChange={e => updateMilestone(m.id, "pctComplete", e.target.checked ? 100 : 0)}
                      title="Mark complete (100%)"
                      style={{ width: 16, height: 16, cursor: "pointer", accentColor: P.green }} />
                  </div>
                </td>
                <td><Badge color={statusColor} text={autoStatus} /></td>
                <td><input value={m.notes || ""} onChange={e => updateMilestone(m.id, "notes", e.target.value)} placeholder="Notes…" style={{ width: 140 }} /></td>
                <td>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <CalIcon m={m} />
                    {m.dueDate && (
                      <button onClick={() => syncOne(m)} disabled={calState[m.id] === "syncing"}
                        title="Sync this milestone to Outlook"
                        style={{ background: "none", border: "none", cursor: "pointer", color: P.accentLight, fontSize: 11, padding: "2px 4px" }}>
                        ↑
                      </button>
                    )}
                  </div>
                </td>
                <td>
                  <Btn small variant="danger" onClick={() => onChange({ ...project, milestones: milestones.filter(x => x.id !== m.id) })}>✕</Btn>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─── INVOICE MODAL ────────────────────────────────────────────────────────────

function InvoiceModal({ project, onClose, onSave }) {
  const billableMilestones = (project.milestones || []).filter(m => m.type === "billable" && m.fee > 0);
  const billablePhases = (project.phases || []).filter(p => p.billable && p.fee > 0);
  const team = project.teamMembers || [];

  const [method, setMethod] = useState("pct");
  const [invoiceNumber, setInvoiceNumber] = useState(
    `INV-${String((project.invoices || []).length + 1).padStart(3, "0")}`
  );
  const [invoiceDate, setInvoiceDate] = useState(new Date().toISOString().slice(0, 10));
  const [selectedMilestoneId, setSelectedMilestoneId] = useState(billableMilestones[0]?.id || "");
  const [pctToInvoice, setPctToInvoice] = useState(100);
  const [description, setDescription] = useState("");
  const [hoursRows, setHoursRows] = useState(
    team.map(tm => ({ memberId: tm.id, name: tm.name || tm.role, role: tm.role, rate: tm.rate || 0, hours: 0 }))
  );

  function updateHoursRow(idx, updates) {
    setHoursRows(prev => prev.map((r, i) => i === idx ? { ...r, ...updates } : r));
  }

  const selectedMilestone = billableMilestones.find(m => m.id === selectedMilestoneId);
  const milestoneFee = selectedMilestone?.fee || 0;
  // Derive which phase this milestone belongs to for tracking
  const milestonePhaseCode = selectedMilestone?.phase || "";
  const milestonePhase = billablePhases.find(p => p.code === milestonePhaseCode);

  const amountByPct = milestoneFee * (pctToInvoice / 100);
  const amountByHours = hoursRows.reduce((a, r) => a + r.rate * r.hours, 0);
  const invoiceAmount = method === "pct" ? amountByPct : amountByHours;

  function handleSave() {
    if (invoiceAmount <= 0) return;
    const lineItems = method === "hours"
      ? hoursRows.filter(r => r.hours > 0).map(r => ({ name: r.name, role: r.role, rate: r.rate, hours: r.hours, amount: r.rate * r.hours }))
      : [{ name: `${pctToInvoice}% of ${selectedMilestone?.name || "Milestone"}`, amount: amountByPct }];

    onSave({
      id: uid(),
      number: invoiceNumber,
      date: invoiceDate,
      phase: milestonePhaseCode,
      phaseName: milestonePhase?.name || milestonePhaseCode,
      milestoneId: selectedMilestoneId,
      milestoneName: selectedMilestone?.name || "",
      method,
      description,
      lineItems,
      amount: invoiceAmount,
      finalized: true,
    });
    onClose();
  }

  return (
    <Modal title="Log Invoice" onClose={onClose} wide>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
        <Field label="Invoice Number">
          <input value={invoiceNumber} onChange={e => setInvoiceNumber(e.target.value)} style={{ width: "100%" }} />
        </Field>
        <Field label="Invoice Date">
          <input type="date" value={invoiceDate} onChange={e => setInvoiceDate(e.target.value)} style={{ width: "100%" }} />
        </Field>
        <Field label="Description (optional)" style={{ gridColumn: "1 / -1" }}>
          <input value={description} onChange={e => setDescription(e.target.value)} placeholder="e.g. Monthly draw, SD phase completion…" style={{ width: "100%" }} />
        </Field>
      </div>

      {/* Method toggle */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {[["pct", "% of Milestone Fee"], ["hours", "Hours × Rate"]].map(([val, label]) => (
          <button key={val} onClick={() => setMethod(val)}
            style={{ padding: "7px 18px", borderRadius: 6, fontSize: 13, fontWeight: 500, cursor: "pointer", border: `1px solid ${method === val ? P.accent : P.border}`, background: method === val ? P.accentDim : P.bg, color: method === val ? P.accentLight : P.textMuted }}>
            {label}
          </button>
        ))}
      </div>

      {method === "pct" && (
        <Card style={{ marginBottom: 20 }}>
          {billableMilestones.length === 0 ? (
            <div style={{ color: P.textDim, fontSize: 13 }}>No billable milestones found. Finalize the fee schedule first to generate milestones.</div>
          ) : (
            <>
              <Field label="Milestone">
                <select value={selectedMilestoneId} onChange={e => setSelectedMilestoneId(e.target.value)} style={{ width: "100%" }}>
                  {billableMilestones.map(m => (
                    <option key={m.id} value={m.id}>{m.name} — Phase: {m.phase} — Fee: {fmt(m.fee)}</option>
                  ))}
                </select>
              </Field>
              <Field label={`% of Milestone Fee to Invoice — Milestone total: ${fmt(milestoneFee)}`}>
                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                  <input type="number" min={0} max={100} step={5} value={pctToInvoice}
                    onChange={e => setPctToInvoice(+e.target.value)} style={{ width: 80 }} />
                  <span style={{ color: P.textMuted }}>%</span>
                  <span style={{ color: P.green, fontWeight: 700, fontFamily: "JetBrains Mono", fontSize: 18 }}>{fmt(amountByPct)}</span>
                </div>
              </Field>
            </>
          )}
        </Card>
      )}

      {method === "hours" && (
        <Card style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, color: P.textDim, marginBottom: 12 }}>
            Rates are pre-filled from Team tab. Edit hours as needed.
          </div>
          <table>
            <thead><tr><th>Team Member</th><th>Role</th><th>Rate ($/hr)</th><th>Hours</th><th>Amount</th></tr></thead>
            <tbody>
              {hoursRows.map((r, idx) => (
                <tr key={r.memberId}>
                  <td>{r.name || "—"}</td>
                  <td style={{ color: P.textMuted, fontSize: 12 }}>{r.role}</td>
                  <td>
                    <input type="number" value={r.rate} onChange={e => updateHoursRow(idx, { rate: +e.target.value })} style={{ width: 80 }} />
                  </td>
                  <td>
                    <input type="number" min={0} step={0.5} value={r.hours} onChange={e => updateHoursRow(idx, { hours: +e.target.value })} style={{ width: 70 }} />
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono", color: r.hours > 0 ? P.green : P.textDim }}>{fmt(r.rate * r.hours)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      {/* Total */}
      <div style={{ background: P.bg, borderRadius: 8, padding: "12px 16px", marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center", border: `1px solid ${P.border}` }}>
        <div style={{ fontWeight: 600 }}>Invoice Total</div>
        <div style={{ fontFamily: "JetBrains Mono", fontWeight: 700, fontSize: 22, color: P.green }}>{fmt(invoiceAmount)}</div>
      </div>

      <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        <Btn onClick={handleSave} disabled={invoiceAmount <= 0}>✓ Finalize & Log Invoice</Btn>
      </div>
    </Modal>
  );
}

function fmtDate(str) {
  if (!str) return "";
  const [y, m, d] = str.split("-");
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return (months[parseInt(m,10)-1] || m) + " " + parseInt(d,10) + ", " + y;
}

function printInvoice(inv, project) {
  const lineItemsHtml = inv.lineItems && inv.lineItems.length > 0
    ? inv.lineItems.map((li, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${li.name || li.role || "Service"}</td>
          ${inv.method === "hours" ? `<td class="right">${li.hours || "—"}</td><td class="right">$${(li.rate || 0).toLocaleString()}/hr</td>` : ""}
          <td class="right">$${Math.round(li.amount || 0).toLocaleString()}</td>
        </tr>`).join("")
    : `<tr><td colspan="${inv.method === "hours" ? 5 : 3}">— No line items —</td></tr>`;

  const hoursHeader = inv.method === "hours"
    ? `<th class="right">Hours</th><th class="right">Rate</th>`
    : "";

  // ── Fee Schedule ──
  // Use locked fee or best available
  const auditLocked = (project.feeAuditLog || []).filter(e => e.action === "locked" && e.settyFee);
  const auditFee = auditLocked.length > 0 ? auditLocked[auditLocked.length - 1].settyFee : 0;
  const constructionCostInv = calcConstructionCost(project.squareFootage, project.buildingCategory, project.manualConstructionCost, project.manualRSMeansCostPerSF);
  const contractFee = project.lockedSettyFee || auditFee || (project.manualSettyFee > 0 ? project.manualSettyFee : calcSettyFee(constructionCostInv, project)) || 0;

  // Approved COs add to contract value
  const approvedCOs = (project.changeOrders || []).filter(c => c.approved);
  const coTotal = approvedCOs.reduce((a, c) => a + (c.fee || 0), 0);
  const totalContractFee = contractFee + coTotal;

  // Billable phases from locked fee schedule
  const billablePhases = (project.phases || []).filter(p => p.billable && p.fee > 0);

  // All invoices except the current one (already billed before this invoice)
  const priorInvoices = (project.invoices || []).filter(i => i.id !== inv.id);
  const totalPriorInvoiced = priorInvoices.reduce((a, i) => a + (i.amount || 0), 0);
  const totalInvoicedToDate = totalPriorInvoiced + (inv.amount || 0);
  const remainingBalance = totalContractFee - totalInvoicedToDate;

  // Per-phase: fee, previously invoiced, this invoice amount (if same phase)
  const feeScheduleRows = billablePhases.map(ph => {
    const phaseFee = ph.fee || 0;
    const phaseInvoiced = priorInvoices
      .filter(i => i.phase === ph.code)
      .reduce((a, i) => a + (i.amount || 0), 0);
    const thisInvAmt = (inv.phase === ph.code) ? (inv.amount || 0) : 0;
    const totalBilledThisPhase = phaseInvoiced + thisInvAmt;
    const phaseBalance = phaseFee - totalBilledThisPhase;
    const isCurrentPhase = inv.phase === ph.code;
    return { ph, phaseFee, phaseInvoiced, thisInvAmt, totalBilledThisPhase, phaseBalance, isCurrentPhase };
  });

  // CO rows for fee schedule
  const coRows = approvedCOs.map(co => {
    const coInvoiced = priorInvoices
      .filter(i => i.phase === "CO" && (project.milestones || []).find(m => m.coId === co.id && m.id === i.milestoneId))
      .reduce((a, i) => a + (i.amount || 0), 0);
    const coBalance = (co.fee || 0) - coInvoiced;
    return { co, coInvoiced, coBalance };
  });

  const feeScheduleHtml = feeScheduleRows.map(r => `
    <tr style="${r.isCurrentPhase ? "background:#eef4ff;font-weight:600;" : ""}">
      <td>${r.ph.name}${r.isCurrentPhase ? ' <span style="background:#2F5496;color:#fff;font-size:7.5pt;padding:1px 6px;border-radius:8px;font-weight:600;vertical-align:middle;">THIS INVOICE</span>' : ""}</td>
      <td class="right">$${Math.round(r.phaseFee).toLocaleString()}</td>
      <td class="right">${r.phaseInvoiced > 0 ? "$" + Math.round(r.phaseInvoiced).toLocaleString() : "—"}</td>
      <td class="right" style="${r.thisInvAmt > 0 ? "color:#1a56a0;font-weight:700;" : "color:#aaa;"}">${r.thisInvAmt > 0 ? "$" + Math.round(r.thisInvAmt).toLocaleString() : "—"}</td>
      <td class="right" style="${r.phaseBalance <= 0 ? "color:#1a56a0;" : ""}">${r.phaseBalance <= 0 ? "✓ Billed" : "$" + Math.round(r.phaseBalance).toLocaleString()}</td>
    </tr>`).join("") +
    coRows.map(r => `
    <tr style="background:#fff8f0;">
      <td style="color:#44546A;font-style:italic;">↳ CO: ${r.co.name || r.co.number}</td>
      <td class="right">$${Math.round(r.co.fee || 0).toLocaleString()}</td>
      <td class="right">${r.coInvoiced > 0 ? "$" + Math.round(r.coInvoiced).toLocaleString() : "—"}</td>
      <td class="right" style="color:#aaa;">—</td>
      <td class="right" style="${r.coBalance < 0 ? "color:#c00000;" : r.coBalance === 0 ? "color:#1a7a34;" : ""}">${r.coBalance === 0 ? "✓ Paid" : "$" + Math.round(r.coBalance).toLocaleString()}</td>
    </tr>`).join("");

  const html = `
    <div class="doc-header">
      <div>
        <div class="logo-text">SETTY</div>
        <div class="logo-sub">& ASSOCIATES, LTD, PC</div>
        <div style="margin-top:10px;font-size:8.5pt;color:#44546A;line-height:1.6;">
          Fairfax, VA (HQ) · Washington DC · New York · Baltimore<br>
          Atlanta · Philadelphia · Los Angeles · Tampa · India
        </div>
      </div>
      <div class="doc-type-badge">
        <div class="doc-type">INVOICE</div>
        <div class="doc-number">${inv.number || "INV-001"}</div>
        <div style="font-size:9pt;color:#44546A;margin-top:6px;">Date: ${fmtDate(inv.date)}</div>
      </div>
    </div>

    <div class="meta-grid">
      <div class="meta-block">
        <div class="meta-label">Project</div>
        <div class="meta-value">${project.name || "—"}</div>
        ${project.projectNumber ? `<div style="font-size:9pt;color:#44546A;">${project.projectNumber}</div>` : ""}
      </div>
      <div class="meta-block">
        <div class="meta-label">Client / Prime</div>
        <div class="meta-value">${project.prime || "—"}</div>
        ${project.primeProjectNumber ? `<div style="font-size:9pt;color:#44546A;">Prime #: ${project.primeProjectNumber}</div>` : ""}
      </div>
      <div class="meta-block">
        <div class="meta-label">Phase / Milestone</div>
        <div class="meta-value">${inv.milestoneName || inv.phaseName || "—"}</div>
        ${inv.milestoneName ? `<div style="font-size:9pt;color:#44546A;">Phase: ${inv.phaseName || ""}</div>` : ""}
      </div>
      <div class="meta-block">
        <div class="meta-label">Contract Number</div>
        <div class="meta-value">${project.contractNumber || "—"}</div>
        ${project.contractDate ? `<div style="font-size:9pt;color:#44546A;">Dated: ${fmtDate(project.contractDate)}</div>` : ""}
      </div>
    </div>

    ${inv.description ? `
    <div class="section-heading">Description of Services</div>
    <div class="notes-box">${inv.description}</div>
    ` : ""}

    <div class="section-heading">Line Items</div>
    <table class="line-items">
      <thead>
        <tr><th>#</th><th>Description</th>${hoursHeader}<th class="right">Amount</th></tr>
      </thead>
      <tbody>${lineItemsHtml}</tbody>
      <tfoot>
        <tr>
          <td colspan="${inv.method === "hours" ? 4 : 2}" style="text-align:right;font-size:9pt;color:#44546A;">Invoice Total</td>
          <td class="right">$${Math.round(inv.amount || 0).toLocaleString()}</td>
        </tr>
      </tfoot>
    </table>

    <div class="amount-box">
      <div class="amount-inner">
        <div class="amount-label">AMOUNT DUE</div>
        <div class="amount-value">$${Math.round(inv.amount || 0).toLocaleString()}</div>
      </div>
    </div>

    ${billablePhases.length > 0 ? `
    <div class="section-heading" style="margin-top:28px;">Fee Schedule &amp; Billing Status</div>
    <table class="line-items">
      <thead>
        <tr>
          <th>Phase</th>
          <th class="right">Phase Fee</th>
          <th class="right">Prev. Billed</th>
          <th class="right">This Invoice</th>
          <th class="right">Balance</th>
        </tr>
      </thead>
      <tbody>${feeScheduleHtml}</tbody>
      <tfoot>
        <tr>
          <td><strong>Contract Total</strong>${coTotal > 0 ? `<div style="font-size:8pt;color:#44546A;font-weight:400;">Incl. ${approvedCOs.length} approved CO${approvedCOs.length !== 1 ? "s" : ""}</div>` : ""}</td>
          <td class="right">$${Math.round(totalContractFee).toLocaleString()}</td>

}
