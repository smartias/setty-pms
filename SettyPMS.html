// ─── PIPELINE DASHBOARD ───────────────────────────────────────────────────────
function PipelineDashboard({ projects, onNavigateToProject, onAddProject, onUpdateProject }) {
  const pipeline = projects.filter(p => !p.archived && isPipeline(p));
  const now = new Date();

  const totalValue = pipeline.reduce((a, p) => {
    const fee = (p.phases || []).filter(ph => ph.billable && ph.fee > 0).reduce((b, ph) => b + ph.fee, 0);
    return a + fee;
  }, 0);

  const weightedValue = pipeline.reduce((a, p) => {
    const fee = (p.phases || []).filter(ph => ph.billable && ph.fee > 0).reduce((b, ph) => b + ph.fee, 0);
    return a + fee * ((p.probability ?? 50) / 100);
  }, 0);

  const PAST_DUE_EXEMPT = ["Proposal Submitted", "Award", "Lost", "No Bid"];
  const overdue = pipeline.filter(p => p.proposalDueDate && new Date(p.proposalDueDate) < now && !PAST_DUE_EXEMPT.includes(p.status));
  const dueSoon = pipeline.filter(p => {
    if (!p.proposalDueDate) return false;
    const d = new Date(p.proposalDueDate);
    const in14 = new Date(); in14.setDate(in14.getDate() + 14);
    return d >= now && d <= in14;
  });

  const byStatus = PIPELINE_STATUSES.map(s => ({
    status: s, count: pipeline.filter(p => p.status === s).length,
  }));

  const sorted = [...pipeline].sort((a, b) => {
    if (!a.proposalDueDate) return 1;
    if (!b.proposalDueDate) return -1;
    return a.proposalDueDate > b.proposalDueDate ? 1 : -1;
  });

  const [confirm, setConfirm] = useState(null); // { projectId, action: "award"|"lost" }

  function handleAward(p) {
    onUpdateProject({ ...p, status: "Not Started", archived: false });
    setConfirm(null);
  }

  function handleLost(p) {
    onUpdateProject({ ...p, status: "Lost", archived: true });
    setConfirm(null);
  }

  return (
    <div style={{ padding: "24px 32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 4 }}>Pipeline</div>
          <div style={{ color: P.textMuted, fontSize: 13 }}>Proposals & projects pending award</div>
        </div>
        <Btn small onClick={onAddProject}>+ New Pipeline Project</Btn>
      </div>

      {/* KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 14, marginBottom: 24 }}>
        <KpiBox label="Pipeline Projects" val={pipeline.length} color={P.accent} />
        <KpiBox label="Total Fee Value" val={fmt(totalValue)} color={P.accentLight} />
        <KpiBox label="Weighted Value" val={fmt(weightedValue)} color={P.green} />
        <KpiBox label="Proposals Overdue" val={overdue.length} color={overdue.length > 0 ? P.red : P.textMuted} />
        <KpiBox label="Due in 14 Days" val={dueSoon.length} color={dueSoon.length > 0 ? P.yellow : P.textMuted} />
      </div>

      {/* Status pills */}
      <div style={{ display: "flex", gap: 10, marginBottom: 24 }}>
        {byStatus.map(({ status, count }) => (
          <div key={status} style={{ background: P.accentDim, borderRadius: 8, padding: "8px 16px", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: P.accentLight, fontWeight: 700, fontSize: 16 }}>{count}</span>
            <span style={{ color: P.accentLight, fontSize: 12 }}>{status}</span>
          </div>
        ))}
      </div>

      {/* Pipeline table */}
      <Card>
        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 16 }}>All Pipeline Projects</div>
        {pipeline.length === 0 ? (
          <div style={{ color: P.textDim, textAlign: "center", padding: 40 }}>
            No pipeline projects. <button onClick={onAddProject} style={{ color: P.accent, background: "none", border: "none", cursor: "pointer" }}>Add one</button>
          </div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Project</th>
                <th>Client</th>
                <th>PM</th>
                <th>Status</th>
                <th>Proposal Due</th>
                <th>Probability</th>
                <th>Fee Value</th>
                <th>Weighted</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(p => {
                const fee = (p.phases || []).filter(ph => ph.billable && ph.fee > 0).reduce((a, ph) => a + ph.fee, 0);
                const weighted = fee * ((p.probability ?? 50) / 100);
                const isOverdue = p.proposalDueDate && new Date(p.proposalDueDate) < now && !PAST_DUE_EXEMPT.includes(p.status);
                const isSoon = p.proposalDueDate && !isOverdue && (() => { const d = new Date(p.proposalDueDate); const in14 = new Date(); in14.setDate(in14.getDate()+14); return d <= in14; })();
                return (
                  <tr key={p.id}>
                    <td>
                      <button onClick={() => onNavigateToProject(p.id)}
                        style={{ background: "none", border: "none", color: P.accentLight, cursor: "pointer", fontWeight: 600, fontSize: 13, padding: 0, textAlign: "left" }}>
                        {p.name}
                      </button>
                      {p.projectNumber && <div style={{ fontSize: 11, color: P.textDim }}>{p.projectNumber}</div>}
                    </td>
                    <td style={{ color: P.textMuted, fontSize: 13 }}>{p.clientName || "—"}</td>
                    <td style={{ color: P.textMuted, fontSize: 13 }}>{p.projectManager || "—"}</td>
                    <td>
                      <span style={{ background: P.accentDim, color: P.accentLight, borderRadius: 4, padding: "2px 8px", fontSize: 11, fontWeight: 600 }}>
                        {p.status}
                      </span>
                    </td>
                    <td style={{ color: isOverdue ? P.red : isSoon ? P.yellow : P.text, fontWeight: isOverdue || isSoon ? 600 : 400, fontSize: 13 }}>
                      {p.proposalDueDate || "—"}
                      {isOverdue && <span style={{ marginLeft: 4, fontSize: 10 }}>OVERDUE</span>}
                      {isSoon && <span style={{ marginLeft: 4, fontSize: 10 }}>SOON</span>}
                    </td>
                    <td>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <ProgressBar pct={p.probability ?? 50} color={P.accent} />
                        <span style={{ fontSize: 12, color: P.textMuted, minWidth: 30 }}>{p.probability ?? 50}%</span>
                      </div>
                    </td>
                    <td style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 13 }}>{fee > 0 ? fmt(fee) : "—"}</td>
                    <td style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 13, color: P.green }}>{fee > 0 ? fmt(weighted) : "—"}</td>
                    <td style={{ whiteSpace: "nowrap" }}>
                      {confirm?.projectId === p.id ? (
                        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                          <span style={{ fontSize: 11, color: P.textMuted }}>
                            {confirm.action === "award" ? "Mark as Awarded?" : "Mark as Lost & archive?"}
                          </span>
                          <Btn small variant={confirm.action === "award" ? "success" : "danger"}
                            onClick={() => confirm.action === "award" ? handleAward(p) : handleLost(p)}>
                            Confirm
                          </Btn>
                          <Btn small variant="ghost" onClick={() => setConfirm(null)}>Cancel</Btn>
                        </div>
                      ) : (
                        <div style={{ display: "flex", gap: 6 }}>
                          <Btn small variant="success" onClick={() => setConfirm({ projectId: p.id, action: "award" })}>🏆 Award</Btn>
                          <Btn small variant="danger" onClick={() => setConfirm({ projectId: p.id, action: "lost" })}>✗ Lost</Btn>
                        </div>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

// Save status indicator component
function SaveBadge({ status, lastSaved, onRetry, errorDetail }) {
  const cfg = {
    idle:    { color: P.textDim,    icon: "",   text: "" },
    saving:  { color: P.accentLight,icon: "⏳", text: "Saving…" },
    saved:   { color: P.green,      icon: "✓",  text: lastSaved ? `Saved ${lastSaved}` : "Saved" },
    error:   { color: P.red,        icon: "✗",  text: "Save failed" },
    loading: { color: P.accentLight,icon: "⏳", text: "Loading…" },
  }[status] || { color: P.textDim, icon: "", text: "" };

  if (!cfg.text) return null;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: cfg.color }}>
      <span>{cfg.icon}</span>
      <span title={status === "error" && errorDetail ? errorDetail : undefined}>{cfg.text}</span>
      {status === "error" && errorDetail && (
        <span style={{ fontSize: 10, color: P.red, opacity: 0.8, maxWidth: 260, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}
          title={errorDetail}>
          — {errorDetail.slice(0, 80)}{errorDetail.length > 80 ? "…" : ""}
        </span>
      )}
      {status === "error" && onRetry && (
        <button onClick={onRetry}
          style={{ background: "none", border: "none", color: P.red, cursor: "pointer", fontSize: 11, textDecoration: "underline", padding: 0 }}>
          Retry
        </button>
      )}
    </div>
  );
}

function App() {
  const [projects, setProjects] = useState([]);
  const [termContracts, setTermContracts] = useState([]);
  const [staff, setStaff] = useState([]);
  const [clients, setClients] = useState([]);
  const [view, setView] = useState(() => {
    // Deep link: read hash on load e.g. #project:SAPX246008.00
    const hash = window.location.hash.slice(1);
    if (hash.startsWith("project:") || ["dashboard","list","calendar","staff","clients","teamwbs","cashflow","termcontracts","pendingcos","pipeline","archive"].includes(hash)) {
      return hash;
    }
    return "dashboard";
  });
  const [search, setSearch] = useState("");
  const [filterPM, setFilterPM] = useState("All");
  const [filterQAQC, setFilterQAQC] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [filterContract, setFilterContract] = useState("All");
  const [appStatus, setAppStatus] = useState("loading"); // loading | idle | saving | saved | error
  const [lastSaved, setLastSaved] = useState(null);
  const [saveErrorDetail, setSaveErrorDetail] = useState("");
  const [loadError, setLoadError] = useState(null);
  const pendingSave = React.useRef(null);   // bug 3 fix: timer ID in ref, not state
  const isLoaded = React.useRef(false);     // bug 1 fix: guard against save-on-load

  const [showDataTools, setShowDataTools] = useState(false);
  const [importMsg, setImportMsg] = useState("");
  const [showBackupModal, setShowBackupModal] = useState(false);
  const [backupImportMsg, setBackupImportMsg] = useState({ text: "", type: "idle" });
  const [backupImportPreview, setBackupImportPreview] = useState(null); // { parsed, projCount, tcCount, staffCount, clientCount, exportedAt }
  const [lastBackupDate, setLastBackupDate] = useState(() => localStorage.getItem("settyPMS_lastBackup") || null);
  const [cleanupMsg, setCleanupMsg] = useState("");
  const [cleanupPreview, setCleanupPreview] = useState(null);

  // ── Initial load from Supabase ──
  useEffect(() => {
    setAppStatus("loading");
    loadState()
      .then(s => {
        if (s?.projects) setProjects(s.projects);
        if (s?.termContracts) setTermContracts(s.termContracts);
        if (s?.staff) setStaff(s.staff);
        if (s?.clients) setClients(s.clients);
        isLoaded.current = true; // bug 1 fix: mark load complete before setting idle
        setAppStatus("idle");
      })
      .catch(e => {
        console.error("Load failed:", e);
        if (e.message?.includes("401") || e.message?.includes("403") || e.message?.includes("interaction_required")) {
          getToken(true).then(() => loadState()).then(s => {
            if (s?.projects) setProjects(s.projects);
            if (s?.termContracts) setTermContracts(s.termContracts);
            if (s?.staff) setStaff(s.staff);
            if (s?.clients) setClients(s.clients);
            isLoaded.current = true;
            setAppStatus("idle");
          }).catch(e2 => { setLoadError(e2.message); setAppStatus("error"); });
          return;
        }
        setLoadError(e.message || "Could not load data");
        setAppStatus("error");
      });
  }, []);

  // ── Debounced auto-save — fires 2s after last change ──
  useEffect(() => {
    if (!isLoaded.current) return; // bug 1 fix: don't save until initial load is done
    if (pendingSave.current) clearTimeout(pendingSave.current); // bug 3 fix: use ref
    pendingSave.current = setTimeout(() => {
      performSave({ projects, termContracts, staff, clients });
    }, 2000);
    return () => clearTimeout(pendingSave.current);
  }, [projects, termContracts, staff, clients]);

  async function performSave(state) {
    setAppStatus("saving");
    setSaveErrorDetail("");
    try {
      await saveState(state);
      const now = new Date();
      setLastSaved(`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`);
      setAppStatus("saved");
      // Return to idle after 3s
      setTimeout(() => setAppStatus(s => s === "saved" ? "idle" : s), 3000);
    } catch(e) {
      console.error("Save failed:", e);
      setSaveErrorDetail(e.message || "Unknown error");
      setAppStatus("error");
    }
  }

  function manualRetry() {
    performSave({ projects, termContracts, staff, clients });
  }

  // ── Data tools ──

  function exportBackup() {
    const now = new Date();
    const ts = now.toISOString();
    const date = ts.slice(0, 10);
    const data = JSON.stringify({ projects, termContracts, staff, clients, _exportedAt: ts, _version: 3 }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `SettyPMS-backup-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
    localStorage.setItem("settyPMS_lastBackup", ts);
    setLastBackupDate(ts);
    setBackupImportMsg({ text: "✓ Backup downloaded: SettyPMS-backup-" + date + ".json", type: "success" });
  }

  function exportCSV() {
    const esc = v => {
      if (v === null || v === undefined) return "";
      const s = String(v);
      return s.includes(",") || s.includes('"') || s.includes("\n") ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const row = arr => arr.map(esc).join(",");

    const headers = [
      "Project Number", "Project Name", "Status", "Contract Status",
      "Client", "Prime / GC", "PM", "DPM",
      "Start Date", "End Date",
      "Base Fee", "Approved COs", "Total Contract",
      "Total Invoiced", "Total Received", "Outstanding",
      "% Complete", "Fee Type", "Project Type",
      "Disciplines", "Archived",
    ];

    const rows = projects.map(p => {
      const phases = (p.phases || []).filter(ph => ph.billable && ph.fee > 0);
      const milestones = p.milestones || [];
      const cos = (p.changeOrders || []).filter(c => c.approved);
      const invoices = p.invoices || [];

      const baseFee = phases.reduce((a, ph) => a + (ph.fee || 0), 0);
      const coTotal = cos.reduce((a, c) => a + (c.fee || 0), 0);
      const totalContract = baseFee + coTotal;
      const totalInvoiced = invoices.reduce((a, inv) => a + (inv.amount || 0), 0);
      const totalPaid = invoices.reduce((a, inv) => a + (inv.amountPaid || 0), 0);
      const outstanding = invoices.reduce((a, inv) => a + Math.max(0, (inv.amount || 0) - (inv.amountPaid || 0)), 0);

      const pctComplete = phases.length > 0
        ? Math.round(phases.reduce((a, ph) => {
            const ms = milestones.filter(m => m.type === "billable" && m.phase === ph.code);
            const pct = ms.length > 0 ? ms.reduce((s, m) => s + (m.pctComplete || 0), 0) / ms.length : 0;
            return a + pct;
          }, 0) / phases.length)
        : 0;

      const pm = (p.teamMembers || []).find(m => m.role === "PM" || m.role === "Project Manager");
      const dpm = (p.teamMembers || []).find(m => m.role === "DPM" || m.role === "Deputy PM");
      const disciplines = [...new Set((p.teamMembers || []).flatMap(m => m.disciplines || []))].join("; ");

      return row([
        p.projectNumber, p.name, p.status, p.contractStatus,
        p.clientName, p.prime,
        pm?.name || "", dpm?.name || "",
        p.startDate, p.endDate,
        baseFee, coTotal, totalContract,
        totalInvoiced, totalPaid, outstanding,
        pctComplete + "%", p.feeType, p.projectType,
        disciplines, p.archived ? "Yes" : "No",
      ]);
    });

    const csv = [row(headers), ...rows].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `SettyPMS-projects-${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImportFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportMsg("");
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.projects || !Array.isArray(parsed.projects)) {
          setImportMsg("✗ Invalid backup file — no projects array found.");
          return;
        }
        const projCount = parsed.projects.length;
        const tcCount = (parsed.termContracts || []).length;
        if (!window.confirm(`Import ${projCount} project${projCount !== 1 ? "s" : ""} and ${tcCount} term contract${tcCount !== 1 ? "s" : ""} from backup?

This will REPLACE all current data. Make sure you have a backup first.`)) return;
        setProjects(parsed.projects);
        setTermContracts(parsed.termContracts || []);
        setStaff(parsed.staff || []);
        setClients(parsed.clients || []);
        setImportMsg(`✓ Imported ${projCount} projects and ${tcCount} term contracts. Saving…`);
        performSave({ projects: parsed.projects, termContracts: parsed.termContracts || [], staff: parsed.staff || [], clients: parsed.clients || [] });
      } catch(err) {
        setImportMsg("✗ Could not parse file: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function handleBackupFileSelect(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setBackupImportMsg({ text: "Reading file...", type: "idle" });
    setBackupImportPreview(null);
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.projects || !Array.isArray(parsed.projects)) {
          setBackupImportMsg({ text: "✗ Invalid file — no projects array found.", type: "error" });
          return;
        }
        setBackupImportPreview({
          parsed,
          projCount: parsed.projects.length,
          tcCount: (parsed.termContracts || []).length,
          staffCount: (parsed.staff || []).length,
          clientCount: (parsed.clients || []).length,
          exportedAt: parsed._exportedAt || null,
          version: parsed._version || 1,
          filename: file.name,
        });
        setBackupImportMsg({ text: "", type: "idle" });
      } catch(err) {
        setBackupImportMsg({ text: "✗ Could not parse file: " + err.message, type: "error" });
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function confirmRestore() {
    if (!backupImportPreview) return;
    const { parsed, projCount, tcCount } = backupImportPreview;
    setProjects(parsed.projects);
    setTermContracts(parsed.termContracts || []);
    setStaff(parsed.staff || []);
    setClients(parsed.clients || []);
    performSave({ projects: parsed.projects, termContracts: parsed.termContracts || [], staff: parsed.staff || [], clients: parsed.clients || [] });
    setBackupImportMsg({ text: "✓ Restored " + projCount + " projects, " + tcCount + " term contracts. Saving to Supabase…", type: "success" });
    setBackupImportPreview(null);
    const now = new Date().toISOString();
    localStorage.setItem("settyPMS_lastBackup", now);
    setLastBackupDate(now);
  }

  function previewCleanup(months) {
    const cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - months);
    const cutoffStr = cutoff.toISOString().slice(0, 10);
    const toDelete = projects.filter(p => {
      if (!p.archived) return false;
      // Use the last milestone date, last invoice date, or project start date as proxy for "last activity"
      const dates = [
        p.startDate,
        ...(p.milestones || []).map(m => m.dueDate).filter(Boolean),
        ...(p.invoices || []).map(i => i.date).filter(Boolean),
        ...(p.phases || []).map(ph => ph.endDate).filter(Boolean),
      ].filter(Boolean).sort();
      const lastActivity = dates[dates.length - 1] || p.startDate || "2000-01-01";
      return lastActivity < cutoffStr;
    });
    setCleanupPreview({ months, cutoffStr, toDelete });
    setCleanupMsg("");
  }

  function confirmCleanup() {
    if (!cleanupPreview) return;
    const n = cleanupPreview.toDelete.length;
    const typed = window.prompt(`Permanently delete ${n} archived project${n !== 1 ? "s" : ""}?\n\nThis CANNOT be undone. These projects and all their data will be gone forever.\n\nType DELETE to confirm:`);
    if (typed !== "DELETE") { setCleanupMsg("Cancelled — you must type DELETE exactly to confirm."); return; }
    const ids = new Set(cleanupPreview.toDelete.map(p => p.id));
    const remaining = projects.filter(p => !ids.has(p.id));
    setProjects(remaining);
    setCleanupMsg(`✓ Permanently deleted ${n} archived project${n !== 1 ? "s" : ""}. Saving…`);
    setCleanupPreview(null);
    performSave({ projects: remaining, termContracts, staff, clients });
  }

  function updateProject(updated) {
    setProjects(prev => {
      const old = prev.find(p => p.id === updated.id);
      // Fire Teams notification asynchronously — does not block save
      if (old && updated.teamsNotificationsEnabled && updated.teamsChannelId) {
        teamsNotify(old, updated).catch(e => console.warn("Teams notify:", e));
      }
      return prev.map(p => p.id === updated.id ? updated : p);
    });
  }

  function addProject() {
    const p = newProject();
    setProjects(prev => [p, ...prev]);
    setView(`project:${p.id}`);
  }

  const allPMs = useMemo(() => ["All", ...new Set(projects.map(p => p.projectManager).filter(Boolean))], [projects]);
  const allQAQC = useMemo(() => {
    const names = new Set();
    projects.forEach(p => (p.teamMembers || []).forEach(m => { if (m.isQAQC && m.name) names.add(m.name); }));
    return ["All", ...names];
  }, [projects]);

  const displayedProjects = useMemo(() => {
    const archived = view === "archive";
    return projects.filter(p => {
      if (view === "pipeline") return !p.archived && isPipeline(p);
      if (p.archived !== archived) return false;
      if (!archived && !isAwarded(p)) return false; // awarded-only in list view
      if (search && !p.name.toLowerCase().includes(search.toLowerCase()) && !(p.projectNumber || "").toLowerCase().includes(search.toLowerCase())) return false;
      if (filterPM !== "All" && p.projectManager !== filterPM) return false;
      if (filterQAQC !== "All" && !(p.teamMembers || []).some(m => m.isQAQC && m.name === filterQAQC)) return false;
      if (filterStatus !== "All" && p.status !== filterStatus) return false;
      if (filterContract !== "All" && p.contractStatus !== filterContract) return false;
      return true;
    });
  }, [projects, view, search, filterPM, filterQAQC, filterStatus, filterContract]);

  const viewingProject = view.startsWith("project:") ? projects.find(p => p.id === view.split(":")[1]) : null;

  // Keep URL hash in sync with current view
  React.useEffect(() => {
    window.location.hash = view;
  }, [view]);



  // ── Loading screen ──
  if (appStatus === "loading") return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: P.bg, gap: 16 }}>
      <style>{CSS}</style>
      <div style={{ fontWeight: 800, fontSize: 22, letterSpacing: "-.02em" }}>
        <span style={{ color: P.accent }}>SETTY</span>
        <span style={{ color: P.textMuted, fontWeight: 400 }}> · PMS</span>
      </div>
      <div style={{ color: P.textMuted, fontSize: 13 }}>⏳ Signing in to Microsoft & loading…</div>
    </div>
  );

  // ── Load error screen — show app anyway with empty state ──
  const loadErrorBanner = loadError ? (
    <div style={{ background: P.redDim, border: `1px solid ${P.red}`, borderRadius: 8, padding: "10px 16px", margin: "16px 32px", fontSize: 12, color: P.red, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <span>⚠ Could not load data: {loadError}. Changes may not save until the issue is resolved.</span>
      <button onClick={() => setLoadError(null)} style={{ background: "none", border: "none", color: P.red, cursor: "pointer", fontSize: 16 }}>✕</button>
    </div>
  ) : null;

  return (
    <>
    <div style={{ minHeight: "100vh", background: P.bg }}>
      <style>{CSS}</style>

      {/* ── Nav bar ── */}
      <div style={{ background: P.card, borderBottom: `1px solid ${P.border}`, padding: "0 32px", display: "flex", alignItems: "center", gap: 24, height: 54, position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ fontWeight: 800, fontSize: 16, letterSpacing: "-.02em" }}>
          <span style={{ color: P.accent }}>SETTY</span>
          <span style={{ color: P.textMuted, fontWeight: 400 }}> · PMS</span>
        </div>
        {[{ label: "Dashboard", key: "dashboard" }, { label: "Pipeline", key: "pipeline" }, { label: "Projects", key: "list" }, { label: "Term Contracts", key: "termcontracts" }, { label: "Team WBS", key: "teamwbs" }, { label: "Cash Flow", key: "cashflow" }, { label: "Pending COs", key: "pendingcos" }, { label: "Calendar", key: "calendar" }, { label: "Staff", key: "staff" }, { label: "Clients", key: "clients" }, { label: "Archive", key: "archive" }].map(({ label, key }) => (
          <button key={key} onClick={() => setView(key)}
            style={{ background: "none", border: "none", cursor: "pointer", color: (view === key || (view.startsWith("project:") && key === "list")) ? P.accentLight : P.textMuted, fontWeight: view === key ? 600 : 400, fontSize: 13, padding: "4px 0", borderBottom: view === key ? `2px solid ${P.accentLight}` : "2px solid transparent" }}>
            {label}
          </button>
        ))}
        <div style={{ flex: 1 }} />
        <SaveBadge status={appStatus} lastSaved={lastSaved} onRetry={manualRetry} errorDetail={saveErrorDetail} />
        {(() => {
          const daysSince = lastBackupDate ? Math.floor((Date.now() - new Date(lastBackupDate)) / 86400000) : 999;
          const overdue = daysSince >= 7;
          return (
            <Btn small variant={overdue ? "primary" : "ghost"} onClick={() => { setShowBackupModal(true); setBackupImportMsg({ text: "", type: "idle" }); setBackupImportPreview(null); }}
              style={{ position: "relative" }}>
              {overdue && <span style={{ position: "absolute", top: -4, right: -4, width: 8, height: 8, borderRadius: "50%", background: P.red }} />}
              🗄 Backup{overdue ? " !" : ""}
            </Btn>
          );
        })()}
        <Btn small variant="ghost" onClick={exportCSV}>⬇ CSV</Btn>
        <Btn small onClick={addProject}>+ New Project</Btn>
      </div>

      {loadErrorBanner}

      {view === "dashboard" && <Dashboard projects={projects} onNavigateToProject={id => setView(`project:${id}`)} onUpdateProject={updateProject} staff={staff} />}
      {view === "calendar" && <TeamCalendar projects={projects} onNavigateToProject={id => setView(`project:${id}`)} />}
      {view === "staff" && <StaffDirectoryView staff={staff} onUpdateStaff={setStaff} projects={projects} onNavigateToProject={id => setView(`project:${id}`)} onUpdateProject={updateProject} />}
      {view === "clients" && <ClientDirectoryView clients={clients} onUpdateClients={setClients} projects={projects} onNavigateToProject={id => setView(`project:${id}`)} />}
      {view === "teamwbs" && <TeamWBSView projects={projects} onNavigateToProject={id => setView(`project:${id}`)} />}
      {view === "cashflow" && <CashFlowView projects={projects} onNavigateToProject={id => setView(`project:${id}`)} />}
      {view === "termcontracts" && <TermContractsView termContracts={termContracts} projects={projects} onUpdateTermContracts={setTermContracts} onNavigateToProject={id => setView(`project:${id}`)} clients={clients} onAddClient={c => setClients(prev => [...prev, c])} />}
      {view === "pendingcos" && <PendingCOsView projects={projects} onNavigateToProject={id => setView(`project:${id}`)} onUpdateProject={updateProject} />}

      {view === "pipeline" && (
        <PipelineDashboard projects={projects} onNavigateToProject={id => setView(`project:${id}`)} onAddProject={() => { const p = newProject(); setProjects(prev => [p, ...prev]); setView(`project:${p.id}`); }} onUpdateProject={updateProject} />
      )}

      {(view === "list" || view === "archive") && (
        <div style={{ padding: "24px 32px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 20, fontWeight: 800 }}>{view === "archive" ? "Archived Projects" : "Awarded Projects"}</div>
            <Btn small onClick={addProject}>+ New Project</Btn>
          </div>
          <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
            <input placeholder="Search by name or number…" value={search} onChange={e => setSearch(e.target.value)} style={{ width: 260 }} />
            <select value={filterPM} onChange={e => setFilterPM(e.target.value)}>
              {allPMs.map(pm => <option key={pm}>{pm}</option>)}
            </select>
            {allQAQC.length > 1 && (
              <select value={filterQAQC} onChange={e => setFilterQAQC(e.target.value)}>
                {allQAQC.map(q => <option key={q}>{q === "All" ? "All QA/QC" : q}</option>)}
              </select>
            )}
            <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
              {["All", ...PIPELINE_STATUSES, ...PROJECT_STATUSES].map(s => <option key={s}>{s}</option>)}
            </select>
            {view === "list" && (
              <select value={filterContract} onChange={e => setFilterContract(e.target.value)}>
                <option value="All">All Contract Statuses</option>
                {CONTRACT_STATUSES.map(s => <option key={s}>{s}</option>)}
              </select>
            )}
          </div>
          {displayedProjects.length === 0 ? (
            <div style={{ color: P.textDim, textAlign: "center", padding: 60 }}>
              No projects found.{" "}
              <button onClick={addProject} style={{ color: P.accent, background: "none", border: "none", cursor: "pointer" }}>Create one</button>
            </div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(320px,1fr))", gap: 16 }}>
              {displayedProjects.map(p => <ProjectCard key={p.id} project={p} onClick={() => setView(`project:${p.id}`)} />)}
            </div>
          )}
        </div>
      )}

      {viewingProject && (
        <ProjectDetail project={viewingProject} onUpdate={updateProject} onBack={() => setView("list")} termContracts={termContracts} clients={clients} staff={staff} onAddClient={c => setClients(prev => [...prev, c])} onUpdateClient={c => setClients(prev => prev.map(x => x.id === c.id ? c : x))} onAddStaff={s => setStaff(prev => [...prev, s])} />
      )}
    </div>

    {/* Backup and Restore Modal */}
    {showBackupModal && (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 4000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}
        onClick={e => { if (e.target === e.currentTarget) setShowBackupModal(false); }}>
        <div style={{ background: P.card, border: "1px solid " + P.accent, borderRadius: 14, padding: 32, width: 560, maxWidth: "95vw" }}>

          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: 18 }}>🗄 Backup & Restore</div>
              <div style={{ fontSize: 12, color: P.textDim, marginTop: 3 }}>
                {lastBackupDate
                  ? "Last backup: " + new Date(lastBackupDate).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" })
                  : "No backup recorded on this device"}
              </div>
            </div>
            <button onClick={() => setShowBackupModal(false)} style={{ background: "none", border: "none", color: P.textDim, cursor: "pointer", fontSize: 20 }}>✕</button>
          </div>

          {/* Stats */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 24 }}>
            {[
              { label: "Projects", val: projects.length },
              { label: "Term Contracts", val: termContracts.length },
              { label: "Staff", val: staff.length },
              { label: "Clients", val: clients.length },
            ].map(({ label, val }) => (
              <div key={label} style={{ background: P.bg, borderRadius: 8, padding: "10px 14px", textAlign: "center", border: "1px solid " + P.border }}>
                <div style={{ fontFamily: "JetBrains Mono", fontWeight: 700, fontSize: 20, color: P.accentLight }}>{val}</div>
                <div style={{ fontSize: 11, color: P.textDim, marginTop: 2 }}>{label}</div>
              </div>
            ))}
          </div>

          {/* SharePoint ID Lookup — one-time use to eliminate Sites.Read.All */}
          <SpIdLookupPanel />

          {/* Export */}
          <div style={{ background: P.bg, border: "1px solid " + P.border, borderRadius: 10, padding: 18, marginBottom: 16 }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>Export Backup</div>
            <div style={{ fontSize: 12, color: P.textDim, marginBottom: 12 }}>
              Downloads a complete JSON backup of all projects, term contracts, staff, and clients.
              Store it somewhere safe — SharePoint, email to yourself, or a shared drive.
              <strong style={{ color: P.yellow }}> Recommended weekly.</strong>
            </div>
            <Btn onClick={exportBackup}>⬇ Download Backup</Btn>
          </div>

          {/* Import / Restore */}
          <div style={{ background: P.bg, border: "1px solid " + P.border, borderRadius: 10, padding: 18 }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>Restore from Backup</div>
            <div style={{ fontSize: 12, color: P.textDim, marginBottom: 12 }}>
              Select a previously exported <code style={{ background: P.border, padding: "1px 5px", borderRadius: 3 }}>.json</code> backup file.
              You will see a preview before anything is overwritten.
              <strong style={{ color: P.red }}> This replaces all current data.</strong>
            </div>

            {!backupImportPreview ? (
              <label style={{ display: "inline-block", cursor: "pointer" }}>
                <input type="file" accept=".json" onChange={handleBackupFileSelect} style={{ display: "none" }} />
                <span style={{ display: "inline-block", background: P.bg, border: "1px solid " + P.border, borderRadius: 8, padding: "7px 16px", fontSize: 13, fontWeight: 600, color: P.text, cursor: "pointer" }}>
                  📂 Select Backup File
                </span>
              </label>
            ) : (
              <div>
                <div style={{ background: P.card, border: "1px solid " + P.yellow, borderRadius: 8, padding: 14, marginBottom: 14 }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: P.yellow, marginBottom: 8 }}>⚠ Review before restoring</div>
                  <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 4 }}>
                    File: <strong>{backupImportPreview.filename}</strong>
                  </div>
                  {backupImportPreview.exportedAt && (
                    <div style={{ fontSize: 12, color: P.textMuted, marginBottom: 10 }}>
                      Exported: {new Date(backupImportPreview.exportedAt).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" })}
                    </div>
                  )}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 12 }}>
                    {[
                      { label: "Projects", val: backupImportPreview.projCount, curr: projects.length },
                      { label: "Term Contracts", val: backupImportPreview.tcCount, curr: termContracts.length },
                      { label: "Staff", val: backupImportPreview.staffCount, curr: staff.length },
                      { label: "Clients", val: backupImportPreview.clientCount, curr: clients.length },
                    ].map(({ label, val, curr }) => (
                      <div key={label} style={{ background: P.bg, borderRadius: 6, padding: "8px 10px", textAlign: "center" }}>
                        <div style={{ fontFamily: "JetBrains Mono", fontWeight: 700, fontSize: 16, color: val !== curr ? P.yellow : P.green }}>{val}</div>
                        <div style={{ fontSize: 10, color: P.textDim }}>{label}</div>
                        {val !== curr && <div style={{ fontSize: 10, color: P.textDim }}>now: {curr}</div>}
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Btn variant="danger" onClick={confirmRestore}>⚠ Restore — Replace All Data</Btn>
                    <Btn variant="ghost" onClick={() => { setBackupImportPreview(null); setBackupImportMsg({ text: "", type: "idle" }); }}>Cancel</Btn>
                  </div>
                </div>
              </div>
            )}

            {backupImportMsg.text && (
              <div style={{ marginTop: 10, fontSize: 12, fontWeight: 600,
                color: backupImportMsg.type === "success" ? P.green : backupImportMsg.type === "error" ? P.red : P.textDim }}>
                {backupImportMsg.text}
              </div>
            )}
          </div>

        </div>
      </div>
    )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  



</script>
</body>
</html>
