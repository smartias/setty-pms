      // Detect Setty's attached proposal boundary. The client contract is the
      // pages BEFORE the proposal; all flag/payment/schedule/legal/signature
      // detection runs against THAT text only. Without this scoping, our own
      // protective language (warranty disclaimers, consequential-damages
      // waivers, liquidated-damages disclaimer) shows up as client overrides.
      const settyProposalPage = findSettyProposalStart(pages);
      const clientPages = settyProposalPage ? pages.slice(0, settyProposalPage - 1) : pages;
      const clientText  = clientPages.join("\n\n");
      // pageOffsets are computed against the FULL text, which is fine even
      // when we scan clientText — match indices in clientText also map to
      // valid offsets in fullText since clientText is a prefix.
      if (settyProposalPage) {
        log.push({ type: "info", msg: `Setty's proposal detected starting page ${settyProposalPage} — flag detection scoped to client contract pages 1-${settyProposalPage - 1}.` });
      }

      // 1. Document type
      const docType = detectDocType(clientText);
      log.push({ type: "info", msg: `Document type: ${docType.type}${docType.year ? " ("+docType.year+")" : ""}` });

      // 2. OVERRIDE FLAGS — the primary output
      log.push({ type: "tier", msg: "Override clauses" });
      const rawFlags = detectFlags(clientText, pageOffsets);
      // Drop insurance-limit flags whose required amount is WITHIN Setty's
      // standing coverage. They aren't override clauses — they're just normal
      // contract requirements Setty already satisfies. The Key Numbers block
      // still shows the comparison; we only suppress the noisy "⚠" flag at
      // the top of the page. Higher-than-standing limits still fire.
      const insToNum = (s) => {
        const n = parseFloat(String(s).replace(/[^0-9.]/g, ""));
        return isNaN(n) ? null : Math.round(n);
      };
      const suppressedInsurance = [];
      const suppressedOther = [];
      const flags = rawFlags.filter((f) => {
        // Multiplier flag: contract sets a labor multiplier. Setty's posture is
        // the higher the better (above standard = more margin). Suppress when
        // the captured multiplier is at or above Setty's standard. Only flag
        // when BELOW (margin squeeze).
        if (f.id === "multiplier") {
          const required = parseFloat(String(f.capturedValue || "").replace(/[^0-9.]/g, ""));
          const std = SETTY_STANDARDS.multiplier;
          if (!isNaN(required) && typeof std === "number" && required >= std) {
            suppressedOther.push({ label: f.label, msg: `required ${required.toFixed(2)} is at or above Setty's standard ${std}` });
            return false;
          }
          return true;
        }
        const cfg = INS_FLAG_MAP[f.id];
        if (!cfg) return true;                                            // not an insurance flag
        const o = SETTY_STANDARDS.insurance && SETTY_STANDARDS.insurance[cfg.key];
        if (!o || !f.capturedValue) return true;                          // can't compare → keep
        const required = insToNum(f.capturedValue);
        if (required == null) return true;
        if (required <= o.perOccurrence) {
          suppressedInsurance.push({ label: f.label, required, setty: o.perOccurrence });
          return false;                                                   // within standing → drop
        }
        return true;                                                      // above standing → keep
      });
      for (const s of suppressedInsurance) {
        log.push({ type: "info", msg: `Insurance flag suppressed — ${s.label} required $${s.required.toLocaleString()} is within Setty's standing $${s.setty.toLocaleString()}.` });
      }
      for (const s of suppressedOther) {
        log.push({ type: "info", msg: `Flag suppressed — ${s.label}: ${s.msg}.` });
      }
      for (const f of flags) {
        const locator = [f.sectionLabel, f.pageNumber ? `p. ${f.pageNumber}` : ""].filter(Boolean).join(" · ");
        log.push({ type: "flag", msg: `⚑ ${f.label}${locator ? "  (" + locator + ")" : ""}` });
        // Include the full containing section in the log so reviewers see
        // the override clause text inline (and so it flows through to the
        // OneNote page when the log is rendered there). Per user request
        // 2026-06-04: "extract the entire paragraph with the payment
        // information and put it in the one note/extraction log".
        if (f.fullSection) {
          log.push({ type: "section", flagId: f.id, flagLabel: f.label, msg: f.fullSection });
        }
      }
      if (flags.length === 0) log.push({ type: "info", msg: "No override flags detected — verify manually" });

      // 3. Document metadata
      log.push({ type: "tier", msg: "Document metadata" });
      const dateRes = parseContractDate(text);
      const contractDate = dateRes
        ? makeField(dateRes.date, dateRes.confidence, dateRes.source)
        : makeField("", "empty", "");
      if (dateRes) log.push({ type: "hit", msg: `Contract date: ${dateRes.date}` });
      else log.push({ type: "miss", msg: "Contract date not parsed" });

      // All of the structured extractors run against clientText, not text.
      // Setty's attached proposal would otherwise leak its OWN language into
      // the parsed fields (Setty's payment terms, Setty's insurance, Setty's
      // governing-law/venue) which would shadow the client's actual terms.
      const parties = extractParties(clientText);
      if (parties.client.value) log.push({ type: "hit", msg: `Client: ${parties.client.value.slice(0,60)}…` });
      const project = extractProject(clientText);
      if (project.value) log.push({ type: "hit", msg: `Project: ${project.value.slice(0,60)}` });
      const ids = extractIdentifiers(clientText, parsedPdf.fileName);
      if (ids.contractNumber.value)      log.push({ type: "hit", msg: `Contract #: ${ids.contractNumber.value}` });
      if (ids.primeProjectNumber.value)  log.push({ type: "hit", msg: `Prime's Project #: ${ids.primeProjectNumber.value}` });
      if (ids.contractExpiration.value)  log.push({ type: "hit", msg: `Contract Expiration: ${ids.contractExpiration.value}` });

      // 4. Payment terms
      log.push({ type: "tier", msg: "Payment terms" });
      const payment = extractPaymentTerms(clientText, flags);

      // 5. Reimbursable rules
      log.push({ type: "tier", msg: "Reimbursable expense rules" });
      const reimb = extractReimbursableRules(clientText, flags);

      // 6. Schedule
      log.push({ type: "tier", msg: "Schedule terms" });
      const schedule = extractSchedule(clientText, flags);

      // 7. Legal — governing law, venue, dispute resolution
      log.push({ type: "tier", msg: "Legal" });
      const legal = extractLegal(clientText);
      if (legal.governingLaw.value)      log.push({ type: "hit", msg: `Governing law: ${legal.governingLaw.value}` });
      if (legal.venue.value)              log.push({ type: "hit", msg: `Venue: ${legal.venue.value}` });
      if (legal.disputeResolution.value)  log.push({ type: "hit", msg: `Dispute resolution: ${legal.disputeResolution.value}` });

      // Statutory caveats — for the identified governing-law state, look up
      // enforceability of risk-transfer clauses against the encoded matrix
      // (Contract Checklist V5 Appendix C). Surfaces caveats specific to
      // any fired flags (e.g., "you have pay-when-paid AND NY law: NY Prompt
      // Payment Act restricts pay-if-paid clauses").
      const statutoryCaveats = computeStatutoryCaveats(legal.governingLaw.value, flags);
      if (statutoryCaveats) {
        log.push({ type: "hit", msg: `Statutory matrix loaded for ${statutoryCaveats.stateName}${statutoryCaveats.friendly ? " (Setty-friendly jurisdiction)" : ""}.` });
        for (const cr of statutoryCaveats.crossReferences) {
          log.push({ type: "info", msg: `Statutory caveat (${statutoryCaveats.stateCode}): flag "${cr.flagId}" — ${cr.note}${cr.statute ? " (" + cr.statute + ")" : ""}` });
        }
      }

      // Presence/absence checks — force majeure, third-party-beneficiary
      // disclaimer, waiver of subrogation. Each is informational (not a flag);
      // Setty wants TPB + waiver of subrogation PRESENT, and force majeure
      // PRESENT for completeness.
      const presenceChecks = extractPresenceChecks(clientText);
      log.push({ type: "info", msg: `Force majeure: ${presenceChecks.forceMajeure.present ? "present" : "absent"}` });
      log.push({ type: "info", msg: `Third-party beneficiary disclaimer: ${presenceChecks.tpbDisclaimer.present ? "present" : "MISSING (request insertion)"}` });
      log.push({ type: "info", msg: `Waiver of subrogation: ${presenceChecks.waiverSubrogation.present ? "present" : "MISSING (request insertion)"}` });

      // 8. Signatories — extract the counterparty's signing name & title from
      // the signature block. Useful for "who's our point person at the prime"
      // and for figuring out who actually has authority to sign amendments.
      log.push({ type: "tier", msg: "Signatories" });
      const signatories = extractSignatories(clientText);
      for (const s of signatories) {
        log.push({ type: "hit", msg: `Signatory: ${s.name} — ${s.title}` });
      }

      // 9. Document outline — pages-of-the-PDF index for the OneNote TOC:
      // exhibits & where they start, proposal location, fee call-out, sig page.
      // Uses FULL text (not clientText) so it can find the proposal and any
      // attachments that live after the client contract body.
      const outline = extractDocumentOutline(text, pages, pageOffsets, clientText);
      // Augment outline with the boundary detections we did up top.
      outline.settyProposalPage  = settyProposalPage;
      outline.primeAgreementPage = findPrimeAgreementStart(pages);
      // Substantive Prime Agreement references = the contract talks about a
      // specific Prime Agreement (named, dated, with parties) versus the
      // template "if applicable" mentions. Count phrases that imply a real one.
      const primeRefMatches = (text.match(/Prime\s+Agreement/gi) || []).length;
      const primeNamed = /(?:identify|known\s+as|attached\s+as)\s+(?:the\s+)?Prime\s+Agreement|Prime\s+Agreement\s*[:,]\s*['"][^'"\n]{4,80}['"]|Prime\s+Agreement\s+(?:dated|between)\b/i.test(text);
      outline.primeAgreementReferenced = primeRefMatches >= 2 || primeNamed;
      outline.primeAgreementAttached   = !!outline.primeAgreementPage;

      // Synthesize a flag when the contract clearly hangs terms off a Prime
      // Agreement but that Prime Agreement isn't actually in this PDF. The
      // reviewer needs to chase it down before signing — Prime terms often
      // contain the substantive obligations (insurance limits, indemnity
      // language, dispute resolution venue) that this contract just refers
      // to by reference.
      if (outline.primeAgreementReferenced && !outline.primeAgreementAttached) {
        // Find the most descriptive Prime Agreement mention to put in the
        // captured paragraph — preferred order: "identified as", "known as",
        // any sentence containing both "Prime Agreement" and a date.
        const primeContextM = text.match(/[^.\n]{0,300}?Prime\s+Agreement[^.\n]{0,200}?(?:dated|between|identified|known\s+as)[^.\n]{0,300}/i)
                           || text.match(/[^.\n]{0,200}?Prime\s+Agreement[^.\n]{0,300}/i);
        const idx = primeContextM ? text.indexOf(primeContextM[0]) : 0;
        flags.push({
          id: "prime-not-attached",
          label: "Prime Agreement referenced but NOT attached",
          severity: "high",
          evidence: primeContextM ? "…" + primeContextM[0].slice(0, 200).replace(/\s+/g, " ").trim() + "…" : "",
          fullSection: primeContextM ? getContainingSection(text, idx, primeContextM[0].length) : "",
          sectionLabel: "",
          pageNumber: pageOfIndex(idx, pageOffsets),
          explanation: "This contract incorporates terms from the Prime Agreement by reference, but the Prime Agreement itself is not included in this PDF. Request the Prime Agreement from the prime/architect before signing — its terms (insurance, indemnity, dispute resolution, payment timing) flow down to Setty under this contract.",
          capturedValue: null,
        });
        log.push({ type: "flag", msg: `⚑ Prime Agreement referenced but NOT attached  (p. ${pageOfIndex(idx, pageOffsets) || "?"})` });
      }
      if (outline.sections.length > 0) {
        log.push({ type: "tier", msg: "Document outline" });
        for (const s of outline.sections) {
          log.push({ type: "hit", msg: `${s.label}${s.description ? " — " + s.description : ""} (p. ${s.page})` });
        }
      }

      // 10. OCR status — which pages have text, which are scanned/blank.
      // Match scanned ranges back to outline so we can tell the reviewer
      // WHAT they're missing if they skip OCR.
      const TEXT_THRESHOLD = 100;
      const scannedPageNums = [];
      (parsedPdf.pages || []).forEach((p, i) => {
        if ((p || "").length < TEXT_THRESHOLD) scannedPageNums.push(i + 1);
      });
      const ocrStatus = {
        totalPages: (parsedPdf.pages || []).length,
        scannedPageCount: scannedPageNums.length,
        scannedRanges: groupScannedRanges(scannedPageNums, outline.sections),
        // Caller (handleFile / runPartialOcr) can override these flags after
        // an OCR pass or skip. Default state for a fresh extraction is
        // "scanned pages present, not yet OCR'd".
        ocrAttempted: false,
        ocrSkipped:   false,
      };

      return {
        log,
        docType,
        flags,
        // rawFlags is the UNFILTERED flag list — used by computeInsurance-
        // Comparison so the Key Numbers block still shows what the contract
        // required, even when the insurance flag itself was suppressed (because
        // the required limit was within Setty's standing coverage). flags is
        // for display in Override Clauses; rawFlags is for downstream
        // numerical comparisons that need the captured values.
        rawFlags,
        // Pass through the CLIENT contract text (not the full text incl. Setty's
        // attached proposal) so downstream consumers like insurance-deferral
        // detection naturally inherit the boundary. Cheap by reference.
        sourceText: clientText,
        signatories,
        outline,
        ocrStatus,
        // Statutory caveats: { stateCode, stateName, friendly, profile,
        // crossReferences[] } or null. Computed from governing-law extraction
        // against Appendix C of Contract Checklist V5.
        statutoryCaveats,
        // Presence checks: { forceMajeure, tpbDisclaimer, waiverSubrogation }
        // each with { present: bool }.
        presenceChecks,
        fields: {
          // metadata
          contractDate,
          contractExpiration: ids.contractExpiration,
          contractNumber: ids.contractNumber,
          primeProjectNumber: ids.primeProjectNumber,
          client: parties.client,
          settyRole: parties.settyRole,
          project,
          // payment
          invoiceReview: payment.invoiceReview || makeField("", "empty", ""),
          payWhenPaid: payment.payWhenPaid,
          interestOnLate: payment.interestOnLate,
          retainage: payment.retainage,
          conditionsPrecedent: payment.conditionsPrecedent,
          // reimbursable
          multiplier: reimb.multiplier,
          markupExclusions: reimb.markupExclusions,
          reimbursableRules: reimb.reimbursableRules,
          // schedule
          substantialCompletion: schedule.substantialCompletion,
          scheduleSource: schedule.scheduleSource,
          terminationNotice: schedule.terminationNotice,
          // legal
          governingLaw: legal.governingLaw,
          venue: legal.venue,
          disputeResolution: legal.disputeResolution,
        },
      };
    }

    // ========================================================================
    // React UI
    // ========================================================================
    function FieldEditor({ keyName, label, field, onChange, multiline }) {
      const Tag = multiline ? "textarea" : "input";
      return (
        <div className={`field conf-${field.confidence}`}>
          <label>
            {label}
            <span className={`badge ${field.confidence}`}>{field.confidence}</span>
          </label>
          <Tag
            value={field.value}
            onChange={(e) => onChange(keyName, { ...field, value: e.target.value })}
            rows={multiline ? 3 : undefined}
          />
          {field.source && <div className="source">via {field.source}</div>}
        </div>
      );
    }

    function FlagsBanner({ flags }) {
      if (flags.length === 0) {
        return (
          <div className="flags-banner empty">
            <div className="header-line">✓ No client-override clauses detected</div>
            <div style={{fontSize: 11, color: "#A7F3D0"}}>
              Verify manually — absence of detection isn't proof of absence.
            </div>
          </div>
        );
      }
      const high = flags.filter(f => f.severity === "high");
      const medium = flags.filter(f => f.severity === "medium");
      const info = flags.filter(f => f.severity === "info");
      return (
        <div className="flags-banner">
          <div className="header-line">
            ⚑ {flags.length} override clause{flags.length === 1 ? "" : "s"} detected
            {high.length > 0 && <span style={{fontSize: 11, fontWeight: 500}}> ({high.length} high-severity)</span>}
          </div>
          {[...high, ...medium, ...info].map((f) => (
            <div className={`flag ${f.severity}`} key={f.id}>
              <div className="flag-label">{f.label}{f.capturedValue ? ` — ${f.capturedValue}` : ""}</div>
              <div style={{fontSize: 11, color: "#E2E8F0", marginTop: 4}}>{f.explanation}</div>
              {f.contextNote && (
                <div style={{fontSize: 11, color: "#BFDBFE", marginTop: 4, padding: "4px 8px", background: "#172554", borderLeft: "3px solid #3B82F6", borderRadius: 3}}>
                  <strong>◆ PMS context:</strong> {f.contextNote}
                </div>
              )}
              <div className="flag-evidence">{f.evidence}</div>
            </div>
          ))}
        </div>
      );
    }

    // ========================================================================
    // PMS CONTEXT — disambiguation + comparison baselines
    // ========================================================================
    // We derive a context object for the project this contract belongs to. The
    // contract PDF stays the source of truth for its OWN terms; this context only
    // supplies what the regex can't infer: who is Setty vs the prime/client, and
    // the baselines to compare client-imposed terms against. Shape:
    //   { structure: { settyIsPrime, settyRole, prime, clientName, isTaskOrder,
    //                   taskOrderNumber, underMaster, subconsultants[], feeType },
    //     standards:  { paymentTerms, lateInterest, multiplier, insurance:{...} },
    //     projectName }
    //
    // This tool reads the PMS project list DIRECTLY from Supabase (the anon key
    // below is the same public, client-side key SettyPMS already ships) so NO
    // edit to SettyPMS is required. The contract is never uploaded — this is a
    // read only. The user (or an auto-match on contract #) picks which project
    // the contract belongs to; we then derive structure + standards from it.

    // Setty's standard commercial terms — the baseline used for comparison notes
    // ("required $10M E&O vs our $5M/occ", etc.). Insurance figures below are
    // Setty's actual standing coverage (confirmed). paymentTerms/lateInterest/
    // multiplier are still PLACEHOLDERS — ★ confirm and edit those.
    const SETTY_STANDARDS = {
      paymentTerms: "Net 30",     // ★ placeholder — confirm
      lateInterest: "1.5%/month", // ★ placeholder — confirm
      multiplier:   2.9,          // ★ placeholder — confirm
      // Setty's standing insurance schedule (per occurrence / aggregate).
      insurance: {
        professionalLiability: { perOccurrence: 5000000,  aggregate: 10000000 },
        generalLiability:      { perOccurrence: 2000000,  aggregate: 4000000  },
        automobileLiability:   { perOccurrence: 1000000 },
        workersComp:           { perOccurrence: 1000000 }, // Employer's Liability
        umbrella:              { perOccurrence: 10000000 },
        cyberLiability:        { perOccurrence: 2000000 },
      },
    };

    // Same public anon key + URL SettyPMS uses (SettyPMS.html SUPABASE_*).
    // anon + RLS: this can read the shared pms_data singleton, nothing more.
    const PMS_SUPABASE_URL = "https://khxmgjilwhdguuepbhne.supabase.co";
    const PMS_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoeG1namlsd2hkZ3V1ZXBiaG5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjg2MDYsImV4cCI6MjA4ODY0NDYwNn0.vtHt2eydU2iQ426iYOzLrqpH2WLXdRnicq-3sNfoNq8";

    async function loadPmsProjects() {
      const res = await fetch(
        PMS_SUPABASE_URL + "/rest/v1/pms_data?id=eq.singleton&select=projects",
        { headers: { apikey: PMS_SUPABASE_ANON_KEY, Authorization: "Bearer " + PMS_SUPABASE_ANON_KEY } }
      );
      if (!res.ok) throw new Error("Supabase " + res.status);
      const rows = await res.json();
      return (rows && rows[0] && rows[0].projects) || [];
    }

    // Mirror of SettyPMS buildExtractorContext, but built here from a project row.
    // `prime` is the top-of-chain firm: empty (or Setty) = Setty is prime; any
    // other firm = Setty is a sub to it.
    function buildContextFromProject(project) {
      if (!project) return null;
      const prime = (project.prime || "").trim();
      const settyIsPrime = !prime || /setty/i.test(prime);
      return {
        structure: {
          settyIsPrime,
          settyRole: settyIsPrime
            ? "Prime (contracts directly with client)"
            : "Subconsultant to " + prime,
          prime,
          clientName: (project.clientName || "").trim(),
          isTaskOrder: !!project.isTaskOrder,
          taskOrderNumber: (project.taskOrderNumber || "").trim(),
          underMaster: !!project.taskOrderTermContractId,
          subconsultants: (project.subconsultants || [])
            .map((s) => (s.firm || s.name || "").trim()).filter(Boolean),
          feeType: project.feeType || "",
        },
        standards: SETTY_STANDARDS,
        projectName: project.name || "",
      };
    }

    // Try to auto-identify which PMS project this contract belongs to, using the
    // identifiers the regex pulled from the PDF. Tier order reflects live PMS data
    // (most projects only have name + Setty's projectNumber populated; contract #
    // and primeProjectNumber are rarely filled):
    //   1. contractNumber  → p.contractNumber      (rare but unambiguous)
    //   2. extracted #      → p.primeProjectNumber  (when prime's job # is filled)
    //   3. extracted #      → p.projectNumber       (HIGH yield — the leading
    //        filename token / "Project No." on a Setty contract is usually Setty's
    //        own job number, which maps to PMS projectNumber)
    //   4. exact project-name match
    // Returns a project or null (→ user picks from the dropdown).
    function matchProject(result, projects) {
      const f = result.fields;
      const norm = (v) => (v || "").trim().toLowerCase();
      const cn = norm(f.contractNumber.value);
      const pn = norm(f.primeProjectNumber.value);
      const nm = norm(f.project.value);
      const active = projects.filter((p) => !p.archived);
      return (
        (cn && active.find((p) => norm(p.contractNumber) === cn)) ||
        (pn && active.find((p) => norm(p.primeProjectNumber) === pn)) ||
        (pn && active.find((p) => norm(p.projectNumber) === pn)) ||
        (nm && active.find((p) => norm(p.name) === nm)) ||
        null
      );
    }

    // Fill party fields from the PMS's known structure — but ONLY when the regex
    // came up empty or low-confidence. Never clobber a confident parse or an edit
    // the user already made (those stay "high" and are skipped here).
    function fillStructuralFields(result, ctx) {
      const s = (ctx && ctx.structure) || {};
      const fields = { ...result.fields };
      const weak = (c) => c === "empty" || c === "low";
      if (s.clientName && weak(fields.client.confidence)) {
        fields.client = { value: s.clientName, confidence: "high", source: "PMS project record (contract structure)" };
      }
      if (s.settyRole && weak(fields.settyRole.confidence)) {
        fields.settyRole = { value: s.settyRole, confidence: "high", source: "PMS project record (contract structure)" };
      }
      return { ...result, fields };
    }

    // Maps each insurance flag to the matching line in SETTY_STANDARDS.insurance.
    // `umbrellaOK` notes lines whose excess can typically be met by the umbrella.
    const INS_FLAG_MAP = {
      "e-o-limits":           { key: "professionalLiability", label: "Professional Liability" },
      "cgl-limits":           { key: "generalLiability",      label: "General Liability", umbrellaOK: true },
      "auto-liability-limit": { key: "automobileLiability",   label: "Automobile Liability", umbrellaOK: true },
      "umbrella-limit":       { key: "umbrella",              label: "Umbrella / Excess" },
      "workers-comp-limit":   { key: "workersComp",           label: "Employer's Liability" },
      "cyber-liability-limit":{ key: "cyberLiability",        label: "Cyber Liability" },
    };

    // Detect when the contract defers insurance to the Prime Agreement rather
    // than specifying its own limits. Common in flow-down subcontracts — see
    // FXC NRTC item 15: "Subconsultant shall ... maintain insurance ... per
    // the terms of the Prime Agreement." Without this detection the OneNote
    // Key Numbers block fills with "—" for every line because no $-amounts
    // appear in the contract text. With it, the block tells you up front
    // that you need Exhibit B / the Prime Agreement to get actual numbers.
    function detectInsuranceDeferral(text) {
      // Phrase must include both "insurance" and a reference to the Prime
      // (or Owner / Master / referenced agreement) within ~150 chars to
      // distinguish a true deferral from unrelated insurance mentions.
      const re = /insurance[^.]{0,150}?(?:per|in\s+accordance\s+with|under|as\s+(?:set\s+forth|required|specified)\s+(?:in|by))\s+(?:the\s+)?(Prime\s+Agreement|Master\s+Agreement|Owner['']s?\s+(?:Agreement|Contract)|attached\s+(?:Exhibit|Schedule)|Exhibit\s+[A-Z])/i;
      const m = text.match(re);
      if (m) return m[1];                            // returns "Prime Agreement", "Exhibit B", etc.
      // Reverse phrasing: "per the Prime Agreement ... insurance"
      const re2 = /(?:per|in\s+accordance\s+with|under)\s+(?:the\s+)?(Prime\s+Agreement|Master\s+Agreement|Exhibit\s+[A-Z])[^.]{0,150}?insurance/i;
      const m2 = text.match(re2);
      if (m2) return m2[1];
      return null;
    }

    // Build the required-vs-Setty-standing insurance comparison rows for the
    // OneNote Key Numbers callout. Computed in the extractor (where standards
    // and INS_FLAG_MAP live) so PMS doesn't need to duplicate them. Returns
    // either an array of { line, requiredText, settyText, status } rows or
    // a deferred result { deferredTo: "Prime Agreement" } if the contract
    // farms its insurance terms out to another document.
    function computeInsuranceComparison(flags, standards, text) {
      if (!standards || !standards.insurance) return [];
      const ins = standards.insurance;
      const dollars = (v) => "$" + Number(v).toLocaleString();
      // Parse a captured dollar amount that may include commas and a `.00`
      // cents suffix. We strip non-digits-or-decimal, then parseFloat — NOT
      // a blind `parseInt(replace(/[^0-9]/))` which would treat "2,000,000.00"
      // as "200000000" (200M) by tacking the cents on as extra zeros. Seen
      // in the wild on AIA C401-style contracts that write out the long form:
      //   "Two Million Dollars ($ 2,000,000.00 )"
      const toNum = (str) => {
        const n = parseFloat(String(str).replace(/[^0-9.]/g, ""));
        return isNaN(n) ? null : Math.round(n);
      };
      const insuranceFlags = (flags || []).filter((f) => INS_FLAG_MAP[f.id]);
      // No insurance flags fired AND contract defers to another agreement —
      // surface that instead of a wall of "—" rows.
      if (insuranceFlags.length === 0 && text) {
        const deferredTo = detectInsuranceDeferral(text);
        if (deferredTo) return { deferredTo };
      }
      const rows = [];
      for (const [flagId, cfg] of Object.entries(INS_FLAG_MAP)) {
        const flag = (flags || []).find((f) => f.id === flagId);
        const o = ins[cfg.key];
        if (!o) continue;
        const settyText = dollars(o.perOccurrence) + (o.aggregate ? " / " + dollars(o.aggregate) + " agg" : "");
        if (!flag || !flag.capturedValue) {
          rows.push({ line: cfg.label, requiredText: "—", settyText, status: "unknown" });
          continue;
        }
        const required = toNum(flag.capturedValue);
        const requiredText = required != null ? dollars(required) : flag.capturedValue;
        const status = (required != null && required > o.perOccurrence) ? "above" : "within";
        rows.push({ line: cfg.label, requiredText, settyText, status });
      }
      return rows;
    }

    // Attach a `contextNote` to flags using PMS structure + standards. Pure —
    // computed at render time, so it updates whenever context arrives and never
    // touches editable field state. We annotate rather than suppress: a flag the
    // structure makes unlikely may still be binding boilerplate.
    function decorateFlags(flags, ctx) {
      if (!ctx) return flags;
      const s = ctx.structure || {};
      const std = ctx.standards || {};
      const dollars = (v) => "$" + Number(v).toLocaleString();
      // parseFloat after stripping non-digit-non-decimal — avoids the
      // "$2,000,000.00" → 200000000 trap from the previous parseInt approach.
      const num = (str) => {
        const n = parseFloat(String(str).replace(/[^0-9.]/g, ""));
        return isNaN(n) ? null : Math.round(n);
      };
      return flags.map((f) => {
        let note = null;
        // -- Structure-dependent relevance --
        if (s.settyIsPrime && (f.id === "pay-when-paid" || f.id === "prime-flowdown" || f.id === "termination-linked")) {
          note = "PMS shows Setty is PRIME (contracts directly with the client). This clause normally binds a subconsultant — verify it actually applies to Setty here; if not, it may be inherited boilerplate.";
        }
        if (f.id === "prime-flowdown" && s.underMaster) {
          note = "PMS links this project to a master/term agreement" + (s.taskOrderNumber ? " (task order " + s.taskOrderNumber + ")" : "") + " already on file — cross-check the flow-down terms against that master.";
        }
        // -- Comparison baselines --
        if (f.id === "multiplier" && f.capturedValue && std.multiplier) {
          const v = parseFloat(f.capturedValue);
          if (!isNaN(v)) note = v > std.multiplier
            ? "Higher than Setty's standard multiplier (" + std.multiplier + ") — favorable margin, confirm acceptable."
            : v < std.multiplier
              ? "BELOW Setty's standard multiplier (" + std.multiplier + ") — margin squeeze, flag for fee review."
              : "Matches Setty's standard multiplier (" + std.multiplier + ").";
        }
        // -- Insurance limits: compare required figure to Setty's standing coverage --
        const insCfg = INS_FLAG_MAP[f.id];
        if (insCfg && f.capturedValue && std.insurance && std.insurance[insCfg.key]) {
          const o = std.insurance[insCfg.key];
          const v = num(f.capturedValue);
          if (v !== null) {
            const aggTxt = o.aggregate ? " / " + dollars(o.aggregate) + " agg" : "";
            note = v > o.perOccurrence
              ? "ABOVE Setty's " + insCfg.label + " (" + dollars(o.perOccurrence) + aggTxt + ") — flag to broker; may need a project-specific endorsement" + (insCfg.umbrellaOK ? " or coverage under the $10M umbrella." : ".")
              : "Within Setty's " + insCfg.label + " (" + dollars(o.perOccurrence) + aggTxt + ").";
          }
        }
        return note ? { ...f, contextNote: note } : f;
      });
    }

    function PmsContextCard({ ctx }) {
      const s = ctx.structure || {};
      const std = ctx.standards || {};
      const row = (label, val) => val ? (
        <div style={{ display: "flex", gap: 6, fontSize: 11, marginTop: 2 }}>
          <span style={{ color: "#93C5FD", minWidth: 110 }}>{label}</span>
          <span style={{ color: "#E2E8F0" }}>{val}</span>
        </div>
      ) : null;
      return (
        <div style={{ background: "#172554", border: "1px solid #1E40AF", borderRadius: 6, padding: "10px 12px", marginBottom: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#BFDBFE", marginBottom: 6 }}>
            ◆ PMS context loaded{ctx.projectName ? " — " + ctx.projectName : ""}
          </div>
          {row("Setty role", s.settyRole)}
          {row("Prime", s.prime)}
          {row("Client", s.clientName)}
          {row("Task order", s.isTaskOrder ? (s.taskOrderNumber || "Yes") + (s.underMaster ? " (under master on file)" : "") : null)}
          {row("Subs (by Setty)", (s.subconsultants || []).join(", "))}
          {row("Std. multiplier", std.multiplier)}
          {row("Std. payment", std.paymentTerms + (std.lateInterest ? " · " + std.lateInterest + " late" : ""))}
          {(() => {
            const ins = std.insurance; if (!ins) return null;
            const m = (n) => "$" + (n / 1000000) + "M";
            const line = (o) => o ? m(o.perOccurrence) + (o.aggregate ? " / " + m(o.aggregate) + " agg" : "") : null;
            return (
              <>
                {row("Prof. Liability", line(ins.professionalLiability))}
                {row("General Liability", line(ins.generalLiability))}
                {row("Umbrella/Excess", line(ins.umbrella))}
                {row("Auto Liability", line(ins.automobileLiability))}
                {row("Workers Comp (EL)", line(ins.workersComp))}
                {row("Cyber Liability", line(ins.cyberLiability))}
              </>
            );
          })()}
          <div style={{ fontSize: 10, color: "#64748B", marginTop: 6, fontStyle: "italic" }}>
            Used to disambiguate parties and compare client terms to Setty's standards. The PDF remains the source of truth for its own terms.
          </div>
        </div>
      );
    }

    function App() {
      const [file, setFile] = useState(null);
      const [parsing, setParsing] = useState(false);
      // Investigative caption that rotates through INVESTIGATIVE_QUOTES while
      // parsing is in progress. Holds { emoji, line } or null when not parsing.
      // The timer is held in a ref so we can clear it from any codepath that
      // ends parsing (success, error, or unmount).
      const [investigation, setInvestigation] = useState(null);
      const investigationTimerRef = useRef(null);
      // Partial-scan state. When the PDF has SOME pages with text and SOME
      // pages that are blank (likely scanned attachments — Prime Agreement,
      // Exhibit B, signed schedules), we extract from the text pages first
      // and offer to OCR the scanned pages on demand. Shape:
      //   { parsed, scannedIdxs, textIdxs, ocring }
      const [partialScan, setPartialScan] = useState(null);
      const [result, setResult] = useState(null);
      const [log, setLog] = useState([]);
      const [pmsConnected, setPmsConnected] = useState(false);
      const [dragging, setDragging] = useState(false);
      // The SharePoint/web URL the file was dragged from, if the browser
      // populated it in the DataTransfer (works for drags out of SharePoint
      // Online, browser tabs, some email clients). Empty for File Explorer
      // drags. Sent to PMS so the OneNote page can show where the contract
      // came from in addition to the record's curated folder.
      const [dragSourceUrl, setDragSourceUrl] = useState("");
      // sendState state machine:
      //   idle     — button visible, ready to send
      //   writing  — postMessage sent; PMS is writing OneNote; show rotating quotes
      //   done     — PMS confirmed success; brief celebration; auto-close
      //   failed   — PMS reported an error; show it; auto-close after 5s
      //   timeout  — no PMS ACK in 60s; manual close button
      const [sendState, setSendState] = useState("idle");
      // Failure message text (from PMS) — shown in the "failed" state UI.
      const [sendError, setSendError] = useState("");
      // Currently-displayed writing quote { emoji, line } during "writing" state.
      const [writingQuote, setWritingQuote] = useState(null);
      const writingTimerRef = useRef(null);
      const ackTimeoutRef = useRef(null);
      // PMS project context for the contract being reviewed. We load the PMS
      // project list straight from Supabase (read-only), then identify which
      // project this contract belongs to — auto-matched on contract # or chosen
      // from the dropdown. `pmsContext` (structure + standards) is derived from
      // that project; the ref lets handleFile read it without a stale closure.
      const [pmsProjects, setPmsProjects] = useState([]);
      const [pmsLoadState, setPmsLoadState] = useState("idle"); // idle|loading|loaded|error
      const [selectedProjectId, setSelectedProjectId] = useState("");
      const [autoMatched, setAutoMatched] = useState(false);
      const [pmsContext, setPmsContext] = useState(null);
      const pmsContextRef = useRef(null);
      // Search combobox state — replaced the long <select> pulldown 2026-06-04
      // because there are hundreds of projects and a scroll-pulldown was unusable.
      // Token-based substring filter against name/numbers/client. Top 12 shown.
      const [projectQuery, setProjectQuery] = useState("");
      const [projectFocused, setProjectFocused] = useState(false);

      useEffect(() => {
        setPmsConnected(!!window.opener);
        // Pull the PMS project list directly from Supabase (no SettyPMS edit
        // needed). Failure is non-fatal — extraction still works without context.
        (async () => {
          setPmsLoadState("loading");
          try {
            const projects = await loadPmsProjects();
            setPmsProjects(projects);
            setPmsLoadState("loaded");
            console.log(`[ContractExtractor] loaded ${projects.length} PMS projects`);
          } catch (e) {
            console.warn("[ContractExtractor] PMS project load failed:", e);
            setPmsLoadState("error");
          }
        })();
      }, []);

      // Pick a project (auto-match or manual): derive context + backfill fields.
      const selectProject = useCallback((id, viaAutoMatch = false) => {
        setSelectedProjectId(id);
        setAutoMatched(viaAutoMatch);
        setProjectQuery("");      // collapse the search dropdown
        setProjectFocused(false);
        const proj = pmsProjects.find((p) => p.id === id);
        const ctx = proj ? buildContextFromProject(proj) : null;
        pmsContextRef.current = ctx;
        setPmsContext(ctx);
        if (ctx) setResult((prev) => (prev ? fillStructuralFields(prev, ctx) : prev));
      }, [pmsProjects]);

      // Filter projects by the search query. Tokens AND-joined: every
      // whitespace-separated token in the query must appear (case-insensitive)
      // somewhere in the project's haystack (name + numbers + client). When
      // the query is empty but the input is focused, show recent/all active.
      const projectMatches = React.useMemo(() => {
        const active = pmsProjects.filter((p) => !p.archived);
        const haystackOf = (p) => [
          p.name, p.projectNumber, p.contractNumber, p.primeProjectNumber,
          p.clientName, p.prime
        ].filter(Boolean).join(" ").toLowerCase();
        const tokens = projectQuery.trim().toLowerCase().split(/\s+/).filter(Boolean);
        const filtered = tokens.length === 0
          ? active
          : active.filter((p) => {
              const h = haystackOf(p);
              return tokens.every((t) => h.includes(t));
            });
        return filtered
          .sort((a, b) => (a.name || "").localeCompare(b.name || ""))
          .slice(0, 12);
      }, [pmsProjects, projectQuery]);

      // Once a contract is parsed and projects are loaded, try to auto-identify
      // the project from the extracted identifiers (skip if already selected).
      useEffect(() => {
        if (!result || selectedProjectId || pmsProjects.length === 0) return;
        const m = matchProject(result, pmsProjects);
        if (m) selectProject(m.id, true);
      }, [result, pmsProjects, selectedProjectId, selectProject]);

      const handleFile = useCallback(async (f) => {
        if (!f || f.type !== "application/pdf") { alert("Please drop a PDF file."); return; }
        // New contract → clear any prior project association so auto-match re-runs.
        setFile(f); setParsing(true); setResult(null); setPartialScan(null);
        setSelectedProjectId(""); setAutoMatched(false); setPmsContext(null); pmsContextRef.current = null;
        setLog([{ type: "info", msg: `Reading ${f.name}…` }]);
        // Start the investigative animation — rotate through quotes every
        // ~1.7s. Pick a random starting index so consecutive extractions
        // don't always lead with the same line. Emoji rotates independently
        // from a pool so the visual identity stays "investigative" without
        // having to hand-pair each quote to a specific icon.
        if (investigationTimerRef.current) clearInterval(investigationTimerRef.current);
        let qIdx = Math.floor(Math.random() * INVESTIGATIVE_QUOTES.length);
        const pickEmoji = () => INVESTIGATIVE_EMOJI[Math.floor(Math.random() * INVESTIGATIVE_EMOJI.length)];
        setInvestigation({ emoji: pickEmoji(), line: INVESTIGATIVE_QUOTES[qIdx] });
        investigationTimerRef.current = setInterval(() => {
          qIdx = (qIdx + 1) % INVESTIGATIVE_QUOTES.length;
          setInvestigation({ emoji: pickEmoji(), line: INVESTIGATIVE_QUOTES[qIdx] });
        }, 1700);
        try {
          const parsed = await readPdf(f);

          // Detect mixed text/scanned PDF. When the parent contract is
          // text-bearing but attachments (Prime Agreement, Exhibit B) are
          // scanned, we surface the gap and let the user opt into OCR.
          // Detection runs before the whole-PDF isScanned branch — if the
          // PDF is entirely scanned, isScanned takes over and we OCR all.
          if (!parsed.isScanned) {
            const TEXT_THRESHOLD = 100;
            const scannedIdxs = [];
            const textIdxs = [];
            (parsed.pages || []).forEach((p, i) => {
              ((p || "").length < TEXT_THRESHOLD ? scannedIdxs : textIdxs).push(i);
            });
            if (scannedIdxs.length > 0 && textIdxs.length > 0) {
              setPartialScan({ parsed, scannedIdxs, textIdxs, ocring: false });
              setLog((prev) => [...prev, {
                type: "miss",
                msg: `⚠ ${scannedIdxs.length} of ${parsed.numPages} pages have no extractable text — likely scanned attachments. Use the banner above to OCR them.`,
              }]);
            }
          }

          // Scanned PDFs (image-only, no embedded text layer) need OCR
          // before any pattern-based extraction can work. Tesseract.js
          // runs entirely in the browser — no upload, contract stays local.
          if (parsed.isScanned) {
            setLog((prev) => [...prev,
              { type: "info", msg: `⚠ No embedded text found — ${parsed.numPages}-page scanned PDF.` },
              { type: "info", msg: `Running OCR (Tesseract.js, in-browser). First page-set may take 30-60s; subsequent pages ~2-5s each.` },
            ]);
            const ocrPages = await ocrPdfPages(parsed.pdfDoc, (p) => {
              let msg;
              if (p.stage === "render")      msg = `Rendering p${p.page}/${p.total} for OCR…`;
              else if (p.stage === "ocr")    msg = `OCR p${p.page}/${p.total}…`;
              else if (p.stage === "init")   msg = p.msg || "Initializing OCR…";
              else                            msg = `OCR: ${p.stage}`;
              setLog((prev) => [...prev, { type: "info", msg }]);
            });
            parsed.pages = ocrPages;
            parsed.fullText = ocrPages.join("\n\n");
            setLog((prev) => [...prev, { type: "hit", msg: `OCR complete: ${parsed.fullText.length} chars extracted from ${parsed.numPages} pages.` }]);
          }

          const res = extractAll(parsed);
          setResult(res); // auto-match effect fills structural fields once a project resolves
          setLog((prev) => [...prev, ...res.log]);
        } catch (e) {
          setLog((prev) => [...prev, { type: "miss", msg: `Error: ${e.message}` }]);
          console.error(e);
        } finally {
          setParsing(false);
          // Stop the investigative animation regardless of success/failure.
          if (investigationTimerRef.current) {
            clearInterval(investigationTimerRef.current);
            investigationTimerRef.current = null;
          }
          setInvestigation(null);
        }
      }, []);

      // OCR just the scanned pages of a mixed PDF, then re-run extractAll
      // with the merged text. User-triggered from the partial-scan banner.
      // We don't auto-OCR because a 100+ page Exhibit B can take 15+ minutes
      // and most contract reviews don't need the attached Prime Agreement
      // chapter & verse.
      const runPartialOcr = useCallback(async () => {
        const ps = partialScan;
        if (!ps || ps.ocring) return;
        setPartialScan({ ...ps, ocring: true });
        setLog((prev) => [...prev, { type: "info", msg: `Starting OCR of ${ps.scannedIdxs.length} scanned pages — this can take a while.` }]);
        try {
          const ocrMap = await ocrPdfPages(ps.parsed.pdfDoc, (p) => {
            let msg;
            if (p.stage === "render")       msg = `Rendering scanned p${p.sourcePage} for OCR (${p.page}/${p.total})…`;
            else if (p.stage === "ocr")     msg = `OCR p${p.sourcePage} (${p.page}/${p.total})…`;
            else if (p.stage === "init")    msg = p.msg || "Initializing OCR…";
            else                             msg = `OCR: ${p.stage}`;
            setLog((prev) => [...prev, { type: "info", msg }]);
          }, ps.scannedIdxs);
          // Merge OCR results back into the original pages array, replacing
          // only the previously-blank entries. fullText is rebuilt from the
          // merged pages so page offsets stay correct.
          const newPages = [...ps.parsed.pages];
          for (const [idx, txt] of ocrMap.entries()) newPages[idx] = txt;
          ps.parsed.pages = newPages;
          ps.parsed.fullText = newPages.join("\n\n");
          setLog((prev) => [...prev, { type: "hit", msg: `OCR complete (${ocrMap.size} pages). Re-extracting with full text…` }]);
          const res = extractAll(ps.parsed);
          setResult(res);
          setLog((prev) => [...prev, ...res.log]);
          setPartialScan(null);
        } catch (e) {
          setLog((prev) => [...prev, { type: "miss", msg: `OCR error: ${e.message}` }]);
          setPartialScan({ ...ps, ocring: false });
        }
      }, [partialScan]);

      // Listen for the "contractDataApplied" ACK from SettyPMS. We hold the
      // extractor open during the OneNote write (3-15s typical) and close on
      // confirmation — so the user knows whether their save actually worked
      // before this window disappears.
      useEffect(() => {
        const onPmsAck = (e) => {
          const d = e && e.data;
          if (!d || d.source !== "SettyPMS" || d.type !== "contractDataApplied") return;
          // Stop the rotating-quote timer + safety timeout — we got our ACK.
          if (writingTimerRef.current) { clearInterval(writingTimerRef.current); writingTimerRef.current = null; }
          if (ackTimeoutRef.current)   { clearTimeout(ackTimeoutRef.current);   ackTimeoutRef.current = null; }
          setWritingQuote(null);
          if (d.success) {
            setSendState("done");
            // Short success celebration, then close.
            setTimeout(() => { try { window.close(); } catch (_) {} }, 1500);
          } else {
            setSendError(String(d.error || "Unknown error — check PMS window for details."));
            setSendState("failed");
            // Longer wait on failure so the user can read the message before
            // the popup vanishes. PMS also shows its own error modal.
            setTimeout(() => { try { window.close(); } catch (_) {} }, 5000);
          }
        };
        window.addEventListener("message", onPmsAck);
        return () => window.removeEventListener("message", onPmsAck);
      }, []);

      // Quick time estimate for the OCR banner. Tesseract.js averages ~5-10s
      // per page on contract scans depending on density. We show a range so
      // the user knows it's not seconds for a 100-page Exhibit B.
      const estimateOcrTime = (n) => {
        const low  = Math.max(1, Math.round(n * 4 / 60));
        const high = Math.max(1, Math.round(n * 10 / 60));
        if (n * 10 < 60) return `~${n * 5}s`;
        if (low === high) return `~${low} min`;
        return `~${low}–${high} min`;
      };

      // Pull the source URL out of a DataTransfer if the drag provided one.
      // Behavior by drag source:
      //   - SharePoint Online web: usually populates text/html with the file's
      //     SharePoint URL inside an <a href>. Sometimes text/uri-list too.
      //   - File Explorer with OneDrive sync: typically only `files`, no URL.
      //   - Email attachment in Outlook web: may include an attachment URL.
      //   - Drag from a browser tab/bookmark: text/uri-list with page URL.
      // Returns "" if no URL was provided.
      function extractDragSourceUrl(dt) {
        if (!dt) return "";
        // RFC 2483: one URI per line, lines starting with # are comments
        const list = dt.getData("text/uri-list");
        if (list) {
          for (const line of list.split(/\r?\n/)) {
            const t = line.trim();
            if (t && !t.startsWith("#")) return t;
          }
        }
        // Firefox-specific: "url\ntitle"
        const moz = dt.getData("text/x-moz-url");
        if (moz) {
          const first = moz.split(/\r?\n/)[0].trim();
          if (first) return first;
        }
        // text/html — first <a href="…">
        const html = dt.getData("text/html");
        if (html) {
          const m = html.match(/href\s*=\s*["']([^"']+)["']/i);
          if (m && /^https?:\/\//i.test(m[1])) return m[1];
        }
        // text/plain — sometimes a bare URL
        const text = dt.getData("text/plain");
        if (text && /^https?:\/\//.test(text.trim())) return text.trim();
        return "";
      }

      const onDrop = (e) => {
        e.preventDefault(); setDragging(false);
        const sourceUrl = extractDragSourceUrl(e.dataTransfer);
        setDragSourceUrl(sourceUrl);  // remember even before file is parsed
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      };

      const updateField = useCallback((key, newVal) => {
        setResult((prev) => ({ ...prev, fields: { ...prev.fields, [key]: newVal } }));
      }, []);

      const send = () => {
        if (!result) return;
        const f = result.fields;
        const payload = {
          fileName: file?.name,
          dragSourceUrl,  // empty string if drag didn't carry a URL (e.g., File Explorer)
          docType: result.docType.type,
          docTypeYear: result.docType.year,
          isAIA: result.docType.isAIA,
          // fullSection: the contract paragraph containing each flagged
          // clause. SettyPMS.html buildContractAnalysisHtml renders these
          // under "Source Text (Override Clauses in Context)" so reviewers
          // can read the full clause without opening the source PDF.
          flags: result.flags.map(x => ({ id: x.id, label: x.label, severity: x.severity, value: x.capturedValue, fullSection: x.fullSection, sectionLabel: x.sectionLabel, pageNumber: x.pageNumber })),
          // Full extraction log — sent so PMS can include it in OneNote
          // (user request 2026-06-04). Each entry is { type, msg } and the
          // "section" type entries carry the full paragraph for each flag.
          log: result.log,
          contractDate: f.contractDate.value,
          contractExpiration: f.contractExpiration.value,
          contractNumber: f.contractNumber.value,
          primeProjectNumber: f.primeProjectNumber.value,
          client: f.client.value,
          settyRole: f.settyRole.value,
          project: f.project.value,
          payment: {
            invoiceReview: f.invoiceReview.value,
            payWhenPaid: f.payWhenPaid.value,
            interestOnLate: f.interestOnLate.value,
            retainage: f.retainage.value,
            conditionsPrecedent: f.conditionsPrecedent.value,
          },
          reimbursable: {
            multiplier: f.multiplier.value,
            markupExclusions: f.markupExclusions.value,
            rules: f.reimbursableRules.value,
          },
          schedule: {
            substantialCompletion: f.substantialCompletion.value,
            scheduleSource: f.scheduleSource.value,
            terminationNotice: f.terminationNotice.value,
          },
          legal: {
            governingLaw: f.governingLaw.value,
            venue: f.venue.value,
            disputeResolution: f.disputeResolution.value,
          },
          // Pre-computed comparison rows for the OneNote Key Numbers block.
          // Computed here so SettyPMS doesn't need to duplicate Setty's
          // standing-coverage figures or the flag-id → insurance-line map.
          // rawFlags (not flags) so the Key Numbers comparison still sees
          // insurance limits even when their flag was suppressed for being
          // within Setty's standing coverage.
          insuranceComparison: computeInsuranceComparison(result.rawFlags || result.flags, SETTY_STANDARDS, result.sourceText || ""),
          settyStandardMultiplier: SETTY_STANDARDS.multiplier,
          // Counterparty signers — name + title pulled from signature block.
          // Often empty for templates sent unsigned; populated for executed
          // contracts. The "who do I call about an amendment" answer.
          signatories: result.signatories || [],
          // Document outline — TOC of the source PDF. Rendered as the
          // "Contents" block in OneNote so reviewers can refer back to
          // specific PDF pages instead of re-reading the contract.
          outline: result.outline || null,
          ocrStatus: result.ocrStatus || null,
          // Statutory caveats from Appendix C matrix lookup against the
          // extracted governing-law state. Renders as "Statutory caveats"
          // in Key Numbers.
          statutoryCaveats: result.statutoryCaveats || null,
          // Presence/absence info for Force Majeure / TPB disclaimer / Waiver
          // of Subrogation — renders as part of Key Numbers.
          presenceChecks: result.presenceChecks || null,
        };
        if (sendToPMS(payload)) {
          // Transition to "writing" state — the OneNote write on the PMS side
          // can take 3-15s (Microsoft Graph latency + token cache state).
          // We used to close immediately, but the user had no idea whether
          // anything was happening between the extractor closing and the PMS
          // confirmation modal appearing. Now we hold the popup open with a
          // rotating-quote animation, and PMS posts back when it's done.
          setSendState("writing");
          setSendError("");
          // Start rotating writing quotes — same vibe as the investigation
          // animation during parsing. Random start so consecutive runs vary.
          if (writingTimerRef.current) clearInterval(writingTimerRef.current);
          let qIdx = Math.floor(Math.random() * WRITING_QUOTES.length);
          const pickWritingEmoji = () => WRITING_EMOJI[Math.floor(Math.random() * WRITING_EMOJI.length)];
          setWritingQuote({ emoji: pickWritingEmoji(), line: WRITING_QUOTES[qIdx] });
          writingTimerRef.current = setInterval(() => {
            qIdx = (qIdx + 1) % WRITING_QUOTES.length;
            setWritingQuote({ emoji: pickWritingEmoji(), line: WRITING_QUOTES[qIdx] });
          }, 1700);
          // Safety timeout — if PMS never responds (window closed by user,
          // Graph token failure mid-write, etc.), don't leave the user
          // staring at a forever-spinning popup. After 60s, flip to a
          // "timeout" state with a manual close button.
          if (ackTimeoutRef.current) clearTimeout(ackTimeoutRef.current);
          ackTimeoutRef.current = setTimeout(() => setSendState("timeout"), 60000);
        }
      };

      const docTypeLabel = result?.docType
        ? (result.docType.isAIA ? `AIA ${result.docType.type} ${result.docType.year || ""}` : result.docType.type)
        : null;

      return (
        <>
          <div className="header">
            <div>
              <h1>Setty Contract Extractor</h1>
              <div className="sub">Surfaces client-imposed override terms · pdf.js · No AI · No data leaves your browser</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div className={`pms-status ${pmsConnected ? "connected" : "disconnected"}`}>
                {pmsConnected ? "● Connected to PMS" : "○ Standalone mode"}
              </div>
              {(() => {
                const isDisabled = !pmsConnected || !result;
                const isWriting  = sendState === "writing";
                const isDone     = sendState === "done";
                const isFailed   = sendState === "failed";
                const isTimeout  = sendState === "timeout";
                // Visual states:
                //   disabled  — gray, not clickable
                //   idle      — white bg, navy text, primary action
                //   writing   — amber bg, pulsing, "Writing to OneNote…"
                //   done      — green bg, "✓ Saved" then auto-close
                //   failed    — red bg, "⚠ Failed" + brief error in title
                //   timeout   — orange bg, "Still working? Check PMS"
                const bg =
                  isDone    ? "#10B981" :
                  isWriting ? "#D97706" :
                  isFailed  ? "#DC2626" :
                  isTimeout ? "#B45309" :
                  isDisabled ? "rgba(255,255,255,0.15)" : "#fff";
                const fg = (isDone || isWriting || isFailed || isTimeout) ? "#fff"
                         : isDisabled ? "rgba(255,255,255,0.55)" : "#1F3864";
                const label =
                  isDone    ? "✓ Saved — closing…" :
                  isWriting ? "✏️ Writing to OneNote…" :
                  isFailed  ? "⚠ Failed — check PMS" :
                  isTimeout ? "⏳ Still working? Check PMS" :
                  "Apply and Save →";
                const titleText =
                  isDone     ? "OneNote write completed. Closing this window."
                  : isWriting ? "Sending data to PMS and writing the OneNote analysis page. Hang tight."
                  : isFailed  ? ("Write failed: " + (sendError || "see PMS window."))
                  : isTimeout ? "No response from PMS in 60 seconds. Check the PMS window for status."
                  : !pmsConnected ? "Open this tool from the SettyPMS Contracts tab to enable Apply and Save."
                  : !result       ? "Drop a contract PDF first."
                  : "Send the extracted data to PMS — confirm there to apply fields and write to OneNote.";
                const buttonDisabled = isDisabled || isWriting || isDone || isFailed;
                const onClick = isTimeout
                  ? (() => { try { window.close(); } catch (_) {} })
                  : send;
                return (
                  <button
                    onClick={onClick}
                    disabled={buttonDisabled}
                    title={titleText}
                    style={{
                      background: bg,
                      color: fg,
                      border: "none",
                      padding: "8px 18px",
                      borderRadius: 6,
                      fontSize: 13,
                      fontWeight: 700,
                      cursor: buttonDisabled ? "default" : "pointer",
                      boxShadow: isDisabled ? "none"
                              : isDone     ? "0 2px 12px rgba(16,185,129,0.5)"
                              : isWriting  ? "0 2px 12px rgba(217,119,6,0.5)"
                              : isFailed   ? "0 2px 12px rgba(220,38,38,0.5)"
                              : isTimeout  ? "0 2px 12px rgba(180,83,9,0.5)"
                              : "0 2px 8px rgba(0,0,0,0.25)",
                      transition: "background 0.2s, color 0.2s, box-shadow 0.2s",
                      minWidth: 220,
                    }}
                  >
                    {label}
                  </button>
                );
              })()}
            </div>
          </div>

          <div className="layout">
            {/* LEFT — drop zone */}
            <div className="panel">
              <h2>1. Contract PDF</h2>
              <label className={`dropzone ${dragging ? "dragging" : ""}`}
                     onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
                     onDragLeave={() => setDragging(false)}
                     onDrop={onDrop}>
                <div className="icon">📄</div>
                <p><strong>Drop a contract PDF</strong></p>
                <p>or click to browse</p>
                <input type="file" accept="application/pdf" onChange={(e) => handleFile(e.target.files[0])} />
              </label>
              {file && (
                <div className="file-info">
                  <strong>{file.name}</strong><br/>
                  {(file.size / 1024 / 1024).toFixed(2)} MB
                  {dragSourceUrl && (
                    <div style={{ marginTop: 6, fontSize: 10, color: "#60A5FA", wordBreak: "break-all" }}
                         title="Captured from the drag-and-drop source. Will be included in the OneNote analysis page.">
                      📎 source:<br/>
                      <a href={dragSourceUrl} target="_blank" rel="noreferrer"
                         style={{ color: "#60A5FA", textDecoration: "none" }}>
                        {dragSourceUrl.length > 80 ? dragSourceUrl.slice(0, 77) + "…" : dragSourceUrl}
                      </a>
                    </div>
                  )}
                  {parsing && <div><span className="spinner"></span>Parsing…</div>}
                </div>
              )}

              <h2 style={{marginTop: 20}}>PMS Project <span style={{textTransform:"none",fontWeight:400,color:"#64748B"}}>(for context)</span></h2>
              {pmsLoadState === "loading" && (
                <p style={{fontSize: 11, color: "#94A3B8"}}><span className="spinner"></span>Loading PMS projects…</p>
              )}
              {pmsLoadState === "error" && (
                <p style={{fontSize: 11, color: "#FCD34D"}}>
                  Couldn't reach PMS data — party disambiguation &amp; comparison context unavailable.
                  Extraction and Apply-and-Save still work normally.
                </p>
              )}
              {pmsLoadState === "loaded" && (() => {
                const selectedProj = pmsProjects.find((p) => p.id === selectedProjectId);
                // Selected state — show the chosen project as a chip with a
                // change button. Click "Change" to clear and reopen the search.
                if (selectedProj) {
                  return (
                    <div style={{ display: "flex", alignItems: "center", gap: 8, background: "#1E293B", border: "1px solid #334155", borderRadius: 4, padding: "6px 8px" }}>
                      <div style={{ flex: 1, fontSize: 12, color: "#E2E8F0" }}>
                        <strong>{selectedProj.name || "Untitled"}</strong>
                        {selectedProj.projectNumber && (
                          <span style={{ color: "#94A3B8", marginLeft: 6 }}>({selectedProj.projectNumber})</span>
                        )}
                        {autoMatched && (
                          <span style={{ color: "#4ADE80", marginLeft: 8, fontSize: 10 }}>✓ auto-matched</span>
                        )}
                      </div>
                      <button
                        onClick={() => { setSelectedProjectId(""); setAutoMatched(false); setPmsContext(null); pmsContextRef.current = null; setProjectQuery(""); setProjectFocused(true); }}
                        style={{ background: "transparent", color: "#60A5FA", border: "1px solid #334155", borderRadius: 3, padding: "2px 8px", fontSize: 10, cursor: "pointer" }}
                      >Change</button>
                    </div>
                  );
                }
                // Search state — text input + filtered dropdown.
                const showDropdown = projectFocused || projectQuery.length > 0;
                return (
                  <div style={{ position: "relative" }}>
                    <input
                      type="text"
                      value={projectQuery}
                      onChange={(e) => setProjectQuery(e.target.value)}
                      onFocus={() => setProjectFocused(true)}
                      onBlur={() => setTimeout(() => setProjectFocused(false), 150)}
                      placeholder={`Search ${pmsProjects.filter((p) => !p.archived).length} projects by name, number, or client…`}
                      style={{ width: "100%", background: "#1E293B", color: "#E2E8F0", border: "1px solid #334155", borderRadius: 4, padding: "6px 8px", fontSize: 12 }}
                    />
                    {showDropdown && (
                      <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#0F172A", border: "1px solid #334155", borderRadius: 4, marginTop: 2, maxHeight: 320, overflowY: "auto", zIndex: 10, boxShadow: "0 4px 12px rgba(0,0,0,0.4)" }}>
                        {projectMatches.length === 0 && (
                          <div style={{ padding: "8px 10px", fontSize: 11, color: "#94A3B8", fontStyle: "italic" }}>
                            No matches. Try a fragment of the project name, project number, or client name.
                          </div>
                        )}
                        {projectMatches.map((p) => (
                          <div
                            key={p.id}
                            // onMouseDown fires before the input's onBlur — this
                            // is critical, otherwise the blur collapses the
                            // dropdown before the click registers.
                            onMouseDown={(e) => { e.preventDefault(); selectProject(p.id, false); }}
                            style={{ padding: "6px 10px", fontSize: 12, color: "#E2E8F0", cursor: "pointer", borderBottom: "1px solid #1E293B" }}
                            onMouseEnter={(e) => e.currentTarget.style.background = "#1E293B"}
                            onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
                          >
                            <div><strong>{p.name || "Untitled"}</strong></div>
                            <div style={{ fontSize: 10, color: "#94A3B8" }}>
                              {p.projectNumber && <span>#{p.projectNumber}</span>}
                              {p.clientName && <span>{p.projectNumber ? " · " : ""}{p.clientName}</span>}
                              {p.prime && <span> · prime: {p.prime}</span>}
                            </div>
                          </div>
                        ))}
                        {projectMatches.length === 12 && (
                          <div style={{ padding: "6px 10px", fontSize: 10, color: "#64748B", fontStyle: "italic", borderTop: "1px solid #1E293B" }}>
                            Showing top 12 — refine query for more.
                          </div>
                        )}
                      </div>
                    )}
                    {!selectedProjectId && result && (
                      <div style={{fontSize: 10, color: "#94A3B8", marginTop: 4}}>
                        No automatic match. Search for the project to disambiguate parties and compare terms to Setty's standards.
                      </div>
                    )}
                  </div>
                );
              })()}

              <h2 style={{marginTop: 20}}>About</h2>
              <p style={{fontSize: 11, color: "#94A3B8", lineHeight: 1.5}}>
                This tool extracts <strong>client-imposed override terms</strong> from contracts issued to Setty —
                pay-when-paid clauses, no-markup rules, conditions precedent, and similar terms that
                supersede Setty's standard proposal. It does <em>not</em> re-extract Setty's own fee proposals.
              </p>
              <p style={{fontSize: 11, color: "#94A3B8", lineHeight: 1.5, marginTop: 10}}>
                Scanned/image-only PDFs are automatically OCR'd in the browser via Tesseract.js —
                no upload, no server, contract stays on your machine. OCR takes 1–3 seconds per page
                after the initial language-data download (~10MB, one time).
              </p>
            </div>

            {/* MIDDLE — flags banner + log */}
            <div className="panel">
              <h2>2. Override Clauses & Extraction Log</h2>
              {partialScan && (
                <div style={{ background: "#78350F", border: "1px solid #F59E0B", borderRadius: 8, padding: "12px 14px", marginBottom: 12, color: "#FEF3C7" }}>
                  {partialScan.ocring ? (
                    <>
                      <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 4 }}>
                        ⏳ OCR running on {partialScan.scannedIdxs.length} pages…
                      </div>
                      <div style={{ fontSize: 11 }}>
                        See the log below for per-page progress. Don't close this tab.
                      </div>
                    </>
                  ) : (
                    <>
                      <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>
                        ⚠ {partialScan.scannedIdxs.length} of {partialScan.parsed.numPages} pages couldn't be read as text
                      </div>
                      <div style={{ fontSize: 11.5, lineHeight: 1.5, marginBottom: 10 }}>
                        Those pages are likely scanned attachments — Prime Agreement, Exhibit B, signed schedules.
                        Anything specified there (insurance limits, fee schedules, additional clauses) won't be in this
                        extraction. OCR those pages to fill them in, or skip if you only need what's in the parent contract.
                      </div>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <button
                          onClick={runPartialOcr}
                          style={{ background: "#D97706", color: "#FFFBEB", border: "none", borderRadius: 4, padding: "6px 12px", fontSize: 11.5, fontWeight: 600, cursor: "pointer" }}
                        >
                          OCR {partialScan.scannedIdxs.length} pages ({estimateOcrTime(partialScan.scannedIdxs.length)})
                        </button>
                        <button
                          onClick={() => {
                            setPartialScan(null);
                            // Mark the current extraction's ocrStatus as
                            // intentionally-skipped so OneNote can report
                            // "user chose not to OCR these pages" instead of
                            // "OCR not attempted".
                            setResult((prev) => prev ? {
                              ...prev,
                              ocrStatus: { ...(prev.ocrStatus || {}), ocrSkipped: true },
                            } : prev);
                          }}
                          style={{ background: "transparent", color: "#FEF3C7", border: "1px solid #B45309", borderRadius: 4, padding: "6px 12px", fontSize: 11.5, cursor: "pointer" }}
                        >
                          Skip
                        </button>
                      </div>
                    </>
                  )}
                </div>
              )}
              {parsing && investigation && (
                <div className="investigating">
                  <span className="investigating-emoji" key={investigation.emoji}>{investigation.emoji}</span>
                  <span className="investigating-text" key={investigation.line}>
                    {investigation.line}
                  </span>
                </div>
              )}
              {sendState === "writing" && writingQuote && (
                <div className="investigating" style={{ background: "linear-gradient(135deg, #78350FCC 0%, #B45309CC 60%, #D97706CC 100%)", borderColor: "#F59E0B" }}>
                  <span className="investigating-emoji" key={writingQuote.emoji}>{writingQuote.emoji}</span>
                  <span className="investigating-text" key={writingQuote.line}>
                    <strong style={{ display: "block", fontSize: 13, fontStyle: "normal", marginBottom: 2 }}>Writing OneNote analysis page…</strong>
                    {writingQuote.line}
                  </span>
                </div>
              )}
              {sendState === "done" && (
                <div className="investigating" style={{ background: "linear-gradient(135deg, #064E3BCC 0%, #047857CC 60%, #10B981CC 100%)", borderColor: "#34D399" }}>
                  <span className="investigating-emoji">✅</span>
                  <span className="investigating-text" style={{ fontStyle: "normal" }}>
                    <strong style={{ display: "block", fontSize: 13, marginBottom: 2 }}>Saved to OneNote.</strong>
                    Closing in a moment — switch to the PMS tab to see the page.
                  </span>
                </div>
              )}
              {sendState === "failed" && (
                <div className="investigating" style={{ background: "linear-gradient(135deg, #7F1D1DCC 0%, #B91C1CCC 60%, #DC2626CC 100%)", borderColor: "#F87171" }}>
                  <span className="investigating-emoji">⚠</span>
                  <span className="investigating-text" style={{ fontStyle: "normal" }}>
                    <strong style={{ display: "block", fontSize: 13, marginBottom: 2 }}>OneNote write failed.</strong>
                    {sendError || "See the PMS window for the error message."} Closing in 5s.
                  </span>
                </div>
              )}
              {sendState === "timeout" && (
                <div className="investigating" style={{ background: "linear-gradient(135deg, #78350FCC 0%, #B45309CC 60%, #F59E0BCC 100%)", borderColor: "#FBBF24" }}>
                  <span className="investigating-emoji">⏳</span>
                  <span className="investigating-text" style={{ fontStyle: "normal" }}>
                    <strong style={{ display: "block", fontSize: 13, marginBottom: 2 }}>No response from PMS yet.</strong>
                    The OneNote write might still be running — check the PMS window. Click the orange button above to close this window.
                  </span>
                </div>
              )}
              {pmsContext && <PmsContextCard ctx={pmsContext} />}
              {result && <FlagsBanner flags={decorateFlags(result.flags, pmsContext)} />}
              {docTypeLabel && (
                <div className={`doc-type ${result.docType.isAIA ? "" : "non-aia"}`}>{docTypeLabel}</div>
              )}
              <div className="log">
                {log.map((row, i) => (
                  row.type === "section" ? (
                    <div className="row section-row" key={i}>
                      <div style={{ fontSize: 10, color: "#FCD34D", fontWeight: 600, marginBottom: 4 }}>
                        ⚑ {row.flagLabel} — full clause text from contract:
                      </div>
                      <span className="section">{row.msg}</span>
                    </div>
                  ) : (
                    <div className="row" key={i}>
                      <span className={row.type}>[{row.type}]</span> {row.msg}
                    </div>
                  )
                ))}
                {!log.length && <div className="row info">Drop a contract PDF to begin.</div>}
              </div>
            </div>

            {/* RIGHT — review + send */}
            <div className="panel">
              <h2>3. Review & Send</h2>
              {!result && <p style={{fontSize: 12, color: "#94A3B8"}}>Extracted fields appear here. Review each one before applying — low-confidence values are flagged in red, medium in yellow.</p>}
              {result && (
                <>
                  <h3>Document</h3>
                  <FieldEditor keyName="contractDate" label="Contract Date" field={result.fields.contractDate} onChange={updateField} />
                  <FieldEditor keyName="contractExpiration" label="Contract Expiration" field={result.fields.contractExpiration} onChange={updateField} />
                  <FieldEditor keyName="contractNumber" label="Contract Number" field={result.fields.contractNumber} onChange={updateField} />
                  <FieldEditor keyName="primeProjectNumber" label="Prime's Project Number" field={result.fields.primeProjectNumber} onChange={updateField} />
                  <FieldEditor keyName="client" label="Client / Prime" field={result.fields.client} onChange={updateField} multiline />
                  <FieldEditor keyName="settyRole" label="Setty Role" field={result.fields.settyRole} onChange={updateField} multiline />
                  <FieldEditor keyName="project" label="Project" field={result.fields.project} onChange={updateField} />

                  <h3>Payment Terms</h3>
                  <FieldEditor keyName="payWhenPaid" label="Pay-When-Paid?" field={result.fields.payWhenPaid} onChange={updateField} />
                  <FieldEditor keyName="invoiceReview" label="Invoice Review Window" field={result.fields.invoiceReview} onChange={updateField} />
                  <FieldEditor keyName="interestOnLate" label="Interest on Late Payment" field={result.fields.interestOnLate} onChange={updateField} />
                  <FieldEditor keyName="retainage" label="Retainage / Withholding" field={result.fields.retainage} onChange={updateField} />
                  <FieldEditor keyName="conditionsPrecedent" label="Conditions Precedent" field={result.fields.conditionsPrecedent} onChange={updateField} />

                  <h3>Reimbursable Expense Rules</h3>
                  <FieldEditor keyName="multiplier" label="Client Multiplier" field={result.fields.multiplier} onChange={updateField} />
                  <FieldEditor keyName="markupExclusions" label="Markup Exclusions" field={result.fields.markupExclusions} onChange={updateField} multiline />
                  <FieldEditor keyName="reimbursableRules" label="Reimbursable Rules (raw)" field={result.fields.reimbursableRules} onChange={updateField} multiline />

                  <h3>Schedule</h3>
                  <FieldEditor keyName="substantialCompletion" label="Substantial Completion" field={result.fields.substantialCompletion} onChange={updateField} />
                  <FieldEditor keyName="scheduleSource" label="Schedule Source" field={result.fields.scheduleSource} onChange={updateField} />
                  <FieldEditor keyName="terminationNotice" label="Termination Notice" field={result.fields.terminationNotice} onChange={updateField} />

                  <h3>Legal</h3>
                  <FieldEditor keyName="governingLaw" label="Governing Law" field={result.fields.governingLaw} onChange={updateField} />
                  <FieldEditor keyName="venue" label="Venue / Jurisdiction" field={result.fields.venue} onChange={updateField} />
                  <FieldEditor keyName="disputeResolution" label="Dispute Resolution" field={result.fields.disputeResolution} onChange={updateField} />

                  {!pmsConnected && (
                    <p style={{fontSize: 11, color: "#F87171", marginTop: 16, padding: "8px 12px", background: "#7F1D1D33", borderRadius: 6, border: "1px solid #B91C1C"}}>
                      ⚠ Open this tool from the SettyPMS Contracts tab to enable <strong>Apply and Save</strong>.
                    </p>
                  )}
                </>
              )}
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
