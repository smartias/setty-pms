          /Errors\s+and\s+Omissions[^$]{0,200}?\$\s*([\d,]+(?:\.\d{2})?)/i,
        ],
        captureValue: true,
        explanation: "Verify Setty's E&O policy meets or exceeds this limit. If higher than Setty's standing limit, you'll need a project-specific endorsement (cost + carrier approval lead time). Flag to insurance broker.",
      },
      {
        id: "cgl-limits",
        label: "Commercial General Liability limit",
        severity: "medium",
        patterns: [
          /Commercial\s+General\s+Liability[^$]{0,200}?\$\s*([\d,]+(?:\.\d{2})?)\s*(?:for\s+each|per|in\s+the\s+aggregate)/i,
        ],
        captureValue: true,
        explanation: "CGL limit imposed by client. If above Setty's standing limit, typically met by adding excess/umbrella coverage. Verify with broker.",
      },
      {
        id: "owner-direct-rights",
        label: "Owner direct communication / direction rights",
        severity: "medium",
        patterns: [
          /Owner\s+(?:may|shall\s+have\s+the\s+right|reserves\s+the\s+right)\s+to\s+(?:direct|communicate\s+directly|instruct|coordinate\s+directly)/i,
          /direct\s+communication\s+(?:with|to|from)\s+(?:the\s+)?Owner/i,
          /(?:Sub)?[Cc]onsultant\s+shall\s+(?:communicate|report|coordinate)\s+directly\s+(?:to|with)\s+(?:the\s+)?Owner/i,
          /Owner\s+may\s+bypass/i,
        ],
        explanation: "Owner can bypass the prime/architect and direct Setty's work or request communication. Risks: conflicting directions from prime vs owner, scope creep without prime sign-off, billing disputes. Confirm escalation/notification protocol up front.",
      },
      {
        id: "no-damages-for-delay",
        label: "No damages for delay",
        severity: "high",
        patterns: [
          /no\s+damages?\s+for\s+delay/i,
          /no[\s\-]damages[\s\-]for[\s\-]delay/i,
          /not\s+(?:be\s+)?entitled\s+to\s+(?:any\s+)?(?:damages|compensation|claim|recovery)[^.]{0,100}?(?:on\s+account\s+of\s+)?delay/i,
          /(?:extension\s+of\s+time|time\s+extension)\s+(?:shall\s+be\s+)?(?:the\s+)?(?:sole|exclusive)\s+(?:and\s+exclusive\s+)?remedy/i,
          /delay[^.]{0,100}?(?:sole|exclusive)\s+remedy[^.]{0,100}?(?:extension\s+of\s+time|time)/i,
        ],
        explanation: "If the project is delayed (by owner, prime, or third parties), Setty cannot recover additional compensation — only a time extension. Major exposure on long-delayed projects where Setty staffing costs continue. Push back during negotiation if possible.",
      },
      {
        id: "liquidated-damages",
        label: "Liquidated damages",
        severity: "high",
        patterns: [
          // With dollar/day amount
          /liquidated\s+damages[^.]{0,200}?\$\s*([\d,]+(?:\.\d{2})?)\s*(?:per\s+(?:calendar\s+)?day|\/day|each\s+day)/i,
          /\$\s*([\d,]+(?:\.\d{2})?)\s*per\s+(?:calendar\s+)?day[^.]{0,80}?(?:delay|liquidated\s+damages|substantial\s+completion)/i,
          // Mention without amount (still important to flag)
          /\bliquidated\s+damages\b/i,
        ],
        captureValue: true,
        explanation: "Daily penalty for delay in completion. Confirm whether LDs pass through proportionally to subconsultants (typical) or are borne fully by the prime. If they pass through, Setty's portion may be deducted directly from invoices — model worst-case in fee.",
      },

      // ★ ADD MORE FLAGS HERE as you encounter them. Pattern is:
      //   { id, label, severity: "high"|"medium"|"info", patterns: [...], captureValue?, explanation: "..." }
    ];

    // Find the containing "section" of a match — the text between the
    // closest preceding section/article header and the next one. Lets the
    // OneNote page show the full clause context, not just a 200-char snippet.
    function getContainingSection(text, matchIndex, matchLength, maxLen = 3000) {
      // Match common section/article delimiters in AIA and non-AIA contracts:
      //   §11.6.2, § 4.7, ARTICLE 11, ARTICLE 11 COMPENSATION,
      //   SECTION 6.7, 4.7.2 (numeric prefix on a new line)
      const sectionStartRegex = /(?:§\s*\d+\.\d+(?:\.\d+)?|ARTICLE\s+\d+\b|SECTION\s+\d+(?:\.\d+)?\b)/g;
      const windowStart = Math.max(0, matchIndex - maxLen);
      const windowEnd   = Math.min(text.length, matchIndex + matchLength + maxLen);
      const window      = text.slice(windowStart, windowEnd);
      const matchInWindow = matchIndex - windowStart;
      let prevBoundary = 0;
      let nextBoundary = window.length;
      sectionStartRegex.lastIndex = 0;
      let m;
      while ((m = sectionStartRegex.exec(window)) !== null) {
        if (m.index <= matchInWindow) {
          prevBoundary = m.index;
        } else if (m.index > matchInWindow + matchLength) {
          nextBoundary = m.index;
          break;
        }
      }
      // If no preceding boundary found at all, fall back to a wider window
      // around the match (so we don't return zero context).
      if (prevBoundary === 0 && nextBoundary === window.length && matchInWindow > 600) {
        prevBoundary = Math.max(0, matchInWindow - 400);
        nextBoundary = Math.min(window.length, matchInWindow + matchLength + 1000);
      }
      let result = window.slice(prevBoundary, nextBoundary).trim();
      // Normalize internal whitespace runs but preserve paragraph breaks for readability
      result = result.replace(/[ \t]+/g, " ").replace(/\n{3,}/g, "\n\n");
      if (result.length > maxLen) result = result.slice(0, maxLen) + "…";
      return result;
    }

    function detectFlags(text) {
      const flags = [];
      for (const def of OVERRIDE_FLAGS) {
        for (const pattern of def.patterns) {
          const m = text.match(pattern);
          if (m) {
            // Short evidence snippet — for the in-extractor UI display.
            const start = Math.max(0, m.index - 60);
            const end = Math.min(text.length, m.index + m[0].length + 140);
            const evidence = text.slice(start, end).replace(/\s+/g, " ").trim();
            // Full containing section — for the OneNote page so reviewers
            // can read the override clause in its full contract context.
            const fullSection = getContainingSection(text, m.index, m[0].length);
            flags.push({
              id: def.id,
              label: def.label,
              severity: def.severity,
              evidence: "…" + evidence + "…",
              fullSection,
              explanation: def.explanation,
              capturedValue: def.captureValue && m[1] ? m[1] : null,
            });
            break; // first matching pattern wins for this flag
          }
        }
      }
      return flags;
    }

    // ========================================================================
    // STRUCTURED EXTRACTION — payment terms, reimbursable rules, schedule
    // ========================================================================
    function makeField(value, confidence, source) {
      return { value: value || "", confidence: value ? confidence : "empty", source: source || "" };
    }

    // Find a heading and return the chunk of text following it
    function sectionAfter(text, headingRegex, maxChars = 2000) {
      const m = text.match(headingRegex);
      if (!m) return null;
      const start = m.index + m[0].length;
      return text.slice(start, start + maxChars);
    }

    // -- Document type detection --
    function detectDocType(text) {
      const cover = text.slice(0, 3000);
      const m = cover.match(/Document\s+(A\d{3}|B\d{3}|C\d{3})(?:TM|™)?\s*[–—\-]?\s*(\d{4})?/i);
      if (m) return { type: m[1].toUpperCase(), year: m[2] || null, isAIA: true };
      if (/SUBCONTRACT\s+AGREEMENT/i.test(cover)) return { type: "Subcontract Agreement", isAIA: false };
      if (/Master\s+Services\s+Agreement/i.test(cover)) return { type: "Master Services Agreement", isAIA: false };
      if (/PROFESSIONAL\s+SERVICES\s+AGREEMENT/i.test(cover)) return { type: "Professional Services Agreement", isAIA: false };
      return { type: "Unknown contract type", isAIA: false };
    }

    // -- Date parsing --
    const ORDINAL_WORDS = {
      first:1, second:2, third:3, fourth:4, fifth:5, sixth:6, seventh:7, eighth:8, ninth:9,
      tenth:10, eleventh:11, twelfth:12, thirteenth:13, fourteenth:14, fifteenth:15,
      sixteenth:16, seventeenth:17, eighteenth:18, nineteenth:19, twentieth:20,
      "twenty-first":21, "twenty-second":22, "twenty-third":23, "twenty-fourth":24,
      "twenty-fifth":25, "twenty-sixth":26, "twenty-seventh":27, "twenty-eighth":28,
      "twenty-ninth":29, thirtieth:30, "thirty-first":31,
    };
    const MONTHS = {
      january:1, february:2, march:3, april:4, may:5, june:6,
      july:7, august:8, september:9, october:10, november:11, december:12,
    };

    function wordsToYear(s) {
      const t = s.toLowerCase().replace(/[,]/g, "").trim();
      const small = {
        one:1, two:2, three:3, four:4, five:5, six:6, seven:7, eight:8, nine:9, ten:10,
        eleven:11, twelve:12, thirteen:13, fourteen:14, fifteen:15, sixteen:16, seventeen:17,
        eighteen:18, nineteen:19, twenty:20, thirty:30, forty:40, fifty:50, sixty:60,
        seventy:70, eighty:80, ninety:90,
      };
      let m = t.match(/two\s+thousand(?:\s+and)?\s+([a-z\- ]+)/);
      if (m) {
        const rest = m[1].trim();
        if (small[rest] !== undefined) return 2000 + small[rest];
        const parts = rest.split(/[\s-]+/);
        if (parts.length === 2 && small[parts[0]] && small[parts[1]]) return 2000 + small[parts[0]] + small[parts[1]];
        if (parts.length === 1 && small[parts[0]]) return 2000 + small[parts[0]];
      }
      // Numeric year already in the string?
      m = t.match(/\b(20\d{2}|19\d{2})\b/);
      if (m) return parseInt(m[1], 10);
      return null;
    }

    // Strips Setty's appended fee proposal section from the full text so that
    // pattern matching only sees the CLIENT's contract — not Setty's own
    // proposal language (which has rates, scope phrases, etc. that look like
    // contract terms but aren't override clauses imposed by the client).
    //
    // ★ USER CONTRIBUTION POINT ★
    // Add more markers below if Setty's other proposal templates aren't
    // being detected. The marker matches the START of Setty's section; the
    // text from that point onward is dropped.
    function excludeSettyProposal(text) {
      const markers = [
        // EXHIBIT B header followed within ~1500 chars by Setty's standard banner
        /EXHIBIT\s+B[\s\S]{0,1500}?(?:DESIGN\s+ENGINEERING\s+SERVICES|MECHANICAL\s*[\|\s]+ELECTRICAL\s*[\|\s]+PLUMBING)/i,
        // Setty's standard fee proposal banner ("Mechanical | Electrical | Plumbing | Fire Protection")
        /Mechanical\s*[\|]\s*Electrical\s*[\|]\s*Plumbing\s*[\|]\s*Fire\s+Protection/i,
        // "DESIGN ENGINEERING SERVICES" header with To: addressee (Setty proposal cover)
        /DESIGN\s+ENGINEERING\s+SERVICES\b[\s\S]{0,500}?(?:To\s*:|TO\s*:)/i,
        // Setty Associates with their service-category banner (Modeling, Commissioning, LEED, etc.)
        /\bSetty\s+(?:&\s+|and\s+)?Associates\b[\s\S]{0,300}?(?:LEED|Modeling|Commissioning|Master\s+Controls)/i,
      ];
      let earliest = text.length;
      for (const re of markers) {
        const m = text.match(re);
        // Guard: require marker to appear past the first ~1000 chars. Setty's
        // name shows up at the top of every contract as a PARTY (not as the
        // author of the proposal section) — we don't want to truncate the
        // entire contract just because Setty is named on the cover page.
        if (m && m.index > 1000 && m.index < earliest) earliest = m.index;
      }
      return earliest < text.length ? text.slice(0, earliest) : text;
    }

    function parseContractDate(text) {
      // AIA word-form: "AGREEMENT made as of the tenth of July in the year Two Thousand Eighteen"
      let m = text.match(/AGREEMENT\s+made\s+as\s+of\s+the\s+([A-Za-z\-]+)\s+of\s+([A-Za-z]+)\s+in\s+the\s+year\s+([A-Za-z\- ]+?)(?:\.|,|BETWEEN|$)/i);
      if (m) {
        const day = ORDINAL_WORDS[m[1].toLowerCase()];
        const month = MONTHS[m[2].toLowerCase()];
        const year = wordsToYear(m[3]);
        if (day && month && year) return { date: `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`, source: "AIA cover 'AGREEMENT made as of'", confidence: "high" };
      }
      // Non-AIA: "as of this 11th day of December, 2023"
      m = text.match(/(?:as\s+of\s+(?:this\s+)?|dated\s+)(\d{1,2})(?:st|nd|rd|th)?\s+day\s+of\s+([A-Za-z]+),?\s+(\d{4})/i);
      if (m) {
        const mo = MONTHS[m[2].toLowerCase()];
        if (mo) return { date: `${m[3]}-${String(mo).padStart(2,"0")}-${String(m[1]).padStart(2,"0")}`, source: "subcontract preamble '__ day of __'", confidence: "high" };
      }
      // Signature-line MM/DD/YYYY — common on executed contracts. Look for an
      // explicit "Date:" / "Dated:" / "Effective Date:" label to avoid grabbing
      // random dates in the body. Pulls the FIRST matching one (typically the
      // signature on the first signature page = the contract's effective date).
      m = text.match(/\b(?:Date|Dated|Effective\s+Date|Executed)\s*[:\-]\s*(\d{1,2})\/(\d{1,2})\/(\d{2,4})\b/i);
      if (m) {
        let y = m[3]; if (y.length === 2) y = (parseInt(y, 10) > 50 ? "19" : "20") + y;
        return { date: `${y}-${m[1].padStart(2,"0")}-${m[2].padStart(2,"0")}`, source: "labeled 'Date: MM/DD/YYYY' on signature line", confidence: "high" };
      }
      // Generic MM/DD/YYYY anywhere in first ~6000 chars (cover + signature area).
      // Lower confidence — could be a random date in the body. Only accepts
      // years 1990-2099 to avoid false positives on numeric fields.
      m = text.slice(0, 6000).match(/\b(0?[1-9]|1[0-2])\/(0?[1-9]|[12]\d|3[01])\/(19[9]\d|20\d{2})\b/);
      if (m) {
        return { date: `${m[3]}-${m[1].padStart(2,"0")}-${m[2].padStart(2,"0")}`, source: "generic MM/DD/YYYY in cover", confidence: "medium" };
      }
      // Last resort: any date near "Effective Date" or "dated"
      m = text.slice(0, 4000).match(/(?:Effective\s+Date|dated)[\s\S]{0,40}?([A-Za-z]+)\s+(\d{1,2}),?\s+(\d{4})/i);
      if (m) {
        const mo = MONTHS[m[1].toLowerCase()];
        if (mo) return { date: `${m[3]}-${String(mo).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`, source: "generic 'Effective Date' anchor", confidence: "medium" };
      }
      return null;
    }

    // -- Parties --
    function extractParties(text) {
      const cover = text.slice(0, 4000);
      // AIA: "BETWEEN the Consultant's client identified as the Architect: <CLIENT> and the Consultant: <SETTY>"
      let m = cover.match(/BETWEEN[\s\S]{0,80}?:\s*([\s\S]{20,300}?)\s+and\s+the\s+(?:Consultant|Architect|Contractor)[^:]*:\s*([\s\S]{20,300}?)(?=\s+for\s+the\s+following|\s+the\s+Project|\n\s*for\s|ARTICLE)/i);
      if (m) return {
        client: { value: m[1].replace(/\s+/g, " ").trim(), confidence: "high", source: "AIA cover BETWEEN clause" },
        settyRole: { value: m[2].replace(/\s+/g, " ").trim(), confidence: "high", source: "AIA cover BETWEEN clause" },
      };
      // Non-AIA subcontract: "between <PRIME> and <SETTY>"
      m = cover.match(/between\s+([A-Z][A-Za-z &,\.'\-]+?)\s+\(["“]([^"”]+)["”][\s\S]{0,100}?\)\s+and\s+([A-Z][A-Za-z &,\.'\-]+?)\s+\(/);
      if (m) return {
        client: { value: m[1].trim(), confidence: "medium", source: "subcontract preamble 'between ... and'" },
        settyRole: { value: m[3].trim(), confidence: "medium", source: "subcontract preamble 'between ... and'" },
      };
      return {
        client: makeField("", "empty", ""),
        settyRole: makeField("", "empty", ""),
      };
    }

    // -- Project name --
    function extractProject(text) {
      // Larger window — AIA 'for the following Project:' block can run 5-10
      // lines including name, location, address, and scope summary.
      const cover = text.slice(0, 6000);

      // AIA block: "for the following Project:" followed by a multi-line
      // description. Capture from the header to the next major section
      // boundary (BETWEEN, AGREEMENT, ARTICLE, etc.) or up to ~1500 chars.
      let m = cover.match(/(?:for\s+the\s+following\s+)?PROJECT\s*[:\.]/i);
      if (m) {
        const startIdx = m.index + m[0].length;
        let body = cover.slice(startIdx);
        // Strip the italicized hint sometimes embedded by the AIA template:
        //   "(Include detailed description of Project, location, address and scope.)"
        body = body.replace(/^\s*\([^)]{10,200}\)\s*/i, "");
        // Stop at the next major section boundary. AIA cover pages put the
        // project description before "BETWEEN" (parties) or "AGREEMENT made"
        // (recital), and well before any ARTICLE / EXHIBIT header.
        const stopRe = /\n\s*(?:BETWEEN\b|AGREEMENT\s+(?:is\s+)?made|ARTICLE\s+\d|§\s*\d+\.\d+|EXHIBIT\s+[A-Z]|The\s+Architect\s+and\s+Consultant)/i;
        const stopM = body.match(stopRe);
        const sliceEnd = stopM ? stopM.index : Math.min(body.length, 1500);
        let project = body.slice(0, sliceEnd).trim();
        // Collapse runs of spaces/tabs but preserve paragraph breaks for readability
        project = project.replace(/[ \t]+/g, " ").replace(/\n{3,}/g, "\n\n");
        // Cap final length so a missed stop boundary doesn't dump 5KB into PMS
        if (project.length > 1500) project = project.slice(0, 1500) + "…";
        if (project.length > 5) {
          return makeField(project, "high", "AIA 'for the following Project:' block (multi-line)");
        }
      }

      // Non-AIA: "for the performance of certain professional services for the [Project Name] (the "Project")"
      m = cover.match(/professional\s+services\s+for\s+the\s+([A-Z][^.]{5,150}?)\s+\(\s*(?:the\s+)?["“]?Project["”]?/i);
      if (m) return makeField(m[1].trim(), "medium", "subcontract 'professional services for the' clause");

      // First-line title: a lot of subcontracts open with "<PROJECT NAME>"
      const firstLine = (cover.split("\n")[0] || "").trim();
      if (firstLine.length > 8 && firstLine.length < 150 && /[A-Z]/.test(firstLine)) {
        return makeField(firstLine, "low", "first line of document");
      }
      return makeField("", "empty", "");
    }

    // -- Identifiers (numbers + expiration) --
    // Pulls things that map 1:1 to PMS fields and should be auto-applied:
    //   contractNumber, primeProjectNumber, contractExpiration
    // Patterns deliberately favor cover-page anchors (within first ~4000 chars)
    // to avoid false positives from body text that happens to contain "Project No."
    function extractIdentifiers(text, fileName) {
      const out = {};
      const cover = text.slice(0, 4000);

      // Contract Number — "Contract No.: XYZ" / "Agreement Number: ABC-123" /
      // "Contract #: 12345". Allow letters, digits, dashes, dots, slashes; cap
      // length so we don't grab an entire paragraph.
      const cn = cover.match(/(?:Contract|Agreement)\s+(?:Number|No\.?|#)\s*[:\-]?\s*([A-Z0-9][A-Z0-9.\-\/_]{2,40})/i);
      out.contractNumber = cn
        ? makeField(cn[1].trim(), "high", "cover-page 'Contract No.' anchor")
        : makeField("", "empty", "");

      // Prime's Project Number — most contracts label this "Project No." or
      // "Project Number". On a SETTY contract issued BY a prime, this number
      // is the prime's internal job number, not Setty's. Falls back to a
      // leading numeric pattern in the filename if no inline label found.
      let pn = cover.match(/(?:Project|Job)\s+(?:Number|No\.?|#)\s*[:\-]?\s*([A-Z0-9][A-Z0-9.\-\/_]{2,30})/i);
      if (pn) {
        out.primeProjectNumber = makeField(pn[1].trim(), "high", "cover-page 'Project No.' anchor");
      } else if (fileName) {
        // Filenames like "13660001.00A Setty Agreement..." often start with the
        // prime's project number. Conservative pattern: digits + optional .NNX suffix.
        const fnMatch = fileName.match(/^([0-9]{4,}(?:\.[0-9A-Z]{1,4})?)\b/i);
        if (fnMatch) out.primeProjectNumber = makeField(fnMatch[1], "low", "leading token in filename");
        else out.primeProjectNumber = makeField("", "empty", "");
      } else {
        out.primeProjectNumber = makeField("", "empty", "");
      }

      // Contract Expiration — common in master service agreements / term contracts;
      // usually absent in per-project services contracts (B101/C401).
      // Try several patterns, accept ISO/US/word-month dates.
      const expRegexes = [
        /(?:expir(?:es?|ation|ing|y)|terminat(?:es?|ing))\s+(?:on\s+|date\s*[:\-]?\s*)?(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|[A-Z][a-z]+\s+\d{1,2},?\s+\d{4})/i,
        /(?:term|agreement|contract)\s+(?:shall\s+)?(?:end(?:s|ing)?|expir(?:es?|ing)|terminat(?:es?|ing))\s+(?:on\s+)?(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|[A-Z][a-z]+\s+\d{1,2},?\s+\d{4})/i,
        /(?:through|until|effective\s+(?:through|until))\s+(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|[A-Z][a-z]+\s+\d{1,2},?\s+\d{4})/i,
      ];
      let expMatch = null;
      for (const re of expRegexes) {
        const m2 = text.match(re);
        if (m2) { expMatch = m2; break; }
      }
      if (expMatch) {
        // Normalize to YYYY-MM-DD if we can
        const raw = expMatch[1];
        let iso = null;
        const isoTry1 = raw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
        const isoTry2 = raw.match(/^([A-Z][a-z]+)\s+(\d{1,2}),?\s+(\d{4})$/);
        if (isoTry1) {
          let y = isoTry1[3]; if (y.length === 2) y = (parseInt(y,10) > 50 ? "19" : "20") + y;
          iso = `${y}-${isoTry1[1].padStart(2,"0")}-${isoTry1[2].padStart(2,"0")}`;
        } else if (isoTry2) {
          const mo = MONTHS[isoTry2[1].toLowerCase()];
          if (mo) iso = `${isoTry2[3]}-${String(mo).padStart(2,"0")}-${isoTry2[2].padStart(2,"0")}`;
        }
        out.contractExpiration = makeField(iso || raw, iso ? "medium" : "low", "expiration-pattern match");
      } else {
        out.contractExpiration = makeField("", "empty", "");
      }

      return out;
    }

    // -- Payment terms --
    function extractPaymentTerms(text, flags) {
      const out = {};

      // Invoice review window — "within ten days" / "within 10 days"
      const reviewM = text.match(/(?:Architect|Consultant|Owner|Grimshaw|prime)[^\n]{0,80}?within\s+(\w+|\d+)\s+days?[^\n]{0,120}?(?:invoice|billing|payment\s+application)/i)
                  || text.match(/(?:invoice|billing)[^\n]{0,120}?within\s+(\w+|\d+)\s+days?/i);
      if (reviewM) {
        out.invoiceReview = makeField(`Within ${reviewM[1]} days`, "medium", "AIA §11.6 / payment-article review window");
      }

      // Pay-when-paid? Pull straight from the flags result for consistency
      const pwp = flags.find(f => f.id === "pay-when-paid");
      out.payWhenPaid = pwp
        ? makeField("YES — see override flag", "high", pwp.evidence.slice(0, 120))
        : makeField("No / not detected", "medium", "no pay-when-paid language found");

      // Interest on late payment
      const noInt = flags.find(f => f.id === "no-interest");
      if (noInt) {
        out.interestOnLate = makeField("WAIVED (no interest payable)", "high", "client waiver clause");
      } else {
        // Look for standard rate language
        const intM = text.match(/(\d+(?:\.\d+)?%)\s*(?:per\s+month|monthly|annually)[^\n]{0,80}?(?:interest|late|past\s+due)/i)
                  || text.match(/(?:interest|late)[^\n]{0,80}?(\d+(?:\.\d+)?%)\s*(?:per\s+month|monthly|annually)/i);
        if (intM) out.interestOnLate = makeField(intM[1], "medium", "interest rate near 'late payment'");
        else out.interestOnLate = makeField("", "empty", "");
      }

      // Retainage / withholding
      const retM = text.match(/retainage[^\n]{0,80}?(\d+(?:\.\d+)?\s*%|\$[\d,]+)/i)
                || text.match(/retain[^\n]{0,80}?(\d+(?:\.\d+)?\s*%)\s+of/i);
      if (retM) out.retainage = makeField(retM[1].trim(), "medium", "retainage clause");
      else out.retainage = makeField("", "empty", "");

      // Conditions precedent count — just note presence
      const cpFlag = flags.find(f => f.id === "conditions-precedent");
      out.conditionsPrecedent = cpFlag
        ? makeField("YES — review carefully", "high", "see flagged clause(s)")
        : makeField("None detected", "low", "no 'condition precedent' language found");

      return out;
    }

    // -- Reimbursable expense rules --
    function extractReimbursableRules(text, flags) {
      const out = {};

      // Multiplier — pull from flag
      const multFlag = flags.find(f => f.id === "multiplier");
      if (multFlag && multFlag.capturedValue) {
        out.multiplier = makeField(multFlag.capturedValue, "high", "client-imposed multiplier");
      } else {
        out.multiplier = makeField("", "empty", "");
      }

      // No-markup status
      const nmFlag = flags.find(f => f.id === "no-markup");
      out.markupPolicy = nmFlag
        ? makeField("NO MARKUP allowed (see flag)", "high", "client prohibition")
        : makeField("Standard markup likely permitted", "low", "no prohibition found — verify against client's exhibit");

      // Reimbursable section body — look for §11.5/§11.8 (AIA) or "Reimbursable" sections
      let body = sectionAfter(text, /§\s*11\.[58]\b[^\n]*REIMBURSABLE/i, 1500)
              || sectionAfter(text, /COMPENSATION\s+FOR\s+REIMBURSABLE\s+EXPENSES/i, 1500)
              || sectionAfter(text, /Reimbursable\s+(?:Expenses|Services)\b/i, 1500);
      if (body) {
        // Trim at next section heading
        const stop = body.search(/§\s*\d+\.\d+\b|ARTICLE\s+\d+|\n\d+\.\d+\.\d+/);
        const snippet = (stop > 50 ? body.slice(0, stop) : body.slice(0, 700)).trim();
        if (/prime\s+agreement|prime\s+master/i.test(snippet)) {
          out.reimbursableRules = makeField("Refers to Prime Agreement — request Prime for full rules.\n\n" + snippet.slice(0, 400), "medium", "AIA §11.5 / non-AIA reimbursable section, defers to Prime");
        } else {
          out.reimbursableRules = makeField(snippet, "medium", "extracted reimbursable-rules block");
        }
      } else {
        out.reimbursableRules = makeField("", "empty", "");
      }

      // Categories excluded from markup (Grimshaw-style explicit list)
      const exclM = text.match(/not\s+be\s+entitled\s+to\s+any\s+mark[\s\-]?up\s+with\s+respect\s+to([\s\S]{0,400}?)(?:\.\s*\n|\n\s*[A-Z]|Subconsultant)/i);
      if (exclM) {
        out.markupExclusions = makeField(exclM[1].replace(/\s+/g, " ").trim(), "high", "explicit no-markup exclusion list");
      } else {
        out.markupExclusions = makeField("", "empty", "");
      }

      return out;
    }

    // -- Schedule / duration --
    function extractSchedule(text, flags) {
      const out = {};

      // Substantial Completion — appears only in owner/contractor contracts typically
      let m = text.match(/Substantial\s+Completion[^\n]{0,200}?(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|[A-Z][a-z]+\s+\d{1,2},?\s+\d{4})/i);
      if (m) {
        out.substantialCompletion = makeField(m[1], "high", "explicit Substantial Completion date");
      } else if (/Substantial\s+Completion/i.test(text)) {
        out.substantialCompletion = makeField("Mentioned but no explicit date — check schedule exhibit", "low", "term present without date");
      } else {
        out.substantialCompletion = makeField("Not applicable (services contract)", "info", "no Substantial Completion language");
      }

      // Schedule reference — does this contract defer schedule to Prime/Task Order?
      if (/schedules?\s+(?:and\s+timelines\s+)?set\s+forth\s+in\s+the\s+Prime/i.test(text) ||
          /Task\s+Order/i.test(text) ||
          /Prime\s+Agreement/i.test(text) && /schedule/i.test(text)) {
        out.scheduleSource = makeField("Schedule governed by Prime Agreement / Task Order", "high", "client cross-references Prime");
      } else {
        // Look for a standalone duration clause
        m = text.match(/(?:term|duration|period)\s+of\s+(?:this\s+)?(?:Agreement|Subcontract|contract)[^\n]{0,80}?(\d+\s+(?:months?|years?|days?))/i);
        if (m) out.scheduleSource = makeField(m[1], "medium", "explicit duration clause");
        else out.scheduleSource = makeField("", "empty", "");
      }

      // Termination notice
      m = text.match(/(?:terminate|termination)[^\n]{0,200}?(?:upon|with|on)\s+(\w+|\d+)\s+days?\s+(?:written\s+)?notice/i);
      if (m) out.terminationNotice = makeField(`${m[1]} days written notice`, "medium", "termination notice clause");
      else out.terminationNotice = makeField("", "empty", "");

      return out;
    }

    // -- Scope of Work --
    // Finds whatever section heading is closest to "scope of work" / "scope of
    // services" and grabs the body of that section (up to ~2500 chars or the
    // next §N.M / ARTICLE N boundary, whichever comes first).
    function extractScopeOfWork(text) {
      const anchors = [
        /ARTICLE\s+3\s+(?:SCOPE\s+OF\s+SERVICES|SCOPE\s+OF\s+WORK|CONSULTANT['']?S\s+SERVICES|SERVICES)\b/i,
        /(?:§|Section)\s*3(?:\.\d+)?\s+(?:SCOPE\s+OF\s+SERVICES|SCOPE\s+OF\s+WORK)/i,
        /\bSCOPE\s+OF\s+(?:THE\s+)?(?:WORK|SERVICES)\b\s*[:\.\n]/i,
        /EXHIBIT\s+A\s*[\-—:]?\s*(?:SCOPE|Services|Description\s+of\s+Services)/i,
        /\bDescription\s+of\s+(?:the\s+)?(?:Services|Work|Scope)\b/i,
      ];
      for (const re of anchors) {
        const m = text.match(re);
        if (!m) continue;
        const start = m.index;
        const window = text.slice(start, Math.min(text.length, start + 5000));
        // Stop at the next major section heading (but skip the one we just matched)
        const tail = window.slice(m[0].length);
        const stopRe = /(?:§\s*\d+\.\d+|ARTICLE\s+\d+\b|SECTION\s+\d+(?:\.\d+)?\b|EXHIBIT\s+[B-Z]\b)/;
        const stop = tail.search(stopRe);
        const sliceEnd = stop > 0 ? m[0].length + stop : Math.min(2500, window.length);
        let section = window.slice(0, sliceEnd).trim();
        if (section.length > 100) {
          // Normalize whitespace but preserve paragraph structure
          section = section.replace(/[ \t]+/g, " ").replace(/\n{3,}/g, "\n\n");
          if (section.length > 2500) section = section.slice(0, 2500) + "…";
          return makeField(section, "medium", "scope anchor: '" + m[0].slice(0, 60) + "…'");
        }
      }
      return makeField("", "empty", "");
    }

    // -- Billing / Invoice Requirements --
    // Captures specific direction on HOW Setty has to bill — payment cycle,
    // required attachments, invoice format, supporting docs. Distinct from
    // payment terms (which focuses on overrides like pay-when-paid).
    function extractBillingRequirements(text) {
      const hits = [];
      const seen = new Set();
      const collect = (snippet) => {
        const key = snippet.slice(0, 80).toLowerCase();
        if (!seen.has(key)) { seen.add(key); hits.push(snippet.trim()); }
      };
      const anchors = [
        // Invoice submission cadence
        /(?:invoices?|billing)\s+shall\s+be\s+submitted[^.]{0,300}\./i,
        /(?:invoices?|payment\s+applications?)\s+(?:will|shall|must)\s+be\s+(?:submitted|delivered|provided)[^.]{0,300}\./i,
        // Required content on invoices
        /(?:invoices?\s+(?:must|shall)\s+(?:include|contain)|required\s+(?:on|with)\s+(?:each\s+)?invoice)[^.]{0,300}\./i,
        /(?:supporting\s+documentation|backup\s+(?:material|documentation))[^.]{0,200}?(?:invoice|payment|billing)[^.]{0,200}\./i,
        // Net payment windows
        /\b(?:Net|net)\s+(?:thirty|forty[\s\-]five|sixty|ninety|\d{2,3})\s+(?:\(\d+\)\s+)?days?\b[^.]{0,200}\./i,
        // Payment-application phrases (DDC/CARF-style projects often have these)
        /payment\s+application(?:s)?[^.]{0,400}\./i,
        // Audit / record-retention tied to billing
        /(?:retain|maintain|keep)\s+(?:all\s+)?(?:books|records|invoices)[^.]{0,200}?(?:audit|inspection)/i,
      ];
      for (const re of anchors) {
        const m = text.match(re);
        if (m) collect(m[0]);
      }
      if (hits.length === 0) return makeField("", "empty", "");
      const combined = hits.join("\n\n").slice(0, 2000);
      return makeField(combined, "medium", "billing/invoice-requirement clauses (" + hits.length + " matched)");
    }

    // ========================================================================
    // Main pipeline
    // ========================================================================
    function extractAll(parsedPdf) {
      const log = [];
      const rawText = parsedPdf.fullText;
      // Strip Setty's appended fee proposal section (Exhibit B etc.) before
      // pattern matching — those proposals are Setty's own language and don't
      // represent client-imposed override terms. See excludeSettyProposal above.
      const text = excludeSettyProposal(rawText);
      const trimmed = rawText.length - text.length;
      log.push({ type: "info", msg: `PDF parsed: ${parsedPdf.numPages} pages, ${rawText.length} chars` });
      if (trimmed > 200) {
        log.push({ type: "info", msg: `Trimmed ${trimmed} chars from Setty's proposal appendix — scanning client contract only.` });
      }

      // 1. Document type
      const docType = detectDocType(text);
      log.push({ type: "info", msg: `Document type: ${docType.type}${docType.year ? " ("+docType.year+")" : ""}` });

      // 2. OVERRIDE FLAGS — the primary output
      log.push({ type: "tier", msg: "Scanning for override clauses…" });
      const flags = detectFlags(text);
      for (const f of flags) {
        log.push({ type: "flag", msg: `⚑ ${f.label}` });
      }
      if (flags.length === 0) log.push({ type: "info", msg: "No override flags detected — verify manually" });

      // 3. Document metadata
      log.push({ type: "tier", msg: "Extracting document metadata…" });
      const dateRes = parseContractDate(text);
      const contractDate = dateRes
        ? makeField(dateRes.date, dateRes.confidence, dateRes.source)
        : makeField("", "empty", "");
      if (dateRes) log.push({ type: "hit", msg: `Contract date: ${dateRes.date}` });
      else log.push({ type: "miss", msg: "Contract date not parsed" });

      const parties = extractParties(text);
      if (parties.client.value) log.push({ type: "hit", msg: `Client: ${parties.client.value.slice(0,60)}…` });
      const project = extractProject(text);
      if (project.value) log.push({ type: "hit", msg: `Project: ${project.value.slice(0,60)}` });
      const ids = extractIdentifiers(text, parsedPdf.fileName);
      if (ids.contractNumber.value)      log.push({ type: "hit", msg: `Contract #: ${ids.contractNumber.value}` });
      if (ids.primeProjectNumber.value)  log.push({ type: "hit", msg: `Prime's Project #: ${ids.primeProjectNumber.value}` });
      if (ids.contractExpiration.value)  log.push({ type: "hit", msg: `Contract Expiration: ${ids.contractExpiration.value}` });

      // 4. Payment terms
      log.push({ type: "tier", msg: "Extracting payment terms…" });
      const payment = extractPaymentTerms(text, flags);

      // 5. Reimbursable rules
      log.push({ type: "tier", msg: "Extracting reimbursable expense rules…" });
      const reimb = extractReimbursableRules(text, flags);

      // 6. Schedule
      log.push({ type: "tier", msg: "Extracting schedule terms…" });
      const schedule = extractSchedule(text, flags);

      // 7. Scope of Work
      log.push({ type: "tier", msg: "Extracting scope of work…" });
      const scopeOfWork = extractScopeOfWork(text);
      if (scopeOfWork.value) log.push({ type: "hit", msg: `Scope of Work: ${scopeOfWork.value.slice(0,80)}…` });

      // 8. Billing / Invoice requirements
      log.push({ type: "tier", msg: "Extracting billing / invoice requirements…" });
      const billingReqs = extractBillingRequirements(text);
      if (billingReqs.value) log.push({ type: "hit", msg: `Billing requirements (${billingReqs.value.length} chars)` });

      return {
        log,
        docType,
        flags,
        fields: {
          // metadata
          contractDate,
          contractExpiration: ids.contractExpiration,
          contractNumber: ids.contractNumber,
          primeProjectNumber: ids.primeProjectNumber,
          client: parties.client,
          settyRole: parties.settyRole,
          project,
          // scope (NEW)
          scopeOfWork,
          // payment
          invoiceReview: payment.invoiceReview || makeField("", "empty", ""),
          payWhenPaid: payment.payWhenPaid,
          interestOnLate: payment.interestOnLate,
          retainage: payment.retainage,
          conditionsPrecedent: payment.conditionsPrecedent,
          billingRequirements: billingReqs,  // NEW
          // reimbursable
          multiplier: reimb.multiplier,
          markupPolicy: reimb.markupPolicy,
          markupExclusions: reimb.markupExclusions,
          reimbursableRules: reimb.reimbursableRules,
          // schedule
          substantialCompletion: schedule.substantialCompletion,
          scheduleSource: schedule.scheduleSource,
          terminationNotice: schedule.terminationNotice,
        },
      };
    }

    // ========================================================================
    // React UI
    // ========================================================================
    function FieldEditor({ keyName, label, field, onChange, multiline }) {
      const Tag = multiline ? "textarea" : "input";
      return (
        <div className={`field conf-${field.confidence}`}>
          <label>
            {label}
            <span className={`badge ${field.confidence}`}>{field.confidence}</span>
          </label>
          <Tag
            value={field.value}
            onChange={(e) => onChange(keyName, { ...field, value: e.target.value })}
            rows={multiline ? 3 : undefined}
          />
          {field.source && <div className="source">via {field.source}</div>}
        </div>
      );
    }

    function FlagsBanner({ flags }) {
      if (flags.length === 0) {
        return (
          <div className="flags-banner empty">
            <div className="header-line">✓ No client-override clauses detected</div>
            <div style={{fontSize: 11, color: "#A7F3D0"}}>
              Verify manually — absence of detection isn't proof of absence.
            </div>
          </div>
        );
      }
      const high = flags.filter(f => f.severity === "high");
      const medium = flags.filter(f => f.severity === "medium");
      const info = flags.filter(f => f.severity === "info");
      return (
        <div className="flags-banner">
          <div className="header-line">
            ⚑ {flags.length} override clause{flags.length === 1 ? "" : "s"} detected
            {high.length > 0 && <span style={{fontSize: 11, fontWeight: 500}}> ({high.length} high-severity)</span>}
          </div>
          {[...high, ...medium, ...info].map((f) => (
            <div className={`flag ${f.severity}`} key={f.id}>
              <div className="flag-label">{f.label}{f.capturedValue ? ` — ${f.capturedValue}` : ""}</div>
              <div style={{fontSize: 11, color: "#E2E8F0", marginTop: 4}}>{f.explanation}</div>
              <div className="flag-evidence">{f.evidence}</div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [file, setFile] = useState(null);
      const [parsing, setParsing] = useState(false);
      // Investigative caption that rotates through INVESTIGATIVE_QUOTES while
      // parsing is in progress. Holds an entry from that array, or null when
      // not parsing. The timer is held in a ref so we can clear it from any
      // codepath that ends parsing (success, error, or unmount).
      const [investigation, setInvestigation] = useState(null);
      const investigationTimerRef = useRef(null);
      const [result, setResult] = useState(null);
      const [log, setLog] = useState([]);
      const [pmsConnected, setPmsConnected] = useState(false);
      const [dragging, setDragging] = useState(false);
      // The SharePoint/web URL the file was dragged from, if the browser
      // populated it in the DataTransfer (works for drags out of SharePoint
      // Online, browser tabs, some email clients). Empty for File Explorer
      // drags. Sent to PMS so the OneNote page can show where the contract
      // came from in addition to the record's curated folder.
      const [dragSourceUrl, setDragSourceUrl] = useState("");
      // sendState: "idle" → "sent" (reverts to idle after a few seconds so
      // the user can re-send if they made a typo or want to retry). Gives
      // visible confirmation that the click was registered.
      const [sendState, setSendState] = useState("idle");

      useEffect(() => { setPmsConnected(!!window.opener); }, []);

      const handleFile = useCallback(async (f) => {
        if (!f || f.type !== "application/pdf") { alert("Please drop a PDF file."); return; }
        setFile(f); setParsing(true); setResult(null);
        setLog([{ type: "info", msg: `Reading ${f.name}…` }]);
        // Start the investigative animation — rotate through quotes every
        // ~1.7s. Pick a random starting index so consecutive extractions
        // don't always lead with the same line. Emoji rotates independently
        // from a pool so the visual identity stays "investigative" without
        // having to hand-pair each quote to a specific icon.
        if (investigationTimerRef.current) clearInterval(investigationTimerRef.current);
        let qIdx = Math.floor(Math.random() * INVESTIGATIVE_QUOTES.length);
        const pickEmoji = () => INVESTIGATIVE_EMOJI[Math.floor(Math.random() * INVESTIGATIVE_EMOJI.length)];
        setInvestigation({ emoji: pickEmoji(), line: INVESTIGATIVE_QUOTES[qIdx] });
        investigationTimerRef.current = setInterval(() => {
          qIdx = (qIdx + 1) % INVESTIGATIVE_QUOTES.length;
          setInvestigation({ emoji: pickEmoji(), line: INVESTIGATIVE_QUOTES[qIdx] });
        }, 1700);
        try {
          const parsed = await readPdf(f);

          // Scanned PDFs (image-only, no embedded text layer) need OCR
          // before any pattern-based extraction can work. Tesseract.js
          // runs entirely in the browser — no upload, contract stays local.
          if (parsed.isScanned) {
            setLog((prev) => [...prev,
              { type: "info", msg: `⚠ No embedded text found — ${parsed.numPages}-page scanned PDF.` },
              { type: "info", msg: `Running OCR (Tesseract.js, in-browser). First page-set may take 30-60s; subsequent pages ~2-5s each.` },
            ]);
            const ocrPages = await ocrPdfPages(parsed.pdfDoc, (p) => {
              let msg;
              if (p.stage === "render")      msg = `Rendering p${p.page}/${p.total} for OCR…`;
              else if (p.stage === "ocr")    msg = `OCR p${p.page}/${p.total}…`;
              else if (p.stage === "init")   msg = p.msg || "Initializing OCR…";
              else                            msg = `OCR: ${p.stage}`;
              setLog((prev) => [...prev, { type: "info", msg }]);
            });
            parsed.pages = ocrPages;
            parsed.fullText = ocrPages.join("\n\n");
            setLog((prev) => [...prev, { type: "hit", msg: `OCR complete: ${parsed.fullText.length} chars extracted from ${parsed.numPages} pages.` }]);
          }

          const res = extractAll(parsed);
          setResult(res);
          setLog((prev) => [...prev, ...res.log]);
        } catch (e) {
          setLog((prev) => [...prev, { type: "miss", msg: `Error: ${e.message}` }]);
          console.error(e);
        } finally {
          setParsing(false);
          // Stop the investigative animation regardless of success/failure.
          if (investigationTimerRef.current) {
            clearInterval(investigationTimerRef.current);
            investigationTimerRef.current = null;
          }
          setInvestigation(null);
        }
      }, []);

      // Pull the source URL out of a DataTransfer if the drag provided one.
      // Behavior by drag source:
      //   - SharePoint Online web: usually populates text/html with the file's
      //     SharePoint URL inside an <a href>. Sometimes text/uri-list too.
      //   - File Explorer with OneDrive sync: typically only `files`, no URL.
      //   - Email attachment in Outlook web: may include an attachment URL.
      //   - Drag from a browser tab/bookmark: text/uri-list with page URL.
      // Returns "" if no URL was provided.
      function extractDragSourceUrl(dt) {
        if (!dt) return "";
        // RFC 2483: one URI per line, lines starting with # are comments
        const list = dt.getData("text/uri-list");
        if (list) {
          for (const line of list.split(/\r?\n/)) {
            const t = line.trim();
            if (t && !t.startsWith("#")) return t;
          }
        }
        // Firefox-specific: "url\ntitle"
        const moz = dt.getData("text/x-moz-url");
        if (moz) {
          const first = moz.split(/\r?\n/)[0].trim();
          if (first) return first;
        }
        // text/html — first <a href="…">
        const html = dt.getData("text/html");
        if (html) {
          const m = html.match(/href\s*=\s*["']([^"']+)["']/i);
          if (m && /^https?:\/\//i.test(m[1])) return m[1];
        }
        // text/plain — sometimes a bare URL
        const text = dt.getData("text/plain");
        if (text && /^https?:\/\//.test(text.trim())) return text.trim();
        return "";
      }

      const onDrop = (e) => {
        e.preventDefault(); setDragging(false);
        const sourceUrl = extractDragSourceUrl(e.dataTransfer);
        setDragSourceUrl(sourceUrl);  // remember even before file is parsed
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      };

      const updateField = useCallback((key, newVal) => {
        setResult((prev) => ({ ...prev, fields: { ...prev.fields, [key]: newVal } }));
      }, []);

      const send = () => {
        if (!result) return;
        const f = result.fields;
        const payload = {
          fileName: file?.name,
          dragSourceUrl,  // empty string if drag didn't carry a URL (e.g., File Explorer)
          docType: result.docType.type,
          docTypeYear: result.docType.year,
          isAIA: result.docType.isAIA,
          flags: result.flags.map(x => ({ id: x.id, label: x.label, severity: x.severity, value: x.capturedValue, fullSection: x.fullSection })),
          contractDate: f.contractDate.value,
          contractExpiration: f.contractExpiration.value,
          contractNumber: f.contractNumber.value,
          primeProjectNumber: f.primeProjectNumber.value,
          client: f.client.value,
          settyRole: f.settyRole.value,
          project: f.project.value,
          scopeOfWork: f.scopeOfWork ? f.scopeOfWork.value : "",
          payment: {
            invoiceReview: f.invoiceReview.value,
            payWhenPaid: f.payWhenPaid.value,
            interestOnLate: f.interestOnLate.value,
            retainage: f.retainage.value,
            conditionsPrecedent: f.conditionsPrecedent.value,
            billingRequirements: f.billingRequirements ? f.billingRequirements.value : "",
          },
          reimbursable: {
            multiplier: f.multiplier.value,
            markupPolicy: f.markupPolicy.value,
            markupExclusions: f.markupExclusions.value,
            rules: f.reimbursableRules.value,
          },
          schedule: {
            substantialCompletion: f.substantialCompletion.value,
            scheduleSource: f.scheduleSource.value,
            terminationNotice: f.terminationNotice.value,
          },
        };
        if (sendToPMS(payload)) {
          setSendState("sent");
          // Auto-close this popup after a short delay so the user doesn't
          // have to manually close it. 1.5s gives them time to see the
          // green "✓ Sent" confirmation. If close is blocked by the
          // browser (rare for popups opened via window.open), revert the
          // button after 8s so they can re-send or close manually.
          setTimeout(() => {
            try { window.close(); } catch (_) { /* may be blocked */ }
            // If we're still here after 8s total (close was blocked), reset
            setTimeout(() => setSendState("idle"), 6500);
          }, 1500);
        }
      };

      const docTypeLabel = result?.docType
        ? (result.docType.isAIA ? `AIA ${result.docType.type} ${result.docType.year || ""}` : result.docType.type)
        : null;

      return (
        <>
          <div className="header">
            <div>
              <h1>Setty Contract Extractor</h1>
              <div className="sub">Surfaces client-imposed override terms · pdf.js · No AI · No data leaves your browser</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div className={`pms-status ${pmsConnected ? "connected" : "disconnected"}`}>
                {pmsConnected ? "● Connected to PMS" : "○ Standalone mode"}
              </div>
              {(() => {
                const isDisabled = !pmsConnected || !result;
                const isSent     = sendState === "sent";
                // Three visual states:
                //   disabled  — gray, no shadow, not clickable
                //   idle      — white background, navy text, primary action
                //   sent      — green background, white text, ✓ confirm in PMS
                // The "sent" state reverts to idle after 8s (see setSendState).
                const bg     = isSent ? "#10B981" : isDisabled ? "rgba(255,255,255,0.15)" : "#fff";
                const fg     = isSent ? "#fff"    : isDisabled ? "rgba(255,255,255,0.55)" : "#1F3864";
                const label  = isSent ? "✓ Sent — check PMS tab"
                              : isDisabled ? "Apply and Save →"
                              : "Apply and Save →";
                const titleText =
                  isSent          ? "Sent to PMS. Switch to the SettyPMS tab — the confirmation modal should be open there. If not, the PMS may have an older cached version (try Ctrl+Shift+R)."
                  : !pmsConnected ? "Open this tool from the SettyPMS Contracts tab to enable Apply and Save."
                  : !result       ? "Drop a contract PDF first."
                  : "Send the extracted data to PMS — confirm there to apply fields and write to OneNote.";
                return (
                  <button
                    onClick={send}
                    disabled={isDisabled || isSent}
                    title={titleText}
                    style={{
                      background: bg,
                      color: fg,
                      border: "none",
                      padding: "8px 18px",
                      borderRadius: 6,
                      fontSize: 13,
                      fontWeight: 700,
                      cursor: (isDisabled || isSent) ? "default" : "pointer",
                      boxShadow: isDisabled ? "none" : (isSent ? "0 2px 12px rgba(16,185,129,0.5)" : "0 2px 8px rgba(0,0,0,0.25)"),
                      transition: "background 0.2s, color 0.2s, box-shadow 0.2s",
                      minWidth: 200,
                    }}
                  >
                    {label}
                  </button>
                );
              })()}
            </div>
          </div>

          <div className="layout">
            {/* LEFT — drop zone */}
            <div className="panel">
              <h2>1. Contract PDF</h2>
              <label className={`dropzone ${dragging ? "dragging" : ""}`}
                     onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
                     onDragLeave={() => setDragging(false)}
                     onDrop={onDrop}>
                <div className="icon">📄</div>
                <p><strong>Drop a contract PDF</strong></p>
                <p>or click to browse</p>
                <input type="file" accept="application/pdf" onChange={(e) => handleFile(e.target.files[0])} />
              </label>
              {file && (
                <div className="file-info">
                  <strong>{file.name}</strong><br/>
                  {(file.size / 1024 / 1024).toFixed(2)} MB
                  {dragSourceUrl && (
                    <div style={{ marginTop: 6, fontSize: 10, color: "#60A5FA", wordBreak: "break-all" }}
                         title="Captured from the drag-and-drop source. Will be included in the OneNote analysis page.">
                      📎 source:<br/>
                      <a href={dragSourceUrl} target="_blank" rel="noreferrer"
                         style={{ color: "#60A5FA", textDecoration: "none" }}>
                        {dragSourceUrl.length > 80 ? dragSourceUrl.slice(0, 77) + "…" : dragSourceUrl}
                      </a>
                    </div>
                  )}
                  {parsing && <div><span className="spinner"></span>Parsing…</div>}
                </div>
              )}
              <h2 style={{marginTop: 20}}>About</h2>
              <p style={{fontSize: 11, color: "#94A3B8", lineHeight: 1.5}}>
                This tool extracts <strong>client-imposed override terms</strong> from contracts issued to Setty —
                pay-when-paid clauses, no-markup rules, conditions precedent, and similar terms that
                supersede Setty's standard proposal. It does <em>not</em> re-extract Setty's own fee proposals.
              </p>
              <p style={{fontSize: 11, color: "#94A3B8", lineHeight: 1.5, marginTop: 10}}>
                Scanned/image-only PDFs are automatically OCR'd in the browser via Tesseract.js —
                no upload, no server, contract stays on your machine. OCR takes 1–3 seconds per page
                after the initial language-data download (~10MB, one time).
              </p>
            </div>

            {/* MIDDLE — flags banner + log */}
            <div className="panel">
              <h2>2. Override Clauses & Extraction Log</h2>
              {parsing && investigation && (
                <div className="investigating">
                  <span className="investigating-emoji" key={investigation.emoji}>{investigation.emoji}</span>
                  <span className="investigating-text" key={investigation.line}>
                    {investigation.line}
                  </span>
                </div>
              )}
              {result && <FlagsBanner flags={result.flags} />}
              {docTypeLabel && (
                <div className={`doc-type ${result.docType.isAIA ? "" : "non-aia"}`}>{docTypeLabel}</div>
              )}
              <div className="log">
                {log.map((row, i) => (
                  <div className="row" key={i}>
                    <span className={row.type}>[{row.type}]</span> {row.msg}
                  </div>
                ))}
                {!log.length && <div className="row info">Drop a contract PDF to begin.</div>}
              </div>
            </div>

            {/* RIGHT — review + send */}
            <div className="panel">
              <h2>3. Review & Send</h2>
              {!result && <p style={{fontSize: 12, color: "#94A3B8"}}>Extracted fields appear here. Review each one before applying — low-confidence values are flagged in red, medium in yellow.</p>}
              {result && (
                <>
                  <h3>Document</h3>
                  <FieldEditor keyName="contractDate" label="Contract Date" field={result.fields.contractDate} onChange={updateField} />
                  <FieldEditor keyName="contractExpiration" label="Contract Expiration" field={result.fields.contractExpiration} onChange={updateField} />
                  <FieldEditor keyName="contractNumber" label="Contract Number" field={result.fields.contractNumber} onChange={updateField} />
                  <FieldEditor keyName="primeProjectNumber" label="Prime's Project Number" field={result.fields.primeProjectNumber} onChange={updateField} />
                  <FieldEditor keyName="client" label="Client / Prime" field={result.fields.client} onChange={updateField} multiline />
                  <FieldEditor keyName="settyRole" label="Setty Role" field={result.fields.settyRole} onChange={updateField} multiline />
                  <FieldEditor keyName="project" label="Project" field={result.fields.project} onChange={updateField} />

                  <h3>Scope of Work</h3>
                  <FieldEditor keyName="scopeOfWork" label="Scope of Work / Services" field={result.fields.scopeOfWork} onChange={updateField} multiline />

                  <h3>Payment Terms</h3>
                  <FieldEditor keyName="payWhenPaid" label="Pay-When-Paid?" field={result.fields.payWhenPaid} onChange={updateField} />
                  <FieldEditor keyName="invoiceReview" label="Invoice Review Window" field={result.fields.invoiceReview} onChange={updateField} />
                  <FieldEditor keyName="interestOnLate" label="Interest on Late Payment" field={result.fields.interestOnLate} onChange={updateField} />
                  <FieldEditor keyName="retainage" label="Retainage / Withholding" field={result.fields.retainage} onChange={updateField} />
                  <FieldEditor keyName="conditionsPrecedent" label="Conditions Precedent" field={result.fields.conditionsPrecedent} onChange={updateField} />
                  <FieldEditor keyName="billingRequirements" label="Billing / Invoice Requirements" field={result.fields.billingRequirements} onChange={updateField} multiline />

                  <h3>Reimbursable Expense Rules</h3>
                  <FieldEditor keyName="multiplier" label="Client Multiplier" field={result.fields.multiplier} onChange={updateField} />
                  <FieldEditor keyName="markupPolicy" label="Markup Policy" field={result.fields.markupPolicy} onChange={updateField} />
                  <FieldEditor keyName="markupExclusions" label="Markup Exclusions" field={result.fields.markupExclusions} onChange={updateField} multiline />
                  <FieldEditor keyName="reimbursableRules" label="Reimbursable Rules (raw)" field={result.fields.reimbursableRules} onChange={updateField} multiline />

                  <h3>Schedule</h3>
                  <FieldEditor keyName="substantialCompletion" label="Substantial Completion" field={result.fields.substantialCompletion} onChange={updateField} />
                  <FieldEditor keyName="scheduleSource" label="Schedule Source" field={result.fields.scheduleSource} onChange={updateField} />
                  <FieldEditor keyName="terminationNotice" label="Termination Notice" field={result.fields.terminationNotice} onChange={updateField} />

                  {!pmsConnected && (
                    <p style={{fontSize: 11, color: "#F87171", marginTop: 16, padding: "8px 12px", background: "#7F1D1D33", borderRadius: 6, border: "1px solid #B91C1C"}}>
                      ⚠ Open this tool from the SettyPMS Contracts tab to enable <strong>Apply and Save</strong>.
                    </p>
                  )}
                </>
              )}
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
