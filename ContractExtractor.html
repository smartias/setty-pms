<!DOCTYPE html>
<!-- Setty Contract Extractor | Standalone tool that integrates with SettyPMS via postMessage.
     Purpose: surface CLIENT-IMPOSED override terms in contracts issued to Setty
     (pay-when-paid, no markup, conditions precedent, etc.) — NOT to re-extract
     Setty's own fee proposal, which is captured at proposal time. -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>Setty Contract Extractor</title>

  <script>
    window.__appVersion = "2026-05-25-extractor-v16";
  </script>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- pdf.js 3.11.174 — last v3 release with reliable UMD `pdfjsLib` global.
       v4+ switched to ES-modules-first and doesn't expose `pdfjsLib` when
       loaded via plain <script src>, only via `type="module"` import. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  </script>

  <!-- Tesseract.js for OCR on scanned/image-only PDFs (e.g., contracts that
       were printed, signed, and re-scanned for storage). pdf.js can only
       extract embedded text; Tesseract reads pixels. Loaded eagerly so it's
       ready when needed, but only invoked when a dropped PDF has no
       extractable text. First OCR run downloads ~10MB English language data. -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #0F172A; color: #E2E8F0;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(90deg, #1F3864, #3B82F6);
      padding: 14px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .header .sub { font-size: 12px; opacity: 0.85; }
    .pms-status {
      font-size: 12px; padding: 4px 10px; border-radius: 12px; background: rgba(255,255,255,0.15);
    }
    .pms-status.connected { background: #15803D; }
    .pms-status.disconnected { background: #B91C1C; }

    .layout {
      display: grid; grid-template-columns: 300px 1fr 400px; gap: 12px;
      padding: 12px; min-height: calc(100vh - 56px);
    }
    .panel {
      background: #1E293B; border: 1px solid #334155; border-radius: 8px;
      padding: 14px; overflow-y: auto;
    }
    .panel h2 {
      margin: 0 0 10px; font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: #94A3B8; border-bottom: 1px solid #334155; padding-bottom: 6px;
    }
    .panel h3 {
      margin: 16px 0 8px; font-size: 12px; font-weight: 700; color: #BFDBFE;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .dropzone {
      display: block;  /* <label> is inline by default — without this, the dashed
                           border fragments at each <p> boundary inside. */
      border: 2px dashed #475569; border-radius: 8px; padding: 20px; text-align: center;
      cursor: pointer; transition: all 0.15s; background: #0F172A;
    }
    .dropzone:hover, .dropzone.dragging { border-color: #3B82F6; background: #1E3A8A33; }
    .dropzone .icon { font-size: 30px; margin-bottom: 6px; }
    .dropzone p { margin: 4px 0; font-size: 12px; color: #94A3B8; }
    .dropzone input { display: none; }

    .file-info { margin-top: 12px; font-size: 11px; color: #94A3B8; }
    .file-info strong { color: #E2E8F0; }

    /* Override flags — the prominent thing the user cares about */
    .flags-banner {
      background: #7F1D1D; border-radius: 6px; padding: 12px; margin-bottom: 12px;
    }
    .flags-banner.empty { background: #14532D; }
    .flags-banner.empty .header-line { color: #BBF7D0; }
    .flags-banner .header-line {
      font-size: 13px; font-weight: 700; color: #FECACA; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .flag {
      background: rgba(0,0,0,0.25); border-radius: 4px; padding: 8px 10px;
      margin-bottom: 6px; font-size: 12px;
    }
    .flag-label { font-weight: 700; color: #FCA5A5; }
    .flag.medium .flag-label { color: #FCD34D; }
    .flag.info .flag-label { color: #93C5FD; }
    .flag-evidence {
      font-size: 11px; color: #CBD5E1; font-style: italic; margin-top: 4px;
      font-family: "Consolas", "Courier New", monospace;
    }
    .flag-loc { font-size: 10px; color: #94A3B8; }

    .log { font-family: "Consolas", "Courier New", monospace; font-size: 11px; line-height: 1.5; }
    .log .row { padding: 2px 0; border-bottom: 1px solid #1E293B; }
    .log .tier { color: #60A5FA; font-weight: 600; }
    .log .hit { color: #4ADE80; }
    .log .miss { color: #F87171; }
    .log .flag { color: #FCD34D; background: transparent; padding: 2px 0; margin: 0; }
    .log .info { color: #94A3B8; }

    .field {
      margin-bottom: 10px; padding: 8px 10px; background: #0F172A; border-radius: 6px;
      border-left: 3px solid #475569;
    }
    .field.conf-high { border-left-color: #22C55E; }
    .field.conf-medium { border-left-color: #EAB308; }
    .field.conf-low { border-left-color: #EF4444; }
    .field.conf-empty { border-left-color: #475569; opacity: 0.65; }
    .field label {
      display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
      color: #94A3B8; margin-bottom: 4px;
    }
    .field input, .field textarea {
      width: 100%; background: #1E293B; color: #E2E8F0; border: 1px solid #334155;
      border-radius: 4px; padding: 5px 7px; font-size: 12px; font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 40px; }
    .field .source { font-size: 10px; color: #64748B; margin-top: 3px; font-style: italic; }
    .field .badge {
      display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 8px;
      margin-left: 6px; font-weight: 700; text-transform: uppercase;
    }
    .badge.high { background: #14532D; color: #BBF7D0; }
    .badge.medium { background: #713F12; color: #FDE68A; }
    .badge.low { background: #7F1D1D; color: #FECACA; }
    .badge.empty { background: #334155; color: #94A3B8; }

    .actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn {
      flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #3B82F6; color: white; }
    .btn-primary:hover { background: #2563EB; }
    .btn-primary:disabled { background: #475569; cursor: not-allowed; }
    .btn-secondary { background: #334155; color: #E2E8F0; }
    .btn-secondary:hover { background: #475569; }

    .doc-type {
      display: inline-block; padding: 4px 10px; border-radius: 12px;
      background: #1E3A8A; color: #BFDBFE; font-size: 11px; font-weight: 600;
      margin-bottom: 10px;
    }
    .doc-type.non-aia { background: #713F12; color: #FDE68A; }
    .doc-type.unknown { background: #475569; color: #CBD5E1; }

    .spinner {
      display: inline-block; width: 12px; height: 12px; border: 2px solid #334155;
      border-top-color: #3B82F6; border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Investigative animation — shown in the middle column while a PDF is
       being parsed/OCR'd/extracted. Big magnifying glass that wiggles like
       it's scanning the page, plus rotating witty captions underneath. */
    .investigating {
      background: linear-gradient(135deg, #1E293BCC 0%, #4338CACC 60%, #7C3AEDCC 100%);
      border: 1px solid #6366F1;
      border-radius: 10px;
      padding: 18px 18px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: 0 4px 18px rgba(99, 102, 241, 0.25);
    }
    .investigating-emoji {
      font-size: 36px; line-height: 1;
      animation: investigate-wiggle 1.7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      display: inline-block; flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.35));
    }
    .investigating-text {
      font-size: 14px; font-weight: 600; color: #E0E7FF;
      flex: 1; line-height: 1.4;
      font-style: italic;
      animation: investigate-fade 0.5s ease-out;
    }
    @keyframes investigate-wiggle {
      0%   { transform: translateX(0)    rotate(0)    scale(1); }
      20%  { transform: translateX(8px)  rotate(-14deg) scale(1.05); }
      40%  { transform: translateX(0)    rotate(0)    scale(1); }
      60%  { transform: translateX(-8px) rotate(14deg)  scale(1.05); }
      80%  { transform: translateX(0)    rotate(0)    scale(1); }
      100% { transform: translateX(0)    rotate(0)    scale(1); }
    }
    @keyframes investigate-fade {
      from { opacity: 0.3; transform: translateY(3px); }
      to   { opacity: 1;   transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    // ════════════════════════════════════════════════════════════════════
    // Investigative quotes — rotated while a contract is being extracted.
    // Plain strings; the emoji shown alongside rotates independently from
    // EMOJI_POOL so we don't have to pair every quote to a specific icon.
    //
    // These are intentionally observational/dry rather than action-verb
    // phrases — the punchline IS the line. Most are MEP/architecture
    // industry-insider jokes; some are AIA-contract-specific.
    // ════════════════════════════════════════════════════════════════════
    const INVESTIGATIVE_QUOTES = [
      "‘Per contract’ is doing a lot of heavy lifting here.",
      "Somewhere an AIA exhibit is quietly contradicting this email.",
      "CA scope: unlimited in spirit, eight site visits in reality.",
      "The architect said ‘minor revision.’ The bulletin is 47 pages.",
      "We regret to inform you the existing conditions were fictional.",
      "Nothing says optimism like a rooftop fully occupied by future equipment.",
      "This RFI appears to be seeking emotional support from the engineer.",
      "‘Design-assist’ is starting to sound a lot like delegated design.",
      "The BIM model is clash-free if you don’t count the actual building.",
      "Contractor to verify dimensions. Contractor did not verify dimensions.",
      "The schedule is aggressive, the fee is lean, and the ceiling space is gone.",
      "Somebody definitely value-engineered the maintenance clearance.",
      "Awaiting utility feedback: the unofficial sixth phase of design.",
      "Every owner wants innovation until the deduct alternate comes back.",
      "There are now more addenda than bid drawings.",
      "This meeting could have been one markup cloud.",
      "Field conditions continue to express themselves creatively.",
      "‘No major comments’ from DOB is the closest thing to love we get.",
      "The mechanical room was apparently designed via escape room logic.",
      "Somewhere in this building is a damper no human can access.",
      "The coordination meeting has entered its natural predator-prey phase.",
      "That duct routing is less ‘engineered’ and more ‘manifested.’",
      "Please see attached: consequences of reducing SD effort.",
      "The phrase ‘simple replacement’ has never once been accurate.",
      "ConEd comments received. Project morale reduced accordingly.",
      "We are now discovering undocumented systems from multiple geological eras.",
      "Architectural ceiling heights remain spiritually ambitious.",
      "‘Reuse existing infrastructure’ is always where the horror begins.",
      "The contractor has interpreted the drawings with confidence.",
      "This substitution request appears to have been inspired by vibes.",
      "Nothing unites a project team like discovering an undersized electrical service.",
      "The commissioning agent has entered the chat.",
      "Every coordination issue is technically solvable with enough soffits.",
      "The roof plan currently resembles an HVAC battle royale.",
      "No one truly owns the shaft until CD.",
      "Another day, another ‘existing condition not shown on drawings.’",
      "The client requested LEED Gold with a Bronze budget.",
      "The phrase ‘basis of design’ is being used very generously.",
      "Somewhere, Appendix G is ruining an architect’s afternoon.",
      "This AHU replacement now includes philosophy, archaeology, and grief.",
      "There is no greater optimism than ‘future tenant by others.’",
      "The owner requested resiliency, sustainability, and no visible equipment.",
      "Setty has reviewed the contractor’s interpretation with concern.",
      "This submittal answers questions no one asked.",
      "AIA contracts: where every sentence costs money later.",
      "The one thing moving faster than the schedule is scope creep.",
      "If the model were accurate, we wouldn’t need site visits.",
      "The coordination drawings have become aspirational art.",
      "‘As discussed in meeting’ — the most dangerous phrase in construction.",
      "The contractor’s means and methods now include hope.",
      "This detail appears to have survived multiple administrations.",
      "Nothing says ‘public project’ like five stakeholders and zero ceiling space.",
      "Somewhere, an engineer is quietly adding an exclusion.",
      "The permit set and the bid set are now estranged cousins.",
      "The existing panel schedule appears to have been written during wartime.",
      "MEP scope now includes diplomacy and forensic investigation.",
      "The equipment fits perfectly in the rendering.",
      "This project contains several hidden boss fights.",
      "A rooftop unit has never once respected an architectural elevation.",
      "The fee proposal was accepted moments before reality emerged.",
      "Every all-electric project eventually reaches the ‘where does the power come from’ phase.",
      "‘Minimal impact to operations’ has entered the risk register.",
      "The ceiling coordination plan is now a cry for help.",
      "One more owner-requested change and this becomes a new project.",
      "Somewhere in New York, a DOB reviewer is sharpening a red pen.",
      "The contractor found a cheaper option and a more expensive problem.",
      "This project was coordinated in the ancient tradition of overlaying PDFs.",
      "We have officially exceeded the structural engineer’s emotional load capacity.",
      "The phrase ‘like-for-like replacement’ is under active investigation.",
      "The plumbing riser diagram and reality are no longer on speaking terms.",
      "A field walk would have prevented this entire email chain.",
      "The model is LOD 300. The expectations are LOD 900.",
      "The client requested a world-class facility with existing infrastructure.",
      "Please hold while the engineers negotiate with physics.",
      "This project has entered the ‘who approved this’ phase.",
      "Nothing motivates coordination like a missing shaft opening.",
      "Setty recommends additional investigation, prayer, and contingency.",
    ];

    // Emoji pool — rotated independently of quotes, keeps the investigative
    // visual identity (magnifier / detective / scrutiny icons) while quotes
    // carry the personality.
    const INVESTIGATIVE_EMOJI = ["🔍","🕵️","🧐","🔎","📋","⚖️","🚩","🧾","💼","🎯","🔬","📐","🗝️","📡","🚨","🪪","📜","🧮"];

    // ========================================================================
    // postMessage integration with SettyPMS
    // ========================================================================
    // Deduplicated with Set — when the extractor is hosted at github.io,
    // window.location.origin === "https://smartias.github.io" and the array
    // would otherwise contain that target twice. The sendToPMS loop posts
    // once per entry, so duplicates → double-delivery → duplicate OneNote
    // pages on the PMS side. Set ensures each effective target gets one
    // postMessage call.
    const PMS_ORIGINS = [...new Set([
      "null",                                  // file:// during local dev
      "https://smartias.github.io",            // GitHub Pages deploy
      "https://settyassociates.sharepoint.com", // if PMS is also served via SharePoint
      window.location.origin,                  // same-origin fallback
    ])];

    function sendToPMS(payload) {
      if (!window.opener) {
        alert("Open this tool from the SettyPMS Contracts tab to enable 'Apply and Save'.");
        return false;
      }
      // Diagnostic: log so the user can verify in DevTools that send happened
      // and what payload went across. No contract data is sent over the network —
      // postMessage stays within the browser.
      console.log("[ContractExtractor] sending to PMS:", { payload, allowedOrigins: PMS_ORIGINS });
      let attempts = 0;
      for (const origin of PMS_ORIGINS) {
        try { window.opener.postMessage({ source: "ContractExtractor", type: "contractData", payload }, origin); attempts++; }
        catch (_) {}
      }
      console.log(`[ContractExtractor] posted to ${attempts}/${PMS_ORIGINS.length} candidate origins`);
      // Bring the PMS window forward so the user sees the modal immediately
      // instead of staring at the extractor window thinking nothing happened.
      try { window.opener.focus(); } catch (_) { /* cross-origin focus may be blocked */ }
      return true;
    }

    // ========================================================================
    // PDF reading (client-side, no upload)
    // ========================================================================
    async function readPdf(file) {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        let text = ""; let lastY = null;
        for (const item of content.items) {
          if (lastY !== null && Math.abs(item.transform[5] - lastY) > 2) text += "\n";
          else if (text && !text.endsWith(" ")) text += " ";
          text += item.str;
          lastY = item.transform[5];
        }
        pages.push(text);
      }
      const fullText = pages.join("\n\n");
      // Scanned PDFs (image-only, no embedded text layer) come in with
      // essentially zero extractable text. Threshold of 500 chars covers
      // edge cases like a stray watermark or page-number while still
      // catching legitimate scanned contracts.
      const isScanned = fullText.length < 500 && pdf.numPages > 0;
      // Return the pdf doc itself so the caller can render pages to canvas
      // for OCR. pdf.js doc has no `close()` so leaking it is fine.
      return { pages, fullText, numPages: pdf.numPages, fileName: file?.name || "", isScanned, pdfDoc: pdf };
    }

    // OCR a pdf.js document by rendering each page to a high-DPI canvas
    // and feeding it to Tesseract.js. Tesseract's logger is wired to
    // onProgress so the UI can show "OCR page 3/13" type updates.
    async function ocrPdfPages(pdfDoc, onProgress) {
      if (typeof Tesseract === "undefined") {
        throw new Error("Tesseract.js failed to load (check your network connection).");
      }
      if (onProgress) onProgress({ stage: "init", msg: "Initializing OCR engine (first run downloads ~10MB language data)…" });
      // scale: 2.0 gives ~150 DPI which is the sweet spot for Tesseract
      // accuracy on contract documents. Higher scales help marginally but
      // slow OCR significantly and use more memory.
      const SCALE = 2.0;
      const worker = await Tesseract.createWorker("eng", 1, {
        logger: (m) => {
          // Throttle: only log status changes, not progress percentage spam.
          if (m.status && m.progress === 0) {
            if (onProgress) onProgress({ stage: m.status });
          }
        },
      });
      const pages = [];
      try {
        for (let i = 1; i <= pdfDoc.numPages; i++) {
          if (onProgress) onProgress({ stage: "render", page: i, total: pdfDoc.numPages });
          const page = await pdfDoc.getPage(i);
          const viewport = page.getViewport({ scale: SCALE });
          const canvas = document.createElement("canvas");
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext("2d");
          await page.render({ canvasContext: ctx, viewport }).promise;

          if (onProgress) onProgress({ stage: "ocr", page: i, total: pdfDoc.numPages });
          const { data } = await worker.recognize(canvas);
          pages.push(data.text || "");

          // Release canvas memory — scanned contracts can have huge pages
          canvas.width = 0; canvas.height = 0;
        }
      } finally {
        // Always terminate worker, even on error, to free its memory
        try { await worker.terminate(); } catch (_) {}
      }
      return pages;
    }

    // ========================================================================
    // OVERRIDE FLAG DETECTION — the heart of this tool
    // ========================================================================
    // Each flag definition has:
    //   - id: stable key
    //   - label: shown to user
    //   - severity: "high" (real cashflow/compliance risk) | "medium" | "info"
    //   - patterns: regex(es) to detect; first match wins
    //   - explanation: what this means for Setty
    //
    // ★ USER CONTRIBUTION POINT ★
    // When you encounter a contract with an override clause we missed, add it here.
    // The patterns are intentionally readable — they're meant to be edited by hand.
    //
    const OVERRIDE_FLAGS = [
      {
        id: "pay-when-paid",
        label: "Pay-when-paid (overrides Setty's Net 30)",
        severity: "high",
        patterns: [
          // Classic AIA phrasings
          /after\s+the\s+(?:Architect|Consultant|Contractor|Prime|prime\s+consultant)\s+(?:is\s+paid|has\s+been\s+paid|has\s+received\s+payment|receives\s+payment)/i,
          /paid\s+by\s+the\s+Owner\s+under\s+the\s+Prime/i,
          /payments?\s+to\s+(?:the\s+)?(?:Consultant|Subconsultant)\s+shall\s+be\s+subject\s+to\s+(?:reduction|withholding)/i,
          /pay[\s\-]when[\s\-]paid/i,
          /in\s+proportion\s+to\s+the\s+amounts\s+received\s+from\s+the\s+Owner/i,
          // ── New phrasings added after user reported misses ──
          // "depends ... upon ... receipt of such amounts from the Owner"
          // Also matches the "dependent" form and tolerates an interrupting
          // parenthetical clause like ", as a condition precedent,"
          /(?:depends?|dependent|contingent)\s*(?:,[^,.]{0,80},)?\s*(?:up)?on\s+(?:the\s+)?(?:Architect|Prime|Consultant|Contractor)\'?s?\s+receipt\s+of\s+(?:such\s+)?(?:amounts|payment|funds)\s+from\s+(?:the\s+)?Owner/i,
          // "payment to the Consultant is dependent ... upon the Architect's receipt of payment"
          // (catches the AIA §11.6.3 variant where "dependent" is used and
          // the parenthetical is "as a condition precedent")
          /payment\s+to\s+(?:the\s+)?(?:Sub)?[Cc]onsultant\s+is\s+dependent[^.]{0,150}?(?:Architect|Prime)\'?s?\s+receipt/i,
          // "obligation to pay ... shall be reduced proportionately"
          /obligation\s+to\s+(?:make\s+(?:any\s+)?payments?|pay)[^.]{0,250}?(?:reduced\s+proportionate|proportionate(?:ly)?\s+reduced)/i,
          // "within a reasonable time after the Architect has received payment"
          /within\s+(?:a\s+)?reasonable\s+time\s+after[^.]{0,200}?(?:Architect|Consultant|Contractor|Prime)\s+(?:has\s+received|receives|is\s+paid)/i,
          // "exercise reasonable care in obtaining payment" — telltale of pay-when-paid
          /exercise\s+(?:reasonable\s+)?(?:care|(?:diligent\s+)?efforts?)\s+(?:in\s+)?(?:obtain(?:ing)?|collect(?:ing)?)\s+(?:prompt\s+)?payment[^.]{0,200}?(?:from\s+(?:the\s+)?Owner|for\s+(?:the\s+)?(?:Sub)?[Cc]onsultant)/i,
          // "if ... receives partial payment ... reduced proportionately"
          /(?:partial|pro[\s\-]?rata)\s+payment[^.]{0,200}?(?:reduced\s+proportionate|in\s+proportion)/i,
          // "Consultant acknowledges the risk of non-payment" — explicit
          // acknowledgement that payment depends on prime getting paid
          /(?:risk\s+of\s+non[\s\-]?payment|non[\s\-]?payment\s+(?:to\s+(?:the\s+)?)?(?:Sub)?[Cc]onsultant\s+by\s+(?:the\s+)?Architect)/i,
        ],
        explanation: "Setty's payment is contingent on the prime/architect being paid by the Owner. This overrides Setty's standard Net 30 terms and can significantly delay cashflow.",
      },
      {
        id: "no-markup",
        label: "No markup on reimbursables",
        severity: "high",
        patterns: [
          /shall\s+not\s+be\s+entitled\s+to\s+any\s+mark[\s\-]?up/i,
          /no\s+mark[\s\-]?up\s+(?:shall|will|on)/i,
          /without\s+(?:any\s+)?mark[\s\-]?up/i,
        ],
        explanation: "Setty cannot apply its standard markup to reimbursable items. Check for excluded categories (often travel, printing, filing fees, expediting).",
      },
      {
        id: "no-interest",
        label: "Interest on late payment waived",
        severity: "high",
        patterns: [
          /no\s+interest\s+shall\s+be\s+(?:paid|payable)/i,
          /interest\s+shall\s+not\s+(?:be\s+)?(?:paid|payable|accrue)/i,
          /waives?\s+(?:any\s+)?(?:right\s+to\s+)?interest/i,
        ],
        explanation: "Setty's standard 1.5%/month interest on late payment is waived. Combined with pay-when-paid, this is a significant financial concession.",
      },
      {
        id: "conditions-precedent",
        label: "Conditions precedent to payment",
        severity: "high",
        patterns: [
          /condition[s]?\s+precedent\s+to\s+payment/i,
          /condition[s]?\s+precedent\s+to\s+such\s+payment/i,

      {

      },
      {
        id: "audit-rights",

        patterns: [

      },
      {

      },
      {
        id: "approval-required",
        label: "Prior written approval requirements",
        severity: "info",
        patterns: [
          /prior\s+written\s+(?:approval|consent)/i,
        ],
        explanation: "Specific actions (staffing changes, subcontracting, additional services) require prior written approval. May slow execution if PM doesn't track.",
      },
      {
        id: "termination-linked",
        label: "Termination linked to Prime Agreement",
        severity: "medium",
        patterns: [
          /If\s+the\s+Prime\s+Agreement\s+is\s+terminated[^.]+terminate\s+this\s+Subcontract/i,
          /termination\s+of\s+the\s+Prime\s+Agreement[^.]+terminate/i,
        ],
        explanation: "If the prime's contract with the owner is terminated, Setty's contract terminates too — potentially without notice or wind-down terms.",
      },

      // ----- Indemnification / Insurance / Risk-allocation flags -----
      // These detect SCOPE-WIDENING language, not the standard AIA mutual indemnity
      // (which is narrow and OK for Setty). The discriminator phrases are:
      //   "to the fullest extent permitted by law" + indemnification language
      //   "defend, indemnify" (duty to defend = broader than just indemnify)
      //   Flow-down to multiple parties ("Owner and all other Indemnitees")
      {
        id: "broad-indemnity",
        label: "Broad indemnification (incl. duty to defend)",
        severity: "high",
        patterns: [
          // "Subconsultant/Consultant shall ... defend, indemnify" — unilateral with duty to defend
          /(?:Sub)?[Cc]onsultant\s+shall[^.]{0,250}?\bdefend\b[,\s]+\s*indemnif/i,
          // "to the fullest extent permitted by law" near indemnification
          /to\s+the\s+fullest\s+extent\s+permitted\s+by\s+law[^.]{0,250}?(?:defend|indemnif|hold\s+harmless)/i,
          // Flow-down: indemnifying "Owner and all other Indemnitees" (named multi-party)
          /indemnif[^.]{0,300}?(?:Owner\s+and\s+all\s+other\s+Indemnitees|all\s+(?:other\s+)?Indemnitees)/i,
        ],
        explanation: "Indemnity is broader than AIA standard — includes duty to defend and/or covers multiple parties (Owner, prime, their agents). Real E&O exposure beyond Setty's negligent acts. Verify with carrier whether scope is insurable; consider negotiating a 'negligence-only' carve-back.",
      },
      {

          /Professional\s+Liability[^$]{0,200}?\$\s*([\d,]+(?:\.\d{2})?)\s*(?:per\s+claim|each|in\s+the\s+aggregate)/i,
