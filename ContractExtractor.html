<!DOCTYPE html>
<!-- Setty Contract Extractor | Standalone tool that integrates with SettyPMS via postMessage.
     Purpose: surface CLIENT-IMPOSED override terms in contracts issued to Setty
     (pay-when-paid, no markup, conditions precedent, etc.) — NOT to re-extract
     Setty's own fee proposal, which is captured at proposal time. -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>Setty Contract Extractor</title>

  <script>
    window.__appVersion = "2026-06-05-extractor-v37-writing-state";
  </script>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- pdf.js 3.11.174 — last v3 release with reliable UMD `pdfjsLib` global.
       v4+ switched to ES-modules-first and doesn't expose `pdfjsLib` when
       loaded via plain <script src>, only via `type="module"` import. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  </script>

  <!-- Tesseract.js for OCR on scanned/image-only PDFs (e.g., contracts that
       were printed, signed, and re-scanned for storage). pdf.js can only
       extract embedded text; Tesseract reads pixels. Loaded eagerly so it's
       ready when needed, but only invoked when a dropped PDF has no
       extractable text. First OCR run downloads ~10MB English language data. -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #0F172A; color: #E2E8F0;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(90deg, #1F3864, #3B82F6);
      padding: 14px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .header .sub { font-size: 12px; opacity: 0.85; }
    .pms-status {
      font-size: 12px; padding: 4px 10px; border-radius: 12px; background: rgba(255,255,255,0.15);
    }
    .pms-status.connected { background: #15803D; }
    .pms-status.disconnected { background: #B91C1C; }

    .layout {
      display: grid; grid-template-columns: 300px 1fr 400px; gap: 12px;
      padding: 12px; min-height: calc(100vh - 56px);
    }
    .panel {
      background: #1E293B; border: 1px solid #334155; border-radius: 8px;
      padding: 14px; overflow-y: auto;
    }
    .panel h2 {
      margin: 0 0 10px; font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: #94A3B8; border-bottom: 1px solid #334155; padding-bottom: 6px;
    }
    .panel h3 {
      margin: 16px 0 8px; font-size: 12px; font-weight: 700; color: #BFDBFE;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .dropzone {
      display: block;  /* <label> is inline by default — without this, the dashed
                           border fragments at each <p> boundary inside. */
      border: 2px dashed #475569; border-radius: 8px; padding: 20px; text-align: center;
      cursor: pointer; transition: all 0.15s; background: #0F172A;
    }
    .dropzone:hover, .dropzone.dragging { border-color: #3B82F6; background: #1E3A8A33; }
    .dropzone .icon { font-size: 30px; margin-bottom: 6px; }
    .dropzone p { margin: 4px 0; font-size: 12px; color: #94A3B8; }
    .dropzone input { display: none; }

    .file-info { margin-top: 12px; font-size: 11px; color: #94A3B8; }
    .file-info strong { color: #E2E8F0; }

    /* Override flags — the prominent thing the user cares about */
    .flags-banner {
      background: #7F1D1D; border-radius: 6px; padding: 12px; margin-bottom: 12px;
    }
    .flags-banner.empty { background: #14532D; }
    .flags-banner.empty .header-line { color: #BBF7D0; }
    .flags-banner .header-line {
      font-size: 13px; font-weight: 700; color: #FECACA; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .flag {
      background: rgba(0,0,0,0.25); border-radius: 4px; padding: 8px 10px;

    }
    .flag-label { font-weight: 700; color: #FCA5A5; }
    .flag.medium .flag-label { color: #FCD34D; }
    .flag.info .flag-label { color: #93C5FD; }

      border-left: 3px solid #475569;
    }

    .field.conf-empty { border-left-color: #475569; opacity: 0.65; }

    }
    .field input, .field textarea {

    .field .badge {
      display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 8px;
      margin-left: 6px; font-weight: 700; text-transform: uppercase;
    }
    .badge.high { background: #14532D; color: #BBF7D0; }
    .badge.medium { background: #713F12; color: #FDE68A; }
    .badge.low { background: #7F1D1D; color: #FECACA; }
    .badge.empty { background: #334155; color: #94A3B8; }

    .actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn {
      flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #3B82F6; color: white; }
    .btn-primary:hover { background: #2563EB; }
    .btn-primary:disabled { background: #475569; cursor: not-allowed; }
    .btn-secondary { background: #334155; color: #E2E8F0; }
    .btn-secondary:hover { background: #475569; }

    .doc-type {
      display: inline-block; padding: 4px 10px; border-radius: 12px;
      background: #1E3A8A; color: #BFDBFE; font-size: 11px; font-weight: 600;
      margin-bottom: 10px;
    }
    .doc-type.non-aia { background: #713F12; color: #FDE68A; }
    .doc-type.unknown { background: #475569; color: #CBD5E1; }

    .spinner {
      display: inline-block; width: 12px; height: 12px; border: 2px solid #334155;
      border-top-color: #3B82F6; border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Investigative animation — shown in the middle column while a PDF is
       being parsed/OCR'd/extracted. Big magnifying glass that wiggles like
       it's scanning the page, plus rotating witty captions underneath. */
    .investigating {
      background: linear-gradient(135deg, #1E293BCC 0%, #4338CACC 60%, #7C3AEDCC 100%);
      border: 1px solid #6366F1;
      border-radius: 10px;
      padding: 18px 18px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: 0 4px 18px rgba(99, 102, 241, 0.25);
    }
    .investigating-emoji {
      font-size: 36px; line-height: 1;
      animation: investigate-wiggle 1.7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      display: inline-block; flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.35));
    }
    .investigating-text {
      font-size: 14px; font-weight: 600; color: #E0E7FF;
      flex: 1; line-height: 1.4;
      font-style: italic;
      animation: investigate-fade 0.5s ease-out;
    }
    @keyframes investigate-wiggle {
      0%   { transform: translateX(0)    rotate(0)    scale(1); }
      20%  { transform: translateX(8px)  rotate(-14deg) scale(1.05); }
      40%  { transform: translateX(0)    rotate(0)    scale(1); }
      60%  { transform: translateX(-8px) rotate(14deg)  scale(1.05); }
      80%  { transform: translateX(0)    rotate(0)    scale(1); }
      100% { transform: translateX(0)    rotate(0)    scale(1); }
    }
    @keyframes investigate-fade {
      from { opacity: 0.3; transform: translateY(3px); }
      to   { opacity: 1;   transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    // ════════════════════════════════════════════════════════════════════
    // Investigative quotes — rotated while a contract is being extracted.
    // Plain strings; the emoji shown alongside rotates independently from
    // EMOJI_POOL so we don't have to pair every quote to a specific icon.
    //
    // These are intentionally observational/dry rather than action-verb
    // phrases — the punchline IS the line. Most are MEP/architecture
    // industry-insider jokes; some are AIA-contract-specific.
    // ════════════════════════════════════════════════════════════════════
    const INVESTIGATIVE_QUOTES = [

      "This RFI appears to be seeking emotional support from the engineer.",

      "Contractor to verify dimensions. Contractor did not verify dimensions.",

      "Somebody definitely value-engineered the maintenance clearance.",
      "Awaiting utility feedback: the unofficial sixth phase of design.",
      "Every owner wants innovation until the deduct alternate comes back.",
      "There are now more addenda than bid drawings.",
      "This meeting could have been one markup cloud.",
      "Field conditions continue to express themselves creatively.",

      "The phrase ‘simple replacement’ has never once been accurate.",

      "‘Reuse existing infrastructure’ is always where the horror begins.",
      "The contractor has interpreted the drawings with confidence.",
      "This substitution request appears to have been inspired by vibes.",
      "Nothing unites a project team like discovering an undersized electrical service.",
      "The commissioning agent has entered the chat.",
      "Every coordination issue is technically solvable with enough soffits.",
      "The roof plan currently resembles an HVAC battle royale.",
      "No one truly owns the shaft until CD.",
      "Another day, another ‘existing condition not shown on drawings.’",
      "The client requested LEED Gold with a Bronze budget.",
      "The phrase ‘basis of design’ is being used very generously.",
      "Somewhere, Appendix G is ruining an architect’s afternoon.",
      "This AHU replacement now includes philosophy, archaeology, and grief.",
      "There is no greater optimism than ‘future tenant by others.’",
      "The owner requested resiliency, sustainability, and no visible equipment.",
      "Setty has reviewed the contractor’s interpretation with concern.",
      "This submittal answers questions no one asked.",
      "AIA contracts: where every sentence costs money later.",
      "The one thing moving faster than the schedule is scope creep.",
      "If the model were accurate, we wouldn’t need site visits.",
      "The coordination drawings have become aspirational art.",
      "‘As discussed in meeting’ — the most dangerous phrase in construction.",
      "The contractor’s means and methods now include hope.",
      "This detail appears to have survived multiple administrations.",
      "Nothing says ‘public project’ like five stakeholders and zero ceiling space.",
      "Somewhere, an engineer is quietly adding an exclusion.",
      "The permit set and the bid set are now estranged cousins.",
      "The existing panel schedule appears to have been written during wartime.",
      "MEP scope now includes diplomacy and forensic investigation.",
      "The equipment fits perfectly in the rendering.",
      "This project contains several hidden boss fights.",
      "A rooftop unit has never once respected an architectural elevation.",
      "The fee proposal was accepted moments before reality emerged.",
      "Every all-electric project eventually reaches the ‘where does the power come from’ phase.",
      "‘Minimal impact to operations’ has entered the risk register.",
      "The ceiling coordination plan is now a cry for help.",
      "One more owner-requested change and this becomes a new project.",
      "Somewhere in New York, a DOB reviewer is sharpening a red pen.",
      "The contractor found a cheaper option and a more expensive problem.",
      "This project was coordinated in the ancient tradition of overlaying PDFs.",
      "We have officially exceeded the structural engineer’s emotional load capacity.",
      "The phrase ‘like-for-like replacement’ is under active investigation.",
      "The plumbing riser diagram and reality are no longer on speaking terms.",
      "A field walk would have prevented this entire email chain.",
      "The model is LOD 300. The expectations are LOD 900.",
      "The client requested a world-class facility with existing infrastructure.",
      "Please hold while the engineers negotiate with physics.",
      "This project has entered the ‘who approved this’ phase.",
      "Nothing motivates coordination like a missing shaft opening.",
      "Setty recommends additional investigation, prayer, and contingency.",
    ];

    // Emoji pool — rotated independently of quotes, keeps the investigative
    // visual identity (magnifier / detective / scrutiny icons) while quotes
    // carry the personality.
    const INVESTIGATIVE_EMOJI = ["🔍","🕵️","🧐","🔎","📋","⚖️","🚩","🧾","💼","🎯","🔬","📐","🗝️","📡","🚨","🪪","📜","🧮"];

    // ════════════════════════════════════════════════════════════════════
    // Writing quotes — rotated while OneNote write is in flight after the
    // user clicks Apply and Save. Same tone as INVESTIGATIVE_QUOTES (dry,
    // observational, Setty-flavored) but written for the "we're talking to
    // Microsoft Graph right now" beat. Typical OneNote write takes 3-15s
    // depending on token cache and Graph API mood.
    // ════════════════════════════════════════════════════════════════════
    const WRITING_QUOTES = [
      "Convincing Microsoft Graph that this contract exists…",
      "Filing your override flags under 'consequential'…",
      "OneNote is thinking about it.",
      "Reticulating contract splines…",
      "Negotiating with SharePoint's API rate limits…",
      "Pushing the boulder of bureaucracy uphill.",
      "Cross-referencing Article 11 with Microsoft's SLA…",
      "Encoding your override findings for posterity…",
      "Persuading the auth token to actually return…",
      "Setting your contract analysis in OneNote stone.",
      "Filing this where future you will actually find it…",
      "Writing to OneNote with all the urgency of a Tuesday.",
      "Crafting a OneNote page worth bookmarking…",
      "The Microsoft auth token has feelings about this.",
      "Conjuring a OneNote page from the ether…",
      "Translating regex hits into Microsoft Graph requests…",
      "Asking the cloud nicely to acknowledge your contract.",
      "Documenting today's pay-when-paid clause for tomorrow's PM.",
      "Routing through Microsoft's preferred number of redirects…",
    ];

    const WRITING_EMOJI = ["📝","💾","📤","☁️","📨","🗂️","🪶","📨","📡","✏️","📋","📎"];

    // ========================================================================
    // postMessage integration with SettyPMS
    // ========================================================================
    // Deduplicated with Set — when the extractor is hosted at github.io,
    // window.location.origin === "https://smartias.github.io" and the array
    // would otherwise contain that target twice. The sendToPMS loop posts
    // once per entry, so duplicates → double-delivery → duplicate OneNote
    // pages (or MSAL interaction_in_progress when the two concurrent token
    // calls collide). Set ensures each effective target gets one postMessage.
    const PMS_ORIGINS = [...new Set([
      "null",                                  // file:// during local dev
      "https://smartias.github.io",            // GitHub Pages deploy
      "https://settyassociates.sharepoint.com", // if PMS is also served via SharePoint
      window.location.origin,                  // same-origin fallback
    ])];

    function sendToPMS(payload) {
      if (!window.opener) {
        alert("Open this tool from the SettyPMS Contracts tab to enable 'Apply and Save'.");
        return false;
      }
      // Diagnostic: log so the user can verify in DevTools that send happened
      // and what payload went across. No contract data is sent over the network —
      // postMessage stays within the browser.
      console.log("[ContractExtractor] sending to PMS:", { payload, allowedOrigins: PMS_ORIGINS });
      let attempts = 0;
      for (const origin of PMS_ORIGINS) {
        try { window.opener.postMessage({ source: "ContractExtractor", type: "contractData", payload }, origin); attempts++; }
        catch (_) {}
      }
      console.log(`[ContractExtractor] posted to ${attempts}/${PMS_ORIGINS.length} candidate origins`);
      // Bring the PMS window forward so the user sees the modal immediately
      // instead of staring at the extractor window thinking nothing happened.
      try { window.opener.focus(); } catch (_) { /* cross-origin focus may be blocked */ }
      return true;
    }

    // ========================================================================
    // PDF reading (client-side, no upload)
    // ========================================================================
    async function readPdf(file) {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        let text = ""; let lastY = null;
        for (const item of content.items) {
          if (lastY !== null && Math.abs(item.transform[5] - lastY) > 2) text += "\n";
          else if (text && !text.endsWith(" ")) text += " ";
          text += item.str;
          lastY = item.transform[5];
        }
        pages.push(text);
      }
      const fullText = pages.join("\n\n");
      // Scanned PDFs (image-only, no embedded text layer) come in with
      // essentially zero extractable text. Threshold of 500 chars covers
      // edge cases like a stray watermark or page-number while still
      // catching legitimate scanned contracts.
      const isScanned = fullText.length < 500 && pdf.numPages > 0;
      // Return the pdf doc itself so the caller can render pages to canvas
      // for OCR. pdf.js doc has no `close()` so leaking it is fine.
      return { pages, fullText, numPages: pdf.numPages, fileName: file?.name || "", isScanned, pdfDoc: pdf };
    }

    // OCR a pdf.js document by rendering each page to a high-DPI canvas
    // and feeding it to Tesseract.js. Tesseract's logger is wired to
    // onProgress so the UI can show "OCR page 3/13" type updates.
    //
    // `pageIndices` (optional): if provided, OCR only those 0-indexed pages.
    // Returns a Map { pageIndex → ocrText } when filtered, or an array of
    // strings (one per page in order) when no filter is given. This lets the
    // mixed-PDF flow OCR just the scanned attachment pages without re-doing
    // the text-bearing pages we already extracted.
    async function ocrPdfPages(pdfDoc, onProgress, pageIndices) {
      if (typeof Tesseract === "undefined") {
        throw new Error("Tesseract.js failed to load (check your network connection).");
      }
      if (onProgress) onProgress({ stage: "init", msg: "Initializing OCR engine (first run downloads ~10MB language data)…" });
      // scale: 2.0 gives ~150 DPI which is the sweet spot for Tesseract
      // accuracy on contract documents. Higher scales help marginally but
      // slow OCR significantly and use more memory.
      const SCALE = 2.0;
      const worker = await Tesseract.createWorker("eng", 1, {
        logger: (m) => {
          // Throttle: only log status changes, not progress percentage spam.
          if (m.status && m.progress === 0) {
            if (onProgress) onProgress({ stage: m.status });
          }
        },
      });
      const filtered = Array.isArray(pageIndices);
      const targets = filtered ? pageIndices.slice() : Array.from({ length: pdfDoc.numPages }, (_, i) => i);
      const resultsByIndex = new Map();
      const orderedResults = [];
      try {
        for (let n = 0; n < targets.length; n++) {
          const idx = targets[n];          // 0-indexed page index
          const pageNo = idx + 1;          // pdf.js uses 1-indexed
          if (onProgress) onProgress({ stage: "render", page: n + 1, total: targets.length, sourcePage: pageNo });
          const page = await pdfDoc.getPage(pageNo);
          const viewport = page.getViewport({ scale: SCALE });
          const canvas = document.createElement("canvas");
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext("2d");
          await page.render({ canvasContext: ctx, viewport }).promise;

          if (onProgress) onProgress({ stage: "ocr", page: n + 1, total: targets.length, sourcePage: pageNo });
          const { data } = await worker.recognize(canvas);
          const txt = data.text || "";
          if (filtered) resultsByIndex.set(idx, txt);
          else orderedResults.push(txt);

          // Release canvas memory — scanned contracts can have huge pages
          canvas.width = 0; canvas.height = 0;
        }
      } finally {
        // Always terminate worker, even on error, to free its memory
        try { await worker.terminate(); } catch (_) {}
      }
      return filtered ? resultsByIndex : orderedResults;
    }

    // ========================================================================
    // OVERRIDE FLAG DETECTION — the heart of this tool
    // ========================================================================
    // Each flag definition has:
    //   - id: stable key
    //   - label: shown to user
    //   - severity: "high" (real cashflow/compliance risk) | "medium" | "info"
    //   - patterns: regex(es) to detect; first match wins
    //   - explanation: what this means for Setty
    //
    // ★ USER CONTRIBUTION POINT ★
    // When you encounter a contract with an override clause we missed, add it here.
    // The patterns are intentionally readable — they're meant to be edited by hand.
    //
    const OVERRIDE_FLAGS = [
      {
        id: "pay-when-paid",
        label: "Pay-when-paid (overrides Setty's Net 30)",
        severity: "high",
        patterns: [
          // Classic AIA phrasings
          /after\s+the\s+(?:Architect|Consultant|Contractor|Prime|prime\s+consultant)\s+(?:is\s+paid|has\s+been\s+paid|has\s+received\s+payment|receives\s+payment)/i,
          /paid\s+by\s+the\s+Owner\s+under\s+the\s+Prime/i,
          /payments?\s+to\s+(?:the\s+)?(?:Consultant|Subconsultant)\s+shall\s+be\s+subject\s+to\s+(?:reduction|withholding)/i,
          /pay[\s\-]when[\s\-]paid/i,
          /in\s+proportion\s+to\s+the\s+amounts\s+received\s+from\s+the\s+Owner/i,
          // ── New phrasings added after user reported misses ──
          // "depends ... upon ... receipt of such amounts from the Owner"
          // Also matches the "dependent" form and tolerates an interrupting
          // parenthetical clause like ", as a condition precedent,"
          /(?:depends?|dependent|contingent)\s*(?:,[^,.]{0,80},)?\s*(?:up)?on\s+(?:the\s+)?(?:Architect|Prime|Consultant|Contractor)\'?s?\s+receipt\s+of\s+(?:such\s+)?(?:amounts|payment|funds)\s+from\s+(?:the\s+)?Owner/i,
          // "payment to the Consultant is dependent ... upon the Architect's receipt of payment"
          // (catches the AIA §11.6.3 variant where "dependent" is used and
          // the parenthetical is "as a condition precedent")
          /payment\s+to\s+(?:the\s+)?(?:Sub)?[Cc]onsultant\s+is\s+dependent[^.]{0,150}?(?:Architect|Prime)\'?s?\s+receipt/i,
          // "obligation to pay ... shall be reduced proportionately"
          /obligation\s+to\s+(?:make\s+(?:any\s+)?payments?|pay)[^.]{0,250}?(?:reduced\s+proportionate|proportionate(?:ly)?\s+reduced)/i,
          // "within a reasonable time after the Architect has received payment"
          /within\s+(?:a\s+)?reasonable\s+time\s+after[^.]{0,200}?(?:Architect|Consultant|Contractor|Prime)\s+(?:has\s+received|receives|is\s+paid)/i,
          // "exercise reasonable care in obtaining payment" — telltale of pay-when-paid
          /exercise\s+(?:reasonable\s+)?(?:care|(?:diligent\s+)?efforts?)\s+(?:in\s+)?(?:obtain(?:ing)?|collect(?:ing)?)\s+(?:prompt\s+)?payment[^.]{0,200}?(?:from\s+(?:the\s+)?Owner|for\s+(?:the\s+)?(?:Sub)?[Cc]onsultant)/i,
          // "if ... receives partial payment ... reduced proportionately"
          /(?:partial|pro[\s\-]?rata)\s+payment[^.]{0,200}?(?:reduced\s+proportionate|in\s+proportion)/i,
          // "Consultant acknowledges the risk of non-payment" — explicit
          // acknowledgement that payment depends on prime getting paid
          /(?:risk\s+of\s+non[\s\-]?payment|non[\s\-]?payment\s+(?:to\s+(?:the\s+)?)?(?:Sub)?[Cc]onsultant\s+by\s+(?:the\s+)?Architect)/i,
          // "the later of ... receipt by [Prime] of payment from the Owner"
          // FXC/NRTC contract item 9 phrasing — the most common subconsultant
          // pay-when-paid construction in non-AIA agreements. Doesn't use the
          // words "depend" or "contingent", just buries it in "due and payable
          // the later of (i) invoice approval, or (ii) receipt of Owner's
          // payment". Party name agnostic (FXC, KSA, prime, architect, etc.).
          /(?:due\s+and\s+payable|payable|made|paid)\s+(?:to\s+\w+\s+)?(?:hereunder\s+)?(?:will|shall)\s+be[^.]{0,120}?the\s+later\s+of[^.]{0,200}?receipt[^.]{0,80}?(?:payment|funds)[^.]{0,80}?(?:from|by)\s+(?:the\s+)?Owner/i,
          // Same construction without "the later of" framing — just
          // "payments...will be made/payable upon/after receipt of Owner's payment"
          /(?:payments?|fees?)\s+(?:to\s+(?:the\s+)?(?:Sub)?[Cc]onsultant\s+)?(?:will|shall)\s+be\s+(?:due\s+(?:and\s+payable\s+)?|made|paid|payable)[^.]{0,120}?(?:upon|after|following)\s+receipt[^.]{0,80}?(?:of\s+(?:such\s+|corresponding\s+)?payment\s+|by\s+\w+\s+of\s+(?:such\s+|corresponding\s+)?payment\s+)from\s+(?:the\s+)?Owner/i,
          // Catch-all: "receipt by [Prime] of [corresponding/such] payment from
          // the Owner" — the defining phrase. Broad enough to catch variants we
          // haven't anticipated, narrow enough that it almost never false-positives
          // in non-pay-when-paid contexts.
          /receipt\s+(?:by\s+\w+(?:\s+\w+){0,3}\s+)?of\s+(?:such\s+|corresponding\s+|the\s+)?payment\s+from\s+(?:the\s+)?Owner/i,

      // ★ ADD MORE FLAGS HERE as you encounter them. Pattern is:
      //   { id, label, severity: "high"|"medium"|"info", patterns: [...], captureValue?, explanation: "..." }
    ];

    // Find the containing "section" of a match — the text between the
    // closest preceding section/article header and the next one. Lets the
    // OneNote page show the full clause context, not just a 200-char snippet.
    // Non-AIA contracts (like the FXC NRTC subconsultant agreement) often
    // don't use §/ARTICLE/SECTION headers — they just number top-level
    // paragraphs "1.", "2.", "3." So we also recognize line-start "N." as
    // a paragraph boundary, where N is 1-3 digits.
    function getContainingSection(text, matchIndex, matchLength, maxLen = 3000) {
      // AIA: §11.6.2, § 4.7, ARTICLE 11, SECTION 6.7, 4.7.2
      // Non-AIA: line-start numeric "9.", "10." (top-level numbered paragraphs)
      const sectionStartRegex = /(?:§\s*\d+\.\d+(?:\.\d+)?|ARTICLE\s+\d+\b|SECTION\s+\d+(?:\.\d+)?\b|(?:^|\n)\s*\d{1,3}\.\s)/g;
      const windowStart = Math.max(0, matchIndex - maxLen);
      const windowEnd   = Math.min(text.length, matchIndex + matchLength + maxLen);
      const window      = text.slice(windowStart, windowEnd);
      const matchInWindow = matchIndex - windowStart;
      let prevBoundary = 0;
      let nextBoundary = window.length;
      sectionStartRegex.lastIndex = 0;
      let m;
      while ((m = sectionStartRegex.exec(window)) !== null) {
        if (m.index <= matchInWindow) {
          prevBoundary = m.index;
        } else if (m.index > matchInWindow + matchLength) {
          nextBoundary = m.index;
          break;
        }
      }
      // If no preceding boundary found at all, fall back to a wider window
      // around the match (so we don't return zero context).
      if (prevBoundary === 0 && nextBoundary === window.length && matchInWindow > 600) {
        prevBoundary = Math.max(0, matchInWindow - 400);
        nextBoundary = Math.min(window.length, matchInWindow + matchLength + 1000);
      }
      let result = window.slice(prevBoundary, nextBoundary).trim();
      // Normalize internal whitespace runs but preserve paragraph breaks for readability
      result = result.replace(/[ \t]+/g, " ").replace(/\n{3,}/g, "\n\n");
      if (result.length > maxLen) result = result.slice(0, maxLen) + "…";
      return result;
    }

    // Build offsets[] where offsets[i] is the start index of page (i+1) inside
    // fullText (which is pages.join("\n\n")). Used to map a regex match index
    // back to its source page so OneNote can show "p. 9" next to each flag.
    function buildPageOffsets(pages) {
      const offsets = [];
      let off = 0;
      for (let i = 0; i < pages.length; i++) {
        offsets.push(off);
        off += (pages[i] || "").length + (i < pages.length - 1 ? 2 : 0); // 2 for "\n\n" separator between pages
      }
      return offsets;
    }

    // Map an index in fullText to a 1-indexed page number. Binary search would
    // be faster but `pages.length` is usually <200, linear is fine.
    function pageOfIndex(idx, offsets) {
      if (!offsets || offsets.length === 0) return null;
      let i = 0;
      while (i < offsets.length - 1 && offsets[i + 1] <= idx) i++;
      return i + 1;
    }

    // Extract the section label from the start of a captured paragraph.
    // Recognizes "9.", "10.2", "Item 9", "Article 11", "Article 11.6.2",
    // "§ 4.7" — whatever the contract calls the section. Returns the
    // canonical label as the contract has it (so the OneNote page mirrors
    // the contract's own numbering, not ours).
    function extractSectionLabel(fullSection) {
      if (!fullSection) return "";
      const head = fullSection.slice(0, 60);
      let m;
      if ((m = head.match(/^\s*(§\s*\d+(?:\.\d+){0,2})/))) return m[1].replace(/\s+/g, " ");
      if ((m = head.match(/^\s*(ARTICLE\s+\d+(?:\.\d+){0,2})/i))) return m[1].replace(/\s+/g, " ");
      if ((m = head.match(/^\s*(SECTION\s+\d+(?:\.\d+){0,2})/i))) return m[1].replace(/\s+/g, " ");
      if ((m = head.match(/^\s*(Item\s+\d+(?:\.\d+){0,2})/i))) return m[1].replace(/\s+/g, " ");
      if ((m = head.match(/^\s*(\d{1,3}(?:\.\d+){0,2})\.\s/))) return "Item " + m[1];
      return "";
    }

    function detectFlags(text, pageOffsets) {
      const flags = [];
      for (const def of OVERRIDE_FLAGS) {
        for (const pattern of def.patterns) {
          const m = text.match(pattern);
          if (m) {
            // Short evidence snippet — for the in-extractor UI display.
            const start = Math.max(0, m.index - 60);
            const end = Math.min(text.length, m.index + m[0].length + 140);
            const evidence = text.slice(start, end).replace(/\s+/g, " ").trim();
            // Full containing section — for the OneNote page and extraction
            // log so reviewers can read the override clause in its full
            // contract context without flipping back to the source PDF.
            const fullSection = getContainingSection(text, m.index, m[0].length);
            flags.push({
              id: def.id,
              label: def.label,
              severity: def.severity,
              evidence: "…" + evidence + "…",
              fullSection,
              sectionLabel: extractSectionLabel(fullSection),
              pageNumber: pageOfIndex(m.index, pageOffsets),
              explanation: def.explanation,
              capturedValue: def.captureValue && m[1] ? m[1] : null,
            });
            break; // first matching pattern wins for this flag
          }
        }
      }
      return flags;
    }

    // ========================================================================
    // STRUCTURED EXTRACTION — payment terms, reimbursable rules, schedule
    // ========================================================================
    function makeField(value, confidence, source) {
      return { value: value || "", confidence: value ? confidence : "empty", source: source || "" };
    }

    // Find a heading and return the chunk of text following it
    function sectionAfter(text, headingRegex, maxChars = 2000) {
      const m = text.match(headingRegex);
      if (!m) return null;
      const start = m.index + m[0].length;
      return text.slice(start, start + maxChars);
    }

    // -- Document type detection --
    function detectDocType(text) {
      const cover = text.slice(0, 3000);
      const m = cover.match(/Document\s+(A\d{3}|B\d{3}|C\d{3})(?:TM|™)?\s*[–—\-]?\s*(\d{4})?/i);
      if (m) return { type: m[1].toUpperCase(), year: m[2] || null, isAIA: true };
      if (/SUBCONTRACT\s+AGREEMENT/i.test(cover)) return { type: "Subcontract Agreement", isAIA: false };
      if (/Master\s+Services\s+Agreement/i.test(cover)) return { type: "Master Services Agreement", isAIA: false };
      if (/PROFESSIONAL\s+SERVICES\s+AGREEMENT/i.test(cover)) return { type: "Professional Services Agreement", isAIA: false };
      return { type: "Unknown contract type", isAIA: false };
    }

    // -- Date parsing --
    const ORDINAL_WORDS = {
      first:1, second:2, third:3, fourth:4, fifth:5, sixth:6, seventh:7, eighth:8, ninth:9,
      tenth:10, eleventh:11, twelfth:12, thirteenth:13, fourteenth:14, fifteenth:15,
      sixteenth:16, seventeenth:17, eighteenth:18, nineteenth:19, twentieth:20,
      "twenty-first":21, "twenty-second":22, "twenty-third":23, "twenty-fourth":24,
      "twenty-fifth":25, "twenty-sixth":26, "twenty-seventh":27, "twenty-eighth":28,
      "twenty-ninth":29, thirtieth:30, "thirty-first":31,
    };
    const MONTHS = {
      january:1, february:2, march:3, april:4, may:5, june:6,
      july:7, august:8, september:9, october:10, november:11, december:12,
    };

    function wordsToYear(s) {
      const t = s.toLowerCase().replace(/[,]/g, "").trim();
      const small = {
        one:1, two:2, three:3, four:4, five:5, six:6, seven:7, eight:8, nine:9, ten:10,
        eleven:11, twelve:12, thirteen:13, fourteen:14, fifteen:15, sixteen:16, seventeen:17,
        eighteen:18, nineteen:19, twenty:20, thirty:30, forty:40, fifty:50, sixty:60,
        seventy:70, eighty:80, ninety:90,
      };
      let m = t.match(/two\s+thousand(?:\s+and)?\s+([a-z\- ]+)/);
      if (m) {
        const rest = m[1].trim();
        if (small[rest] !== undefined) return 2000 + small[rest];
        const parts = rest.split(/[\s-]+/);
        if (parts.length === 2 && small[parts[0]] && small[parts[1]]) return 2000 + small[parts[0]] + small[parts[1]];
        if (parts.length === 1 && small[parts[0]]) return 2000 + small[parts[0]];
      }
      // Numeric year already in the string?
      m = t.match(/\b(20\d{2}|19\d{2})\b/);
      if (m) return parseInt(m[1], 10);
      return null;
    }

    function parseContractDate(text) {
      // AIA word-form: "AGREEMENT made as of the tenth of July in the year Two Thousand Eighteen"
      let m = text.match(/AGREEMENT\s+made\s+as\s+of\s+the\s+([A-Za-z\-]+)\s+of\s+([A-Za-z]+)\s+in\s+the\s+year\s+([A-Za-z\- ]+?)(?:\.|,|BETWEEN|$)/i);
      if (m) {
        const day = ORDINAL_WORDS[m[1].toLowerCase()];
        const month = MONTHS[m[2].toLowerCase()];
        const year = wordsToYear(m[3]);
        if (day && month && year) return { date: `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`, source: "AIA cover 'AGREEMENT made as of'", confidence: "high" };
      }
      // Non-AIA: "as of this 11th day of December, 2023"
      m = text.match(/(?:as\s+of\s+(?:this\s+)?|dated\s+)(\d{1,2})(?:st|nd|rd|th)?\s+day\s+of\s+([A-Za-z]+),?\s+(\d{4})/i);
      if (m) {
        const mo = MONTHS[m[2].toLowerCase()];
        if (mo) return { date: `${m[3]}-${String(mo).padStart(2,"0")}-${String(m[1]).padStart(2,"0")}`, source: "subcontract preamble '__ day of __'", confidence: "high" };
      }
      // Last resort: any date near "Effective Date" or "dated"
      m = text.slice(0, 4000).match(/(?:Effective\s+Date|dated)[\s\S]{0,40}?([A-Za-z]+)\s+(\d{1,2}),?\s+(\d{4})/i);
      if (m) {
        const mo = MONTHS[m[1].toLowerCase()];
        if (mo) return { date: `${m[3]}-${String(mo).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`, source: "generic 'Effective Date' anchor", confidence: "medium" };
      }
      return null;
    }

    // -- Parties --
    // Strip AIA template-hint lines from a captured party block and collapse
    // remaining whitespace. The hint "(Name, legal status, address and other
    // information)" sits directly above the actual party name on AIA cover
    // pages; without this, the captured client field reads as the hint text
    // followed by the actual name with addresses jammed together.
    function cleanPartyBlock(raw) {
      if (!raw) return "";
      const lines = raw.split(/\n/).map((l) => l.trim()).filter(Boolean);
      const kept = [];
      for (const line of lines) {
        if (isAiaTemplateHint(line)) continue;
        kept.push(line);
      }
      // Take the first content line — typically the party name. Subsequent
      // lines are usually address/phone which clutter the field display.
      return (kept[0] || "").replace(/\s+/g, " ").trim();
    }

    function extractParties(text) {
      const cover = text.slice(0, 4000);
      // AIA: "BETWEEN the Consultant's client identified as the Architect: <CLIENT> and the Consultant: <SETTY>"
      let m = cover.match(/BETWEEN[\s\S]{0,80}?:\s*([\s\S]{20,300}?)\s+and\s+the\s+(?:Consultant|Architect|Contractor)[^:]*:\s*([\s\S]{20,300}?)(?=\s+for\s+the\s+following|\s+the\s+Project|\n\s*for\s|ARTICLE)/i);
      if (m) return {
        client: { value: cleanPartyBlock(m[1]), confidence: "high", source: "AIA cover BETWEEN clause" },
        settyRole: { value: cleanPartyBlock(m[2]), confidence: "high", source: "AIA cover BETWEEN clause" },
      };
      // Non-AIA subcontract: "between <PRIME> and <SETTY>"
      m = cover.match(/between\s+([A-Z][A-Za-z &,\.'\-]+?)\s+\(["“]([^"”]+)["”][\s\S]{0,100}?\)\s+and\s+([A-Z][A-Za-z &,\.'\-]+?)\s+\(/);
      if (m) return {
        client: { value: m[1].trim(), confidence: "medium", source: "subcontract preamble 'between ... and'" },
        settyRole: { value: m[3].trim(), confidence: "medium", source: "subcontract preamble 'between ... and'" },
      };
      return {
        client: makeField("", "empty", ""),
        settyRole: makeField("", "empty", ""),
      };
    }

    // -- Project name --
    // Identify AIA template-hint lines so we don't capture them as content.
    // AIA forms include parenthetical instructions inline like:
    //   (Include detailed description of Project, location, address and scope.)
    //   (Name, legal status, address and other information)
    //   (Fully describe the Portion of the Project for which the Consultant…)
    //   (In words, indicate day, month, and year.)
    // The actual filled-in value is on the line AFTER the hint. Skip hints
    // (and pure-parenthetical lines generally) when walking captured content.
    function isAiaTemplateHint(line) {
      if (!line) return true;
      const t = line.trim();
      if (!t) return true;
      // Pure parenthetical starting with a hint verb / placeholder word.
      if (/^\(\s*(?:Include|Insert|Indicate|Name|Fully\s+describe|In\s+words|Describe|If\s+applicable|Identify|List|Clearly|Specify|Enter|State)\b/i.test(t)) return true;
      // Any line that's entirely wrapped in a single parenthetical pair.
      if (/^\([^)]+\)\s*$/.test(t)) return true;
      return false;
    }

    function extractProject(text) {
      const cover = text.slice(0, 4000);
      // AIA "for the following Project:" — capture the lines that follow,
      // skipping AIA template hint parentheticals, and take the first real
      // content line. Without this, we capture the hint itself
      // ("(Include detailed description of Project, location, address and
      // scope.)") which is meaningless.
      let m = cover.match(/(?:for\s+the\s+following\s+)?PROJECT:\s*([\s\S]{5,800}?)(?:\n\s*\n|The\s+Architect\s+and\s+the\s+Consultant\s+agree|ARTICLE\s+\d|Scope\s+of\s+Work\s+as\s+per)/i);
      if (m) {
        const lines = m[1].split(/\n/).map((l) => l.trim()).filter(Boolean);
        for (const line of lines) {
          if (isAiaTemplateHint(line)) continue;
          return makeField(line, "high", "AIA 'PROJECT:' label (first content line after hint)");
        }
      }
      // Non-AIA: "for the performance of certain professional services for the [Project Name] (the "Project")"
      m = cover.match(/professional\s+services\s+for\s+the\s+([A-Z][^.]{5,150}?)\s+\(\s*(?:the\s+)?["“]?Project["”]?/i);
      if (m) return makeField(m[1].trim(), "medium", "subcontract 'professional services for the' clause");
      // First-line title: a lot of subcontracts open with "<PROJECT NAME>"
      const firstLine = (cover.split("\n")[0] || "").trim();
      if (firstLine.length > 8 && firstLine.length < 150 && /[A-Z]/.test(firstLine)) {
        return makeField(firstLine, "low", "first line of document");
      }
      return makeField("", "empty", "");
    }

    // -- Identifiers (numbers + expiration) --
    // Pulls things that map 1:1 to PMS fields and should be auto-applied:
    //   contractNumber, primeProjectNumber, contractExpiration
    // Patterns deliberately favor cover-page anchors (within first ~4000 chars)
    // to avoid false positives from body text that happens to contain "Project No."
    function extractIdentifiers(text, fileName) {
      const out = {};
      const cover = text.slice(0, 4000);

      // Contract Number — "Contract No.: XYZ" / "Agreement Number: ABC-123" /
      // "Contract #: 12345". Allow letters, digits, dashes, dots, slashes; cap
      // length so we don't grab an entire paragraph.
      const cn = cover.match(/(?:Contract|Agreement)\s+(?:Number|No\.?|#)\s*[:\-]?\s*([A-Z0-9][A-Z0-9.\-\/_]{2,40})/i);
      out.contractNumber = cn
        ? makeField(cn[1].trim(), "high", "cover-page 'Contract No.' anchor")
        : makeField("", "empty", "");

      // Prime's Project Number — most contracts label this "Project No." or
      // "Project Number". On a SETTY contract issued BY a prime, this number
      // is the prime's internal job number, not Setty's. Falls back to a
      // leading numeric pattern in the filename if no inline label found.
      let pn = cover.match(/(?:Project|Job)\s+(?:Number|No\.?|#)\s*[:\-]?\s*([A-Z0-9][A-Z0-9.\-\/_]{2,30})/i);
      if (pn) {
        out.primeProjectNumber = makeField(pn[1].trim(), "high", "cover-page 'Project No.' anchor");
      } else if (fileName) {
        // Filenames like "13660001.00A Setty Agreement..." often start with the
        // prime's project number. Conservative pattern: digits + optional .NNX suffix.
        const fnMatch = fileName.match(/^([0-9]{4,}(?:\.[0-9A-Z]{1,4})?)\b/i);
        if (fnMatch) out.primeProjectNumber = makeField(fnMatch[1], "low", "leading token in filename");
        else out.primeProjectNumber = makeField("", "empty", "");
      } else {
        out.primeProjectNumber = makeField("", "empty", "");
      }

      // Contract Expiration — common in master service agreements / term contracts;
      // usually absent in per-project services contracts (B101/C401).
      // Try several patterns, accept ISO/US/word-month dates.
      const expRegexes = [
        /(?:expir(?:es?|ation|ing|y)|terminat(?:es?|ing))\s+(?:on\s+|date\s*[:\-]?\s*)?(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|[A-Z][a-z]+\s+\d{1,2},?\s+\d{4})/i,
        /(?:term|agreement|contract)\s+(?:shall\s+)?(?:end(?:s|ing)?|expir(?:es?|ing)|terminat(?:es?|ing))\s+(?:on\s+)?(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|[A-Z][a-z]+\s+\d{1,2},?\s+\d{4})/i,
        /(?:through|until|effective\s+(?:through|until))\s+(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|[A-Z][a-z]+\s+\d{1,2},?\s+\d{4})/i,
      ];
      let expMatch = null;
      for (const re of expRegexes) {
        const m2 = text.match(re);
        if (m2) { expMatch = m2; break; }
      }
      if (expMatch) {
        // Normalize to YYYY-MM-DD if we can
        const raw = expMatch[1];
        let iso = null;
        const isoTry1 = raw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
        const isoTry2 = raw.match(/^([A-Z][a-z]+)\s+(\d{1,2}),?\s+(\d{4})$/);
        if (isoTry1) {
          let y = isoTry1[3]; if (y.length === 2) y = (parseInt(y,10) > 50 ? "19" : "20") + y;
          iso = `${y}-${isoTry1[1].padStart(2,"0")}-${isoTry1[2].padStart(2,"0")}`;
        } else if (isoTry2) {
          const mo = MONTHS[isoTry2[1].toLowerCase()];
          if (mo) iso = `${isoTry2[3]}-${String(mo).padStart(2,"0")}-${isoTry2[2].padStart(2,"0")}`;
        }
        out.contractExpiration = makeField(iso || raw, iso ? "medium" : "low", "expiration-pattern match");
      } else {
        out.contractExpiration = makeField("", "empty", "");
      }

      return out;
    }

    // -- Payment terms --
    function extractPaymentTerms(text, flags) {
      const out = {};

      // Invoice review window — "within ten days" / "within 10 days"
      const reviewM = text.match(/(?:Architect|Consultant|Owner|Grimshaw|prime)[^\n]{0,80}?within\s+(\w+|\d+)\s+days?[^\n]{0,120}?(?:invoice|billing|payment\s+application)/i)
                  || text.match(/(?:invoice|billing)[^\n]{0,120}?within\s+(\w+|\d+)\s+days?/i);
      if (reviewM) {
        out.invoiceReview = makeField(`Within ${reviewM[1]} days`, "medium", "AIA §11.6 / payment-article review window");
      }

      // Pay-when-paid? Pull straight from the flags result for consistency
      const pwp = flags.find(f => f.id === "pay-when-paid");
      out.payWhenPaid = pwp
        ? makeField("YES — see override flag", "high", pwp.evidence.slice(0, 120))
        : makeField("No / not detected", "medium", "no pay-when-paid language found");

      // Interest on late payment
      const noInt = flags.find(f => f.id === "no-interest");
      if (noInt) {
        out.interestOnLate = makeField("WAIVED (no interest payable)", "high", "client waiver clause");
      } else {
        // Look for standard rate language
        const intM = text.match(/(\d+(?:\.\d+)?%)\s*(?:per\s+month|monthly|annually)[^\n]{0,80}?(?:interest|late|past\s+due)/i)
                  || text.match(/(?:interest|late)[^\n]{0,80}?(\d+(?:\.\d+)?%)\s*(?:per\s+month|monthly|annually)/i);
        if (intM) out.interestOnLate = makeField(intM[1], "medium", "interest rate near 'late payment'");
        else out.interestOnLate = makeField("", "empty", "");
      }

      // Retainage / withholding
      const retM = text.match(/retainage[^\n]{0,80}?(\d+(?:\.\d+)?\s*%|\$[\d,]+)/i)
                || text.match(/retain[^\n]{0,80}?(\d+(?:\.\d+)?\s*%)\s+of/i);
      if (retM) out.retainage = makeField(retM[1].trim(), "medium", "retainage clause");
      else out.retainage = makeField("", "empty", "");

      // Conditions precedent count — just note presence
      const cpFlag = flags.find(f => f.id === "conditions-precedent");
      out.conditionsPrecedent = cpFlag
        ? makeField("YES — review carefully", "high", "see flagged clause(s)")
        : makeField("None detected", "low", "no 'condition precedent' language found");

      return out;
    }

    // -- Reimbursable expense rules --
    function extractReimbursableRules(text, flags) {
      const out = {};

      // Multiplier — pull from flag
      const multFlag = flags.find(f => f.id === "multiplier");
      if (multFlag && multFlag.capturedValue) {
        out.multiplier = makeField(multFlag.capturedValue, "high", "client-imposed multiplier");
      } else {
        out.multiplier = makeField("", "empty", "");
      }

      // markupPolicy field removed per user feedback 2026-06-04: the "Standard
      // markup likely permitted" default was misleading (absence of evidence is
      // not evidence of standard markup). The no-markup FLAG still surfaces in
      // the flag banner when a client prohibition is detected — that's where
      // markup info actually belongs.

      // Reimbursable section body — try a sequence of heading patterns from
      // strictest (AIA §11.5/§11.8) to broadest (non-AIA "Direct Expenses",
      // "Out-of-Pocket Expenses", "Travel & Living"). Each pattern is anchored
      // to heading position (line start + colon/newline) so we don't match the
      // phrase appearing mid-sentence in an exclusion list.
      let body = sectionAfter(text, /§\s*11\.[58]\b[^\n]*REIMBURSABLE/i, 1500)
              || sectionAfter(text, /COMPENSATION\s+FOR\s+REIMBURSABLE\s+EXPENSES/i, 1500)
              || sectionAfter(text, /(?:^|\n)\s*(?:\d+\.\s*)?Reimbursable\s+(?:Expenses|Services|Costs)\b\s*[:.\n]/i, 1500)
              || sectionAfter(text, /(?:^|\n)\s*(?:\d+\.\s*)?(?:Direct|Allowable|Approved)\s+(?:Expenses|Costs)\b\s*[:.\n]/i, 1500)
              || sectionAfter(text, /(?:^|\n)\s*(?:\d+\.\s*)?Out[\s\-]of[\s\-]Pocket\s+(?:Expenses|Costs)\b\s*[:.\n]/i, 1500)
              || sectionAfter(text, /(?:^|\n)\s*(?:\d+\.\s*)?(?:Travel\s+(?:and|&)\s+Living|Travel\s+Expenses?|T&L)\b\s*[:.\n]/i, 1500)
              || sectionAfter(text, /(?:^|\n)\s*(?:\d+\.\s*)?Expense\s+Reimbursement\b\s*[:.\n]/i, 1500);
      // Excluded-by-contract case: parent contract explicitly disclaims the
      // Proposal's reimbursable terms without specifying replacements (FXC
      // NRTC item 1: "...terms related to ... reimbursable expenses, mark ups,
      // ... are excluded"). Worth surfacing as a finding so the reviewer
      // knows reimbursables ARE NOT addressed rather than just "not found".
      const exclMatch = !body && text.match(/terms?\s+(?:related\s+to|of|regarding)[^.]{0,200}?reimbursable\s+expenses?[^.]{0,200}?\bare\s+excluded\b/i);
      if (body) {
        // Trim at next section heading
        const stop = body.search(/§\s*\d+\.\d+\b|ARTICLE\s+\d+|\n\d+\.\d+\.\d+/);
        const snippet = (stop > 50 ? body.slice(0, stop) : body.slice(0, 700)).trim();
        if (/prime\s+agreement|prime\s+master/i.test(snippet)) {
          out.reimbursableRules = makeField("Refers to Prime Agreement — request Prime for full rules.\n\n" + snippet.slice(0, 400), "medium", "AIA §11.5 / non-AIA reimbursable section, defers to Prime");
        } else {
          out.reimbursableRules = makeField(snippet, "medium", "extracted reimbursable-rules block");
        }
      } else if (exclMatch) {
        out.reimbursableRules = makeField("Proposal's reimbursable terms are EXCLUDED by this contract, and no replacement terms are specified. Confirm with PM whether reimbursables are billable at all under this engagement.", "high", "contract excludes Proposal reimbursable terms");
      } else {
        out.reimbursableRules = makeField("", "empty", "");
      }

      // Categories excluded from markup (Grimshaw-style explicit list)
      const exclM = text.match(/not\s+be\s+entitled\s+to\s+any\s+mark[\s\-]?up\s+with\s+respect\s+to([\s\S]{0,400}?)(?:\.\s*\n|\n\s*[A-Z]|Subconsultant)/i);
      if (exclM) {
        out.markupExclusions = makeField(exclM[1].replace(/\s+/g, " ").trim(), "high", "explicit no-markup exclusion list");
      } else {
        out.markupExclusions = makeField("", "empty", "");
      }

      return out;
    }

    // -- Schedule / duration --
    function extractSchedule(text, flags) {
      const out = {};

      // Substantial Completion — appears only in owner/contractor contracts typically
      let m = text.match(/Substantial\s+Completion[^\n]{0,200}?(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|[A-Z][a-z]+\s+\d{1,2},?\s+\d{4})/i);
      if (m) {
        out.substantialCompletion = makeField(m[1], "high", "explicit Substantial Completion date");
      } else if (/Substantial\s+Completion/i.test(text)) {
        out.substantialCompletion = makeField("Mentioned but no explicit date — check schedule exhibit", "low", "term present without date");
      } else {
        out.substantialCompletion = makeField("Not applicable (services contract)", "info", "no Substantial Completion language");
      }

      // Schedule reference — does this contract defer schedule to Prime/Task Order?
      if (/schedules?\s+(?:and\s+timelines\s+)?set\s+forth\s+in\s+the\s+Prime/i.test(text) ||
          /Task\s+Order/i.test(text) ||
          /Prime\s+Agreement/i.test(text) && /schedule/i.test(text)) {
        out.scheduleSource = makeField("Schedule governed by Prime Agreement / Task Order", "high", "client cross-references Prime");
      } else {
        // Look for a standalone duration clause
        m = text.match(/(?:term|duration|period)\s+of\s+(?:this\s+)?(?:Agreement|Subcontract|contract)[^\n]{0,80}?(\d+\s+(?:months?|years?|days?))/i);
        if (m) out.scheduleSource = makeField(m[1], "medium", "explicit duration clause");
        else out.scheduleSource = makeField("", "empty", "");
      }

      // Termination notice
      m = text.match(/(?:terminate|termination)[^\n]{0,200}?(?:upon|with|on)\s+(\w+|\d+)\s+days?\s+(?:written\s+)?notice/i);
      if (m) out.terminationNotice = makeField(`${m[1]} days written notice`, "medium", "termination notice clause");
      else out.terminationNotice = makeField("", "empty", "");

      return out;
    }

    // Find the 1-indexed page where Setty's attached proposal starts, or null
    // if the contract doesn't include one. The proposal is detected by
    // company markers (URL, name patterns, signature header) that wouldn't
    // appear in a client's contract body. This lets us scope flag detection
    // to the CLIENT contract only — without this, our own boilerplate
    // (liquidated-damages disclaimer, consequential-damages waiver, etc.)
    // shows up as flags because the regex doesn't care WHO authored the text.
    function findSettyProposalStart(pages) {
      if (!pages || pages.length === 0) return null;
      const markerPatterns = [
        /\bwww\.SETTY\.com\b/i,
        /\bSETTY\s*&\s*Associates\b/i,
        /\bSETTY['']?s\s+(?:Standard|Professional|services)\b/i,
        /^\s*Professional\s+Services\s+Proposal\s*$/im,
        /Presented\s+By:\s*[\s\S]{0,80}?Setty/i,
        /Mechanical\s*\|\s*Electrical\s*\|\s*Plumbing/i,
        /FPID:\s*ANY\d/i,
      ];
      for (let i = 0; i < pages.length; i++) {
        const t = pages[i] || "";
        let hits = 0;
        for (const re of markerPatterns) if (re.test(t)) hits++;
        // Two markers in one page = high confidence we're in Setty's proposal.
        // One marker alone could be a coincidence (e.g., the client's contract
        // mentions Setty's name); require two so we don't accidentally cut off
        // legitimate client contract pages.
        if (hits >= 2) return i + 1;
      }
      return null;
    }

    // Detect whether the Prime Agreement is actually attached to the PDF.
    // The Prime is the agreement ABOVE this one in the chain — typically
    // Owner-Architect (AIA B-series) or Owner-Contractor (AIA A-series).
    // The contract WE'RE reviewing is the SUBCONSULTANT level (Architect-
    // Consultant in C421, or Consultant-Subconsultant), so its own first
    // page must NOT match these patterns. Earlier version had a loose
    // "AGREEMENT...Between" pattern that matched the C421's own opening
    // ("AGREEMENT made as of [date] BETWEEN the Architect and the
    // Consultant"), giving a false "Prime attached on page 1".
    function findPrimeAgreementStart(pages) {
      if (!pages || pages.length === 0) return null;
      // Strict patterns only — body-text references like "Architect's agreement
      // with the Owner" or "Owner-Architect" mentioned inside an § 1.3 paragraph
      // must NOT trigger. The Prime would be a SEPARATE attached document with
      // its own header. Earlier loose patterns (AGREEMENT...BETWEEN the Owner)
      // matched references in C-series contract bodies → false "attached".
      const headerPatterns = [
        // "PRIME AGREEMENT" as an ALL-CAPS heading. Case-sensitive (no /i flag)
        // because pdf.js inserts a `\n` wherever the PDF's visual line wraps —
        // so the body-text mention "...referred to as the\nPrime Agreement" was
        // matching the line-start anchor when the regex was case-insensitive.
        // Real heading text on a Prime Agreement first page is ALL CAPS in
        // practice (AIA / state-issued / GSA agreements alike); body-text
        // mid-sentence references use title case.
        /^\s*PRIME\s+AGREEMENT\b/m,
        // AIA B-series (Owner-Architect) — B101, B102, B103, B121, etc.
        /\bAIA\s+Document\s+B\d{3}\b/i,
        // AIA A1XX-series ONLY (Owner-Contractor agreements: A101, A102, etc.).
        // A2XX = General Conditions, A3XX = bonds, etc. — NOT prime agreements.
        /\bAIA\s+Document\s+A1\d{2}\b/i,
        // "Standard Form of Agreement Between Owner and Architect/Contractor"
        // — strongest single-line indicator a Prime Agreement starts here.
        /STANDARD\s+FORM\s+OF\s+(?:[A-Za-z\s]+\s+)?AGREEMENT[^.]{0,200}?BETWEEN\s+(?:THE\s+)?OWNER\s+AND\s+(?:THE\s+)?(?:ARCHITECT|CONTRACTOR|DESIGN[\s\-]?PROFESSIONAL|CONSTRUCTION\s+MANAGER)/i,
      ];
      for (let i = 0; i < pages.length; i++) {
        const t = pages[i] || "";
        for (const re of headerPatterns) if (re.test(t)) return i + 1;
      }
      return null;
    }

    // Document outline — table-of-contents for the source PDF. Tells the
    // reviewer where in the contract to look without re-reading: total pages,
    // exhibits and where they start, where the Proposal sits if attached,
    // where the fee is called out, and where the signature block is.
    //
    // `text` is the FULL PDF text (used for outline section discovery — we
    // want to find Setty's proposal as an outline entry).
    // `clientText` is the contract pages BEFORE Setty's attached proposal
    // (used for fee detection so we don't return "$5,000 on p. 18" from
    // Setty's OWN proposed fee inside our attachment).
    function extractDocumentOutline(text, pages, pageOffsets, clientText) {
      const out = {
        numPages: pages.length,
        sections: [],            // [{ kind, ident, label, page, description }]
        proposalAttached: null,  // { asExhibit } or null
        feeLocation: null,       // { page, amount, hint } or null
        signaturePage: null,
      };

      // Sections — EXHIBIT/ATTACHMENT/APPENDIX/SCHEDULE markers.
      // Anchored to line start so we don't pick up the phrase mid-sentence.
      // The identifier regex skips common connector words (OF, THE, AND, FOR,
      // TO) so "SCHEDULE OF VALUES" doesn't capture as kind=SCHEDULE / ident=OF.
      const FILLER_IDENTS = new Set(["OF", "THE", "AND", "FOR", "TO", "BY", "IN", "ON", "AS"]);
      const sectionRe = /(?:^|\n)\s*(EXHIBIT|ATTACHMENT|APPENDIX|SCHEDULE)\s+([A-Z0-9][A-Z0-9\-]{0,4})\b(?:\s+([A-Z][A-Z0-9 \-]{2,40}))?(?:\s*[—\-:]\s*([^\n]{1,80}))?/g;
      const seen = new Set();
      let m;
      while ((m = sectionRe.exec(text)) !== null) {
        const kind  = m[1].toUpperCase();
        let ident   = m[2];
        // If the "ident" looks like a filler word, the next token is actually
        // the section name (e.g., "SCHEDULE OF VALUES" → ident="OF VALUES").
        if (FILLER_IDENTS.has(ident.toUpperCase()) && m[3]) {
          ident = (ident + " " + m[3].trim()).replace(/\s+/g, " ");
        } else if (FILLER_IDENTS.has(ident.toUpperCase())) {
          // Lone filler word with no following name — skip; this is a noise
          // match like "SCHEDULE OF" mid-sentence.
          continue;
        }
        const description = m[4] ? m[4].trim().replace(/[.;,]\s*$/, "") : "";
        const key = kind + " " + ident;
        if (seen.has(key)) continue;
        seen.add(key);
        out.sections.push({
          kind, ident,
          label: key,
          page: pageOfIndex(m.index, pageOffsets),
          description,
        });
      }

      // AIA documents — find each AIA document code (C401, C421, D401, A201,
      // B121, etc.) and record where it appears. The big ones — the master
      // agreement, the service order, certifications, the Prime — surface here.
      // Dedup by CODE (not full label-with-year) so "AIA C421-2018" and a
      // body-text reference to just "AIA C421" don't both show up.
      const aiaCodeSeen = new Set();
      // The trademark mark and the year are INDEPENDENTLY optional. Previous
      // version had them in an alternation (`[™®] | year`), which meant ™
      // consumed the slot and the year never got captured for "C401™ – 2017".
      // "TM" / "SM" handled as a literal too in case the PDF rendered it as
      // ASCII rather than the unicode codepoint.
      // Description stops at the next comma/semicolon/period as well as newline,
      // so titles like "AIA G202-2013 — Project Building Information Modeling
      // Protocol Form" don't slurp the next clause ("...Form, shall be at the
      // using or re...") into the captured description.
      const aiaRe = /AIA\s+Document\s+([A-Z]\s*\d{3,4})\s*(?:[™®]|TM|SM)?\s*(?:[–\-]\s*(\d{4}))?(?:\s*[,;:—\-]\s*([^\n,;.]{1,80}))?/gi;
      while ((m = aiaRe.exec(text)) !== null) {
        const code = m[1].replace(/\s+/g, "");
        if (aiaCodeSeen.has(code)) continue;
        aiaCodeSeen.add(code);
        const year = m[2] || "";
        const description = m[3] ? m[3].trim().replace(/[.;,]\s*$/, "") : "";
        const label = "AIA " + code + (year ? "-" + year : "");
        if (seen.has(label)) continue;
        seen.add(label);
        out.sections.push({
          kind: "AIA",
          ident: code,
          label,
          page: pageOfIndex(m.index, pageOffsets),
          description,
        });
      }

      // Named attachments — quoted document titles in contract bodies like
      //   "'Professional Services Proposal' May 6th 2026"
      //   "'Consultant's Agreement', March 3rd 2026"
      // Many contracts (esp. AIA C421 §16.2 lists) use quoted titles instead
      // of EXHIBIT letters. We grab anything ≤80 chars in single quotes that
      // contains at least one Title-cased word.
      const quotedRe = /[''""]([A-Z][^''""\n]{4,80})[''""]/g;
      while ((m = quotedRe.exec(text)) !== null) {
        const title = m[1].trim();
        // Filter junk: must contain at least 2 title-cased words OR a known
        // attachment keyword. Skip if it looks like a quoted phrase from body
        // text (lowercased after the first word, no capitalization pattern).
        if (!/(?:Proposal|Agreement|Exhibit|Attachment|Schedule|Document|Order|Notes?|Specifications?|Plans?|Drawings?)/i.test(title)) continue;
        const label = title;
        if (seen.has(label)) continue;
        seen.add(label);
        out.sections.push({
          kind: "NAMED",
          ident: title,
          label,
          page: pageOfIndex(m.index, pageOffsets),
          description: "",
        });
      }

      // Sort sections by page so the TOC reads in document order
      out.sections.sort((a, b) => (a.page || 0) - (b.page || 0));

      // Proposal-attached detection. Reads the body for "...proposal...
      // attached hereto as Exhibit X". Tells us Setty's Proposal lives in
      // Exhibit X — that's also typically where the fee is.
      const propM = text.match(/(?:proposal|setty['']?s?\s+proposal)\s*(?:dated[^,\n]{0,40})?[^.]{0,80}?attached\s+(?:hereto\s+)?as\s+(Exhibit\s+[A-Z])/i);
      if (propM) {
        out.proposalAttached = { asExhibit: propM[1].replace(/\s+/g, " ") };
      }

      // Signature block location — first Name/Title pair.
      const sigM = text.match(/Name:\s*[^\n]{1,80}\s*\n?\s*Title:\s*[^\n]{1,80}/i);
      if (sigM) out.signaturePage = pageOfIndex(sigM.index, pageOffsets);

      // Fee location. Run regex against CLIENT contract text only — running
      // against the full PDF picks up Setty's OWN proposed fee from inside
      // our attached proposal (e.g., "$5,000" on p. 18 of the LaBella PDF
      // is from Setty's proposal, not the contract's fee provision).
      //
      // The fallback "compensation" pattern uses a negative lookbehind to
      // exclude "Workers' Compensation" — that's an insurance line, not a
      // fee. Without this exclusion, the BSA contract's §2.8.4 "Workers'
      // Compensation at statutory limits or $500,000" gets picked up as
      // the contract fee.
      const feeSearchText = clientText || text;
      const feeM = feeSearchText.match(/(?:total\s+fee|lump\s+sum(?:\s+fee)?|fixed\s+fee|fee\s+(?:in\s+the\s+amount\s+of|not\s+to\s+exceed|of))[^.\n]{0,150}?(\$[\d,]+(?:\.\d{2})?)/i)
                || feeSearchText.match(/(?<!Workers[‘’‛'`]?\s)(?<!Worker\s)(?:compensation|fee)[^.\n]{0,80}?(\$[\d,]+(?:\.\d{2})?)/i);
      if (feeM) {
        // feeM.index is into feeSearchText. When that's clientText, it's a
        // prefix of fullText so the index also addresses fullText correctly.
        out.feeLocation = { page: pageOfIndex(feeM.index, pageOffsets), amount: feeM[1] };
      } else if (out.proposalAttached) {
        // No fee number in the main contract body — typical when the fee is
        // in the Proposal (Exhibit A) which is often a scanned attachment.
        // Point the reviewer at the Proposal exhibit's page if we have it.
        const expA = out.sections.find((s) => s.label === out.proposalAttached.asExhibit);
        out.feeLocation = {
          page: expA ? expA.page : null,
          hint: `see ${out.proposalAttached.asExhibit} (Setty's Proposal)`,
        };
      }

      return out;
    }

    // Group scanned (text-empty) page numbers into contiguous ranges and
    // label each range with the latest preceding section header. So if pages
    // 12-166 are scanned and EXHIBIT B starts on page 11, the range gets
    // labeled "likely EXHIBIT B and following attachments".
    function groupScannedRanges(scannedPages1Indexed, sections) {
      if (!scannedPages1Indexed || scannedPages1Indexed.length === 0) return [];
      const sorted = [...scannedPages1Indexed].sort((a, b) => a - b);
      const ranges = [];
      let start = sorted[0];
      let prev  = start;
      for (let i = 1; i < sorted.length; i++) {
        if (sorted[i] === prev + 1) { prev = sorted[i]; continue; }
        ranges.push({ start, end: prev });
        start = sorted[i];
        prev  = start;
      }
      ranges.push({ start, end: prev });
      return ranges.map((r) => {
        // Find the section header whose page is closest at-or-before r.start
        let likely = null;
        for (const s of sections || []) {
          if (s.page && s.page <= r.start && (!likely || s.page > likely.page)) likely = s;
        }
        return {
          start: r.start,
          end: r.end,
          likelyContent: likely
            ? likely.label + (likely.description ? ` (${likely.description})` : "")
            : null,
        };
      });
    }

    // Extract signature-block parties. Scans the whole text for "Name: X"
    // followed by "Title: Y" pairs and keeps the ones that look real.
    //
    // Two tricky cases this handles:
    //   1. Parallel signature blocks where Setty's side is blank and the
    //      counterparty's is filled in — the PDF flattens them onto one line
    //      like "Name: ___ Name: Joseph Pikiewicz". We split on the LAST
    //      occurrence of "Name:" / "Title:" inside the capture so we keep
    //      only the populated half.
    //   2. Earlier version only scanned text.slice(text.length * 0.6), which
    //      misses signatures in the front matter when the rest of the PDF is
    //      a scanned attachment (most of FXC NRTC is image-only pages 4-166,
    //      so the sig block at ~46% fell outside the tail window).
    function extractSignatories(text) {
      if (!text) return [];
      const out = [];
      const seen = new Set();
      const re = /Name:\s*([^\n]{1,120}?)\s*(?:\n\s*|\s+)Title:\s*([^\n]{1,120})/gi;
      let m;
      while ((m = re.exec(text)) !== null) {
        // If the capture contains an embedded "Name:" / "Title:" prefix
        // (parallel signature blocks flattened onto one line), keep only
        // what's after the LAST such prefix — that's the populated side.
        let nameRaw  = m[1];
        let titleRaw = m[2];
        const lastN = nameRaw.lastIndexOf("Name:");
        if (lastN >= 0)  nameRaw  = nameRaw.slice(lastN + 5);
        const lastT = titleRaw.lastIndexOf("Title:");
        if (lastT >= 0)  titleRaw = titleRaw.slice(lastT + 6);
        const name  = nameRaw.replace(/_{2,}/g, "").replace(/\s+/g, " ").trim();
        const title = titleRaw.replace(/_{2,}/g, "").replace(/\s+/g, " ").trim();
        // Filter placeholders: empty, no letters, single-letter junk, or
        // implausibly long (>60 chars usually means we caught body text).
        if (!name  || !/[A-Za-z]{2,}/.test(name)  || name.length  > 60) continue;
        if (!title || !/[A-Za-z]{2,}/.test(title) || title.length > 60) continue;
        const key = (name + "|" + title).toLowerCase();
        if (seen.has(key)) continue;
        seen.add(key);
        out.push({ name, title });
      }
      return out;
    }

    // Legal: governing law, venue/jurisdiction, dispute resolution mechanism.
    // These are the three things you always want to find fast when a dispute
    // brews, so they get their own block in the Key Numbers callout.
    function extractLegal(text) {
      const out = {};
      // Governing law: "governed by the laws of the State of X" / "governed by
      // and construed in accordance with the laws of X" / etc.
      let m = text.match(/govern(?:ed)?\s+(?:by\s+(?:and\s+construed\s+(?:in\s+accordance\s+with\s+)?)?)?the\s+laws\s+of\s+(?:the\s+(?:State|Commonwealth|District)\s+of\s+)?([A-Z][A-Za-z][A-Za-z .]+?)(?:[,.\n]|\s+without|\s+excluding|\s+except|\s+excepting|\s+other\s+than)/);
      if (m) out.governingLaw = makeField(m[1].trim(), "high", "governing law clause");
      else out.governingLaw = makeField("", "empty", "");

      // Venue / jurisdiction: "exclusive jurisdiction of the courts of X" /
      // "venue shall lie in X" / "any action … brought in the [federal/state]
      // courts located in X".
      m = text.match(/(?:exclusive\s+)?jurisdiction\s+(?:of\s+(?:the\s+)?courts?\s+(?:of|located\s+in|sitting\s+in)\s+|in\s+the\s+(?:federal\s+|state\s+)?courts?\s+(?:of|located\s+in|sitting\s+in)\s+)([^,.\n]+)/i)
        || text.match(/venue\s+(?:shall|will|must)\s+(?:lie|be)\s+(?:exclusively\s+)?in\s+([^,.\n]+)/i);
      if (m) out.venue = makeField(m[1].trim(), "medium", "venue / jurisdiction clause");
      else out.venue = makeField("", "empty", "");

      // Dispute resolution: mediation vs arbitration vs litigation.
      const hasMediation   = /\bmediation\b/i.test(text);
      const hasArbitration = /\barbitration\b/i.test(text);
      const isBinding      = /\bbinding\s+arbitration\b/i.test(text);
      if (hasMediation && hasArbitration) {
        out.disputeResolution = makeField(
          (isBinding ? "Mediation then binding arbitration" : "Mediation then arbitration"),
          "medium",
          "dispute-resolution clause"
        );
      } else if (hasMediation) {
        out.disputeResolution = makeField("Mediation required", "medium", "mediation-only clause");
      } else if (isBinding) {
        out.disputeResolution = makeField("Binding arbitration", "medium", "arbitration clause");
      } else if (hasArbitration) {
        out.disputeResolution = makeField("Arbitration", "medium", "arbitration clause");
      } else {
        out.disputeResolution = makeField("", "empty", "");
      }

      return out;
    }

    // Presence checks for clauses where ABSENCE is itself worth noting (force
    // majeure, third-party-beneficiary disclaimer, waiver of subrogation).
    // These aren't flags because they're informational — they go in Key Numbers
    // so the reviewer sees "Force majeure: present" or "TPB disclaimer: MISSING".
    function extractPresenceChecks(text) {
      const out = {};
      // Force Majeure — clause typically titled or starting with "Force Majeure"
      // OR containing "act of God / war / pandemic / beyond reasonable control"
      // language. Match either.
      out.forceMajeure = {
        present: /\bForce\s+Majeure\b/i.test(text)
                || /(?:act\s+of\s+God|beyond\s+(?:the\s+)?reasonable\s+control)/i.test(text),
      };
      // Third-party beneficiary disclaimer — explicit "no third party benefit"
      // language. Setty wants this PRESENT.
      out.tpbDisclaimer = {
        present: /(?:no(?:t\s+intended\s+to\s+be)?\s+(?:a\s+)?third[\s\-]party\s+beneficiar)/i.test(text)
                || /(?:nothing\s+(?:in|herein))[^.]{0,80}?(?:create|construed)[^.]{0,120}?(?:right|obligation)[^.]{0,80}?(?:third\s+party|any\s+(?:other\s+)?(?:person|entity))/i.test(text)
                || /(?:no\s+rights?\s+(?:in|are\s+(?:created|conferred))\s+(?:in\s+)?any\s+third\s+part)/i.test(text),
      };
      // Waiver of Subrogation — Setty wants this PRESENT (mutual waiver).
      out.waiverSubrogation = {
        present: /\bwaiv(?:er|e)\s+of\s+subrogation\b/i.test(text)
                || /(?:waiv(?:e|es|ed|ing))[^.]{0,80}?(?:right\s+of\s+)?subrogation/i.test(text),
      };
      return out;
    }

    // ========================================================================

          antiIndemnity:              { status: "void",               note: "§2782/§2782.8: indemnity limited to proportionate fault; cannot waive", statute: "Cal. Civ. Code §2782, §2782.8" },
          dutyToDefend:               { status: "restricted",         note: "Capped at proportionate fault (§2782.8/SB 496); cannot waive" },
          waiverOfSubrogation:        { status: "enforceable_narrow", note: "Enforceable; subject to §1668" },
          statuteOfRepose:            { status: "enforceable",        note: "10 years latent / 4 years patent",            statute: "Cal. Civ. Proc. §337.15, §337.1" },

    // Map various ways a state can appear in extracted text → canonical key.
    // Handles full names, "State of X", "Commonwealth of X", and US 2-letter
    // codes appearing in body text. Returns null if no recognized state.
    function normalizeStateCode(governingLawText) {
      if (!governingLawText) return null;
      const t = governingLawText.trim();
      const nameMap = {
        "virginia": "VA", "commonwealth of virginia": "VA",
        "district of columbia": "DC", "washington dc": "DC", "washington d.c.": "DC", "d.c.": "DC",
        "maryland": "MD",
        "new york": "NY", "state of new york": "NY",
        "georgia": "GA",
        "florida": "FL",
        "california": "CA",
      };
      const norm = t.toLowerCase().replace(/^the\s+/, "").replace(/[.,]+$/, "").trim();
      if (nameMap[norm]) return nameMap[norm];
      // 2-letter code at end of capture (e.g., "New York, NY")
      const codeM = t.match(/\b([A-Z]{2})\b\s*$/);
      if (codeM && STATUTORY_MATRIX[codeM[1]]) return codeM[1];
      // Fuzzy: substring match within longer phrases like "the laws of the State of New York"
      for (const [name, code] of Object.entries(nameMap)) {
        if (norm.includes(name)) return code;
      }
      return null;
    }

    // For a given state code + fired flags, return cross-reference caveats —
    // specific notes linking a fired flag to that state's statute. E.g., if
    // the contract has pay-when-paid AND governing law is NY, surface "NY
    // Prompt Payment Act restricts pay-if-paid" alongside the flag.
    //
    // Returns { state, profile, crossReferences } or null if state unknown.
    function computeStatutoryCaveats(governingLawText, flags) {
      const code = normalizeStateCode(governingLawText);
      if (!code || !STATUTORY_MATRIX[code]) return null;
      const matrix = STATUTORY_MATRIX[code];
      // Map each fired flag id → relevant statutory provision
      const flagToProvision = {
        "pay-when-paid":              "payWhenPaid",
        "broad-indemnification":      "antiIndemnity",
        "consequential-damages":      "consequentialDamagesWaiver",
        "limitation-of-liability-cap":"limitationOfLiability",
        "claims-accrual-discovery":   "statuteOfRepose",
      };
      const crossReferences = [];
      const firedIds = new Set((flags || []).map((f) => f.id));
      for (const [flagId, provKey] of Object.entries(flagToProvision)) {
        if (!firedIds.has(flagId)) continue;
        const prov = matrix.provisions[provKey];
        if (!prov) continue;
        // Only surface where the state restricts/voids — enforceable is not a caveat
        if (prov.status === "enforceable") continue;
        crossReferences.push({
          flagId,
          provisionKey: provKey,
          status: prov.status,
          note: prov.note,
          statute: prov.statute || "",
        });
      }
      return {
        stateCode: code,
        stateName: matrix.name,
        friendly: !!matrix.friendly,
        profile: matrix.provisions,
        crossReferences,
      };
    }

    // ========================================================================
    // Main pipeline
    // ========================================================================
    function extractAll(parsedPdf) {
      const log = [];
      const text = parsedPdf.fullText;
      const pages = parsedPdf.pages || [];
      // Rebuild page offsets from pages here (not in readPdf) so OCR-replaced
      // pages still produce correct page-number mapping.
      const pageOffsets = buildPageOffsets(pages);
      log.push({ type: "info", msg: `PDF parsed: ${parsedPdf.numPages} pages, ${text.length} chars` });
