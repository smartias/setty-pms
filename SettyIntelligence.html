<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Setty — Institutional Intelligence</title>
  <script>
    // Version marker + self-update banner — same pattern as SiteReport.html /
    // SettyFieldPhotos.html so the tab prompts a reload when a new build ships.
    window.__appVersion = "2026-07-15-intel-v24-heatmap-scoring-revision";
    async function _checkForUpdate() {
      try {
        const res = await fetch(location.pathname + "?_v=" + Date.now(),
          { cache: "no-store", headers: { "Cache-Control": "no-cache" } });
        if (!res.ok) return;
        const text = await res.text();
        const match = text.match(/window\.__appVersion\s*=\s*["']([^"']+)["']/);
        const remote = match ? match[1] : null;
        if (remote && remote !== window.__appVersion) _showUpdateBanner(remote);
      } catch (e) { console.warn("[updater]", e.message); }
    }
    function _showUpdateBanner(remote) {
      if (document.getElementById("__updateBanner")) return;
      const banner = document.createElement("div");
      banner.id = "__updateBanner";
      banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(90deg,#1F3864,#3B82F6);color:white;padding:10px 16px;font-family:Segoe UI,Arial,sans-serif;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,0.4);";
      banner.innerHTML = '<span>🔄 New version available (' + remote + '). Reload to update.</span><button id="__updateBtn" style="background:white;color:#1F3864;border:none;border-radius:6px;padding:6px 14px;font-weight:700;font-size:12px;cursor:pointer">Reload now</button>';
      document.body.appendChild(banner);
      document.getElementById("__updateBtn").onclick = () => location.reload();
    }
    window.addEventListener("load", () => {
      setTimeout(_checkForUpdate, 3000);
      setInterval(_checkForUpdate, 10 * 60 * 1000);
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1F3864; --blue: #3B82F6; --bg: #0d1117; --card: #161b22;
      --border: #30363d; --text: #e6edf3; --dim: #94a3b8; --muted: #64748b;
      --green: #10b981; --yellow: #f59e0b; --red: #ef4444; --accent-dim: #1e3a5f;
      --purple: #a78bfa;
    }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 18px 24px 60px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
    h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--dim); margin: 22px 0 10px; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    label { font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 4px; }
    input, select, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: inherit; width: 100%; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); }
    textarea { resize: vertical; }
    button { font-family: inherit; cursor: pointer; }
    .btn { background: var(--accent-dim); color: #60a5fa; border: 1px solid var(--blue); border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 600; }
    .btn:hover { background: #233; }
    .btn-primary { background: var(--blue); color: white; border-color: var(--blue); }
    .btn-primary:hover { background: #2f6fd6; }
    .btn-success { background: #064e3b; color: var(--green); border-color: var(--green); }
    .btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
    .btn-ghost { background: transparent; color: var(--dim); border-color: var(--border); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 12px; }
    .header-user { font-size: 12px; color: var(--dim); }
    .chip { display: inline-flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--dim); cursor: pointer; }
    .chip:hover { border-color: var(--blue); color: var(--text); }
    .pill { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .pill-blue   { background: var(--accent-dim); color: #60a5fa; border: 1px solid var(--blue); }
    .pill-green  { background: #064e3b; color: var(--green); border: 1px solid var(--green); }
    .pill-yellow { background: #451a03; color: var(--yellow); border: 1px solid var(--yellow); }
    .pill-gray   { background: #1f242c; color: var(--dim); border: 1px solid var(--border); }
    .pill-purple { background: #2e1065; color: var(--purple); border: 1px solid var(--purple); }
    .pill-red    { background: #450a0a; color: var(--red); border: 1px solid var(--red); }

    /* Module tab bar */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 18px; flex-wrap: wrap; }
    .tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim); font-size: 13px; font-weight: 600; padding: 10px 14px; margin-bottom: -1px; display: flex; align-items: center; gap: 6px; }
    .tab:hover { color: var(--text); }
    .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .tab .badge { background: var(--border); color: var(--text); border-radius: 10px; font-size: 10px; padding: 1px 7px; font-weight: 700; }
    .tab.active .badge { background: var(--blue); color: #fff; }

    /* Lessons toolbar */
    .toolbar { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; margin-bottom: 16px; }
    .toolbar .field { min-width: 150px; }
    .toolbar .grow { flex: 1; min-width: 220px; }

    /* Lesson card */
    .lesson { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
    .lesson.draft { border-left: 3px solid var(--yellow); }
    .lesson.approved { border-left: 3px solid var(--green); }
    .lesson.archived { border-left: 3px solid var(--muted); opacity: .65; }
    .lesson-top { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .lesson-summary { font-size: 14px; line-height: 1.5; font-weight: 600; color: var(--text); }
    .lesson-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; align-items: center; }
    .lesson-sub { font-size: 12px; color: var(--dim); margin-top: 8px; line-height: 1.5; }
    .lesson-sub b { color: var(--text); font-weight: 600; }
    .lesson-prompt { margin-top: 8px; font-size: 12px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-style: italic; }
    .lesson-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .empty { text-align: center; color: var(--muted); padding: 48px 20px; font-size: 14px; }
    .status { font-size: 12px; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; display: none; }
    .status.info    { background: var(--accent-dim); color: #60a5fa; display: block; }
    .status.error   { background: #450a0a; color: var(--red); display: block; }
    .status.success { background: #064e3b; color: var(--green); display: block; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 200; overflow-y: auto; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px; width: 100%; max-width: 640px; }
    .modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid .full { grid-column: 1 / -1; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
    .fieldset { margin-bottom: 12px; }

    .brief-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .brief-grid .card { margin: 0; }
    .brief-grid h2 { margin-top: 0; }
    .brief-row { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .brief-row:last-child { border-bottom: none; }
    /* Embed mode (inside PMS project Overview iframe): drop chrome & padding. */
    body.embed { padding: 0; background: transparent; }
    body.embed > .header-bar, body.embed > .tabs, body.embed > #modalMount { display: none !important; }
    @media (max-width: 768px) { .brief-grid { grid-template-columns: 1fr; } }
    .roadmap { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
    .roadmap .card { margin: 0; }
    .roadmap h4 { font-size: 14px; margin-bottom: 6px; }
    .roadmap p { font-size: 12px; color: var(--dim); line-height: 1.5; }

    /* Brief section feedback (👍/👎) */
    .fbbtn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 1px 7px; font-size: 12px; color: var(--dim); cursor: pointer; }
    .fbbtn:hover { border-color: var(--blue); }
    .fbbtn.on { border-color: var(--green); background: #064e3b; }
    .fbbtn[disabled] { cursor: default; opacity: .65; }
    .selbox { width: auto !important; margin-top: 4px; accent-color: var(--blue); flex: none; }

    /* Print-friendly brief: light palette, chrome hidden */
    @media print {
      :root { --text: #111; --dim: #444; --muted: #666; --bg: #fff; --card: #fff; --border: #bbb; --accent-dim: #eef2f7; }
      body { background: #fff !important; color: #111; padding: 0; }
      .header-bar, .tabs, .toolbar, .status, .fb, .no-print, #modalMount, .lesson-actions { display: none !important; }
      .card, .lesson { break-inside: avoid; box-shadow: none; }
      a { color: #111; text-decoration: none; }
    }

    @media (max-width: 768px) {
      body { padding: 12px 14px 60px; }
      .form-grid { grid-template-columns: 1fr; }
      input, select, textarea { font-size: 16px; }
      .lesson-top { flex-direction: column; }
      .lesson-actions { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <div>
      <h1>🧠 Institutional Intelligence</h1>
      <div class="header-user">Mined from emails, RFIs, submittals, site reports, meeting minutes &amp; QA comments ·
        <a href="https://smartias.github.io/setty-pms/SettyPMS.html">← Back to PMS</a>
      </div>
    </div>
    <div class="chip" id="userChip" title="Set who you are (used for approvals and lesson authorship)">
      👤 <span id="userName">Set your name</span>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="status" id="status"></div>
  <div id="view"></div>

  <!-- Modal mount -->
  <div id="modalMount"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Config — shared Supabase backend (anon key, same posture as the PMS + the
// SiteReport / FieldPhotos satellite apps). No MSAL here by design: adding a new
// redirect URI to the Azure app registration is a permission change, so this app
// stays anon-only and identifies the user via a locally stored name.
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL  = "https://khxmgjilwhdguuepbhne.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoeG1namlsd2hkZ3V1ZXBiaG5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjg2MDYsImV4cCI6MjA4ODY0NDYwNn0.vtHt2eydU2iQ426iYOzLrqpH2WLXdRnicq-3sNfoNq8";
const SB_HEADERS = { "apikey": SUPABASE_ANON, "Authorization": "Bearer " + SUPABASE_ANON, "Content-Type": "application/json" };

// REST helper. Returns parsed JSON (or null). Throws on non-2xx with a readable
// message, mirroring the PMS's sbFetchV2 contract.
async function sb(method, path, body, prefer) {
  const headers = { ...SB_HEADERS, "Prefer": "return=representation" + (prefer ? "," + prefer : "") };
  const res = await fetch(SUPABASE_URL + path, {
    method, headers, ...(body !== undefined ? { body: JSON.stringify(body) } : {})
  });
  if (!res.ok) throw new Error("Supabase " + method + " " + res.status + ": " + (await res.text()).slice(0, 300));
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

// Controlled vocabularies (kept small and editable in one place).
const DISCIPLINES = ["Mechanical","Electrical","Plumbing","Fire Protection","Structural","Architectural","Civil","Technology/Telecom","Commissioning","General"];
const ISSUE_TYPES  = ["Coordination","Constructability","Design conflict","Code / AHJ","Utility / Service","Schedule","Cost / Estimating","Submittal","RFI","Owner requirement","Other"];
const CONFIDENCE    = ["low","medium","high"];

// The module set — the full Institutional Intelligence vision. Lessons is live;
// the rest are schema-ready (tables exist) and light up in later passes.
const MODULES = [
  { key: "brief",     label: "📥 Project Brief",       table: null,                        idcol: null,          live: true  },
  { key: "heatmap",   label: "🔥 Heat Map",            table: null,                        idcol: null,          live: true  },
  { key: "lessons",   label: "Lessons Learned",       table: "pms_lessons",               idcol: "lesson_id",   live: true  },
  { key: "practices", label: "Best Practices",        table: "pms_best_practices",        idcol: "practice_id", live: false },
  { key: "agencies",  label: "Agency Preferences",    table: "pms_agency_preferences",    idcol: "pref_id",     live: false },
  { key: "standards", label: "Engineering Standards", table: "pms_engineering_standards", idcol: "standard_id", live: false },
  { key: "graph",     label: "Expertise Graph",       table: "pms_person_work",           idcol: null,          live: true  },
  { key: "agents",    label: "Agents",                table: "pms_ii_agent_runs",         idcol: "run_id",      live: false },
];

const state = {
  tab: "brief",
  user: localStorage.getItem("ii_user") || "",
  lessons: [],
  projects: [],
  staff: [],
  counts: {},
  filter: { agency: "", discipline: "", status: "draft", origin: "", q: "" },
  briefNum: localStorage.getItem("ii_briefNum") || "SAPX196006.00",
  brief: null,
  briefLoading: false,
  practices: [],
  practicesLoaded: false,
  practicesLoading: false,
  embed: false,
  loading: true,
  votes: {},                 // per-project 👍/👎 on brief sections (persisted in localStorage)
  selL: new Set(),           // bulk-selected lesson ids
  selP: new Set(),           // bulk-selected practice ids
  graph: { rows: [], loaded: false, loading: false, f: { q: "", discipline: "", agency: "", kind: "", view: "people" } },
  heat: { rows: [], loaded: false, loading: false, f: { agency: "", quiet: false } },
};

// Embed mode: /SettyIntelligence.html?embed=1&project=SAPX...  renders ONLY the
// brief for one project, chrome hidden — used inside the PMS project Overview iframe.
const _params = new URLSearchParams(location.search);
if (_params.get("project")) { state.briefNum = _params.get("project").trim(); state.tab = "brief"; }
if (_params.get("tab") && MODULES.some(m => m.key === _params.get("tab"))) state.tab = _params.get("tab");
if (_params.has("embed")) { state.embed = true; state.tab = "brief"; }

// Deep links: keep ?tab= and ?project= in the URL so any view is a shareable
// link ("can you clear these 5?" → send the lessons-tab URL).
function syncUrl() {
  if (state.embed) return;
  const q = new URLSearchParams();
  if (state.tab !== "brief") q.set("tab", state.tab);
  if (state.briefNum) q.set("project", state.briefNum);
  history.replaceState(null, "", location.pathname + (q.toString() ? "?" + q.toString() : ""));
}

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
// Hrefs built from database rows: esc() keeps them inside the attribute, but a
// javascript: value would still execute — only allow http(s).
const safeUrl = (u) => /^https?:\/\//i.test(String(u == null ? "" : u).trim()) ? String(u).trim() : "";
function toast(msg, kind) { const el = $("status"); el.className = "status " + (kind || "info"); el.textContent = msg; if (kind === "success") setTimeout(() => { el.className = "status"; }, 3500); }

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadAll() {
  // Embed mode renders only the brief inside the PMS Overview iframe — skip the
  // lessons/projects/staff/counts loads entirely; loadBrief() is all it needs.
  if (state.embed) { state.loading = false; render(); return; }
  state.loading = true;
  render();
  try {
    const [lessons, projects, dataRows] = await Promise.all([
      sb("GET", "/rest/v1/pms_lessons?select=*&order=date_added.desc"),
      sb("GET", "/rest/v1/pms_projects?select=num:project->>projectNumber,name:project->>name").catch(() => []),
      sb("GET", "/rest/v1/pms_data?id=eq.singleton&select=staff").catch(() => []),
    ]);
    state.lessons = lessons || [];
    state.projects = (projects || []).map(p => ({ id: p.num, name: p.name || "" })).filter(p => p.id);
    const rawStaff = (dataRows && dataRows[0] && dataRows[0].staff) || [];
    state.staff = rawStaff.map(s => (typeof s === "string" ? s : (s.name || s.fullName || ""))).filter(Boolean);
    await loadCounts();
  } catch (e) {
    toast("Could not load data: " + e.message, "error");
  }
  state.loading = false;
  render();
}

// Row counts for the not-yet-built modules, so their tabs show live numbers and
// prove the database wiring end to end.
async function loadCounts() {
  await Promise.all(MODULES.filter(m => !m.live).map(async m => {
    try {
      const res = await fetch(SUPABASE_URL + "/rest/v1/" + m.table + "?select=" + (m.idcol || "*") + "&limit=1",
        { headers: { ...SB_HEADERS, "Prefer": "count=exact", "Range-Unit": "items", "Range": "0-0" } });
      const cr = res.headers.get("content-range") || "";     // e.g. "0-0/12"
      state.counts[m.key] = cr.includes("/") ? parseInt(cr.split("/")[1], 10) || 0 : 0;
    } catch (_) { state.counts[m.key] = 0; }
  }));
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  $("userName").textContent = state.user || "Set your name";
  renderTabs();
  const v = $("view");
  if (state.loading) { v.innerHTML = '<div class="empty">Loading…</div>'; return; }
  if (state.tab === "brief") return renderBrief();
  if (state.tab === "heatmap") return renderHeatmap();
  if (state.tab === "lessons") return renderLessons();
  if (state.tab === "practices") return renderPractices();
  if (state.tab === "graph") return renderGraph();
  renderPlaceholder(MODULES.find(m => m.key === state.tab));
}

function renderTabs() {
  $("tabs").innerHTML = MODULES.map(m => {
    const count = m.key === "lessons" ? state.lessons.length : (state.counts[m.key] ?? "");
    const badge = count === "" ? "" : `<span class="badge">${count}</span>`;
    return `<button class="tab ${state.tab === m.key ? "active" : ""}" onclick="setTab('${m.key}')">${esc(m.label)} ${badge}</button>`;
  }).join("");
}
function setTab(k) { state.tab = k; syncUrl(); render(); }

// ── Project Brief — the "knowledge arrives" surface ──────────────────────────
// Renders whatever pms_project_brief() assembles for a project. This same panel
// is what embeds into the PMS project Overview so knowledge arrives in context.
function setBriefNum(v) { state.briefNum = (v || "").trim(); localStorage.setItem("ii_briefNum", state.briefNum); state.brief = null; state.briefForNum = null; syncUrl(); render(); }

async function loadBrief(num) {
  // Track which project is in flight so a slow response for a project the user
  // has already navigated away from can't overwrite the newer brief.
  state.briefInflight = num;
  state.briefLoading = true;
  try {
    const j = await sb("POST", "/rest/v1/rpc/pms_project_brief", { p_number: num });
    if (state.briefInflight !== num) return;   // superseded — drop stale response
    state.brief = j || {};
  } catch (e) {
    if (state.briefInflight !== num) return;
    toast("Brief failed: " + e.message, "error"); state.brief = {};
  }
  state.briefInflight = null;
  state.briefForNum = num;
  state.briefLoading = false;
  try { state.votes = JSON.parse(localStorage.getItem("ii_votes_" + num) || "{}"); } catch (_) { state.votes = {}; }
  render();
}

// ── Brief section feedback (👍/👎) ───────────────────────────────────────────
// Each brief section is a relevance hypothesis; votes land in
// pms_ii_brief_feedback and become the tuning signal for the mining pipeline.
// fbHTML(section) → whole-section vote (for single-unit sections like inbox tone).
// fbHTML(section, itemKey, itemText) → per-item vote on one row (lessons,
// practices, owner comments, coordination themes) — the granular signal the
// tag-matching needs ("this specific lesson doesn't belong on this project").
function fbHTML(key, itemKey, itemText) {
  const vkey = itemKey ? key + "::" + itemKey : key;
  const v = state.votes[vkey];
  const btn = (val, icon, tip) =>
    `<button class="fbbtn ${v===val?"on":""}" ${v!=null?"disabled":""} data-k="${esc(key)}" data-i="${esc(itemKey||"")}" data-t="${esc((itemText||"").slice(0,140))}" data-v="${val}" onclick="voteBriefEl(this)" title="${tip}">${icon}</button>`;
  const hiddenNote = (v === -1 && itemKey)
    ? `<span style="font-size:10px;color:var(--muted);white-space:nowrap">✂ off future briefs here</span>` : "";
  return `<span class="fb no-print" style="display:inline-flex;gap:4px;align-items:baseline;vertical-align:middle">${btn(1,"👍","Useful on this project")}${btn(-1,"👎","Not relevant on this project — removes it from this project's future briefs")}${hiddenNote}</span>`;
}
function secTitle(icon, title, key) {
  return `<h2 style="display:flex;align-items:center;gap:8px;margin-top:0"><span>${icon} ${esc(title)}</span><span style="margin-left:auto">${key?fbHTML(key):""}</span></h2>`;
}
async function voteBriefEl(el) {
  const key = el.dataset.k, itemKey = el.dataset.i || null, itemText = el.dataset.t || null;
  const vote = Number(el.dataset.v);
  const vkey = itemKey ? key + "::" + itemKey : key;
  if (state.votes[vkey] != null) return;
  state.votes[vkey] = vote;
  localStorage.setItem("ii_votes_" + state.briefNum, JSON.stringify(state.votes));
  render();
  try {
    await sb("POST", "/rest/v1/pms_ii_brief_feedback",
      { project_id: state.briefNum, section_key: key, item_key: itemKey, item_text: itemText, vote, voter: state.user || null });
    toast("Feedback saved — it tunes what future briefs show.", "success");
  } catch (e) { toast("Feedback not saved: " + e.message, "error"); }
}

function renderBrief() {
  const projOpts = state.projects.map(p => `<option value="${esc(p.id)}">${esc(p.id)} — ${esc(p.name)}</option>`).join("");
  const b = state.brief;
  const ready = state.briefForNum === state.briefNum && b;
  const body = state.briefLoading
    ? '<div class="empty">Assembling the brief…</div>'
    : (ready ? (b.project ? briefBodyHTML(b) : `<div class="empty">No project found for ${esc(state.briefNum)}.</div>`) : "");
  const chrome = state.embed ? "" : `
    <div class="toolbar">
      <div class="grow">
        <label>Project</label>
        <input id="briefNum" list="briefProjList" value="${esc(state.briefNum)}"
          onchange="setBriefNum(this.value)" placeholder="SAPX number"/>
        <datalist id="briefProjList">${projOpts}</datalist>
      </div>
      <button class="btn btn-ghost" onclick="loadBrief(state.briefNum)">↻ Refresh</button>
      <button class="btn btn-ghost" onclick="copyBrief()" title="Copy the whole brief as plain text — paste into a kickoff agenda or email">📋 Copy as text</button>
      <button class="btn btn-ghost" onclick="window.print()" title="Print-friendly view">🖨 Print</button>
    </div>
    <div class="status info" style="display:block;margin-bottom:16px">📥 This is what <b>arrives</b> on the project — assembled from the firm's record, not searched for. In the PMS it renders on the project's Overview.</div>`;
  $("view").innerHTML = `${chrome}<div id="briefBody">${body}</div>`;
  if (state.briefForNum !== state.briefNum && state.briefInflight !== state.briefNum) loadBrief(state.briefNum);
}

// ── Portfolio Heat Map — per-project attention load as packed bubbles ────────
// Data comes from pms_portfolio_heatmap(): one row per active project with its
// 30-day email volume (activity), open/overdue RFIs & submittals, open action
// items, overdue + upcoming milestones, and unresolved scope risks. Bubble AREA
// encodes the weighted score; color encodes tier (never color alone — the label,
// the tooltip and the table below carry the same numbers). All scoring WEIGHTS
// live in heatScore() below — the RPC only supplies counts. On-hold projects are
// deprioritized (score ×0.25, own gray tier, never "hot").
async function loadHeat() {
  state.heat.loading = true;
  try { state.heat.rows = (await sb("POST", "/rest/v1/rpc/pms_portfolio_heatmap", {})) || []; }
  catch (e) { toast("Heat map load failed: " + e.message, "error"); state.heat.rows = []; }
  state.heat.loaded = true; state.heat.loading = false;
  state.counts.heatmap = state.heat.rows.filter(r => heatTier(r) === "hot").length;
  render();
}
// Weighted attention score (revised 7/15 per Sara's feedback):
//  • email VOLUME (30d) = activity signal, capped at 40 so an email storm can't dwarf the rest;
//    the old "awaiting reply" inference was too noisy and no longer scores
//  • RFIs, submittals, action items and milestones (overdue + due ≤30d) are the strong signals
//  • scope risks down-weighted — static analysis, doesn't change over time
//  • On-hold projects: score ×0.25 and never "hot"
const isOnHold = r => /\bon.?hold\b/i.test(r.status || "");
function heatScore(r) {
  const base =
      Math.min(r.emails_30d || 0, 40) * 0.15
    + r.rfis_open + r.rfis_overdue * 2
    + r.subs_open * 0.5 + r.subs_overdue * 1.5
    + (r.actions_open || 0) + (r.actions_overdue || 0)
    + r.ms_overdue * 2 + (r.ms_due_30d || 0)
    + r.risks_high * 1.5 + r.risks_med * 0.75 + r.risks_low * 0.25
    + r.open_requests * 0.5;
  return isOnHold(r) ? base * 0.25 : base;
}
function heatTier(r) {
  if (isOnHold(r)) return "hold";
  if (r.rfis_overdue > 0 || r.subs_overdue > 0 || r.ms_overdue > 0
      || (r.actions_overdue || 0) > 0) return "hot";
  return heatScore(r) >= 1.5 ? "watch" : "quiet";
}
const HEAT_TIER = {
  hot:   { fill: "rgba(239,68,68,.28)",  stroke: "#ef4444", label: "🔴 Hot — RFIs, submittals, action items or milestones overdue" },
  watch: { fill: "rgba(245,158,11,.26)", stroke: "#f59e0b", label: "🟡 Watch — active work, nothing overdue" },
  quiet: { fill: "rgba(100,116,139,.18)",stroke: "#64748b", label: "⚪ Quiet — little activity, no open items" },
  hold:  { fill: "rgba(100,116,139,.10)",stroke: "#475569", label: "⏸ On hold — deprioritized" },
};
// Short display handle for inside a bubble: strip the SAPX prefix, keep the tail.
const heatTag = num => String(num || "").replace(/^SAPX/i, "");
// Greedy circle packing: biggest first at the center, then spiral outward until
// a non-overlapping spot is found. ~90 bubbles → trivial cost, no library needed.
function packBubbles(items) {
  const placed = [];
  const collides = (x, y, r) => placed.some(p => { const dx = p.x - x, dy = p.y - y; return dx*dx + dy*dy < (p.r + r + 3) * (p.r + r + 3); });
  items.forEach((it, i) => {
    if (!placed.length) { placed.push({ ...it, x: 0, y: 0 }); return; }
    // Deterministic per-index start angle spreads bubbles around the center.
    const a0 = i * 2.399963;   // golden angle
    for (let d = 4; ; d += 4) {
      let done = false;
      for (let k = 0; k < 24; k++) {
        const a = a0 + (k / 24) * Math.PI * 2;
        const x = Math.cos(a) * d, y = Math.sin(a) * d;
        if (!collides(x, y, it.r)) { placed.push({ ...it, x, y }); done = true; break; }
      }
      if (done) break;
    }
  });
  return placed;
}

function heatTipHTML(r) {
  const line = (icon, txt) => `<div style="margin-top:3px">${icon} ${txt}</div>`;
  const L = [];
  if (isOnHold(r)) L.push(line("⏸", `<span style="color:var(--muted)">on hold — deprioritized (score ×0.25)</span>`));
  if (r.emails_30d) L.push(line("📨", `<b>${r.emails_30d}</b> email${r.emails_30d===1?"":"s"} in the last 30 days`));
  if (r.rfis_open) L.push(line("❓", `<b>${r.rfis_open}</b> open RFI${r.rfis_open===1?"":"s"}${r.rfis_overdue ? ` · <span style="color:var(--red)">${r.rfis_overdue} overdue</span>` : ""}`));
  if (r.subs_open) L.push(line("📦", `<b>${r.subs_open}</b> open submittal${r.subs_open===1?"":"s"}${r.subs_overdue ? ` · <span style="color:var(--red)">${r.subs_overdue} overdue</span>` : ""}`));
  if (r.actions_open) L.push(line("✅", `<b>${r.actions_open}</b> open action item${r.actions_open===1?"":"s"}${r.actions_overdue ? ` · <span style="color:var(--red)">${r.actions_overdue} overdue</span>` : ""}`));
  if (r.ms_overdue) L.push(line("🗓", `<span style="color:var(--red)"><b>${r.ms_overdue}</b> milestone${r.ms_overdue===1?"":"s"} past due</span>`));
  if (r.ms_due_30d) L.push(line("🗓", `<b>${r.ms_due_30d}</b> milestone${r.ms_due_30d===1?"":"s"} due in the next 30 days`));
  if (r.next_due) L.push(line("→", `next milestone ${esc(r.next_due)}`));
  const risks = r.risks_high + r.risks_med + r.risks_low;
  if (risks) L.push(line("⚠️", `<b>${risks}</b> scope risk${risks===1?"":"s"}${r.risks_high ? ` · <span style="color:var(--red)">${r.risks_high} high</span>` : ""}`));
  if (r.open_requests) L.push(line("📋", `<b>${r.open_requests}</b> open request${r.open_requests===1?"":"s"} from minutes`));
  return `<div style="font-weight:700">${esc(r.name || r.num)}</div>
    <div style="color:var(--muted);font-size:11px;margin-bottom:2px">${esc(r.num)}${r.agency ? " · " + esc(r.agency) : ""} · score ${Math.round(heatScore(r)*10)/10}</div>
    ${L.join("") || '<div style="color:var(--muted)">No open issue signals.</div>'}
    <div style="color:var(--muted);font-size:11px;margin-top:6px">Click to open the project brief →</div>`;
}
function wireHeatmap() {
  const tip = $("hmTip"), svgEl = $("hmSvg");
  const byNum = {}; state.heat.rows.forEach(r => byNum[r.num] = r);
  const open = num => { setBriefNum(num); setTab("brief"); };
  if (svgEl) {
    const box = svgEl.parentElement;
    svgEl.querySelectorAll(".hm-b").forEach(g => {
      const r = byNum[g.dataset.num]; if (!r) return;
      g.addEventListener("click", () => open(r.num));
      g.addEventListener("mouseenter", () => { tip.innerHTML = heatTipHTML(r); tip.style.display = "block"; });
      g.addEventListener("mousemove", e => {
        const b = box.getBoundingClientRect();
        const x = Math.min(e.clientX - b.left + 14, b.width - 290);
        tip.style.left = Math.max(6, x) + "px"; tip.style.top = (e.clientY - b.top + 14) + "px";
      });
      g.addEventListener("mouseleave", () => { tip.style.display = "none"; });
    });
  }
  document.querySelectorAll(".hm-tr").forEach(tr => tr.addEventListener("click", () => open(tr.dataset.num)));
}

async function loadPractices() {
  state.practicesLoading = true;
  try { state.practices = (await sb("GET", "/rest/v1/pms_best_practices?select=*&order=date_added.desc")) || []; }
  catch (e) { toast("Load failed: " + e.message, "error"); state.practices = []; }
  state.practicesLoaded = true; state.practicesLoading = false; render();
}
// Organized like the Lessons module — search + discipline/theme/type/status filters
// and a review-count note.
function practicesFiltered() {
  const f = state.pfilter || (state.pfilter = {});
  return (state.practices || []).filter(p => {
    if (f.discipline && (p.discipline || "") !== f.discipline) return false;
    if (f.theme && (p.coord_theme || "") !== f.theme) return false;
    if (f.status && (p.status || "") !== f.status) return false;
    if (f.type === "workflow" && p.issue_type !== "workflow") return false;
    if (f.type === "design" && p.issue_type === "workflow") return false;
    if (f.q) {
      const hay = [p.title, p.practice_text, p.coord_theme, p.system, p.issue_type].join(" ").toLowerCase();
      if (!hay.includes(f.q.toLowerCase())) return false;
    }
    return true;
  });
}
function renderPractices() {

// ── Bulk review actions (lessons + practices share the same machinery) ───────
function toggleSel(kind, id, checked) {
  const set = kind === "L" ? state.selL : state.selP;
  checked ? set.add(id) : set.delete(id);
  // Update only the bulk bar — re-rendering the list on every click would
  // rebuild the DOM under the user (scroll jump, lost checkbox focus).
  const bar = $(kind === "L" ? "bulkBarL" : "bulkBarP");
  if (bar) bar.innerHTML = bulkBar(kind);
}
function clearSel(kind) {
  (kind === "L" ? state.selL : state.selP).clear();
  kind === "L" ? renderLessonList() : renderPracticeList();
}
function bulkBar(kind) {
  const set = kind === "L" ? state.selL : state.selP;
  if (!set.size) return "";
  return `<div class="status info" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px">

    <button class="btn btn-success btn-sm" onclick="bulkStatus('${kind}','approved')">✓ Approve selected</button>
    <button class="btn btn-ghost btn-sm" onclick="bulkStatus('${kind}','archived')">✕ Reject selected</button>
    <button class="btn btn-ghost btn-sm" onclick="clearSel('${kind}')">Clear</button>
  </div>`;
}
async function bulkStatus(kind, status) {
  const isL = kind === "L";
  const set = isL ? state.selL : state.selP;
  if (!set.size) return;
  if (status === "approved" && !state.user) { openNameModal(() => bulkStatus(kind, status)); return; }
  const table = isL ? "pms_lessons" : "pms_best_practices";
  const idcol = isL ? "lesson_id" : "practice_id";
  const payload = { status, updated_at: new Date().toISOString() };
  if (status === "approved" && isL) payload.approved_by = state.user;
  try {
    await sb("PATCH", `/rest/v1/${table}?${idcol}=in.(${[...set].join(",")})`, payload);
    toast(`${set.size} ${isL ? "lesson" : "practice"}${set.size === 1 ? "" : "s"} ${status === "approved" ? "approved" : "rejected"}.`, "success");
    set.clear();
    if (isL) await reloadLessons(); else await loadPractices();

async function setPracticeStatus(id, status) {

// ── Expertise Graph — who has done what, mined from authored work ────────────
// Rows come from pms_person_work: every RFI answer, submittal review response,
// and approved lesson that carries a Setty person's name. No forms — the graph
// is built from what people actually answered.
async function loadGraph() {
  state.graph.loading = true;
  try {
    // PostgREST caps responses at 1000 rows — page until a short page arrives.
    const all = [];
    for (let off = 0; off < 20000; off += 1000) {
      const page = (await sb("GET",
        `/rest/v1/pms_person_work?select=person,kind,discipline,system,agency,project_number,project_name,subject,work_date&order=id&limit=1000&offset=${off}`)) || [];
      all.push(...page);
      if (page.length < 1000) break;
    }
    state.graph.rows = all;
  } catch (e) { toast("Graph load failed: " + e.message, "error"); state.graph.rows = []; }
  state.graph.loaded = true; state.graph.loading = false;
  render();
}
function renderGraph() {
  const g = state.graph;
  if (!g.loaded && !g.loading) loadGraph();
  const rows = g.rows;
  const distinct = (k) => [...new Set(rows.map(r => r[k]).filter(Boolean))].sort();
  const opt = (arr, sel) => arr.map(a => `<option value="${esc(a)}" ${a===sel?"selected":""}>${esc(a)}</option>`).join("");
  $("view").innerHTML = `
    <div class="status info" style="display:block;margin-bottom:14px">🧠 Built from <b>${rows.length}</b> authored work items — RFI answers, submittal reviews and approved lessons. Use <b>Go-to directory</b> to answer "who do I put on this?": pick the system or agency and it names the people with the deepest real track record.</div>
    <div class="toolbar">
      <div class="field"><label>View</label>
        <select onchange="state.graph.f.view=this.value; renderGraphList()">
          <option value="people" ${g.f.view==="people"?"selected":""}>👤 People</option>
          <option value="system" ${g.f.view==="system"?"selected":""}>🎯 Go-to directory — by system</option>
          <option value="agency" ${g.f.view==="agency"?"selected":""}>🏛️ Go-to directory — by agency</option>
        </select></div>
      <div class="grow">
        <label>Search (system, spec section, subject, person)</label>
        <input placeholder="e.g. chilled water, 232113, geothermal…" value="${esc(g.f.q)}" oninput="state.graph.f.q=this.value; renderGraphList()"/>
      </div>
      <div class="field"><label>Discipline</label>
        <select onchange="state.graph.f.discipline=this.value; renderGraphList()"><option value="">All</option>${opt(distinct("discipline"), g.f.discipline)}</select></div>
      <div class="field"><label>Agency</label>
        <select onchange="state.graph.f.agency=this.value; renderGraphList()"><option value="">All</option>${opt(distinct("agency"), g.f.agency)}</select></div>
      <div class="field"><label>Source</label>
        <select onchange="state.graph.f.kind=this.value; renderGraphList()">
          <option value="">All</option>
          <option value="rfi" ${g.f.kind==="rfi"?"selected":""}>RFI answers</option>
          <option value="submittal" ${g.f.kind==="submittal"?"selected":""}>Submittal reviews</option>
          <option value="lesson" ${g.f.kind==="lesson"?"selected":""}>Lessons</option>
        </select></div>
    </div>
    <div id="graphList"></div>`;
  renderGraphList();
}
function renderGraphList() {
  const el = $("graphList"); if (!el) return;
  if (state.graph.loading) { el.innerHTML = '<div class="empty">Loading…</div>'; return; }
  const f = state.graph.f, q = (f.q || "").toLowerCase();
  const rows = state.graph.rows.filter(r =>
    (!f.discipline || (r.discipline||"").includes(f.discipline)) &&
    (!f.agency || r.agency === f.agency) &&
    (!f.kind || r.kind === f.kind) &&
    (!q || [r.system, r.subject, r.person, r.project_name, r.discipline].join(" ").toLowerCase().includes(q)));
  if (!rows.length) { el.innerHTML = '<div class="empty">No authored work matches these filters.</div>'; return; }
  const top = (obj, n) => Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n);
  // Recency matters when picking who to ask — flag work older than ~18 months.
  const staleCut = new Date(Date.now() - 548 * 86400000).toISOString().slice(0,10);
  const lastPill = last => last ? (last < staleCut
    ? `<span class="pill pill-gray" title="Most recent authored work is over 18 months old">last ${esc(last)}</span>`
    : `<span class="pill pill-green" title="Recently active on this">last ${esc(last)}</span>`) : "";
  if (f.view === "system" || f.view === "agency") {
    // Go-to directory: group work by system/theme (or agency), then rank people
    // inside each group — answers "who do I put on X?" directly.
    const key = f.view === "system" ? "system" : "agency";
    const groups = {};
    rows.forEach(r => {
      const k = r[key]; if (!k) return;
      const g2 = groups[k] = groups[k] || { n:0, people:{}, discs:{}, last:"", examples:[] };
      g2.n++;
      const pp = g2.people[r.person] = g2.people[r.person] || { n:0, last:"", projects:new Set() };
      pp.n++; if ((r.work_date||"") > pp.last) pp.last = r.work_date;
      if (r.project_number) pp.projects.add(r.project_number);
      if (r.discipline) g2.discs[r.discipline]=(g2.discs[r.discipline]||0)+1;
      if ((r.work_date||"") > g2.last) g2.last = r.work_date;
      if (g2.examples.length < 2 && r.subject) g2.examples.push(r.subject);
    });
    const cards = Object.entries(groups).sort((a,b)=>b[1].n-a[1].n).map(([name,g2]) => {
      const ppl = Object.entries(g2.people).sort((a,b)=>b[1].n-a[1].n).slice(0,3);
      return `<div class="lesson approved">
        <div class="lesson-summary">${f.view==="system"?"🎯":"🏛️"} ${esc(name)} <span style="font-weight:400;color:var(--dim);font-size:12px">· ${g2.n} work item${g2.n===1?"":"s"}</span></div>
        <div class="lesson-meta">${top(g2.discs,3).map(([k,n])=>`<span class="pill pill-purple">${esc(k)} × ${n}</span>`).join(" ")} ${lastPill(g2.last)}</div>
        <div class="lesson-sub" style="margin-top:8px">
          ${ppl.map(([pn,pp],i)=>`<div style="display:flex;gap:8px;align-items:baseline;padding:3px 0">
            <span style="color:${i===0?"var(--green)":"var(--dim)"};font-weight:${i===0?"700":"400"};min-width:16px">${i===0?"→":"·"}</span>
            <b style="${i===0?"":"font-weight:600;color:var(--dim)"}">${esc(pn)}</b>
            <span style="color:var(--muted);font-size:11px">${pp.n} item${pp.n===1?"":"s"} · ${pp.projects.size} project${pp.projects.size===1?"":"s"}${pp.last?` · last ${esc(pp.last)}`:""}</span>
          </div>`).join("")}
        </div>
        ${g2.examples.length?`<div class="lesson-sub" style="color:var(--muted)">e.g. ${g2.examples.map(esc).join(" · ")}</div>`:""}
      </div>`;
    }).join("");
    el.innerHTML = cards || '<div class="empty">No grouped work matches these filters.</div>';
    return;
  }
  const by = {};
  rows.forEach(r => {
    const p = by[r.person] = by[r.person] || { n:0, kinds:{}, discs:{}, systems:{}, agencies:{}, projects:{}, last:"", examples:[] };
    p.n++; p.kinds[r.kind]=(p.kinds[r.kind]||0)+1;
    if (r.discipline) p.discs[r.discipline]=(p.discs[r.discipline]||0)+1;
    if (r.system) p.systems[r.system]=(p.systems[r.system]||0)+1;
    if (r.agency) p.agencies[r.agency]=(p.agencies[r.agency]||0)+1;
    if (r.project_number) p.projects[r.project_number] = r.project_name || r.project_number;
    if ((r.work_date||"") > p.last) p.last = r.work_date;
    if (p.examples.length < 2 && r.subject) p.examples.push(r.subject);
  });
  const people = Object.entries(by).sort((a,b)=>b[1].n-a[1].n);
  el.innerHTML = people.map(([name,p]) => {
    const projs = Object.entries(p.projects);
    return `
    <div class="lesson approved">
      <div class="lesson-top"><div style="flex:1">
        <div class="lesson-summary">👤 ${esc(name)} <span style="font-weight:400;color:var(--dim);font-size:12px">· ${p.n} work item${p.n===1?"":"s"} · ${projs.length} project${projs.length===1?"":"s"}</span></div>
        <div class="lesson-meta">
          ${lastPill(p.last)}
          ${top(p.kinds,3).map(([k,n])=>`<span class="pill pill-blue">${esc(k)} × ${n}</span>`).join(" ")}
          ${top(p.discs,3).map(([k,n])=>`<span class="pill pill-purple">${esc(k)} × ${n}</span>`).join(" ")}
          ${top(p.agencies,3).map(([k,n])=>`<span class="pill pill-gray">${esc(k)} × ${n}</span>`).join(" ")}
        </div>
        ${top(p.systems,6).length?`<div class="lesson-sub"><b>Systems / themes:</b> ${top(p.systems,6).map(([k,n])=>`${esc(k)} (${n})`).join(" · ")}</div>`:""}
        ${projs.length?`<div class="lesson-sub"><b>Projects:</b> ${projs.slice(0,4).map(([num,nm])=>`<span class="pill pill-gray" style="margin:2px 2px 0 0" title="${esc(num)}">${esc(nm.length>28?nm.slice(0,27)+"…":nm)}</span>`).join("")}${projs.length>4?` <span style="color:var(--muted);font-size:11px">+${projs.length-4} more</span>`:""}</div>`:""}
        ${p.examples.length?`<div class="lesson-sub" style="color:var(--muted)">e.g. ${p.examples.map(esc).join(" · ")}</div>`:""}
      </div></div>
    </div>`; }).join("");
}

// ── Lessons module ───────────────────────────────────────────────────────────
function lessonsFiltered() {
  const f = state.filter;
  return state.lessons.filter(l => {
    if (f.agency && (l.agency || "") !== f.agency) return false;
    if (f.discipline && (l.discipline || "") !== f.discipline) return false;
    if (f.status && (l.status || "") !== f.status) return false;
    if (f.origin && (l.origin || "manual") !== f.origin) return false;
    if (f.q) {
      const hay = [l.lesson_summary, l.system, l.issue_type, l.project_id, l.so_person, l.source_reference, (l.tags||[]).join(" ")].join(" ").toLowerCase();
      if (!hay.includes(f.q.toLowerCase())) return false;
    }
    return true;
  });
}

function renderReviewNote() {

function renderLessonCard(l) {
  const confPill = { low: "pill-gray", medium: "pill-yellow", high: "pill-green" }[l.confidence] || "pill-gray";
  const statusPill = { draft: "pill-yellow", approved: "pill-green", archived: "pill-red" }[l.status] || "pill-gray";
  const statusLabel = { draft: "needs review", approved: "approved", archived: "rejected" }[l.status] || l.status;
  const proj = state.projects.find(p => p.id === l.project_id);
  const projLabel = l.project_id ? esc(l.project_id) + (proj ? " · " + esc(proj.name) : "") : "";
  const originBadge = l.origin === "mined"
    ? `<span class="pill pill-purple" title="Extracted from the project record">🤖 mined</span>`
    : `<span class="pill pill-gray">✍ manual</span>`;
  const srcType = l.source_type ? `<span class="pill pill-blue">${esc(l.source_type)}</span>` : "";
  const pills = [
    originBadge, srcType,
    l.discipline ? `<span class="pill pill-blue">${esc(l.discipline)}</span>` : "",
    l.system ? `<span class="pill pill-purple">${esc(l.system)}</span>` : "",
    l.issue_type ? `<span class="pill pill-gray">${esc(l.issue_type)}</span>` : "",
    `<span class="pill ${confPill}">conf: ${esc(l.confidence||"—")}</span>`,
    `<span class="pill ${statusPill}">${esc(statusLabel)}</span>`,
  ].filter(Boolean).join(" ");
  const srcChips = Array.isArray(l.linked_records) && l.linked_records.length
    ? `<div class="lesson-sub"><b>Evidence:</b> ` + l.linked_records.map(r =>
        `<span class="pill pill-gray" style="margin:2px 2px 0 0">${esc((r.type||"").toUpperCase())} ${esc(r.rfi_id||r.id||"")}</span>`).join("") + `</div>`
    : "";
  const actions = [
    `<button class="btn btn-ghost btn-sm" data-id="${esc(l.lesson_id)}" onclick="openLessonForm(this.dataset.id)">Edit</button>`,
    l.status !== "approved" ? `<button class="btn btn-success btn-sm" data-id="${esc(l.lesson_id)}" onclick="approveLesson(this.dataset.id)">✓ Approve</button>` : "",
    l.status !== "archived" ? `<button class="btn btn-ghost btn-sm" data-id="${esc(l.lesson_id)}" onclick="setLessonStatus(this.dataset.id,'archived')">✕ Reject</button>` : "",
    `<button class="btn btn-danger btn-sm" data-id="${esc(l.lesson_id)}" onclick="deleteLesson(this.dataset.id)" title="Delete permanently">🗑</button>`,
  ].filter(Boolean).join(" ");
  return `
    <div class="lesson ${esc(l.status||"draft")}">
      <div class="lesson-top">
        <input type="checkbox" class="selbox" ${state.selL.has(l.lesson_id)?"checked":""} data-id="${esc(l.lesson_id)}" onchange="toggleSel('L',this.dataset.id,this.checked)" title="Select for bulk approve/reject"/>
        <div style="flex:1">
          <div class="lesson-summary">${esc(l.lesson_summary)}</div>
          <div class="lesson-meta">${pills}</div>
        </div>
        <div class="lesson-actions">${actions}</div>
      </div>
      <div class="lesson-sub">
        ${projLabel ? `<b>Project:</b> ${projLabel} &nbsp;·&nbsp; ` : ""}
        ${l.agency ? `<b>Agency:</b> ${esc(l.agency)} &nbsp;·&nbsp; ` : ""}
        ${l.so_person ? `<b>From:</b> ${esc(l.so_person)} &nbsp;·&nbsp; ` : ""}
        ${l.approved_by ? `<b>Approved by:</b> ${esc(l.approved_by)} &nbsp;·&nbsp; ` : ""}
        <b>Added:</b> ${esc((l.date_added||"").slice(0,10))}
        ${l.source_reference ? `<br/><b>Source:</b> ${esc(l.source_reference)}` : ""}
        ${(l.tags && l.tags.length) ? `<br/><b>Tags:</b> ${l.tags.map(esc).join(", ")}` : ""}
      </div>
      ${srcChips}
      ${l.reusable_prompt ? `<div class="lesson-prompt">💡 ${esc(l.reusable_prompt)}</div>` : ""}
    </div>`;
}

async function saveLesson(id) {
  const summary = $("f_summary").value.trim();
  if (!summary) { toast("Lesson summary is required.", "error"); return; }
  const tags = $("f_tags").value.split(",").map(t => t.trim()).filter(Boolean);
  const payload = {
    lesson_summary: summary,
    project_id: $("f_project").value.trim() || null,
    agency: $("f_agency").value.trim() || null,
    discipline: $("f_discipline").value || null,
    system: $("f_system").value.trim() || null,
    issue_type: $("f_issue").value || null,
    confidence: $("f_conf").value,
    so_person: $("f_person").value.trim() || null,
    source_reference: $("f_source").value.trim() || null,
    reusable_prompt: $("f_prompt").value.trim() || null,
    tags,
    updated_at: new Date().toISOString(),
  };
  try {
    if (id) {
      await sb("PATCH", "/rest/v1/pms_lessons?lesson_id=eq." + encodeURIComponent(id), payload);
      toast("Lesson updated.", "success");
    } else {
      payload.status = "draft";
      await sb("POST", "/rest/v1/pms_lessons", payload);
      toast("Lesson added as a draft.", "success");
    }
    closeModal();
    await reloadLessons();
  } catch (e) { toast("Save failed: " + e.message, "error"); }
}

async function approveLesson(id) {
  if (!state.user) { openNameModal(() => approveLesson(id)); return; }
  try {
    await sb("PATCH", "/rest/v1/pms_lessons?lesson_id=eq." + encodeURIComponent(id),
      { status: "approved", approved_by: state.user, updated_at: new Date().toISOString() });
    toast("Approved. It now feeds Best Practices and the Expertise Graph.", "success");
    await reloadLessons();
  } catch (e) { toast("Approve failed: " + e.message, "error"); }
}

async function setLessonStatus(id, status) {
  try {
    await sb("PATCH", "/rest/v1/pms_lessons?lesson_id=eq." + encodeURIComponent(id),
      { status, updated_at: new Date().toISOString() });
    toast("Lesson " + status + ".", "success");
    await reloadLessons();
  } catch (e) { toast("Update failed: " + e.message, "error"); }
}

function deleteLesson(id) {
  openConfirmModal("Delete this lesson permanently? Use Reject instead if you might want it back.", "Delete", () => reallyDeleteLesson(id));
}
async function reallyDeleteLesson(id) {
  try {
    await sb("DELETE", "/rest/v1/pms_lessons?lesson_id=eq." + encodeURIComponent(id));
    toast("Lesson deleted.", "success");
    await reloadLessons();
  } catch (e) { toast("Delete failed: " + e.message, "error"); }
}

async function reloadLessons() {
  state.lessons = (await sb("GET", "/rest/v1/pms_lessons?select=*&order=date_added.desc")) || [];
  render();
}

      </div>
      <p style="font-size:13px;color:var(--dim);line-height:1.6;max-width:680px">${esc(blurbs[m.key]||"")}</p>
      <p style="font-size:12px;color:var(--muted);margin-top:12px">The database table exists and is wired. The UI for this module is the next build pass.</p>
    </div>
    <div class="roadmap">
      ${MODULES.filter(x=>!x.live).map(x=>`
        <div class="card">
          <h4>${esc(x.label)}</h4>
          <p>${esc((blurbs[x.key]||"").slice(0,120))}…</p>
          <div style="margin-top:8px"><span class="pill pill-gray">${state.counts[x.key]??0} rows</span></div>
        </div>`).join("")}
    </div>`;
}

// ── Identity (local only) ────────────────────────────────────────────────────
$("userChip").onclick = () => openNameModal();

// ── Boot ─────────────────────────────────────────────────────────────────────
if (state.embed) document.body.classList.add("embed");
loadAll();
</script>
</body>
</html>
