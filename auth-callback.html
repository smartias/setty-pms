<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Setty — Sign-in complete</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font: 15px/1.6 system-ui, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0;
           display: flex; align-items: center; justify-content: center; min-height: 90vh; margin: 0; }
    .card { text-align: center; padding: 32px 40px; }
    .big { font-size: 40px; margin-bottom: 12px; }
    .dim { color: #94a3b8; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <!-- Sign-in popup landing page (used by the Office add-ins and any embedded
       surface that can't do a full-page redirect). Supabase sends the session
       tokens here in the URL fragment; setty-auth.js parses and stores them to
       localStorage, which the opener page picks up via its storage listener. -->
  <div class="card">
    <div class="big" id="icon">⏳</div>
    <div id="msg">Finishing sign-in…</div>
    <div class="dim" id="sub"></div>
  </div>
  <script src="setty-auth.js"></script>
  <script>
    (function () {
      const icon = document.getElementById("icon"), msg = document.getElementById("msg"), sub = document.getElementById("sub");
      const hash = location.hash || "";
      if (/error_description=/.test(hash)) {
        icon.textContent = "⚠️";
        msg.textContent = "Sign-in failed";
        sub.textContent = new URLSearchParams(hash.slice(1)).get("error_description") || "";
        return;
      }
      if (!/access_token=/.test(hash)) {
        icon.textContent = "🔐";
        msg.textContent = "Nothing to finish — open this from a Setty app's Sign in button.";
        return;
      }
      // Three handoff channels, because Office surfaces differ in which works:
      //  1. The opener polls OUR URL for the tokens (MSAL technique) — so the
      //     hash must stay in the address bar; do NOT scrub it here.
      //  2. postMessage to the opener (when the opener link survived).
      //  3. localStorage (desktop webviews share it with the pane).
      const sess = settyAuth.adoptFromHash(hash, { scrub: false });
      try { if (window.opener) window.opener.postMessage({ type: "settyAuth:session", session: sess }, location.origin); } catch (_) {}
      icon.textContent = "✅";
      msg.textContent = "Signed in";
      sub.textContent = "This window will close itself.";
      // The opener normally closes us within a second; this is the fallback.
      setTimeout(() => { try { window.close(); } catch (_) {} }, 8000);
    })();
  </script>
</body>
</html>
